---
# prod_promotion_grants.yaml — un-forgeable trust anchor for prod-promotion approvals
#
# OMN-13418 Phase 2a: This file is the canonical grant registry for production
# promotion approvals. `.github/CODEOWNERS` names @OmniNode-ai/platform-leads
# as the intended reviewer of any PR touching this file, but that entry is
# ADVISORY, not mechanically enforced (`required_pull_request_reviews` is
# intentionally off on `dev` — see the CODEOWNERS comment and OMN-14445 for
# why). The MECHANICAL guarantee is `approved_by != PR-author`, checked in
# CI by `validate-prod-promotion-grants` (OMN-14441) — see below.
#
# Schema per entry:
#   grant_id:           unique UUID identifying this grant (format: "grant-<uuid4>")
#   runtime_lane:       target runtime lane being promoted to (e.g. "prod")
#   image_digest:       sha256 digest of the image being promoted (format: "sha256:<hex>")
#   promotion_batch_id: batch identifier grouping related promotions (format: "batch-<uuid4>")
#   approved_by:        GitHub login of the approver (must differ from PR author —
#                        see "Invariants enforced" below; NOT CODEOWNERS-enforced)
#   expires_at:         ISO-8601 UTC datetime after which the grant is invalid
#   created_at:         ISO-8601 UTC datetime when the grant was created
#   reason:             human-readable justification for the promotion
#
# Optional single-use lifecycle markers (OMN-13424; absent == not consumed):
#   consumed:                    bool — once a promotion using this grant reaches a
#                                terminal deploy state, mark true (or remove the entry)
#   consumed_at:                 ISO-8601 UTC datetime the grant was consumed
#   consumed_by_correlation_id:  UUID of the redeploy run that consumed it
#   The resolver treats a consumed grant as ABSENT — no replay of a spent grant.
#
# Invariants enforced by `validate-prod-promotion-grants`
# (src/onex_change_control/scripts/validate_prod_promotion_grants.py, run as an
# unconditional job in ci.yml, wired into the required CI Summary rollup —
# OMN-14441; previously a standalone workflow that ran but could not block a
# merge, OMN-14415 instance #1):
#   - File must parse as valid YAML
#   - Top-level key must be "entries" (list)
#   - Each entry must have all required fields present; only the OMN-13424
#     consumed* lifecycle markers are tolerated as extra fields
#   - grant_id must match pattern: grant-[0-9a-f-]{36}; no two entries may
#     share a grant_id (OMN-14441)
#   - image_digest must match pattern: sha256:[0-9a-f]{64}
#   - expires_at and created_at must be ISO-8601 UTC datetimes
#   - expires_at must be after created_at
#   - NO EXPIRED ENTRY may remain (OMN-13424): a grant whose expires_at is in the
#     past FAILs the check — it must be pruned so at rest the file is entries: []
#   - approved_by must not equal the PR author, for entries newly added by the
#     current PR (OMN-14441; diff-scoped, un-forgeable — the PR author is a
#     GitHub fact, not caller-supplied content). This does NOT prove the named
#     approver actually reviewed anything — see OMN-14445.
#
# To add a grant:
#   1. Open a PR against onex_change_control with a new entry below.
#   2. A platform lead should review (CODEOWNERS-named, not gate-enforced).
#   3. The approver's GitHub login becomes the approved_by value.
#   4. The approver must differ from the PR author (mechanically enforced by
#      validate-prod-promotion-grants, not by CODEOWNERS — see above).
#
# This file intentionally starts empty. Entries are added only through PR
# review by a platform lead — never authored or self-approved by an agent.

entries: []
