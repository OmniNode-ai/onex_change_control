    runtime_lane: prod
    image_digest: sha256:70639141bf2000449874fc90b5197bc5d99d5620c6685c62ae288ed8b5169d75
    promotion_batch_id: batch-e6cb808a-1425-4d24-824c-0cc37a688ee1
    approved_by: jonahgabriel
