---
# SPDX-FileCopyrightText: 2025 OmniNode.ai Inc.
# SPDX-License-Identifier: MIT
#
# version-matrix.yaml
#
# Single source of truth for expected ONEX package versions and their
# required dependency pins. CI jobs reference this file to detect version
# drift across repos.
#
# Maintenance: Run `python scripts/sync_version_matrix.py --root /path/to/omni_home --write`
# after every release to keep this file current.
# The check_version_pins.py script reads this matrix and exits non-zero
# if any repo's pyproject.toml pins are behind.

# Schema version for forward compatibility
schema_version: 1

# Expected latest versions of each ONEX package (from git tags)
packages:
  omnibase-spi:
    version: "0.20.2"
    pypi_name: "omnibase-spi"

  omnibase-core:
    version: "0.33.1"
    pypi_name: "omnibase-core"

  omnibase-infra:
    version: "0.28.0"
    pypi_name: "omnibase-infra"

  omninode-intelligence:
    version: "0.19.1"
    pypi_name: "omninode-intelligence"

  omninode-claude:
    version: "0.17.0"
    pypi_name: "omninode-claude"

  omninode-memory:
    version: "0.12.2"
    pypi_name: "omninode-memory"

# Per-repo expected dependency pins
# Each entry maps a repo name to its expected pinned dependencies.
# The key is the dependency name (as it appears in pyproject.toml),
# the value is the minimum acceptable version.
#
# Scope: published OmniNode Python library repos only.
# Infra/deployment repos (omninode_infra) are intentionally excluded.
# Repos not listed here will get INFO skip from check_version_pins.py.
#
# Updated: 2026-03-28 via sync_version_matrix.py [OMN-6692]
repos:
  omnibase_core:
    pyproject_path: "pyproject.toml"
    package_name: "omnibase-core"
    expected_pins: {}

  omnibase_infra:
    pyproject_path: "pyproject.toml"
    package_name: "omnibase-infra"
    expected_pins:
      omnibase-core: "0.33.1"
      omnibase-spi: "0.20.2"

  omniclaude:
    pyproject_path: "pyproject.toml"
    package_name: "omninode-claude"
    expected_pins:
      omnibase-core: "0.33.1"
      omnibase-spi: "0.20.2"
      omnibase-infra: "0.28.0"
      omninode-intelligence: "0.19.1"

  omniintelligence:
    pyproject_path: "pyproject.toml"
    package_name: "omninode-intelligence"
    expected_pins:
      omnibase-infra: "0.28.0"

  omnimemory:
    pyproject_path: "pyproject.toml"
    package_name: "omninode-memory"
    expected_pins:
      omnibase-core: "0.33.1"
      omnibase-spi: "0.20.2"
      omnibase-infra: "0.28.0"

# Dockerfile.runtime plugin pins (in omnibase_infra)
# Updated: 2026-03-28 via sync_version_matrix.py [OMN-6692]
dockerfile_runtime:
  path: "docker/Dockerfile.runtime"
  expected_pins:
    omninode-claude: "0.17.0"
    omninode-memory: "0.12.2"
    omninode-intelligence: "0.19.1"
