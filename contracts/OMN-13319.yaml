schema_version: "1.0.0"
ticket_id: "OMN-13319"
title: "fix(OMN-13319): count only PR-associated pull_request runs toward required contexts (not workflow_dispatch)"
summary: >-
  OCC evidence for the omnimarket fix PR that hardens merge-sweep arm logic (Enforcement Map F3 / handoff
  #4). For omnibase_core#1280 a manual workflow_dispatch run completed with a green "CI Summary" but did
  NOT satisfy branch protection — the required context had to come from the PR-associated pull_request
  run. The inventory producer (node_pr_lifecycle_inventory_compute) that feeds ci_status/ci_passing to
  node_pr_lifecycle_triage_compute previously trusted the green statusCheckRollup row regardless of which
  run produced it, so a manual-dispatch green made the PR appear arm-ready. The fix collects each check
  run's trigger event (gh pr checks --json name,state,bucket,event) and counts only PR-associated runs
  (pull_request, pull_request_target) toward ci_passing; a green workflow_dispatch or merge_group CI Summary
  is dropped, so a PR whose only green is a manual dispatch stays not-green and arm refuses. Eventless
  legacy status contexts remain PR-associated. The node trusts the PR-associated run conclusion, not the
  (possibly stale) statusCheckRollup row. Compute-only change; no topic schema, envelope, or contract
  API change; no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
