schema_version: "1.0.0"
ticket_id: OMN-9573
title: "Resolve topic lint repo path automatically"
summary: "Preserve OMNIBASE_INFRA_PATH override for run_topic_lint.sh, add automatic omnibase_infra path
  resolution, and test override, canonical, OMNI_HOME, sibling-walk, and skip behavior."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "Focused run_topic_lint path-resolution tests reported by omnibase_infra PR #1452 pass"
    command: "PYTHONPATH=src uv run pytest tests/scripts/test_run_topic_lint_path_resolution.py -q"
  - kind: tests
    description: "run_topic_lint.sh shell syntax validates"
    command: "bash -n scripts/validation/run_topic_lint.sh"
  - kind: ci
    description: "omnibase_infra PR #1452 CI checks for topic lint and summary gates pass"
    command: "gh pr checks 1452 --repo OmniNode-ai/omnibase_infra"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: "omnibase_infra PR #1452 body records the focused topic-lint path-resolution test with
      5 passing tests"
    source: manual
    checks:
      - check_type: command
        check_value: "gh pr view 1452 --repo OmniNode-ai/omnibase_infra --json body,commits --jq '.commits[-1].oid
          + \"\\n\" + (.body | capture(\"`PYTHONPATH=src uv run pytest [^`]+` . (?<tests>[0-9]+ passed)\").tests)'"
  - id: dod-002
    description: "omnibase_infra PR #1452 body records bash syntax validation for run_topic_lint.sh"
    source: manual
    checks:
      - check_type: command
        check_value: "gh pr view 1452 --repo OmniNode-ai/omnibase_infra --json body --jq '.body | if contains(\"`bash
          -n scripts/validation/run_topic_lint.sh`\") and contains(\"passed\") then \"bash -n passed\"
          else \"missing bash -n\" end'"
  - id: dod-003
    description: "omnibase_infra PR #1452 CI Summary, CI Tests Gate, Topic Naming Lint, and Topic Drift
      Check are passing; Receipt Gate is the known OCC-evidence blocker"
    source: manual
    checks:
      - check_type: command
        check_value: "gh pr checks 1452 --repo OmniNode-ai/omnibase_infra --json name,state,bucket --jq
          '.[] | select(.name==\"CI Summary\" or .name==\"CI Tests Gate\" or .name==\"Topic Naming Lint\"
          or .name==\"Topic Drift Check\" or .name==\"verify / verify\") | [.name,.state,.bucket] | @tsv'"
