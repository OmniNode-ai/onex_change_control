title: "chore(OMN-12361): delete dead dispatch_resolver in node_delegation_orchestrator"
summary: >-
  resolve_effect_topic() in omnimarket/src/omnimarket/nodes/node_delegation_orchestrator/dispatch_resolver.py
  was dormant dead code. The ticket asked to implement its MODEL invocation-kind branch (which raised
  NotImplementedError), but investigation showed the entire module has zero live callers: grep over src/
  and tests/ returns only the function definition and its __all__ export, the node package __init__.py
  does not re-export it, and the real invocation routing path (DispatcherInvocationCommand.handle -> HandlerDelegationWorkflow
  .handle_invocation_command -> re-emit; effect topics resolved from contract.yaml-declared topics + the
  dispatch subcontract wiring) never imports or calls it. The MODEL invocation kind already flows through
  that real path with no NotImplementedError. The module was migrated wholesale from omnibase_infra in
  OMN-10865 (#607) and never wired up. Per the dead-code / non-canonical-node-deletion doctrine the resolver
  is deleted (omnimarket PR #1542), not extended: implementing the MODEL branch would have required manufacturing
  a synthetic caller (ticket DoD item 3) and adding an unconsumed REMOTE_MODEL_INVOKE topic to omnibase_core,
  both of which create more dead code. No contract.yaml, topic, published_events, or runtime surface changes.
