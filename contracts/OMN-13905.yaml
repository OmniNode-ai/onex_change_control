ticket_id: "OMN-13905"
title: "Platform debt: aislop-sweep hardcoded-topics allowlist broadening (Part-1)"
summary: >-
  Evidence for OMN-13905 Part-1. The aislop-sweep hardcoded-topics rule (node_aislop_sweep in omnimarket,
  shipped OMN-8573 epic) was over-broad — it skipped a file only when its path contained "contract.yaml"
  or "enum", which false-flagged canonical topic registries whose paths contain neither (omnibase_core.topics,
  onex_change_control.kafka.topics, omniclaude.hooks.topics, omniintelligence.topics, omnimemory.topics,
  omnibase_infra/topics/platform_topic_suffixes.py). Fixed via structural recognition of registry membership
  (StrEnum/Enum class-body members, existing per-line suppression markers, and a new onex-topic-sot file-scope
  marker for flat-constant registries) — not a blanket file/path skip, and not a relocation of the registries.
  Verified: 9-repo omni_home sweep (hardcoded-topics check only) went 1157 -> 633 (omnimarket PR alone)
  -> 306 (both PRs), zero regressions. The remaining ~300 raw findings are the genuinely-stray relocation
  targets and are explicitly out of scope for this ticket's Part-1 — they need a separate follow-up ticket.
