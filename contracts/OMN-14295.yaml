ticket_id: "OMN-14295"
title: "fix(OMN-14295): batch Memgraph writes + create PythonModule nodes for IMPORTS edges"
summary: >-
  omnimarket product PR #1701 (branch jonah/omn-14295-arch-graph-populate-batch-imports, head 05e35de650d96033aa8646707114c4a96ebd764d)
  unblocks the architecture-graph populate handler (node_architecture_graph_populate_effect). Two fixes
  plus an operator-directed harvest: (1) IMPORTS edges never landed because the edge MERGE referenced
  PythonModule node_ids that nothing created — the handler now creates a PythonModule node for every file
  the shared ASTImportScanner discovers, using the SAME _module_name id-builder for both node and edge
  source_id, and adds a `repo` property to Repository nodes so cross_repo_imports' `b.repo <> $repo` filter
  stops silently dropping every row on a NULL comparison; (2) one-round-trip-per-item writes are replaced
  with UNWIND-batched MERGEs grouped by label / edge_type (batch_size rows per call), with a harvested
  transient-error retry decorator. Handler + shared-analysis relocation + tests only; no contract topic/model
  or container-deploy change.
