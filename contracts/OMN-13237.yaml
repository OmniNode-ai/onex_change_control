schema_version: "1.0.0"
ticket_id: "OMN-13237"
title: "Per-contract scoped topic provisioning at runtime boot"
summary: >
  Replace the global create-all-then-subscribe-all big-bang at runtime boot (the cold-broker crash-loop
  root cause) with a per-wired-contract interleave: provision -> confirm broker metadata ready -> attach
  consumer -> next contract. Deterministic readiness (partition count, leaders, RF), bounded parallelism,
  and not-ready contracts recorded degraded-not-fatal. Topics come only from contract.event_bus declarations.

is_seam_ticket: false
interface_change: false
interfaces_touched: []

