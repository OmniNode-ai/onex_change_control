      order test (W1/W7), the AC-3/AC-4 not-ready-is-degraded-not-fatal liveness test (W5), the deterministic
      topic readiness semantics suite (§3.7), the readiness knob resolution suite, and the 5 deterministic
      golden-chain replay fixtures (AC-5/W6).
    command: "uv run pytest tests/unit/runtime/auto_wiring/test_per_contract_boot_interleave.py tests/unit/event_bus/test_topic_readiness_semantics.py
      tests/unit/event_bus/test_topic_readiness_config.py tests/replay/test_topic_provisioning_golden_chains.py
      -q"
  - kind: "ci"
