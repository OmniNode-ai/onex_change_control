    description: "omnibase_infra PR #1631 carries the OMN-11144 verifier action change."
    command: "gh pr view 1631 --repo OmniNode-ai/omnibase_infra --json state,headRefOid"
  - kind: "tests"
    description: "Focused action verifier tests, lint, and mypy pass locally."
    command: "PYTHONPATH=${OMNIBASE_CORE_SRC_STACK:?set OMNIBASE_CORE_SRC_STACK}:$PWD/src uv run pytest
      tests/unit/gate/test_action_verify.py -q && uv run ruff check src/omnibase_infra/gate/action_verify.py
      tests/unit/gate/test_action_verify.py && uv run mypy src/omnibase_infra/gate/action_verify.py"
  - kind: "manual"
    description: "No runtime deploy is required before merge for a read-only GitHub Action verifier."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11144/dod-deploy-assessment/command.yaml"
  - kind: "manual"
    description: "OCC PR #1083 carries the central OMN-11144 contract and receipts."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11144/dod-occ-pr-1083/command.yaml"
