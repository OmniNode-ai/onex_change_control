---
schema_version: "1.0.0"
ticket_id: OMN-8800
title: "Version skew detector node"
summary: "Add a pure compute node that detects plugin/runtime version skew and emits healthy or skew-detected
  telemetry topics."
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
  - "events"
  - "topics"
evidence_requirements:
  - kind: "manual"
    description: "Focused version-skew detector tests and metadata schema tests pass"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-tests/command.yaml && grep -q '34
      passed' drift/dod_receipts/OMN-8800/dod-tests/command.yaml"
  - kind: "manual"
    description: "Strict mypy passes across omnimarket after adding the node"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-typecheck/command.yaml && grep
      -q 'Success: no issues found' drift/dod_receipts/OMN-8800/dod-typecheck/command.yaml"
  - kind: "manual"
    description: "Touched version-skew detector paths pass lint"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-lint/command.yaml && grep -q 'All
      checks passed' drift/dod_receipts/OMN-8800/dod-lint/command.yaml"
  - kind: "manual"
    description: "Repo-local OMN-8800 deploy contract validates"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-contract-parse/command.yaml &&
      grep -q 'contracts/OMN-8800.yaml' drift/dod_receipts/OMN-8800/dod-contract-parse/command.yaml"
  - kind: "manual"
    description: "Post-merge deploy smoke plan exists; no live deploy or restart was performed"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-deploy-smoke/command.yaml && grep
      -q 'No deploy' drift/dod_receipts/OMN-8800/dod-deploy-smoke/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-tests"
    description: "Focused version-skew detector tests and metadata schema tests pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-tests/command.yaml && grep
          -q '34 passed' drift/dod_receipts/OMN-8800/dod-tests/command.yaml"
  - id: "dod-typecheck"
    description: "Strict mypy passes across omnimarket after adding the node"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-typecheck/command.yaml
          && grep -q 'Success: no issues found' drift/dod_receipts/OMN-8800/dod-typecheck/command.yaml"
  - id: "dod-lint"
    description: "Touched version-skew detector paths pass lint"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-lint/command.yaml && grep
          -q 'All checks passed' drift/dod_receipts/OMN-8800/dod-lint/command.yaml"
  - id: "dod-contract-parse"
    description: "Repo-local OMN-8800 deploy contract validates"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-contract-parse/command.yaml
          && grep -q 'contracts/OMN-8800.yaml' drift/dod_receipts/OMN-8800/dod-contract-parse/command.yaml"
  - id: "dod-deploy-smoke"
    description: "Post-merge deploy smoke plan exists; no live deploy or restart was performed"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-8800/dod-deploy-smoke/command.yaml
          && grep -q 'No deploy' drift/dod_receipts/OMN-8800/dod-deploy-smoke/command.yaml"
