ticket_id: "OMN-12770"
title: "Fix delegation inference effect handler route binding"
summary: >-
  Central evidence for omnimarket hotfix PR #1091. The live dev-lane delegation proof reached routing
  but timed out because the effects runtime had a consumer for onex.cmd.omnibase-infra.delegation-inference-request.v1
  without a matching dispatch route. The fix pins node_llm_delegation_call_effect handler entries to explicit
  topic-derived event_type aliases so the multi-topic payload_match contract prepares routes for both
  delegation-execute and delegation-inference-request.
