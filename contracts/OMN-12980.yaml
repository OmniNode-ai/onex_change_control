---
schema_version: "1.0.0"
ticket_id: "OMN-12980"
title: "Audit ratchet: validate projection_api exposure has materialization authority"
summary: >
  Add an omnimarket static validation ratchet for contract-declared projection API exposures. A `projection_api.expose:
  true` topic is only an API exposure declaration; it does not create the backing table or view. The validator
  fails exposed topics that lack declared DDL/materializer authority, and fails declared authorities that
  lack node-local cold DDL proof for the backing table/view. The implementation adds focused tests for
  missing authority, missing cold DDL proof, formatted validator output, node-local view proof, and a
  scoped pass over currently materialized projection contracts while separate instance-fix tickets land
  remaining DDL owners.
is_seam_ticket: false
