---
schema_version: "1.0.0"
ticket_id: "OMN-13537"
title: "Default ONEX_ARTIFACT_STORE_ROOT under state_root so CLI receipt capture stops failing open"
summary: >
  Resolves a receipt-mode fail-open defect (follow-up to epic OMN-13089): the CLI receipt path never defaulted
  ONEX_ARTIFACT_STORE_ROOT, so ArtifactStore raised KeyError, the error was caught, and Layer B durable
  artifact capture was silently skipped for every receipt-mode dispatch. The fix resolves the store root
  at the config boundary (defaults to <state_root>/artifacts, explicit operator override wins, and publishes
  the resolved default to the env for the pinned core store). Genuine (non-env) write failures still fail
  loud via the existing full-output path. Static CLI/config change only — no live deploy, runtime process,
  broker topic, or schema migration required before merge.
is_seam_ticket: false
