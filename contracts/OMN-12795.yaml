title: "P2-4 — Selective guidance chunking: section parser (pure COMPUTE) + provenance fields"
summary: >-
  Extend ModelContextPackArtifact with four optional provenance fields (source_file, heading_path, char_count,
  reason_selected) and add a pure COMPUTE-eligible GuidanceSectionParser that splits guidance file text
  at ATX heading boundaries into typed ParsedSection objects convertible to ModelContextPackArtifact via
  to_artifact(). Zero filesystem I/O in the parser — callers (EFFECTs) supply the raw string. Additive
  only; no existing callers break. Existing token-budget hard-reject unchanged.
