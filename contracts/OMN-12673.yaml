---
schema_version: "1.0.0"
ticket_id: "OMN-12673"
title: "Bind dependency PR Receipt Gate evidence sweep"
summary: >
  Central OCC evidence for dependency-only PRs whose product checks are green but Receipt Gate is blocked
  by missing Evidence-Source metadata: omniintelligence PR #696, omniclaude PRs #1724 and #1725, and replacement
  dependency PRs including omnibase_infra PR #1866.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniintelligence PR #696 is open against dev at the recorded dependency bump head."
    command: "gh pr view 696 --repo OmniNode-ai/omniintelligence --json number,state,headRefOid,baseRefName"
  - kind: "manual"
    description: "omniclaude PR #1724 is open against dev at the recorded pytest-asyncio dependency bump
      head."
    command: "gh pr view 1724 --repo OmniNode-ai/omniclaude --json number,state,headRefOid,baseRefName"
  - kind: "manual"
    description: "omniclaude PR #1725 is open against dev at the recorded GitHub Actions dependency bump
      head."
    command: "gh pr view 1725 --repo OmniNode-ai/omniclaude --json number,state,headRefOid,baseRefName"
  - kind: "manual"
    description: "omnibase_infra PR #1866 is open against dev at the recorded Redis and DeepDiff dependency
      lock refresh head."
    command: "gh pr view 1866 --repo OmniNode-ai/omnibase_infra --json number,state,headRefOid,baseRefName"
  - kind: "manual"
    description: "omniintelligence PR #699 is open against dev at the recorded aiohttp dependency replacement
      head."
    command: "gh pr view 699 --repo OmniNode-ai/omniintelligence --json number,state,headRefOid,baseRefName"
  - kind: "ci"
    description: "Required non-Receipt-Gate checks are green for all three dependency PRs."
    command: "gh pr checks <pr> --repo <repo> --required --json name,state,workflow"
  - kind: "manual"
    description: "The OCC PR carrying this central evidence is open and bound to OMN-12673."
    command: "gh pr view 2156 --repo OmniNode-ai/onex_change_control --json number,state,headRefOid,baseRefName"
  - kind: "manual"
    description: "The OCC PR carrying the omnibase_infra replacement evidence is open and bound to OMN-12673."
    command: "gh pr view 2160 --repo OmniNode-ai/onex_change_control --json number,state,headRefOid,baseRefName"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
