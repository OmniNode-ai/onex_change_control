    description: "omniintelligence PR #696 is open against dev at the recorded omnibase-core dependency
      bump head."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12673/dod-omniintelligence-pr-696-head/command.yaml"
          && grep -q '^pr_number: 696$' "drift/dod_receipts/OMN-12673/dod-omniintelligence-pr-696-head/command.yaml"
          && grep -q '^commit_sha: "0104cd130a971b3408f008a161f76557ab20af6b"$' "drift/dod_receipts/OMN-12673/dod-omniintelligence-pr-696-head/command.yaml"
