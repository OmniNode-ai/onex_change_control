schema_version: "1.0.0"
ticket_id: "OMN-11827"
title: "Fix max_tokens truncation and live model registry drift"
summary: >
  Thinking models (Qwen3.6 local, cloud reasoning models) consume ~2100 tokens of internal reasoning before
  emitting any output. With max_tokens=2048 the response was hard-truncated mid-generation, causing 15%
  failure rate on cloud models and 100% failure rate on local Qwen3.6. Fix bumps max_tokens from 2048
  to 8192 in consumer.py, eval_runner.py, and run_transfer_evidence_probe.py, adds regression guards in
  unit tests, updates model_registry.yaml to match live endpoints on .201/.200 as of 2026-05-25, and
  removes a duplicate response-handling branch that blocked strict mypy on the rebased PR head.
