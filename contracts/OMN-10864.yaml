  - kind: "tests"
    description: "Full auto-wiring unit suite passes (no regressions)"
    command: "uv run pytest tests/unit/runtime/auto_wiring/ -v"
  - kind: "ci"
    description: "All CI gates green on omnibase_infra PR #1568"
    command: "gh pr checks ${PR_NUMBER} --repo OmniNode-ai/omnibase_infra"
  - kind: "tests"
    description: "3 new unit tests in PR #1574 for RuntimeHostProcess subscription wiring gate pass"
    command: "uv run pytest tests/unit/runtime/test_node_subscription_wiring.py -v"
  - kind: "ci"
