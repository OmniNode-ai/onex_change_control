title: "fix(OMN-10864): prevent auto-wiring duplicate subscription on plugin-managed topics"
summary: "Two-PR fix for duplicate consumer groups on plugin-managed topics. PR #1568: added plugin_managed
  flag to ModelEventBusWiring, skipping auto-wiring Kafka subscriptions. PR #1574: gates RuntimeHostProcess
  _wire_event_bus_subscriptions and _wire_package_node_subscriptions paths on the same flag, closing the
  second duplicate-consumer path that PR #1568 missed."
is_seam_ticket: false
interface_change: false
