ticket_id: "OMN-10864"
title: "fix(OMN-10864): prevent auto-wiring duplicate subscription on plugin-managed topics"
summary: "Add plugin_managed: bool to ModelEventBusWiring. Auto-wiring skips Kafka subscription when plugin_managed=True,
  preventing duplicate consumer groups when a domain plugin already owns the topic. Set plugin_managed:
  true on the delegation orchestrator contract to fix the ~5-min-post-startup delegation chain break caused
  by auto-wiring rediscovery."
