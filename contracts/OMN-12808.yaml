title: "OMN-12808 — omnidash URLs → contract: verify single data-source carve-out, annotate straggler"
summary: >-
  Part of the URL-authority epic (OMN-12803). omnidash PR #240 verifies that src/data-source/ and src/config/generated/
  remain the ONLY authoritative URL locations in the omnidash browser bundle: src/services/delegation-api.ts
  DEFAULT_BASE is the relative '/api/delegation' path (no localhost literal) and all live data-source
  reads route through resolveProjectionBaseUrl() (the single origin seam). A full src/ scan (excluding
  *.test.* fixtures, generated config, and the carve-out) found exactly one straggler: the synthetic runtime_address
  display value (192.168.86.${n}) in src/storybook/fixtures/cost-savings-overview.ts — fixture display
  data for a fictional projection row, never used to open a connection. The PR annotates it with url-authority-ok:
  and adds src/url-carve-out.test.ts, a mechanical invariant test that scans src/ for raw connection-URL
  literals outside the carve-out and fails on any unannotated straggler (TDD: red on the fixture, green
  after annotation). The new detector test is allowlisted in scripts/check-no-env-contamination.sh and
  scripts/check-hardcoded-delegation-refs.sh, mirroring the existing no-env-fallback / no-non-authoritative-read-source
  detector-test allowlist convention. This OCC contract is the Evidence-Source for PR #240's Receipt Gate;
  the paired receipt carries the real probe evidence captured by re-running the PR's verification commands
  at PR head 5decb8ac2ac19bfd5349de47dcaf2b36a87e695b.
