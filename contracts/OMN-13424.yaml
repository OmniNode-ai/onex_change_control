schema_version: "1.0.0"
ticket_id: "OMN-13424"
title: "feat(OMN-13424): grant lifecycle — single-use consume + expire + prune (resolver + lint/CI)"
summary: >-
  Phase 2.3 of the prod-promotion authorization gate (epic OMN-13410, parent OMN-13418), shipped on omnimarket
  source PR #1422. Makes a prod-promotion grant single-use and time-bound so a stale grant cannot be replayed
  against a future promotion and grants cannot accumulate. omnimarket: the grant resolver (OMN-13439)
  gains a pure prune_expired() helper that drops expired (evaluated_at > expires_at) and consumed entries
  from the grant trust anchor and returns ModelPruneResult with the dropped grant_ids plus a had_expired
  lint signal (zero I/O); ModelProdPromotionGrant gains optional consumed_at + consumed_by_correlation_id
  single-use markers carried through by _materialize_grant. A consumed grant already resolves to CONSUMED
  (grant None — treated as absent, no replay) and an expired grant to EXPIRED (grant None), both fail-closed.
  onex_change_control (this PR): the dedicated validate-prod-promotion-grants workflow now tolerates the
  optional consumed* lifecycle markers as extra fields, type-checks them, and FAILs if any EXPIRED entry
  remains in grants/prod_promotion_grants.yaml (the lint/prune job — at rest the file is entries: []).
  onex_change_control keeps ZERO Python import on omnimarket — the resolver parses the grant YAML directly.
  This OCC PR carries the central contract consumed by the omnimarket PR #1422 Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
