---
schema_version: "1.0.0"
ticket_id: "OMN-14409"
title: "OCC companion for onex_change_control#3990 — contract substance floor"
summary: >
  OCC evidence companion for OmniNode-ai/onex_change_control#3990 (OMN-14409). #3990 adds the contract
  substance floor: a gate that derives a proof tier per dod_evidence check_value and rejects a contract
  whose DoD is nothing but existence probes, on the principle that a DoD of only existence probes cannot
  certify correctness. It ships the deriver (scripts/validation/check_contract_substance_floor.py), a
  legacy allowlist that may only ratchet down, and wires the gate into BOTH CI and pre-commit. Authored
  by an independent verifier. Per OMN-14055 the implementer must not author its own evidence: the agent
  that pushed the de-conflict commit to #3990 is a contributor to it and its receipts would be downgraded
  PASS -> ADVISORY under the verifier==runner rule. This lane has never committed to #3990 — see the branch's
  own log, which contains no commit by this runner. Every substantive check below is a CONTENT READ pinned
  to #3990's head commit SHA (41c0a3a20d20d70fe5be5f34884017a7a388524f), asserting a SYMBOL the change
  introduces. Nothing greps this repo's receipt corpus for "status: PASS", and no check is keyed on #3990's
  CI — #3990's CI is red precisely BECAUSE this contract is missing (occ-preflight -> missing_contract),
  so a CI-keyed check would be circular and could never go green.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "onex_change_control#3990 head SHA carries the substance-floor deriver, its command-position
      anchor, and the CI wiring that makes it enforcing rather than advisory"
    command: "see dod_evidence check_values (content reads pinned to 41c0a3a2)"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-3990-kill-switch-present"
    description: >-
      Product-observing: reads the actual source of scripts/validation/check_contract_substance_floor.py
      at #3990's exact head commit SHA (41c0a3a20d20d70fe5be5f34884017a7a388524f) via the GitHub contents
      API and asserts it carries GATE_SELF_REFERENTIAL — the kill-switch that decides whether the circular
      self-grep class (a check_value that greps its own receipt for "status: PASS") is gated or merely
      derived as L0. That switch is the load-bearing control surface of the whole ticket, so reading it
      is a direct read of the change rather than a restatement of the PR's claim. RED DIRECTION PROVEN
      by execution: the file does not exist on OCC dev at all (the contents API returns 404 at dev HEAD
      5a27c309f2978afd2d2617321801c3d230795093), so the identical command finds zero occurrences and exits
      1 there. The symbol occurs 5 times at #3990's head. It also exits 1 against a bogus all-zero SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/scripts/validation/check_contract_substance_floor.py?ref=41c0a3a20d20d70fe5be5f34884017a7a388524f"
          --jq .content | base64 -d | grep -c "GATE_SELF_REFERENTIAL")" -ge 1
  - id: "dod-verify-3990-command-position-anchor"
    description: >-
      Product-observing: asserts the deriver at #3990's head carries the _CMD command-position anchor
      — the regex prefix that only matches a verb in true command position (start of line, after a pipe
      / semicolon / ampersand, inside $( ), or after run/exec/xargs/sudo/time/env/then/do/else). This
      is the correctness core of the deriver: without it, the tier classifier matches a verb anywhere
      in the string (including inside a quoted path or a comment) and mis-tiers check_values. #3990's
      own final commit is "anchor every verb to command position — I fixed the instance, then shipped
      the class", so this symbol is precisely the fix under review, not incidental. RED DIRECTION PROVEN
      by execution: the file 404s on OCC dev, so the identical command exits 1 at dev HEAD (5a27c309f2978afd2d2617321801c3d230795093)
      and at a bogus SHA; it exits 0 only at #3990's head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/scripts/validation/check_contract_substance_floor.py?ref=41c0a3a20d20d70fe5be5f34884017a7a388524f"
          --jq .content | base64 -d | grep -cE '^_CMD = r')" -ge 1
  - id: "dod-verify-3990-gate-wired-in-ci"
    description: >-
      Product-observing, and the one that matters most for this ticket's class: asserts the gate is actually
      WIRED as an enforcing CI job, not merely shipped as a script. Reads .github/workflows/ci.yml at
      #3990's head SHA and requires the literal invocation "check_contract_substance_floor.py --all".
      A detection tool that is not wired as a pre-merge gate is advisory and gets ignored (CLAUDE.md operating
      rule 5: enforcement, not detection) — so "the deriver exists" is NOT sufficient evidence that OMN-14409
      is done; "CI runs the deriver over the whole corpus" is. RED DIRECTION PROVEN by execution, and
      this one is a genuinely strong control because ci.yml EXISTS on dev — a bare existence probe on
      this path would return a hash at both refs and rubber-stamp. The SYMBOL discriminates: "check_contract_substance_floor.py
      --all" occurs once in ci.yml at #3990's head and ZERO times in ci.yml at dev HEAD (5a27c309f2978afd2d2617321801c3d230795093),
      so the command exits 0 at #3990's head and exits 1 at dev.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/.github/workflows/ci.yml?ref=41c0a3a20d20d70fe5be5f34884017a7a388524f"
          --jq .content | base64 -d | grep -c -- "check_contract_substance_floor.py --all")" -ge 1
  - id: "dod-occ-self-commit"
    description: >-
      Self-bind item for THIS OCC companion PR. occ-preflight (validator_occ_merge_eligibility._receipt_bound_to_pr)
      requires at least one PASS receipt whose pr_number equals the PR under check, and the eligibility
      gate runs TWICE — once on this companion and once on the source PR #3990 — so the product receipts
      above bind #3990 while this one binds the companion. That is why both receipt kinds exist. Intentionally
      self-referential, and legitimately so: it asserts a fact ABOUT this PR (its branch / identity),
      so this PR is the correct surface to read. It is a binding item, NOT substantive evidence, and makes
      no claim about #3990's correctness. The substantive proof is the three product-observing entries
      above.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14409-occ-companion-evidence' drift/dod_receipts/OMN-14409/dod-occ-self-commit/command.yaml
