title: "fix(OMN-14394): close pr_state is_draft seam gap + dict-envelope regression test"
summary: >-
  omnibase_infra PR #2266 closes a seam gap found during independent verification of #2262 (OMN-14375):
  ModelOpenPrSummary.is_draft (the OMN-14374 read skill, omnimarket's node_github_repo_gateway_effect)
  had zero counterpart in pr_state's schema. This PR threads is_draft end-to-end on the producer side
  (migration 092, ModelPayloadPrStateUpsert, HandlerPrStateProjection extraction, poller emission, write-effect
  SQL $15) plus a separate test-gap item: a regression test proving HandlerPrStateProjection.handle()
  accepts a raw DICT-shaped envelope, not just an already-typed ModelEventMessage. STACKED PR — base is
  jonah/omn-14375-github-state-projection-pr-state (#2262), not dev; #2262's pr_state table/models/handlers
  do not exist on dev yet, and #2262 is itself OCC-cascade-blocked. #2266 cannot merge until #2262 lands
  and GitHub retargets its base to dev. This companion clears #2266's own occ-preflight so it is merge-ready
  the moment that happens.
