ticket_id: "OMN-13420"
title: "Core-resident local runtime harness — infra-free in-process node iteration, in-memory bus"
summary: >-
  Phase 6 of the local-first runtime re-convergence (epic OMN-13442). Adds a minimal in-process dispatch
  harness in omnibase_core that runs a full command -> orchestrator -> effect(inference) -> terminal ->
  reducer(projection) chain using ONLY the spi ProtocolMessageHandler.handle(envelope) -> ModelHandlerOutput
  contract, core envelope models (ModelEventEnvelope, ModelHandlerOutput), the core in-memory bus (omnibase_core.event_bus.event_bus_inmemory.EventBusInmemory),
  and the core-resident runtime protocols (omnibase_core.protocols.runtime). There is NO infra MessageDispatchEngine,
  DI container, topic provisioning, or consumer groups; NO Kafka; NO Postgres (SQLite projection store,
  default :memory:); and NO LAN (recorded-fixture inference adapter on the default path; a curl-subprocess
  adapter is available behind the inference-adapter protocol seam). Pluggable effect adapters: ProtocolHarnessInferenceAdapter
  (RecordedFixtureInferenceAdapter offline / CurlSubprocessInferenceAdapter separate-binary LAN) and ProtocolHarnessProjectionStore
  (SqliteProjectionStore). delegation + sea CLI subcommands mirror docs/evidence/2026-06-15-runtime-integration/publish_runtime_probe.py
  and emit a durable evidence packet (runtime SHA, correlation ID, bus impl, projection backend, exit
  0). Scope is honest: proves HANDLER LOGIC + the in-process command->terminal->projection chain; does
  NOT exercise Kafka semantics or the image build, so the infra-backed broker proof + fitness gate remain
  the pre-merge gate. This OCC PR carries the central contract consumed by the omnibase_core PR Receipt
  Gate via Evidence-Source.
