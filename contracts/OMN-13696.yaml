title: "fix(OMN-13696): add NotImplementedError handle() stubs to 3 Wave-2 marker handler classes"
summary: >
  Three nodes migrated from omnimemory (OMN-8298 Wave 2) had contracts declaring handler.class pointing
  to marker classes with no handle() method, causing silent dispatch failure. Fix adds async handle()
  that raises NotImplementedError (loud-fail) and wires ProtocolMessageHandler properties to each class.

is_seam_ticket: false
interface_change: false
interfaces_touched: []

