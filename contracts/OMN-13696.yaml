      15 unit tests in tests/test_omn13696_handle_stubs_wave2.py verify that each of the 3 handler classes
      has handle() present, raises NotImplementedError with OMN-8298 in the message, and satisfies ProtocolMessageHandler
      structural protocol.
    command: >
      uv run pytest tests/test_omn13696_handle_stubs_wave2.py -m unit -v --tb=short
