      tests pass (64 passed). Mutation-discrimination: a distinct semantic mutation was injected into
      each of the five underlying pure functions (render.render_subcontract, advanced_features._ARCHETYPE_DEFAULTS
      COMPUTE breaker, assemble.assemble_contract fragment-by-type, digest.digest_contract input bytes,
      serialize.serialize_contract digest binding) and each drove the owning node's test suite RED (7/1/1/3/1
      failures respectively), then every mutation was reverted and the worktree left clean - the tests
      are not vacuous. COMPUTE purity confirmed by grep/AST over the five handlers and the seven contract_assembly
      modules: no open/read/write/requests/httpx/subprocess/ os.environ/socket/time/datetime/random/Kafka/DB
      usage. No Plugin* base class and no cross-node handler imports. ruff check + ruff format --check
      + mypy --strict all clean on the changed dirs.
