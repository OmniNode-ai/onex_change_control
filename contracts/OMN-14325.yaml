title: "feat(OMN-14325): node_contract_serialize + 4 compute leaves - compliant model-to-contract serialization"
summary: >-
  omnimarket product PR #1705 (branch jonah/omn-14325-node-contract-serialize, head 01b5e617cfd9931cca8aebfe004a16cae627a969)
  adds the codegen-factory serialization keystone node_contract_serialize_compute plus four pure COMPUTE
  leaves (node_subcontract_render_compute, node_advanced_features_resolve_compute, node_contract_assemble_compute,
  node_contract_digest_compute) and the shared omnimarket.contract_assembly library (models, render, advanced_features,
  assemble, digest, lint, serialize). It replaces a dormant hand-rolled dict->yaml serializer with a typed,
  archetype-differentiated pipeline: each leaf is a thin handler over a pure deterministic library function;
  the parent composes render+resolve+assemble+digest and gates the result through a pure contract lint.
  Every handler is a stateless deterministic COMPUTE node with no I/O (no file/network/env/subprocess/clock/random),
  no Plugin* base class, and no in-process node-calling-node. Public-safe generic code-generation infrastructure.
