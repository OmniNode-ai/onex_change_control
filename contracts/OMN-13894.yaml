title: "Migrate omniclaude ModelSkillResult off removed core path + bump omnibase-core 0.46.4"
summary: >-
  OCC evidence for omniclaude PR #1844. omnibase_core 0.45.0+ removed models.skill.model_skill_result
  (the extra-bearing model omniclaude re-exported) and introduced a redesigned receipt-mode ModelSkillResult
  at models.dispatch. A naive bump broke 38 unit tests. This PR decouples omniclaude's internal result:
  shared/models/model_skill_result.py now defines a LOCAL ModelSkillResult matching the exact {skill_name,
  status, extra} shape all 15 dispatch call sites and both consumers already use, while sourcing the status
  vocabulary (EnumSkillResultStatus) from core. The pin moves omnibase-core 0.44.0 -> 0.46.4 (dependencies
  + uv override + uv.lock), unblocking the omnibase_core.validation.no_faked_boundary gate module (OMN-13501/13502).
  The 38 previously-failing tests pass by migration, not by test edits. No runtime contract change.
