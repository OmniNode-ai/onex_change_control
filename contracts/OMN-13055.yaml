ticket_id: "OMN-13055"
title: "pull-all.sh REPOS list defect: absent repos warn and exit 0 instead of failing"
summary: >-
  pull-all.sh was treating absent (not-cloned) repos identically to repos that fail to fetch or fast-forward:
  both were added to FAILED and caused exit 1. The correct behavior is skip-with-warning on absent repos,
  exit 0 when all PRESENT repos succeed, and exit 1 only when a present repo fails. Explicit-list behavior
  is preserved. Ships with three regression tests covering the absent-only, absent+present-ok, and dirty-present+absent
  scenarios.
