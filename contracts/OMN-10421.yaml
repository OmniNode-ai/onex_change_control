schema_version: '1.0.0'
ticket_id: OMN-10421
title: Hash-bind contract to receipt via contract_sha256
summary: >-
  Extends ModelDodReceipt with a contract_sha256 field (SHA-256 hex digest of the contract YAML at proof
  time) and enforces hash-binding in receipt_gate.py so that mutating a contract after a receipt is produced
  invalidates the receipt. Implements invariant I4 from the gate-collapse-fix plan (OMN-10410, T11).
is_seam_ticket: false
