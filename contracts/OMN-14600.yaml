      only (L0); the product content-reads above carry the substance floor.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14600-occ-companion' drift/dod_receipts/OMN-14600/dod-occ-self-bind-pr-4134/command.yaml
          && grep -q 'pr_number: 4134' drift/dod_receipts/OMN-14600/dod-occ-self-bind-pr-4134/command.yaml
