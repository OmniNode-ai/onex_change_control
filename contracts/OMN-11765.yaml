---
schema_version: "1.0.0"
ticket_id: "OMN-11765"
title: "Live delegation golden chain proof"
summary: >-
  Bind central OCC evidence for omnimarket PR #765, which adds a guarded live integration golden-chain
  proof for delegation events from Kafka through the projection consumer into Postgres. The repair also
  adds the missing delegation_events migration, targets the stability Postgres lane by default, and publishes
  canonical ModelEventEnvelope payloads.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Default CI-safe mode skips the live integration tests unless OMN_ALLOW_LIVE_INTEGRATION_TESTS=true."
    command: "uv run pytest tests/integration/golden_chain/test_delegation_e2e.py -q"
  - kind: "tests"
    description: "Live stability-lane Kafka-to-Postgres delegation projection proof passes."
    command: "OMN_ALLOW_LIVE_INTEGRATION_TESTS=true uv run pytest tests/integration/golden_chain/test_delegation_e2e.py
      -q -s"
  - kind: "manual"
    description: "Stability Postgres lane has the delegation_events and delegate_skill_projection_metrics
      schema required by the projection consumer."
    command: "apply omnimarket delegation projection migrations to INTEGRATION_POSTGRES_PORT=15436"
dod_evidence:
