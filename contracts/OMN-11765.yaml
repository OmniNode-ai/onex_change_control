        check_value: "grep -q '^status: PASS$' \"drift/dod_receipts/OMN-11765/dod-default-skip/command.yaml\"
          && grep -q '^commit_sha: \"1e5760d5e73b5e7c61a0e753d9990431ec6bd2c9\"$' \"drift/dod_receipts/OMN-11765/dod-default-skip/command.yaml\""
