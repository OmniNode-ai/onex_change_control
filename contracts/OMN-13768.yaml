schema_version: 1.0.0
ticket_id: OMN-13768
title: 'fix(OMN): runtime /ready returns 503 ONEX_CORE_041 "RuntimeHostProcess not available" — pods never
  reach k8s Ready though functionally processing events'
summary: >-
  omnibase_infra service_kernel.py created RuntimeHostProcess and called health_server.attach_runtime()
  AFTER the long-running Kafka subscription bootstrap work (subscribe_wired_contract_topics / plugin consumer
  start / ContractRegistrationEventRouter wiring), so GET /ready raised ProtocolConfigurationError [ONEX_CORE_041]
  for the entire subscription window even though the runtime was already processing events via the auto-wired
  consumers. Fix reorders RuntimeHostProcess creation + container registration + health_server.attach_runtime()
  to run immediately after health_server.start(), before that subscription work, and adds a graceful runtime_pending
  503 branch to _handle_readiness mirroring the existing _handle_health pattern (defense in depth for
  the residual pre-attach window). PR omnibase_infra#2172.
