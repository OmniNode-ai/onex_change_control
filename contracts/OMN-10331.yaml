---
schema_version: "1.0.0"
ticket_id: OMN-10331
title: Backfill migrate_dod_contracts.py against legacy contracts
summary: Backfill migrate_dod_contracts.py against legacy contracts
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: Full OCC test suite passes
    command: uv run pytest tests/ -v
  - kind: ci
    description: CI pipeline green on the PR
    command: gh pr checks ${PR_NUMBER} --repo ${REPO}
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: All 4931 contracts pass migrate_dod_contracts --all with 0 needing migration
    source: manual
    checks:
      - check_type: command
        check_value: >-
          uv run python scripts/migrate_dod_contracts.py --all 2>&1 | grep "\[DRY-RUN\] 0 migrated"
  - id: dod-002
    description: All contracts parse as valid YAML after migration
    source: manual
    checks:
      - check_type: command
        check_value: >-
          uv run python -c "import yaml; from pathlib import Path; errors = [p.name for p in Path('contracts').glob('OMN-*.yaml')
          if not yaml.safe_load(p.read_text())]; print(f'{len(errors)} errors')" | grep "^0 errors"
  - id: dod-003
    description: This OCC PR is open against main branch
    source: generated
    checks:
      - check_type: command
        check_value: >-
          gh pr view ${PR_NUMBER} --repo ${REPO} --json state,baseRefName --jq '.state + ":" + .baseRefName'
          | grep -q 'OPEN:main'
  - id: dod-004
    description: PR title or body cites this ticket
    source: generated
    checks:
      - check_type: command
        check_value: >-
          gh pr view ${PR_NUMBER} --repo ${REPO} --json title,body --jq '.title + " " + (.body // "")'
          | grep -q '${TICKET_ID}'
