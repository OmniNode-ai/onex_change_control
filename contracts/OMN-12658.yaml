schema_version: "1.0.0"
ticket_id: "OMN-12658"
title: "ci(OMN-12658): runtime image build-time delegation import smoke guard + CI gate"
summary: >-
  OCC evidence for omnibase_infra PR #2066 (Wave E — runtime fresh-deploy hardening). Adds a build-time
  import smoke step to the runtime image (docker/Dockerfile.runtime): after all wheels install, a RUN
  step imports omnibase_compat, omnibase_core, and the canonical delegation node handler (omnimarket.nodes.node_llm_delegation_call_effect.HandlerLlmDelegationCall).
  A skewed omnibase_compat / omnibase_core wheel — or a delegation-node import break — fails the docker
  build non-zero at build time instead of degrading silently as a runtime entry-point load failure. The
  docker-build CI job (.github/workflows/docker-build.yml), which runs on PRs touching docker/** and Dockerfile*,
  loads the image and re-asserts the same delegation import as a labeled required-status-check step. A
  static unit test (tests/unit/docker/test_delegation_import_smoke_guard.py) pins the guard in both the
  Dockerfile and the CI job so it cannot be silently removed, and asserts the guard runs AFTER the omnimarket
  install. Scope is strictly the runtime image (evidence + delegation node imports); does not touch the
  OMN-12584 runner-image work.
