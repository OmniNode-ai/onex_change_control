title: "omniclaude deep-dive script: GIT_AUTHOR default crashes under set -e when git user.name is unconfigured"
summary: >-
  omniclaude PR #1881 fixes `plugins/onex/skills/ticketing_insights/deep-dive`'s `GIT_AUTHOR` default
  so a failing `git config user.name` (exit 1 when unconfigured) doesn't abort the whole script under
  `set -e` before any output — `|| true` restores the documented "empty matches all" fallback semantics.
  Second, independent bug from OMN-14251 (the `OMNI_HOME` unbound-variable crash) in the same script/test,
  discovered blocking the omniclaude dev->main promotion PR #1879 (OMN-14249) a second time after OMN-14251
  merged.
