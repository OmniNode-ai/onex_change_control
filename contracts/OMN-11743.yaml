---
schema_version: "1.0.0"
ticket_id: "OMN-11743"
title: "Dry-run pilot promotion on omniweb"
summary: >
  Runs the OMN-11714 pilot promotion proof path. This slice records the first dry-run failure, fixes the
  nightly promotion workflow so cross-repo private clones use the established CROSS_REPO_PAT credential,
  and binds local verification before rerunning the omniweb pilot.
is_seam_ticket: true
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Nightly promotion workflow YAML parses after the cross-repo token fix."
    command: "uv run python - <<'PY'\nfrom pathlib import Path\nimport yaml\nyaml.safe_load(Path('.github/workflows/nightly-promote.yml').read_text())\nprint('yaml
      ok')\nPY"
  - kind: "tests"
    description: "Focused promotion policy and OCC contract tests pass after the workflow credential fix."
    command: "uv run python -m pytest tests/overseer/test_promotion_bot_policy.py tests/unit/test_omn_11717_promotion_contract.py
      -q"
  - kind: "manual"
    description: "The initial pilot dry-run failure is classified as a cross-repo token scope bug."
    command: "gh run view 26342553142 -R OmniNode-ai/onex_change_control --log-failed"
  - kind: "manual"
    description: "Ticket contract validates against the central OCC ticket contract model."
    command: "uv run validate-yaml contracts/OMN-11743.yaml"

dod_evidence:
  - id: "dod-workflow-yaml-parse"
    description: "OMN-11743 workflow YAML parse check passes."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-workflow-yaml-parse/command.yaml"
          && grep -q 'yaml ok' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-workflow-yaml-parse/command.yaml"
  - id: "dod-focused-tests"
    description: "OMN-11743 focused promotion tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-focused-tests/command.yaml"
          && grep -q '7 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-focused-tests/command.yaml"
  - id: "dod-initial-dry-run-classified"
    description: "The initial omniweb promotion dry-run failed before evidence generation due to cross-repo
      token scope."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-initial-dry-run-classified/command.yaml"
          && grep -q '26342553142' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-initial-dry-run-classified/command.yaml"
          && grep -q 'Could not resolve to a Repository' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-initial-dry-run-classified/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11743 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11743.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-ticket-contract-valid/command.yaml"
  - id: "dod-occ-pr-1442"
    description: "onex_change_control PR #1442 carries the OMN-11743 contract and receipt bundle."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-occ-pr-1442/command.yaml"
          && grep -q '^pr_number: 1442$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11743/dod-occ-pr-1442/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
