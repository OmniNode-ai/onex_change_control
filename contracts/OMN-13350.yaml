schema_version: "1.0.0"
ticket_id: "OMN-13350"
title: "SEA generation-completed projection silently drops every event (UndefinedColumn) + missing corpus
  columns"
summary: >-
  The node-generation completion projection silently dropped every event on stability-test. The omnimarket
  0.4.3 generation handler emits ModelGenerationBenchmark.model_dump() on onex.evt.omnimarket.node-generation-completed.v1,
  carrying corpus_checked / corpus_passed / corpus_errors (OMN-13289). generation_events had no such columns,
  so the projection INSERT raised UndefinedColumn and the consumer committed the offset anyway (enable_auto_commit
  + a swallowed exception), reporting Stable / LAG=0 while projecting zero rows. omnimarket PR #1285 adds
  migration 0015 (corpus columns), persists the corpus verdict in both write paths, exposes it on the
  projection_api, and makes BaseProjectionRunner fail-loud (auto-commit disabled; the offset is committed
  explicitly only after a successful projection or a genuine non-event, and a projection error is re-raised
  so the message is re-read instead of committed-and-dropped). omnibase_infra PR #2044 vendors migration
  0015 into the forward-migration tree and widens the sync psycopg2 projection adapter to JSON-adapt any
  list/dict bound to a JSONB column (not only _json/_jsonb-suffixed keys), so corpus_errors persists on
  the live path. Child of OMN-12648 (Projection & Data-Flow Fixes).
is_seam_ticket: false
interface_change: false
