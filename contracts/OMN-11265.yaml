---
schema_version: "1.0.0"
ticket_id: "OMN-11265"
title: "Bind omniintelligence omnibase-core 0.41.0 dependency bump evidence"
summary: >
  Binds omniintelligence Dependabot PR #655, which relaxes the omnibase-core requirement from <0.41.0,>=0.40.1
  to >=0.40.1,<0.42.0, to central OCC evidence so Receipt Gate can verify the dependency maintenance update
  without bypassing branch protection.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-pr-655-head"
    description: "omniintelligence PR #655 carries the omnibase-core dependency range update head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state,baseRefName,headRefOid --jq
          '.state + \":\" + .baseRefName + \":\" + .headRefOid'"
  - id: "dod-ci-655-green"
    description: "All non-receipt CI checks on omniintelligence PR #655 are passing."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr checks ${PR_NUMBER} --repo ${REPO} --json name,bucket | jq -r '[.[] | select(.name
          != \"verify / verify\" and .bucket != \"pass\" and .bucket != \"skipping\")] | length'"
  - id: "dod-occ-pr"
    description: "Bind this central OCC evidence update to its onex_change_control PR."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state --jq '.state'"
