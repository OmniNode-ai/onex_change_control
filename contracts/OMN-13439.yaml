ticket_id: "OMN-13439"
title: "feat(OMN-13439): prod-promotion grant resolver EFFECT — fetch-from-main, provenance, lifecycle"
summary: >-
  Phase 2b of the prod-promotion authorization gate (epic OMN-13410, parent OMN-13418), shipped on omnimarket
  source PR #1329. Adds a canonical EFFECT node node_prod_promotion_grant_resolver_effect that resolves
  the prod promotion grant from the durable governance anchor BEFORE the prod gate evaluates. The resolver
  reads grants/prod_promotion_grants.yaml from onex_change_control@main (fetch-from-main anti-self-approval,
  OMN-10971 — mirrors reject-deploy-gate-skip.yml's contents/<path>?ref=main fetch, so a redeploy request
  cannot author the authorization that approves it), keyed by (promotion_batch_id, image_digest, lane=prod),
  and materializes ModelProdPromotionGrant. onex_change_control keeps ZERO Python import on omnimarket
  — the resolver parses the YAML directly. Lifecycle: a consumed grant (consumed:true/removed) resolves
  to ABSENT (no replay); an expired grant (evaluated_at > expires_at) to EXPIRED; a self-grant (approved_by
  == requester) to SELF_GRANTED; a mismatch to ABSENT. Every non-RESOLVED outcome leaves grant None so
  the prod gate fails CLOSED. Provenance is emitted on the resolver EFFECT's AUDIT EVIDENCE event (ModelProdPromotionGrantResolvedEvent.provenance),
  NOT on the pure ModelProdPromotionGrant DTO: source commit SHA + grant file path + grant_id + file sha256
  + CODEOWNERS-match. The redeploy orchestrator routes a prod redeploy-start to the grant-RESOLVE command
  first; on prod-promotion-grant-resolved it threads the RESOLVED grant + deterministic evaluated_at into
  the gate command — NEVER from start.promotion_grant. Non-prod lanes go straight to the gate (dev/stability
  dispatch unchanged). This OCC PR carries the central contract consumed by the omnimarket PR #1329 Receipt
  Gate via Evidence-Source.
