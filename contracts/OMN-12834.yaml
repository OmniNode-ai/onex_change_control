schema_version: "1.0.0"
ticket_id: "OMN-12834"
title: "Local-ADK orchestrator: normalize Gemini-dialect tool schema to lowercase for OpenAI-compatible endpoint"
summary: >-
  The SEA local-ADK orchestrator backend (_OpenAICompatibleLlm /
  build_http_chat_completions_model in onex-self-extending-agent
  src/nodes/node_agent_orchestrator/adk_backend_adapters.py) forwards
  function-declaration tool schemas through Google ADK's CompletionsHTTPClient,
  which serializes parameter types with genai Type enums that render as uppercase
  JSON Schema (STRING/OBJECT/ARRAY/...). Cloud Gemini accepts that dialect, but
  the OpenAI-compatible target (local llama.cpp) rejects it with HTTP 400
  "Unrecognized schema: {\"type\":\"STRING\"}", blocking the fully-local
  --agent path whenever the agent exposes tools. Fix adds a pure recursive
  normalizer (normalize_openai_tool_schema) and a _NormalizingCompletionsHTTPClient
  subclass that lowercases every type value (top-level, nested properties, array
  items, list-typed unions) before the request is sent. The cloud-Gemini path is
  untouched.
