title: "Phase 1b — Relocate RuntimeLocal + helpers + adapter → omnibase_core.runtime; clear line-1404
  infra residual; bump 0.46.0"
summary: >-
  Phase 1b of the local-first runtime re-convergence (epic OMN-13442). Relocates the local runtime orchestrator
  from omnibase_infra into omnibase_core so the runtime installs and runs from core alone, with ZERO omnibase_infra
  dependency on any code path. New omnibase_core.runtime.runtime_local (RuntimeLocal, parse_backend_overrides,
  load_workflow_contract, _exit_code_for, ResolvedRoutingEntry, the onex.backends discovery constants)
  + omnibase_core.runtime.runtime_local_adapter (LocalRuntimeBusAdapter). The five local-runtime protocols
  are placed core-resident under omnibase_core.protocols.runtime rather than imported from omnibase_spi.protocols.runtime:
  spi hard-depends on core and core's sdk-boundary-check forbids omnibase-spi as a hard dependency, so
  importing the spi copy would be a circular/inverted package dependency — this is the plan CONTINGENCY
  (place runtime protocols in core, self-contained, infra-free). AC#2: cleared the runtime_local.py line-1404
  function-local 'from omnibase_infra.event_bus.models.config import ModelKafkaEventBusConfig'; the kafka_bootstrap
  override now routes through the entry-point-loaded provider's from_bootstrap(bootstrap) factory, so
  core names ZERO omnibase_infra symbols on any path (grep-verified). The infra-side EventBusKafka.from_bootstrap
  and the deletion of infra's copies land in Phase 3a (OMN-13445). Core version bumped 0.45.0 -> 0.46.0.
  This OCC PR carries the central contract consumed by the omnibase_core PR Receipt Gate via Evidence-Source.
