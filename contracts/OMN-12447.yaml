        check_value: "test \"$(gh pr view 1710 --repo OmniNode-ai/omniclaude --json number --jq .number)\"
          = 1710"
  - id: "dod-omniclaude-main-pr-1711"
    description: "omniclaude PR #1711 exists for the main hotfix consumed by downstream deploy-gate workflows"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test \"$(gh pr view 1711 --repo OmniNode-ai/omniclaude --json number --jq .number)\"
          = 1711"
  - id: "dod-omniclaude-main-pr-1712"
    description: "omniclaude PR #1712 exists for the authenticated main hotfix consumed by downstream
      deploy-gate workflows"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test \"$(gh pr view 1712 --repo OmniNode-ai/omniclaude --json number --jq .number)\"
          = 1712"
  - id: "dod-local-tests"
    description: "Deploy-gate validator and reusable workflow regression tests passed"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12447/dod-local-tests/command.yaml
