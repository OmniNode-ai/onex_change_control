---
schema_version: "1.0.0"
ticket_id: OMN-12447
title: "Harden reusable deploy-gate OCC contract checkout against transport timeouts"
summary: >
  The omniclaude reusable deploy-gate workflow is the canonical deploy gate for downstream repos. During
  the 2026-05-30 integration sweep, omnibase_infra PRs repeatedly failed deploy-gate while actions/checkout
  attempted to materialize onex_change_control contracts and hit GitHub transport timeouts. The fix in
  omniclaude PR #1710 replaces the single OCC checkout with a bounded, retrying, process-authenticated
  sparse git fetch for the contracts directory. Because downstream repositories import the reusable deploy-gate
  workflow from omniclaude@main, omniclaude PR #1711 carries the matching main hotfix. omniclaude PR #1712
  follows up by using the inherited cross-repo checkout credential and Git-compatible basic auth for the
  retrying fetch after downstream proof showed the bearer header could not authenticate private OCC fetches.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omniclaude PR #1710 carries the reusable deploy-gate checkout hardening"
    command: "gh pr view 1710 --repo OmniNode-ai/omniclaude --json number,state,headRefOid"
  - kind: "ci"
    description: "omniclaude PR #1711 carries the main hotfix for downstream reusable workflow imports"
    command: "gh pr view 1711 --repo OmniNode-ai/omniclaude --json number,state,headRefOid"
  - kind: "ci"
    description: "omniclaude PR #1712 carries the authenticated OCC fetch follow-up for downstream deploy-gate
      workflows"
    command: "gh pr view 1712 --repo OmniNode-ai/omniclaude --json number,state,headRefOid"
  - kind: "tests"
    description: "Reusable deploy-gate validator and workflow-shape tests passed locally"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12447/dod-local-tests/command.yaml"
  - kind: "manual"
    description: "Reusable workflow uses retrying sparse OCC contracts fetch with process-scoped auth"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12447/dod-workflow-retry-shape/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
