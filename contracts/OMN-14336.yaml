  EFFECTs (node_llm_codegen_effect, node_codegen_file_writer_effect) and the shared omnimarket.codegen
  library. The orchestrator is topic-DECOUPLED so it lands independently of tiers 1/2/3: it imports NO
  tier-1/2/3 handler or model and composes those nodes purely by publishing typed seam commands on their
  contract-declared subscribe topics. It emits events via ModelHandlerOutput.for_orchestrator and NEVER
  returns a result; it is event-driven with no in-process FSM loop and no I/O. The per-node adapter reducer
  and the golden-chain-both-ways augment are tier-4a.2 follow-ups. Public-safe generic code-generation
  infrastructure.'
