title: "fix(OMN-14397): onex delegate correlation_id + hard SIGALRM timeout backstop"
summary: >-
  omnibase_infra PR #2265 mints a fresh correlation_id per onex delegate invocation and adds a SIGALRM-based
  hard timeout backstop so a hung Kafka-bus response listener stuck in non-cooperative blocking I/O no
  longer outlives its own --timeout and requires a manual kill (observed on .201). Round-2 remediation
  (commit 3e5e86d8) closes a defect found in independent verification: the backstop's DelegateTimeoutExceededError
  now subclasses BaseException instead of RuntimeError so it cannot be silently swallowed by run_receipt_mode's
  own broad except Exception around the exact call that hangs.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
