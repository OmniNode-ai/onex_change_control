    description: "handler_canary_score_reducer.py in omnimarket PR #603 diff contains HandlerCanaryScoreReducer"
    command: "gh pr diff 603 -R OmniNode-ai/omnimarket | grep -q 'HandlerCanaryScoreReducer'"
  - kind: "manual"
    description: "omnimarket.events.canary promoted in PR #603 diff"
    command: "gh pr diff 603 -R OmniNode-ai/omnimarket | grep -q 'events/canary.py'"
  - kind: "ci"
    description: "All CI gates green on omnimarket PR #603"
    command: "gh pr checks 603 --repo OmniNode-ai/omnimarket"
