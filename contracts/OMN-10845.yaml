---
schema_version: "1.0.0"
ticket_id: "OMN-10845"
title: "Implement canary score reducer handler with composite scoring"
summary: >
  Implement HandlerCanaryScoreReducer for node_canary_score_reducer. Consumes ModelCanaryReport (from
  omnimarket.events.canary), computes weighted composite score (recall 0.35, precision 0.35, fidelity
  0.20, format 0.10), and materializes rows matching the capability_scores table schema. Promotes ModelCanaryReport
  + ModelModelScore to omnimarket.events.canary to satisfy the cross-node reach-in guard (OMN-9263). 5
  unit tests. Part of the canary-to-routing feedback loop (OMN-10843).
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - topics
  - events
