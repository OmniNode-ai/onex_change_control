schema_version: "1.0.0"
ticket_id: "OMN-13962"
title: "Wire validator_occ_append_only as a REQUIRED OCC CI gate (enforce the append-only invariant)"
summary: >-
  A prior release shipped validator_occ_append_only (per-entry hashing + append-only: existing dod_evidence
  entries are immutable; any M/D/R/C of a merged receipt file under drift/dod_receipts/<TICKET>/ is a
  violation) but wired it into no OCC CI job, leaving the invariant advisory. This PR adds an append-only-gate
  job to onex_change_control/.github/workflows/ci.yml, mirroring honesty-gate: it pins omnibase_core by
  source ref (OCC's installed omnibase-core is capped <0.46.0 and predates the validator), resolves the
  tickets touched from changed contract/receipt paths, diffs against the merge-base (the CLI uses a two-dot
  diff, so merge-base avoids mis-flagging base-ahead receipts as deletions), and invokes the validator
  per ticket with a hard fail on any violation. The job is added to ci-summary.needs so it gates merge
  via the required CI Summary check (CLAUDE.md rule #5: enforcement, not detection). The pre-commit hook
  variant is deferred to a separate dep decision (lifting the deliberate <0.46.0 omnibase-core cap). This
  is a CI-configuration change only; no runtime deploy, restart, docker exec, rpk topic produce, AWS mutation,
  or live cluster mutation was performed.
