ticket_id: "OMN-13474"
title: "refactor: bind delegation FSM guard to a contract-derived typed ModelFSMSubcontract"
summary: >-
  Track A W2 of the delegation-orchestrator decomposition (epic OMN-13471), depends on OMN-12835 (typed
  contract-side workflow surface, now on dev). HandlerDelegationWorkflow drove its FSM transition guard
  from a hardcoded _VALID_TRANSITIONS Python dict that paralleled the contract.yaml fsm.transitions block
  (reconciled to be the single source of truth in W1/OMN-13473). This wave removes that parallel imperative
  FSM table: the guard table is now a projection of a typed, executor-bound ModelFSMSubcontract built
  once at import from the contract fsm block via _load_fsm_subcontract() + _build_valid_transitions().
  The declared contract table is therefore the runtime execution authority; the imperative _transition
  guard validates against it. The typed FSM is structurally validated at import by the core model's own
  validators (initial/terminal membership, transition-state membership, structural uniqueness, no-outgoing-from-terminal)
  and fails fast on any state with no EnumDelegationState member (no silent fallback). Behavior preserved:
  the contract-derived table is byte-identical to the prior hardcoded table. The per-call-site _transition(...)
  invocations are unchanged — reducing them to zero is the explicit scope of W5 (OMN-13477), which this
  ticket blocks. Purely intra-omnimarket change; no core wire DTO changes.
