schema_version: "1.0.0"
ticket_id: "OMN-12664"
title: "fix(OMN-12664): route full Gemini endpoint via endpoint_url to preserve /v1beta/openai/chat/completions"
summary: >-
  Central OCC evidence for omnimarket PR #1031. The generation consumer passed the contract-provided LLM
  endpoint through ModelLlmInferenceRequest.base_url, which makes the omnibase_infra adapter append /v1/chat/completions
  and produce a 404 against Gemini's OpenAI-compatible endpoint. The fix routes the complete contract-provided
  endpoint through endpoint_url (post-as-is) using a provider-neutral, path-based predicate; origin-only
  bases keep the legacy append. No new helper module, router, or adapter.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
