    description: >-
      omnibase_infra PR #1859 fixes the bifrost gateway side of OMN-12664. The gateway fed every backend
      URL through ModelLlmInferenceRequest.base_url, so HandlerLlmOpenaiCompatible._build_url appended
      /v1/chat/completions even when the configured URL was already a complete chat endpoint, producing
      the Gemini 404. _build_inference_request now routes a configured base_url that already ends in /chat/completions
      or /completions through endpoint_url (post-as-is), and the Gemini config default resolves to the
      full /v1beta/openai/chat/completions endpoint. Regression tests assert the resolved POST URL is
      https://generativelanguage.googleapis.com/v1beta/openai/chat/completions and is neither the single-versioned
      nor the double-versioned 404 variant. Provider-neutral path predicate; no new router/adapter module.
