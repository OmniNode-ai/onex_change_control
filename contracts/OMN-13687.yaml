schema_version: '1.0.0'
ticket_id: OMN-13687
title: 'EMERGENCY PROD RECOVERY: bounded retry on docker push to ECR — absorb transient runner→ECR EOF'
summary: >-
  Emergency prod recovery authorized by operator. The runtime image build (build-and-push-runtime.yml)
  builds and Trivy-scans cleanly on omnibase_infra main HEAD 2cd720817 (the OMN-13670 crypto-floor hotfix
  #2131), but the final `docker push` to ECR repeatedly fails with a transient network EOF on a single
  blob HEAD request from the .201 self-hosted runner fleet to 272493677981.dkr.ecr.us-east-1.amazonaws.com.
  Two fresh workflow_dispatch runs on main (28315044412, 28315257828) both pushed several blobs, then
  died on a blob HEAD EOF. omnibase_infra hotfix PR #2134 wraps the docker push in a bounded retry loop
  (5 attempts, exponential backoff 10s/20s/40s/80s, cap 120s), mirroring the exponential-backoff idiom
  already used by .github/actions/resolve-ecr-digest. docker push is resumable so retrying absorbs the
  transient blob-HEAD EOF. Additive only: build, image tag/digest computation, lineage-guard, and Trivy
  are unchanged. This PR does NOT deploy, restart, retag, or touch any cluster or .201 host config. The
  prod re-pin follows separately under OMN-13418 gating.
