schema_version: "1.0.0"
ticket_id: "OMN-13323"
title: "fix(OMN-13323): align dod_evidence_runner writer path with completion guard read path (round-trip
  gate)"
summary: >-
  OCC evidence for the omniclaude fix PR (#1798) that aligns the /dod-verify writer with the DoD completion
  guard read path (Enforcement Map F7, verified plan UWP-17). The guard (plugins/onex/hooks/scripts/pre_tool_use_dod_completion_guard.sh)
  reads the receipt at $ONEX_EVIDENCE_ROOT/<ticket>/dod_report.json and fails closed when it is missing.
  The writer (dod_evidence_runner.write_evidence_receipt) defaulted output_dir to <working_dir>/.evidence/<ticket>,
  ignoring ONEX_EVIDENCE_ROOT, so a passing /dod-verify landed the receipt where the guard never looked
  and Done was blocked with "No DoD evidence receipt found". The mismatch was reproduced before the fix.
  The fix routes the writer default through resolve_evidence_output_dir, mirroring the canonical node_dod_verify
  precedence (ONEX_EVIDENCE_ROOT first, legacy <working_dir>/.evidence fallback when unset), and adds
  a round-trip regression gate.
is_seam_ticket: false
