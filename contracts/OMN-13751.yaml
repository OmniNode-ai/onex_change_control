title: "feat(OMN-13751): add public-surface uptime/502 alerting + k8s pod crash alerts"
summary: >-
  Add public-surface uptime/502 alerting to the existing Prometheus monitoring stack in omnibase_infra:
  Blackbox Exporter scrape config probing the four public surfaces every 30 s (PublicSurfaceDown fires
  after >= 3 consecutive failed probes / 90 s), Alertmanager Slack routing, and onex-dev pod CrashLoopBackOff
  / ImagePullBackOff alerting via a PrometheusRule CRD plus a portable CronJob fallback. This change adds
  observability manifests and a runbook only; no Python source, migration, schema, event-bus topic, or
  runtime lane is modified. Activation requires operator kubectl apply (gated by OMN-13418) — no pre-merge
  cluster mutation is performed.
