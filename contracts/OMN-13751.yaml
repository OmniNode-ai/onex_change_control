---
schema_version: "1.0.0"
ticket_id: "OMN-13751"
title: "feat(OMN-13751): add public-surface uptime/502 alerting + k8s pod crash alerts"
summary: >-
  Add public-surface uptime/502 alerting to the existing Kubernetes observability stack. The original
  omnibase_infra PR #2157 carried the first proof set, then the implementation was re-homed to omninode_infra
  PR #530 because these are cluster manifests, not Python/runtime contracts. The replacement PR adds two
  PrometheusRule manifests for public-surface uptime/slow-response alerting and onex-prod CrashLoopBackOff/ImagePullBackOff
  alerting. This change adds observability manifests only; no Python source, migration, schema, event-bus
  topic, or runtime lane is modified. Activation requires operator kubectl apply (gated by OMN-13418)
  — no pre-merge cluster mutation is performed.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "All alerting manifests on the original omnibase_infra PR #2157 and replacement omninode_infra
      PR #530 are valid YAML and carry the required alert rules; no pre-merge cluster mutation was performed."
    command: >-
      grep -q '^status: PASS$' drift/dod_receipts/OMN-13751/dod-manifest-valid/command.yaml && grep -q
      '^status: PASS$' drift/dod_receipts/OMN-13751/dod-no-pre-merge-deploy/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-13751/dod-omninode-infra-pr-530/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-13751/dod-occ-self/command.yaml
