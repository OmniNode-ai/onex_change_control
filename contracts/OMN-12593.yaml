---
schema_version: "1.0.0"
ticket_id: "OMN-12593"
title: "DurableEvidenceGate default config resolves the real platform layout"
summary: >-
  Bind durable process evidence for the DurableEvidenceGate config-drift fix. The gate's default invocation
  previously looked for the receipt at evidence/<ticket>/dod_report.json and checked ref=main, while the
  platform writes receipts at drift/dod_receipts/<ticket>/<item>/command.yaml and OCC governance is dev-targeted.
  The fix points the default resolution at the real layout (drift/dod_receipts/<ticket> + origin/dev)
  without weakening the gate's fail-fast intent.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      A test proves the gate returns PASS for an OMN-12574-style ticket (drift receipt present on dev
      + contract on OCC dev) under the DEFAULT invocation, and still FAILs when the receipt is truly missing.
    command: >-
      uv run pytest tests/unit/nodes/node_dod_verify/test_durable_evidence_gate.py::TestDefaultInvocation
      -v
dod_evidence:
  - id: "dod-gate-config-fix"
    description: >-
      omnimarket PR fixes the DurableEvidenceGate default receipt-path and OCC ref resolution and adds
      TestDefaultInvocation proving the default invocation now PASSes for an OMN-12574-style ticket and
      still FAILs on truly missing receipts.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12593/dod-gate-config-fix/command.yaml"
          && grep -q 'test_default_invocation_passes_for_omn_12574_style_ticket' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12593/dod-gate-config-fix/command.yaml"
  - id: "dod-deploy-assessment"
    description: >-
      Deploy assessment for the omnimarket DurableEvidenceGate default-resolution fix. The PR changes
      runtime-owned code, but the fix is a deterministic gate configuration/path correction with focused
      unit coverage; no live runtime deploy is required before merging this PR.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          echo 'deploy assessment: no live deploy required before merge for OMN-12593 DurableEvidenceGate
          default config drift fix'
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
