---
schema_version: "1.0.0"
ticket_id: "OMN-11738"
title: "Build staleness monitor + failure-class alerting"
summary: >
  Adds the OCC-owned dev/main promotion staleness monitor. The workflow runs daily at noon UTC, measures
  unpromoted dev commits per repository, creates a P1 Linear ticket when main is more than three days
  behind dev, sends Slack alerting when main is more than seven days behind dev, and routes notification
  severity/action through the promotion failure-class taxonomy.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused promotion tests validate dev/main staleness calculation, threshold behavior, and failure-class
      alert routing.
    command: "uv run pytest tests/promotion/test_staleness.py tests/promotion/test_workflow.py tests/promotion/test_manifest.py
      -q"
  - kind: "manual"
    description: >
      Ruff validates formatting, import ordering, and lint rules for the promotion package, tests, and
      script entrypoint registration.
    command: "uv run ruff format src/onex_change_control/promotion tests/promotion pyproject.toml && uv
      run ruff check src/onex_change_control/promotion tests/promotion pyproject.toml"
  - kind: "manual"
    description: "Mypy validates the promotion package under strict repo typing rules."
    command: "uv run mypy src/onex_change_control/promotion"
  - kind: "manual"
    description: "Actionlint validates the staleness monitor workflow and existing nightly promotion workflow."
    command: "actionlint .github/workflows/staleness-monitor.yml .github/workflows/nightly-promote.yml"
  - kind: "manual"
    description: >
      Ticket contract validates against the central OCC ticket contract model.
    command: "uv run validate-yaml contracts/OMN-11738.yaml"
  - kind: "manual"
    description: >
      Migration inventory validation covers the newly present omnibase_infra intelligence delegation projection
      migration so the repo-wide inventory sync gate remains green.
    command: "uv run check-migration-inventory --repos-root /Users/jonah/Code/omni_home"
  - kind: "manual"
    description: "No live deploy is required; this changes scheduled GitHub Actions governance automation
      only."
    command: "No runtime deployment required for OMN-11738."

dod_evidence:
  - id: "dod-staleness-monitor-tests"
    description: "OMN-11738 focused promotion staleness tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-tests/command.yaml"
          && grep -q '13 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-tests/command.yaml"
  - id: "dod-staleness-monitor-lint"
    description: "OMN-11738 promotion package passes ruff format and lint checks."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-lint/command.yaml"
          && grep -q 'All checks passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-lint/command.yaml"
  - id: "dod-staleness-monitor-mypy"
    description: "OMN-11738 promotion package passes mypy."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-mypy/command.yaml"
          && grep -q 'Success: no issues found' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-mypy/command.yaml"
  - id: "dod-staleness-monitor-actionlint"
    description: "OMN-11738 staleness monitor workflow passes actionlint."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-actionlint/command.yaml"
          && grep -q 'actionlint .github/workflows/staleness-monitor.yml .github/workflows/nightly-promote.yml'
          "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-staleness-monitor-actionlint/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11738 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11738.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-ticket-contract-valid/command.yaml"
  - id: "dod-migration-inventory-sync"
    description: "Central migration inventory accounts for the omnibase_infra intelligence delegation
      projection migration."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-migration-inventory-sync/command.yaml"
          && grep -q '024_create_llm_delegation_projection_tables.sql' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-migration-inventory-sync/command.yaml"
  - id: "dod-deploy"
    description: "No live deploy required; this is scheduled GitHub Actions governance automation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11738/dod-deploy/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
