---
schema_version: "1.0.0"
ticket_id: "OMN-13560"
title: "env→contract migration (omniclaude Wave 1): diagnostics service-endpoint reads → overlay descriptor
  seam"
summary: >-
  Wave-1 endpoint→overlay migration (epic OMN-13556). Moves the three scattered direct os.environ.get(...)
  service-endpoint reads in omniclaude src/omniclaude/lib/utils/diagnostics.py (INTELLIGENCE_SERVICE_URL,
  MAIN_SERVER_URL, MCP_SERVER_URL — the MCP read chaining the legacy ONEX_MCP_URL / ARCHON_MCP_URL aliases,
  5 reads total) off raw env onto the canonical overlay seam: contracts/contract_omniclaude_runtime.yaml
  declares the endpoints under descriptor.* with the "${env.VAR}" overlay convention, and a new lib/utils/diagnostics_endpoint_descriptor.py
  resolves each value via the ${env.VAR} overlay expander — the single sanctioned os.environ boundary
  in the module (AST-guarded by a test) mirroring the canonical omnibase_infra.runtime.overlay.contract_env_ref.expand_contract_env_refs
  semantics (a local copy is used because the pinned omnibase_infra v0.38.0 does not yet vendor that helper).
  Two accessors: the strict accessor fails closed (unset/blank raises rather than silently defaulting
  to localhost — the canonical fail-closed seam); the non-strict accessor is fail-soft (empty when unset)
  so the fail-soft diagnostics health-check tool never crashes on import. diagnostics.py keeps its module-level
  constant names (preserving the circular-import regression-test contract) but resolves them through the
  descriptor; the descriptor is import-safe (no config.settings import) so the original circular import
  the env reads were written to avoid stays broken. All 5 os.environ endpoint reads are removed, so the
  URL Authority Gate stays green with FEWER grandfathered reads (the 5 diagnostics.py url_authority_baseline
  fingerprints are now stale + removable in a core burn-down follow-up; the gate passes regardless because
  baselines are shrink-only). KAFKA_BOOTSTRAP_SERVERS / DB DSN / QDRANT / MEMGRAPH endpoint clusters,
  the Bifrost-owned LLM_*_URL family (OMN-12803/12815), and the Wave-2 config + Wave-3 secret reads are
  DEFERRED to follow-ups. This OCC PR carries the central contract consumed by the omniclaude PR Receipt
  Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
