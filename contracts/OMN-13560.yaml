      accessor raises) when the endpoint is unset or blank — no silent localhost fallback. The non-strict
      accessor stays fail-soft (empty when unset) so the diagnostics tool never crashes on import. Proven
      by the focused resolution-equivalence suite tests/unit/lib/utils/test_diagnostics_endpoint_descriptor.py
      (22 passed) plus the lib/utils, runtime lifecycle, env-health-check and context-injection consumer
      suites (109 passed in the scoped run; 10997 passed across the full non-integration suite).
    source: "manual"
    status: "verified"
