schema_version: "1.0.0"
ticket_id: "OMN-12891"
title: "Deploy gate resolves pinned OCC Evidence-Source metadata"
summary: >
  Updates the reusable omniclaude deploy-gate workflow so runtime-touching PRs can cite `Evidence-Source:
  OCC#<number>` plus `Evidence-Ticket: OMN-XXXX`. The gate resolves the OCC source to an exact open-PR
  head or merged commit before checking central contracts, preserving the existing canonical OCC dev fallback
  when no Evidence-Source is present. This closes the mismatch where receipt-gate accepted open OCC evidence
  but deploy-gate still read only the canonical OCC branch.
is_seam_ticket: false
