---
schema_version: "1.0.0"
ticket_id: OMN-14049
title: "feat(OMN-14049): onex-api tenant + platform delegation savings endpoints for beta panels"
summary: >
  Adds three read-only onex-api endpoints the omniweb beta post-login panels call (lib/delegation-client.ts,
  OMN-14034): GET /v1/tenants/me/delegation/savings, GET /v1/tenants/me/delegation/runs, and GET /v1/admin/delegation/summary.
  Data is sourced read-only from the omnidash_analytics projections (delegation_events / savings_estimates)
  through a second, lazy connection pool (OMNIDASH_ANALYTICS_DB_URL) because those projections live in
  a different database than onex-api's control-plane DB (DB-SPLIT-02). Tenant-scoped queries filter on
  an explicit parameterized WHERE tenant_id predicate plus the app.tenant_id RLS GUC; the platform summary
  is cross-tenant and gated on a Keycloak realm admin role. Honest-data: 503 when the analytics source
  is unconfigured/unreachable, insufficient_data when the projection is empty, never a fabricated figure.
  These are additive REST endpoints, not ONEX node/event contract seams.
is_seam_ticket: false
interface_change: false
