schema_version: "1.0.0"
ticket_id: "OMN-13985"
title: "Install pydantic before sibling-lock-pin preflight so dev candidate runtime image can build"
summary: >-
  Fixes the broken build-workspace-candidate-runtime GitHub Actions workflow in omnibase_infra so the
  DEV runtime image can build (P0, unblocks contractor Daniyal). The "Stage workspace sibling trees into
  the build context" step runs scripts/runtime_build/stage_workspace.sh, which invokes python3 scripts/runtime_build/check_sibling_lock_pins.py.
  That script imports pydantic (BaseModel, ConfigDict, Field) at module top level, but the workflow only
  sets up Python via actions/setup-python and installs no project deps before the step, so the preflight
  died with ModuleNotFoundError: No module named 'pydantic' and stage_workspace.sh exited 3 before the
  docker build, ECR push, or digest steps ran. omnibase_infra PR #2214 inserts a minimal "python3 -m pip
  install --upgrade 'pydantic>=2'" step immediately before the staging step; only pydantic is third-party
  (everything else the script imports is stdlib). This is a workflow-YAML-only change; no source, runtime
  contract, or live cluster/runtime mutation was performed. The workflow is workflow_dispatch-only, so
  the ECR image digest is produced by a separate operator re-dispatch after this lands.
