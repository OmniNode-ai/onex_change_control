schema_version: "1.0.0"
ticket_id: "OMN-13158"
title: "next_eligible_tier honors task-class escalation_policy.tier_order as a closed set"
summary: >
  OMN-13158 fixes the delegation escalation bug found by the 2026-06-15 runtime integration sweep: code_generation
  could start at cheap_cloud, fail the quality gate, and terminate with no_higher_tier_available because
  next_eligible_tier() ignored the task-class escalation_policy.tier_order. The live repro CID was f97e21c5-b29c-4bbb-9b23-d9098dcc56cb:
  glm-4.5 produced weak output, fallback was recommended, escalation_count stayed 0, and no higher tier
  was selected. omnimarket PR #1231 (branch jonah/omn-13158-codegen-tier-order, head b51892997fee3d48cb24ad633a85006212c7a3c0)
  treats escalation_policy.tier_order as the complete ordered set for the task class, uses that order
  when task_type is provided, and preserves declaration-order behavior when task_type is omitted. It also
  closes the latent leak where tiers absent from a class tier_order were appended and tried after the
  declared ceiling. Follow-up runtime proof after deploy showed the fixed runtime now escalates cheap_cloud
  -> local, but cannot reach the declared claude tier on installed lanes because runtime_policy.contract.yaml
  omitted the llm.anthropic.api_key secret resolver mapping. omnibase_infra PR #1996 adds that contract-owned
  mapping for dev, stability-test, and judge lanes so installed runtimes with ANTHROPIC_API_KEY can resolve
  the cloud-sonnet backend declared by omnimarket.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
