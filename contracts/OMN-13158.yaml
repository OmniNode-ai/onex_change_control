schema_version: "1.0.0"
ticket_id: "OMN-13158"
title: "code_generation escalation reaches OAuth-backed headless Codex"
summary: >
  OMN-13158 fixes the delegation escalation bug found by the 2026-06-15 runtime integration sweep: code_generation
  could start at cheap_cloud, fail the quality gate, and terminate with no_higher_tier_available because
  next_eligible_tier() ignored the task-class escalation_policy.tier_order. The live repro CID was f97e21c5-b29c-4bbb-9b23-d9098dcc56cb:
  glm-4.5 produced weak output, fallback was recommended, escalation_count stayed 0, and no higher tier
  was selected. omnimarket PR #1231 (branch jonah/omn-13158-codegen-tier-order, head b51892997fee3d48cb24ad633a85006212c7a3c0)
  treats escalation_policy.tier_order as the complete ordered set for the task class, uses that order
  when task_type is provided, and preserves declaration-order behavior when task_type is omitted. It also
  closes the latent leak where tiers absent from a class tier_order were appended and tried after the
  declared ceiling. Follow-up runtime proof after deploy showed the fixed runtime now escalates cheap_cloud
  -> local, and also exposed that the declared final claude tier was the wrong operational model for installed
  lanes because OmniNode uses local OAuth/subscription CLI sessions rather than an Anthropic API key.
  The follow-up omnimarket PR #1233 changes code_generation escalation toward OAuth-backed cli_agents,
  registers codex-cli/cli-codex as the first cli_agents backend, and executes terminal delegation through
  the OAuth CLI intent handler. The paired omnibase_infra PR #1996 removes the superseded Anthropic secret-map
  change, registers codex-cli in infra routing config, lets the generic CLI subprocess handler resolve
  auto-wired codex-cli/claude-cli/ gemini-cli/opencode-cli requests from request.model, uses OAuth-safe
  CLI argv for Codex subprocess delegation, and prevents deploy-runtime verification from inheriting stale
  HEALTH_CHECK_URL values from ~/.omnibase/.env.
