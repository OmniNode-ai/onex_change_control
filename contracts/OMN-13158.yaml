schema_version: "1.0.0"
ticket_id: "OMN-13158"
title: "next_eligible_tier ignores task-class escalation_policy.tier_order — code_generation never escalates;
  closed-set semantics"
summary: >-
  next_eligible_tier() in handler_delegation_routing.py ignored the task-class escalation_policy.tier_order
  and always iterated routing_tiers.yaml declaration order regardless of task_type. For code_generation
  (contract order cheap_cloud -> local -> claude) a cheap_cloud failure could not reach local next, so
  escalation stalled at the local/Qwen tier and the cloud tier was never reached (live repro CID f97e21c5-b29c-4bbb-9b23-d9098dcc56cb:
  started at cheap_cloud on glm-4.5, quality gate recommended fallback, terminal no_higher_tier_available,
  escalation_count=0). The fix also corrected a latent defect in _tier_order_from_contract(), which appended
  tiers NOT listed in tier_order after the declared order — re-opening the closed set and letting a task
  escalate past its declared ceiling into an unlisted tier (e.g. test declares [local, cheap_cloud, claude]
  but escalated into cheap_frontier after claude). escalation_policy.tier_order is now the COMPLETE, CLOSED,
  ORDERED set of eligible tiers for a task class; next_eligible_tier resolves the task-class entry and
  uses _tier_order_from_contract when task_type is provided; task_type=None preserves legacy declaration-order
  behavior (backward-compat). omnimarket PR #1227 (branch jonah/omn-13140-codegen-tier-order, base=dev,
  head 51149f7af5cb385687d07d7d7df29cb39bc2bc14) carries the fix. Config-docstring + handler-logic + tests
  only — no DDL, no migration, no live deploy, no .201 mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      Focused delegation tests prove closed-set tier_order: next_eligible_tier(task_type="code_generation")
      returns local after a cheap_cloud failure (contract order respected); task-unaware (task_type=None)
      calls remain forward-only in declaration order; tiers absent from a task class tier_order are never
      tried for that class.
    command: >-
      uv run pytest tests/unit/delegation/test_delegation_tier_escalation.py tests/unit/delegation/test_cloud_escalation_omn13140.py
      tests/unit/delegation/test_delegation_orchestrator.py -q
  - kind: "ci"
    description: >-
      omnimarket PR #1227 CI green (full suite no -k filter, ruff, ruff format, mypy --strict, pre-commit).
      This is operator-gated: the PR is a DRAFT and CI verification + merge are pending operator review.
