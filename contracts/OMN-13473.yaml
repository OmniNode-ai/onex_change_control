  and ROUTED -> COMPLETED (remote lifecycle COMPLETED before any PROGRESS reached EXECUTING). All three
  are real, reachable transitions, so they are added to contract.yaml rather than removed from the handler.
  No behavior change. Adds tests/unit/delegation/test_delegation_fsm_reconciliation.py with a documented
  1:1 mapping of every _transition call site (HANDLER_TRANSITION_CALLSITES) plus assertions that the handler
