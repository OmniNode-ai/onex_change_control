title: "fix(OMN-14225): gate paid delegation behind explicit operator opt-in"
summary: >-
  omnimarket PR #1666 enforces the operator's never-silent-paid delegation policy. The routing ladder
  now tries the free frontier tier before the metered cheap-cloud tier for code_generation and refactor
  classes, and the single tier eligibility function blocks any metered tier unless ONEX_DELEGATION_ALLOW_PAID
  is explicitly truthy. The change preserves the OMN-14224 fail-closed local guard for undeclared task
  classes, keeps local and free frontier tiers available at $0, and covers both routing reducer and escalation-loop
  surfaces through the shared _tier_allowed_by_contract check.
