summary: 'Contract Compliance Check runner — install uv, template-substitute PR/REPO, ticket-type-aware
  migration'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: Contract Compliance Check job is wired with setup-uv and runs uv-managed commands
    command: uv run pytest tests/test_contract_compliance_check.py tests/test_migrate_dod_contracts.py
      -v
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: setup-uv step present in Contract Compliance Check job
    source: generated
    checks:
      - check_type: command
        check_value: 'uv run python -c "import yaml; w=yaml.safe_load(open(''.github/workflows/ci.yml'').read());
          j=w[''jobs''][''contract-compliance'']; assert any(''setup-uv'' in str(s) for s in j[''steps'']),
          ''setup-uv missing''; print(''ok'')"'
  - id: dod-002
    description: runner template substitution unit tests present and passing
    source: generated
    checks:
      - check_type: command
        check_value: 'uv run pytest tests/test_contract_compliance_check.py::test_check_command_shell_style_dollar_substitution
          tests/test_contract_compliance_check.py::test_check_command_exports_pr_number_repo_ticket_env
          -v'
  - id: dod-003
    description: migration ticket-type-aware unit tests present and passing
    source: generated
    checks:
      - check_type: command
        check_value: 'uv run pytest tests/test_migrate_dod_contracts.py -v'
  - id: dod-004
    description: PR title or body cites this ticket
    source: generated
    checks:
      - check_type: command
        check_value: 'gh pr view ${PR_NUMBER} --repo ${REPO} --json title,body --jq ''.title + " " + (.body
          // "")'' | grep -q ''${TICKET_ID}'''
