schema_version: "1.0.0"
ticket_id: "OMN-13380"
title: "Route cheap_cloud GLM direct to z.ai (glm-5.2); remove OpenRouter markup"
summary: >-
  Config-only model-routing change (OMN-13215 discipline — swappable via contract/overlay, no code change,
  no env var, no CLI shell-out). The cheap_cloud routing tier routed GLM code-generation through the OpenRouter
  aggregator (openrouter-glm-flash -> thudm/glm-4-9b-chat:free) as PRIMARY, with the direct z.ai backend
  (cloud-glm, model glm-5.2, secret_ref llm.glm.api_key) only as fallback. We hold a resolvable DIRECT
  GLM key for z.ai, so paying an aggregator markup for a model we can hit directly is a routing-cost bug.
  This change removes openrouter-glm-flash from the cheap_cloud tier and promotes the direct cloud-glm
  route to PRIMARY (id glm-5.2), and repoints the code_generation/test/refactor task_model_overrides from
  openrouter-glm-flash to glm-5.2. The cloud-glm backend in bifrost_delegation.yaml was already correct
  (verbatim z.ai endpoint, model glm-5.2, secret_ref llm.glm.api_key — OMN-13343) and is unchanged; the
  openrouter-glm-flash backend definition is retained (still a valid backend, just no longer routed in
  cheap_cloud). Direct Gemini cheap_cloud entries and the FREE cheap_frontier Qwen3-Coder-480B entry are
  untouched. No topic schema, envelope, protocol, public API, or contract-interface change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
