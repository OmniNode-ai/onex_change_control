---
schema_version: "1.0.0"
ticket_id: "OMN-9895"
title: "fix(OMN-9895): Phase 1 — is_omninode_repo containment for all hard-block hook scripts"
summary: >
  Phase 1 containment fix for external alpha testers hitting hard-blocks (exit 2) from omniclaude hooks
  firing unconditionally outside OmniNode repos. PR #1568 (omniclaude): adds is_omninode_repo guard to
  31 previously unguarded hooks, restructures guard pattern to fail-open when the function is missing
  (declare -F check first), adds stdin drain (cat >/dev/null) before early-exit on PostToolUse/SessionEnd
  fail-open paths, and adds ONEX_HOOK_LOG safety defaults to prevent set -u aborts when onex-paths.sh
  sourcing fails.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-guard-pattern"
    description: "is_omninode_repo guard restructured in 6 pre-tool-use hooks — declare -F check first,
      then separate call"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr diff 1568 -R OmniNode-ai/omniclaude | grep -q 'declare -F is_omninode_repo'"
  - id: "dod-stdin-drain"
    description: "cat >/dev/null added before early-exit on PostToolUse/SessionEnd fail-open paths"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr diff 1568 -R OmniNode-ai/omniclaude | grep -q 'cat >/dev/null'"
  - id: "dod-hook-log-safety"
    description: "ONEX_HOOK_LOG guarded with :-/tmp/fallback.log default in 4 hook scripts"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr diff 1568 -R OmniNode-ai/omniclaude | grep -q 'ONEX_HOOK_LOG:-'"
  - id: "dod-pre-commit"
