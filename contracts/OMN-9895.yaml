---
schema_version: "1.0.0"
ticket_id: "OMN-9895"
title: "fix(OMN-9895): Phase 1 — is_omninode_repo containment for all hard-block hook scripts"
summary: >
  Phase 1 containment fix for external alpha testers hitting hard-blocks (exit 2) from omniclaude hooks
  firing unconditionally outside OmniNode repos. PR #1568 (omniclaude): adds is_omninode_repo guard to
  31 previously unguarded hooks, restructures guard pattern to fail-open when the function is missing
  (declare -F check first), adds stdin drain (cat >/dev/null) before early-exit on PostToolUse/SessionEnd
  fail-open paths, and adds ONEX_HOOK_LOG safety defaults to prevent set -u aborts when onex-paths.sh
  sourcing fails.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
