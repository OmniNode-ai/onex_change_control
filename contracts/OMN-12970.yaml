schema_version: "1.0.0"
ticket_id: "OMN-12970"
title: "fix(OMN-12970): create projection-DB migrations for ab-compare + cost projection tables + coverage
  ratchet"
summary: >-
  The projection API (omnimarket-*-projection-api, :13002) binds to the dashboard projection DB omnidash_analytics.
  Three projection contracts declare read models that were only ever created in the omnibase_infra DB
  by infra forward migrations 031/060, never in omnidash_analytics: node_ab_compare_reducer + node_projection_cost_token_usage
  -> public.llm_call_metrics, node_projection_cost_summary -> public.llm_cost_aggregates, and node_canary_score_reducer
  -> public.capability_scores. With those tables absent from omnidash_analytics, the projection API marked
  the ab-compare, cost.token_usage, cost.summary, and capability-scores topics DEGRADED at startup ("table
  not found") and the dashboard panels (incl. AbCompareWidget) rendered empty. Fix ships node-owned migrations
  under each owning node's migrations/ dir (omnimarket PR #1169), vendored into omnibase_infra's forward/nodes
  tree (infra PR #1938) and applied to NODE_POSTGRES_DB=omnidash_analytics by run-forward-migrations.sh
  — the same deploy path every other marketplace projection node uses. Schemas mirror the canonical infra
  migrations verbatim (idempotent IF NOT EXISTS). The omnidash AbCompareWidget panel is already wired;
  no panel code change. Adds an enforcement ratchet (tests/unit/projection/test_projection_table_migration_coverage.py,
  runs in the omnimarket CI full-suite gate) asserting every public-schema projection read model is created
  by a node-owned migration — which is what surfaced the llm_cost_aggregates and capability_scores siblings.
is_seam_ticket: false
interface_change: false
