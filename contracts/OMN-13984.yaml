ticket_id: "OMN-13984"
title: "fix(omnimarket): fail-fast core PR-lifecycle sub-handlers on ImportError"
summary: >-
  omnimarket PR #1622 removes silent production fallback stubs from the PR-lifecycle orchestrator's five
  core sub-handlers. Inventory, triage, reducer, merge, and fix handler import failures now raise RuntimeError
  instead of returning success-shaped zero-work results. The worktree-prune fallback remains explicitly
  optional because sweep cleanup must not fail a run.
