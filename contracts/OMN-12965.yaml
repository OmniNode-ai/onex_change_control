schema_version: "1.0.0"
ticket_id: "OMN-12965"
title: "Runtime image identity labels — stamp org.opencontainers version/revision in workspace-mode builds"
summary: >
  The deep dive found the main runtime image stamped org.opencontainers.image.version=0.1.0 with a blank
  org.opencontainers.image.revision after workspace rebuilds. A blank identity degrades every proof packet,
  because the runtime SHA + image digest are required citations in accepted evidence. Three build paths
  under-stamped identity: onex up --build (cmd_up) passed only GIT_SHA, leaving VCS_REF (-> blank revision)
  and RUNTIME_VERSION (-> placeholder 0.1.0) unset; deploy-runtime.sh passed VCS_REF but not RUNTIME_VERSION/GIT_SHA;
  and Dockerfile.runtime silently allowed blank/placeholder identity in workspace mode. Fix: cli._image_identity_build_args()
  stamps the full GIT_SHA / VCS_REF / RUNTIME_VERSION / BUILD_DATE quad and fails fast on an unresolved
  git revision; deploy-runtime.sh stamps RUNTIME_VERSION + GIT_SHA and verifies the version label is non-placeholder
  post-deploy; Dockerfile.runtime fails workspace builds with a blank VCS_REF or placeholder RUNTIME_VERSION=0.1.0
  (release mode unaffected). Enforcement ratchet ships in the same PR: scripts/check_runtime_image_identity.py
  wired as a pre-commit hook + CI gate, plus tests/unit/infra/test_runtime_image_identity_labels.py and
  an extended deploy-agent build-arg test. No topic schema, envelope wire, or contract API change.
is_seam_ticket: false
