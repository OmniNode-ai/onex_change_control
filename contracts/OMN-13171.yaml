schema_version: "1.0.0"
ticket_id: "OMN-13171"
title: "Delegation evidence projection: sqlite NOT NULL constraint failed on delegation_events.created_at"
summary: >
  OMN-13171 fixes a lost-evidence defect on the local delegation projection write. The delegate-skill
  terminal projection (HandlerProjectionDelegation.project_delegate_skill_terminal) built the delegation_events
  row without created_at. The deployed Postgres schema declares created_at TIMESTAMPTZ NOT NULL DEFAULT
  NOW() so the bus runtime path was unaffected, but the local in-process SQLite evidence target (port_local_delegation_dispatch._project_evidence
  -> SqliteDatabaseAdapter) on a warm volume can have created_at NOT NULL with no DB default, so the INSERT
  raised sqlite3.IntegrityError: NOT NULL constraint failed: delegation_events.created_at and the local
  evidence row was silently dropped (the _project_evidence path swallows projection failures). omnimarket
  PR #1243 (branch jonahgabriel/omn-13171-delegation-evidence-projection-sqlite-not-null-constraint, base=dev,
  head 53b319f9af4d30fb47c8437f543caf5b2d63418d) injects created_at explicitly at the projection write,
  mirroring the event timestamp (deterministic, no implicit datetime.now() at the DB layer, consistent
  with the frozen-schema no-implicit-datetime.now() convention). Source-only change to the projection
  handler plus a TDD test. No DDL, no migration, no topic/schema change, no live deploy/restart/.201 mutation.
