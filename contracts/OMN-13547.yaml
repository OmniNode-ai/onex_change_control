title: "chore(OMN-13547): delete empty infra delegation shell + collapse delegation dispatch to the omnimarket
  engine, fail-closed"
summary: >
  The empty omnibase_infra/src/omnibase_infra/nodes/node_delegation_orchestrator/ shell (handlers/models/dispatchers
  — 0 tracked files) was dead: the runtime already binds the omnimarket engine (service_kernel.py imports
  omnimarket.nodes.node_delegation_orchestrator.plugin) and service_delegation_dispatch_port.py already
  prefers _PREFERRED_DELEGATION_PACKAGE="omnimarket". This change hardens _select_delegation_route so
  delegation resolves the omnimarket package ONLY and fails closed (typed InfraUnavailableError) otherwise
  — removing the any-package single-candidate and bare-alias fallback branches that could have resolved
  a non-omnimarket / deleted-shell route. Per OMN-12525 (canonical architecture — three primitives, no
  duplicate orchestrators; nodes live in omnimarket).
