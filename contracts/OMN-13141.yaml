schema_version: "1.0.0"
ticket_id: "OMN-13141"
title: "runtime executor half — _run_event_driven skips event_model import for operation_match entries"
summary: >-
  Executor companion to OMN-13137 (#1973, merged on dev), which fixed only the validator half. RuntimeLocal._run_event_driven
  unconditionally called importlib.import_module(entry.event_model_module) for every resolved routing
  entry; the except clause caught only (ImportError, AttributeError). operation_match routing entries
  (e.g. node_integration_sweep_orchestrator) declare no event_model, so _resolve_routing_entries yields
  event_model_module="", and importlib.import_module("") raised ValueError: Empty module name at runtime_local.py:816
  — NOT caught by the except clause, swallowed by the outer except Exception in run_async, producing workflow
  result FAILED. The node never booted end-to-end. The fix gates the import block on a non-empty event_model_module:
  operation_match forwards the raw decoded payload (LocalRuntimeBusAdapter input_model_cls=None); only
  payload_type_match resolves a typed event model. _validate_routing (the OMN-13137 half) is left untouched.
  A CI boot gate (tests/unit/runtime/test_run_event_driven_operation_match.py) runs an operation_match
  contract through RuntimeLocal.run_async() and asserts no empty-module ValueError, plus a payload_type_match
  regression guard.
is_seam_ticket: false
