      exist but do not carry the gate) and at a bogus SHA. Verifier = rt6-builder, who did NOT implement
      the RT-5 gate (implementer = rt5-builder).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14473-occ-enforcement-evidence' drift/dod_receipts/OMN-14473/dod-occ-self-14473/command.yaml
