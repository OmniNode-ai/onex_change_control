schema_version: "1.0.0"
ticket_id: "OMN-13680"
title: "WS-5 Wave 6: real multi-parameter integration tests for planning/design/gap omnimarket nodes"
summary: >-
  OMN-13680 (WS-5 Wave 6 of the market-skill full-integration-coverage program) adds real multi-parameter,
  full-pass integration tests — not smoke tests, not SKILL.md-shape greps, not assert-no-raise — for six
  omnimarket nodes: node_design_to_plan, node_gap_compute, node_integration_sweep_orchestrator, node_architectural_invariant_loop,
  node_baseline_capture, and node_baseline_compare. Each test parametrizes >=3 distinct param sets AND
  carries >=1 negative control (a known-bad fixture that must produce a finding/error), asserting typed
  result fields / terminal-event payloads (counts, states, finding structures). Per the Wave caveat, plan-markdown
  and repo-snapshot fixtures are mocked (synthetic contract/source trees under tmp_path, on-disk mock
  baselines, injected current_snapshot); every I/O boundary (gh/git/SSH/bus) is satisfied by an injected
  collaborator (the _Mock* constructor pattern) — no subprocess/asyncpg monkeypatching, no live Kafka/.201.
  Product PR: omnimarket #1473 (test-only; no source, contract, migration, or runtime change).
