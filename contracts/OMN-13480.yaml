  it passed a deterministic acceptance corpus in the hardened sandbox on the FIRST attempt — the corpus,
  not the LLM, is the acceptance authority — then hand-hardened into a wired COMPUTE validator (landed
  in omnibase_core PR #1304). At land it was wired only as a BLOCKING pre-commit hook (check-todo-fixme-marker-compute)
