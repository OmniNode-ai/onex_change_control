  handler over the files a PR changed — mirroring the sibling generated validators validator-pin-hygiene.yml
  (OMN-13509) and validator-no-none-guard-publish.yml one-for-one. Paired feature PR: omnibase_core#1313
  (CI gate workflow + provenance update).
