title: "[B3] Rebuild node_redeploy canonically — orchestrator + deploy EFFECT + prod-gate COMPUTE + FSM
  REDUCER, delete shell"
summary: >-
  Phase B3 of the canonical node migration (epic OMN-13205, plan docs/plans/2026-06-17-canonical-node-migration-noncanonical-cleanup.md
  §3.3 / §4 Phase B3), depends on A2 (OMN-13209, merged). Decomposes the bespoke node_redeploy WorkflowPackage
  (node_type: workflow, routing_strategy: phase_dispatch, in-process HandlerRedeployWorkflowRunner FSM
  loop, non-protocol handle(dict) shims) into four canonical nodes and deletes the shell: node_redeploy_orchestrator
  (ORCHESTRATOR — dispatches commands over the bus, emits the prod-gate-evaluate command then the deploy-publish
  command or redeploy-completed:BLOCKED), node_redeploy_deploy_effect (EFFECT — deploy publish-monitor
  + rollback, absorbing HandlerRedeployKafka + DeploymentAdapterKafka), node_prod_promotion_gate_compute
  (COMPUTE — pure prod-promotion gate), and node_redeploy_fsm_reducer (REDUCER — phase transitions + 3-failure
  circuit breaker). Every handler implements ProtocolMessageHandler.handle(envelope) -> ModelHandlerOutput.
  Shared deploy domain models are re-homed to omnimarket.events.runtime_deployment (the OWNER) so no node
  imports another node's package (dependency-elimination invariant); this includes the model_deploy_agent_events
  wire DTOs that A2 explicitly deferred to B3. The prod same-digest gate + rollback path are preserved;
  the onex.cmd.omnimarket.redeploy-start.v1 topic and the .201 deploy-agent rebuild-requested/rebuild-completed
  round-trip are preserved unchanged. Cross-repo repoints (paired PRs): omniclaude redeploy SKILL.md +
  test_redeploy_shim.py to node_redeploy_orchestrator; omnibase_infra trigger_rebuild_on_merge.py comments
  (redeploy-start wire preserved). No new external Kafka topic schema beyond the new internal command
  topics, no DDL/migration, no external API surface, no .201 runtime mutation in this change.
