---
schema_version: "1.0.0"
ticket_id: "OMN-9691"
title: "Route foreground status requests through merge-sweep lead"
summary: >-
  Bind central OCC evidence for omniclaude PR #1636, which adds the /onex:status skill and generated status
  orchestrator node so foreground status requests route through the merge-sweep pipeline instead of direct
  repository polling.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "Status skill hygiene and plugin reference tests pass."
    command: "uv run pytest tests/skills/test_no_monorepo_refs_in_plugin_skills.py tests/skills/test_no_mcp_linear_calls_in_skill_prompts.py
      tests/skills/test_no_omni_home_in_s_class_skills.py -q"
  - kind: "ci"
    description: "omniclaude PR #1636 CI green across required gates."
    command: "gh pr checks 1636 --repo OmniNode-ai/omniclaude --watch"
dod_evidence:
  - id: "dod-omniclaude-pr-1636"
    description: "Bind OMN-9691 evidence to omniclaude PR #1636 at the observed PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-omniclaude-pr-1636/command.yaml\"
          && grep -q '^pr_number: 1636$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-omniclaude-pr-1636/command.yaml\"
          && grep -q '^commit_sha: \"d5259816b2e14be8e17b1cce67a4c4d6736a2f01\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-omniclaude-pr-1636/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "Runtime status node addition requires CI and receipt-gate validation but no live deploy
      before merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-deploy-assessment/command.yaml\"
          && grep -q 'deploy gate' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr"
    description: "Bind OMN-9691 central evidence to this onex_change_control PR."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-occ-pr/command.yaml\"
          && grep -q '^pr_number: 1379$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-9691/dod-occ-pr/command.yaml\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
