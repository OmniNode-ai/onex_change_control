ticket_id: "OMN-13923"
title: "plan_audit parses Markdown plans + directory mode + SKIPPED reporting"
summary: >-
  node_plan_audit_compute pushed every plan file through yaml.safe_load, so the canonical Markdown rolling
  plan crashed the audit with a YAML alias-scan error ('**bold**' scans as a YAML alias) — 'onex skill
  plan_audit' could not audit the real docs/plans corpus at all. omnimarket PR #1598 makes the handler
  dispatch on format: YAML plans keep the existing schema/field/cycle checks byte-for-byte; Markdown plans
  get a declared supported-format contract (H1 title, OMN-XXXX ticket linkage, verified-state marker per
  the Current-Verified-State gate — marker absence is advisory WARN, not FAIL); unsupported extensions
  are reported as SKIPPED with a reason instead of erroring opaquely. plan_path now also accepts a directory,
  auditing the whole docs/plans corpus in one run; a run that audits zero files is an error, never a vacuous
  pass. The result model gains per-file entries (plans[]), warnings[], and a PASS/WARN/FAIL/SKIPPED/ERROR
  verdict. Recurrence guard test_handler_audits_markdown_rolling_plan_shape feeds the exact bold-markdown
  input that produced the YAML alias crash and asserts the audit completes without a yaml_parse check.
