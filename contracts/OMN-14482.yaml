          PRODUCT_PR_NUMBER=2276; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=92aaec94af587a4b3aad5c2bec4ba4b9db53fdfa;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,files --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and ((.files | map(.path)) | all(. == ".github/workflows/ci.yml" or .
          == ".pre-commit-config.yaml" or . == "config/validation/tenant_scoped_ingress_allowlist.yaml"
          or . == "src/omnibase_infra/validators/tenant_scoped_ingress_schema.py" or . == "tests/unit/validators/test_tenant_scoped_ingress_schema.py"))'
          | grep -qx true && ! gh pr diff "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --name-only
          | grep -qE '(^|/)(systemd|deploy/scripts|docker/compose|docker/migrations)(/|$)'
