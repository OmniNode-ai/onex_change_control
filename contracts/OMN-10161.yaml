schema_version: "1.0.0"
ticket_id: "OMN-10161"
title: "fix(OMN-10161): non-blocking async subprocess in _call_cli_model"
summary: >-
  AdapterInferenceBridge._call_cli_model is declared async but executed a synchronous subprocess.run([cli_command,
  combined_prompt], capture_output=True, text=True, timeout=int(timeout_seconds), check=False), which
  blocks the event loop for the full CLI-model latency and starves every concurrent infer()/review/grader
  task on the same loop (the root cause of CLI-model, eval, and hostile_reviewer timeouts). The omnimarket
  fix in src/omnimarket/inference/adapter_inference_bridge.py replaces the blocking call with proc = await
  asyncio.create_subprocess_exec(cli_command, combined_prompt, stdout=PIPE, stderr=PIPE) followed by stdout,
  stderr = await asyncio.wait_for(proc.communicate(), timeout=timeout_seconds). The return contract is
  preserved (decoded stdout.strip()); non-zero exit is tolerated (prior check=False semantics); and the
  asyncio timeout is mapped to subprocess.TimeoutExpired after reaping the child via proc.kill()/proc.wait(),
  so callers catching the prior exception type keep working. The HTTP path (_call_http_model) is unchanged.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
