ticket_id: "OMN-13012"
title: "node_context_roi_runner: subscribe-after-publish race — single-call event_consumer seeks-to-end
  AFTER the command publish, skipping the already-emitted terminal — degenerate rows persist after OMN-13010"
summary: >-
  FOURTH distinct defect on node_context_roi_runner, exposed only after OMN-13010 freed the dispatch loop.
  The ladder: OMN-13003 fixed the dispatch INPUT (envelope -> typed model); OMN-13005 fixed the consume
  leg (no-op consumer -> blocking correlate); OMN-13010 offloaded the blocking handle() off the dispatch
  loop (handle_async) so generation runs concurrently. All three are live and necessary. With starvation
  gone, generation completes in ~1s, and that speed exposes the residual subscribe-after-publish race.
  The OMN-13005 injected event_consumer is a single callable self._consumer(topic, cid, timeout) that
  owns assign -> seek_to_end -> poll internally, all executed AFTER _run_trial has already published the
  generation command. The terminal lands ~1s after publish, BEFORE the consumer's post-publish seek_to_end
  positions, so seek_to_end skips PAST the already-emitted terminal; the runner polls an offset beyond
  it, waits the full timeout, and times out. Broker-verified (probe3, run_id=20260611T2140Z-probe3, 21:41-21:46Z):
  golden_exemplar terminal 837a83d0 at 21:41:10.183Z but runner "no terminal event" at 21:43:38 (seek
  positioned ~21:41:38, after publish); off-arm terminal 43115f95 at 21:43:39.008Z, runner gave up 21:46:08.
  Both rows degenerate (failure_stage=generation, attempt_count=0); ZERO UnknownMemberIdError rebalances
  all window (starvation IS fixed by OMN-13010); generation ran concurrently. NOT starvation, NOT transient.
  Owning surfaces (two repos, one defect): omnibase_infra src/omnibase_infra/runtime/service_terminal_event_consumer.py
  + auto_wiring/handler_wiring.py (PR #1954) splits positioning from waiting — make_terminal_event_consumer
  returns TerminalEventConsumer, still directly callable with the legacy (topic, cid, timeout) -> dict
  | None single-call shape AND exposing .open(topic) -> TerminalConsumerSession (assign + seek_to_end
  NOW, before publish); session.wait(cid, timeout) blocks from the captured position (after publish).
  TerminalConsumerSession owns a dedicated event loop on a daemon worker thread for the open->wait->close
  lifecycle, preserving the OMN-13005 loop-isolation discipline. omnimarket handler src/omnimarket/nodes/node_context_roi_runner/handlers/handler_context_roi_runner.py
  (PR #1185) makes _run_trial open the session BEFORE publishing each generation command and wait AFTER,
  with a single-call fallback when the injected consumer does not expose open(). No topic, envelope, or
  contract API change. The race is proven RED-then-GREEN through the real dispatch path (_prepare_handler_wiring)
  in omnibase_infra tests/unit/runtime/auto_wiring/test_event_consumer_injection.py.
