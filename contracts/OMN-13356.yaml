---
schema_version: "1.0.0"
ticket_id: "OMN-13356"
title: "Node generation: tool-reuse router — route a later similar request to an existing generated tool"
summary: >
  Closes the W7 / gap G4 finding from the 2026-06-19 architecture-diagram verification: nothing automatically
  routed a later, similar request to an already-generated tool, and node_contract_matcher_compute (despite
  its name) is a DoD evidence validator, not a reuse router. Adds a new canonical COMPUTE node node_tool_reuse_matcher_compute
  (contract.yaml + HandlerToolReuseMatcher implementing handle(), no Plugin* base) that routes an incoming
  tool-generation request to an existing generated tool, short-circuiting fresh LLM generation. Matching
  is explicitly non-LLM: exact input/output contract-signature hash equality is the fast path; deterministic
  token-set Jaccard similarity over the task description is the fallback. Bus-native: subscribes onex.cmd.omnimarket.tool-reuse-match-requested.v1,
  publishes onex.evt.omnimarket.tool-reuse-matched.v1 and onex.evt.omnimarket.tool-reuse-no-match.v1 (all
  declared in the contract; no hardcoded topic strings). Registry access is behind an injected ProtocolGeneratedToolRegistry
  (in-memory default + protocol for a durable pgvector adapter). Pure deterministic node — no I/O beyond
  the injected registry query.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      The new node's unit suite and the miss->hit golden chain pass. The golden chain proves the DoD:
      a first request misses a cold registry (NO_MATCH, generation would run); after the generated tool
      is registered, a second similar request resolves to it (MATCHED) with no LLM call in the trace.
      A semantic-only variant proves the hit without relying on identical signatures.
    command: "uv run pytest src/omnimarket/nodes/node_tool_reuse_matcher_compute/tests/ tests/test_golden_chain_tool_reuse_matcher.py
      -m 'not kafka' -q"
