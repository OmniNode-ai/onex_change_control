---
schema_version: "1.0.0"
ticket_id: "OMN-12777"
title: "Wave 0A — demo-path topic coherence gate"
summary: >-
  Adds a demo-path topic coherence gate in omnibase_core and marks the
  omnimarket delegation demo-path contracts with metadata.demo_path: true.
  The gate verifies demo-path contracts avoid hand-authored topic literals,
  require byte-matched producers/consumers, catch orphan producers and
  consumers, and ensure widget_topics have a producing contract topic.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "topics"
  - "protocols"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
evidence_requirements:
  - kind: "tests"
    description: >-
      omnibase_core unit coverage for ValidatorDemoPathTopicCoherence plus
      the demo-path-topic-coherence CI/pre-commit gate.
    command: >-
      cd omnibase_core && uv run pytest tests/unit/validation/test_validator_demo_path_topic_coherence.py -q
  - kind: "ci"
    description: >-
      omnibase_core PR #1218 and omnimarket PR #1097 carry the implementation
      and contract metadata; required CI gates must pass before merge.
    command: "gh pr checks 1218 --repo OmniNode-ai/omnibase_core && gh pr checks 1097 --repo OmniNode-ai/omnimarket"
dod_evidence:
