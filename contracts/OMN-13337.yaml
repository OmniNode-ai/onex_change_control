schema_version: "1.0.0"
ticket_id: "OMN-13337"
title: "feat(OMN-13337): DurableEvidenceGate rejects plain Done with no done-class label"
summary: >-
  OCC evidence for the omnimarket product PR (#1400) that adds a fourth DurableEvidenceGate check, DONE_CLASS_LABEL
  (retro enforcement R2). Tickets reached Done without a durable-evidence class, so done-detection was
  unreliable. The gate now rejects a Linear Done transition unless the ticket carries at least one approved
  done-class label {source-done, runtime-observed, projection-backed, replay-proven, demo-visible, prod-proven}
  AND the label is backed by a tracked durable receipt (RECEIPT_TRACKED). A plain Done with no class —
  or a labelled ticket whose receipt is not tracked on the OCC governance ref — is rejected. evaluate()/evaluate_default()
  accept ticket_labels (default empty = fail-closed). The six canonical labels are created in the Linear
  workspace. Pure-logic node-service change with unit tests; no topic schema, envelope, or contract API
  change; no live runtime-lane mutation.
