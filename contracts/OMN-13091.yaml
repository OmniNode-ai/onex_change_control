---
schema_version: "1.0.0"
ticket_id: "OMN-13091"
title: "Phase 0b: ModelArtifactRef + ModelSkillResult[T] models in omnibase_core"
summary: >-
  Adds the two Phase-0b models for the skill-output-suppression plan (epic OMN-13089): omnibase_core.models.artifacts.ModelArtifactRef,
  a frozen content-addressed artifact reference enforcing sha256:<64 lowercase hex chars> with from_bytes()/hex_digest
  helpers, and omnibase_core.models.dispatch.ModelSkillResult[T], the generic typed skill dispatch receipt
  envelope (skill-surface analogue of ModelHandlerOutput[T]) carrying skill_name, node_name, status (EnumSkillResultStatus),
  correlation_id, run_id, exit_code, duration_ms, result: T (full result, no size limits), result_model
  FQN, metrics, artifact_refs, and schema_version. Pre-existing duplicate model filenames were resolved
  with domain-prefix renames (model_handler_artifact_ref.py / ModelHandlerArtifactRef, model_skill_result_file.py
  / ModelSkillResultFile) to satisfy the validate-no-duplicate-models gate without allowlist edits.
