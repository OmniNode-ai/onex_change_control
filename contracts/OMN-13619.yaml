      omnimarket product PR adds the SEA delegation escalation-ladder parity proof (tests/integration/golden_chain/test_sea_delegation_ladder_parity_omn13619.py)
      and the routing- provenance migration boundary doc (docs/migrations/sea-delegation-routing.md).
      The parity proof passes (12 parity tests) and reproduces the seven SEA DelegationExecutor behaviors
      through the canonical delegation nodes; tier config resolved from the contract overlay; no shelled
      CLI.
    source: "manual"
