ticket_id: "OMN-13927"
title: "Receipt-attestation diff-consistency gate (validate diff-falsifiable claims against the PR diff,
  post-OMN-13888)"
summary: >-
  Closes the residual attestation-honesty class left open after OMN-13888. A DoD receipt can claim net-new-only
  / receipts-unmodified / contract-unmodified about its own PR while the diff contradicts it (the OMN-13917
  / OCC #3551 incident: a self-binding receipt attested net-new-only while its PR modified contracts/OMN-13501.yaml
  + 4 merged receipts). The per-receipt honesty gate (validator_receipt_honesty, rules A-E) is pure f(receipt)
  -> violations with zero diff context and structurally cannot catch this. omnibase_core PR #1389 adds
  EnumDiffAttestation (NET_NEW_ONLY / RECEIPTS_UNMODIFIED / CONTRACT_UNMODIFIED), an optional diff_attestations
  field on ModelDodReceipt (authoritative trigger, backward compatible), and a pure validator_receipt_diff_consistency
  module (check_diff_consistency + git-free CLI) with a structured trigger plus two high-precision legacy
  free-text regexes over actual_output. General NLP claim extraction is explicitly descoped. 23 unit tests
  incl. the golden regression (#3551 receipt/diff FAILS, #3548 net-new PASSES). This is a pure library
  change; the OCC ci.yml honesty-gate extension, omniclaude receipt-honesty.yml mirror, and OCC pre-commit
  hook land in follow-up wiring PRs that pin this validator. No runtime deploy, restart, docker exec,
  rpk topic produce, AWS mutation, or live cluster mutation was performed.
