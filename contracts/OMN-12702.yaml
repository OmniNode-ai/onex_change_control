title: "Add generic task.execute runtime route using existing task contracts (vertical slice)"
summary: >-
  Central evidence that omnimarket PR #1043 lands the first vertical slice (Phases 1+2) of the generic
  task.execute route. Adds node_task_execution_orchestrator: a deterministic route planner that composes
  existing authorities (delegation, verification) without becoming a new authority. No new envelope and
  no new DoD model are introduced; ModelDispatchBusCommand, ModelTaskContract, ModelMechanicalCheck, and
  ModelDispatchBusTerminalResult are reused verbatim from omnibase_core. The command topic onex.cmd.omnimarket.task-execute-start.v1
  is contract-discovered via event_bus.subscribe_topics (topic-based runtime dispatch; no generic command_name
  router). Planner is read-only with no side effects in V1.
