ticket_id: "OMN-13785"
title: "OMN-13674 child: Wave 10 delegate state-coverage suite"
summary: >-
  omnimarket PR #1550 delivers full declared-state test coverage for the three Wave 10 delegate nodes.
  node_delegate_skill_orchestrator: no fsm block is declared in this legacy-handler orchestrator contract,
  so coverage is handler_routing (single route, already covered) plus the handler's terminal-status branches;
  the "timeout" passthrough (distinct from the unknown-status-coerced-to-failed path) was previously untested
  and is now covered at both unit and in-memory-bus integration level. node_llm_delegation_routing_compute:
  closes the two remaining "not found in policy model_profiles" branches (preferred-candidate skip and
  fallback-not-found raise). ModelDelegationRoutingPolicy's own cross-reference validator makes these
  unreachable via any public constructor, confirmed empirically (including via model_copy on an already-validated
  instance, since Pydantic reruns "after" validators on nested-model construction) -- these are genuine
  defense-in-depth dead code under current validators, so the two new tests exercise the private _select_model
  function directly against duck-typed stand-ins, documented inline as such, rather than left uncovered
  or faked via an invalid Pydantic model. node_llm_delegation_call_effect: HandlerLlmDelegationCall.handle(),
  the actual contract-wired runtime dispatch entrypoint (handler_routing resolves handle, not __call__),
  had zero test coverage despite __call__ being extensively tested; adds coverage for every outcome handle()
  documents (endpoint resolution failure, unhealthy endpoint returning the all-tiers-failed event, success
  returning the call-completed event, timeout/invalid-json returning a plain failure result with no event),
  plus the generic-exception-to-UNKNOWN failure_class branch and emit_model_degraded. HandlerInferenceIntent
  (the node's other handler) already had complete boundary-outcome coverage. All tests run over mocked
  I/O boundaries only (constructor-injected dispatch port / patched transport module); no live LLM call,
  no live Kafka, no monkeypatched subprocess/asyncpg.
