    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12513/dod-infra-pr-1802/command.yaml" && grep
          -q '^pr_number: 1802$' "drift/dod_receipts/OMN-12513/dod-infra-pr-1802/command.yaml" && grep
          -q '^commit_sha: "9dd1d8a90938c4ec6402f9ed0c7a997afa33c544"$' "drift/dod_receipts/OMN-12513/dod-infra-pr-1802/command.yaml"
