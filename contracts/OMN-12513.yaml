---
schema_version: "1.0.0"
ticket_id: "OMN-12513"
title: "Add stability runtime session orchestrator probe toolchain"
summary: >-
  Ensure the deployed runtime image contains the workspace root and probe binaries required for session_orchestrator
  dry-run health, repo-sync, and golden-chain checks inside the stability runtime.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra PR #1802 carries the runtime probe toolchain fix."
    command: "gh pr view 1802 --repo OmniNode-ai/omnibase_infra --json number,url,state,headRefOid,headRefName,title,baseRefName"
  - kind: "tests"
    description: "Runtime image dependency and stability lane regression tests pass locally."
    command: "env -u PYTHONPATH uv run pytest tests/unit/docker/test_runtime_dependency_pins.py tests/unit/infra/test_stability_test_runtime_lane.py
      tests/integration/infra/test_stability_test_runtime_compose_render.py -q"
  - kind: "ci"
    description: "Touched runtime image and test files pass ruff and whitespace checks."
    command: "env -u PYTHONPATH uv run ruff format --check tests/unit/docker/test_runtime_dependency_pins.py
      tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
      && env -u PYTHONPATH uv run ruff check tests/unit/docker/test_runtime_dependency_pins.py tests/unit/infra/test_stability_test_runtime_lane.py
      tests/integration/infra/test_stability_test_runtime_compose_render.py && git diff --check"
  - kind: "manual"
    description: "Deploy-gate assessment records required post-merge stability runtime rebuild and session_orchestrator
      smoke."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12513/dod-deploy-assessment/command.yaml"
  - kind: "manual"
    description: "onex_change_control PR publishes the OMN-12513 central contract and receipts."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12513/dod-occ-pr/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
