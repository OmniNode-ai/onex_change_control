---
# OMN-13417 contract file for omnibase_infra deploy-gate.
# The canonical ticket contract and PASS receipts live in onex_change_control.
schema_version: "1.0.0"
ticket_id: "OMN-13417"
title: "fix(OMN-13417): dev lane infisical host port 8881 — stop colliding with stability-test infisical
  on 8880"
summary: >-
  Cold dev full bring-up returned rc=1 because the dev lane infisical host port defaulted to 8880, the
  same port the stability-test lane infisical (omnibase-infra-infisical-stability) already binds on a
  shared host. The two lanes are separate compose projects, so the shared 8880 default produced a host-port
  collision that made `docker compose up` / `onex up core` exit non-zero — a recurring papercut that masked
  real failures. The fix gives the dev lane infisical a distinct lane-scoped default host port (8881)
  across both bring-up paths: the static docker-compose.infra.yml and the catalog manifest used by `onex
  up core`. The runtime data path is unaffected — dev runtime containers reach infisical in-network at
  http://infisical:8080, never via the host port. Stability lane keeps 8880.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Catalog generator renders the dev `core` bundle infisical on host port 8881 (not 8880)."
    command: "uv run python -m omnibase_infra.docker.catalog.cli generate core && grep -E '8881:8080|SITE_URL:
      http://localhost:8881' docker/docker-compose.generated.yml"
  - kind: "tests"
    description: "Catalog infisical-first config + lane render guard tests pass with the new port."
    command: "uv run pytest tests/unit/docker/ tests/integration/infra/ -q"
  - kind: "ci"
    description: "Central OCC PASS evidence for OMN-13417 is carried by the paired onex_change_control
      receipt PR."
    command: "gh pr view <OCC_PR> --repo OmniNode-ai/onex_change_control --json headRefOid"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-dev-infisical-host-port-8881"
    description: >-
      Generated dev `core` compose publishes infisical on host port 8881, resolving the 8880 collision
      with the stability-test lane infisical. Local proof: catalog generate core -> infisical renders
      8881:8080 + SITE_URL http://localhost:8881 (omnibase_infra PR #2093).
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13417/dod-dev-infisical-host-port-8881/command.yaml
          && grep -q '^ticket_id: \"OMN-13417\"$' drift/dod_receipts/OMN-13417/dod-dev-infisical-host-port-8881/command.yaml
          && grep -q '^pr_number: 2093$' drift/dod_receipts/OMN-13417/dod-dev-infisical-host-port-8881/command.yaml"
  - id: "dod-lane-render-guards"
    description: >-
      Stability + judge lane-isolation render guards exclude the dev infisical host port (now 8881) from
      each isolated lane render. Local proof: tests/unit/docker/ + tests/integration/infra/ -> 85 passed,
      22 skipped (docker-gated render guards run on CI).
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13417/dod-lane-render-guards/command.yaml
          && grep -q '^ticket_id: \"OMN-13417\"$' drift/dod_receipts/OMN-13417/dod-lane-render-guards/command.yaml"
  - id: "dod-occ-pr"
    description: "OCC PR carrying this OMN-13417 contract and downstream receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13417/dod-occ-pr/command.yaml &&
          grep -q '^ticket_id: \"OMN-13417\"$' drift/dod_receipts/OMN-13417/dod-occ-pr/command.yaml &&
          grep -q '^pr_number: 3023$' drift/dod_receipts/OMN-13417/dod-occ-pr/command.yaml"
  - id: "dod-deploy"
    description: >-
      Live dev-lane deploy verification: after the dev lane core bundle is deployed with this change,
      infisical binds host port 8881 (not 8880) and cold bring-up returns rc=0 with no host-port collision
      against the stability-test infisical. Probe: deploy the dev core bundle, then `docker port omnibase-infra-infisical`
      shows 8881 and the stability infisical retains 8880.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13417/dod-deploy/command.yaml &&
          grep -q 'deploy' drift/dod_receipts/OMN-13417/dod-deploy/command.yaml && grep -q '8881' drift/dod_receipts/OMN-13417/dod-deploy/command.yaml"
  - id: "dod-occ-pr-self"
    description: "OCC PR #3029 (deploy-evidence follow-up) carrying the dod-deploy receipt for OMN-13417."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13417/dod-occ-pr-self/command.yaml
          && grep -q '^ticket_id: \"OMN-13417\"$' drift/dod_receipts/OMN-13417/dod-occ-pr-self/command.yaml
          && grep -q '^pr_number: 3029$' drift/dod_receipts/OMN-13417/dod-occ-pr-self/command.yaml"
