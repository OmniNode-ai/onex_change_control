schema_version: 1.0.0
ticket_id: OMN-14361
title: "fix(OMN-14361): stop dispatch-parity-gate re-breaking on package-version drift"
summary: >-
  omnibase_infra PR #2256 makes the dispatch-parity-gate staleness check strip the volatile header fields
  (generated_at_utc + installed_package_versions) from both the committed and live snapshots via a single
  source-of-truth harness helper before the byte-comparison, so a routine tracked-package release (e.g.
  omnibase-core 0.46.5 -> 0.46.7) no longer re-breaks dev's frozen baseline on every open PR. The dispatch
  corpus (contracts / dispatchers / routes / topics / probes, required_missing_packages, exclusions[].installed)
  is still byte-compared, so genuine selection drift still fails the gate.
is_seam_ticket: false
interface_change: false
