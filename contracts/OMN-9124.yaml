schema_version: "1.0.0"
ticket_id: "OMN-9124"
title: "Bind runtime-health verify target PR evidence"
summary: >
  Binds the omnimarket runtime-health verify-target implementation PR and the matching omniclaude documentation
  PR to central OCC evidence so Receipt Gate can verify both downstream changes from a pinned Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-717-head"
    description: "omnimarket PR #717 carries the runtime-health verify target implementation head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "env PR_NUMBER=717 REPO=OmniNode-ai/omnimarket sh -c 'gh pr view ${PR_NUMBER} --repo
          ${REPO} --json state,baseRefName,headRefOid --jq '\\''.state + \":\" + .baseRefName + \":\"
          + .headRefOid'\\'''"
  - id: "dod-omniclaude-pr-1614-head"
    description: "omniclaude PR #1614 carries the runtime-health verify target documentation head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "env PR_NUMBER=1614 REPO=OmniNode-ai/omniclaude sh -c 'gh pr view ${PR_NUMBER} --repo
          ${REPO} --json state,baseRefName,headRefOid --jq '\\''.state + \":\" + .baseRefName + \":\"
          + .headRefOid'\\'''"
  - id: "dod-occ-pr"
    description: "Bind this central OCC evidence update to its onex_change_control PR."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state,baseRefName,headRefOid --jq
          '.state + \":\" + .baseRefName + \":\" + .headRefOid'"
