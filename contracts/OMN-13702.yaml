schema_version: '1.0.0'
ticket_id: OMN-13702
title: 'fix(OMN-13702): node_dod_sweep_orchestrator returns status=failed for all DoD-verified tickets
  — 2 code bugs + cross-repo PR blind spot + missing OCC contract for OMN-13442'
summary: >-
  Fixes three systemic bugs in HandlerDodSweepOrchestrator that caused every ticket to return status=failed
  regardless of actual DoD state, plus files the missing OCC contract for OMN-13442. #magic___^_^___line
  Bug 1 (jq null false positive): _gh_find_merged_pr applied jq .[0] to an empty array, producing {"number":"null","repo":""}.
  The string "null" is truthy, so the function returned a ghost pr_info that propagated a PR number of
  "null" into _check_ci_green. #magic___^_^___line Bug 2 (invalid conclusion field): _gh_pr_checks_pass
  requested --json name,state,conclusion. The conclusion field does not exist in gh pr checks --json (exits
  1 with "Unknown JSON field: conclusion"), so _gh_pr_checks_pass ALWAYS returned False, making ci_green
  always fail. #magic___^_^___line Bug 3 (cross-repo PR blind spot): _gh_find_merged_pr searched only
  one repo.  Adds a gh_repos: tuple[str, ...] field to ModelDodSweepOrchestratorRequest so callers can
  specify multiple repos tried in order. #magic___^_^___line Also files contracts/OMN-13442.yaml which
  was absent despite the epic's 7 PRs being merged.
