---
schema_version: "1.0.0"
ticket_id: "OMN-12321"
title: "Escalate on transport errors in DelegationExecutor"
summary: >
  DelegationExecutor.execute() called _call_tier without a try/except, so a transport-level exception
  (e.g. httpx.ConnectTimeout on an unreachable endpoint) propagated out of execute() and the escalation
  logic never ran. Wrap the call, convert exceptions to a failed ModelGenerationPipelineResult classified
  as the new EnumSemanticFailure.TRANSPORT_ERROR (retryable + escalatable), so escalation proceeds to
  the next tier.
