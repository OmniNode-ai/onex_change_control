schema_version: "1.0.0"
ticket_id: "OMN-823"
title: "perf(OMN-823): cache compiled PII regex patterns in sanitize_context_for_logging"
summary: >-
  ModelWorkflowStateSnapshot.sanitize_context_for_logging() and validate_no_pii() recompiled the default
  PII regex strings (re.sub / re.search) for every string value on every call. The omnibase_core fix precompiles
  the default _PII_PATTERNS once at class-definition time into the ClassVar _COMPILED_PII_PATTERNS and
  switches both hot loops to compiled.sub() / compiled.search(). _PII_PATTERNS stays the raw source of
  truth (still referenced by docstrings/examples). The opt-in _UUID_PATTERN and dynamic additional_patterns
  are compiled per-call since they vary by call. validate_no_pii reuses the precompiled set paired with
  a new _PII_PATTERN_LABELS tuple (length-aligned via strict zip), removing the duplicated inline raw-string
  pattern list. Redaction and detection output (including the IPV4/IPV6 violation labels) are byte-for-byte
  unchanged.
is_seam_ticket: false
interface_change: false
