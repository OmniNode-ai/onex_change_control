schema_version: "1.0.0"
ticket_id: "OMN-13656"
title: "feat(OMN-13656): scanned workspace-from-dev ECR build as a gated stability-candidate"
summary: >-
  Adds a CI path that builds a SCANNED workspace-from-dev runtime image to ECR as an explicitly non-prod
  stability-candidate, and proves the prod-promotion gate refuses such an image for prod absent an explicit
  candidate grant. omnibase_infra PR #2116 adds build-workspace-candidate-runtime.yml (workflow_dispatch
  only) which stages the sibling repos at dev HEAD, builds docker/Dockerfile.runtime in workspace mode,
  runs the SAME Trivy scan (CRITICAL,HIGH --ignore-unfixed --exit-code 1) plus the OMN-9139 source-hash
  attestation and a provenance build-manifest, then pushes a candidate-* image. The image is stamped build_source=workspace,
  promotion_class=stability-candidate, non_main_lineage=true on the manifest and as OCI labels, and the
  Dockerfile fails closed unless a workspace build is so marked, so it can never masquerade as a clean-main
  build under the lineage guard. omnimarket PR #1460 makes node_prod_promotion_gate_compute REFUSE a stability-candidate
  / non-main-lineage image for the prod lane unless an explicit candidate-authorizing grant exists; the
  refusal is a pure gate decision provable with no prod mutation. The candidate digest is pinnable to
  dev/stability lanes ONLY — never prod.
is_seam_ticket: false
