    description: "Focused metadata and quality-scoring tests pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/test_node_metadata_dependency_scope.py tests/test_metadata_schema.py
          tests/test_node_quality_scoring_contract.py -q"
  - id: "dod-002"
    description: "ONCP metadata dependency-scope gate passes"
    source: "manual"
    checks:
