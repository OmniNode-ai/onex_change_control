    description: "omnimarket PR checks pass, including ONCP node metadata dependency scope"
    command: "gh pr checks <pr-number> --repo OmniNode-ai/omnimarket --watch"
  - kind: "manual"
    description: "Local metadata dependency-scope checker passes"
    command: "uv run python scripts/ci/check_node_metadata_dependencies.py"
  - kind: "manual"
    description: "Post-merge runtime smoke verifies quality scoring imports required radon dependency"
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnimarket.nodes.node_quality_scoring_compute.handlers.handler_quality_scoring
      import radon_available; assert radon_available() is True\""
