title: "ci: harden check-sibling-compat bare uv sync with retry/timeout wrapper (OMN-4315 flaky failures)"
summary: >-
  Routes the bare `uv sync` step in check-sibling-compat.yml through the retry-wrapped
  setup-python-uv composite action (sync-attempts=5, retry-delay=10s). The bare step had
  no retry loop, no UV_HTTP_TIMEOUT, and no recovery on transient PyPI/git failures, causing
  ~2/3 failure rate on network flakes (evidence: run 26737701041). Minimal change: one step
  replaced, behavior-preserving on success path, retry-hardened on failure path.
