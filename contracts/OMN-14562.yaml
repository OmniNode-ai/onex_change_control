---
schema_version: 1.0.0
ticket_id: OMN-14562
title: OCC companion for omnibase_infra#2295 - cut-lab-ref same-version lab redeploy force
summary: >-
  OCC evidence companion for OMN-14562. omnibase_infra#2295 fixes the lab-only cut-lab-ref.sh wrapper
  so same-version lab redeploys pass --force through to deploy-runtime.sh, allowing RT-1 clean-ref staging
  to run while leaving deploy-runtime.sh's production/release guard unchanged.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      omnibase_infra#2295 must prove the real cut-lab-ref.sh path now survives a pre-existing same-version
      deployment directory and vendors the requested ref through the real stage_workspace/deploy_source_ref
      path.
    command: >-
      gh pr view 2295 --repo OmniNode-ai/omnibase_infra --json headRefOid,files,body and inspect changed
      product files at head c2b48cfc480868dbe1cbe131604a7b0245625f0c.
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-2295-head-c2b48cf-cut-lab-ref-surfaces
    description: >-
      Product-observing verification that omnibase_infra#2295 head c2b48cfc480868dbe1cbe131604a7b0245625f0c
      changes the lab wrapper and its focused regression tests, and includes the new version-collision
      regression test.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2295 --repo OmniNode-ai/omnibase_infra --json headRefOid,files,commits
          --jq '.headRefOid + "\n" + ((.files | map(.path)) | join("\n")) + "\n" + ((.commits | map(.oid))
          | join("\n"))' > "$f" && grep -Fq 'c2b48cfc480868dbe1cbe131604a7b0245625f0c' "$f" && grep -Fq
          'scripts/runtime_build/cut-lab-ref.sh' "$f" && grep -Fq 'tests/scripts/test_cut_lab_ref.py'
          "$f" && grep -Fq 'tests/scripts/test_cut_lab_ref_version_collision.py' "$f"
  - id: dod-2295-head-c2b48cf-red-green-proof
    description: >-
      Product PR body verification for OMN-14562: the PR documents the same-version deployed-directory
      collision, the guard-before-sync ordering that prevented RT-1 checkout, RED-to-GREEN version-collision
      coverage, and local script test/lint gates.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2295 --repo OmniNode-ai/omnibase_infra --json headRefOid,body --jq
          '.headRefOid + "\n" + .body' > "$f" && grep -Fq 'c2b48cfc480868dbe1cbe131604a7b0245625f0c' "$f"
          && grep -Fq 'Deployment directory already exists' "$f" && grep -Fq 'guard_existing_deployment'
          "$f" && grep -Fq 'sync_files()' "$f" && grep -Fq 'test_cut_lab_ref_version_collision.py' "$f"
          && grep -Fq '99 passed' "$f" && grep -Fq 'pre-commit run --files' "$f"
  - id: dod-2295-head-c2b48cf-lab-wrapper-force-scope
    description: >-
      Blast-radius verification for omnibase_infra#2295. The product diff is limited to the lab wrapper
      and focused script tests; deploy-runtime.sh, compose, Docker, k3s/helm, and production deploy surfaces
      are not changed by this PR. No live deploy or restart was performed by this OCC evidence pass.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2295 --repo OmniNode-ai/omnibase_infra --json headRefOid,files --jq
          '.headRefOid + "\n" + (.files | map(.path) | join("\n"))' > "$f" && grep -Fq 'c2b48cfc480868dbe1cbe131604a7b0245625f0c'
          "$f" && grep -Fq 'scripts/runtime_build/cut-lab-ref.sh' "$f" && ! grep -Fq 'scripts/runtime_build/deploy-runtime.sh'
          "$f" && ! grep -Eq '(^|/)docker/|compose[.]ya?ml|Dockerfile|k3s|helm|prod|release' "$f"
  - id: dod-occ-self-4107
    description: >-
      Self-binding verification that onex_change_control#4107 carries the OMN-14562 contract and product-observing
      receipts, and that its initial evidence commit remains in the PR commit history.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 4107 --repo OmniNode-ai/onex_change_control --json number,title,files,commits
          --jq '(.number|tostring) + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n")) + "\n"
          + ((.commits | map(.oid)) | join("\n"))' > "$f" && grep -Fxq '4107' "$f" && grep -Fq 'evidence(OMN-14562):
          cover cut-lab-ref force redeploy' "$f" && grep -Fq 'contracts/OMN-14562.yaml' "$f" && grep -Fq
          'drift/dod_receipts/OMN-14562/dod-2295-head-c2b48cf-cut-lab-ref-surfaces/command.yaml' "$f"
          && grep -Fq 'drift/dod_receipts/OMN-14562/dod-2295-head-c2b48cf-red-green-proof/command.yaml'
          "$f" && grep -Fq 'drift/dod_receipts/OMN-14562/dod-2295-head-c2b48cf-lab-wrapper-force-scope/command.yaml'
          "$f" && grep -Fq '1ecb1251084745cb576c59e1c4b9db9ab691b991' "$f"
