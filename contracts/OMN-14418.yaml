      occ_companion_emitter.py source at head 33c12c2625e7fb5278f6180d794e4887e9d8edff and asserts the
      emitter still references compute_contract_entry_sha256.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/occ_companion_emitter.py?ref=33c12c2625e7fb5278f6180d794e4887e9d8edff"
          --jq .content | base64 -d | grep -c "compute_contract_entry_sha256")" -ge 1
  - id: "dod-verify-1724-head-33c12c-evidence-stamp-seam"
