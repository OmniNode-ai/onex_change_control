        check_value: >-
          ! (gh pr diff 1724 --repo OmniNode-ai/omnimarket --name-only | grep -qE "docker-compose|Dockerfile|deploy/")
  - id: "dod-occ-head-33c12c-self-commit"
    description: >-
      Self-bind receipt for the OCC repair that refreshes OMN-14418 evidence to omnimarket#1724 current
      head 33c12c2625e7fb5278f6180d794e4887e9d8edff.
    source: "manual"
