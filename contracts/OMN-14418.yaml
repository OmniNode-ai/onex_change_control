---
schema_version: "1.0.0"
ticket_id: "OMN-14418"
title: "OCC companion for omnimarket#1724 — autobind mints contract_entry_sha256"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1724 (OMN-14418). #1724 fixes the OCC autobind emitter
  so it mints a per-entry contract_entry_sha256 for every receipt it generates, instead of emitting receipts
  bound only by the whole-file contract_sha256 (which any later append to the contract invalidates — "receipts
  are born pre-rotted"). It carves the rendering seam out into a pure occ_evidence_stamp module and imports
  the canonical compute_contract_entry_sha256 from omnibase_core rather than re-implementing it. Every
  substantive check below is a CONTENT READ pinned to #1724's head commit SHA (dbfc5d6bc72b0bddd83c3d6313ac03fff6165d28).
  It observes the source code #1724 actually wrote, so it does not depend on #1724's CI at all — which
  matters here, because #1724's CI is red precisely BECAUSE this contract was missing (occ-preflight/eligibility
  -> missing_contract, cascading into OCC Preflight Dependency and four gates that then refuse to start).
  A check keyed on #1724's CI would therefore be circular: it would be red because the evidence is absent,
  and the evidence cannot land until it is green. No check greps this repo's own receipt corpus for "status:
  PASS".
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnimarket#1724 head SHA carries the contract_entry_sha256 minting seam"
    command: "see dod_evidence check_values (content reads pinned to dbfc5d6b)"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1724-emitter-mints-entry-hash"
    description: >-
      Product-observing: reads the actual source of occ_companion_emitter.py at #1724's exact head commit
      SHA (dbfc5d6bc72b0bddd83c3d6313ac03fff6165d28) via the GitHub contents API and asserts the emitter
      genuinely references compute_contract_entry_sha256 — the canonical per-entry hash function imported
      from omnibase_core, which is the entire substance of the fix (previously the emitter minted only
      the whole-file contract_sha256, so every receipt it produced was invalidated by the next append
      to the contract). This reads the product tree, not this receipt; nothing in the command touches
      the OCC checkout, so it cannot pass merely because someone wrote "status: PASS" in a receipt. RED
      DIRECTION PROVEN by execution: the identical command run against omnimarket's dev HEAD (5c6894294e3d207556017273d534d6dd0eee51d7),
      where #1724 has not landed, finds ZERO occurrences of compute_contract_entry_sha256 in that file
      and exits 1. It exits 0 only at a ref where #1724's change is genuinely present.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/occ_companion_emitter.py?ref=dbfc5d6bc72b0bddd83c3d6313ac03fff6165d28"
          --jq .content | base64 -d | grep -c "compute_contract_entry_sha256")" -ge 1
  - id: "dod-verify-1724-evidence-stamp-seam"
    description: >-
      Product-observing: reads the actual source of occ_evidence_stamp.py — the pure rendering seam #1724
      carves out — at #1724's head commit SHA, and asserts it carries CONTRACT_ENTRY_SHA_LINE_RE, the
      regex that recognizes and rewrites the per-entry hash line in a generated receipt. This is the concrete
      mechanism by which the emitter stamps contract_entry_sha256, so its presence is a direct read of
      the fix rather than a restatement of the PR's claim. RED DIRECTION PROVEN by execution: the file
      already exists on omnimarket dev (#1724 extends it rather than creating it), so a bare existence
      check would NOT discriminate and is deliberately not used. The symbol does discriminate: CONTRACT_ENTRY_SHA_LINE_RE
      occurs 3 times at #1724's head SHA and ZERO times in the same file at dev HEAD (5c6894294e3d207556017273d534d6dd0eee51d7),
      so the command exits 0 at #1724's head and exits 1 at dev.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/occ_evidence_stamp.py?ref=dbfc5d6bc72b0bddd83c3d6313ac03fff6165d28"
          --jq .content | base64 -d | grep -c "CONTRACT_ENTRY_SHA_LINE_RE")" -ge 1
  - id: "dod-occ-self-commit"
    description: >-
      Self-bind receipt for this OCC evidence branch. This item is intentionally self-referential: it
      proves this companion's own identity (that the evidence landed on the expected branch), not the
      correctness of the product. It is a binding item, not substantive evidence — the two entries above
      carry the substantive, product-observing proof.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14418-occ-companion' drift/dod_receipts/OMN-14418/dod-occ-self-commit/command.yaml
          && grep -q 'pr_number: 4008' drift/dod_receipts/OMN-14418/dod-occ-self-commit/command.yaml
  - id: "dod-deploy-assessment-head-dbfc5d6b"
    description: >-
      Deploy-surface assessment for omnimarket#1724 head dbfc5d6bc72b0bddd83c3d6313ac03fff6165d28, required
      because deploy-gate flags the PR as touching runtime paths (the two node_pr_lifecycle_fix_effect
      handler modules). The claim under test is NARROW and falsifiable: #1724 changes no deploy surface
      — no Dockerfile, no docker-compose, no deploy/, no migrations/, no Terraform, no chart/k8s/helm
      manifest. It is a pure source + unit-test change, so there is no live deploy to perform and no runtime
      to restart. This is NOT the conventional self-grep. The established deploy-assessment form (grep
      -q '^status: PASS$' on its own receipt, plus a grep for the literal 'no live deploy' in that same
      receipt) is circular — it greps the receipt for strings the receipt itself contains, and would pass
      identically if #1724 added a Dockerfile tomorrow. Instead this check reads #1724's ACTUAL changed-file
      list from the GitHub pulls/files API and asserts that ZERO of those paths match a deploy surface.
      It observes the product PR, not this receipt. Bidirectionally proven by execution against real controls:
      #1724's file list contains 4 files (2 handlers + 2 unit tests) and 0 deploy-surface paths, so the
      command exits 0; the IDENTICAL command pointed at omnimarket#4 — a real PR that touches Dockerfile.projection
      and docker-compose.projection.yml — exits 1. If #1724 ever grows a deploy surface, this check goes
      RED.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api repos/OmniNode-ai/omnimarket/pulls/1724/files --paginate --jq '.[].filename'
          | grep -icE 'dockerfile|docker-compose|(^|/)deploy/|(^|/)migrations/|\.tf$|(^|/)charts/|(^|/)k8s/|(^|/)helm/')"
          -eq 0
