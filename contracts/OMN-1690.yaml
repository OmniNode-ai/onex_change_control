schema_version: "1.0.0"
ticket_id: OMN-1690
title: "MixinContractPublisher: Add logging for silent exception catch in heartbeat loop"
summary: >-
  The MixinContractPublisher._heartbeat_loop transient-error branch (mixin_contract_publisher.py) previously
  caught Exception and silently slept without logging, hiding production issues (transient Kafka publish
  failures, serialization errors) behind heartbeat gaps. The omnibase_core fix adds a module-level logger
  (matching sibling mixins mixin_caching / mixin_service_registry / mixin_debug_discovery_logging) and
  emits logger.warning("contract heartbeat emit failed; continuing liveness loop: %s", exc, exc_info=True)
  before the sleep, so the failure is observable with its message and traceback. The asyncio.CancelledError
  propagation branch is unchanged; the loop still continues (log-and-continue) so liveness signals are
  not stopped. A new unit test drives the loop with a failing _emit_heartbeat and asserts caplog captures
  the warning (message + exc_info) and that the loop keeps retrying. Code-only change; no contract, topic,
  or runtime-kernel change.
