---
schema_version: "1.0.0"
ticket_id: "OMN-10811"
title: "fix(OMN-10811): remove os.environ mutation from HandlerDispatchQueueDrainer"
summary: >
  HandlerDispatchQueueDrainer.handle() was writing os.environ["ONEX_STATE_DIR"] as a process-global side
  effect and restoring it in a finally block. This is fragile under concurrent invocations and violates
  handler purity. Fix removes the env mutation, passes state_dir directly to dispatch_worker.handle(),
  and replaces the concrete HandlerDispatchWorker dependency with a ProtocolDispatchWorker so the resolver
  can inject test doubles.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Focused drainer unit tests pass with no os.environ mutation"
    command: "cd omni_worktrees/OMN-10811/omnimarket && uv run pytest tests/unit/nodes/node_dispatch_queue_drainer/
      -v --tb=short"
  - kind: "manual"
    description: "omnimarket PR #744 is open and deploys the fix at the recorded head SHA"
    command: "gh pr view 744 --repo OmniNode-ai/omnimarket --json state -q '.state'"
