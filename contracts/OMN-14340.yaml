  utils hub (548) is WARN-only and non-blocking (explicit operator tuning 2026-07-10 — a hard freeze on
  the 548-edge utils hub fires on most new files, generates friction, and gets routed around, so it is
  not real enforcement; utils dissolves in the RSD rewrite anyway). The ratchet is wired as a BLOCKING
  CI gate (Import Layering Oracle job) and an import-ratchet pre-commit hook (enforcement, not detection).
  Enforcement-only: it does NOT modify protocols->models source. Retirement rides the RSD canonical rewrite.
  No runtime or deploy scope.
