---
# SPDX-FileCopyrightText: 2025 OmniNode.ai Inc.
# SPDX-License-Identifier: MIT
name: delegation-runtime-profile
version: 1
runtime_profile: main
event_bus:
  provider: kafka
  bootstrap_servers:
    - redpanda:9092
  topic_policy_ref: delegation-topic-policy-v1
  consumer_groups:
    - omnimarket.delegate-skill.main
    - omnibase-infra.delegation.main
    - omnimarket.projection-delegation.main
llm_backends:
  default:
    bifrost_endpoint_ref: local-bifrost
    default_task_model_ref: qwen3-coder
    max_tokens_default: 2048
    max_tokens_hard_limit: 8192
    timeout_ms: 120000
    task_model_overrides:
      reasoning: deepseek-r1
security:
  broker_allowlist_ref: local-runtime-brokers
  endpoint_cidr_allowlist_ref: local-llm-cidrs
  shared_secret_ref:
    ref_name: local-llm-shared-secret
pricing:
  manifest_ref: delegation-pricing-v1
  version: 1
dashboard:
  projection_api_ref:
    base_url_ref: DASHBOARD_PROJECTION_API_URL
    schema_version: "1.0"
    freshness_sla_ms: 5000
  refresh_contract:
    interval_ms: 5000
datastores:
  analytics:
    projection_database_ref: omnidash-analytics
