schema_version: "1.0.0"
ticket_id: "OMN-13187"
title: "Maintainer-owned dependency refresh replacements"
summary: >-
  Central evidence for maintainer-owned replacement PRs that supersede uneditable Dependabot branches.
  Dependabot branches cannot satisfy Receipt Gate identity binding because their branch names do not contain
  an OMN ticket and maintainerCanModify is false. The replacement PRs carry the valid dependency updates
  on OMN-13187 ticketed branches; incompatible omnimemory FastAPI and structlog bumps are intentionally
  excluded because omnibase-infra 0.38.3 caps those ranges. The omnibase_core replacement PR also carries
  the June 17 cryptography/actions Dependabot changes from PRs #1243 and #1244 on an OMN-13187 branch.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
