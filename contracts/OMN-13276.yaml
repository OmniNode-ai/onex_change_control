  OMN-13276 mirrors the OMN-13253 RuntimeLocal dispatch fix pattern across node_handler_correctness_gate,
  node_closeout_verifier_compute, and node_ledger_stats_compute. The omnimarket PR adds explicit operation
  values to each operation_match handler entry, adds the top-level input_model blocks required by the
