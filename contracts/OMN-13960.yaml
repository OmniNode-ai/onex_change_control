---
schema_version: "1.0.0"
ticket_id: OMN-13960
title: "fix(delegation): accept provider-native env-var aliases in the delegation secret store"
summary: >
  The delegation secret store dotted-ref to LLM_*_API_KEY convention (llm.openrouter.api_key -> LLM_OPENROUTER_API_KEY)
  does not match the provider-native names in ~/.omnibase/.env (OPEN_ROUTER_API_KEY, GEMINI_API_KEY).
  OMN-13943 threaded these as a per-call-site env_var_fallback at two sites; the LLM-judge inference adapter
  did not, so an OpenRouter/Gemini-backed judge failed closed. This centralizes provider-native alias
  acceptance in _ConventionFallbackSecretStore as a last-resort lookup so resolution succeeds from any
  call site, and threads env_var_fallback at the judge site. Fail-closed preserved.
is_seam_ticket: false
interface_change: false
evidence_requirements:
  - kind: "ci"
    description: "Ruff format + check clean; mypy --strict clean on the two touched omnimarket source
      files"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13960/dod-lint-typecheck/command.yaml"
  - kind: "tests"
    description: "test_secret_store_resolver.py TestProviderNativeAliasStoreLevel: the DEFAULT store resolves
      llm.openrouter.api_key/llm.gemini.api_key from the provider-native env name with no env_var_fallback;
      the convention name still wins when set; an absent alias still fails closed; a non-provider ref
      is unaffected."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13960/dod-secret-alias-tests/command.yaml"
