---
schema_version: "1.0.0"
ticket_id: "OMN-14528"
title: "fix(OMN-14528): runtime_sweep deadness detector — in-code broker probe + per-contract census"
summary: >-
  omnimarket PR #1745 makes node_runtime_sweep's consumer-liveness check a real, fail-closed deadness
  detector. Before this fix the census was a hand-typed --live-consumer-profiles operator flag that nothing
  automated ever supplied (always None on the onex skill dispatch path -> silent skip, zero findings),
  and the check was per-PROFILE, so one live consumer group vouched for every contract sharing its runtime_profile
  (all 13 known dead contract-declared consumers passed even with a perfect census). The fix: broker_probe.collect_live_consumer_groups
  collects the census IN CODE via confluent AdminClient.list_consumer_groups counting only LIVE (non-Empty)
  groups; the CONSUMER_LIVENESS phase checks each subscribing contract's OWN node-name identity against
  the census (per-contract, anchored on .{node}.consume. via the runtime's normalize_kafka_identifier
  — a sibling's live group no longer vouches); the census is REQUIRED with scanned_count>0 (None/empty
  raises, never a silent skip); and _resolve_default_input probes the broker on the skill path (fail closed
  on missing KAFKA_BOOTSTRAP_SERVERS) so the detector actually runs. Independently verified at PR head
  a788d8c100e99dd570d1c29ea50e2485eed698b6 (not the implementer's own claim): RED reproduced against the
  exists-but-wrong pre-fix source, GREEN restored, fail-closed and probe-liveness behaviors exercised
  with real assertions.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
