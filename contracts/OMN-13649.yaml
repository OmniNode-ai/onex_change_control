---
schema_version: "1.0.0"
ticket_id: "OMN-13649"
title: "Carry routing cost tier onto the delegation projection; delete client-side tier-guessing regex"
summary: >-
  Make the routing cost tier authoritative truth that flows routing-decision -> durable terminal event
  -> projection column -> dashboard, and delete the omnidash client-side model-name tier-guessing regex
  so the dashboard renders the projection's tier instead of deriving it. Root cause: delegation_events
  already had cost_tier_name + cost_tier_type columns (omnimarket migration 0018) but they were never
  authoritatively populated on the common path -- the orchestrator knew the serving tier (workflow.current_tier_name)
  and threaded it into TerminalEmissionInputs.cost_tier_name, yet _emit_terminal used it ONLY to price
  cost and never carried it onto the canonical ModelDelegationResult wire DTO (which had no tier field,
  lives in omnibase_core under extra="forbid"). The projection then recovered the tier only via the metered-escalation
  winner, which returns "" for a COMPLETED local/free delegation (the winning attempt is never recorded
  in escalation_history on the completed path), so the most common path wrote an empty tier -- which is
  exactly why omnidash fell back to a model-name regex. Fix: add the additive ModelDelegationResult.cost_tier_name
  field (str, default "", omnibase_core PR #1349); _emit_terminal sets it from the priced tier; the projection
  converter (_canonical_result_to_task_delegated_payload) prefers the authoritative top-level cost_tier_name
  and falls back to the metered escalation winner for pre-OMN-13649 terminals; the projection derives
  cost_tier_type from the tier name via the typed cost model; decisions.v1 + correlation-trace.v1 exposures
  now list cost_tier_name + cost_tier_type. omnidash deletes src/pages/dashboard/lib/modelTier.ts and
  binds the dashboard to the projection field (no model-name heuristic). No new node, no new REST route;
  topics stay contract-sourced; the delegation_events columns already exist (migration 0018), so no migration.
  Product PRs: omnibase_core #1349, omnimarket #1458, omnidash #243.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
