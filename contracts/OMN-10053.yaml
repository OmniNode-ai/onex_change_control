      rg -n 'uv run onex run-node node_platform_readiness' plugins/onex/skills/begin_day plugins/onex/skills/platform_readiness
      && ! rg -n 'uv run python -m omnimarket.nodes.node_platform_readiness' plugins/onex/skills"
