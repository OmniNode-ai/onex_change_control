---
schema_version: '1.0.0'
ticket_id: OMN-13698
title: 'fix(OMN-13698): remove LLM_EMBEDDING_URL env reads from session-registry embedding clients'
summary: >-
  Removes prohibited LLM_EMBEDDING_URL reads from the session-registry embedding path. EmbeddingClient
  now requires an explicit base_url, and DecisionSearchClient receives embedding_base_url and embedding_model
  through constructor injection instead of module-level or call-time env fallback. Unit tests prove explicit
  URL injection, fail-fast empty URL behavior, and absence of source env reads.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      Focused session-registry unit suite passes with explicit URL injection and no LLM_EMBEDDING_URL
      fallback.
    command: 'uv run pytest tests/unit/services/session_registry/ -q'
  - kind: manual
    description: >-
      Strict mypy passes on the changed session-registry source files.
    command: 'uv run mypy src/omnibase_infra/services/session_registry/decision_embedder.py src/omnibase_infra/services/session_registry/decision_search.py
      --strict'
  - kind: manual
    description: >-
      Source grep confirms decision_embedder.py and decision_search.py contain no os.getenv, os.environ,
      _DEFAULT_EMBEDDING_URL, or LLM_EMBEDDING_URL reads.
    command: "rg -n 'os\\.getenv|os\\.environ|_DEFAULT_EMBEDDING_URL|LLM_EMBEDDING_URL' src/omnibase_infra/services/session_registry/decision_embedder.py
      src/omnibase_infra/services/session_registry/decision_search.py"
  - kind: ci
    description: CI pipeline green on omnibase_infra PR.
    command: 'gh pr checks 2140 --repo OmniNode-ai/omnibase_infra'
