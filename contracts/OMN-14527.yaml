---
schema_version: "1.0.0"
ticket_id: "OMN-14527"
title: "OCC companion for omnimarket#1734 — contract topic graph: static producer/consumer oracle + fail-closed
  CI gate"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1734 (OMN-14527). Every runtime wiring check the platform
  had before this asked the RUNTIME "are you alive?" (consumer groups, row counts, wiring reports) --
  diagnosing from the effect side, one node at a time, only ever seeing nodes someone remembered to look
  at. This asks the opposite of every node at once: who is SUPPOSED to talk to whom, and do they? Nodes
  are contracts; edges are topics; a producer declares publish_topics, a consumer declares subscribe_topics,
  an edge exists when the names match -- static, cheap, complete, no broker. It proves statically what
  five merged, CI-green, Done tickets (OMN-14134 / 13532 / 4828 / 13989 / 13997) missed: node_ledger_write_effect
  has a fully wired handler_routing and subscribes to onex.cmd.platform.ledger-append.v1, but no contract
  publishes that topic and the node declares no runtime_dispatch entry point, so nothing could ever send
  it a message -- it was alive, healthy, and starved for its entire life. A second, rival 4-node ledger
  subgraph (ledger_append_effect/ledger_hash_compute/ledger_orchestrator/ ledger_state_reducer) is fully
  wired internally with no inbound edge. node_contract_registry_reducer subscribes to onex.evt.platform.node-heartbeat.v1
  (1,004,676 messages) with no handler_routing, silently dropping every one. Four defect classes: ORPHANED_CONSUMER,
  ORPHANED_PRODUCER, DECLARED_BUT_UNWIRED, DISCONNECTED_SUBGRAPH. Soundness requires the whole active
  runtime surface (omnibase_infra + omnimarket) co-installed, or build_graph() fails closed rather than
  reporting phantom orphans; discover_contract_roots() also fails closed if PYTHONPATH is set, since an
  ambient PYTHONPATH silently reroutes resolution to a different clone and produced 9 phantom defects
  while this was built. 744 pre-existing defects are frozen in a ratchet baseline that may only shrink;
  a NEW defect hard-fails, and removing a baseline entry without actually fixing the underlying wiring
  also fails (the fixed-defect-still-baselined guard). Wired as both a required CI gate (.github/workflows/contract-topic-graph.yml)
  and a pre-commit hook in the same PR. All numeric claims below (481 contracts, 1080 topics, 283 edges,
  744 baselined defects, 290 passed / 5 xfailed) were independently reproduced from a local worktree at
  the PR head, not taken from the implementer's PR body, including a RED reproduction obtained by stripping
  the 10 ledger-related lines out of the baseline file and re-running the gate.
is_seam_ticket: false
