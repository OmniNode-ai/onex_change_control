---
schema_version: "1.0.0"
ticket_id: "OMN-12674"
title: "chore(OMN-12674): remove reviewdog CI gate entirely across the org"
summary: >-
  Remove reviewdog from the OmniNode CI surface. The caller workflows (.github/workflows/reviewdog.yml)
  are deleted in omnimarket (PR #1035), omnibase_core (PR #1201), and omnidash (PR #170 — merged), and
  the reusable workflow plus this-repo caller and reviewdog-only converter scripts/tests are deleted in
  omniclaude (PR #1728: reviewdog-review.yml, reviewdog-caller.yml, ruff-to-rdjsonl.py, mypy-to-rdjsonl.py
  and their tests, reviewdog-setup.md). reviewdog was confirmed bound to ZERO required status checks before
  removal: each repo's classic branch-protection contexts for main and dev were enumerated via gh api
  and contain no reviewdog context, and each repo's only repository ruleset is Merge Queue with no required_status_checks
  rule and no reviewdog reference. Because nothing required the reviewdog context, deleting the workflow
  files strands no missing-check binding and no branch-protection edit was needed.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: >-
      reviewdog caller/reusable workflow files removed from omnimarket, omnibase_core, omnidash, and omniclaude.
    command: "git show --stat <merge-sha> -- .github/workflows/reviewdog*.yml"
  - kind: "manual"
    description: >-
      reviewdog confirmed not bound as a required status check on any affected repo (branch-protection
      contexts + repo rulesets enumerated, zero matches).
    command: "gh api repos/OmniNode-ai/<repo>/branches/<branch>/protection/required_status_checks/contexts"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-1035"
    description: >-
      omnimarket PR #1035 deletes .github/workflows/reviewdog.yml — the repo's only reviewdog caller,
      which invoked OmniNode-ai/omniclaude/.github/workflows/reviewdog-review.yml@main. No other reviewdog
      artifact exists in the repo (no .reviewdog.yml, no pre-commit or script reference).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omnimarket-pr-1035/command.yaml"
          && grep -q '^pr_number: 1035$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omnimarket-pr-1035/command.yaml"
  - id: "dod-omnibase-core-pr-1201"
    description: >-
      omnibase_core PR #1201 deletes .github/workflows/reviewdog.yml — the only reviewdog reference in
      the repo (confirmed via grep -rn reviewdog). No script or pre-commit config referenced reviewdog.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omnibase-core-pr-1201/command.yaml"
          && grep -q '^pr_number: 1201$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omnibase-core-pr-1201/command.yaml"
  - id: "dod-omnidash-pr-170"
    description: >-
      omnidash PR #170 deletes .github/workflows/reviewdog.yml. This PR is already MERGED into omnidash
      dev.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omnidash-pr-170/command.yaml"
          && grep -q '^pr_number: 170$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omnidash-pr-170/command.yaml"
  - id: "dod-omniclaude-pr-1728"
    description: >-
      omniclaude PR #1728 deletes the reusable workflow reviewdog-review.yml and this-repo caller reviewdog-caller.yml,
      the reviewdog-only converters ruff-to-rdjsonl.py and mypy-to-rdjsonl.py with their tests, and docs/infra/reviewdog-setup.md.
