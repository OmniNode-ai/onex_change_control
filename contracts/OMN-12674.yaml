      the reviewdog binary) are intentionally retained.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omniclaude-pr-1728/command.yaml"
          && grep -q '^pr_number: 1728$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-omniclaude-pr-1728/command.yaml"
  - id: "dod-binding-clean"
    description: >-
      reviewdog was not a required status check on any affected repo before removal. For omnimarket, omnibase_core,
      omnidash, and omniclaude the classic branch-protection required_status_checks contexts for main
      and dev were enumerated via gh api and contain no reviewdog context, and the only repository ruleset
