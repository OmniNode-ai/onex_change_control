    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-binding-clean/command.yaml"
          && grep -q 'no reviewdog' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12674/dod-binding-clean/command.yaml"
