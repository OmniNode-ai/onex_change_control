---
schema_version: "1.0.0"
ticket_id: "OMN-13594"
title: "deploy-runtime.sh: bring up + wait for postgres/valkey BEFORE the migration preflight on cold/--restart
  lanes"
summary: >-
  deploy-runtime.sh's --restart path runs warm_broker_topic_provisioning -> run_runtime_migration_preflight
  -> restart_services, and every step uses `docker compose up -d --no-deps`, which bypasses the compose
  depends_on chain. On a WARM lane that is fine (postgres/valkey already up). On a fully COLD lane (no
  prior containers) NOTHING starts postgres/valkey before the preflight, so forward-migration (run with
  --no-deps) has no database to connect to: its 30x2s Postgres-readiness probe exhausts -> exit 1 -> the
  deploy auto-rolls back (the exact failure that blocked the OMN-13408/OMN-13335 cold dev-lane proof run).
  The fix adds ensure_core_infra_ready(), which brings up postgres + valkey with `up -d --no-deps --wait`
  (idempotent no-op on a warm lane) and is called in main() BEFORE warm_broker_topic_provisioning. A new
  CORE_INFRA_SERVICES array (postgres, valkey; redpanda intentionally excluded — broker readiness stays
  owned by warm_broker_topic_provisioning's collision-tolerant probe) drives the wait. Regression tests
  in tests/scripts/test_deploy_runtime_coldstart.py lock the ordering invariant (core-infra -> broker
  warmup -> migration preflight -> restart), the array contents, and the --wait + fail-closed behavior.
  shellcheck clean. This corrected cold bring-up was proven LIVE on the dev lane (compose project omnibase-infra):
  postgres+valkey up first, forward-migration and intelligence-migration both exited 0, runtime/effects/projection-api
  healthy on the already-built dev images (omninode-runtime 9976997ca80c, runtime-effects e06473a1cdef,
  projection-api df3841def184). This OCC contract is the Receipt-Gate Evidence-Source the omnibase_infra
  product PR cites. No runtime deploy is performed by this PR itself.
is_seam_ticket: false
