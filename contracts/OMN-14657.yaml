    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          PRODUCT_PR_NUMBER=1782; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=bd28b26f799f9a18d409566b52fa4fce754e5f84;
          d="$(mktemp -d)" && gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,baseRefName,title,files
