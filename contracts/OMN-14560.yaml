---
schema_version: 1.0.0
ticket_id: OMN-14560
title: OCC companion for omnibase_infra#2294 - omnimarket drift guard for onex node/run dispatch
summary: >-
  OCC evidence companion for OMN-14560. omnibase_infra#2294 wires the omnimarket drift guard into the
  `onex node` and `onex run` dispatch path so drifted or absent omnimarket installs fail loud before node
  lookup.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      omnibase_infra#2294 must wire the omnimarket drift guard into cli_node.py and preserve focused CLI
      tests for node/run dispatch.
    command: >-
      gh pr view 2294 --repo OmniNode-ai/omnibase_infra --json headRefOid,files,body and inspect changed
      product files at head d3cf8ce3d591ff15d55794d6ef8540cbcb459553.
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-2294-head-d3cf8ce-cli-node-surfaces
    description: >-
      Product-observing verification that omnibase_infra#2294 head d3cf8ce3d591ff15d55794d6ef8540cbcb459553
      is the cleaned post-#2291 branch and only changes the cli_node dispatch surface plus focused CLI
      tests.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2294 --repo OmniNode-ai/omnibase_infra --json headRefOid,files,commits
          --jq '.headRefOid + "\n" + ((.files | map(.path)) | join("\n")) + "\n" + ((.commits | map(.oid))
          | join("\n"))' > "$f" && grep -Fq 'd3cf8ce3d591ff15d55794d6ef8540cbcb459553' "$f" && grep -Fq
          'src/omnibase_infra/cli/cli_node.py' "$f" && grep -Fq 'tests/unit/cli/conftest.py' "$f" && grep
          -Fq 'tests/unit/cli/test_cli_node.py' "$f" && ! grep -Fq 'src/omnibase_infra/cli/cli_skill.py'
          "$f" && ! grep -Fq 'src/omnibase_infra/cli/omnimarket_drift_guard.py' "$f"
  - id: dod-2294-head-d3cf8ce-red-green-proof
    description: >-
      Product PR body verification for OMN-14560: the PR documents the pre-fix bare Unknown node failure,
      the new cli_node drift-guard behavior, RED-to-GREEN regression coverage, and local test/lint gates.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2294 --repo OmniNode-ai/omnibase_infra --json headRefOid,body --jq
          '.headRefOid + "\n" + .body' > "$f" && grep -Fq 'd3cf8ce3d591ff15d55794d6ef8540cbcb459553' "$f"
          && grep -Fq 'Unknown node' "$f" && grep -Fq 'test_drift_guard_fires_before_unknown_node_lookup'
          "$f" && grep -Fq '8/8 pass' "$f" && grep -Fq 'onex run definitely_not_a_real_node' "$f" && grep
          -Fq 'single top commit on current dev' "$f"
  - id: dod-2294-head-d3cf8ce-no-live-deploy-required
    description: >-
      Deploy assessment for omnibase_infra#2294. The cleaned product diff is limited to CLI Python/tests
      and does not change deploy manifests, runtime images, compose files, k3s/helm surfaces, or live
      .201 runtime configuration. No live deploy or restart was performed for this PR.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2294 --repo OmniNode-ai/omnibase_infra --json headRefOid,files --jq
          '.headRefOid + "\n" + (.files | map(.path) | join("\n"))' > "$f" && grep -Fq 'd3cf8ce3d591ff15d55794d6ef8540cbcb459553'
          "$f" && grep -Fq 'src/omnibase_infra/cli/cli_node.py' "$f" && ! grep -Eq '(^|/)deploy/|docker/|compose[.]ya?ml|Dockerfile|runtime|k3s|helm'
          "$f"
  - id: dod-occ-self-4104
    description: >-
      Self-binding verification that onex_change_control#4104 carries the OMN-14560 contract and product-observing
      receipts, and that its initial evidence commit remains in the PR commit history.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 4104 --repo OmniNode-ai/onex_change_control --json number,title,files,commits
          --jq '(.number|tostring) + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n")) + "\n"
          + ((.commits | map(.oid)) | join("\n"))' > "$f" && grep -Fxq '4104' "$f" && grep -Fq 'evidence(OMN-14560):
          cover cli node drift guard' "$f" && grep -Fq 'contracts/OMN-14560.yaml' "$f" && grep -Fq 'drift/dod_receipts/OMN-14560/dod-2294-head-d3cf8ce-cli-node-surfaces/command.yaml'
          "$f" && grep -Fq 'drift/dod_receipts/OMN-14560/dod-2294-head-d3cf8ce-red-green-proof/command.yaml'
          "$f" && grep -Fq 'drift/dod_receipts/OMN-14560/dod-2294-head-d3cf8ce-no-live-deploy-required/command.yaml'
          "$f" && grep -Fq '3ddf34b0a906311bd38bdc60d8c576f2b87605e6' "$f"
