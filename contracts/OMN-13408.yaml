---
schema_version: "1.0.0"
ticket_id: "OMN-13408"
title: "fix: accumulate measured cost_usd and carry tokens_input/tokens_output on metered delegation terminal
  path"
summary: >-
  Two-dimension terminal-event fix for OMN-13408. (1) cost_usd dimension (already landed via omnimarket
  #1332): _escalation_metadata() in HandlerDelegationWorkflow hardcoded cumulative_attempt_cost=0.0, cumulative_input_tokens=0,
  cumulative_output_tokens=0, and final_attempt_cost=0.0 on every terminal ModelDelegationResult regardless
  of actual tokens consumed. For metered tiers (cheap_cloud/GLM at rate_per_1k_usd=0.002), a 769-token
  prompt produced a projection cost_usd of 0.0 — confirmed via dogfood cid 54649717. Fix: compute final_attempt_cost
  and cumulative_attempt_cost from the workflow's resolved token counts through the same _measure_terminal_cost()
  / recompute_actual_cost_and_savings() path OMN-13396 wired for the compat-event builder. Token counts
  are propagated directly from workflow state. free_local tiers still resolve to 0.0 by the cost model
  (not a hardcoded zero). (2) tokens dimension (this OCC extension; omnibase_core #1300 + omnimarket #1336):
  the compat ModelTaskDelegatedEvent did not carry tokens_input/tokens_output, so the projection's token
  columns were clobbered to 0 even when the canonical terminal event held served usage. Fix is ADDITIVE
  on the canonical event-bus model only — two new fields (tokens_input, tokens_output; int, default=0,
  ge=0) on the core wire DTO ModelTaskDelegatedEvent, plus population of those fields from served prompt/completion
  tokens on both the failed-compat path and the _build_compat_event completed path in HandlerDelegationWorkflow.
  NO new REST route, NO bespoke endpoint, NO direct DB write.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
