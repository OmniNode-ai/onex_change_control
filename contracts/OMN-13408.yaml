ticket_id: "OMN-13408"
title: "fix: accumulate measured cost_usd, carry tokens_input/tokens_output, and capture served usage
  upstream on the metered delegation terminal path"
summary: >-
  Three-dimension terminal-event fix for OMN-13408. (1) cost_usd dimension (already landed via omnimarket
  #1332): _escalation_metadata() in HandlerDelegationWorkflow hardcoded cumulative_attempt_cost=0.0, cumulative_input_tokens=0,
  cumulative_output_tokens=0, and final_attempt_cost=0.0 on every terminal ModelDelegationResult regardless
  of actual tokens consumed. For metered tiers (cheap_cloud/GLM at rate_per_1k_usd=0.002), a 769-token
  prompt produced a projection cost_usd of 0.0 — confirmed via dogfood cid 54649717. Fix: compute final_attempt_cost
  and cumulative_attempt_cost from the workflow's resolved token counts through the same _measure_terminal_cost()
  / recompute_actual_cost_and_savings() path OMN-13396 wired for the compat-event builder. Token counts
  are propagated directly from workflow state. free_local tiers still resolve to 0.0 by the cost model
  (not a hardcoded zero). (2) tokens dimension (OCC extension; omnibase_core #1300 + omnimarket #1336):
  the compat ModelTaskDelegatedEvent did not carry tokens_input/tokens_output, so the projection's token
  columns were clobbered to 0 even when the canonical terminal event held served usage. Fix is ADDITIVE
  on the canonical event-bus model only — two new fields (tokens_input, tokens_output; int, default=0,
  ge=0) on the core wire DTO ModelTaskDelegatedEvent, plus population of those fields from served prompt/completion
  tokens on both the failed-compat path and the _build_compat_event completed path in HandlerDelegationWorkflow.
  (3) upstream-served-usage dimension (this OCC extension; omnimarket served-usage-upstream branch): the
  carry-fix in (2) read from a ZERO source on the truncated/escalated-failed path, because the cloud inference
  EFFECT (node_llm_delegation_call_effect/handlers/handler_inference_intent.py) raised on finish_reason==length
  BEFORE it parsed the provider usage block, so the published ModelInferenceResponseData carried prompt_tokens=0/completion_tokens=0
  even though the provider returned real usage (live EFFECT proof on .201: HTTP 200, finish_reason=length,
  usage prompt_tokens=22/completion_tokens=19/total_tokens=529). Fix is ADDITIVE and omnimarket-only (NO
  core change): a typed InferenceUsageError now carries the parsed served usage out of _call_llm, and
  the handle() error path threads exc.prompt_tokens/completion_tokens/total_tokens onto the published
  ModelInferenceResponseData (transport failures with no response still fall back to 0). A secondary latent
  dispatcher-crash surfaced by the primary fix is also closed: the inference-error terminal-FAILED ModelDelegationResult
  was built with total_tokens=response.total_tokens, but a reasoning model reports total>prompt+completion
  (thinking tokens), violating the wire invariant total==prompt+completion and crashing the orchestrator
  dispatcher with NO terminal emitted once real served tokens flowed — changed to total_tokens=response.prompt_tokens+response.completion_tokens
  (matches the existing gate-path reconciliation in _record_inference_response). NO new REST route, NO
  bespoke endpoint, NO direct DB write.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
