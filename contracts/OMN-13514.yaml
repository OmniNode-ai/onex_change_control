schema_version: "1.0.0"
ticket_id: "OMN-13514"
title: "fix(OMN-13514): compliance_sweep skill false-clean scans zero handlers through RuntimeLocal dispatch"
summary: >-
  The onex compliance_sweep skill path could report a false-clean result: RuntimeLocal dispatch with an
  empty request scanned 0 handlers and returned status=compliant, while the node __main__ path over the
  canonical repo set scanned real handlers and found violations. Root cause was a contract/model mismatch
  and duplicated repo-resolution logic: skill_mapping.yaml and the contract send repos, but ComplianceSweepRequest
  accepted only target_dirs with extra=forbid; the default repo set and repo-name to path resolver lived
  only in __main__.py, so the dispatch path defaulted to an empty scan. The product PR adds repos to the
  request model, moves default repo resolution into the shared handler module, makes both RuntimeLocal
  and __main__ use the same resolver, fails fast when OMNI_HOME is required but unset, excludes nested
  worktrees/tests/fixtures from scan scope, and ignores LOGIC_IN_NODE matches inside docstring/string-literal
  examples while preserving real handler detections.
