schema_version: "1.0.0"
ticket_id: "OMN-13514"
title: "fix: compliance_sweep skill (onex skill path) was false-clean — share repo resolution into handler"
summary: >-
  The operator-invoked `onex skill compliance_sweep` (RuntimeLocal dispatch) path returned a trust-defeating
  false-clean verdict: handlers_scanned=0, status=compliant, while the node's own `__main__` CLI over
  the same default repo set scanned 2190 handlers / 741 raw findings. Root cause was three coupled defects
  in omnimarket node_compliance_sweep: (1) the handler request model ComplianceSweepRequest exposed only
  `target_dirs` while the skill mapping + contract supply `repos` — with extra="forbid" a `repos` payload
  was rejected and a no-arg payload defaulted target_dirs to [] -> 0 handlers; (2) the _DEFAULT_REPOS
  list lived only in __main__.py, which the dispatch path never executes; (3) the repo-name -> absolute-path
  resolver also lived only in __main__.py. Fix: add `repos: list[str]` to the request model (reconciling
  contract / skill_mapping / model), move _DEFAULT_REPOS + a shared resolve_target_dirs() into the handler
  module used by BOTH paths (fail-fast on unset $OMNI_HOME when repo names must be resolved), exclude
  omni_worktrees / tests / fixtures from the scan, and make LOGIC_IN_NODE skip string-literal/docstring
  AST lines. After the fix both paths scan identically (806 handlers / 95 violations over the canonical
  repo set, scoped). Purely intra-omnimarket change; no core wire DTO changes.
