ticket_id: "OMN-13470"
title: "feat(omnimarket): combine LLM-judge adequacy score into the delegation quality gate"
summary: >-
  The deterministic check set for verifiable code classes (compiles_without_errors / final_artifact_only
  / passes_existing_tests) is a HARD FLOOR for refusals/empties but is too strict to be the sole adequacy
  authority: a correct-but-mechanically-incomplete cloud code_generation answer scores ~0.733 deterministic
  and fails the 0.85 required_bar, so no cloud row passes the gate today (delegation_judge_verdict_events
  = 0 rows; delegation-judge-verdict.v1 HWM = 0). OMN-13367 declared the judge verdict event schema, projection
  table, topic, and rubric config but never produced a verdict and never combined it into the gate. This
  change wires the producer + combine. HandlerJudgeAdequacy (a drop-in judge handler, NO new node) builds
  a rubric- grounded adequacy prompt over (task, candidate, acceptance criteria) and runs it through the
  canonical inference bridge (AdapterInferenceBridge) -- an EFFECT, never an inline model call inside
  the pure gate reducer -- parses a 0-1 adequacy score, and builds a durable, replayable ModelDelegationJudgeVerdictEvent
  (fail-closed to JUDGE_FAILED with actual_score=None on call/parse failure, no silent zero). delta()
  gains judge_adequacy_score: when the deterministic floor passes on a verifiable path it COMBINES the
  deterministic band fraction with the judge score (0.6/0.4) and records score_source='combined'; the
  orchestrator applies required_bar to the combined score. A refusal/empty hard-blocks in the fail_deterministic
  branch BEFORE the combine, preserving the OMN-13409 refusal-not-pass invariant. HandlerQualityGateIntent.handle_async
  runs the judge effect for code_generation/test, threads the score into delta(), and emits BOTH the gate
  result and the judge verdict event (delegation-judge-verdict.v1) for the existing projection. delegation_judge_rubrics.v1.yaml
  gains delegation_code_adequacy_v1 for the verifiable code classes. Replay-safety: the judge does no
  I/O of its own (delegates the single LLM call to an injected adapter); the recorded verdict is read
  back on replay and the event_hash recomputes deterministically, so the model is never re-called. Child
  of OMN-13335 (up-tier discriminator) and the customer-beta SEA/delegation claim.
is_seam_ticket: false
