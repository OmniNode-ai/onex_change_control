title: "fix(OMN-13550): correct handler class names in omnimarket node contracts to match real symbols"
summary: >-
  OCC evidence for the omnimarket fix PR that unblocks the dev runtime boot. A dev-HEAD redeploy crash-looped
  the runtime with CLASS_NOT_FOUND (HANDLER_LOADER_011): node_baseline_capture/contract.yaml named handler
  'probe_db_row_counts' which does not exist as a symbol in its module — the real class is 'ProbeDbRowCounts'.
  OMN-12408's fail-loud (merged 2026-06-23) now correctly crashes on this instead of silently skipping
  the contract. The source change sweeps all 370 handler_routing entries across every omnimarket node
  contract and fixes every handler.name that did not resolve via hasattr(module, name) — the exact check
  the runtime loader performs — across 9 contracts, and adds a parametrized regression test that mirrors
  the OMN-12408 runtime invariant locally.
