ticket_id: "OMN-13283"
title: "feat(validation): port transport-import + node-purity validators to omnibase_core (W10A)"
summary: >-
  Ports the transport/I/O import boundary and node-purity validators into omnibase_core as canonical remote
  pre-commit hooks. The transport-import validator rejects direct/from/dotted imports of network, database,
  and broker client libraries such as httpx, aiohttp, requests, aiokafka, asyncpg, redis, grpc, and websockets
  outside TYPE_CHECKING; the node-purity validator rejects network clients, environment reads, and file
  I/O inside node code. The validators are AST-based, fail-closed, expose CLI entrypoints for pre-commit
  staged mode, and include positive/negative unit coverage. Consumer PRs delete local copies or wire to
  the core hooks so one canonical implementation remains. Validator-standardization remediation plan W10A
  / GAP-8a, child of OMN-9048.
