---
schema_version: "1.0.0"
ticket_id: "OMN-10598"
title: "ci: centralize omnimarket workflow runner selectors"
summary: "Remove hard-coded .201 and self-hosted runner bindings from omnimarket workflows so trusted
  CI can be rerouted through repository runner selector variables."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "Receipt Gate passes on omnimarket PR #534 after this OCC evidence lands."
    command: "gh pr checks 534 --repo OmniNode-ai/omnimarket --watch=false --required"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "omnimarket workflows no longer contain .201, direct self-hosted runner labels, or USE_SELF_HOSTED_RUNNERS
      selectors."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test \"$(rg -n '\\.201|runs-on: \\[self-hosted|fromJSON\\('\\''\\[\\\"self-hosted\\\",\\\"omnibase-ci\\\"\\]'\\''|USE_SELF_HOSTED_RUNNERS|omnibase-ci'
          .github/workflows | wc -l | tr -d ' ')\" = \"0\""
  - id: "dod-002"
    description: "All omnimarket workflow YAML files parse after runner selector changes."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "python3 -c 'from pathlib import Path; import yaml; [yaml.safe_load(path.read_text())
          for path in Path(\".github/workflows\").glob(\"*.yml\")]; print(\"workflow yaml parse ok\")'"
  - id: "dod-003"
    description: "omnimarket PR #534 carries the workflow-only runner selector patch for OMN-10598."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view 534 --repo OmniNode-ai/omnimarket --json files --jq '.files[].path' |
          grep -Fx '.github/workflows/hostile-reviewer.yml' && gh pr view 534 --repo OmniNode-ai/omnimarket
          --json files --jq '.files[].path' | grep -Fx '.github/workflows/pr-review-bot.yml' && gh pr
          view 534 --repo OmniNode-ai/omnimarket --json files --jq '.files[].path' | grep -Fx '.github/workflows/plugin-compat-gate.yml'
          && gh pr view 534 --repo OmniNode-ai/omnimarket --json files --jq '.files[].path' | grep -Fx
          '.github/workflows/stale-todo-gate.yml'"
  - id: "dod-occ-pr"
    description: "OCC PR carries the OMN-10598 central contract and receipt evidence."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f contracts/OMN-10598.yaml && test -f drift/dod_receipts/OMN-10598/dod-001/command.yaml
          && test -f drift/dod_receipts/OMN-10598/dod-002/command.yaml && test -f drift/dod_receipts/OMN-10598/dod-003/command.yaml
          && test -f drift/dod_receipts/OMN-10598/dod-occ-pr/command.yaml"
