---
schema_version: "1.0.0"
ticket_id: "OMN-13558"
title: "env→contract migration (omnibase_infra Wave 1): QDRANT_URL endpoint reads → overlay descriptor
  seam"
summary: >-
  Wave-1 endpoint→overlay migration (epic OMN-13556). Moves the scattered direct os.environ QDRANT_URL
  reads in omnibase_infra off raw env onto the canonical overlay seam: the node_vector_store_effect contract
  declares descriptor.qdrant_url = "${env.QDRANT_URL}" (same convention as node_coding_agent_invoke_effect.descriptor.agent_credential_home),
  and a new contract_descriptor module resolves it through omnibase_infra.runtime.overlay.contract_env_ref.expand_contract_env_refs
  — the one sanctioned env-reading boundary — fail-closed (unset/blank raises rather than silently defaulting
  to http://localhost:6333). HandlerVectorUpsert, HandlerVectorSearch, HandlerRegistryApiGetHealth and
  the ModelQdrantHandlerConfig default_factory now resolve via the descriptor; the localhost fallbacks
  and the # ONEX_EXCLUDE grandfather suppressions are removed (3 url_authority_baseline entries become
  removable). A resolution-equivalence test proves the overlay resolves the same dev/stability/prod value
  the env var gave and fails closed when unset. LLM_EMBEDDING_URL co-located in the same handlers + the
  similarity adapter is DEFERRED to the Bifrost routing wave (OMN-12803/12815) and left untouched. This
  OCC PR carries the central contract consumed by the omnibase_infra PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
