    description: >-
      The migrated overlay seam resolves the Qdrant endpoint identically to the pre-migration direct os.environ["QDRANT_URL"]
      read across dev / stability-test / prod lane values, and fails closed (raises) when QDRANT_URL is
      unset or blank — no silent http://localhost:6333 fallback. The ModelQdrantHandlerConfig.url default_factory
      resolves through the same seam. Proven by the focused resolution-equivalence suite tests/unit/nodes/node_vector_store_effect/test_contract_descriptor.py
      plus the vector-store + registry-api handler suites (151 passed).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13558/dod-001/command.yaml"
  - id: "dod-gates"
    description: >-
      Both REQUIRED ratchet gates stay green with FEWER grandfathered endpoint reads: the URL Authority
      Gate (check-url-authority) reports 0 new violations and the 3 QDRANT baseline entries are no longer
