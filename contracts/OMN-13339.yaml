schema_version: "1.0.0"
ticket_id: "OMN-13339"
title: "feat(OMN-13339): DurableEvidenceGate repair-to-ratchet rule for defect tickets"
summary: >-
  OCC evidence for the omnimarket product PR (#1404) that adds the DurableEvidenceGate DEFECT_PREVENTION_GATE
  check (retro enforcement R4). Defects were fixed without a ratchet that prevents recurrence, so the
  same failure class returns. The gate now rejects closing a defect-labelled ticket {bug, defect, regression}
  unless the contract links a prevention gate (top-level prevention_gate — CI workflow / pre-commit hook
  path or PR URL) OR carries a structured non_recurrence_note. Non-defect tickets are exempt (the check
  passes N/A). evaluate()/evaluate_default() accept ticket_labels (default empty). Pure-logic node-service
  change with unit tests; no topic schema, envelope, or contract API change; no live runtime-lane mutation.
