      PASSes; a non_recurrence_note PASSes; whitespace-only fields are treated as absent (FAIL); a non-defect
      ticket is exempt (PASS N/A); and the defect-label set is exactly {bug, defect, regression}. 28/28
      gate tests and 93/93 node_dod_verify tests pass at the product head.
    source: "manual"
