      MALFORMED, rejects a refusal with a REFUSAL-prefixed (escalation-worthy) detail, and cannot promote
      a clean output to adequate. Full suite, mypy --strict, ruff, and pre-commit pass.
    command: >-
      uv run pytest tests/unit/delegation/test_quality_gate_no_refusal_deterministic_omn13373.py -v
