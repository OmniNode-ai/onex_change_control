ticket_id: "OMN-13373"
title: "Resolve no_refusal in deterministic DoD path as reject-only pre-filter"
summary: >-
  Central evidence for omnimarket PR #1302. no_refusal is a SUPPORTED_ACCEPTANCE_CRITERIA value at the
  delegation request DTO but had no dispatch branch in the deterministic DoD evaluator, so a request with
  acceptance_criteria=["no_refusal"] fell through to "MALFORMED: unsupported deterministic DoD check 'no_refusal'"
  (a non-clean, non-escalation-worthy quality detail). The fix routes no_refusal to the existing _check_no_refusal
  as a reject-only pre-filter and adds it to _REJECT_ONLY_DETERMINISTIC_CHECKS so a clean output is never
  promoted to adequate (OMN-13370 marker-authority retirement preserved).
is_seam_ticket: false
interface_change: false
