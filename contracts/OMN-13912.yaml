schema_version: "1.0.0"
ticket_id: "OMN-13912"
title: "runner monitor alert cron durability"
summary: >-
  The self-hosted runner-fleet alert monitor was installed via a cron line that did not source .monitor-env,
  so under cron the monitor could not resolve its host/token config and silently stopped alerting on offline
  listeners. omnibase_infra PR #2192 installs the monitor cron through bash so .monitor-env loads, captures
  monitor setup failures in /tmp/runner-monitor.log, uses the Tailscale MagicDNS hostname for the fleet
  deploy/monitor host, keeps offline listeners alert-only (no auto-remediation), survives listener self-update
  exits, and adds unit coverage so rebuild deploys do not regress to the broken cron line. Config + scripts
  + tests only; no runtime contract or Dockerfile.runtime change (deploy-gate not applicable). Also rebases
  the branch onto dev (originally cut from main) and COPYs omni-curl instead of the BuildKit-only heredoc
  so runner-image-build-smoke passes under the legacy builder (shared root cause with OMN-13915).
