ticket_id: "OMN-13543"
title: "fix(delegation): research escalation-exhaustion emits a blank terminal — resolved-by-OMN-13546
  (forwarder missing handle() inference amplification loop)"
summary: >
  The research delegation path scored 1/2 in the 2026-06-23 dogfood matrix: a real inference succeeded
  but no model/token-bearing terminal landed in delegation_events, so the path looked exhausted-blank.
  Root cause was NOT a quality-gate/escalation defect in the orchestrator. It was the inference amplification
  loop in node_bus_forwarder_effect: HandlerForwardOutbound and HandlerConsumeInbound lacked the canonical
  handle()/handle_async() dispatch entrypoint, so the runtime dispatcher raised ModelOnexError on every
  gateway forward/consume (144 errors per dev redeploy) and the inference response never propagated back
  to a terminal. OMN-13546 added handle() to both handlers (omnibase_infra PR #2088, merged 2026-06-24,
  mergeCommit a9f57e891177ee4f0b82ec9274fa64423d6c8324). After dev redeploy to that HEAD, the 2026-06-24
  dogfood re-test shows research PASS with a real terminal row (Qwen3.6-35B-A3B, 70/1725 tokens, quality
  pass, 9021 ms, correlation_id d26ab17a-d847-4b12-bdd3-4a978b837956). OMN-13543 is therefore resolved-by-OMN-13546.
