schema_version: "1.0.0"
ticket_id: "OMN-13796"
title: "M2b: Disposition node_release facade — registry honesty + mechanical no-I/O guard"
summary: >-
  omnimarket's node_release HandlerRelease is a pure FSM state machine — confirmed zero git/gh/PyPI I/O
  — but contract.yaml declared node_archetype: compute with purity: impure, a direct contradiction of
  the canonical rule that COMPUTE nodes are pure/no-I/O (CLAUDE.md rule 7a), and disagreed with metadata.yaml's
  own node_role: orchestrator. This aligns contract.yaml node_type/descriptor.node_archetype to orchestrator
  and descriptor.purity to orchestration (matching node_redeploy_orchestrator convention), sets metadata.yaml
  capabilities.full_runtime: false and side_effect_class: orchestration to honestly reflect that the live-mutating
  release pipeline (bump/pin/PR/merge/tag/publish) is not runnable through this node today, and adds a
  mechanical registry-honesty test (tests/unit/nodes/node_release/test_registry_honesty.py) that statically
  greps handler_release.py's import graph and call sites for forbidden I/O (subprocess/requests/httpx/os.system/shutil/git)
  so any future PR that silently adds real I/O without updating the registry fails CI. Follow-up OMN-13798
  tracks the real gated EFFECT implementation for the dev/dry-run release path. No live prod/PyPI effect
  is exercised in this ticket or its tests; this is a metadata + test-only change with no live deploy.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
