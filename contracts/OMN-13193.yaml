title: "feat(OMN-13193): A3 — resolve delegation orchestrator topics from contract.yaml"
summary: >-
  A3 of epic OMN-13188 (Workstream A — all topics from contracts). The 4 omnimarket node_delegation_orchestrator
  production files (contract_topics.py, dispatchers/dispatcher_delegation_workflow.py, dispatchers/dispatcher_routing_decision.py,
  handlers/handler_delegation_workflow.py) no longer import delegation TOPIC_* string constants from omnibase_infra.event_bus.topic_constants.
  Every publish/subscribe topic is resolved from this node's own contract.yaml via the adopted contract_publish_topics
  / contract_subscribe_topics helpers (src/omnimarket/nodes/contract_topics.py), satisfying OMN-12803.
  The node contract_topics.py module is the single binding layer, resolving all 8 orchestrator topics
  (2 subscribe, 6 publish) with a fail-fast _single_topic matcher; the dispatchers and handler import
  the TOPIC_ID_* names from it. Topic strings are unchanged — each resolved string equals both the contract.yaml
  declaration and the prior topic_constants value (proven in the new migration-lock test tests/unit/delegation/test_contract_topics_orchestrator.py).
