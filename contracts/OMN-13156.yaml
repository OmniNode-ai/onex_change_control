title: "Bump omnimarket sibling pins to dev tips (unblock dev redeploy) — OMN-12977 ratchet drift"
summary: >-
  The OMN-12977 sibling-lock-pin preflight (omnibase_infra/scripts/runtime_build/check_sibling_lock_pins.py)
  correctly BLOCKS the dev-lane workspace build because omnimarket origin/dev uv.lock pinned OLDER sibling
  versions than the sibling repos' dev tips (5 forward-drifts: omnibase_infra 0.38.1->0.38.3, omnibase_core
  0.44.0->0.44.2, omnibase_spi 0.20.6->0.22.0, omnibase_compat 0.5.1->0.5.4, onex_change_control 0.5.0->0.5.1).
  ALLOW_SIBLING_PIN_DRIFT=1 is the wrong remediation (operator-approval override, not available). The
  canonical fix is a durable lock bump to the dev tips. omnimarket PR #1222 (branch jonah/omn-13156-bump-sibling-pins-dev-tips,
  base=dev, head fb1e059965a27c1157b80a203c7425b89c7f9f1d) bumps the 5 sibling pins in pyproject.toml
  (project.dependencies constraints, [tool.uv.sources] git revs, [tool.uv] override-dependencies) + uv
  lock to the dev-tip versions/SHAs. Notable: omnibase-spi constraint widened >=0.20.6,<0.22.0 -> >=0.22.0,<0.23.0
  (dev tip is the new 0.22.0 minor). After the bump the OMN-12977 preflight reports "All 5 sibling pins
  match uv.lock" (was 5 DRIFT/forward, exit 1 -> exit 0), unblocking the dev redeploy that bakes omnimarket
  origin/dev HEAD 9298fcec (OMN-13140 escalation emit). Lock + pyproject change only — no source change,
  no DDL, no migration, no live deploy, no .201 mutation by this PR.
