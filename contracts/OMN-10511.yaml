title: "feat(OMN-10511): fix onex run-node to publish to contract-declared topics"
summary: >
  Fix onex run-node so it resolves the target node's contract.yaml and publishes to the node's declared
  command/terminal topics instead of hardcoded constants. Adds _resolve_node_topics(node_id), threads
  explicit cmd_topic/response_topic through publish_and_poll, and adds TestResolveNodeTopics regression
  coverage. Also backfills normalization/contract_validator.py into the yaml validation allowlist.
