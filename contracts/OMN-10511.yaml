evidence_requirements:
  - kind: "tests"
    description: "CLI run-node unit suite (including TestResolveNodeTopics and the contract-declared-topics
      regression) passes locally."
    command: "cd omnibase_core && uv run pytest tests/unit/cli/ -q"
  - kind: "manual"
    description: "Live .201 runtime confirms onex run-node publishes to the node's contract-declared command
      topic and the registered node consumes it."
    command: "ssh jonah@192.168.86.201 docker exec omninode-runtime onex run-node <node_id> --input '{...}'"
