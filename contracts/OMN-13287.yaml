ticket_id: "OMN-13287"
title: "W10B: expose enum-governance + no-backward-compat as omnibase_core remote pre-commit hooks"
summary: >-
  Exposes two canonical fail-closed validators as remote pre-commit hooks in omnibase_core/.pre-commit-hooks.yaml
  (check-enum-governance via python -m omnibase_core.validation.checker_enum_governance; check-no-backward-compat
  via the scripts/validation/validate-no-backward-compatibility.py script under language: script) so downstream
  repos consume one implementation instead of divergent local copies (validator-standardization-remediation-plan
  §3 W10B). pydantic-conventions is intentionally NOT exposed: its core default contract ships fail_on_error:false
  (577 grandfathered violations) so it detects but cannot block, and a warn-only gate is forbidden. Consumer-side
  local-copy deletion (omnimemory/omniclaude) is a gated follow-up: consumers pin core remote hooks by
  commit SHA and the stricter core no-backward-compat validator surfaces 8 (mem) + 43 (clde) pre-existing
  violations needing real refactors. Config + test only; no runtime code touched.
