title: "feat(OMN-14223): relocate canonical OCC stamp schema into omnibase_compat"
summary: >-
  omnibase_compat PR #173 relocates the canonical OCC PR metadata-stamp schema from omnibase_core into
  omnibase_compat, the lowest shared layer. The PR ports the evidence-source enum, four metadata stamp
  models, and the parse/render_pr_occ_metadata_stamp helpers with only import-path changes from omnibase_core.*
  to omnibase_compat.*. It also exports the public omnibase_compat.contracts.pr_occ_stamp import path,
  ports the full round-trip test suite, and bumps omnibase-compat from 0.5.5 to 0.5.6. This is the operator
  placement correction for the OMN-14180 OCC stamp-model epic; the core-side deletion remains a separate
  follow-up and this PR does not touch omnibase_core.
