    status: verified
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1447; PRODUCT_REPO=OmniNode-ai/omnibase_core; PRODUCT_HEAD=70da9ee2248d4ef8647044f7929d1c8a933d0625;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid --jq '.headRefOid
