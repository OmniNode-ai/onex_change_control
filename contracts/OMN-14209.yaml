schema_version: 1.0.0
ticket_id: OMN-14209
title: "fix(OMN-14209): extend prod-grant gate to k3s deploy-onex-prod.yml"
summary: >-
  omninode_infra PR #583 extends the OMN-13418 production-promotion grant gate to the k3s deploy-onex-prod.yml
  manual promotion workflow. The workflow's GitHub Environment protection is branch-policy-only, so the
  PR adds a standalone grant validator and inserts runtime-image and onex-api-image grant checks before
  the first prod-mutating kubectl apply step. The validator reads grants from onex_change_control main
  via CROSS_REPO_PAT, enforces approved_by != requested_by, unexpired/unconsumed grant state, runtime_lane
  prod, and image_digest equality, and allows only a target-correct kubeconfig-based unhealthy-runtime
  waiver.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - public_api
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
