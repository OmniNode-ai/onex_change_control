---
schema_version: "1.0.0"
ticket_id: "OMN-13574"
title: "Model B failing-rollup enforcement (pilot: omnibase_core)"
summary: >
  Enforcement model decision (epic OMN-13573): keep ONE required aggregate rollup context per repo (CI
  Summary) and make it AIRTIGHT so it goes red if ANY spec-required validator sub-job fails, rather than
  registering granular per-validator branch-protection contexts (Model A, rejected). The omnibase_core
  ci.yml gains naming-conventions, pydantic-patterns, and aislop-patterns jobs feeding quality-gate ->
  ci-summary, and drops version-pin-check from quality-gate.needs because its continue-on-error:true meant
  it could never gate. A meta-verifier (validator_rollup_coverage.py) walks the rollup job's transitive
  needs graph and fails if any opted-in spec-required validator is uncovered or swallowed by continue-on-error;
  it is wired as a pre-commit hook and a check-handshake CI step. The spec gains an additive, per-repo
  opt-in block model_b_rollup_enforcement (pilot: omnibase_core only) so the legacy consumer and the other
  11 repos' handshake gate are unaffected; fleet rollout is OMN-13576.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Meta-check tests for the Model-B rollup-coverage verifier, including planted-failure proofs (dropped
      need, continue-on-error, deleted job, drifted rollup name) and the live-ci airtight assertion.
    command: "uv run pytest tests/validation/test_validator_rollup_coverage.py -q"
emergency_bypass:
