schema_version: "1.0.0"
ticket_id: "OMN-14625"
title: "fix(OMN-14625): repoint dead delegation routing surfaces to Gemini"
summary: >-
  Central OCC evidence for the OMN-14625 portion of omnimarket PR #1766. The same product PR that gates
  OMN-14626 also repoints the dead z.ai GLM delegation surfaces: the cheap_cloud and claude ceiling tiers
  now route through cloud-gemini-pro / gemini-2.5-flash, cloud-glm-judge is repointed to Gemini, and task-class
  model overrides plus fixtures stay resolvable against the new routing identity.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - protocols
  - public_api
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-1766-routing-head"
    description: >-
      Product-observing verification for the OMN-14625 routing unblock carried by omnimarket PR #1766
      at head e7718cd9ae6446f20187f93aec8fd826a7e18d2a. Reads the PR metadata and changed files directly
      from GitHub and verifies the Gemini routing repoint plus the paired fixture and task-class override
      updates.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1766; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=e7718cd9ae6446f20187f93aec8fd826a7e18d2a;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,body
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + ((.files | map(.path)) | join("\n")) + "\n"
          + .body' > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt"
          && for p in src/omnimarket/configs/routing_tiers.yaml src/omnimarket/configs/bifrost_delegation.yaml
          src/omnimarket/configs/task_class_contracts.v1.yaml tests/unit/delegation/conftest.py tests/fixtures/judge_inference/glm_code_adequacy_pass.json
          tests/fixtures/judge_inference/glm_code_adequacy_fail.json; do grep -Fq "$p" "$d/pr.txt" &&
          mkdir -p "$d/$(dirname "$p")" && gh api "repos/OmniNode-ai/omnimarket/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'id: gemini-2.5-flash' "$d/src/omnimarket/configs/routing_tiers.yaml"
          && grep -Fq 'backend_id: cloud-gemini-pro' "$d/src/omnimarket/configs/routing_tiers.yaml" &&
          grep -Fq 'max_context_tokens: 1000000' "$d/src/omnimarket/configs/routing_tiers.yaml" && grep
          -Fq 'backend_id: cloud-glm-judge' "$d/src/omnimarket/configs/bifrost_delegation.yaml" && grep
          -Fq 'model_name: "gemini-2.5-flash"' "$d/src/omnimarket/configs/bifrost_delegation.yaml" &&
          grep -Fq 'code_generation: "gemini-2.5-flash"' "$d/src/omnimarket/configs/task_class_contracts.v1.yaml"
          && grep -Fq 'test: "gemini-2.5-flash"' "$d/src/omnimarket/configs/task_class_contracts.v1.yaml"
          && grep -Fq 'refactor: "gemini-2.5-flash"' "$d/src/omnimarket/configs/task_class_contracts.v1.yaml"
          && grep -Fq 'cloud-gemini-pro' "$d/tests/unit/delegation/conftest.py" && grep -Fq 'gemini-2.5-flash'
          "$d/tests/fixtures/judge_inference/glm_code_adequacy_pass.json" && grep -Fq 'gemini-2.5-flash'
          "$d/tests/fixtures/judge_inference/glm_code_adequacy_fail.json"
  - id: "dod-omnimarket-pr-1766-routing-ci-green"
    description: >-
      Local verification proof for the OMN-14625 routing unblock on omnimarket PR #1766 at head e7718cd9ae6446f20187f93aec8fd826a7e18d2a.
      Verifies the PR body records the full local suite, focused delegation suite, strict mypy, pre-commit,
      and the owed OCC companion note for the exact head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1766; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=e7718cd9ae6446f20187f93aec8fd826a7e18d2a;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,body --jq '.headRefOid
          == "'$PRODUCT_HEAD'" and (.body | contains("13026 passed, 63 skipped, 9 deselected, 1 xfailed,
          0 failed")) and (.body | contains("590 passed, 2 skipped")) and (.body | contains("Success:
          no issues found in 2824 source files")) and (.body | contains("pre-commit run --all-files"))
          and (.body | contains("OCC Evidence-Source companion owed"))' | grep -qx true
  - id: "dod-omnimarket-pr-1766-routing-deploy-scope"
    description: >-
      Deploy-surface assessment for the OMN-14625 routing unblock in omnimarket PR #1766. The diff is
      configuration, fixture, and test only; it does not touch Dockerfiles, compose manifests, deploy
      scripts, migrations, or runtime service definitions.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1766; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=e7718cd9ae6446f20187f93aec8fd826a7e18d2a;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid --jq '.headRefOid ==
          "'$PRODUCT_HEAD'"' | grep -qx true && ! gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO"
          --name-only | grep -qE '(^|/)(Dockerfile|docker-compose[^/]*|compose[^/]*|deploy|migrations)(/|$)'
  - id: "dod-occ-self-bind-pr-4168"
    description: >-
      OCC companion self-binding for onex_change_control PR #4168. Verifies the PR is open on the expected
      OMN-14625 evidence branch and that the initial evidence commit 3716bee84e4c2d91808b812c5dfdd7e6fa1c9d01
      is an ancestor of the current PR head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          gh api repos/OmniNode-ai/onex_change_control/pulls/4168 --jq '.head.ref == "jonah/omn-14626-occ-omnimarket-1766-omn14625-fix"
          and .state == "open"' | grep -qx true && git merge-base --is-ancestor 3716bee84e4c2d91808b812c5dfdd7e6fa1c9d01
          HEAD
