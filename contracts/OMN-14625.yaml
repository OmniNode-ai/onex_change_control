summary: >-
  Central OCC evidence for the OMN-14625 portion of omnimarket PR #1766. The product PR repoints the dead
  z.ai GLM delegation route to Gemini by moving the cheap_cloud and claude ceiling primary entries to
  gemini-2.5-flash through cloud-gemini-pro, repointing the cloud-glm-judge backend definition to Gemini
