dod_evidence:
  - id: "dod-omnimarket-pr-1766-omn14625-routing-head"
    description: >-
      Product-observing verification for the OMN-14625 routing unblock in omnimarket PR #1766 at head
      e7718cd9ae6446f20187f93aec8fd826a7e18d2a. The proof reads the PR metadata and changed files directly
      from GitHub at that exact head and verifies the load-bearing routing seams: cheap_cloud and claude
      tiers route to gemini-2.5-flash through cloud-gemini-pro, cloud-glm-judge is repointed to Gemini,
      task-class overrides reference gemini-2.5-flash, and affected judge/delegation fixtures carry the
      Gemini routing identity.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1766; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=e7718cd9ae6446f20187f93aec8fd826a7e18d2a;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,body
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + ((.files | map(.path)) | join("\n")) + "\n"
          + .body' > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt"
          && for p in src/omnimarket/configs/routing_tiers.yaml src/omnimarket/configs/bifrost_delegation.yaml
          src/omnimarket/configs/task_class_contracts.v1.yaml tests/unit/delegation/conftest.py tests/fixtures/judge_inference/glm_code_adequacy_pass.json
          tests/fixtures/judge_inference/glm_code_adequacy_fail.json; do grep -Fq "$p" "$d/pr.txt" &&
          mkdir -p "$d/$(dirname "$p")" && gh api "repos/OmniNode-ai/omnimarket/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'id: gemini-2.5-flash' "$d/src/omnimarket/configs/routing_tiers.yaml"
          && grep -Fq 'backend_id: cloud-gemini-pro' "$d/src/omnimarket/configs/routing_tiers.yaml" &&
          grep -Fq 'max_context_tokens: 1000000' "$d/src/omnimarket/configs/routing_tiers.yaml" && grep
          -Fq 'backend_id: cloud-glm-judge' "$d/src/omnimarket/configs/bifrost_delegation.yaml" && grep
          -Fq 'endpoint_url: "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"'
          "$d/src/omnimarket/configs/bifrost_delegation.yaml" && grep -Fq 'model_name: "gemini-2.5-flash"'
          "$d/src/omnimarket/configs/bifrost_delegation.yaml" && grep -Fq 'api_key_env: GEMINI_API_KEY'
          "$d/src/omnimarket/configs/bifrost_delegation.yaml" && grep -Fq 'code_generation: "gemini-2.5-flash"'
          "$d/src/omnimarket/configs/task_class_contracts.v1.yaml" && grep -Fq 'test: "gemini-2.5-flash"'
          "$d/src/omnimarket/configs/task_class_contracts.v1.yaml" && grep -Fq 'refactor: "gemini-2.5-flash"'
          "$d/src/omnimarket/configs/task_class_contracts.v1.yaml" && grep -Fq 'cloud-gemini-pro' "$d/tests/unit/delegation/conftest.py"
          && grep -Fq 'gemini-2.5-flash' "$d/tests/fixtures/judge_inference/glm_code_adequacy_pass.json"
          && grep -Fq 'gemini-2.5-flash' "$d/tests/fixtures/judge_inference/glm_code_adequacy_fail.json"
  - id: "dod-omnimarket-pr-1766-omn14625-ci-green"
