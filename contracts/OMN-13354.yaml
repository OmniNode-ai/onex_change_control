ticket_id: "OMN-13354"
title: "fix(omnimarket): make research quality-gate heuristic research-appropriate"
summary: >-
  The delegation quality-gate research task_class declared the heuristic pair cites_specific_lines + explains_tradeoffs
  (src/omnimarket/configs/task_class_contracts.v1.yaml). cites_specific_lines (handler_quality_gate.py::_check_cites_specific_lines)
  is a CODE-line-citation regex (line N / Lnn / :nn) that a legitimate research answer cannot satisfy
  — research cites theorems / papers / sections, not code lines. This made the research gate a catch-22:
  per the 2026-06-19 stability-test reprove (docs/evidence/2026-06-19-sea-escalation-reprove.md §2b),
  a research delegation escalated local Qwen -> glm-5.2 -> gemini-2.5-flash and EXECUTED at every tier
  (no truncation), but ALL failed quality with score 0.733, reason ["TASK_MISMATCH: missing specific line
  citations", "TASK_MISMATCH: failed explains_tradeoffs"], fail_category=fail_heuristic; the only outputs
  that could pass carried code-line markers, which then passed at the LOCAL tier and never escalated,
  so the ceiling could never demonstrate a research pass. Fix (research-appropriate, NOT a blanket loosen):
  add a cites_sources heuristic (_check_cites_sources + _SOURCE_CITATION_RE) that detects general source/reference
  forms — references / citations / sources keywords, see / according to / cf. attribution, named results
  (theorem N / section N / page N / equation N), bracketed numeric [12], author-year (Smith, 2020), URLs,
  and DOIs — as a presence check, NOT the code-line regex. The research DoD swaps cites_specific_lines
  -> cites_sources and explains_tradeoffs -> methodical_analysis (reasoning-structure markers because
  / therefore / evidence / risk). cites_specific_lines + explains_tradeoffs stay as named checks bound
  to the review (code-review) task class and the existing escalation tests, unchanged. The research class
  is added to the quality-gate calibration corpus with good/bad cases (per-class margin 1.0 - 0.6 = 0.40
  >= the 0.3 threshold). Tests (tests/unit/delegation/test_quality_gate_research_omn13354.py) prove: (a)
  a substantive research answer that cites sources and reasons passes (score 1.0), (b) a thin / empty
  research answer still fails, and (c) code-line-only content does not pass research and the shipped DoD
  declares cites_sources not cites_specific_lines — the research path is no longer the code-citation regex.
  Full suite green (7532 passed, 0 failed, no -k filter), mypy --strict clean (2390 files), ruff + pre-commit
  clean. Child of OMN-12646 (Delegation, SEA & Model-Routing Quality).
