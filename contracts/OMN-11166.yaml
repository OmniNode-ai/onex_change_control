---
schema_version: "1.0.0"
ticket_id: "OMN-11166"
title: "Make omniintelligence boundary parity gate blocking"
summary: >
  Central OCC evidence for omniintelligence PR #654. Proves the boundary parity gate is blocking, clones
  the OCC producer repo needed by the boundary manifest, and passes focused local validation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Workflow YAML parses after wiring onex_change_control into the boundary repo set."
    command: |
      uv run python -c "from pathlib import Path; import yaml; yaml.safe_load(Path('.github/workflows/ci.yml').read_text()); print('workflow yaml parsed')"
  - kind: "manual"
    description: "Pinned boundary parity validator passes with the CI repo set including onex_change_control."
    command: "uv run check-boundary-parity --repos-root <local sibling repo root>"
  - kind: "manual"
    description: "Migration conflict validator exits successfully in warn-only mode, matching CI action
      behavior."
    command: "uv run check-migration-conflicts --repos-root <local sibling repo root> --check-columns
      --warn-only"
  - kind: "ci"
    description: "omniintelligence PR #654 is open for OMN-11166 at the observed head commit."
    command: "gh pr view 654 --repo OmniNode-ai/omniintelligence --json headRefOid,title"
  - kind: "ci"
    description: "onex_change_control PR carries central OCC evidence for OMN-11166."
    command: "gh pr view 1146 --repo OmniNode-ai/onex_change_control --json headRefOid,title"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-workflow-yaml"
    description: "omniintelligence CI workflow YAML parses after the boundary repo set update."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-workflow-yaml/command.yaml\"
          && grep -q 'workflow yaml parsed' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-workflow-yaml/command.yaml\""
  - id: "dod-boundary-parity"
    description: "Boundary parity passes with onex_change_control cloned into the validator repo root."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-boundary-parity/command.yaml\"
          && grep -q 'MISMATCH: 0' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-boundary-parity/command.yaml\""
  - id: "dod-migration-conflicts-warn-only"
    description: "Migration conflict check exits 0 under warn-only mode, as configured by the composite
      action."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-migration-conflicts-warn-only/command.yaml\"
          && grep -q 'exit_code: 0' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-migration-conflicts-warn-only/command.yaml\""
  - id: "dod-pr-open"
    description: "omniintelligence PR #654 is bound to OMN-11166 at the observed head commit."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-pr-open/command.yaml\"
          && grep -q '^pr_number: 654$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-pr-open/command.yaml\"
          && grep -q '^commit_sha: \"6d867464cc15f3c1385896ae915299f79c5c2a2b\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-pr-open/command.yaml\""
  - id: "dod-occ-pr"
    description: "onex_change_control PR carries the OMN-11166 central contract and receipt evidence."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-occ-pr/command.yaml\"
          && grep -q '^pr_number: 1146$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11166/dod-occ-pr/command.yaml\""
