schema_version: 1.0.0
ticket_id: OMN-13843
title: Fix sync-only resolve_api_key crash in verification_receipt_generator CI path
summary: >-
  omnimarket PR #1573 makes HandlerVerificationReceiptGenerator resolve the GITHUB_TOKEN through a new
  loop-safe resolver (resolve_api_key_loop_safe). The handler is synchronous but the ONEX RuntimeLocal
  adapter dispatches it from inside a running event loop; _resolve_github_token called the bare sync resolve_api_key(),
  which fail-fasts ("sync-only; call resolve_api_key_async() from an async context") when a loop is running.
  Only the no-op --dry-run path succeeded, so the verification_receipt_generator mapped skill was classified
  broken in the M5 capstone dogfood sweep. handle() stays sync because the task.execute orchestrator's
  ProtocolMechanicalCheckExecutor.handle port is sync and calls it in-process.
