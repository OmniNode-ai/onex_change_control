title: "OMN-13039 — B-10: Epic auto-start ratchet + handoff epic-state gate"
summary: >-
  Retro B-10 (PROCESS_FAILURE_RETRO.md §3.B): epic OMN-12952 sat unstarted all day under 22 merged PRs;
  detected twice, fixed zero times; manually marked In Progress 2026-06-12. Changes ship together. (1)
  omniclaude PR #1767: adds the epic.autostart_ratchet capability to node_skill_ticketing_triage_orchestrator
  (epic_reconcile.py pure compute + frozen models + canonical EnumLinearStatusType; node.py exposes reconcile_epic_states();
  contract.yaml declares the capability + io_operation) so an unstarted epic (Backlog/Todo) with >=1 started/completed
  child ratchets to In Progress on a single triage tick (monotone; never auto-Done). Also adds the required
  epic_states_reconciled gate to the /onex:handoff skill — the gate verifies every cited epic is In Progress
  or later before writing the manifest; unstarted epics without an exception line block the write. (2)
  omnimarket PR #1242: adds Phase 5c (_phase_epic_autostart) to HandlerLinearTriage with the same ratchet
  semantics for the live triage sweep, plus MARK_IN_PROGRESS + WOULD_MARK_IN_PROGRESS on EnumTriageAction
  and epics_started on ModelLinearTriageResult / ModelLinearTriageCompletedEvent. 10 new TDD unit tests.
