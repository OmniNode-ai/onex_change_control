          schema' "${d}/pr.txt" && grep -Fq 'f0b9661891a061bb8af87f8db9bcd13d9e7c3c82' "${d}/pr.txt" &&
          for p in src/omnimarket/nodes/node_projection_baselines/contract.yaml src/omnimarket/nodes/node_projection_baselines/handlers/handler_projection_baselines.py
          src/omnimarket/nodes/node_projection_baselines/migrations/0002_realign_child_tables_to_producer_schema.sql
          tests/test_omn14513_baselines_seam.py tests/test_projection_handlers.py tests/test_golden_chain_projection_baselines.py;
          do grep -Fq "$p" "${d}/pr.txt"; done
  - id: "dod-omnimarket-pr-1768-conflict-repair"
    description: >-
      Conflict repair verification for omnimarket PR #1768. Codex merged current dev, resolved ROI/quality
      sibling-node conflicts to the newer OMN-14630 implementation already on dev, and recorded the local
      post-merge verification results in the product PR body.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1768; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=f0b9661891a061bb8af87f8db9bcd13d9e7c3c82;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,body --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and (.body | contains("Merge-sweep conflict repair evidence")) and (.body
          | contains("OMN-14630 real-producer-schema implementation")) and (.body | contains("73 passed"))
          and (.body | contains("git diff --check: PASS")) and (.body | contains("commit hooks with OMNI_HOME
          and OMNIBASE_INFRA_PATH: PASS"))' | grep -qx true
  - id: "dod-omnimarket-pr-1768-deploy-scope"
    description: >-
      Deploy-scope audit for omnimarket PR #1768. The diff is limited to omnimarket code, contracts, tests,
      and node migrations; it does not perform a live deploy, restart, .201 mutation, systemd change,
      compose change, or deploy-script change.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1768; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=f0b9661891a061bb8af87f8db9bcd13d9e7c3c82;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,files --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and ((.files | map(.path)) | all((startswith("src/omnimarket/") or startswith("tests/")
