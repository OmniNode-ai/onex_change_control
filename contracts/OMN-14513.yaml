  - id: "dod-omnimarket-pr-1768-product-head"
    description: >-
      Product-head verification for omnimarket PR #1768 at f0b9661891a061bb8af87f8db9bcd13d9e7c3c82. The
      proof reads live PR metadata and changed files from GitHub, then checks the branch is based on dev,
      carries the expected OMN-14513 title, includes the projection-baselines handler/contract, migration,
      and seam test surfaces, and records the post-conflict repair commit.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1768; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=f0b9661891a061bb8af87f8db9bcd13d9e7c3c82;
          d="$(mktemp -d)" && gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,baseRefName,title,body,files
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + .body + "\n" + ((.files | map(.path))
          | join("\n"))' > "${d}/pr.txt" && grep -Fq "${PRODUCT_HEAD}" "${d}/pr.txt" && grep -Fxq dev
