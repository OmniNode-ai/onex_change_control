---
schema_version: "1.0.0"
ticket_id: OMN-10475
title: "Extract zone-filter as reusable workflow + expand DOCS prefixes for OCC evidence"
summary: "Ship the zone-filter as a reusable GitHub Actions workflow callable from any OmniNode repo,
  and expand zone_classifier._DOCS_PREFIXES to also cover contracts/, drift/dod_receipts/, allowlists/,
  and .evidence/ so OCC contract+receipt PRs short-circuit the heavy CI matrix the same way docs-only
  PRs do."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "Zone classifier + zone-diff filter unit tests pass locally"
    command: "cd ${OMNI_HOME:-/Users/jonah/Code/omni_home}/omni_worktrees/zone-ecosystem/omnibase_core
      && env -u PYTHONPATH uv run pytest tests/validation/test_zone_classifier.py tests/scripts/test_zone_diff_filter.py
      -q"
  - kind: tests
    description: "Touched zone classifier + test file pass ruff format and check"
    command: "cd ${OMNI_HOME:-/Users/jonah/Code/omni_home}/omni_worktrees/zone-ecosystem/omnibase_core
      && env -u PYTHONPATH uv run ruff check src/omnibase_core/validation/zone_classifier.py tests/validation/test_zone_classifier.py
      && env -u PYTHONPATH uv run ruff format --check src/omnibase_core/validation/zone_classifier.py
      tests/validation/test_zone_classifier.py"
  - kind: tests
    description: "mypy --strict passes on the modified zone_classifier module"
    command: "cd ${OMNI_HOME:-/Users/jonah/Code/omni_home}/omni_worktrees/zone-ecosystem/omnibase_core
      && env -u PYTHONPATH uv run mypy src/omnibase_core/validation/zone_classifier.py --strict"
  - kind: tests
    description: "Pre-commit hooks pass for all touched files in the omnibase_core PR"
    command: "cd ${OMNI_HOME:-/Users/jonah/Code/omni_home}/omni_worktrees/zone-ecosystem/omnibase_core
      && env -u PYTHONPATH pre-commit run --files .github/workflows/zone-filter.yml .github/workflows/ci.yml
      src/omnibase_core/validation/zone_classifier.py tests/validation/test_zone_classifier.py"
  - kind: ci
    description: "onex_change_control#1127 carries the OMN-10475 reusable zone-filter caller evidence."
    command: "gh pr checks 1127 --repo OmniNode-ai/onex_change_control"
  - kind: ci
    description: "onex_change_control#1202 carries the OMN-10475 central evidence repair."
    command: "gh pr checks 1202 --repo OmniNode-ai/onex_change_control"
  - kind: ci
    description: "omniclaude#1601 carries the OMN-10475 zone-filter caller wiring."
    command: "gh pr checks 1601 --repo OmniNode-ai/omniclaude"
  - kind: ci
    description: "omnimarket#694 carries the OMN-10475 reusable zone-filter caller wiring."
    command: "gh pr checks 694 --repo OmniNode-ai/omnimarket"
