title: "fix(OMN-13921): platform_readiness fails fast on unset ONEX_INFRA_SSH_TARGET"
summary: >-
  omnimarket PR #1602 fixes the platform_readiness skill executable-path defect. node_platform_readiness
  resolved ONEX_INFRA_SSH_TARGET at import time with a silent empty-string default, so every auto-collected
  SSH-backed readiness probe ran as ssh '' ... (empty host) and timed out. The fix removes the import-time
  snapshot, adds a typed InfraSshTargetNotConfiguredError plus call-time resolution inside _collect_dimensions
  (unset/blank fails fast, CLAUDE.md rule 8), threads the resolved host through all five ssh-backed checks,
  and maps the typed error to a CONFIG ERROR exit 2 in __main__. Explicit request dimensions still bypass
  SSH resolution. Contract env docs updated to state the fail-fast behavior.
