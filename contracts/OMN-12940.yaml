schema_version: "1.0.0"
ticket_id: "OMN-12940"
title: "Recursively unwrap double-wrapped transport envelopes in auto-wiring dispatch"
summary: >
  The runtime auto-wiring dispatch layer (omnibase_infra) constructs the contract input_model itself via
  model_validate(_extract_dispatch_payload(envelope)) before the handler runs. _extract_dispatch_payload
  unwrapped exactly one level, so a double-wrapped delivery stayed an envelope and model_validate raised
  "N validation errors ... Field required" — bypassing the omnimarket handler-side coerce/unwrap fixes
  (OMN-12935/12936). A second site, the post-handler correlation read in _normalize_handler_result, called
  bare UUID() on a non-hex candidate and crashed dispatch with "badly formed hexadecimal UUID string".
  This makes the unwrap recursive/envelope-aware (mirroring omnimarket's _ENVELOPE_MARKER_KEYS predicate)
  and routes the correlation read through the existing _coerce_uuid_or_none guard. Code-only fix in src/omnibase_infra/runtime/auto_wiring/handler_wiring.py
  with a failing-first unit test; no runtime topology, topic schema, or contract API change.
