title: "[A1] Re-home node_hostile_reviewer inference bridge + review-finding models + prompt/parse computes"
summary: >-
  Phase A1 of the canonical node migration (epic OMN-13205, consuming the A0 ledger OMN-13206). Re-homes
  the four node_hostile_reviewer platform primitives into canonical shared homes so no canonical node
  imports node-internal packages: the inference bridge (AdapterInferenceBridge / ModelInferenceAdapter
  / ModelInferenceBridgeConfig) becomes owned by omnimarket.inference.adapter_inference_bridge (was a
  re-export shim over the node); the review-finding models (ModelReviewFinding + enums) move to omnimarket.models.model_review_finding;
  build_prompt + ModelPromptBuilderInput/Output move to omnimarket.review.prompt_builder; parse_model_response
  + ModelParseResult + EnumParseStatus move to omnimarket.review.response_parser. The 5 direct importers
  (node_adr_segmentation/extraction_grader/ decision_extraction_llm_effect, node_pr_semantic_grader_llm_effect,
  node_pr_review_bot) + their tests are repointed to the canonical owners, plus the node_pr_review_bot
  contract.yaml AdapterInferenceBridge module declaration. The stale pr_review_bot -> hostile_reviewer
  review-finding entries are removed from the cross-node reach-in allowlist. The node tree keeps thin
  re-export modules so the B1 rebuild (OMN-13210) can delete the shell. A golden-chain test for node_pr_semantic_grader_llm_effect
  closes a coverage gap surfaced by the import repoint. The relocated bridge's pre-existing raw-httpx/CLI-subprocess
  dispatch is allowlisted as freestanding imperative debt citing OMN-13210 (the ticket that deletes it
  via the canonical INTENT_TO_EFFECT hop).
