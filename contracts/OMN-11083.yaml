    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11083/dod-core-pr/command.yaml\"
          && grep -q '^pr_number: 1087$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11083/dod-core-pr/command.yaml\""
