schema_version: "1.0.0"
ticket_id: "OMN-11083"
title: "Contract-Driven Hook Opt-In Mechanism"
summary: >
  Bridge omniclaude hook_activations.yaml enabled_by_default declarations into the EnumHookBit default
  mask and regenerated hook_bits.sh so newly introduced enforcement gates are valid bits but opt-in by
  default.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
evidence_requirements:
  - kind: "tests"
    description: "Contract-to-mask tests pass in omnibase_core and omniclaude."
    command: "uv run pytest tests/enums/test_hook_bit_contract_mask.py tests/unit/test_enum_hook_bit.py
      tests/unit/scripts/test_gen_hook_bits.py tests/unit/models/contracts/test_model_package_hook_activations.py
      -v && uv run pytest tests/hooks/test_hook_activations_contract.py tests/unit/test_hook_activations_yaml.py
      -v"
  - kind: "ci"
    description: "omnibase_core and omniclaude PRs are opened with Receipt Gate evidence pinned through
      OCC."
    command: "gh pr view 1087 --repo OmniNode-ai/omnibase_core && gh pr view 1593 --repo OmniNode-ai/omniclaude"
dod_evidence:
