schema_version: "1.0.0"
ticket_id: "OMN-12961"
title: "omnibase_core ServiceHandlerResolver rejects typing.Protocol handler targets with an attributable
  error"
summary: >
  ServiceHandlerResolver.resolve Step 5 (service_handler_resolver.py:185) called handler_cls() for any
  handler whose required-param scan returned empty. A typing.Protocol's synthetic __init__ = _no_init_or_replace_init(*args,
  **kwargs) exposes only VAR_POSITIONAL/VAR_KEYWORD params, which the POSITIONAL_OR_KEYWORD/KEYWORD_ONLY
  scan excludes, so a Protocol used as a handler_routing target looked zero-arg and was instantiated,
  raising the anonymous TypeError("Protocols cannot be instantiated") from typing.py:1774. Uncaught on
  any call path not behind the infra OMN-12501 quarantine, this took down the ENTIRE runtime bootstrap
  for one bad contract with no attribution to the offending contract/handler (fault classification (b)
  of RESOLVER-CRASH-DIAGNOSIS.md; primary contract fix is OMN-12956 in omnimarket). Fix adds Step 1a:
  fail fast on a _is_protocol handler_cls BEFORE any instantiation path, raising an identifying TypeError
  that names the handler module.name and the owning contract. The marker is duck-typed (omnibase_core
  must not import omnibase_spi). This mirrors the infra OMN-12501 guard semantics exactly: the wiring
  layer's except TypeError still catches it and quarantines as PROTOCOL_HANDLER_DECLARATION; the failure
  stays a TypeError but becomes attributable rather than anonymous. Placed after Step 1 so a Protocol
  handler on a node not hosted here still skips cleanly. Code-only change to one resolver source file
  plus 6 TDD unit tests; no contract API, topic, or envelope change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD-first: 6 unit tests reproduce the Protocol-handler crash and assert an attributable TypeError
      (names handler module.name + contract, NOT typing's anonymous "Protocols cannot be instantiated")
      plus precedence ordering (rejected before container/event_bus probing; exempted by ownership skip).
      Red without the fix (anonymous typing TypeError); green with the Step 1a guard.
    command: "uv run pytest tests/unit/services/test_service_handler_resolver.py -q"
