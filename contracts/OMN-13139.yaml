---
schema_version: "1.0.0"
ticket_id: "OMN-13139"
title: "fix(hooks): exempt OCC evidence branches from plan-existence gate"
summary: >-
  pre_tool_use_plan_existence_gate.sh blocked Edit/Write on every ticket-shaped branch without a repo-local
  docs/plans file. OCC evidence branches live in onex_change_control and may need to create the first
  central contract or receipt, so the gate created a bootstrap dead-end. The implementation exempts ticket-shaped
  branches ending in -occ while preserving the block for normal implementation branches without plans.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "Focused hook tests pass for the OCC exemption and existing block behavior"
    command: "uv run pytest tests/hooks/test_plan_existence_gate_occ_exempt.py -v"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-hook-tests"
    description: >-
      Focused tests cover the new OCC branch exemption, normal ticket branch block, normal ticket branch
      pass-through with docs/plans present, and non-ticket branch pass-through. All four tests pass locally.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-13139/dod-hook-tests/command.yaml" && grep
          -q '^ticket_id: "OMN-13139"$' "drift/dod_receipts/OMN-13139/dod-hook-tests/command.yaml"
  - id: "dod-occ-pr-self"
    description: >-
      This onex_change_control OCC PR carries the central OMN-13139 contract and receipts that the omniclaude
      implementation PR DoD Evidence Check resolves via Evidence-Source: OCC#<this-pr> / Evidence-Ticket:
      OMN-13139.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-13139/dod-occ-pr-self/command.yaml" && grep
          -q '^ticket_id: "OMN-13139"$' "drift/dod_receipts/OMN-13139/dod-occ-pr-self/command.yaml"
  - id: "dod-deploy-assessment"
    description: >-
      Deploy assessment: no live deploy, restart, topic mutation, or .201 mutation was performed. The
      change is a hook-script conditional and focused tests. Active local hooks run from deployed plugin
      files, so a normal post-merge plugin rollout is required for developer machines to observe the exemption.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'no live deploy' "drift/dod_receipts/OMN-13139/dod-deploy-assessment/command.yaml" &&
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-13139/dod-deploy-assessment/command.yaml"
