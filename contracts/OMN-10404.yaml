---
schema_version: "1.0.0"
ticket_id: OMN-10404
title: "Proof of Life - End-to-End Verification of market CLI outputs"
summary: "Verify all eight market-owned CLI surfaces emit typed reports in text, JSON, YAML, and Markdown
  when --output is explicitly requested."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnimarket PR checks pass"
    command: "gh pr checks ${PR_NUMBER} --repo OmniNode-ai/omnimarket --watch"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "All market-owned CLI surfaces render typed reports in all four supported output formats."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/integration/test_market_cli_proof_of_life.py -q"
  - id: "dod-002"
    description: "Existing market-skill smoke baseline still passes with legacy default output behavior."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/test_market_skill_smokes.py -q"
  - id: "dod-003"
    description: "Shared CLI report helpers and modified node entrypoints pass strict type checking."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run mypy src/omnimarket/ --strict"
  - id: "dod-004"
    description: "Rendered ticket_pipeline output artifacts were generated and attached to Linear in text,
      JSON, YAML, and Markdown formats."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "python -c \"import json, yaml; d=json.load(open('/tmp/omn-10404-cli-proof/pol_json.json'));
          y=yaml.safe_load(open('/tmp/omn-10404-cli-proof/pol_yaml.yaml')); assert d['skill_name']==y['skill_name']=='ticket_pipeline'
          and d['terminal_event']==y['terminal_event']\""
      - check_type: "command"
        check_value: "grep -q 'OMNIMARKET SKILL: ticket_pipeline' /tmp/omn-10404-cli-proof/pol_text.txt
          && grep -q '## Execution' /tmp/omn-10404-cli-proof/pol_md.md"
  - id: "dod-005"
    description: "Full test suite was run with writable ONEX_STATE_DIR; remaining failures are live .201
      Kafka/Postgres reachability, not this CLI proof patch."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "ONEX_STATE_DIR=/tmp/omn-10404-onex-state uv run pytest tests/ -q"
  - id: "dod-006"
    description: "No deploy required; this proof changes local CLI rendering and tests only, with no runtime
      container or topic mutation."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "echo 'no deploy required for OMN-10404 - local CLI rendering proof only'"
