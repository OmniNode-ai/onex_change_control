---
schema_version: "1.0.0"
ticket_id: "OMN-12820"
title: "Wire node-deploy executor route for SEA generation close-loop"
summary: >-
  Fixes the stability-test close-loop blocker discovered after OMN-12851 landed: the generation consumer
  successfully emitted the node-deploy command, but runtime dispatcher construction had no explicit command
  route for omnimarket.node-deploy and sent the command to DLQ. The omnimarket fix adds explicit command
  routing for both node-generation-requested and node-deploy, wires node-deploy to HandlerGeneratedExecutor,
  and exposes the executor's runtime handle entrypoint so the command -> dispatcher -> handler -> terminal
  generated-node-invoked chain can be validated on stability-test after merge.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
