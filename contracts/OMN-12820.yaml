schema_version: "1.0.0"
ticket_id: "OMN-12820"
title: "Wire node-deploy executor route for SEA generation close-loop"
summary: >-
  Fixes the stability-test close-loop blocker discovered after OMN-12851 landed: the generation consumer
  successfully emitted the node-deploy command, but runtime dispatcher construction had no explicit command
  route for omnimarket.node-deploy and sent the command to DLQ. The omnimarket fix adds explicit command
  routing for both node-generation-requested and node-deploy, wires node-deploy to HandlerGeneratedExecutor,
  and exposes the executor's runtime handle entrypoint so the command -> dispatcher -> handler -> terminal
  generated-node-invoked chain can be validated on stability-test after merge. A follow-up stability-test
  direct-bus probe then proved node-deploy now reaches the executor but fails because runtime validation
  passes a typed ModelNodeDeploy instance while the executor still assumed dict payloads. omnimarket PR
  #1131 fixes that typed payload boundary. A post-#1131 stability-test rebuild then proved the executor
  consumed node-deploy but failed to write generated sandbox files because its default sandbox path resolved
  to unwritable .onex_state inside the image working directory. omnimarket PR #1132 moves that default
  under ONEX_STATE_DIR/ONEX_STATE_ROOT and requires another stability-test rebuild before loop closure
  can be claimed.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
