    description: "Focused evidence contract model tests pass in omnibase_compat."
    command: "uv run pytest src/omnibase_compat/tests/contracts/evidence/test_contract_evidence_spec.py
      -q"
  - kind: "ci"
    description: "The temporary compat model has retention metadata and the package retains zero upstream
      runtime dependencies."
    command: "uv run python scripts/check_compat_retention.py && uv run python scripts/validate_no_upstream_deps.py"
  - kind: "manual"
    description: "Core migration follow-up ticket exists for replacing the compat model."
