title: "test(OMN-13545): lock pattern_learning/routing/evaluation golden-chain emit wiring"
summary: >
  pattern_learning, routing, and evaluation golden chains reported 0 head-topic messages on the dev lane.
  Investigation found no missing or broken publish path inside omnimarket: routing (llm-routing-decision.v1)
  and evaluation (session-outcome.v1) head topics are declared emit-daemon fan-out targets (producers
  are omniclaude hooks via the emit daemon; silence is a runtime/IPC condition, OMN-13213); pattern_learning
  (pattern-stored.v1) is produced direct-to-bus by the omniintelligence node_pattern_storage_effect EFFECT
  node (silence = intelligence node not deployed on dev). The end-to-end omnimarket wiring is correct.
  The unguarded failure mode is drift between head topic, registry fan-out, and projection subscription.
  omnimarket PR #1373 adds a regression test that pins each head topic to its declared emit/consume path
  so drift fails CI instead of going dark on the dev lane. Live publish proof is deferred to the dev-lane
  redeploy.
