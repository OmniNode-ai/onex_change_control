schema_version: "1.0.0"
ticket_id: "OMN-13290"
title: "feat(validation): port backend/credential discipline to omnibase_core + wire infra/core/omnimarket
  (W8)"
summary: >-
  Ports omnimarket's check_backend_secret_discipline (OMN-12971) to a repo-agnostic omnibase_core validator
  (src/omnibase_core/validators/backend_secret_discipline.py) and wires it as a pre-commit hook + CI gate
  on omnibase_core (self-enforcing), omnibase_infra, and omnimarket. The validator rejects literal credentials
  (PEM private keys, service-account JSON, bearer/sk-/AIza/ya29. tokens) in committed config and requires
  a logical secret_ref/api_key_ref/api_key_env (API-key) or credential_ref (ADC) on every authenticated
  cloud backend; ADC and api-key auth are mutually exclusive. Pure COMPUTE-validator shape (analysis funcs
  take text/parsed data, no I/O; the only I/O is reading supplied paths at the boundary); no ValidatorBase/
  NodeValidator/Plugin* base class. The omnimarket-local script + test are deleted after migration — one
  canonical implementation remains. Port equivalence: 0 verdict mismatches across the equivalence corpus
  and on the live omnimarket config. Validator-standardization remediation plan W8 / GAP-5 (child of OMN-9048).
