ticket_id: "OMN-12805"
title: "Resolve provider endpoint URLs via routing authority, fail-closed (no hardcoded defaults)"
summary: >-
  Wave C of epic OMN-12803 (all URLs from the routing authority only). Replaces hardcoded provider base-URL
  literals and silent env-default fallbacks at the named omnimarket call sites with routing-authority
  resolution that fails closed when the URL is unconfigured. The node_swarm_fleet_discovery_effect handler
  drops the _OPENROUTER_BASE_URL literal and resolves the OpenRouter base URL from the OPENROUTER_BASE_URL
  routing-config value, raising ValueError when unset. node_build_loop_orchestrator/assemble_live resolves
  the local coder endpoint+served-model through ModelPolicyLoader (model_policy.yaml 'coder' policy) rather
  than raw LLM_CODER_URL / LLM_CODER_MODEL_NAME env reads; a resolve_model_id_optional method preserves
  the tiered-fallback skip semantics. config/settings drops the hardcoded https://api.z.ai example from
  the GLM URL field description. bridge_config_loader already resolves the OpenRouter base URL from config
  and fails closed (OMN-12824); its remaining LLM_CODER_URL references are env-var-NAME routing declarations
  in _MODEL_KEY_REGISTRY (the indirection layer this epic keeps), not provider-URL literals. A golden-chain
  test for node_swarm_fleet_discovery_effect is added because the coverage gate fires on the changed live-path
  node; it pins the config-resolved base URL and the fail-closed path. This OCC PR carries the central
  contract consumed by the omnimarket PR (OmniNode-ai/omnimarket#1345) Receipt Gate via Evidence-Source.
is_seam_ticket: false
