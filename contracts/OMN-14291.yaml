title: "refactor(OMN-14291): retire models→nodes import-layering back-edge in omnibase_core"
summary: >-
  omnibase_core PR #1419 retires the frozen `models.** -> nodes.**` import-layering back-edge by physically
  relocating four misplaced classes that were never domain models — they subclass Node* base classes plus
  mixins — from models/services/ to nodes/: model_service_compute.py -> node_service_compute.py (ModelServiceCompute,
  subclasses NodeCompute), model_service_reducer.py -> node_service_reducer.py (subclasses NodeReducer),
  model_service_effect.py -> node_service_effect.py (subclasses NodeEffect), and model_service_orchestrator.py
  -> node_service_orchestrator.py (subclasses NodeOrchestrator). It updates the sole src consumer (infrastructure/infra_bases.py),
  ~14 test files, two docs files, and drops the now-unmatched .importlinter ignore line. Verified by the
  import-linter oracle: the core-models-no-upward contract stays KEPT with the allowlist entry removed,
  proving the edge is genuinely gone.
