title: "Delegation cloud-escalation ladder never fires (escalation topic HWM=0) — open the three escalation
  gates so local->cloud reaches Gemini"
summary: >-
  The delegation cloud-escalation ladder never fired (escalation topic HWM=0, every terminal escalation_count=0):
  work was served local-only / Qwen and the cloud tier (gemini-2.5-flash-lite) was never reached. Root
  cause (code-confirmed): escalation failed CLOSED at three predicate gates before it could route to cloud.
  omnimarket PR #1215 (branch jonah/omn-13140-cloud-escalation, base=dev, head 3d507076965b94c185846a0c2e19cec9f5c200fb)
  opens all three. GATE 2 (handler_quality_gate.py): fallback_recommended was True only on a deterministic
  fail or a REFUSAL verdict; the common WEAK_OUTPUT / TASK_MISMATCH verdicts returned False, so the orchestrator
  terminated instead of escalating — now _recommends_fallback() escalates REFUSAL / WEAK_OUTPUT / TASK_MISMATCH
  on both the contract-DoD and legacy paths. GATE 3 (routing_tiers.yaml + bifrost_delegation.yaml): the
  canonical cloud target AI Studio cloud-gemini-flash (gemini-2.5-flash-lite, generativelanguage.googleapis.com,
  secret_ref llm.gemini.api_key) lacked the code_generation capability, so next_eligible_tier(code_generation)
  could not reach it — added code_generation to gemini-flash use_for + cloud-gemini-flash capabilities;
  cloud-vertex-gemini stays defined but intentionally NOT in the code_generation path (one canonical Gemini
  target for the proof). GATE 1 (handler_delegation_workflow.py): finish_reason=length was classed non-retryable,
  so a truncated local response terminated instead of escalating — reclassified as retryable (truncation,
  not refusal; a longer-context cloud successor can complete it), original+escalated models recorded in
  escalation_history; empty body / empty choices stay non-retryable (minimal-safe). Secret-ref discipline
  preserved (decisions on REFS only). Real-dispatch tests drive routing reducer -> inference effect ->
  quality gate reducer -> orchestrator and prove a WEAK_OUTPUT code_generation result on local escalates
  to cheap_cloud and the routing reducer resolves the canonical Gemini cloud endpoint. Config + handler-classification
  change only — no DDL, no migration, no live deploy, no .201 mutation.
