title: "P2-5a — node_context_roi_compute: N-arm COMPUTE scorer"
summary: >-
  New pure COMPUTE node scoring frozen run rows (one per task x factor_subset x trial)
  into N-arm per-subset aggregates with deltas vs the off arm. Modeled directly on
  node_on_vs_off_experiment_compute (OMN-12661). HEADLINE metrics: first_pass_rate +
  cost_per_success (not mean_attempts at max_attempts=2). Per-subset: mean/median
  attempts, first/final-pass rates, prompt/completion token deltas, cost delta and
  cost-per-success vs off, with variance. Pure, idempotent, replay-proven in fixture
  mode. Topics contract-declared on both producer and consumer ends.
