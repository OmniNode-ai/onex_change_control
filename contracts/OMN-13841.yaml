ticket_id: OMN-13841
title: Fix ONEX_CORE_095 tuple-return in build_loop/design_to_plan handlers
summary: >-
  omnimarket PR #1568 makes HandlerBuildLoop.handle() and HandlerDesignToPlan.handle() return typed frozen
  result envelopes (ModelBuildLoopResult / ModelDesignToPlanResult) instead of a raw 3-tuple. The LocalRuntimeBusAdapter
  publish path only accepts BaseModel/dict/None; the tuple raised ONEX_CORE_095_HANDLER_EXECUTION_ERROR,
  so the build_loop and design_to_plan mapped skills failed exit 1 in the M5 capstone dogfood sweep. One
  fix class unblocks both skills.
