schema_version: "1.0.0"
ticket_id: "OMN-12460"
title: "Bug — node_plan_to_tickets handler crashes on raw dict / StartCommand dispatch payload (30s timeout)"
summary: >-
  HandlerPlanToTickets.handle accessed request.plan_content directly, but the RuntimeLocal dispatch boundary
  delivers the contract input_model (ModelPlanToTicketsStartCommand) as a raw dict for operation_match
  handlers, or as a ModelPlanToTicketsStartCommand instance on the single-handler path — not the ModelPlanToTicketsRequest
  the handler operated on. The mismatched attribute (plan_path vs plan_content) raised AttributeError,
  no terminal completion event was emitted, and onex run-node hung until the 30s RuntimeLocal timeout.
  Fix: handle now accepts ModelPlanToTicketsRequest | ModelPlanToTicketsStartCommand | dict and normalizes
  the payload (validating a dict into ModelPlanToTicketsStartCommand, then reading plan_path into plan_content
  for the command shapes) before any attribute access. Adds unit tests covering the raw-dict, StartCommand-instance,
  and ModelPlanToTicketsRequest.model_validate(dict) deserialization paths plus an AttributeError regression
  guard. This OCC PR carries the central contract consumed by the omnimarket PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
