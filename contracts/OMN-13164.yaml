    description: 5 unit tests in TestBusTargetPreflightGuard all pass green
    command: "uv run pytest tests/test_codex_runtime_client.py::TestBusTargetPreflightGuard -q"
  - kind: tests
    description: >
      _check_bus_target_configured() raises ProtocolConfigurationError before EventBusKafka.default()
      is called when KAFKA_BOOTSTRAP_SERVERS is absent
    command: "uv run pytest tests/test_codex_runtime_client.py -q"
