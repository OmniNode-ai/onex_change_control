schema_version: '1.0.0'
ticket_id: OMN-13164
title: "fix(OMN-13164): fail fast with typed error when KAFKA_BOOTSTRAP_SERVERS unset"
summary: >
  Foreground merge-sweep dispatch silently fell back to localhost:19092 when KAFKA_BOOTSTRAP_SERVERS was
  not set, entering a 30-second aiokafka connection-retry loop before raising an opaque InfraTimeoutError.
  Fix: _check_bus_target_configured() raises ProtocolConfigurationError immediately before EventBusKafka
  is constructed, naming the missing env var. CLI emits a typed JSON blocker packet (bus_target_not_configured).
is_seam_ticket: false
