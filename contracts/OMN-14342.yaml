title: "feat(OMN-14342): shadow-mode test-selection instrumentation on dev CI"
summary: >-
  omnibase_core PR #1424 (child of the OMN-13969 smart-tests epic) adds observational shadow-mode test-selection
  instrumentation to dev CI: a forced-on capture step, a non-blocking shadow-compare job, a workflow_run
  harvester, a frozen ModelShadowRecord output contract, and a premise-replay script. The instrumentation
  is the evidence engine for the eventual change-aware selector rollout — it measures the selector's real-world
  escaped-failure rate WITHOUT changing what CI actually runs (the full suite still executes on the boundary).
  All eight new files are additive (5 scripts/workflows + 1 model + 2 test modules); no runtime contract,
  node, or deploy surface is touched.
