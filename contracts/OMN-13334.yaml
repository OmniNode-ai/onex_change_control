ticket_id: "OMN-13334"
title: "Close omnidash receipt-enforcement gap: add call-receipt-gate and make verify/verify required"
summary: >-
  omnidash was the sole primary repo missing both call-receipt-gate and receipt-honesty workflows, so
  omnidash PRs carried zero receipt enforcement. This ticket adds call-receipt-gate.yml (caller invoking
  the reusable receipt-gate from omnibase_core, producing the `verify / verify` check name) and receipt-honesty.yml
  (anti-gaming validator for changed DoD receipt YAMLs) to omnidash. Child of OMN-13325 (ratchet enforcement
  retro). See docs/audits/2026-06-19-ratchet-enforcement-audit.md.
