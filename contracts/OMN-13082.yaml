schema_version: "1.0.0"
ticket_id: "OMN-13082"
title: "feat(OMN-13082): expose dep_health_findings on projection API"
summary: >-
  node_projection_dep_health is a reducer that already writes the dep_health_findings table (OMN-11042,
  Done), but its contract.yaml had no projection_api stanza, so the snapshot topic onex.snapshot.projection.dep-health.findings.v1
  was never registered by build_projection_topic_map() and the table was never served on the standard
  projection API surface. This change adds the projection_api exposure (expose/topic/table + the real
  finding columns, order_by captured_at, freshness_column captured_at), mirroring node_projection_instruction_eval.
  No reducer, handler, or migration change — the table and reducer already exist. The static materialization
  ratchet passes because the contract declares the dep_health_findings write table in db_io.db_tables
  and ships the node-local migration 001_create_dep_health_findings.sql that creates it (cold DDL proof).
