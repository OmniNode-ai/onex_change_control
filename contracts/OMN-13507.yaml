schema_version: "1.0.0"
ticket_id: "OMN-13507"
title: "Re-lock omnibase_infra dev omnibase-core pin to dev HEAD carrying ModelTaskDelegatedEvent token
  fields"
summary: >-
  The dev omninode-runtime image (built in RELEASE mode) bundled omnibase-core pinned to db7f341353e598df84629b1c32514c78d554ef57
  (OMN-13444, #1296), which PREDATES the ModelTaskDelegatedEvent token-field additions. The running container's
  frozen+extra=forbid wire event lacked tokens_input, tokens_output (#1300 / 81c865f6 / OMN-13408) and
  context_pack_hash (#1299 / 1c412207b / OMN-13407), so terminal-emit raised a pydantic ValidationError
  and delegation terminal rows never persisted (blocking the OMN-13408 / P0-3 live proof). This change
  repoints the omnibase-core git pin in omnibase_infra pyproject.toml [tool.uv.sources] rev= and [tool.uv]
  override-dependencies, mirrored into uv.lock via uv lock --upgrade-package omnibase-core, from db7f341353e598df84629b1c32514c78d554ef57
  to omnibase_core dev HEAD 8ecb7efc17721dda2ce468b2e5051816ff8e89bc (a strict descendant of the old pin
  that carries all three fields). Version stays 0.46.0; the override bound >=0.44.0,<0.47.0 is unchanged.
  Pure dependency-pin re-lock; no source, version specifier, migration, schema, endpoint, or env change.
  Mirrors the OMN-13504 omnimarket relock. The downstream PR also carries the minimal CI compatibility
  fix surfaced by the relock: stage_workspace.sh now has a non-rsync copy fallback for runners without
  rsync, and the CLI receipt test now reads typed artifact metadata via attributes. This OCC PR carries
  the central contract consumed by the omnibase_infra PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
