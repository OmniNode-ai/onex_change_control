---
schema_version: "1.0.0"
ticket_id: OMN-9787
summary: "Demote file_exists as sole-proof check_type in ModelDodEvidenceItem — a sole file_exists check
  is tautological (the receipt is its own evidence), so the validator must reject evidence items whose
  only check_type is file_exists with the typed error DOD_EVIDENCE_FILE_EXISTS_SOLE_CHECK"
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
evidence_requirements:
  - kind: ci
    description: "omnibase_core PR for OMN-9787 CI checks pass (canonical ModelDodEvidenceItem lives in
      omnibase_core; validator lands there)"
    command: "gh pr checks --repo OmniNode-ai/omnibase_core --watch"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: "ModelDodEvidenceItem rejects an evidence item whose sole check_type is file_exists with
      a ValueError mentioning file_exists and weak/sole (3 unit tests: sole file_exists rejected, file_exists+command
      accepted, command-only accepted)"
    source: generated
    checks:
      - check_type: test_passes
        check_value: "uv run pytest tests/unit/models/contracts/ticket/test_model_dod_evidence_item.py::test_evidence_item_with_only_file_exists_check_rejects
          tests/unit/models/contracts/ticket/test_model_dod_evidence_item.py::test_evidence_item_with_file_exists_paired_with_command_passes
          tests/unit/models/contracts/ticket/test_model_dod_evidence_item.py::test_evidence_item_with_only_command_check_passes
          -q"
  - id: dod-002
    description: "Validator code path exists in canonical ModelDodEvidenceItem (src/omnibase_core/models/contracts/ticket/model_dod_evidence_item.py)
      — the reject_sole_file_exists_check @model_validator(mode='after') is present and raises DOD_EVIDENCE_FILE_EXISTS_SOLE_CHECK"
    source: generated
    checks:
      - check_type: command
        check_value: "grep -nE \"reject_sole_file_exists_check|DOD_EVIDENCE_FILE_EXISTS_SOLE_CHECK\" src/omnibase_core/models/contracts/ticket/model_dod_evidence_item.py"
  - id: dod-003
    description: "Schema-purity respected: the validator performs no I/O — no open(), Path reads, yaml.safe_load,
      requests, or os.path lookups inside the validator file. The legacy-allowlist consultation is the
      gate's job, not the model's."
    source: generated
    checks:
      - check_type: command
        check_value: "grep -nE \"\\b(open|yaml\\.safe_load|requests\\.|Path\\(|os\\.path)\\b\" src/omnibase_core/models/contracts/ticket/model_dod_evidence_item.py
          || echo 'OK: no I/O in validator file'"
  - id: dod-004
    description: "Existing ModelDodEvidenceItem and ModelTicketContract test suites still pass with the
      new validator (regression guard for downstream consumers)"
    source: generated
    checks:
      - check_type: test_passes
        check_value: "uv run pytest tests/unit/models/contracts/ticket/ -q"
  - id: dod-005
    description: "Sweep of existing onex_change_control contracts under contracts/ produces a violation
      candidate list at docs/tracking/2026-04-26-file_exists-violation-sweep.txt so the Task 8 gate (check_dod_compliance.py)
      can seed dod_evidence_legacy_file_exists.yaml"
    source: manual
    checks:
      - check_type: command
        check_value: "test -s docs/tracking/2026-04-26-file_exists-violation-sweep.txt"
