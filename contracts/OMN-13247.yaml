  - id: "dod-infra-pr-2042"
    description: >-
      Per-code-PR binding receipt for omnibase_infra PR #2042 (jonahgabriel/omn-13247-event-model-wiring-fix,
      base=dev). The PR fixes the e2e-discovered coding-agent bus wiring bug: the four coding-agent node
      contracts declared their per-handler model under handler_routing.handlers[].input_model, but the
      auto-wiring parser reads only the per-handler key event_model, so the dispatch callback handed the
      orchestrator the materialized dispatch dict instead of a typed ModelEventEnvelope and the handler
      crashed on envelope.event_type. The PR renames the per-handler key to event_model in all four contracts
      (value unchanged; node-level input_model/output_model unchanged), adds a real-dispatch-path regression
      test that fails pre-fix and passes post-fix, and commits the coding-agent runtime env vars (CODING_AGENT_CRED_HOME,
      ONEX_CODING_AGENT_WORKSPACE_ROOT) to the runtime-effects catalog + compose. This receipt binds OMN-13247
      to the infra PR by pr_number and commit_sha so downstream Receipt Gate can resolve central OCC evidence
      for the citing PR.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13247/dod-infra-pr-2042/command.yaml
