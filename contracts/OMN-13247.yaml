  - id: "dod-infra-pr-2043"
    description: >-
      Per-code-PR binding receipt for omnibase_infra PR #2043 (jonahgabriel/omn-13247-orchestrator-multitopic-route,
      base=dev). The PR fixes the e2e-discovered MULTI-OUTPUT topic-routing bug: the runtime published
      EVERY command the coding-agent orchestrator emitted to the single terminal_event topic (coding-agent-completed.v1)
      instead of each emit's intended topic, because DispatchResultApplier resolved the publish topic
      from event.topic (absent on a ModelEventEnvelope), then the class-name topic_router/output_topic_map
      (no match — an orchestrator-emitted output_event is always a ModelEventEnvelope), then the single
      output_topic fallback (the terminal_event). The fix recognizes the canonical routing field a multi-step
      orchestrator sets (ModelEventEnvelope.event_type = destination topic, same pattern as node_redeploy_orchestrator
      OMN-13211) in the applier, unwraps the inner payload to avoid double-nesting, and re-hydrates an
      envelope-accepting orchestrator's heterogeneous follow-up events with the raw domain payload (the
      second layer the #2042 entrypoint rename left). Real-dispatch hop tests drive the workflow through
      the real engine + real applier and assert the bus-received topic per hop; they fail pre-fix and
      pass post-fix. This receipt binds OMN-13247 to the infra PR by pr_number and commit_sha so downstream
      Receipt Gate can resolve central OCC evidence for the citing PR.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13247/dod-infra-pr-2043/command.yaml
