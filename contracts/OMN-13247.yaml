title: "Credential-independent coding-agent node skeleton"
summary: >-
  OMN-13247 adds the credential-independent skeleton for four canonical coding-agent nodes in omnibase_infra:
  an orchestrator, a pure FSM reducer, an invoke effect with injected subprocess/git seams, and a workspace
  validation compute node. The PR intentionally does not execute live claude/codex subprocesses before
  the Phase 0 credential proof. It registers the nodes, adds typed models, and proves the mocked dispatch/FSM
  behavior with focused local tests while keeping live execution fail-closed.
