title: "node_kafka_ingress_effect replaces kafka_runner.py daemon"
summary: >
  Phase 2b / PR-5 of the SEA stack-vs-dev reconciliation. Replaces the bespoke src/pipeline/kafka_runner.py
  daemon (its __main__, SIGINT/SIGTERM handlers, the for-msg KafkaConsumer/KafkaProducer loop, the three
  inline onex.*.omnimarket.* topic literals, and the direct generate_with_retry call) with a contract-bound
  EFFECT transport-adapter node. node_kafka_ingress_effect declares the full transport lifecycle as typed,
  validated config (ModelKafkaIngressContract, extra=forbid): source_topic_ref + dead_letter topic_ref
  resolved from src/pipeline/topics.py constants (never inline literals), consumer_group, offset_policy,
  dedupe_key, invalid_message_handling, and first-class typed dead_letter + replay sub-models. The pure
  map_ingress_envelope maps a validated external command envelope into ModelNodeGenerationRequestedCommand
  and the handler republishes it onto the in-process bus as DEMO_REQUESTED_TOPIC. The node does NOT call
  inference — zero httpx.post added; all config from the contract. Manually re-applied onto onex-self-extending-agent
  origin/dev @ 0984678 (NOT cherry-picked from the abandoned OMN-12468 stack branches).
