---
schema_version: "1.0.0"
ticket_id: "OMN-11108"
title: "feat(OMN-11108): Overlay Config Wave 2/3 — overlay config infrastructure"
summary: >-
  Implements the full overlay config infrastructure in omnibase_infra (Wave 2/3 of the overlay rollout
  begun under OMN-11069). Adds OverlayFileLoader (YAML parse + schema + chmod 600 enforcement), OverlayConfigResolver
  (PURE resolution against contract dependencies[], zero os.environ mutation, fails-closed on bad contracts),
  boot_overlay (sole env mutation authority with 5-path cold-start branching), OverlayWriter (deterministic
  atomic write, sorted enum + key iteration), overlay_from_env onboarding helper, and ModelOnboardingOutput
  extension. Sibling work of OMN-11069 — same module tree (src/omnibase_infra/runtime/overlay/), consistent
  error taxonomy, same evidence patterns.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
evidence_requirements:
  - kind: "tests"
    description: "20 overlay integration tests pass — full pipeline, all cold-start branches, replay determinism,
      insertion-order independence, onboarding round-trip, resolver purity invariant."
    command: >-
      uv run pytest tests/integration/overlay/ -v
  - kind: "manual"
    description: "Resolver fails-closed on unreadable/invalid contract.yaml (ContractParseError) rather
      than silently under-reporting required_keys."
    command: "See drift/dod_receipts/OMN-11108/dod-resolver-fail-closed/command.yaml"
  - kind: "manual"
    description: "OverlayFileLoader rejects directory-shaped paths and sanitizes parser/Pydantic error
      text (raw exception logged at DEBUG; raised message contains path only)."
    command: "See drift/dod_receipts/OMN-11108/dod-loader-hardening/command.yaml"
  - kind: "manual"
    description: "OverlayWriter no longer emits secret_count log line; CodeQL clear-text-logging-sensitive-data
      alert 1175 resolved."
    command: "See drift/dod_receipts/OMN-11108/dod-codeql-alert-1175/command.yaml"
  - kind: "manual"
    description: "Overlay modules importable from the runtime image after deploy."
    command: "See drift/dod_receipts/OMN-11108/dod-overlay-runtime-deploy/command.yaml"
