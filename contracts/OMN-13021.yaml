---
schema_version: "1.0.0"
ticket_id: "OMN-13021"
title: "Non-dev-base guard for feature-base PRs without Stacked-Parent declaration"
summary: >-
  Ships the retro A-6 guard across omnibase_compat, omnibase_infra, omniclaude, omnimarket, and onex_change_control.
  Each PR adds .github/workflows/non-dev-base-guard.yml, which fails feature-base PRs unless the PR body
  declares a Stacked-Parent. This prevents merge-sweep and queue tooling from treating feature-branch-to-feature-branch
  PRs as landed on dev. The checks run immediately on every PR; making them required across all branches
  remains an operator branch-protection/ruleset step, not a code deploy.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-cross-repo-prs"
    description: "The OMN-13021 non-dev-base guard PRs are open across the five target repos."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13021/dod-cross-repo-prs/command.yaml
          && grep -q 'omnibase_compat#151' drift/dod_receipts/OMN-13021/dod-cross-repo-prs/command.yaml
          && grep -q 'onex_change_control#2544' drift/dod_receipts/OMN-13021/dod-cross-repo-prs/command.yaml"
  - id: "dod-workflow-validation"
    description: "Each PR is workflow-only and GitHub parsed/scheduled the new non-dev-base-guard workflow."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13021/dod-workflow-validation/command.yaml
          && grep -q '.github/workflows/non-dev-base-guard.yml' drift/dod_receipts/OMN-13021/dod-workflow-validation/command.yaml"
  - id: "dod-occ-pr-2544"
    description: "onex_change_control PR #2544 carried the original OCC-side guard and PR #2549 binds
      the central OMN-13021 evidence to downstream receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13021/dod-occ-pr-2544/command.yaml
          && grep -q '^pr_number: 2549$' drift/dod_receipts/OMN-13021/dod-occ-pr-2544/command.yaml"
