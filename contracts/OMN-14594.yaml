          PRODUCT_PR_NUMBER=2303; PRODUCT_REPO=OmniNode-ai/omnibase_infra; DEPLOY_SCOPE=runtime-dispatch-deploy-assessment;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json files,body
