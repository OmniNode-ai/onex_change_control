schema_version: "1.0.0"
ticket_id: "OMN-14594"
title: "fix(OMN-14594): type-scope + per-topic-category the ledger/validation projections"
summary: >-
  omnibase_infra PR #2303 fixes ledger projection dispatch contamination by splitting node_ledger_projection_compute's
  mixed-category operation_match route into per-topic topic_match routes with ModelEventMessage event_model
  scoping, and adds event_model scoping for node_validation_ledger_projection_compute. The PR also updates
  handler wiring tests and dispatch parity fixtures for the topic-scoped dispatcher-ID shape from OMN-14580.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - public_api
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
