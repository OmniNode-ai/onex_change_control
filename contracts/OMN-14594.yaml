    description: >-
      Product-observing verification for omnibase_infra PR #2303 head f900163261b373abbcac2454ef01f7ecdf9c14aa.
      The evidence reads the PR files/body and changed contract/test files from the PR head to confirm
      the ledger projection contract split, ModelEventMessage event_model scoping, dispatch parity fixture
      update, and regression tests named in the PR proof.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2303; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=f900163261b373abbcac2454ef01f7ecdf9c14aa;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,files,body
          --jq '.headRefOid + "\n" + ((.files | map(.path)) | join("\n")) + "\n" + .body' > "$d/pr.txt"
          && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fq 'src/omnibase_infra/nodes/node_ledger_projection_compute/contract.yaml'
          "$d/pr.txt" && grep -Fq 'src/omnibase_infra/nodes/node_validation_ledger_projection_compute/contract.yaml'
          "$d/pr.txt" && grep -Fq 'tests/unit/runtime/test_ledger_projection_dispatch_reachability.py'
          "$d/pr.txt" && for p in src/omnibase_infra/nodes/node_ledger_projection_compute/contract.yaml
          src/omnibase_infra/nodes/node_validation_ledger_projection_compute/contract.yaml tests/unit/runtime/test_ledger_projection_dispatch_reachability.py;
          do mkdir -p "$d/$(dirname "$p")"; gh api "repos/OmniNode-ai/omnibase_infra/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'topic_match' "$d/src/omnibase_infra/nodes/node_ledger_projection_compute/contract.yaml"
          && grep -Fq 'ModelEventMessage' "$d/src/omnibase_infra/nodes/node_ledger_projection_compute/contract.yaml"
          && grep -Fq 'ModelEventMessage' "$d/src/omnibase_infra/nodes/node_validation_ledger_projection_compute/contract.yaml"
          && grep -Fq 'NO_DISPATCHER' "$d/tests/unit/runtime/test_ledger_projection_dispatch_reachability.py"
