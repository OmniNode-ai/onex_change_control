---
schema_version: "1.0.0"
ticket_id: "OMN-14451"
title: "OCC companion for omnimarket#1728 -- make OCC autobind publisher actually publish"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1728 (OMN-14451, with OMN-14452 included in the same
  product PR). The product PR fixes the occ-autobind publisher so it no longer sources the host-only ~/.omnibase/.env
  file from inside a runner container, publishes to the configured Kafka bootstrap secret, and fails closed
  on trusted runners when the broker is missing or delivery fails. It also fixes the deployed effects
  path that resolves GITHUB_TOKEN through the OMN-14452 sanctioned env_var_fallback mechanism across the
  OCC-autogen path and adjacent GitHub handlers. Live readback before this companion proved the publisher
  emitted an event for omnimarket#1728, but the deployed pre-merge effects runtime still failed GITHUB_TOKEN
  resolution; therefore this PR cannot honestly prove self-autobind before the fixed runtime code lands
  and is deployed. Post-merge validation must prove the machine mints a receipt on a subsequent ticketed
  PR.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnimarket#1728 head carries the publisher fail-closed fix, GITHUB_TOKEN env fallback,
      and focused tests"
    command: "see dod_evidence check_values"
  - kind: "manual"
    description: "Runtime-path deploy assessment is documented; live deploy/readback is post-merge because
      this PR fixes the deployed autobind path itself"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14451/dod-deploy-assessment/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1728-publisher-fail-closed"
    description: >-
      Product-observing check against omnimarket#1728 head 04633fca758a43f399f3bee42b15f10b0599ebc1. Reads
      the publisher workflow and script from the PR head and asserts the load-bearing OMN-14451 behavior:
      the workflow uses KAFKA_BOOTSTRAP_SERVERS from secrets instead of sourcing the host-only ~/.omnibase/.env
      file; it passes RUNNER_IS_TRUSTED into the script; the script fails trusted runs when no broker
      is configured; and a delivery failure exits non-zero instead of reporting success.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          workflow="$(mktemp)" && script="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/.github/workflows/call-occ-autobind.yml?ref=04633fca758a43f399f3bee42b15f10b0599ebc1"
          --jq .content | base64 -d > "$workflow" && gh api "repos/OmniNode-ai/omnimarket/contents/scripts/publish_occ_autobind_command.py?ref=04633fca758a43f399f3bee42b15f10b0599ebc1"
          --jq .content | base64 -d > "$script" && grep -F -- 'KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS
          }}' "$workflow" && grep -F -- 'RUNNER_IS_TRUSTED:' "$workflow" && grep -F -- 'KAFKA_BOOTSTRAP_SERVERS
          comes ONLY from the repo secret now' "$workflow" && grep -F -- 'def _is_trusted_runner()' "$script"
          && grep -F -- 'broker MUST be resolvable here' "$script" && grep -F -- 'Kafka delivery failed'
          "$script"
  - id: "dod-verify-1728-github-token-env-fallback"
    description: >-
      Product-observing check against omnimarket#1728 head 04633fca758a43f399f3bee42b15f10b0599ebc1. Reads
      the changed runtime source files from the PR head and asserts that GITHUB_TOKEN resolution uses
      the declared env_var_fallback=ref path in the OCC companion emitter, PR lifecycle GitHub adapter,
      admin merge, auto-rebase, comment resolution, thread reply, verification receipt generator, and
      GitHub repo gateway token resolver. This is the OMN-14452 fix for deployed secret_resolver.yaml
      configurations that intentionally do not map non-LLM GITHUB_TOKEN through the secret store.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          for path in src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/occ_companion_emitter.py
          src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/adapter_github_cli.py src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/handler_admin_merge.py
          src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/handler_auto_rebase.py src/omnimarket/nodes/node_pr_lifecycle_fix_effect/handlers/handler_comment_resolution.py
          src/omnimarket/nodes/node_thread_reply_effect/handlers/handler_thread_reply.py src/omnimarket/nodes/node_verification_receipt_generator/handlers/handler_verification_receipt.py
          src/omnimarket/nodes/node_github_repo_gateway_effect/token_resolver.py; do tmp="$(mktemp)" &&
          gh api "repos/OmniNode-ai/omnimarket/contents/${path}?ref=04633fca758a43f399f3bee42b15f10b0599ebc1"
          --jq .content | base64 -d > "$tmp" && grep -F -- 'GITHUB_TOKEN' "$tmp" && grep -F -- 'env_var_fallback=ref'
          "$tmp"; done
  - id: "dod-verify-1728-focused-tests"
    description: >-
      Focused local verification of omnimarket#1728 head 04633fca758a43f399f3bee42b15f10b0599ebc1 in an
      isolated worktree. The new publisher tests cover trusted missing-broker failure, untrusted skip,
      missing RUNNER_IS_TRUSTED fail-fast, and delivery failure fail-closed. The secret resolver tests
      reproduce the deployed-lane resolver shape: GITHUB_TOKEN fails without env_var_fallback, resolves
      with env_var_fallback, and still fails closed when the fallback env var is absent. Python ruff passed
      on all changed Python files; actionlint passed on call-occ-autobind.yml.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          tmp="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/tests/unit/nodes/node_pr_lifecycle_fix_effect/test_publish_occ_autobind_command.py?ref=04633fca758a43f399f3bee42b15f10b0599ebc1"
          --jq .content | base64 -d > "$tmp" && grep -F -- 'TestFailClosedOnTrustedRunner' "$tmp" && grep
          -F -- 'test_missing_broker_on_trusted_runner_fails_loudly' "$tmp" && grep -F -- 'test_missing_broker_on_fork_runner_skips_gracefully'
          "$tmp" && grep -F -- 'test_missing_runner_is_trusted_flag_fails_fast' "$tmp" && grep -F -- 'test_broker_present_publishes_regardless_of_trust_flag'
          "$tmp" && secret_tests="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/tests/unit/inference/test_secret_store_resolver.py?ref=04633fca758a43f399f3bee42b15f10b0599ebc1"
          --jq .content | base64 -d > "$secret_tests" && grep -F -- 'test_red_github_token_unresolvable_without_env_var_fallback'
          "$secret_tests" && grep -F -- 'test_green_github_token_resolves_via_env_var_fallback' "$secret_tests"
          && grep -F -- 'test_still_fails_closed_when_token_is_genuinely_absent' "$secret_tests"
  - id: "dod-deploy-assessment"
    description: >-
      Deploy DoD evidence for omnimarket#1728 runtime-path changes. The product head is pre-merge test
      verified and the live .201 readback proved the deployed pre-merge runtime still fails GITHUB_TOKEN
      resolution, so no live deploy, restart, Kafka mutation, database mutation, or .201 mutation was
      performed for this PR. The required post-merge deploy smoke is a runtime-effects container readback
      proving the fixed GITHUB_TOKEN env_var_fallback path can mint or process an OCC autobind receipt.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-14451/dod-deploy-assessment/command.yaml &&
          grep -q 'No live deploy' drift/dod_receipts/OMN-14451/dod-deploy-assessment/command.yaml &&
          grep -q 'docker exec omninode-runtime-effects' drift/dod_receipts/OMN-14451/dod-deploy-assessment/command.yaml
  - id: "dod-occ-self-branch"
    description: >-
      Self-bind item for this OCC companion branch. It binds the onex_change_control companion branch
      jonah/omn-14451-occ-omnimarket-1728 so hosted OCC eligibility can associate PASS evidence with the
      OCC PR under review. Substantive product evidence is carried by the three product-observing entries
      above.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14451-occ-omnimarket-1728' drift/dod_receipts/OMN-14451/dod-occ-self-branch/command.yaml
  - id: "occ-self-bind-pr-4040"
    description: >-
      Self-bind item for onex_change_control PR #4040 after GitHub allocated the companion PR number.
      The first branch self-bind was sufficient as local evidence but hosted Receipt Gate requires a PASS
      receipt bound to PR #4040 or one of its commit SHAs. Product-observing evidence remains in the omnimarket#1728
      entries above; this item only binds the OCC companion PR under review.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^pr_number: 4040$' drift/dod_receipts/OMN-14451/occ-self-bind-pr-4040/command.yaml
          && grep -q '3368e3256f6d35ad557765d1f442c26b8679bd6e' drift/dod_receipts/OMN-14451/occ-self-bind-pr-4040/command.yaml
  - id: "occ-self-bind-pr-4044"
    description: >-
      Self-bind item for onex_change_control PR #4044 after GitHub allocated the deploy-assessment companion
      PR number. Hosted OCC eligibility requires a PASS receipt bound to PR #4044 or one of its commit
      SHAs. Product-observing and deploy-assessment evidence remains in the omnimarket#1728 entries above;
      this item only binds the OCC companion PR under review.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^pr_number: 4044$' drift/dod_receipts/OMN-14451/occ-self-bind-pr-4044/command.yaml
          && grep -q '2cc172f0f408368d469af1ec82d2e2b44ca6738d' drift/dod_receipts/OMN-14451/occ-self-bind-pr-4044/command.yaml
