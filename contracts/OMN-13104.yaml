ticket_id: "OMN-13104"
title: "fix(omnimarket): remove stray top-level runtime_profiles from node_delegate_skill_orchestrator
  — DEL-01..07 dispatcher blocker"
summary: >-
  node_delegate_skill_orchestrator declared runtime_profiles: [main] at top-level AND descriptor.runtime_profiles:
  [effects]. profile_ownership.py reads top-level first and only falls back to descriptor when top-level
  is absent — the node was wired into the main kernel with no dispatcher, routing every onex.cmd.omnimarket.delegate-skill.v1
  command to the DLQ. Fix: remove the stray top-level runtime_profiles: [main] block. The descriptor value
  [effects] is correct and sufficient. Also removes stray top-level runtime_profiles: [stability, demo]
  from node_contract_registry (same class of error), and carries forward the node_volume_config_drift_sweep
  compute→workers fix from OMN-13068/PR#1203. Adds regression gate test_no_toplevel_runtime_profiles_shadow.py.
