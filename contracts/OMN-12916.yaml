ticket_id: "OMN-12916"
title: "Move dashboard runtime data-source authority from env to served contract runtime config"
summary: >-
  Binds omnidash evidence-pipeline reads to the canonical projection topic API and moves Postgres projection
  database selection behind data_source.postgres_database_url_secret_ref in contract overlays. Removes
  the evidence-specific Vite env/proxy path so the dashboard cannot silently split evidence widgets onto
  a second backend while other widgets read /projection/{topic}. Adds /api/runtime-config to expose runtime
  projection authority and DB secret-ref resolution state without leaking the database URL.
