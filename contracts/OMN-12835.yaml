---
schema_version: "1.0.0"
ticket_id: "OMN-12835"
title: "Restore delegation runtime discovery with declared compatibility publish topics"
summary: >-
  The stability runtime skipped node_delegation_orchestrator because active package filtering treated
  its legacy Omniclaude compatibility publish topic as an inactive runtime package domain. The command
  consumer still subscribed, so delegate-skill commands reached the bus but failed with no dispatcher
  registered for omnibase-infra.delegation-request. This change makes compatibility publish topics an
  explicit typed contract field, keeps ordinary active-package filtering strict, and declares the legacy
  task-delegated event on the delegation orchestrator contract.
