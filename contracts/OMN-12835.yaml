---
schema_version: "1.0.0"
ticket_id: "OMN-12835"
title: "Wire typed contract-side execution-graph DAG into orchestrator contracts (stop silently dropping
  declared DAGs)"
summary: >-
  Wave B of the imperative-orchestrator decomposition (epic OMN-12525 / OMN-13471). Adds typed contract-side
  DAG models to omnibase_core so an orchestrator contract's declared workflow_coordination.workflow_definition.execution_graph
  is no longer silently dropped at the type boundary (ModelWorkflowConfig previously had no workflow_definition
  field and extra="ignore"). New additive models mirror the live YAML and the ModelFSMSubcontract validator
  pattern: ModelContractWorkflowNode (node_id: str, node_type: str, depends_on: list[str] = []; frozen),
  ModelContractExecutionGraph (no-duplicate-id + no-dangling-edge + acyclicity validators), ModelContractWorkflowMetadata,
  and ModelContractWorkflowDefinition (workflow_metadata, execution_graph, optional coordination_rules).
  ModelWorkflowConfig gains workflow_definition: ModelContractWorkflowDefinition | None = None, and ModelContractOrchestrator.INTERFACE_VERSION
  is bumped 1.0.0 -> 1.1.0. The contract-side string-keyed DAG is kept separate from the runtime UUID
  model (ModelWorkflowNode) per the OMN-7591/7782 namespacing caution; full unification is the gated OMN-12525
  Phase 2 / OMN-656 follow-up. 0 blast radius on the ~52 non-declaring contracts (workflow_definition
  is optional). This OCC PR carries the central contract consumed by the omnibase_core product PR Receipt
  Gate via Evidence-Source.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
