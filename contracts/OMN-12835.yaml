      is populated with 5 nodes (receive_request, route_operation, execute_compute, execute_effects, publish_outcome)
      and 4 dependency edges, with each depends_on edge correctly wired and node_ids as the declared strings.
      The live node_intelligence_orchestrator/contract.yaml validates through ModelWorkflowConfig producing
      5 nodes / 4 edges. 7/7 focused tests pass.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12835/dod-001/command.yaml"
  - id: "dod-002"
