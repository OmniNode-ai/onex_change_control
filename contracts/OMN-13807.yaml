ticket_id: "OMN-13807"
title: "fix(OMN-13807): reconcile canonical embedding endpoint :8100 -> :8002"
summary: >-
  The .201 embedding backend moved from :8100 (dead process, circuit-breaker OPEN) to :8002
  (vllm-embeddings, qwen3-embedding-0.6b). OMN-13664 fixed the runtime env surfaces (dev.bifrost.yaml,
  env-master-template.env, ~/.omnibase/.env) but left the canonical topology contract
  contracts/llm_endpoints.yaml (slot embeddings-201) still pointing at the dead :8100 — so a redeploy
  would re-resolve the dead endpoint, and the env-contract guard scripts/check_llm_endpoint_env_contract.py
  would reject the corrected :8002 env value as a non-running slot. This reconciles the topology contract
  to :8002, updates the guard test fixture to track the reconciled endpoint, and corrects the
  LLM_EMBEDDING_URL surfaces in docs/architecture/LLM_INFRASTRUCTURE.md. This is a config + guard + docs
  change: it touches NO deploy-gate runtime path (no Dockerfile, compose, node contract/handler, or
  src/omnibase_infra/runtime/**) and performs no prod/judge/stability mutation. The .201 runtime restart
  to pick up :8002 is a separate operator-gated deploy step, not part of this PR.
is_seam_ticket: false
