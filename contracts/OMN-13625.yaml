ticket_id: "OMN-13625"
title: "WS-C SEA Phase 7.2: auto entry-point registration for merged generated nodes"
summary: >-
  OMN-13625 extends node_generated_node_publish_effect so a generated node's entry point is registered
  in pyproject.toml [project.entry-points."onex.nodes"] automatically when the publish effect commits
  the package — no manual pyproject edit required. Implementation: module-level _derive_module_prefix
  (strips src/ layout) + _patch_pyproject_entry_point (idempotent text patcher, stdlib only) + _register_entry_point
  handler method invoked BEFORE git add so the pyproject.toml change ships in the same commit. ModelGeneratedNodePublishInput
  gains register_entry_point: bool = True; ModelGeneratedNodePublishResult gains entry_point_registered:
  bool. contract.yaml declares both fields in inputs/outputs. 27 targeted tests (17 new unit + 5 new golden-chain
  + 5 existing updated); full suite 9848 passed / 0 regressions. Depends on Phase 7.1 (OMN-13624, merged
  2026-06-26). Product PR: omnimarket #1465.
