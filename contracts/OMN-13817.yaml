schema_version: "1.0.0"
ticket_id: OMN-13817
title: "feat(OMN-13817): fail-closed durable-evidence gate on node_linear_triage close path"
summary: >-
  Close-batch wf_1628d9a5 flipped implementation tickets Backlog->Done with no durable evidence (startedAt=null,
  zero attachments, zero PRs, sub-second bulk close), corrupting the Linear board as a completion signal.
  omnimarket PR #1554 adds a pure-logic ClosePolicyGate (node_linear_triage/services/close_evidence_gate.py)
  and routes every save_issue(state="Done") in node_linear_triage through a single _mark_done chokepoint
  that enforces it: a Done flip is refused unless it carries a recognized durable evidence kind (merged
  implementing PR, superseding sibling PR, all-children-done roll-up, or a tracked OCC receipt) with a
  non-empty detail. A no-evidence close — the wf_1628d9a5 signature — raises CloseEvidenceRefusedError
  before any Linear mutation. Compile-only node logic + tests; no runtime deploy, no .201 mutation, no
  Linear writes performed by this PR.
