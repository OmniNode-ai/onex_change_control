schema_version: "1.0.0"
ticket_id: "OMN-12432"
title: "CI uv sync git-dep fetches fail (unauthenticated/uncached) — Empty reply from server"
summary: >
  Authenticate uv's internal git+https dependency fetches in omnibase_infra CI. Anonymous github.com fetches
  from the self-hosted runners hit the 60/hr anonymous rate limit and fail with "Empty reply from server"
  under parallel --no-cache uv syncs, blocking omnibase_infra PRs #1781/#1782. The fix wires a process-scoped
  insteadOf rewrite (GIT_CONFIG_* env vars, never persisted to disk) using the CI token in the setup-python-uv
  composite action and the omni-standards-compliance uv-sync jobs.
is_seam_ticket: false
