schema_version: "1.0.0"
ticket_id: "OMN-12798"
title: "P2-5b node_context_roi_runner (EFFECT): drive generation over the bus per (task x factor subset)"
summary: >
  Lands the context-ROI experiment runner EFFECT (node_context_roi_runner) in omnimarket. The runner drives
  the generation pipeline over the bus per (task x factor_subset x trial): it assembles a context pack,
  publishes the generation command on the contract-declared command topic, consumes the terminal generation
  event correlated by correlation_id, reads back attempt_count / first_pass_success / tokens / model identity
  from the typed event payload (P2-1 seam, OMN-12794), and emits one ModelAttemptReductionRow per cell.
  Fails closed when attempt_count is absent. Bus is the transport: no in-process GenerationConsumer import,
  no kafka_runner, no hardcoded topic literals (all topics read from contract.yaml); model/provider/ endpoint
  identity is echoed from the terminal event, never hardcoded. This PR is runner-merge-only: it registers
  the node entry-point, fixes a missing test import, and ships the node's own golden-chain test. Stub
  content assembly is fixed by a parallel agent on the same dev base. Code-only change with no runtime
  topology, topic schema, or contract API change beyond the node's own contract; applies on the next normal
  omnimarket image rebuild.
