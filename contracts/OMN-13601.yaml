      on the changed files passes; the full omnimarket pytest suite is green except 3 pre-existing @pytest.mark.kafka
      integration tests that require a live broker on localhost:9092 (not running locally; unrelated to
      this change).
    command: "uv run mypy src/omnimarket/adapters/codex/local_runtime_dispatch.py src/omnimarket/nodes/node_delegate_skill_orchestrator/
      --strict"
