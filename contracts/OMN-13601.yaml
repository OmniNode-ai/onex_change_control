schema_version: "1.0.0"
ticket_id: "OMN-13601"
title: "bus-less onex delegate --bus inmemory routes through LocalDelegationDispatchPort instead of timing
  out on the orchestrator terminal-wait"
summary: >-
  The bus-less in-memory CLI delegation path (onex delegate --bus inmemory -> RuntimeLocal single-node
  runtime -> HandlerDelegateSkill) never reached LocalDelegationDispatchPort.dispatch(). HandlerDelegateSkill
  selected RuntimeDelegationDispatchPort whenever an event_bus was injected, publishing a delegation-request
  command and waiting 300s on the delegation-completed/failed terminal events. In a single-node in-memory
  runtime there is no co-deployed downstream consumer of onex.cmd.omnibase-infra.delegation-request.v1
  (that is node_delegation_orchestrator, which receipt-mode does not boot), so the orchestrator terminal-wait
  timed out at 300s with empty provider/model_name/response and no delegation_events sqlite evidence row.
  This left the Mode-1 (local + in-memory bus = "shortest viable beta") path non-functional end-to-end
  and blocked the OMN-13597 readback. The fix introduces transport-aware dispatch-port selection owned
  by the ports package (port_selection.select_delegation_dispatch_port): a bus-less OR in-memory bus resolves
  to the in-process LocalDelegationDispatchPort (routing authority + canonical LLM effect + canonical
  quality gate + sqlite evidence row, with #1428's killable-timeout now actually applied to this path);
  an external broker bus resolves to RuntimeDelegationDispatchPort (publish + await terminal over the
  bus, where the full multi-node runtime is co-deployed). HandlerDelegateSkill stays transport-agnostic.
  The legacy LocalRuntimeDispatch driver (runtime_selection="local", distinct from the RuntimeLocal CLI
  path), which round-trips the command over its own bus with an installed downstream effect, now pins
  RuntimeDelegationDispatchPort explicitly so its behavior is unchanged. This PR ships no runtime contract/topic/migration
  change and performs no live deploy or runtime restart.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
