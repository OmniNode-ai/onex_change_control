---
schema_version: "1.0.0"
ticket_id: "OMN-13614"
title: "WS-C Phase 3.1: node_entropy_experiment_orchestrator — absorb harness/failure_taxonomy/coverage;
  reuse adk_eval"
summary: >
  Phase 3.1 of the SEA -> canonical migration (epic OMN-13604). New canonical ORCHESTRATOR node node_entropy_experiment_orchestrator
  in omnimarket that absorbs the SEA entropy-comparison failure taxonomy (failure_taxonomy.py -> model_entropy_failure.py:
  EntropyFailureClass, ModelEntropyFailure, entropy_failure_from_exception, entropy_failure_from_semantic,
  sanitize_failure_message) and coverage parsing (coverage.py -> model_coverage_metrics.py: ModelCoverageMetrics
  + pure parse_coverage_json), and reframes the harness.py track-driving logic as deterministic aggregation.
  The node emits the SHARED ModelExperimentResult contract from omnibase_core (OMN-13613, merge 6e26772)
  -- it does NOT invent its own result schema. Per-track evidence (success, cost, latency, coverage, closed
  failure classes) is supplied by the caller in fixture/replay mode, so the handler is stateless, deterministic,
  and performs no I/O. The subprocess-running coverage runner is intentionally NOT absorbed onto the no-I/O
  orchestrator path. All four canonical archetype constraints met (contract-declared, handler-based, stateless,
  deterministic); topics contract-sourced; no Plugin* base. omnibase_core pin bumped to 6e26772 (the OMN-13613
  contract merge) so the shared experiment result model is importable. TDD: failing contract-derived golden-chain
  test written before implementation (confirmed red), then made green (42 node tests). SEA-side deletion
  of entropy_comparison/* is a separate onex-self-extending-agent PR sequenced after the Phase-3 trio
  (3.1/3.2/3.3) reaches parity, since those modules are shared across the trio and their wholesale removal
  cascades into ~33 SEA entropy test files.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD: a failing contract-derived golden-chain test was written before implementation (confirmed red:
      ModuleNotFoundError for the handler module), then made green. The 42 node tests cover canonical
      ModelExperimentResult emission (experiment_type=ENTROPY, UUID identifiers propagated, success-fraction
      score, Decimal cost sum, COMPLETED/FAILED status, evidence_ref propagation), determinism (identical
      input -> identical output; stateless fresh handler), partial/all-fail aggregation, empty-tracks
      rejection, absorbed failure taxonomy parity (exception + semantic classification, path sanitization,
      message bounding, frozen records), absorbed coverage parsing parity (parse_coverage_json, frozen
      metrics), and contract/metadata/archetype gates (orchestrator archetype, contract-sourced topics,
      no Plugin* base, frozen UUID-typed models).
    command: "uv run pytest tests/nodes/node_entropy_experiment_orchestrator/ -q"
