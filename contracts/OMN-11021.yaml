---
schema_version: "1.0.0"
ticket_id: "OMN-11021"
title: "Migrate omnimarket memory retrieval and storage DTOs to omnimemory"
summary: >
  Binds omnimarket PR #626, which replaces duplicate memory retrieval and storage DTO definitions with
  compatibility imports from canonical omnimemory models while preserving existing omnimarket import paths
  and schema refs.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Downstream PR #626 reports focused import/schema-ref compatibility tests."
    command: "gh pr view 626 --repo OmniNode-ai/omnimarket --json state,headRefOid"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11021 to omnimarket PR #626 and deploy/D4 evidence."
    command: "find drift/dod_receipts/OMN-11021 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-626"
    description: "omnimarket PR #626 carries the OMN-11021 memory DTO import migration."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11021/dod-omnimarket-pr-626/command.yaml
          && grep -q '^pr_number: 626$' drift/dod_receipts/OMN-11021/dod-omnimarket-pr-626/command.yaml
          && grep -q '^commit_sha: 473ffe2e2de1e932c4d59205250dc5c91d5d5014$' drift/dod_receipts/OMN-11021/dod-omnimarket-pr-626/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused omnimarket import and schema-ref compatibility tests pass."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11021/dod-focused-tests/command.yaml
          && grep -q '32 passed' drift/dod_receipts/OMN-11021/dod-focused-tests/command.yaml"
  - id: "dod-d4-delta"
    description: "D4 overlay shows zero targeted omnimarket retrieval/storage DTO collisions."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11021/dod-d4-delta/command.yaml
          && grep -q 'targeted omnimarket retrieval/storage DTO collisions=0' drift/dod_receipts/OMN-11021/dod-d4-delta/command.yaml"
  - id: "dod-deploy"
    description: >
      Deploy DoD evidence for PR #626: model import compatibility change, no live deploy, restart, or
      .201 mutation required before merge; post-merge import smoke is recorded.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11021/dod-deploy/command.yaml &&
          grep -q '^pr_number: 626$' drift/dod_receipts/OMN-11021/dod-deploy/command.yaml && grep -q 'No
          live deploy' drift/dod_receipts/OMN-11021/dod-deploy/command.yaml"
  - id: "dod-occ-pr-1015"
    description: "onex_change_control PR #1015 carries the central OMN-11021 contract and receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11021/dod-occ-pr-1015/command.yaml
          && grep -q '^pr_number: 1015$' drift/dod_receipts/OMN-11021/dod-occ-pr-1015/command.yaml"
