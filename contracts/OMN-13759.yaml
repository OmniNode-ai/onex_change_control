---
schema_version: "1.0.0"
ticket_id: "OMN-13759"
title: "fix(OMN-13759): gate linear-triage done-detection on the implementing PR"
summary: >-
  node_linear_triage closed tickets on ANY merged PR that merely mentioned the ticket id (61/62 false
  positives, ~1.6% precision). The omnimarket fix gates the close path on positive implementing-PR signals
  in _find_merged_pr / _pr_implements_ticket: the PR title's primary OMN id == this ticket id, OR a Closes/Fixes/Resolves
  OMN-<id> keyword in the PR body, OR a GitHub GraphQL closingIssuesReferences link (the gh --json REST
  field is rejected by the installed gh and silently nulls). Two suppression guards are added: a close
  is suppressed when the ticket was reopened (Done -> active) after the PR merged (new LinearClientProtocol.list_issue_history),
  and when the ticket is a parent/epic with any non-done child (derived from the non-done list query with
  no extra API call). Incidental mention-only matches are rejected; branch-head matches remain accepted
  directly.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
