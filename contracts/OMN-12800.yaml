---
schema_version: '1.0.0'
ticket_id: OMN-12800
title: "Route node-generation-completed.v1 to the handler that writes generation_events"
summary: >
  Fixes a runtime-proven defect: the live auto-wiring path dispatches HandlerProjectionDelegation.handle()
  for every node_projection_delegation subscribe topic, including onex.evt.omnimarket.node-generation-completed.v1.
  The handler had no generation branch and raised ValidationError on every completed-generation event,
  leaving generation_events at 0 rows despite migration 0012 landing contract_yaml/handler_source. Adds
  ModelProjectionGenerationCompletedEvent + project_generation_completed() and routes to it from handle()
  when _event_type contains node-generation-completed. contract_yaml/handler_source persist in full (no
  truncation); dedup by correlation_id. Code fix only — no runtime/deploy.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
evidence_requirements:
  - kind: ci
    description: >
      New golden-chain class TestGenerationCompletedProjection (5 tests) passes; full node_projection_delegation
      projection suite green; full omnimarket suite (6358 tests, not kafka) green; mypy --strict 0 errors;
      ruff clean; pre-commit all hooks pass.
    command: >
      cd omnimarket && uv run pytest tests/test_golden_chain_projection_delegation.py -k TestGenerationCompletedProjection
      -q --tb=short
  - kind: docs
    description: OCC contract file OMN-12800.yaml present and schema-valid
    command: >
      cd onex_change_control && uv run validate-yaml contracts/OMN-12800.yaml
