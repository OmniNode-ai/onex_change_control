title: "Bound EventBusKafka consumer startup concurrency"
summary: >
  Bound runtime Kafka consumer startup concurrency and retry transient consumer start failures so cold
  runtime boot does not stampede the group coordinator and crash-loop when a single consumer times out.
  The implementation is carried by omnibase_infra PR #1795 with contract-backed configuration fields on
  ModelKafkaEventBusConfig and kafka_event_bus_config.yaml; no new environment fallback path is introduced.
