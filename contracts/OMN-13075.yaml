schema_version: "1.0.0"
ticket_id: "OMN-13075"
title: "feat(omnimarket): projection contract for baselines.roi (NC-02)"
summary: >
  Creates node_projection_baselines_roi in omnimarket — a reducer node that consumes onex.evt.omnibase-infra.baselines-computed.v1
  and projects an aggregated ROI summary row into the baselines_roi_snapshots table. The table is exposed
  via the projection API as onex.snapshot.projection.baselines.roi.v1, resolving the missing snapshot
  topic declared by the omnidash BaselinesROICard component registry (roi-trend, roi-by-model widgets).
  Aggregates: token_delta (sum of comparison token_delta), time_delta_ms (sum of time_delta_s×1000), retry_delta
  (sum of retry_count), recommendations JSONB (count per action promote/shadow/suppress/fork), confidence
  (average mapped score across comparisons: high=1.0, medium=0.5, low=0.25).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      11 unit tests covering: snapshot row fields, token_delta aggregation, time_delta_ms conversion,
      retry_delta sum, recommendations dict, confidence average, empty event zero-values, upsert idempotency,
      contract subscribe topic, contract projection_api snapshot topic, handle() shim delegation.
    command: "uv run pytest tests/nodes/node_projection_baselines_roi/ -v"
