summary: >-
  Retargets the one production ModelOnexEnvelope(...) constructor at src/omnibase_core/mixins/mixin_intent_publisher.py
  to ModelEventEnvelope[ModelEventPublishIntent](...), publishing the typed ModelEventPublishIntent as
  the envelope payload (not a serialized dict). Field remap: source_node->source_tool, timestamp->envelope_timestamp,
  drop operation, payload=intent (typed), add payload_type. This leaves zero live ModelOnexEnvelope constructor
  calls in src/ so B4 (OMN-13194 follow-on) can delete the class; the class definition and its docstring
  examples in model_onex_envelope.py are untouched (B4 scope). Verification REFUTED the original "IntentExecutor
  consumers must be updated in the same PR" framing: there are NO Kafka consumers of onex.runtime.intents
  — IntentExecutor is a synchronous runtime service (not a topic listener) called from ServiceDispatchResultApplier,
  and MixinIntentPublisher has zero production call sites. This is a type-correctness + test change only
  with no consumer-node diff. Tests updated to assert the new ModelEventEnvelope wire shape and a serialize->deserialize
  round-trip on the generic envelope (the strict ModelEventEnvelope[ModelEventPublishIntent] cannot reconstruct
  from JSON because ModelEventPublishIntent.target_event_payload is a ModelEventPayloadUnion whose before-validator
  rejects the plain dict JSON decoding yields — a pre-existing property of the intent model). No Kafka
  topic schema change, no DDL/migration, no runtime/deploy/.201 mutation.
