schema_version: "1.0.0"
ticket_id: "OMN-13629"
title: "collapse delegation terminal to a single canonical event (WS-F Phase 1)"
summary: >-
  WS-F Phase 1: collapse the delegation terminal to ONE canonical ModelDelegationEvent, deleting the legacy
  compat ModelTaskDelegatedEvent co-writer (onex.evt.omniclaude.task-delegated.v1). This kills the two-co-writers-of-one-row
  divergence bug class (OMN-13408 / 13335 / 13475 / 13535) at its structural root: with a single writer
  the delegation_events row can no longer diverge. node_delegation_orchestrator _emit_terminal returns
  only ModelDelegationEvent; task-delegated.v1 is removed from the orchestrator contract publish_topics
  / published_events / compatibility_publish_topics and from TOPIC_ID_TASK_DELEGATED. node_projection_savings
  is repointed off task-delegated.v1 onto the canonical delegation-{completed,failed}.v1 pair, re-deriving
  the premium counterfactual from the served tokens (a saving is banked only on a SUCCEEDED terminal;
  a FAILED terminal yields a truthful no-row). node_projection_delegation drops the legacy task-delegated.v1
  secondary subscribe path (the canonical converter is already primary). The OMN-13335 savings clamp is
  retained as an honest non-negative value floor, no longer a ge=0 crash that suppressed the terminal.
  Ships no live deploy / runtime restart; prod redeploy for this refactor is gated (OMN-13418) and out
  of autonomous scope (dev + stability are pre-authorized).
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
  - "events"
evidence_requirements:
  - kind: "tests"
    description: >-
      TDD gate tests/unit/delegation/test_single_canonical_terminal_omn13629.py — an all-tiers-failed
      research delegation emits EXACTLY ONE terminal on delegation-failed.v1, derived savings >= 0, the
      delegation_events projection row is written, and the savings runner consumes the canonical pair
      (failed terminal -> truthful no-row, no DLQ). The OMN-13408/13335/13396/13475/13477/13535 parity
      tests were de-faked from compat-event assertions onto the single canonical terminal.
    command: "uv run pytest tests/unit/delegation/test_single_canonical_terminal_omn13629.py -q"
  - kind: "ci"
    description: >-
      ruff format + ruff check + mypy --strict clean on all changed source modules (47 files, no issues);
      full pre-commit run on the changed files passes (incl. topic-naming, event-registry-drift, dependency-health,
      golden-chain coverage gates); the full omnimarket pytest suite (not kafka) is green (8889 passed,
      46 skipped, 0 failed).
    command: "uv run pytest tests/ -q -p no:cacheprovider -m 'not kafka'"
