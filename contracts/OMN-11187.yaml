---
schema_version: "1.0.0"
ticket_id: "OMN-11187"
title: "Fix: projection reducer nodes must emit terminal event on projection-delegation-applied topic"
summary: >
  DelegationProjectionRunner was writing rows to delegation_events but never publishing to onex.evt.omnimarket.projection-delegation-applied.v1.
  This fix adds _emit_terminal_event() to DelegationProjectionRunner after each successful project_event()
  DB write, publishing a ModelEventEnvelope JSON envelope to the terminal topic declared in contract.yaml.
  Pattern B broker consumers can now observe projection completions on the event bus.
