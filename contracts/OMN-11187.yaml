---
schema_version: "1.0.0"
ticket_id: "OMN-11187"
title: "Fix: projection reducer nodes must emit terminal event on projection-delegation-applied topic"
summary: >
  DelegationProjectionRunner was writing rows to delegation_events but never publishing to onex.evt.omnimarket.projection-delegation-applied.v1.
  This fix adds _emit_terminal_event() to DelegationProjectionRunner after each successful project_event()
  DB write, publishing a ModelEventEnvelope JSON envelope to the terminal topic declared in contract.yaml.
  Pattern B broker consumers can now observe projection completions on the event bus.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Golden chain tests pass including new TestTerminalEventEmission suite."
    command: "uv run pytest tests/test_golden_chain_projection_delegation.py -v"
  - kind: "ci"
    description: "Pre-commit hooks pass for changed files."
    command: "pre-commit run --all-files"
  - kind: "manual"
    description: "Terminal topic receives envelope after delegation event written to DB."
    command: "rpk topic consume onex.evt.omnimarket.projection-delegation-applied.v1 --brokers 192.168.86.201:19092
      --num 1"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-tests"
    description: "24/24 golden chain tests pass including 4 new TestTerminalEventEmission tests."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/test_golden_chain_projection_delegation.py -v 2>&1 | grep -q
          '24 passed'"
  - id: "dod-lint"
    description: "ruff, mypy strict, and pre-commit all pass for changed files."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run ruff check src/omnimarket/nodes/node_projection_delegation/ && uv run mypy
          src/omnimarket/nodes/node_projection_delegation/ --strict"
  - id: "dod-deploy-terminal-topic"
    description: "After a delegation event is projected, rpk topic consume on projection-delegation-applied
      returns a valid envelope. Terminal event emission wired in DelegationProjectionRunner._emit_terminal_event()."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "rpk topic produce onex.evt.omniclaude.task-delegated.v1 --brokers 192.168.86.201:19092
          && rpk topic consume onex.evt.omnimarket.projection-delegation-applied.v1 --brokers 192.168.86.201:19092
          --num 1"
  - id: "dod-pr"
    description: "omnimarket PR carries the fix with green CI."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr checks ${PR_NUMBER} --repo ${REPO} 2>&1 | grep -v fail | grep -q pass"
