title: "feat(OMN-10369): PRM escalation tracker + course-correction templates"
summary: >
  Adds three-strike PRM escalation logic (EscalationTracker) and per-pattern course-correction template
  strings (prm_course_corrections.py) to omnibase_core. Level 1 returns advisory, Level 2 returns stronger
  guidance plus a structured telemetry record (returned, not published), Level 3 returns a hard-stop sentinel.
  State is in-memory keyed by session_id.
is_seam_ticket: false
