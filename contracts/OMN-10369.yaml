interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: All 7 unit tests in tests/unit/agents/test_prm_escalation.py pass
    command: "cd omnibase_core && env -u PYTHONPATH uv run pytest tests/unit/agents/test_prm_escalation.py
      -v --tb=short 2>&1 | grep -E '7 passed'"
  - kind: ci
    description: mypy --strict passes on agents package and model_escalation_result
