schema_version: "1.0.0"
ticket_id: "OMN-13095"
title: "Phase 3: hook backstop rewrite"
summary: >-
  Rewrites the Layer C PostToolUse output suppressor for the skill-output-suppression plan (epic OMN-13089):
  omniclaude plugins/onex/hooks/lib/skill_output_suppressor.py + scripts/post_tool_use_output_suppressor.sh.
  The prior suppressor was a functional no-op (plain PostToolUse stdout never reaches the model — OMN-13090
  probe F1/F2 — 71,000+ fires, zero effect) and matched no onex dispatch form. New behavior: pattern coverage
  adds onex (run|node|run-node) over the kept legacy tool patterns; capture-before-suppress writes the
  full output to the content-addressed ArtifactStore (omnibase_core, OMN-13093) and emits artifact.captured
  + tool.output.captured (OMN-13092) with suppression_decision granularity; replacement uses the probe-winning
  hookSpecificOutput.updatedToolOutput OBJECT form behind a single build_replacement_output(); ModelSkillResult
  receipts pass through untouched regardless of size (Layer A idempotence, schema sniff); errors and interrupted
  runs are never suppressed; every passthrough emits NOTHING (empty stdout, no tool_info echo); artifact
  write failure passes through unmodified (fail-closed for capture, open for visibility) while emission
  failure after a successful write still suppresses. The wrapper injects ONEX_ARTIFACT_STORE_ROOT from
  ONEX_STATE_DIR (probe Probe 4). Until the omniclaude omnibase-core pin (v0.43.0) advances past OMN-13093
  the store import fails and the backstop passes through — the documented fail-closed default, pinned
  by tests across both pin generations.
