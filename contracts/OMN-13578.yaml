      gate-wiring test module passes 5 tests (job present, strict diff scan, ci-summary needs membership,
      rollup failure-loop coverage). A planted check_ai_slop.py --strict run over a sycophancy + reST
      docstring file exits 1 with 3 ERROR findings, proving the gate fails the required CI Summary rollup
      on a new violation.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13578/dod-omnimarket-pr-1426/command.yaml
          && grep -q '^pr_number:' drift/dod_receipts/OMN-13578/dod-omnimarket-pr-1426/command.yaml &&
          grep -q '5 passed' drift/dod_receipts/OMN-13578/dod-omnimarket-pr-1426/command.yaml"
