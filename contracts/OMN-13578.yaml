---
schema_version: "1.0.0"
ticket_id: "OMN-13578"
title: "Gate aislop_sweep as failing-rollup sub-job in omnimarket CI"
summary: >
  Operating Rule 5: a detection sweep that is not a pre-merge gate is advisory and gets ignored. aislop
  detection was ABSENT from omnimarket CI (present in omniclaude, and moved into the omnibase_core rollup
  by OMN-13574). This adds an aislop-sweep job to omnimarket .github/workflows/ci.yml, wired into the
  required CI Summary failing rollup (Model B, OMN-13574): it runs the canonical check_ai_slop.py --strict
  scanner over the PR diff and feeds ci-summary.needs + the rollup failure loop, so a new AI-slop violation
  in a touched file turns the required rollup red. Scope is PR-diff (not whole-tree) because the omnimarket
  tree carries ~250 pre-existing aislop findings; new slop blocks, existing debt does not. A decision
  record documents gate-vs-on-demand for compliance/contract/golden_chain/duplication. The omnimarket
  aislop-patterns MISSING_CI_WORKFLOW accepted gap is closed in the validator-requirements baseline.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Static-wiring tests proving the aislop-sweep job exists, runs the strict diff scan, is a member
      of the ci-summary rollup needs, and is checked in the rollup failure loop.
    command: "uv run pytest tests/ci/test_aislop_sweep_gate_wiring.py -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
