      unit and integration suites in the PR worktree at head 8203bd82c1c4475cc790c1ea1d0f0e0fade04fc5,
      covering the vendored .venv contract filter regression and existing graph populate behavior.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1755; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=8203bd82c1c4475cc790c1ea1d0f0e0fade04fc5;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,body
