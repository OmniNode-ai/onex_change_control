  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-market-pr-1755-venv-contract-filter"
    description: >-
      Product-observing verification for omnimarket PR #1755 head 8203bd82c1c4475cc790c1ea1d0f0e0fade04fc5.
      The evidence reads the live PR metadata and changed files to confirm the architecture graph populate
      handler now filters vendored .venv/site-packages contract.yaml paths and includes the regression
      test that rejects vendored node_delegation_orchestrator ingestion.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1755; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=8203bd82c1c4475cc790c1ea1d0f0e0fade04fc5;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,files,body
          --jq '.headRefOid + "\n" + ((.files | map(.path)) | join("\n")) + "\n" + .body' > "$d/pr.txt"
          && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fq 'src/omnimarket/nodes/node_architecture_graph_populate_effect/handlers/handler_architecture_graph_populate.py'
          "$d/pr.txt" && grep -Fq 'tests/nodes/node_architecture_graph_populate_effect/test_golden_chain_architecture_graph_populate_effect.py'
          "$d/pr.txt" && for p in src/omnimarket/nodes/node_architecture_graph_populate_effect/handlers/handler_architecture_graph_populate.py
          tests/nodes/node_architecture_graph_populate_effect/test_golden_chain_architecture_graph_populate_effect.py;
          do mkdir -p "$d/$(dirname "$p")"; gh api "repos/OmniNode-ai/omnimarket/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq '_EXCLUDED_DIR_NAMES' "$d/src/omnimarket/nodes/node_architecture_graph_populate_effect/handlers/handler_architecture_graph_populate.py"
          && grep -Fq '_iter_real_contract_paths' "$d/src/omnimarket/nodes/node_architecture_graph_populate_effect/handlers/handler_architecture_graph_populate.py"
          && grep -Fq 'test_collect_contract_data_ignores_vendored_venv_copies' "$d/tests/nodes/node_architecture_graph_populate_effect/test_golden_chain_architecture_graph_populate_effect.py"
          && grep -Fq 'node_delegation_orchestrator' "$d/tests/nodes/node_architecture_graph_populate_effect/test_golden_chain_architecture_graph_populate_effect.py"
  - id: "dod-focused-tests-pr-1755"
    description: >-
