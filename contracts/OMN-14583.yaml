          DEPLOY_SCOPE=architecture-graph-populate-deploy-assessment; d="$(mktemp)" && gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json headRefOid,files,body --jq '.headRefOid + "\n" + ((.files | map(.path))
          | join("\n")) + "\n" + .body' > "$d" && grep -Fq "$PRODUCT_HEAD" "$d" && grep -Fq 'handler_architecture_graph_populate.py'
