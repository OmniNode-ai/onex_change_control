title: "SEA generation output quality — golden exemplar + robust fenced-block extraction (reasoning-model stabilization)"
summary: >
  Stabilizes omnimarket node_generation_consumer output so the local coder model
  (Qwen3.6-35B-A3B, a reasoning model) yields a schema-valid contract on the first
  pass. Injects a golden exemplar (valid contract.yaml + handler) into the system
  prompt; changes fenced-block extraction to return the LAST block (the final
  answer, not a thinking draft), dedents each block to undo markdown-list nesting,
  and returns empty (fail-clean) instead of feeding raw prose to the YAML parser.
  Empirically verified against the live vLLM at the local-coder endpoint: the real
  thinking-model response now extracts and validates True. Pure node-local change;
  no shared model/contract touched. Escalation fallback deferred per plan.
