title: "SEA generation determinism — enable_thinking:false via additive extra_body + robust block extraction"
summary: >
  Determinism layer atop OMN-12813's exemplar (all 12813 green rows were attempt_count=2 — the exemplar
  alone needs a retry). Two repos: omnibase_infra adds an additive extra_body passthrough on ModelLlmInferenceRequest
  + HandlerLlmOpenaiCompatible._build_payload; omnimarket declares model_routing.inference_extra_body
  chat_template_kwargs.enable_thinking=false in the generation contract and hardens _extract_blocks (last
  fenced block, dedent markdown nesting, fail-clean on no-fence). Suppresses the Qwen3.6-35B-A3B reasoning
  preamble so the FIRST attempt returns clean fenced blocks (attempt_count=2 -> 1). Additive and contract-native;
  no env, no literal.
