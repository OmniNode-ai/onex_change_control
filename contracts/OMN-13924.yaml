title: "integration_sweep dry-run enumerates the real probe plan"
summary: >-
  A dry-run of node_integration_sweep_orchestrator returned empty runtime_sha_records and empty surface_results,
  so the receipt reported status='recorded' over a run that verified NOTHING — the dry-run path was a
  vacuous success that told an operator the sweep 'passed' without touching any surface. omnimarket PR
  #1599 makes the dry-run enumerate and validate every probe target a wet run would execute (RUNTIME_HEALTH/CONTAINER_HEALTH/GITHUB_CI
  always; KAFKA/DB/PROJECTION/GOLDEN_CHAIN when their config lists are populated) plus the runtime-SHA
  checks resolved from the cited ticket contracts — without touching any surface. Enumeration is shared
  with the wet executor (_enumerate_ticket_sha_checks) so plan and execution cover exactly the same check
  set. Terminal status is now typed: 'planned' (dry-run with a non-empty probe plan), 'blocked' (a planned
  probe has an empty/invalid target, or a wet run has a stale runtime SHA), 'recorded' (wet run, all pass),
  and 'no_input' when zero probe targets AND zero runtime-SHA checks resolve. A sweep that verified nothing
  can never again report success.
