schema_version: "1.0.0"
ticket_id: "OMN-12705"
title: "Add a non-blocking PR creation path to task.execute"
summary: >-
  Central evidence for the OMN-12705 task.execute PR creation path. The product change is rebased onto
  omnimarket dev after the stacked PR only merged into its stack branch. task.execute still COMPOSES existing
  authorities: it plans a PR from the normalized ModelTaskContract and, only when explicitly allowed,
  calls an injected narrow create_pr executor compatible with node_ticket_work's git client. Dry-run returns
  the intended branch/title/body with no side effects. Non-dry-run requires dry_run=False, allowed_side_effects
  containing create_pr, and an injected executor; the returned ModelRunResult is aggregated unchanged.
