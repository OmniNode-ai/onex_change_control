---
schema_version: "1.0.0"
ticket_id: "OMN-12955"
title: "P0.2b: Context-ROI results projection — contract-declared projection for scorer output + /experiments
  panels"
summary: >-
  Closes the context-ROI experiment read loop. The context-ROI runner terminal event (onex.evt.omnimarket.context-roi-run-completed.v1)
  had NO projection table, so the omnidash /experiments ContextExperimentHero + ContextHeatmap panels
  failed with unknown_topic — experiments could run with their results invisible. omnimarket adds a contract-declared
  projection reducer node_projection_context_roi (contract.yaml + handler + 001_create_context_roi_scores.sql
  migration in omnidash_analytics) that upserts one row per (run x task x arm x trial) ModelAttemptReductionRow
  keyed by the runner correlation_id and exposes the context_roi_scores table through the projection API
  on onex.snapshot.projection.context.experiment-scores.v1. omnidash wires the /experiments hero + heatmap
  to that live projection (ContextExperimentScoreRow + fetchContextExperimentScores + useContextExperimentScores
  hook + pure aggregateByArm/buildSegmentModelMatrix helpers), replacing the hardcoded "not wired" empty
  states with honest live empty/degraded states (no fixture fabrication). The omnimarket PR also fixes
  a local/CI parity bug in the OMN-12957 runtime_profiles pre-commit hook (it loaded the validator's package-internal
  allowlist instead of the repo allowlist, spuriously flagging every frozen contract locally while CI
  passed) by adding scripts/ci/run_runtime_profiles_validator.py mirroring the required CI gate. No topic
  schema, envelope, or contract API change beyond the new projection topic registration.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
