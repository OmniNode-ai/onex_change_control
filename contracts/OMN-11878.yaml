---
schema_version: "1.0.0"
ticket_id: OMN-11878
title: "Classify imperative guard baseline debt and bind every allowlisted violation to a real Linear
  ticket"
summary: >-
  Replace every '# migration pending' placeholder ticket in allowlists/*.yaml with the real per-repo remediation
  epic ticket, add a fail-closed ModelAllowlistedHandler ticket-format validator, and wire that validator
  into the existing imperative-contract guard so future baseline debt cannot be recorded without a real
  OMN ticket.
is_seam_ticket: true
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "CI passes on merge PR"
    command: "gh pr checks"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: >-
      Product PR #4163 is open against dev at the reviewed OMN-11878 head and carries the expected allowlist,
      validator, contract, and test files.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=4163; PRODUCT_REPO=OmniNode-ai/onex_change_control; PRODUCT_HEAD=99d0d971b3add6c831afd930fe114d5f0949e13b;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json state,baseRefName,headRefOid,files,title
          --jq '.state == "OPEN" and .baseRefName == "dev" and .headRefOid == "'$PRODUCT_HEAD'" and (.title
          | contains("OMN-11878")) and ((.files | map(.path)) | index("contracts/OMN-11878.yaml") != null)
          and ((.files | map(.path)) | index("src/onex_change_control/models/model_allowlisted_handler.py")
          != null) and ((.files | map(.path)) | index("src/onex_change_control/scripts/check_imperative_contracts.py")
          != null)' | grep -qx true
  - id: "dod-002"
    description: >-
      The reviewed #4163 head removes all '# migration pending' placeholders from the four allowlist files
      changed by OMN-11878.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_REPO=OmniNode-ai/onex_change_control; PRODUCT_HEAD=99d0d971b3add6c831afd930fe114d5f0949e13b;
          d="$(mktemp -d)" && for p in allowlists/omnibase_infra.yaml allowlists/omniclaude.yaml allowlists/omniintelligence.yaml
          allowlists/omnimarket.yaml; do mkdir -p "$d/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && ! grep -R "migration pending" "$d"
  - id: "dod-003"
    description: >-
      The reviewed #4163 head contains the fail-closed ModelAllowlistedHandler contract model with an
      explicit OMN-ticket pattern and extra-forbid model configuration.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_REPO=OmniNode-ai/onex_change_control; PRODUCT_HEAD=99d0d971b3add6c831afd930fe114d5f0949e13b;
          gh api "repos/${PRODUCT_REPO}/contents/src/onex_change_control/models/model_allowlisted_handler.py?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode | grep -Fq 'class ModelAllowlistedHandler(BaseModel)' && gh
          api "repos/${PRODUCT_REPO}/contents/src/onex_change_control/models/model_allowlisted_handler.py?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode | grep -Fq 'extra="forbid"' && gh api "repos/${PRODUCT_REPO}/contents/src/onex_change_control/models/model_allowlisted_handler.py?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode | grep -Fq 'pattern=r"^OMN-\d+$"'
  - id: "dod-004"
    description: >-
      The exact imperative-contract guard self-check runs green on a detached temporary worktree of the
      reviewed #4163 head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_BRANCH=jonah/omn-11878-classify-imperative-guard-baseline-debt-and-bind-every; PRODUCT_HEAD=99d0d971b3add6c831afd930fe114d5f0949e13b;
          d="$(mktemp -d)" && gh repo clone OmniNode-ai/onex_change_control "$d/wt" -- --depth 1 --branch
          "$PRODUCT_BRANCH" && test "$(git -C "$d/wt" rev-parse HEAD)" = "$PRODUCT_HEAD" && cd "$d/wt"
          && uv run check-imperative-contracts --repo-root . --allowlists-dir allowlists --scan-freestanding
  - id: "dod-005"
    description: >-
      The OMN-11878 ticket contract artifact on the reviewed #4163 head validates against ModelTicketContract.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_BRANCH=jonah/omn-11878-classify-imperative-guard-baseline-debt-and-bind-every; PRODUCT_HEAD=99d0d971b3add6c831afd930fe114d5f0949e13b;
          d="$(mktemp -d)" && gh repo clone OmniNode-ai/onex_change_control "$d/wt" -- --depth 1 --branch
          "$PRODUCT_BRANCH" && test "$(git -C "$d/wt" rev-parse HEAD)" = "$PRODUCT_HEAD" && cd "$d/wt"
          && uv run validate-yaml contracts/OMN-11878.yaml
