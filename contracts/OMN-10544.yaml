title: "Add structural guards to ticketing_epic_org (epics-only refusal + secondary-cluster pass)"
summary: "Fix the two structural gaps surfaced in the 2026-05-05 epic-org smoke test:
  (1) when every member of a proposed group is itself an epic the skill must REFUSE the group,
  not flag it; (2) within each surviving group, run a secondary clustering pass that surfaces
  Phase / PREFIX-NN / multi-word-prefix sub-cohorts. Implementation lives in
  src/omniclaude/epic_org/ as deterministic helpers the skill SKILL.md references."
