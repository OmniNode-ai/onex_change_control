schema_version: "1.0.0"
ticket_id: "OMN-12567"
title: "ci: versioned runner image contract with prebuilt env + bound identity"
summary: >-
  Graduates the OMN-12564 host-local CI env canary into a versioned runner image contract. The
  repo-specific prebuilt venv is baked into the self-hosted runner image, and the image version is a
  binding rather than a human label. docker/runners/runner-image.lock.json records the bound identity:
  the identity_digest folds the base image digest, the dependency manifest (pyproject.toml plus uv.lock),
  the Python version, the uv version, the runner gh and kubectl versions, the shared CI env canary digest
  from ci_env_digest.py, and the integer image_version into one reproducible value.
  scripts/ci/runner_image_identity.py generates, verifies, and emits the bound identity; the Dockerfile
  bakes the prebuilt venv and stamps the identity as build args, labels, and runtime env;
  scripts/ci/build_runner_image.sh verifies the lock and stages the prebuilt-env build context; the
  emit-runner-identity action and setup-python-uv emit the identity as job startup evidence on every CI
  job that prepares Python; release.yml verifies the bound identity and gates the release on a stale
  lock; and the canary doc enumerates the mutating jobs that must opt out plus the zero-uv-sync happy
  path. Building, publishing, and rolling the image to the .201 fleet is a gated runtime step (OMN-12568).
