title: "feat(OMN-14055): standalone attestation oracle for OCC companions"
summary: >-
  omnimarket PR #1717 adds verify_companion_attestation() as a pure COMPUTE operation on node_occ_companion_compute.
  The oracle recomputes the deterministic companion plan from a machine-observed ModelOccCompanionRequest
  and compares fingerprints against observed companion files, rejecting stale, tampered, or hand-authored
  companions regardless of claimed runner/verifier identity. This PR intentionally ships the standalone
  oracle only; receipt-gate/occ-preflight wiring remains a follow-slice because core/OCC cannot import
  omnimarket directly and the live producer path is not yet deployed.
