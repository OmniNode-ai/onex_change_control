title: "refactor(OMN-14261): canonicalize HandlerCheckExecutor to thin contract+handler"
summary: >-
  omnimarket product PR (branch jonah/omn-14261-canonicalize-check-executor, head 869bbc82adaac28ef4c6da993d259469c0a62318)
  canonicalizes HandlerCheckExecutor (node_omnigate_check_executor) to the thin contract+handler shape:
  handle() takes a single already-validated ModelCheckExecutorInput payload (named payload for the runtime's
  single-parameter dispatch) instead of the flattened (correlation_id, config_path, repo_path) kwargs.
  The handler stays async and returns ModelCheckExecutorResult directly. The test module is updated to
  the single-payload shape, plus a contract test covering the node's declared omnigate-checks-completed
  output topic for the strict state-coverage gate. No production caller instantiates this handler outside
  its own tests. Public-safe generic architecture-hygiene work under epic OMN-14242.
