ticket_id: "OMN-14376"
title: "fix(OMN-14376): default onex delegate to the system-configured event bus"
summary: >-
  omnibase_infra PR #2261 makes ``--bus`` optional on ``onex delegate``. When omitted, ``resolve_default_bus``
  mirrors the runtime kernel's own probe-then-select precedence (``probe_kafka`` against ``KAFKA_BOOTSTRAP_SERVERS``):
  HEALTHY/AUTHORITATIVE selects ``kafka`` (so the delegation lands in the shared ``delegation_events``
  projection), anything weaker gracefully falls back to ``inmemory`` with a WARNING log. The pre-existing
  usage-error guard (a bare ``--kafka-bootstrap`` without an explicit ``--bus kafka`` is a hard ``ValueError``)
  is preserved.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
