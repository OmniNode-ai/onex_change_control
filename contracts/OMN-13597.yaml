    description: >-
      ruff format + ruff check + mypy --strict clean on the changed source files; full pre-commit run
      on the changed files passes; the full omnimarket pytest suite (not kafka) is green.
    command: "uv run mypy src/omnimarket/nodes/node_delegate_skill_orchestrator/ports/port_local_delegation_dispatch.py
      --strict"
