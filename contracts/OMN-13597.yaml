      failed, evidence row false) and a genuine good answer yields true with the reducer's real graded
      score (not a hardcoded 1.0).
    command: "uv run pytest tests/unit/nodes/node_delegate_skill_orchestrator/test_local_dispatch_evidence.py
      -q"
