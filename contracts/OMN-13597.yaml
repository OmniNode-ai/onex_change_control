---
schema_version: "1.0.0"
ticket_id: "OMN-13597"
title: "bus-less local CLI delegation path runs the canonical quality gate instead of hardcoding quality_gate_passed=true"
summary: >-
  The bus-less / standalone local CLI delegation path (onex delegate, no event bus) in omnimarket LocalDelegationDispatchPort
  returned hardcoded quality_gate_passed=true / quality_score=1.0 on any transport success. Because result.success
  is HTTP/transport success (not a quality verdict), any LLM call that returned HTTP 200 — including a
  model refusal or a confidently-wrong answer — was recorded as a quality-gated PASS, and the delegation_events
  evidence row was written quality_gate_passed=true unconditionally. No invocation of the canonical quality-gate
  reducer existed on this path. The fix composes the existing canonical surfaces: after a successful effect
  call the port resolves the task-class DoD checks (dod_deterministic / dod_heuristic from task_class_contracts.v1.yaml)
  via a new public routing-authority resolver (resolve_task_class_dod_checks) and runs the SAME canonical
  quality gate reducer (delta) the bus path runs. The real pass/fail verdict and graded score are written
  into both the response dict and the projected delegation_events evidence row. A model refusal now yields
  quality_gate_passed=false with status=failed; a genuine good answer yields true with the reducer's real
  graded score (never a hardcoded 1.0). No second bespoke gate is added. This PR ships no runtime contract/topic/migration
  change and performs no live deploy or runtime restart.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
