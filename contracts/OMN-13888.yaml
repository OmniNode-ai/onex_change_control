  Redesign the OCC merge-eligibility binding (Option A) so appending a dod_evidence entry no longer invalidates
  prior receipts. omnibase_core PR #1382 adds compute_contract_entry_sha256 (canonical per-entry hash
  over one dod_evidence item + an immutable ticket_id/schema_version header), the ModelDodReceipt.contract_entry_sha256
