---
schema_version: "1.0.0"
ticket_id: "OMN-13137"
title: "fix(runtime): _validate_routing over-requires event_model for operation_match"
summary: >-
  RuntimeLocal._validate_routing (~L632-643) unconditionally required event_model.{name,module} for every
  handler_routing entry. event_model is only meaningful for routing_strategy: payload_type_match — operation_match
  routes by the `operation` field and does not use event_model. 230/295 omnimarket contracts are operation_match
  without event_model and are correct as authored; the validator was producing spurious errors for all
  of them at runtime startup. Fix: read routing_strategy from the routing map and branch validation —
  payload_type_match requires event_model; operation_match (and any non-payload strategy) requires `operation`
  and skips event_model checks. Handler.{name,module} and subscribe_topic checks remain for all strategies.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
