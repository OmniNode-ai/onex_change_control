---
schema_version: "1.0.0"
ticket_id: "OMN-13553"
title: "fix(golden-chain): onex skill golden_chain_sweep returns vacuous green (chains_total:0, overall_status:pass)"
summary: >
  The canonical skill-dispatch path `onex skill golden_chain_sweep` returned a false green: `overall_status:
  pass` over `chains_total: 0`. RuntimeLocal builds the request via `GoldenChainSweepRequest()` (only
  the runtime-injected correlation_id), which defaulted `chains=[]`, and the reducer computed PASS over
  the empty set (vacuous truth). An operator or CI gate reading that receipt saw "all golden chains healthy"
  while nothing was validated. Two pure-COMPUTE changes in handler_golden_chain_sweep.py: (1) the request
  `chains` field now defaults to the packaged `golden_chains.yaml` registry (deterministic config resolution
  at construction, NOT live runtime I/O — no Kafka, no DB), so the skill-dispatch path validates a real,
  non-empty chain set; (2) the reducer is fail-closed — an empty validated chain set is `fail`, NEVER
  `pass`. Pure compute change; no migration, schema, endpoint, env-for-model, or live I/O added.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Vacuous-green + fail-closed + skill-dispatch-loads-chains tests pass."
    command: "uv run pytest tests/test_golden_chain_sweep_vacuous_green.py tests/test_golden_chain_golden_chain_sweep.py
      tests/test_golden_chain_sweep_idle_gate.py tests/test_golden_chain_sweep_registry.py -q"
  - kind: "manual"
    description: "Full omnimarket suite stays green."
    command: "uv run pytest tests/ -q -m 'not kafka'"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
