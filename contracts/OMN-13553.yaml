    description: >
      An empty `chains` set (explicit `chains=[]`, or an empty/unreachable registry) is fail-closed: `overall_status`
      is `fail`, never `pass` — proving zero validated chains can no longer report a vacuous green. Covered
      by TestVacuousGreenFailClosed (explicit empty + empty-with-idle-gate) and the updated test_empty_chains
      case.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13553/dod-fail-closed/command.yaml
          && grep -q '^ticket_id: \"OMN-13553\"$' drift/dod_receipts/OMN-13553/dod-fail-closed/command.yaml
          && grep -q '^pr_number: 1379$' drift/dod_receipts/OMN-13553/dod-fail-closed/command.yaml"
  - id: "dod-skill-dispatch-loads-chains"
