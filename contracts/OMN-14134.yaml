---
schema_version: "1.0.0"
ticket_id: OMN-14134
title: "WI-14: add ProtocolMessageHandler.handle() adapter to HandlerLedgerAppend — wire ledger-append
  ingress to durable event_ledger row"
summary: >
  node_ledger_write_effect's contract declares operation_match routing with no event_model, so handler_wiring._make_dispatch_callback
  (omnibase_infra/runtime/auto_wiring/handler_wiring.py:397-529) calls handle(envelope) directly rather
  than execute(). HandlerLedgerAppend exposed .append() and .execute() but no .handle()/.handle_async(),
  so auto-wiring bound the _missing_handle sentinel, which raises ModelOnexError on every dispatched onex.cmd.platform.ledger-append.v1
  command — the audit ledger's external ingress was unwired. Adds a thin handle() adapter mirroring the
  shipped HandlerBuildLoopProjection.handle() precedent: extracts the payload via getattr(envelope, "payload",
  envelope), coerces to ModelPayloadLedgerAppend, delegates to the existing append(), and wraps the result
  with ModelHandlerOutput.for_compute() — the same builder execute() already uses in this file. Strictly
  scoped to this one handler (sibling handlers HandlerLedgerProjection/HandlerBuildLoopAppend are OMN-14135;
  the omninode-runtime crashloop that blocks the durable-row proof is OMN-14136).
is_seam_ticket: false
interface_change: false
