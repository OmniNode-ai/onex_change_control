title: "OMN-13674 child: Wave 3 PR-lifecycle state-coverage suite"
summary: >-
  omnimarket PR #1547 delivers full declared-state test coverage for node_pr_lifecycle_orchestrator: every
  FSM edge, including FAILED reachable from every non-terminal state (INVENTORYING, TRIAGING, VERIFYING,
  MERGING, POST_MERGE_TAIL, FIXING). While auditing state coverage the PR also fixes a genuine contract/implementation
  drift: contract.yaml declared a REBASING FSM state (TRIAGING -> REBASING -> MERGING/FAILED) that the
  handler never implemented (no EnumOrchestratorState.REBASING member, no REBASE reducer intent, enable_auto_rebase
  never read, HandlerAutoRebase never invoked by the orchestrator). The dead state/transitions were removed
  from contract.yaml, enable_auto_rebase was annotated as a reserved no-op, a regression test locks fsm.states
  to EnumOrchestratorState members, and follow-up OMN-13806 was filed to decide wire-it-or-retire-it.
  node_pr_lifecycle_inventory_compute, node_pr_lifecycle_triage_compute (all 5 verdict classes), node_auto_merge_effect
  (all boundary outcomes), node_pr_polish, and node_ci_watch were audited and already have comprehensive
  state coverage from prior work; no new tests were needed there. Tests use EventBusInmemory + constructor-injected
  mocks only; no live GitHub merge is ever exercised.
