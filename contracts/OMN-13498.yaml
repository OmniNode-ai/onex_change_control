summary: >-
  OCC evidence for the omnimarket batch-1 remediation of architecture-boundary fakes the check-no-faked-boundary
  validator (OMN-13497) flags. Four golden-chain tests carried hand-written fake inference adapters (class
  *Fake*(ModelInferenceAdapter)) that returned canned/echoed output and accepted any model_key — the exact
  'handler-isolation passes while live fails' fakes the gate bans. Each fake is replaced with a RecordedReplayInferenceAdapter
  that replays a response CAPTURED FROM A REAL z.ai GLM (cloud-glm, glm-5.2) call resolved through the
  committed routing contract (bifrost_delegation.yaml) and HARD-REJECTS a delegation tier name handed
  in as a model_key, so it cannot mask a cheap_cloud-class routing bug. The golden chains exercise the
  real handler dispatch path; only the recorded inference is replayed. This contract exists so the omnimarket
  product PR Receipt Gate binds via Evidence-Source.
