schema_version: "1.0.0"
ticket_id: "OMN-14298"
title: "fix(OMN-14298): RuntimeLocal calls initialize() before execute() + kills false-green over error-shaped
  returns"
summary: >-
  omnibase_core product PR #1418 (branch jonah/omn-14298-runtimelocal-init-lifecycle, head 6e412e03031878d172da090cb0b3ab383bd087f5)
  fixes two coupled RuntimeLocal defects. (1) Init lifecycle: RuntimeLocal invoked a handler's execute()/run()
  WITHOUT first calling its initialize(), so every init/execute-lifecycle node returned a "Handler not
  initialized" error envelope; _ensure_handler_initialized now calls initialize() before the entry method,
  guarded and idempotent (no-op if already initialized or if initialize() declares required params the
  runtime cannot supply — in which case execute() surfaces the real not-initialized state; exceptions
  inside a zero-arg initialize() propagate to FAILED). (2) False-green: _classify_result previously mapped
  only status=="failure" to FAILED, so a returned (not raised) error envelope (status="error" + error_message,
  e.g. "Handler not initialized") was misclassified COMPLETED / exit_code 0 — the exit-0-over-a-broken-run
  false green the operator bans; it now maps status in {failure,failed,error} and a populated error_message/error
  string to FAILED, with an explicit-success / no_results short-circuit. Independently verified by a distinct
  agent (verifier != implementer).
