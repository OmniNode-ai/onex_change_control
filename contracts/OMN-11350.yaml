---
schema_version: "1.0.0"
ticket_id: "OMN-11350"
title: "Prove manifest-backed delegation pricing through event/projection/API surfaces"
summary: >-
  Bind OCC evidence for omnimarket PR #725, which proves delegation pricing values computed from the canonical
  pricing manifest survive the emitted event, projection runner write, and contract-driven projection
  API response surfaces.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "Focused event/projection/API tests pass for manifest-backed delegation pricing."
    command: "uv run pytest tests/unit/delegation/test_delegation_orchestrator.py tests/test_projection_handlers.py
      tests/test_projection_api_server.py tests/test_golden_chain_projection_delegation.py -q"
  - kind: "manual"
    description: "A concrete proof payload records manifest source/version, event payload, projection
      row fields, API payload, and correlation id."
    command: "See drift/dod_receipts/OMN-11350/dod-local-proof-payload/command.yaml"
dod_evidence:
  - id: "dod-omnimarket-pr-725-head"
    description: "omnimarket PR #725 carries the manifest pricing surface proof changes."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-omnimarket-pr-725-head/command.yaml\"
          && grep -q '^pr_number: 725$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-omnimarket-pr-725-head/command.yaml\"
          && grep -q '^commit_sha: \"54b9f877f00cfbbb0fe76ab3c3fc28683161758e\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-omnimarket-pr-725-head/command.yaml\""
  - id: "dod-focused-surface-tests"
    description: "Focused local tests prove event emission, projection persistence, API response, and
      golden-chain projection coverage."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-focused-surface-tests/command.yaml\"
          && grep -q '97 passed' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-focused-surface-tests/command.yaml\""
  - id: "dod-local-proof-payload"
    description: "Concrete local proof payload includes manifest source/version, event payload, projection
      row fields, API payload, and correlation id."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-local-proof-payload/command.yaml\"
          && grep -q '87f7ddb8-9daa-4899-95b0-1f070ae561cc' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-local-proof-payload/command.yaml\"
          && grep -q 'pricing_manifest_version' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-local-proof-payload/command.yaml\""
  - id: "dod-runtime-assessment"
    description: "Runtime proof status is explicit: local/in-memory proof is complete; fresh .201 proof
      is pending deployed package availability."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-runtime-assessment/command.yaml\"
          && grep -q 'Fresh .201 guarded stability runtime' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11350/dod-runtime-assessment/command.yaml\""
  - id: "dod-omnimarket-pr-726-head"
