schema_version: "1.0.0"
ticket_id: "OMN-11570"
title: "Move confirmed concrete nodes from core to infra [omnibase_core -> omnibase_infra]"
summary: >-
  Bind central OCC evidence for the runtime-local ownership migration: omnibase_infra PR #1718 becomes
  the concrete local runtime owner, omnibase_core PR #1140 removes the concrete runtime implementation
  from core, and omnimarket PR #763 updates downstream tests to consume the infra-owned API.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
  - "protocols"
evidence_requirements:
  - kind: "tests"
    description: "omnibase_infra runtime-local tests, type checks, and validation gates pass."
    command: "gh pr checks 1718 --repo OmniNode-ai/omnibase_infra"
  - kind: "tests"
    description: "omnibase_core CLI tests and validation gates pass after runtime removal."
    command: "gh pr checks 1140 --repo OmniNode-ai/omnibase_core"
  - kind: "tests"
    description: "omnimarket consumer tests pass against the migrated runtime-local API."
    command: "gh pr checks 763 --repo OmniNode-ai/omnimarket"
