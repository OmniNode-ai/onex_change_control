ticket_id: "OMN-14248"
title: "fix(OMN-14248): scope mypy ignore_missing_imports per-module (stop masking unresolvable imports)"
summary: >-
  omnibase_core PR #1413 replaces mypy.ini's blanket global `ignore_missing_imports = True` with 27 narrow
  per-module `[mypy-<module>]` overrides (mirroring pyproject.toml's existing scoped pattern), closing
  a typecheck blind spot where any nonexistent-import path (typo or hallucinated) silently passed mypy
  repo-wide. Removing the blanket surfaced 40 import-not-found errors across 26 files: 4 genuine third-party
  soft dependencies (jinja2, boto3, dotenv, jsonpath_ng) and ~28 first-party stale-refactor targets. Of
  those, 5 files with live runtime bugs (ModuleNotFoundError on import, or a Pydantic model-not-fully-defined
  crash on instantiation) were fixed to their real import paths; 21 further first-party modules were scoped
  with `# TODO(OMN-14248)` markers documenting real-target-vs-orphaned triage as tracked follow-up, not
  fixed in this PR. Independent verification (this contract) found the initial head's claim that model_onex_batch_result.py's
  live instantiation crash was fixed did not hold — `ModelOnexBatchResult(results=[])` still raised PydanticUserError,
  now blocked on a nested TYPE_CHECKING-only `datetime` import in model_unified_run_metadata.py (unchanged
  by the initial diff). The PR was corrected at head cc89e492238f6982e5ad9e733393f4b7b89b1a5c to also
  move that `datetime` import out of TYPE_CHECKING into a real runtime import, which independently re-verified
  as fixing the instantiation crash for real.
