ticket_id: "OMN-12337"
title: "OMN-12279j: implement runtime handler for node_create_followup_tickets_effect"
summary: >
  OMN-12279j completes the create_followup_tickets EFFECT node (review findings -> Linear follow-up tickets).
  The node scaffold (contract, models, dry-run/adapter handler, golden-chain skeleton) already landed
  on omnimarket dev via PR #901/#949 with node_not_implemented already false and live ticket creation
  already wired through an injected adapter. omnimarket PR #1385 closes the two ticket requirements the
  scaffold did not meet: (1) title-match idempotency -- duplicate findings producing an identical computed
  ticket title are skipped within a batch in both live and dry-run modes, surfaced via a new skipped_duplicate_count
  field on ModelCreateFollowupTicketsResult; contract descriptor idempotent flipped false -> true and
  side_effects.duplicate_key_fields extended with finding_title; (2) a golden-chain test creating two
  follow-up tickets from two mock findings through an injected recording adapter, plus dedup coverage
  in live and dry-run modes. Code + test change to a single omnimarket node; no event-bus topic schema,
  envelope, or contract API change; no live-lane mutation.
