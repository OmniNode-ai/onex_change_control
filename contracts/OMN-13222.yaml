---
schema_version: "1.0.0"
ticket_id: "OMN-13222"
title: "OMN-13130 follow-up: promote omnidash TypeScript↔Python type-sync gate to a required check"
summary: >-
  Central evidence for omnidash PR #230. The type-sync-check.yml workflow introduced in OMN-13130 (PR
  #221) ran only on path-filtered triggers (shared/**, scripts/, the workflow file). A required branch-protection
  check with path filters stays pending forever on PRs that don't touch those paths — blocking merge indefinitely.
  PR #230 restructures the workflow to the always-run guard pattern: removes path filters from the on:
  triggers so the job fires on every dev PR, adds an internal "Detect type-sync path changes" step that
  diffs base..head and short-circuits to success (run_check=false) when no watched paths changed. Expensive
  omnibase_core + omniintelligence checkouts and the Python drift check run only when run_check=true.
  The job always exits 0 on skip, producing a reliable green check that can be promoted to a required
  check without wedging unrelated PRs. After this PR merges, add "TypeScript ↔ Python Type Sync" to the
  omnidash dev branch-protection required-checks list (preserving existing checks: Typecheck & Tests,
  golden-chain, CI Summary, call-reject-skip-token / scan / reject-skip-gate-token). Parent ticket OMN-13129,
  follow-up to OMN-13130.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: >-
      omnidash PR #230 CI green on the always-run guard pattern: the type-sync job fires on the PR, detects
      no type-sync path changes, skips to success. Skip-to-success path verified. Drift-red path: a PR
      touching shared/ with a missing TS field is blocked by the check.
    command: >-
      env -u GITHUB_TOKEN gh pr checks 230 --repo OmniNode-ai/omnidash
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
