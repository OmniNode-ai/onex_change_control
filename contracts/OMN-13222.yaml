      at commit 26d3f7f097f442b47adc529f73c37c7d9f0f3d1d. It removes path filters from type-sync-check.yml
      on: triggers, adds the Detect type-sync path changes step that short-circuits to success when watched
      paths are untouched, and gates all downstream steps on run_check==true. The status check name "TypeScript
      ↔ Python Type Sync" is now always-reporting and can be promoted to required in dev branch protection
      without wedging unrelated PRs.
    source: "manual"
