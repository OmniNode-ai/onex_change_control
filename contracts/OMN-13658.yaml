schema_version: "1.0.0"
ticket_id: "OMN-13658"
title: "fix: sync event_publisher loop affinity — schedule onto kernel loop via run_coroutine_threadsafe"
summary: >-
  OCC evidence for omnibase_infra PR #2133, which fixes the asyncio event-loop affinity bug in _make_sync_event_publisher
  (src/omnibase_infra/runtime/auto_wiring/handler_wiring.py). The dispatch engine offloads blocking sync
  handlers (e.g. HandlerContextRoiRunner / node_context_roi_runner) onto a ThreadPoolExecutor worker thread
  via run_in_executor; the old adapter hit RuntimeError on asyncio.get_running_loop() and fell back to
  asyncio.run(), spinning a throwaway loop in the worker thread. The publish awaitable's internal Futures
  bind to the kernel loop, so running them on that foreign loop raised "got Future attached to a different
  loop" and delayed terminal emission 2-3 minutes via retry (attempt 1/4) plus duplicate delivery. The
  fix captures the kernel loop at wiring/construction time and schedules the publish coroutine back onto
  it with asyncio.run_coroutine_threadsafe for any non-kernel thread; on-kernel-loop publishes keep the
  create_task fast path; the asyncio.run throwaway-loop branch is removed entirely.
