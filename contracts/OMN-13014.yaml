ticket_id: "OMN-13014"
title: "Hot-patch ledger + rebuild preflight gate: rebuilds silently destroy live in-container patches
  (retro B-1)"
summary: >-
  Container-layer hot-patches on the .201 runtime lanes (in-container file patch + docker restart with
  a .prepatch sibling) silently revert on any image rebuild or compose force-recreate: the 2026-06-11
  20:58:53Z projection-api rebuild erased a live /api/generate patch that had to be re-applied by hand
  (TOTAL_ARCHITECTURE_FINDINGS.md section 2.1). There was no machine-readable ledger mapping patched files
  to source PRs and no rebuild-path gate refusing to rebuild a container whose live patches are not merged
  into the build ref. OMN-13014 ships (1) the operational ledger at /data/omninode/hotpatch-ledger/ledger.yaml
  on .201, backfilled from a live docker-exec census of all 10 app containers (5 .prepatch files / 4 source
  PRs, all MERGED to dev: omnimarket#1180 a4e13e9b, #1181 a0ad3c99, #1184 1d5074d9, omnibase_infra#1951
  36d98275), mirrored on the omni_home docs branch; (2) omnibase_infra PR #1959: scripts/preflight_hotpatch_ledger.py,
  which hard-fails when any ledger row's source-PR merge commit is not an ancestor of the per-repo build
  ref (git merge-base --is-ancestor) or when the running container carries unledgered .prepatch files,
  with a --post-rebuild mode requiring zero .prepatch survivors, wired into scripts/deploy-runtime.sh
  as guard_hotpatch_ledger (dry-run + execute); sole bypass is the Rule-10 user-approval receipt form
  via HOTPATCH_PREFLIGHT_BYPASS, regex-validated, malformed values hard-fail; (3) a standalone drop-in
  installed at /data/omninode/hotpatch-ledger/preflight.sh on .201, demonstrated live: FAIL (exit 1) against
  the current pre-merge build-host clone HEADs (5010b1f4 / 8d7da124 — the exact incident class) and PASS
  (exit 0) against origin/dev refs with the .prepatch tripwire seeing all 5 ledgered files and zero unledgered.
