schema_version: "1.0.0"
ticket_id: "OMN-13166"
title: "SEA semantic validation: behaviorally-wrong handler output cannot pass the contract gate"
summary: >-
  The 2026-06-16 night gate-zero stability SEA cell (correlation bda26f6a-5963-4d7d-87cd-5c81e98e5449)
  generated a snake_case -> PascalCase handler that split on whitespace instead of underscores ("hello_world"
  -> "Hello_world", not "HelloWorld") yet the run was projected as contract_passed=true. The verifier
  (_validate_generation in node_generation_consumer) only proved shape validity: required YAML contract
  fields, ast.parse of the handler, and no hardcoded paths/topics. It never proved the handler performed
  the requested transformation. Fix: add a behavioral validation layer independent of schema validation.
  semantic_validation.py derives input/expected fixtures from the task (snake->pascal/camel, reverse,
  upper/lower), executes the generated handle() in a restricted I/O-free namespace, and compares output;
  no derivable invariant => checked=False (inconclusive, never a silent pass). HandlerGenerationConsumer
  runs the check after contract validation: a contract-valid but behaviorally-wrong attempt no longer
  breaks the loop, feeds the failure back into the repair loop, triggers routing escalation, and is NOT
  deployed/registered. ModelGenerationAttempt/Benchmark carry semantic_checked + semantic_passed distinct
  from contract_passed; both projection write paths (sync live-runtime + async runner), migration 0014,
  and the projection-API exposure persist/surface the two verdict columns so the dashboard shows shape-valid-but-behaviorally-wrong
  as NOT a task-behavior pass. TDD reproduces the gate-zero impostor (fails) vs the dev control handler
  (passes) at unit and end-to-end handler level plus projection round-trip.
is_seam_ticket: false
