---
schema_version: "1.0.0"
ticket_id: "OMN-11002"
title: "Duplication sweep command drift repair"
summary: "Binds omnimarket PR #625, which repairs duplication sweep D2/D3 command drift, restores current
  OCC boundary/checker resolution, and records deploy-gate evidence for the no-runtime-restart repair."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Downstream PR #625 reports focused duplication sweep regression tests and D2/D3 command
      evidence."
    command: "gh pr view 625 --repo OmniNode-ai/omnimarket --json state,headRefOid"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11002 to omnimarket PR #625 and deploy DoD evidence."
    command: "find drift/dod_receipts/OMN-11002 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-625"
    description: "omnimarket PR #625 carries the OMN-11002 duplication sweep D2/D3 command drift repair."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11002/dod-omnimarket-pr-625/command.yaml
          && grep -q '^pr_number: 625$' drift/dod_receipts/OMN-11002/dod-omnimarket-pr-625/command.yaml
          && grep -q '^commit_sha: fb1f8163b0a447b7ddfdc99132a86f21ccd79e1a$' drift/dod_receipts/OMN-11002/dod-omnimarket-pr-625/command.yaml"
  - id: "dod-deploy"
    description: "Deploy DoD evidence for PR #625: command-resolution-only repair, no runtime restart
      or .201 mutation required before merge; post-merge smoke command is recorded."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11002/dod-deploy/command.yaml &&
          grep -q '^pr_number: 625$' drift/dod_receipts/OMN-11002/dod-deploy/command.yaml && grep -q '^deploy_gate_marker:
          no_live_runtime_mutation$' drift/dod_receipts/OMN-11002/dod-deploy/command.yaml"
  - id: "dod-occ-pr-1013"
    description: "onex_change_control PR #1013 carries the OMN-11002 central contract and receipt bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11002/dod-occ-pr-1013/command.yaml
          && grep -q '^pr_number: 1013$' drift/dod_receipts/OMN-11002/dod-occ-pr-1013/command.yaml"
