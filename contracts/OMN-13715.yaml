summary: >
  The runtime_sweep skill entry in skill_mapping.yaml was missing the `scope` argument spec that was already
  documented in SKILL.md. Passing `--scope omnidash-only` raised `Unknown argument '--scope'` (ClickException).
  Fix adds the scope arg spec to skill_mapping.yaml mirroring integration_sweep and dod_sweep. Two unit
  tests prove that --scope is accepted and forwarded, and that omitting --scope leaves scope absent.
