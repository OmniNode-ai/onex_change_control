schema_version: "1.0.0"
ticket_id: "OMN-13227"
title: "pr-merged projection node + generic ?since cursor read (T3)"
summary: >-
  OMN-13227 replaces the OMN-13226 contract stub with the real pr-merged projection node (omnimarket).
  HandlerPrMergedProjection consumes onex.evt.github.pr-merged.v1 (published by the pr-merged-publisher
  GHA workflow on every repo merge) and UPSERTs one row per event into the pr_merged_events table, deduped
  by the publisher event_id, with a strictly-monotonic projection_cursor BIGSERIAL. The node declares
  a projection_api exposure on onex.evt.github.pr-merged.v1 (table pr_merged_events, cursor_column projection_cursor)
  so the existing generic projection API serves the rows, plus a node-local migration that creates the
  table (cold-DDL materialization proof). The generic /projection/{topic} read path gains ?since=<cursor>
  pagination (WHERE cursor_column > since, next_cursor in the response) so the per-machine worktree reaper
  (T4, OMN-13228) can poll GET /projection/onex.evt.github.pr-merged.v1?since=<cursor> on the local :3002
  lane and match a merged PR {repo, branch, pr_number, ticket, merged_at} to a worktree. No new REST route,
  no bespoke endpoint. Tests use synthetic events through the handler and the in-memory database adapter;
  no live publisher and no live Confluent creds. The full suite passes (7506 passed; the only failures
  are @pytest.mark.kafka tests needing a live local broker, expected on this Mac); ruff, mypy --strict,
  runtime sweep (312/312), metadata dependency check, projection materialization validator, and pre-commit
  are all clean. Scope is code only; this PR does not deploy, restart runtime, mutate prod/judge/.201,
  or publish live traffic — the live e2e is the orchestrator's deploy step.
is_seam_ticket: false
