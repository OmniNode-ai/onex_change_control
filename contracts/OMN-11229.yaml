  Creates node_session_phase_evaluator — a pure COMPUTE node that evaluates session phase exit conditions
  and budget status. Receives phase state (phase_name, max_duration_minutes, elapsed_minutes, exit_condition_statuses,
  halt_threshold_pct) and returns ModelPhaseEvaluation with action: no_action | budget_warning | transition_required
  | halt_required. No I/O, no env reads, no network. 20 unit tests. Part of epic OMN-11224.
