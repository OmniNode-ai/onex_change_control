title: "fix(OMN-13821): reconcile Redpanda capacity manifest to live prod state"
summary: >-
  omninode_infra PR #566 reconciles the committed Redpanda data-plane manifest with values already running
  in prod after the incident response that unblocked omninode-runtime-worker startup. The change records
  the live partition and memory capacity settings so a future pod recreate or kustomize apply does not
  silently revert prod to the pre-incident capacity ceiling. omninode_infra PR #567 adds audited deploy
  and Terraform plan workflows for the same data-plane incident follow-up so future data-plane and AWS
  changes have previewable, reviewable automation instead of manual SSM-only operation. This is an interim
  bridge until the managed MSK runtime cutover removes the single-node Redpanda partition ceiling.
