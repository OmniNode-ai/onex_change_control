title: "test(OMN-14391): durable dispatch-seam regression for HandlerLedgerAppend.handle()"
summary: >-
  omnibase_infra PR #2264 adds a durable, re-runnable integration test that drives a real dict-shaped
  envelope through the actual dispatch seam (wire_from_manifest -> MessageDispatchEngine.dispatch -> _make_dispatch_callback
  -> HandlerLedgerAppend.handle()) wired from the real on-disk node_ledger_write_effect/contract.yaml
  via discover_contracts(). Only HandlerLedgerAppend.append() (the Postgres I/O boundary) is mocked. Independent
  adversarial verification reproduced the RED-before claim: renaming handle() to handle_disabled() (simulating
  the pre-OMN-14134 state) made the primary test fail with the exact predicted _missing_handle ModelOnexError;
  reverting restored GREEN with a clean worktree. This is ask (1) of OMN-14391 only (local/CI dispatch-seam
  test, no live dependency); ask (2) (live Kafka produce -> consume -> event_ledger readback) remains
  blocked on OMN-14136 and is not attempted in this PR.
