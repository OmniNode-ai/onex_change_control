ticket_id: "OMN-1279"
title: "Contract-Driven Dashboard - Live Bus Subscription"
summary: >
  Wire the omnidash live bus subscription read-path so the dashboard renders live projection updates.
  The evidence-pipeline live SSE subscription (openEvidenceLiveEventStream) was dead-on-arrival in the
  deployed config: EvidencePipelineFlow called it with no opts, so opts.baseUrl was undefined and the
  function returned null unconditionally (widget showed "SSE unavailable"). Fix routes the live stream
  through the SAME canonical single-backend seam (resolveProjectionBaseUrl) as the snapshot reads, subscribing
  to <base>/projection/{evidencePipelineLiveEvents}/stream against the one authoritative projection backend.
  Proxy-relative mode yields a same-origin URL forwarded to the single backend (no second authority, no
  banned port — passes no-non-authoritative-read-source and no-projection-websocket guardrails). File
  mode keeps the stream honestly disabled and the widget keeps polling snapshots. Explicit opts.baseUrl
  still wins for legacy/non-Vite callers. No new REST/SSE route invented; no infra/runtime touched.
