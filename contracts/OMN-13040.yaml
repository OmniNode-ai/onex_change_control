title: "B-5: Runner-disk preflight job + infra-signature auto-rerun in merge-sweep tick"
summary: >-
  Retro B-5 (process-enforcement ratchet, epic OMN-13013). Adds three deliverables: (1) .github/workflows/runner-disk-preflight.yml
  — a distinctly-named CI job that fails with RUNNER-DISK:<free>GB annotation when runner disk is below
  threshold so infra failures never masquerade as domain failures (e.g. fake Kafka handshake failures
  from a disk-full runner). (2) scripts/infra-signature-rerun.sh — merge-sweep tick companion that auto-reruns
  failed runs whose logs match known infra signatures (RUNNER-DISK:, OMN-13045 compose-network-wedge,
  No space left on device) predating the last runner recovery timestamp. (3) 22 unit tests in tests/ci/test_runner_disk_preflight.py
  proving all three deliverables including verification that the OMN-13008 85% watermark alert leg is
  wired (already present in disk-watermark-check.sh, no change required).
