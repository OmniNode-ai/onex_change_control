ticket_id: "OMN-13161"
title: "Delegation max_tokens belongs in the routing contract (per-backend, overlay-overridable) — not
  a CLI constant"
summary: >
  OMN-13161 moves delegation max_tokens out of imperative constants and into the routing authority: omnimarket
  PR #1230 (branch jonah/omn-13161-max-tokens-contract, head 6cf7a0d41a254b27d35516d3d0e34f1ab5268301)
  adds a per-backend max_tokens field to ModelDelegationBackendConfig, declares it per backend in bifrost_delegation.yaml
  (overlay-overridable), and resolves it from the selected backend after backend selection in node_delegate_skill_orchestrator
  (dropping the hardcoded 8192 default/cap from contract.yaml); omnibase_infra PR #1990 (branch jonah/omn-13161-max-tokens-cli,
  head 9169012089a432a278f099a9b98b866b021e5395) removes the DEFAULT_MAX_TOKENS=2048 constant from cli/cli_delegate.py
  and defaults --max-tokens to None (omitted = routing authority decides). Source + packaged-config change
  to the delegate CLI and the delegation routing seam. No DDL, no migration, no topic/schema change, no
  live deploy/restart/.201 mutation by these PRs; the new limit takes effect on the next package/overlay
  refresh of the consuming runtime.
