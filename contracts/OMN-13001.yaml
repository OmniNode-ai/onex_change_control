schema_version: "1.0.0"
ticket_id: "OMN-13001"
title: "Make llm_call_metrics the contract-owned per-call write model for projection_llm_cost"
summary: >
  Fix a read/write-model split in omnimarket's LLM cost projection. The deployed runtime writer (node_projection_llm_cost
  handler_llm_cost.LlmCostProjectionRunner) wrote llm_cost_aggregates with a drifted column set that no
  longer matched the deployed table, so it landed nothing and never wrote llm_call_metrics (the dashboard
  read model). This change makes llm_call_metrics the contract-owned per-call write model, deletes the
  drifted llm_cost_aggregates write (owned by node_projection_cost_summary), retires the standalone consumer
  into an idempotent backfill entrypoint, and adds a real-dispatch-path test plus a schema-parity ratchet
  so the column-drift class cannot silently recur.
