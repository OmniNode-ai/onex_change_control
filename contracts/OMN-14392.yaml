ticket_id: "OMN-14392"
title: "fix(OMN-14392): make dod_verify OMN-13996 regression test hermetic"
summary: >-
  omnimarket PR #1719 fixes a flaking node_dod_verify regression test: TestOmn13996Regression::test_static_pass_receipt_no_longer_masks_unmerged_pr
  mocked the EvidenceCollector for its first half but then built a fresh, unmocked HandlerDodVerify()
  and called handler.handle() directly for the second half, which shelled out to the live gh pr view/gh
  pr checks for the hardcoded omnibase_infra#2216 -- a PR that has since merged, so the test failed deterministically
  instead of passing. The fix overrides handler._make_collector (a pre-existing test-only seam already
  used by the sibling test test_handler_overall_failed_when_live_check_fails) to return the already-mocked
  collector, making the test fully offline while leaving the OMN-13996 regression assertions unchanged.
  Independent adversarial verification confirmed the test retains teeth: reintroducing the OMN-13996 masking
  bug in EvidenceCollector._verify_live_pr (unconditional pass) drives the test RED; reverting restores
  GREEN across the full 18-test file.
