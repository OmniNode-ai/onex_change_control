---
schema_version: "1.0.0"
ticket_id: "OMN-13700"
title: "Source emit-daemon topics from contract registry, drop raw topic literals"
summary: >-
  omnibase_infra PR #2159 removes the 5 hardcoded ONEX topic string literals from runtime/emit_daemon/topics.py
  so the contract-driven topic registry is the single source of truth. TOPIC_PHASE_METRICS / TOPIC_NOTIFICATION_BLOCKED
  / TOPIC_NOTIFICATION_COMPLETED now resolve from new SUFFIX_OMNICLAUDE_* constants in platform_topic_suffixes.py,
  TOPIC_BASELINES_COMPUTED resolves from EnumOmnibaseInfraTopic.EVT_BASELINES_COMPUTED_V1, and the unused
  TOPIC_DEPLOY_REBUILD_REQUESTED constant is deleted. The PR is bound to head commit 7edb78b27e8fad1be9a4fae2a5ffd2fc8094a99b.
  This OCC contract supplies the central Evidence-Source/Evidence-Ticket proof required by the receipt
  and OCC eligibility gates.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnibase_infra PR #2159 code and CI checks are green except OCC evidence gates."
    command: >-
      gh pr view 2159 --repo OmniNode-ai/omnibase_infra --json headRefOid,mergeable,statusCheckRollup
  - kind: "tests"
    description: "Topic-literal gate and contract-sourced topic tests pass locally for PR #2159."
    command: "uv run python scripts/validation/check_topic_literals.py"
  - kind: "manual"
    description: "Deploy assessment documents that this evidence PR performs no live deploy, restart,
      or .201 mutation."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13700/dod-deploy-assessment/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-infra-pr-2159"
    description: >-
      omnibase_infra PR #2159 is bound to OMN-13700 at head commit 7edb78b27e8fad1be9a4fae2a5ffd2fc8094a99b.
      The PR removes the 5 raw topic literals from runtime/emit_daemon/topics.py, adds the 3 SUFFIX_OMNICLAUDE_*
      constants to platform_topic_suffixes.py with provisioning + parity-gate coverage, and adds a TDD
      unit test. GitHub state shows code/CI checks green with only OCC/receipt evidence gates failing
      before this contract lands.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13700/dod-infra-pr-2159/command.yaml && grep
          -q '^pr_number: 2159$' drift/dod_receipts/OMN-13700/dod-infra-pr-2159/command.yaml && grep -q
          '^commit_sha: "7edb78b27e8fad1be9a4fae2a5ffd2fc8094a99b"$' drift/dod_receipts/OMN-13700/dod-infra-pr-2159/command.yaml
  - id: "dod-local-validation"
    description: >-
      Local validation for the changed topic surface passed: scripts/validation/check_topic_literals.py
      reported "OK: No new raw topic literals found", and the contract-sourced topic test suites (topic
      parity, topics, emit_daemon, baselines) reported 413 passed.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13700/dod-local-validation/command.yaml && grep
          -q 'No new raw topic literals found' drift/dod_receipts/OMN-13700/dod-local-validation/command.yaml
          && grep -q '413 passed' drift/dod_receipts/OMN-13700/dod-local-validation/command.yaml
  - id: "dod-deploy-assessment"
    description: >-
      Static deploy/contract assessment for PR #2159. The change is a source-only refactor that replaces
      raw topic string literals with contract-registry references and adds provisioning metadata. This
      OCC evidence PR does not perform or claim a live deploy, runtime restart, topic mutation, or .201
      mutation; runtime proof is not claimed and normal downstream deploy validation remains a post-merge
      lane.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13700/dod-deploy-assessment/command.yaml &&
          grep -qi 'no live deploy' drift/dod_receipts/OMN-13700/dod-deploy-assessment/command.yaml &&
          grep -qi 'runtime proof is not claimed' drift/dod_receipts/OMN-13700/dod-deploy-assessment/command.yaml
  - id: "dod-occ-self"
    description: >-
      Self-binding OCC eligibility receipt for this onex_change_control PR. This PR carries the OMN-13700
      central contract and PASS receipts so omnibase_infra PR #2159 can reference the OCC PR through Evidence-Source
      and satisfy validator_occ_merge_eligibility.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13700/dod-occ-self/command.yaml
