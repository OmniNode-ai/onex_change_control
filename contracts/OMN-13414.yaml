schema_version: "1.0.0"
ticket_id: "OMN-13414"
title: "feat(OMN-13414): documented cold-lane full bring-up path in deploy-runtime.sh"
summary: >-
  The dev runtime lane is ephemeral (GC/idle-reclaimed; it can be torn down to zero containers between
  sessions). Bringing a fully COLD lane back up is materially harder than the documented warm "recreate
  the runtime services" path, and two undocumented gotchas cost real time on the 2026-06-21 runtime-e2e
  run. This adds a --cold flag to scripts/deploy-runtime.sh that wires both gotchas into one documented
  path. (1) Runtime services are gated behind compose profiles [runtime,full], so a bare `docker compose
  up -d` starts NOTHING — bringup_full_stack() always passes --profile runtime and, unlike the warm --restart
  path, does NOT pass --no-deps so the whole project fans out honoring depends_on. (2) deploy-runtime.sh
  defaults BUILD_SOURCE=release, which cannot carry un-released merged-dev code; --cold forces BUILD_SOURCE=workspace
  (OMNI_HOME + sibling REF build-args via stage_workspace.sh), rejects a contradictory BUILD_SOURCE=release,
  and is incompatible with --prod (workspace images are non-main-lineage and the prod-promotion gate refuses
  them). The cold path reuses the hardened cold-start preflight (ensure_core_infra_ready, warm_broker_topic_provisioning,
  run_runtime_migration_preflight, raised KAFKA_TIMEOUT_SECONDS) then brings the full --profile runtime
  project up. Docs: a new runbook docs/runbooks/cold-lane-full-bringup.md and prose around the omni_home/CLAUDE.md
  .201 lane block document cold-vs-warm, the mandatory profile, and workspace BUILD_SOURCE. No live prod/judge/stability
  deploy is performed. This is a tooling + docs change.
is_seam_ticket: false
