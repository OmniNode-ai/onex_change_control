schema_version: "1.0.0"
ticket_id: "OMN-11203"
title: "Add @contract_validated decorator and startup verification"
summary: >
  Adds middleware/contract_validator.py to onex-api with load_contracts(), verify_startup_contracts(),
  a JSON Schema subset validator, and the @contract_validated(contract_id) decorator. Wires module-import-time
  contract loading into main.py so unresolvable contracts fail startup before any decorated route is defined.
  Non-conforming payloads return structured 422 with field-level errors. 38 unit tests covering all error
  paths, schema validation including bool/number type rejection, 422 responses, decorator fail-closed
  behavior when no Request is provided, and real routes YAML integration.
