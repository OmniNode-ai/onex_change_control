  - id: "dod-omn14529-deploy-scope"
    description: >-
      Deploy-scope audit for OMN-14529. The product PRs change CLI dispatch, Python handler/adapters,
      tests, and one forward migration file, and the PR bodies explicitly state that the proof used local
