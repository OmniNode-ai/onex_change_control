    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          INFRA_PR_NUMBER=2292; MARKET_PR_NUMBER=1749; INFRA_REPO=OmniNode-ai/omnibase_infra; MARKET_REPO=OmniNode-ai/omnimarket;
          INFRA_HEAD=3697151836f963bb25e8e52193f641a78d7f17cb; MARKET_HEAD=bbf248a5ab55887d78558f8f94d5a5f2000139cf;
          gh pr view "${INFRA_PR_NUMBER}" --repo "${INFRA_REPO}" --json headRefOid,body --jq '.headRefOid
