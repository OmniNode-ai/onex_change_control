    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1749; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=bbf248a5ab55887d78558f8f94d5a5f2000139cf;
          d="$(mktemp -d)" && gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "${d}/pr.txt" && grep -Fq "${PRODUCT_HEAD}" "${d}/pr.txt" && grep -Fxq dev "${d}/pr.txt" &&
          grep -Fq 'feat(OMN-14529): wire real default adapters for decision_store orchestrator' "${d}/pr.txt"
          && for p in src/omnimarket/nodes/node_decision_store_orchestrator/adapters/postgres_decision_store.py
          src/omnimarket/nodes/node_decision_store_orchestrator/adapters/structural_conflict_check.py
          src/omnimarket/nodes/node_decision_store_orchestrator/adapters/deferred_semantic_review.py src/omnimarket/nodes/node_decision_store_orchestrator/adapters/log_only_notify.py
          src/omnimarket/nodes/node_decision_store_orchestrator/handlers/handler_decision_store_orchestrator.py
          tests/test_golden_chain_decision_store_orchestrator.py; do grep -Fq "$p" "${d}/pr.txt" && mkdir
          -p "${d}/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "${d}/$p"; done && grep -Fq 'def _run_async' "${d}/src/omnimarket/nodes/node_decision_store_orchestrator/adapters/postgres_decision_store.py"
          && grep -Fq 'PostgresDecisionStore' "${d}/src/omnimarket/nodes/node_decision_store_orchestrator/handlers/handler_decision_store_orchestrator.py"
          && grep -Fq 'StructuralConflictCheck' "${d}/src/omnimarket/nodes/node_decision_store_orchestrator/handlers/handler_decision_store_orchestrator.py"
          && grep -Fq 'DeferredSemanticReview' "${d}/src/omnimarket/nodes/node_decision_store_orchestrator/handlers/handler_decision_store_orchestrator.py"
          && grep -Fq 'LogOnlyNotify' "${d}/src/omnimarket/nodes/node_decision_store_orchestrator/handlers/handler_decision_store_orchestrator.py"
          && grep -Fq 'test_run_async_bridge_works_from_inside_a_running_loop' "${d}/tests/test_golden_chain_decision_store_orchestrator.py"
          && grep -Fq 'decision-query-result.v1' "${d}/tests/test_golden_chain_decision_store_orchestrator.py"
  - id: "dod-omnimarket-pr-1749-local-verification"
