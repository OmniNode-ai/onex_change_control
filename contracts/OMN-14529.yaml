          == "'${PRODUCT_HEAD}'" and (.body | contains("SELECT count(*) FROM decision_store")) and (.body
          | contains("0 → 1 → 2 → 3")) and (.body | contains("3 → 4 → 5")) and (.body | contains("full
          CLI seam proven end-to-end")) and (.body | contains("uv run pytest tests/unit/cli/test_cli_skill.py
          tests/unit/nodes/test_decision_store_query_compute.py -m unit"))' | grep -qx true
  - id: "dod-omnimarket-pr-1749-product-head"
