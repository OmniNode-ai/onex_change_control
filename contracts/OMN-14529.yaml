          stability-test lane readback — OWED"))' | grep -qx true && gh pr view "${MARKET_PR_NUMBER}"
          --repo "${MARKET_REPO}" --json headRefOid,body --jq '.headRefOid == "'${MARKET_HEAD}'" and (.body
          | contains("no `.201` mutation")) and (.body | contains(".201` stability-test lane readback
          — OWED"))' | grep -qx true && gh pr diff "${INFRA_PR_NUMBER}" --repo "${INFRA_REPO}" --name-only
          | grep -Fxq src/omnibase_infra/cli/skill_mapping.yaml && gh pr diff "${INFRA_PR_NUMBER}" --repo
