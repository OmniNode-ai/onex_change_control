schema_version: "1.0.0"
ticket_id: "OMN-14529"
title: "feat(OMN-14529): wire decision_store dispatch route and real default adapters"
summary: >-
  Central OCC evidence for the paired decision_store landing lane: omnibase_infra PR #2292 wires the `onex
  skill decision_store` dispatch route, JSON CLI argument support, and decision-store query row conversion;
  omnimarket PR #1749 wires the zero-argument orchestrator defaults, Postgres persistence bridge, conflict
  check, and event-loop-safe sync/async handoff. Together they turn the previously unreachable documented
  decision_store skill into a product-observed CLI path.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-infra-pr-2292-product-head"
    description: >-
      Product-observing verification for omnibase_infra PR #2292 at head 3697151836f963bb25e8e52193f641a78d7f17cb.
      The proof reads PR metadata and changed files from GitHub, then checks that the PR adds JSON CLI
      argument support, registers the decision_store skill route to node_decision_store_orchestrator,
      fixes decision_type row conversion, and includes the decision_store regression tests.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2292; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=3697151836f963bb25e8e52193f641a78d7f17cb;
          d="$(mktemp -d)" && gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "${d}/pr.txt" && grep -Fq "${PRODUCT_HEAD}" "${d}/pr.txt" && grep -Fxq dev "${d}/pr.txt" &&
          grep -Fq 'feat(OMN-14529): wire decision_store skill dispatch route' "${d}/pr.txt" && for p
          in src/omnibase_infra/cli/enum_skill_arg_type.py src/omnibase_infra/cli/cli_skill.py src/omnibase_infra/cli/skill_mapping.yaml
          src/omnibase_infra/nodes/node_decision_store_query_compute/handlers/handler_query_decisions.py
          tests/unit/cli/test_cli_skill.py tests/unit/nodes/test_decision_store_query_compute.py; do grep
          -Fq "$p" "${d}/pr.txt" && mkdir -p "${d}/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "${d}/$p"; done && grep -Fq 'JSON = "json"' "${d}/src/omnibase_infra/cli/enum_skill_arg_type.py"
          && grep -Fq 'json.loads(raw)' "${d}/src/omnibase_infra/cli/cli_skill.py" && grep -Fq 'skill_name:
          decision_store' "${d}/src/omnibase_infra/cli/skill_mapping.yaml" && grep -Fq 'node_decision_store_orchestrator'
          "${d}/src/omnibase_infra/cli/skill_mapping.yaml" && grep -Fq 'arg_type: json' "${d}/src/omnibase_infra/cli/skill_mapping.yaml"
          && grep -Fq 'decision_type": str(row["decision_type"]).lower()' "${d}/src/omnibase_infra/nodes/node_decision_store_query_compute/handlers/handler_query_decisions.py"
          && grep -Fq 'test_decision_store_registered_and_wired' "${d}/tests/unit/cli/test_cli_skill.py"
          && grep -Fq 'test_row_to_entry_lowercases_decision_type_for_omnibase_core_enum' "${d}/tests/unit/nodes/test_decision_store_query_compute.py"
  - id: "dod-infra-pr-2292-local-verification"
    description: >-
      Local verification for omnibase_infra PR #2292 at head 3697151836f963bb25e8e52193f641a78d7f17cb.
      The focused unit suite was rerun in Codex from the pinned product proof worktree and the PR body
