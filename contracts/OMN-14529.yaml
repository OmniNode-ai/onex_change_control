          && gh pr diff "${MARKET_PR_NUMBER}" --repo "${MARKET_REPO}" --name-only | grep -Fxq src/omnimarket/nodes/node_decision_store_orchestrator/adapters/postgres_decision_store.py
          && ! gh pr diff "${MARKET_PR_NUMBER}" --repo "${MARKET_REPO}" --name-only | grep -qE '(^|/)(systemd|deploy/scripts)(/|$)'
