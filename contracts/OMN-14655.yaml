      hooks source, skills allowlist/denylist config, and validation scripts; it does not perform a live
      deploy, restart, .201 mutation, systemd change, or docker-compose change.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1904; PRODUCT_REPO=OmniNode-ai/omniclaude; PRODUCT_HEAD=2e17db617c873351a1d77209a54636b6e0a78188;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,files --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and ((.files | map(.path)) | all((startswith("src/omniclaude/") or startswith("scripts/")
          or startswith("plugins/") or startswith(".github/workflows/") or (. == ".pre-commit-config.yaml"))
