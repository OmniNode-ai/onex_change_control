        check_value: 'f="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_swarm_subtask_state_reducer/handlers/handler_swarm_subtask_state.py?ref=149276cf4c28754f2aa6da9d682b7bdf6966ca12"
