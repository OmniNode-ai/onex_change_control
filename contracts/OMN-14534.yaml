---
schema_version: 1.0.0
ticket_id: OMN-14534
title: "OCC companion for omnimarket#1737 — node_swarm_subtask_state_reducer event_model absence dropped
  every message"
summary: "OCC evidence companion for OmniNode-ai/omnimarket#1737 (OMN-14534). node_swarm_subtask_state_reducer's
  contract.yaml declared handler_routing with no event_model on its single operation_match handler entry.
  omnibase_infra's auto-wiring dispatcher (handler_wiring.py) treats a missing event_model as \"pass the
  raw ModelEventEnvelope object to handle()\" — handle() did ModelSwarmSubtaskReducerInput(**input_data),
  a guaranteed TypeError on a non-mapping input. MessageDispatchEngine swallows the handler exception
  into a HANDLER_ERROR status and the Kafka bridge callback commits the offset anyway: every message on
  all 5 subscribed topics was silently dropped, permanently, with no DLQ and no retry. Deeper problem
  found while fixing: the reducer's own ModelDelegationEvent was never matched against any real producer
  — the actual wire shapes are 5 distinct real models across 3 producer types, none of which has run_id/subtask_id
  fields. Traced the real identity mapping through node_swarm_fanout_orchestrator's handler_swarm_fanout.py
  (causation_id=run_id, task_id=subtask_id, echoed verbatim by node_llm_delegation_call_effect onto all
  3 of its output event types). Fix: contract.yaml routing_strategy switched operation_match -> topic_match
  with one handler entry per subscribed topic, each declaring the real producer event_model; handler_swarm_subtask_state.py
  now adapts each of the 5 real wire shapes into the internal ModelDelegationEvent before calling the
  unchanged, already-tested pure delta(). 11 new cross-boundary tests drive the 5 real producer models
  through handle() end-to-end; RED-verified via git stash (the 6 transition-path tests fail with the exact
  original TypeError against the pre-fix handler). Also closes a pre-existing state-coverage-gate baseline
  gap for this node."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "omnimarket#1737 head makes contract.yaml's handler_routing declare routing_strategy:
      topic_match with a per-topic event_model on each of the 5 handler entries (was operation_match with
      zero event_model declarations), and makes handler_swarm_subtask_state.py adapt each real producer
      wire model into the internal ModelDelegationEvent via a _adapt() dispatcher that fail-fasts with
      TypeError on any unrecognized payload type — proven by 11 new cross-boundary tests plus an independent
      RED (git stash the fix, re-run the new tests: 6 fail with the original TypeError) then GREEN reproduction,
      not merely the implementer's own claim."
    command: see dod_evidence check_values
emergency_bypass:
