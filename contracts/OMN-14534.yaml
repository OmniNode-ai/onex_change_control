      Reads contract.yaml from the PR head and asserts handler_routing.routing_strategy is topic_match
      (was operation_match) and that all 5 handler entries (delegation-execute, delegation-call-completed,
      delegation-escalation-triggered, delegation-all-tiers-failed, swarm-fanout-completed) declare an
      event_model block — closing the crash-and-drop path where a missing event_model caused the runtime
      dispatcher to pass a raw ModelEventEnvelope into handle()."
    source: generated
    status: verified
    checks:
      - check_type: command
        check_value: 'f="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_swarm_subtask_state_reducer/contract.yaml?ref=149276cf4c28754f2aa6da9d682b7bdf6966ca12"
          --jq .content | base64 -d > "$f" && grep -Fq -- ''routing_strategy: topic_match'' "$f" && [
          "$(grep -c ''event_model:'' "$f")" -ge 5 ] && grep -Fq -- ''ModelLlmDelegationCallRequest''
          "$f" && grep -Fq -- ''ModelSwarmFanoutResult'' "$f"'
