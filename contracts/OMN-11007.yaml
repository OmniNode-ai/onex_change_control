---
schema_version: "1.0.0"
ticket_id: "OMN-11007"
title: "Exclude generated and evidence dirs from local-path scan"
summary: >
  Binds omnibase_core PR #1077, which extends `ValidatorLocalPaths._SKIP_DIRS` to skip compiled frontend
  output (`.next`, `dist`, `build`), graph generation caches (`graphify-out`), OCC immutable receipts
  (`dod_receipts`), historical command evidence (`evidence`, `.evidence`), and local runtime state (`.onex_state`).
  Collapses 1,631 of 3,273 OMN-11004 classification rows so source owners only see source-owner-actionable
  violations.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnibase_core PR #1077 carries the OMN-11007 _SKIP_DIRS expansion."
    command: "gh pr view 1077 --repo OmniNode-ai/omnibase_core --json state,headRefOid"
  - kind: "tests"
    description: "Focused validator regression tests cover every new excluded directory and a mixed-content
      guard."
    command: "uv run pytest tests/unit/validation/test_validator_local_paths.py -q"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11007 to omnibase_core PR #1077 and the deploy/test evidence."
    command: "find drift/dod_receipts/OMN-11007 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-core-pr-1077"
    description: "omnibase_core PR #1077 carries the OMN-11007 _SKIP_DIRS expansion for generated and
      evidence trees."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11007/dod-omnibase-core-pr-1077/command.yaml
          && grep -q '^pr_number: 1077$' drift/dod_receipts/OMN-11007/dod-omnibase-core-pr-1077/command.yaml
          && grep -q '^commit_sha: 167fab5eb5d9bda1df2f376af170335c92e4c472$' drift/dod_receipts/OMN-11007/dod-omnibase-core-pr-1077/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused validator_local_paths regression tests pass (9 new + 23 baseline; targeted suite
      123/123)."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11007/dod-focused-tests/command.yaml
          && grep -q '32 passed' drift/dod_receipts/OMN-11007/dod-focused-tests/command.yaml"
  - id: "dod-deploy"
    description: >
      Deploy DoD evidence for PR #1077: validator skip-list expansion, pure offline static scan; no live
      deploy, restart, or .201 mutation required before merge.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11007/dod-deploy/command.yaml &&
          grep -q '^pr_number: 1077$' drift/dod_receipts/OMN-11007/dod-deploy/command.yaml && grep -q
          'No live deploy' drift/dod_receipts/OMN-11007/dod-deploy/command.yaml"
