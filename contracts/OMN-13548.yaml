---
schema_version: "1.0.0"
ticket_id: "OMN-13548"
title: "fix(OMN-13548): route malformed projection events to canonical DLQ (D-03)"
summary: >
  HandlerProjectionDelegation and HandlerProjectionSavings runners caught a ValidationError (and several
  missing-required-field checks) on malformed delegation/savings events, logged at WARNING, and dropped
  them silently — no DLQ, no failure event, no terminal. The fix routes every such drop to the contract-declared
  DLQ topic (event_bus.dlq_topics), carrying the offending envelope + correlation_id + failure reason,
  via a new shared omnimarket.projection.dlq surface that mirrors the canonical node_intent_event_consumer_effect
  DLQ pattern. A CI/pre-commit guard fails any projection handler that catches ValidationError without
  a DLQ route. RE-FIX (dod-002): the omnimarket-handler-only fix did not fire on the REAL bus path. The
  runtime wiring's projection dispatch callback (_make_projection_dispatch_callback) invokes the handler's
  handle() and catches any raised ValidationError in its generic except arm, then logs + drops — so the
  handler's internal DLQ branch never ran. The robust fix moves DLQ-on-handler-error into the wiring itself
  (omnibase_infra handler_wiring.py): the projection dispatch callback now routes the offending raw envelope
  to the contract-declared event_bus.dlq_topics[0] for ALL projection handlers (general, not delegation-only),
  carrying correlation_id + failure reason. DLQ target is resolved from the contract YAML, never hardcoded.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
