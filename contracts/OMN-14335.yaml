ticket_id: "OMN-14335"
title: "refactor(OMN-14335): retire errors→models import-layering back-edge in omnibase_core"
summary: >-
  omnibase_core PR #1421 retires the frozen `errors -> models.**` / `errors.** -> models.**` import-layering
  back-edge (~11 edges) by relocating the load-bearing ONEX error types DOWN into the foundation-layer
  errors package: ModelOnexError -> errors/model_onex_error.py, ModelFailFastDetails -> errors/model_fail_fast_details.py,
  and the internal _ModelOnexErrorData companion -> errors/model_onex_error_data.py (it moved too because
  import-linter counts the func-local import from ModelOnexError, so leaving it in models.common would
  re-create the edge via the relocated class). The old models.* modules (models.errors.model_onex_error,
  models.errors.model_fail_fast_details, models.common.model_onex_error_data) are kept as thin, identity-preserving
  re-export shims (models -> errors is downward, allowed), so the ~40+ repo-wide and cross-repo importers
  keep working unchanged. Separately, the ModelOnexWarning / ModelRegistryError / ModelCLIAdapter convenience
  re-exports were pruned from errors/__init__.py (they created 3 of the 4 errors(__init__)->models edges);
  the sole consumer (tests/unit/errors/test_error_codes.py) was repointed to the canonical models.core
  path. Both `errors -> models` ignore lines are DELETED from .importlinter. Verified by the import-linter
  oracle: the "Foundation primitives must not import higher layers" contract stays KEPT with the allowlist
  entries removed, proving the edges are genuinely gone (epic OMN-3210). Shares the .importlinter core-foundation-no-upward
  block with the types→models lane (OMN-14336); only the errors ignore lines were removed — a rebase may
  be needed if that lane lands first.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
