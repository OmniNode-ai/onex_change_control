ticket_id: "OMN-13005"
title: "node_context_roi_runner consume-leg: runtime injects no blocking event_consumer — degenerate rows
  halt Exp 1-3"
summary: >-
  SECOND distinct defect on node_context_roi_runner (the dispatch INPUT crash was OMN-13003 / omnimarket#1180,
  hot-patched live). After that patch the runner consumed, drove, and emitted its terminal without crashing,
  but every battery row was degenerate (failure_stage=generation, attempt_count=0, zero tokens, empty
  model_id/provider) while the underlying generations SUCCEEDED ~1-2s later (provider=local, Qwen3.6-35B-A3B,
  contract_passed=True). Root cause (owning surface: omnibase_infra runtime auto-wiring, src/omnibase_infra/runtime/auto_wiring/handler_wiring.py):
  HandlerContextRoiRunner declares an injectable blocking event_consumer and, in _run_trial, calls self._consumer(gen_terminal_topic,
  correlation_id, generation_timeout_seconds) expecting a blocking, correlation-id-filtered consumer of
  onex.evt.omnimarket.node-generation-completed.v1. The runtime auto-wiring materialized event_publisher
  for handlers that declare it (_materialize_known_handler_dependencies -> _make_sync_event_publisher)
  but had NO equivalent for event_consumer, so the runner constructed with the no-op _noop_consumer default
  that returns None synchronously -> _run_trial recorded failure_stage=generation BEFORE the generation
  pipeline produced its result. The 120s timeout was never honored because the no-op never blocked. This
  is the feedback_real_dispatch_path_tests blind spot: handler-isolation tests inject a returning consumer
  stub and pass; the live runtime injected nothing. omnibase_infra PR #1951 adds _make_sync_event_consumer
  (mirror of _make_sync_event_publisher) backed by service_terminal_event_consumer.make_terminal_event_consumer,
  a sync (topic, correlation_id, timeout) -> dict | None adapter running the proven direct-Kafka correlate-and-wait
  loop (from RuntimePatternBBroker) on an isolated event loop in a worker thread so blocking does not
  deadlock the runtime dispatch loop that delivers the awaited terminal. No topic, envelope, or contract
  API change.
