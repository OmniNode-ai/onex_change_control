schema_version: "1.0.0"
ticket_id: "OMN-12842"
title: "M2: durable scored capsule/exemplar store as a bus-materialized projection"
summary: >-
  Adds node_projection_capsule_store (REDUCER) in omnimarket that materializes a durable, queryable, scored
  capsule table from context-ROI score events, following the established projection-reducer pattern (node_projection_savings).
  Stable identity: capsule_hash = sha256(canonical(factor, content, source_artifact, source_commit, schema_version))
  with a surrogate UUIDv5 capsule_id; a changed exemplar is a NEW row, never an in-place effectiveness
  mutation. Effectiveness is populated FROM the ROI score event (onex.evt.omnimarket.context-roi-score-completed.v1)
  and is never empty on a scored row (model validator + DB CHECK). Staleness decay (effective_score =
  raw * max(floor, 0.5**(age_days/half_life_days))) uses contract-declared params (config.decay half_life_days=30.0,
  floor=0.25) applied at the read boundary; raw values stay immutable. Two idempotent migrations (078
  base table + ux_capsule_identity unique on capsule_hash + scored-effectiveness CHECK; 079 decay read
  view ordered after the base table). Publishes onex.evt.omnimarket.capsule-store-applied.v1. CONTRACT/NODE/HANDLER
  only — no Plugin*/engine/manager/writer class. Node-private models (single-repo importer). No topic
  schema, envelope, protocol, or public API change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
