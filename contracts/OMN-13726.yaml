title: "Add slack.bot_token secret resolver mapping and SLACK_MORNING_CHANNEL overlay config"
summary: >-
  Config-only change to the omnibase_infra runtime policy contract and integration catalog. Adds the logical
  secret ref slack.bot_token → SLACK_BOT_TOKEN to the secret_resolver_mappings in all three resolver-bearing
  runtime profiles (dev, stability-test, judge) so that node_slack_publish_effect and node_morning_report_orchestrator
  can resolve the Slack bot token by logical name. Registers node_slack_publish_effect in the integration
  catalog, adds SLACK_MORNING_CHANNEL as a declared env_var, and sets a clearly-marked operator placeholder
  in all three machine-class overlay files and shared_key_registry.yaml. No Python source, no new nodes,
  no deploy or restart required before merge.
