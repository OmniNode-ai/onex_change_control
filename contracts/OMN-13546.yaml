title: "fix(OMN-13546): add handle() dispatch entrypoints to HandlerForwardOutbound + HandlerConsumeInbound"
summary: >
  HandlerForwardOutbound and HandlerConsumeInbound in node_bus_forwarder_effect implemented domain-named
  methods but not the canonical handle() protocol entrypoint checked by the runtime dispatcher. This caused
  144 ModelOnexError dispatches per dev redeploy on the three gateway topics. Fix adds async handle()
  to each handler returning ModelHandlerOutput.for_compute() with the transformed ModelGatewayEnvelope.
