schema_version: "1.0.0"
ticket_id: OMN-12990
title: "fix(OMN-12990): pin worker replicas in ledgered config + fail-fast lane overrides (silent-drop
  ratchet)"
summary: >-
  omnibase_infra PR #1948 closes the WORKER_REPLICAS silent-drop hole in the config-drift family. The
  base compose set runtime-worker deploy replicas to ${WORKER_REPLICAS:-0} (soft-default zero); the stability
  lane's required state includes a running worker (GATE_ZERO_PROOF.md, 4 runtime containers), so any plain
  compose up/recreate without the worker replica count silently scaled the worker to zero with no error
  and no signal. The PR adds a contract-declared `replicas` to ModelRuntimeProcessPolicy, pins replicas:
  1 in every lane's worker block in runtime_policy.contract.yaml, renders {PROFILE}_WORKER_REPLICAS into
  the ledgered docker/runtime-policy.env, and switches the stability and prod compose overrides to fail-fast
  ${..._WORKER_REPLICAS:?...} (no silent default). Recurrence guards: tests asserting the fail-fast override
  form, a contract replica pin >= 1 per lane, and rendered {PROFILE}_WORKER_REPLICAS=1; plus an expected-container
  census step in the runbook deploy/verify procedure so a missing worker becomes a failure, not silence.
is_seam_ticket: false
