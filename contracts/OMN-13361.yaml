schema_version: "1.0.0"
ticket_id: "OMN-13361"
title: "e2e probe: fix _wait_for_terminal_event hang (add real timeout)"
summary: >
  The omnimarket e2e-probe helper _wait_for_terminal_event relied on aiokafka's consumer_timeout_ms to
  break 'async for msg in consumer', but that parameter does not stop __anext__ on an idle topic, so the
  TimeoutError was unreachable and a never-arriving terminal hung the test indefinitely — TestE2E4BTerminalEvent
  was skipped (Gate-Zero GZ-2 / defect G-5). Fix wraps the consume loop in asyncio.timeout so the wait
  bounds at the configured timeout and raises TimeoutError on miss. Test-only change; no source, topic,
  envelope, or contract API change; no live-lane mutation.
