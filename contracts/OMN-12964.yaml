schema_version: "1.0.0"
ticket_id: "OMN-12964"
title: "P1.7: Quality-gate calibration — graded delegation score + prose document DoD + calibration CI
  ratchet"
summary: >
  The delegation quality gate (node_delegation_quality_gate_reducer.delta) scored 0.000 on the document
  task on BOTH tiers (live CID a604cd40), making the quality signal useless for Experiments 1-3 (OMN-12944
  / P0.2) — a scoring artifact masqueraded as an ON/OFF effect. Root cause was two compounding defects:
  (1) a degenerate scorer — quality_score collapsed to {0.0, 1.0}: ANY failing DoD check forced 0.0 and
  only a full pass returned 1.0, so a near-perfect output and an outright refusal scored identically;
  (2) a DoD-definition defect — the `document` task class declared code-docstring checks (docstring_present,
  follows_google_style, covers_args_returns_raises) that a prose document never satisfies, hard-failing
  docstring_present deterministically. Fix introduces a graded band-weighted quality_score (fraction of
  DoD checks satisfied, deterministic band 0.6 > heuristic 0.4) while preserving the binary passed / fail_category
  gate (deterministic failure still hard-blocks injection), and reassigns the `document` task class to
  prose checks (response_non_empty + accurate) — the docstring DoD stays on the `documentation` task class.
  Enforcement ratchet: scripts/ci/run_quality_gate_calibration.py scores a known-good/known-bad corpus
  through the real delta() and FAILs CI on degenerate distribution, narrow score range, weak good-vs-bad
  margin, band overlap, or corpus-vs-shipped DoD drift; wired as a required step in .github/workflows/ci.yml.
  No topic schema, envelope wire, or contract API change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
