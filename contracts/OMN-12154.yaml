title: "Fix InMemoryRateLimiter multi-worker correctness bug"
summary: >
  Replaces InMemoryRateLimiter in docker/onex-api/auth_rate_limit.py with a Valkey-backed ValkeyRateLimiter
  that uses an atomic Lua INCR+PEXPIRE script. All uvicorn workers share a single counter per (key, window),
  eliminating the N×limit effective-rate bug present when WEB_CONCURRENCY>1. omninode_infra PR #472 carries
  the implementation.
