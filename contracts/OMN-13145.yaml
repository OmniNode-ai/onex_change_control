schema_version: "1.0.0"
ticket_id: "OMN-13145"
title: "node_integration_sweep_orchestrator: wire onto canonical dispatch + add real Kafka/DB/projection/golden-chain
  probes"
summary: >-
  node_integration_sweep_orchestrator crashed on the canonical dispatch path (onex node / onex run) and
  only ran three health/CI probes. Three contract-wiring bugs fixed: (1) removed a bogus operation: surface_probes
  handler_routing entry that pointed the resolver at a non-existent surface_probes class (surface_probes.py
  exports probe FUNCTIONS, not a ProtocolMessageHandler) and crashed every dispatch at handler instantiation;
  (2) added event_model to the sweep entry so the runtime coerces the envelope payload into the typed
  ModelIntegrationSweepOrchestratorRequest before dispatch (same dict-not-typed class as OMN-13141 / OMN-8724),
  plus a correlation_id field so the frozen request validates against the runtime-injected envelope id
  under extra='forbid'; (3) added a top-level input_model so the event-driven runtime builds the initial
  command from the caller's --input payload instead of publishing only {correlation_id} and silently ignoring
  caller fields. Added real KAFKA (rpk topic+group), DB (psql to_regclass+count over tail tables), PROJECTION
  (projection-API per topic), and GOLDEN_CHAIN (head->consumer->tail) probes as the orchestrator compute
  logic, gated on populated config. Added real-dispatch-path tests that drive the node through RuntimeLocal
  (the harness both bugs hid behind) and verified they FAIL against the pre-fix contract. omnimarket PR
  #1219.
