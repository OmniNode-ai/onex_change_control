title: "refactor(OMN-14400): carve node_dod_verify gh-CLI evidence I/O into a canonical EFFECT handler"
summary: >-
  omnimarket PR #1721 is RSD-1 of the OMN-14398 EvidenceCollector canonicalization epic. It carves the
  4 gh-CLI subprocess methods (_lookup_pr_for_ticket, _lookup_repo_for_ticket, _fetch_pr_merge_state,
  _fetch_pr_checks_green) out of node_dod_verify's bespoke EvidenceCollector service into a new canonical
  EFFECT handler, HandlerDodEvidenceGithubEffect, co-located inside node_dod_verify. Independent adversarial
  verification (verify-14400, not the implementer) confirmed the carve is behavior-identical by diffing
  each method against origin/dev line-by-line: identical gh argv including the --required flag pre-existing
  from OMN-14390/#1718, identical timeouts, identical fail-closed exception handling. This PR does NOT
  complete node_dod_verify's canonicalization: contract.yaml still declares node_archetype: compute /
  purity: pure while the node now explicitly hosts an EFFECT handler doing subprocess I/O. That self-contradiction
  is pre-existing on origin/dev (confirmed unmodified by this PR) and is deferred to RSD-3 alongside full
  archetype/purity reconciliation, per the OMN-14398 epic sequencing.
