ticket_id: "OMN-13610"
title: "docs(OMN-13610): WS-C Phase 1.2 ROUTE SEA generation pipeline -> omnimarket node_generation_consumer"
summary: >
  WS-C Phase 1.2 of the SEA->canonical migration (epic OMN-13604). ROUTE: the SEA imperative generation
  loop (src/pipeline/consumer.py main loop + src/pipeline_local/consumer_local.py local-tier subclass
  + src/pipeline/kafka_runner.py cloud-tier Kafka daemon) has its permanent canonical home in omnimarket
  node_generation_consumer. The ROUTE-1 gates pass: the target node exists on disk (contract.yaml + handlers
  + models) AND is runtime-proven -- its consumer group is Stable with a live aiokafka member, committed
  offsets, and zero lag on both the stability-test and prod lanes (rpk group describe). The canonical
  handler HandlerGenerationConsumer.handle subsumes the SEA generate_with_retry/run_once capability: bounded
  retry loop over contract max_attempts, per-run cost from the canonical cost-pricing contract (no hardcoded
  constant), MEASURED-only usage provenance, and both tiers (local vLLM + cloud Gemini) resolving endpoint+model+api-key
  from the routing-authority bifrost overlay keyed by endpoint_ref -- never an LLM_* env var. Transport/lifecycle
  is owned by the runtime; the node holds no raw KafkaConsumer/KafkaProducer and no signal handlers. This
  PR adds a migration boundary doc (docs/migrations/sea-generation-pipeline-routing.md) and a structural
  parity test pinning all of the above. The three SEA copies are NOT deleted in this PR: consumer.py is
  still load-bearing in-process infra for several SEA-internal surfaces (demo entrypoint, model-comparison
  runner, agent demo/tools, delegation executor, eval runner) whose own canonicalization is tracked by
  later phases; deleting it standalone would break SEA. The generation capability is routed + proven canonically;
  the SEA file removal is a repo-archival (Phase 8) step, not a parity step -- recorded honestly in the
  boundary doc. Docs+test only; no envelope/contract-API change, no live-lane mutation.
is_seam_ticket: false
interface_change: false
