    description: >
      A failing-first structural parity suite proving the canonical node subsumes the SEA generation loop:
      canonical async handle() entrypoint, bounded retry loop over contract max_attempts, contract-sourced
      cost, usage provenance aggregation, routing-authority endpoint resolution with no LLM_* env reads,
      no Kafka client in the node, and a recorded capability->canonical-home boundary doc. The existing
      per-tier endpoint-resolution proof (local vLLM + cloud Gemini distinct URLs from the contract, fail-closed,
      no env endpoint) in test_endpoint_routing_authority.py remains green.
    command: "uv run pytest tests/unit/nodes/node_generation_consumer/test_sea_generation_routing_parity.py
      tests/unit/nodes/node_generation_consumer/test_endpoint_routing_authority.py -q"
