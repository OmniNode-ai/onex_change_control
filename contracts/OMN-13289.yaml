ticket_id: "OMN-13289"
title: "feat(omnimarket): node_generation_consumer fixture-corpus spec + corpus-based acceptance gate
  (G0 — gates all validator generation)"
summary: >-
  Extends node_generation_consumer (omnimarket) from free-text generation to a fixture-corpus-bearing
  spec (violation_fixtures the generated scanner MUST flag, clean_fixtures it MUST pass) and adds a deterministic
  corpus-based acceptance gate. A generated validator is accepted iff it flags every violation_fixture
  and passes every clean_fixture, by deterministic execution — the corpus verdict, not the LLM, is the
  acceptance authority. The corpus must carry an adversarial mutation case (an all-curated corpus is rejected).
  This is the G0 prerequisite that gates G1 (canary) and G2 (mass-produce).
