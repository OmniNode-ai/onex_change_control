title: "Remove LOCAL_LLM_SHARED_SECRET source synthesis in AI reviewer adapter"
summary: >
  Binds omniintelligence PR #651, which removes the `cli-review-unsigned` placeholder synthesis of `os.environ["LOCAL_LLM_SHARED_SECRET"]`
  from `adapter_ai_reviewer.py`. Ownership of the shared secret is now exclusively in the LLM HTTP transport,
  which fail-closes with `ProtocolConfigurationError` when the secret is missing.
