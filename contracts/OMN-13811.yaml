summary: >
  The omninode_infra build-and-push-omnidash.yml Trivy gate failed on two targets: Debian OS packages
  (libcap2 CVE-2026-4878; libgnutls30 CVE-2026-33845/42010 CRITICAL + 33846/3833/42009 HIGH) and npm packages
  (cross-spawn, fast-uri, glob, minimatch, ws) plus a tar@6.2.1 vendored by the base image's global npm
  CLI. omnibase omnidash PR #248 adds npm overrides (cross-spawn>=7.0.6, fast-uri>=3.1.2, glob>=10.5.0,
  minimatch>=9.0.7) plus ws>=8.21.0; omninode_infra PR #550 patches the Dockerfile runtime stage (apt-get
  upgrade libgnutls30/libcap2 to the fixed Debian point releases and removal of the unused global npm
  CLI that vendored tar@6.2.1). This promotion PR cherry-picks the #550 Dockerfile fix onto a promotion/*
  branch off main so the ECR-push-enabled main run builds a Trivy-clean image.
