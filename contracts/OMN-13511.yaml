schema_version: "1.0.0"
ticket_id: "OMN-13511"
title: "Register node-backed dogfood sweeps in the onex skill CLI dispatch registry (skill_mapping.yaml)"
summary: >
  Fixes the registry/field side of the sweep dogfood gap (Rule 5: an enforcement gate that cannot be invoked
  is worse than no gate). Six dogfood runtime sweeps — runtime_sweep, golden_chain_sweep, integration_sweep,
  contract_sweep, skill_functional_audit, and dod_sweep — each had a real, implemented backing node in
  the omnimarket onex.nodes catalog but were absent from the declarative omnibase_infra/src/omnibase_infra/cli/skill_mapping.yaml
  registry, which carried only the 25 OMN-13097 Phase-4a shims plus gap. So uv run onex skill <name> returned
  "Unknown skill" and the SKILL.md-prescribed headless dogfood invocation was unrunnable. The fix adds
  the six skill->node mappings (each node_name is the canonical omnimarket onex.nodes entry point, each
  result_model is the handler's real return type, each CLI arg maps onto a field the node's extra="forbid"
  request model accepts) and adds a test_every_node_backed_sweep_skill_is_registered fixture — the inverse
  of the OMN-13531 mapping->catalog gate — so any future node-backed dogfood sweep that ships without
  a mapping fails at CI time instead of at dispatch time. record_friction is intentionally NOT added:
  it is a pure-instruction skill backed by friction_recorder.py with no backing node and no prescribed
  onex skill record_friction verb. This is the registry/field side, distinct from the node-handler default-scope
  side (OMN-13538) and the merged compliance_sweep fix (OMN-13514).
