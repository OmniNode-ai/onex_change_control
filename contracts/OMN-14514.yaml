  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-1750-head-ccd458f-swarm-failed-status-surfaces
    description: >-
      Product-observing verification that omnimarket#1750 head ccd458ff645227f092e05cd1ee7a5d0ff9e07dc8
      changes the swarm dispatch handler, the root golden-chain projection test, the node-local handler
      test, and removes dead state-coverage baseline entries.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 1750 --repo OmniNode-ai/omnimarket --json headRefOid,files,commits
          --jq '.headRefOid + "\n" + ((.files | map(.path)) | join("\n")) + "\n" + ((.commits | map(.oid))
          | join("\n"))' > "$f" && grep -Fq 'ccd458ff645227f092e05cd1ee7a5d0ff9e07dc8' "$f" && grep -Fq
          'src/omnimarket/nodes/node_swarm_dispatch_orchestrator/handlers/handler_swarm_dispatch.py' "$f"
          && grep -Fq 'tests/test_golden_chain_projection_swarm.py' "$f" && grep -Fq 'src/omnimarket/nodes/node_swarm_dispatch_orchestrator/tests/test_handler_swarm_dispatch.py'
          "$f" && grep -Fq 'scripts/validation/state_coverage_baseline.txt' "$f"
  - id: dod-1750-head-ccd458f-red-green-proof
    description: >-
      Product PR body verification for OMN-14514: the PR documents the missing status ValidationError,
      the status=FAILED fix, real producer-to-consumer seam regression coverage, full FSM golden-chain
      coverage, and focused local gates.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 1750 --repo OmniNode-ai/omnimarket --json headRefOid,body --jq '.headRefOid
