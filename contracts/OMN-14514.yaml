          "$f" && grep -Fq 'src/omnimarket/nodes/node_swarm_dispatch_orchestrator/handlers/handler_swarm_dispatch.py'
          "$f" && ! grep -Eq '(^|/)deploy/|docker/|compose[.]ya?ml|Dockerfile|runtime|k3s|helm|migrations?/'
