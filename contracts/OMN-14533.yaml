  in handler_savings.py, detecting the real ModelSavingsEstimate shape and re-keying it onto the canonical
  shape before existing lookups/validation run (cloud_cost_usd reconstructed as local_cost_usd + savings_usd,
  matching every other path in the module); wired into both consumer entrypoints. DLQ drain of the 6 backlogged
  events explicitly NOT attempted (requires live Kafka access, flagged as an operational follow-up). A
  new cross-boundary test (4 cases) drives a real omnibase_infra ModelSavingsEstimate instance through
  both consumer entrypoints; RED-verified via file-scoped git checkout of the parent commit (4 failed
  / 0 passed: DLQ route, ImportError, and two 29-error ValidationError failures) then GREEN restoration.'
