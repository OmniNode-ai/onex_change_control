---
schema_version: '1.0.0'
ticket_id: OMN-13765
title: "fix(OMN-13765): upgrade musl to clear CVE-2026-40200 in cloud-migrate image"
summary: >
  docker/Dockerfile.migrate (base alpine:3.19) ships musl / musl-utils 1.2.4_git20230717-r5, which Trivy
  flags for CVE-2026-40200 (2x HIGH). The Trivy gate in build-and-push-cloud-migrate-image.yml (severity
  CRITICAL,HIGH, ignore-unfixed, exit-code 1) fails the omninode-cloud-migrate ECR push while the base
  ships r5. Fix adds "RUN apk upgrade --no-cache musl musl-utils" early in the build stage; the fix is
  available upstream in 1.2.4_git20230717-r6 (present in the alpine v3.19 main repo), so apk upgrade pulls
  it at build time. No runtime behavior change — the image only copies SQL migration files.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: >
      Dockerfile.migrate build stage carries the apk upgrade line that clears the musl CVE.
    command: >
      grep -q 'apk upgrade --no-cache musl musl-utils' docker/Dockerfile.migrate
  - kind: ci
    description: >
      Baseline Trivy scan reproduces CVE-2026-40200 on alpine:3.19 (installed r5, fixed in r6), and the
      alpine v3.19 main repo serves the fixed musl r6 that apk upgrade resolves to.
    command: >
      trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 alpine:3.19
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
