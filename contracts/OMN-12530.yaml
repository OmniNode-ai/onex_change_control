---
schema_version: "1.0.0"
ticket_id: "OMN-12530"
title: "Bug: Codex Pattern B client times out despite terminal event on stability Kafka"
summary: >-
  Fix the omnimarket Codex runtime request adapter so deployed Pattern B dispatch uses the node contract
  terminal topic when callers leave the default broker response topic in place, and accept raw Pattern
  B broker terminal events that carry result payloads. This closes the client-side timeout class observed
  during stability dogfood while preserving the remaining runtime transport issue as separate evidence.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      Focused and full Codex runtime adapter tests prove contract-terminal subscription, raw broker terminal
      parsing, and existing Pattern B adapter behavior.
    command: >-
      uv run pytest tests/test_codex_runtime_client.py -q && uv run ruff check src/omnimarket/adapters/codex/runtime_client.py
      tests/test_codex_runtime_client.py && OMNIBASE_INFRA_PATH=/Users/jonah/Code/omni_home/omnibase_infra
      uv run pre-commit run --files src/omnimarket/adapters/codex/runtime_client.py tests/test_codex_runtime_client.py
  - kind: "manual"
    description: >-
      Stability dogfood published a Pattern B session_orchestrator command and proved the patched client
      selected the contract terminal topic. No matching terminal event was found for that correlation,
      so remaining live instability is tracked as runtime/broker Kafka transport rather than this client
      parser and topic-resolution bug.
    command: "Stability dogfood command correlation 00aec728-506b-4807-a6d0-5fd1c972a788"
dod_evidence:
  - id: "dod-omnimarket-pr-1007"
