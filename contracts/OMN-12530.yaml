        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12530/dod-omnimarket-pr-1007/command.yaml"
          && grep -q '^pr_number: 1007$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12530/dod-omnimarket-pr-1007/command.yaml"
          && grep -q '^commit_sha: "8503415a6fac955a36b6c682e0f85e091235c0d8"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12530/dod-omnimarket-pr-1007/command.yaml"
