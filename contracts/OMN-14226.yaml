schema_version: "1.0.0"
ticket_id: "OMN-14226"
title: "ci(OMN-14226): omnimarket occ-preflight delegates to canonical reusable"
summary: >-
  omnimarket PR #1663 replaces the repository-local OCC preflight reimplementation in .github/workflows/call-occ-preflight.yml
  with the canonical reusable workflow from omnibase_core. The previous inline implementation read the
  PR body from the frozen pull_request event payload, so a later Evidence-Source body edit could leave
  stale red OCC contexts until manual reruns. The thin caller delegates to OmniNode-ai/omnibase_core/.github/workflows/occ-preflight.yml@main,
  preserving the surfaced check name `occ-preflight / eligibility` through the caller job id `occ-preflight`
  and reusable job id `eligibility`. The change is workflow-only, retains pull_request edited triggers,
  intentionally omits merge_group because omnimarket dev has no merge queue, and does not deploy or restart
  runtime services.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
