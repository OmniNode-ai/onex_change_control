schema_version: "1.0.0"
ticket_id: "OMN-13123"
title: "Fix delegate-skill.v1 DLQ: add message_category to node_delegate_skill_orchestrator handler_routing"
summary: >-
  node_delegate_skill_orchestrator/contract.yaml had a handler_routing entry with routing_strategy: operation_match
  but no message_category key. The runtime dispatcher requires message_category to match the command category
  on inbound envelopes; without it, every direct publish to onex.cmd.omnimarket.delegate-skill.v1 dead-lettered
  (DEL-06 root cause). Fix: add message_category: command, operation: delegate-skill.orchestrate, and
  event_type: omnimarket.delegate-skill to the handler_routing entry, mirroring node_delegation_orchestrator
  which already sets message_category: command. Adds regression test test_handler_routing_has_message_category_command
  to prevent recurrence.
