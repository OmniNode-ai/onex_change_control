title: "OMN-13202 — contract-source the 3 kept topic constants (migrate generate_topic_enums.py to read
  contracts)"
summary: >-
  Follow-up to OMN-13195 (epic OMN-13188, Workstream A — all topics from contracts). omnibase_infra PR
  #2017 migrates scripts/generate_topic_enums.py off the event_bus/topic_constants.py AST scan onto a
  contract-declarative manifest (new src/omnibase_infra/runtime/topics.yaml, scanned via ContractTopicExtractor.extract_from_skill_manifests),
  which mirrors the owning omnimarket node_delegate_skill_orchestrator / node_emit_daemon published topics
  (omnimarket is not an omnibase_infra build dependency, so its contract.yaml cannot be read in CI). With
  the new source, EnumOmnimarketTopic.EVT_DELEGATE_SKILL_*_V1 and EnumOmniclaudeTopic.EVT_SESSION_COORDINATION_SIGNAL_V1
  regenerate byte-identical (service_kernel bootstrap dependency preserved, OMN-11996). The 3 kept TOPIC_*
  constants (TOPIC_SESSION_COORDINATION_SIGNAL, TOPIC_DELEGATE_SKILL_COMPLETED/FAILED) are then deleted
  so topic_constants.py holds zero topic literals (only DLQ builders remain), and the 3 OMN-13195 kept-constant
  lines are removed from topic_literal_baseline.txt. The session-registry unit test now reads the generated
  enum. 26 pre-existing dev-HEAD topic-parity gaps (build-loop / omniclaude / omniweb / omniintelligence
  families, OMN-13188 epic) were allowlisted via the parity gate's documented escape after being surfaced
  by adding a topics.yaml. Unblocks A5-full (OMN-13199).
