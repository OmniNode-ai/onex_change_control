summary: >-
  WS-C Phase 0.3 (SEA -> canonical migration, epic OMN-13604, plan doc 2026-06-24-sea-canonicalization-plan.md):
  strip every hackathon-era marker from the node_generation_consumer source so the node reads as a permanent
  canonical artifact rather than a hackathon prototype. Drops the "hackathon" tag from contract.yaml metadata.tags
  and metadata.yaml tags; rewords the OMN-13605 migration comment in handler_generated_executor.py to
  drop the literal hackathon token (the sandbox-subdir code was already de-hackathon'd by Phase 0.1 #1431);
  swaps the validator-corpus clean-fixture carrier word hackathon -> hacksaw, preserving the lowercase-'hack'-substring
  word-boundary test invariant. Adds a TDD gate test pinning the plan DoD grep-clean invariant. Ships
  no live deploy / runtime restart.
