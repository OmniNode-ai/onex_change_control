ticket_id: OMN-13760
title: "fix(OMN-13760): correct deploy-agent canonical systemd unit ExecStart drift"
summary: >
  The canonical omnibase_infra deploy-agent systemd unit pointed WorkingDirectory and DEPLOY_AGENT_DIR
  at /data/omninode/omnibase_infra/scripts/deploy-agent but still launched the legacy /data/omninode/deploy-agent/venv
  interpreter. The downstream PR corrects ExecStart to the canonical repo-clone venv, hardens the unit-source
  test against legacy venv regressions, and carries the migration vendor-sync artifact surfaced by the
  repo's always-run pre-commit hook.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: >
      deploy-agent.service ExecStart uses the canonical repo-clone venv path and no longer references
      the legacy standalone deploy-agent venv.
    command: >
      grep -q '/data/omninode/omnibase_infra/scripts/deploy-agent/.venv/bin/python' scripts/deploy-agent/deploy/deploy-agent.service
  - kind: tests
    description: >
      deploy-agent unit-source regression test asserts the canonical ExecStart and rejects /data/omninode/deploy-agent/venv.
    command: >
      pytest scripts/deploy-agent/tests/unit/test_deploy_agent_service_source.py
