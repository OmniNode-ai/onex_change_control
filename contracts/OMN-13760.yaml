ticket_id: OMN-13760
title: "fix(OMN-13760): remove deploy-agent systemd watchdog crash-loop"
summary: >
  The reopened OMN-13760 deploy-agent fix removes the systemd WatchdogSec configuration that caused the
  user-scope deploy-agent to SIGABRT every 30 seconds when the optional systemd-python notifier was absent
  and when multi-minute rebuild subprocesses blocked the asyncio event loop. The downstream omnibase_infra
  PR removes watchdog code from deploy_agent.agent, keeps Restart=on-failure as the crash recovery mechanism,
  tracks the .201 drop-in override with WatchdogSec=0, and adds regression coverage for the base unit
  and override.
