ticket_id: "OMN-13210"
title: "[B1] Rebuild node_hostile_reviewer canonically — orchestrator + COMPUTE/EFFECT split, delete shell"
summary: >-
  Phase B1 of the canonical node migration (epic OMN-13205, consuming the A1 re-home OMN-13208). DELETE-AND-REBUILD
  the non-canonical node_hostile_reviewer 'workflow' shell (node_type: workflow + in-process FSM HandlerWorkflowRunner
  driving fsm.advance(), shelled gh pr diff, bespoke handle(self, input_data) -> dict signatures) into
  canonical CONTRACT + NODE + HANDLER primitives across five nodes: node_hostile_reviewer_orchestrator
  (ORCHESTRATOR) consumes the start command and composes the canonical computes/effects, emitting ModelHostileReviewerCompletedEvent
  over the bus via ModelHandlerOutput.for_orchestrator(events=...); node_review_prompt_builder_compute
  (COMPUTE) wraps the A1 build_prompt; node_review_response_parser_compute (COMPUTE) wraps the A1 parse_model_response;
  node_github_diff_effect (EFFECT) resolves the PR diff via the GitHub REST API (urllib, token from contract
  api_key_ref) replacing the shelled gh pr diff; node_review_convergence_compute (COMPUTE) retains the
  eval convergence reducer as a standalone COMPUTE. Each handler implements handle(...) -> ModelHandlerOutput;
  no FSM advance, no shelled CLI, no asyncio.run inside handle. Shared review node I/O lives in omnimarket.review.node_io
  so no node reaches into a sibling node's models package (only the pre-existing finding-aggregator input
  is allowlisted). model_training_data re-homed to omnimarket.models. The command/event topics (onex.cmd.omnimarket.hostile-reviewer-start.v1
  / onex.evt.omnimarket.hostile-reviewer-completed.v1) and the ModelHostileReviewerCompletedEvent output
  shape are preserved (byte-stable, replay-verified). Cross-repo repoints: omnibase_infra skill_mapping
  + omniclaude plugin-compat/SKILL.md; omnimarket ticket_pipeline + pr_review_bot contracts. This OCC
  PR additionally removes the now-stale node_hostile_reviewer/handlers/* compliance allowlist entries
  (the node is deleted). A0 ledger hostile_reviewer rows resolved; no node_hostile_reviewer.* import or
  contract module declaration remains.
