  Bind omnimarket PR #1517, which fixes the node_linear_triage async runtime path. HandlerLinearTriage.handle()
  now awaits resolve_api_key_async() instead of calling sync-only resolve_api_key() from the LocalRuntimeBusAdapter
  event loop, and __main__ awaits the async handler directly. The change touches handler/__main__ code
  and tests only; no live deploy, restart, .201 mutation, production data mutation, new REST endpoint,
  or event-bus topic change was performed in this evidence step.
