    description: >-
      Product-observing verification for omnimarket PR #1766 at head e7718cd9ae6446f20187f93aec8fd826a7e18d2a.
      The evidence reads the PR metadata and changed files directly from GitHub at that exact head and
      verifies the load-bearing seams: local-qwen-no-think declares task_types, the cheap_cloud and claude
      tiers route to gemini-2.5-flash through cloud-gemini-pro, cloud-glm-judge is repointed to Gemini,
