      fall-through and code-generation allowlist behavior.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1766; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=e7718cd9ae6446f20187f93aec8fd826a7e18d2a;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,body
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + ((.files | map(.path)) | join("\n")) + "\n"
          + .body' > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt"
          && for p in src/omnimarket/configs/inference_protocols.v1.yaml src/omnimarket/configs/routing_tiers.yaml
          src/omnimarket/configs/bifrost_delegation.yaml src/omnimarket/configs/task_class_contracts.v1.yaml
          tests/unit/inference/test_protocol_config.py tests/unit/delegation/conftest.py tests/fixtures/judge_inference/glm_code_adequacy_pass.json
          tests/fixtures/judge_inference/glm_code_adequacy_fail.json; do grep -Fq "$p" "$d/pr.txt" &&
          mkdir -p "$d/$(dirname "$p")" && gh api "repos/OmniNode-ai/omnimarket/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'profile_id: local-qwen-no-think'
          "$d/src/omnimarket/configs/inference_protocols.v1.yaml" && grep -Fq 'task_types:' "$d/src/omnimarket/configs/inference_protocols.v1.yaml"
          && grep -Fq 'code_generation' "$d/src/omnimarket/configs/inference_protocols.v1.yaml" && grep
          -Fq 'validator_generation' "$d/src/omnimarket/configs/inference_protocols.v1.yaml" && grep -Fq
          'refactor' "$d/src/omnimarket/configs/inference_protocols.v1.yaml" && grep -Fq 'id: gemini-2.5-flash'
          "$d/src/omnimarket/configs/routing_tiers.yaml" && grep -Fq 'backend_id: cloud-gemini-pro' "$d/src/omnimarket/configs/routing_tiers.yaml"
          && grep -Fq 'max_context_tokens: 1000000' "$d/src/omnimarket/configs/routing_tiers.yaml" &&
          grep -Fq 'backend_id: cloud-glm-judge' "$d/src/omnimarket/configs/bifrost_delegation.yaml" &&
          grep -Fq 'model_name: "gemini-2.5-flash"' "$d/src/omnimarket/configs/bifrost_delegation.yaml"
          && grep -Fq 'code_generation: "gemini-2.5-flash"' "$d/src/omnimarket/configs/task_class_contracts.v1.yaml"
          && grep -Fq 'test: "gemini-2.5-flash"' "$d/src/omnimarket/configs/task_class_contracts.v1.yaml"
          && grep -Fq 'refactor: "gemini-2.5-flash"' "$d/src/omnimarket/configs/task_class_contracts.v1.yaml"
          && grep -Fq 'test_default_protocol_config_does_not_no_think_qwen_summarization_task_type' "$d/tests/unit/inference/test_protocol_config.py"
          && grep -Fq 'test_qwen_no_think_task_types_gate_code_generation_independent_of_prompt' "$d/tests/unit/inference/test_protocol_config.py"
          && grep -Fq 'cloud-gemini-pro' "$d/tests/unit/delegation/conftest.py" && grep -Fq 'gemini-2.5-flash'
          "$d/tests/fixtures/judge_inference/glm_code_adequacy_pass.json" && grep -Fq 'gemini-2.5-flash'
          "$d/tests/fixtures/judge_inference/glm_code_adequacy_fail.json"
