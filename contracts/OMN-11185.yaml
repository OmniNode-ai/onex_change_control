ticket_id: "OMN-11185"
title: "Remove ONEX_ACTIVE_RUNTIME_PACKAGES gate from projection consumer discovery"
summary: >
  Fix _contract_targets_active_runtime_packages in auto_wiring/discovery.py to only check publish_topics
  against the ONEX_ACTIVE_RUNTIME_PACKAGES allowlist. Previously both subscribe_topics and publish_topics
  were checked, which incorrectly blocked node_projection_delegation from being discovered when omniclaude
  was not in ONEX_ACTIVE_RUNTIME_PACKAGES. Subscribing is read-only; only publishing into a domain requires
  the producer package to be active. PR #1635 in omnibase_infra.
