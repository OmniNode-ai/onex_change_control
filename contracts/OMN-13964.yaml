---
schema_version: "1.0.0"
ticket_id: OMN-13964
title: "fix(create_ticket): accept contract-declared allow_arch_violation CLI field"
summary: >
  The onex skill create_ticket runtime injects allow_arch_violation from the contract-backed skill mapping
  because that argument has a default. The node_create_ticket handler request model used extra=forbid
  and did not carry the field, so minimal CLI invocations failed with extra_forbidden before the pure
  compute node could process the ticket request. The omnimarket fix adds the typed field to ModelCreateTicketRequest,
  keeps extra=forbid, preserves the contract-declared input, and covers the strict state-coverage outputs
  exposed by the node contract.
is_seam_ticket: false
interface_change: false
evidence_requirements:
  - kind: "tests"
    description: "node_create_ticket integration regression suite passes for CLI-injected allow_arch_violation
      payloads"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13964/dod-create-ticket-tests/command.yaml"
  - kind: "ci"
    description: "strict state coverage passes for the touched node_create_ticket contract outputs"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13964/dod-state-coverage/command.yaml"
