schema_version: "1.0.0"
ticket_id: "OMN-12995"
title: "DEV-ENV: omnidash local-dev hygiene — /api/settings/feature-flags SPA-fallback (missing proxy)
  + /_layouts 404 console noise"
summary: >-
  Two local-dev hygiene defects in omnidash (plain `npm run dev` = vite only, no Express server, no projection
  backend), surfaced by the 2026-06-11 dashboard visual audit. (a) The Feature Flags panel hit the SPA
  history fallback (index.html) for GET /api/settings/feature-flags because vite.proxy-config.ts had no
  /api/settings/* entry — that endpoint is served only by the omnidash Express server (server/index.ts,
  npm run dev:server, :3002). Fix: add a VITE_OMNIDASH_SERVER_URL-gated proxy for /api/settings and /api/runtime-config
  so dev hits the Express server when it is running, and make the panel fallback explicit that the client-env
  state is a CONFIG state (server not running this session), not an error, with the run-it-locally path
  documented in .env.example. (b) The /_layouts/<name> Vite middleware returned 404 when no saved layout
  existed, logging 4 console 404s per load even though the client already treated 404 as a normal empty
  default. Fix: middleware GET returns empty 204 when the file is missing; the client treats 204 (and
  404 for back-compat) as "no saved layout" without parsing the empty body. Frontend-only, additive; no
  topic schema, envelope, contract API, or runtime change; no live-lane mutation.
is_seam_ticket: false
interface_change: false
