title: 'fix(OMN-13769): reconcile onex-dev runtime kustomization to live cluster state'
summary: >
  The 2026-07-01 wave-1 recovery re-pinned onex-dev live to digest 00e5a02 and blanked OMNIINTELLIGENCE_DB_URL
  on the 3 core runtime deployments via SSM, but omninode_infra's k8s/onex-dev/runtime kustomization stayed
  pinned to the stale 481b774f digest. This ticket reconciles the repo manifests to live so the next deploy-onex-dev
  reconcile does not revert the recovery, fixes a latent bug (non-optional secretKeyRefs for LLM API keys
  that do not exist in onex-runtime-credentials, which would crash-loop the deployments), and dispositions
  onex-prod drift (read-only — no prod mutation).
