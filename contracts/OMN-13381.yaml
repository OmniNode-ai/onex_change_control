ticket_id: "OMN-13381"
title: "omnidash: per-row is_degraded gate in renderer-capability dispatcher"
summary: >-
  useRendererCapabilities now filters out rows where row.is_degraded === true before passing to capabilitySatisfies
  in the dispatcher. isDegraded is upgraded from a whole-projection boolean flag to a per-row filter:
  allRows are split into freshRows (is_degraded=false) and stale rows are excluded. All-rows-degraded
  triggers the typed UPSTREAM_BLOCKED empty-state from the real projection read. Mixed-state: fresh rows
  still satisfy the dispatcher; stale rows are silently excluded. Prior G-H W6 gap: omnidash-web degraded
  (stale heartbeat) but still advertised chart capability; capabilitySatisfies ignored is_degraded per-row
  so degraded rows still satisfied dispatcher.
