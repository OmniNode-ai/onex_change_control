---
schema_version: "1.0.0"
ticket_id: "OMN-13613"
title: "WS-C Phase 3 prerequisite: Shared Experiment Result Contract (core shared models)"
summary: >
  Phase-3 prerequisite of the SEA -> canonical migration (epic OMN-13604). Builds the single canonical
  experiment-telemetry contract that all three Phase-3 experiment orchestrators emit. No experiment node
  invents its own result schema. Homed in omnibase_core shared models because the three downstream orchestrators
  (OMN-13614 / OMN-13615 / OMN-13616) plus omnimarket import it -- >= 2 repos -> core (per feedback_models_in_core_not_market.md).
  New: EnumExperimentType (entropy / model_eval / regression_test, one member per Phase-3 orchestrator),
  EnumExperimentStatus (pending / running / completed / failed / cancelled), and ModelExperimentResult
  with strongly-typed plan-doc fields: experiment_id / run_id / correlation_id (UUID), experiment_type
  / status (enums), runtime_identity (typed), score (ModelExperimentScore: typed numeric value + scale_max,
  range-validated), cost (ModelExperimentCost: cost_usd Decimal, non-negative), evidence_ref (ModelExperimentEvidenceRef:
  evidence UUID + optional sha256 artifact ref). All models frozen (ConfigDict frozen=True, extra=forbid,
  from_attributes=True); no bare str for typed fields; UUID not str; enums not strings. Value objects
  split one-class-per-file (repo single-class gate). Pure additive shared-model build: no Plugin* base,
  no bespoke engine/router/daemon; no topic schema, envelope, or contract-API change; no cross-repo pin
  bump; no live-lane mutation. TDD: failing contract-derived test written before implementation, then
  made green; 30 unit tests. Blocks OMN-13614 / OMN-13615 / OMN-13616 until merged.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD: a failing contract-derived test was written before implementation (confirmed red: ModuleNotFoundError
      for omnibase_core.enums.enum_experiment_status), then made green. The 30 unit tests cover field
      types (UUID identifiers, enum classification/status, typed value objects), frozen behavior on the
      result and all value objects, value-object validators (score within scale_max, non-negative cost,
      sha256 artifact-ref format, UUID rejection of non-UUID strings), extra=forbid, and JSON round-trip.
    command: "uv run pytest tests/unit/models/experiment/ -q"
