title: "WS-C Phase 4.2: Route deployer.py/deploy/ to node_redeploy_orchestrator + deploy effect; delete
  bespoke SCP/SSH + hardcoded 192.168.86.201/jonah"
summary: >
  Wave-1 of the SEA -> canonical migration (epic OMN-13604, TRANSFORM->PROVE->DELETE). Routes the SEA
  remote-deploy capability to the canonical gated deploy path that already exists and is runtime-proven
  in omnimarket -- node_redeploy_orchestrator (ORCHESTRATOR) + node_redeploy_deploy_effect (EFFECT) --
  and DELETES the bespoke SEA deploy modules after parity (no shim). The canonical deploy effect publishes
  an HMAC-signed rebuild command over the bus to the external deploy agent, monitors completion by correlation_id,
  and rolls back on failed post-deploy health; it never opens SSH/SCP, never calls rpk, and has no subprocess.
  SEA src/pipeline/deployer.py (bespoke deploy client) and src/deploy/ (contract_deployer.py raw-KafkaProducer
  registration + mcp_client.py raw-httpx MCP client; the only remaining hardcoded 192.168.86.201 default
  lived in contract_deployer.py line 132) are deleted, along with the unit/integration tests bound to
  them. The proof_of_life integration tests are rewired so the deploy step routes through the gated node
  command path (emit DEPLOYMENT_REQUESTED_TOPIC, record DEPLOYMENT_COMPLETED_TOPIC) with no bespoke client
  and no hardcoded target; the deployment-request topic constant moves to its canonical SEA home src/pipeline/topics.py.
  After cleanup, the SEA deploy surface has zero hardcoded 192.168.86.201 and zero hardcoded jonah username,
  and the canonical aislop_sweep prohibited-patterns check (hardcoded IP / path / username) is clean scoped
  to the SEA repo. ROUTE-only: this ticket does NOT itself perform a prod promotion (prod promotion stays
  owner-gated per OMN-13418). No new omnimarket source: the canonical redeploy nodes already exist and
  are proven. No topic schema, envelope, or contract-API change; no Postgres migration; no live-lane mutation.
