---
schema_version: '1.0.0'
ticket_id: OMN-10061
summary: 'feat(onex_change_control): pre-commit guard — require dod_evidence on contracts/OMN-*.yaml'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: CI passes on merge PR
    command: gh pr checks
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: 'state=$(gh pr view {pr} --repo {repo} --json state,baseRefName -q ''[.state, .baseRefName]
          | @tsv''); [ "$(echo "$state" | cut -f1)" = "OPEN" ] && [ "$(echo "$state" | cut -f2)" = "main"
          ]'
  - id: dod-002
    description: Contract artifact file present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f contracts/OMN-10061.yaml
  - id: dod-003
    description: Pre-commit hook wired into .pre-commit-config.yaml
    source: generated
    checks:
      - check_type: command
        check_value: grep -q 'dod-evidence-required' .pre-commit-config.yaml
  - id: dod-004
    description: Guard script present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f scripts/check_dod_evidence_present.py
  - id: dod-005
    description: Guard unit tests present in repo
    source: generated
    checks:
      - check_type: command
        check_value: test -f tests/unit/scripts/test_check_dod_evidence_present.py
