# OMN-13469 central OCC contract.
schema_version: "1.0.0"
ticket_id: "OMN-13469"
title: "Durabilize dev Redpanda partition cap via .bootstrap.yaml"
summary: >-
  Root cause: fresh Redpanda volume boots with DEFAULT cluster cap topic_partitions_per_shard=1000. With
  ~1392 contract topics, the broker jams at ~995 with BROKER_NOT_AVAILABLE, leaving the runtime stuck
  runtime_pending. Existing mechanisms (--set flag + redpanda-partition-cap init service) do not apply
  on a fresh volume reset. Fix: add docker/redpanda/.bootstrap.yaml (read by Redpanda on first cluster
  formation) making the 7000 cap volume-reset-proof. Scope: dev compose only. Prod/stability/judge parity
  is a follow-up.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
