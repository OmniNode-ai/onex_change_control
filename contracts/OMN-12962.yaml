ticket_id: "OMN-12962"
title: "P1.5: Dynamic contract-store durability audit — cold-runtime contract census reconstruction"
summary: >-
  Audit proves the contract store is durable: a COLD runtime reconstructs the full registered contract
  census from the image-bundled filesystem manifest (HYBRID-mode HandlerBootstrapSource + PluginLoaderContractSource
  in runtime_host_process._resolve_handler_descriptors), independent of Kafka retention. The onex.evt.platform.node-registration.v1
  topic (cleanup.policy=delete, 7-day retention) feeds ONLY the post-freeze dynamic-contract listener
  (_on_dynamic_contract_event, OMN-11247), which subscribes via the event-bus default auto_offset_reset=latest
  and therefore never replays history on a cold start. Read-only .201 stability-test evidence confirms
  it: the introspection manifest contract_path resolves to a pip-installed filesystem path, and rpk topic
  describe shows cleanup.policy=delete with LOG-START-OFFSET > 0 on five of six partitions (log head already
  truncated by retention) while the live registered census remains intact. No store fix (compaction or
  re-seed-on-boot) is required; adding one would be dead code against the actual cold-start path. The
  single residual gap — a contract registered ONLY via the dynamic path (not image-bundled), which would
  vanish on a cold restart unless its registrant re-publishes — is detected by a new NON_DURABLE_CONTRACT
  census-durability check added to omnimarket node_runtime_sweep (_check_census_durability). Doc-only
  change in omnibase_infra; additive check + tests in omnimarket; no topic schema, envelope, or contract
  API change.
is_seam_ticket: false
interface_change: false
