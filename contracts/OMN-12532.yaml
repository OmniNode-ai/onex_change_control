schema_version: "1.0.0"
ticket_id: "OMN-12532"
title: "Bug: stability effects runtime lacks ONEX_STATE_DIR for PR lifecycle orchestrator"
summary: >-
  Fix the runtime environment contract surfaces so ONEX_STATE_DIR is exported alongside ONEX_STATE_ROOT
  for local/dev catalog runtime containers, the stability-test runtime lane, and the onex-dev runtime
  ConfigMap. The PR lifecycle orchestrator uses ONEX_STATE_DIR to write breadcrumbs and worker logs, so
  the stability runtime effects container must expose the variable before foreground controller dogfood
  can dispatch PR lifecycle work reliably.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      Focused compose, catalog, and parity tests prove ONEX_STATE_DIR is present on the runtime env surfaces
      and matches ONEX_STATE_ROOT for container-local state.
    command: >-
      uv run pytest tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
      tests/ci/test_runtime_env_anchor.py tests/unit/infra/test_catalog_generator.py -q && OMNINODE_INFRA_DIR=/Users/jonah/Code/omni_home/omni_worktrees/OMN-12532/omninode_infra
      uv run pytest tests/ci/test_env_parity.py -q && uv run ruff check tests/ci/test_runtime_env_anchor.py
      tests/unit/infra/test_catalog_generator.py tests/unit/infra/test_stability_test_runtime_lane.py
      tests/integration/infra/test_stability_test_runtime_compose_render.py && git diff --check
  - kind: "manual"
    description: >-
      Stability runtime dogfood before the fix proved the direct PR lifecycle command was consumed on
      the stability bus, then failed in runtime-effects because ONEX_STATE_DIR was not set.
    command: "direct pr_lifecycle_orchestrator stability bus publish correlation 2a36f868-4153-46b7-992a-5f3e806c7a2a"
