---
schema_version: "1.0.0"
ticket_id: "OMN-8767"
title: "S20: Tier 2 skill thinning — ticket_pipeline, ticket_work, local_review"
summary: >
  Thin 3 Tier 2 skill shims to dispatch-only by removing inline LLM orchestration from ticket_pipeline/prompt.md,
  ticket_work/prompt.md, and local_review/prompt.md. Each shim now routes exclusively to its backing omnimarket
  node via onex run-node. S18 AST lint gate passes for all 3 shims. Delivery via omniclaude PR #1597.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "PR #1597 merged to main on OmniNode-ai/omniclaude"
    command: "gh pr view 1597 --repo OmniNode-ai/omniclaude --json state --jq '.state'"
  - kind: "manual"
    description: "Zero LLM SDK imports in all 3 thinned prompt.md files"
    command: "grep -rE 'anthropic|openai|google.generativeai' plugins/onex/skills/ticket_pipeline/prompt.md
      plugins/onex/skills/ticket_work/prompt.md plugins/onex/skills/local_review/prompt.md"
  - kind: "manual"
    description: "Each shim dispatches via onex run-node to its backing node"
    command: "grep 'onex run-node' plugins/onex/skills/ticket_pipeline/prompt.md plugins/onex/skills/ticket_work/prompt.md
      plugins/onex/skills/local_review/prompt.md"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-shims-dispatch-only"
    description: "All 3 shims are dispatch-only with zero LLM SDK imports"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-8767/dod-shims-dispatch-only/command.yaml\""
  - id: "dod-onex-run-node-dispatch"
    description: "Each shim dispatches via onex run-node to its backing node"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-8767/dod-onex-run-node-dispatch/command.yaml\""
  - id: "dod-precommit-clean"
    description: "Pre-commit hooks pass on all 3 changed files (S18 lint gate)"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-8767/dod-precommit-clean/command.yaml\""
  - id: "dod-occ-pr"
    description: "Self-binding receipt for this OCC PR."
    source: "generated"
