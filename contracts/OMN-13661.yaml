schema_version: "1.0.0"
ticket_id: "OMN-13661"
title: "Add per-day tier-mix percentages (local/cheap/prem) to the delegation savings-series projection"
summary: >-
  Extends the bus-fed delegation savings-over-time series projection (OMN-13648 migration 078) with a
  per-UTC-day tier mix so the delegation dashboard depth view can render how each day's spend split across
  routing tiers. omnimarket PR #1463 adds node-owned migration 079, which CREATE-OR-REPLACEs the projection_delegation_savings_series
  view to append three additive columns -- local_pct, cheap_pct, prem_pct -- alongside the existing bucket
  / actual_cost_usd / baseline_cost_usd / savings_usd / task_count. The tier mix is computed in the projection
  itself from the now-authoritative delegation_events.cost_tier_name (populated on the common path by
  OMN-13649 migration 0018 + write-path #1458), collapsed to three display buckets by the canonical projection
  rule: cost_tier_name 'local'/'free_local' -> local, 'cheap_cloud' / 'cheap_frontier' -> cheap, 'claude'
  -> premium. savings_estimates-sourced rows carry NO cost_tier_name, so they are not_tier_routed: EXCLUDED
  from the tier-percentage denominator (per the T3/OMN-13662 rule) yet still counted in task_count. Each
  percentage is count(bucket rows) / count(tier-routed rows) per day, NULLIF-guarded. The append is non-breaking
  (CREATE OR REPLACE column add; existing consumers unaffected) and the projection_api exposure onex.snapshot.projection.delegation.savings-series.v1
  now lists the three new columns. omnibase_infra PR #2118 vendors the byte-identical migration 079 into
  docker/migrations/forward/nodes/node_projection_savings so a clean redeploy materializes the extended
  view. No wire DTO change, no new node, no new REST route, and no client-side bucketing; the projection
  API remains the serving surface and the tier mapping lives in the projection rule, not a UI regex.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
