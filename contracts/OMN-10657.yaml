title: "Resolve delegation routing endpoints from deployed bifrost contract, not env vars"
summary: >
  NodeDelegationRoutingReducer handler refactored to read endpoint URLs from the deployed bifrost contract
  at ~/.omninode/delegation/bifrost_delegation.yaml instead of os.environ.get() calls. ModelTierModel.env_var
  renamed to backend_ref. routing_tiers.yaml updated to use backend_ref keys mapping to bifrost backend
  IDs. bifrost_delegation.yaml source contract added with cloud, CLI, and local backends. All 53 routing
  reducer unit tests pass and an integration test proves bifrost contract loading from the on-disk source
  file. The dependent omniclaude runtime wiring PR adopts the same endpoint_url contract, deploys the
  bifrost contract during install, and removes silent in-process fallback behavior from runtime dispatch.
