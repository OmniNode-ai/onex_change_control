---
schema_version: "1.0.0"
ticket_id: "OMN-13563"
title: "env→contract migration (onex_change_control): 12 non-keep env reads + 4 Linear GraphQL URL literals
  → contract+overlay seam"
summary: >-
  Wave-1 env→contract+overlay migration (epic OMN-13556). Moves onex_change_control's 12 non-keep raw
  os.environ reads and the 4 hardcoded Linear GraphQL URL literals onto the canonical overlay seam: a
  new integration contract (src/onex_change_control/integrations/contract.yaml) declares every endpoint
  / config value / secret-ref with the ${env.VAR} / ${env.VAR:default} convention, and a new contract_descriptor
  module resolves them through onex_change_control.overlays.contract_env_ref.expand_contract_env_refs
  — the one sanctioned env-reading boundary — fail-closed (unset/blank required value raises rather than
  silently defaulting to localhost or a hardcoded literal). Because onex_change_control depends only on
  omnibase_core and the core resolver (omnibase_core.overlays.contract_env_ref) is on core dev but not
  yet on core main, the canonical ${env.VAR} expansion is vendored locally — exactly as omnibase_core
  itself vendors its own copy because it cannot import infra (compat → core → spi → infra layering) —
  rather than pinning an unreleased core commit. Rewired call sites: linear_graphql_url() replaces the
  4 URL literals (backfill_contracts.py:144, check_dod_compliance.py:75 — was the non-canonical https://linear.app/graphql,
  corrected to the canonical host, handler_dod_sweep.py:73, check_plan_vs_live.py:51); linear_api_key()
  replaces the 3 LINEAR_API_KEY reads; the omnidash_db_* resolvers replace POSTGRES_HOST/PORT/OMNIDASH_DB_NAME/POSTGRES_USER
  and POSTGRES_PASSWORD (with the ~/.omnibase/.env source fallback removed); kafka_bootstrap_servers()
  replaces KAFKA_BOOTSTRAP_SERVERS; onex_state_dir() replaces ONEX_STATE_DIR (claim_store + sweeper);
  and emergency_bypass() replaces EMERGENCY_BYPASS. The keep set (OMNI_HOME bootstrap, CI runner-detect,
  whole-environ subprocess plumbing) is untouched. A resolution-equivalence test proves the overlay resolves
  the same value the env var / literal gave and fails closed when a required value is unset. Per memory
  feedback_onex_change_control_keeps_ticket_refs, OMN-XXXX references are NOT sanitized here (record-keeping
  exemption); only the env/URL migration applies.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: >-
      The migrated overlay seam resolves each endpoint / config value / secret identically to the pre-migration
      raw os.environ reads and the 4 hardcoded Linear GraphQL URL literals, and fails closed (raises)
      when a required value (Linear URL, omnidash host/port/name/user, omnidash password, Linear key when
      required, ONEX_STATE_DIR) is unset — no silent localhost / hardcoded-literal fallback. The Linear
      URL resolves via the inline ${env.LINEAR_API_URL:https://api.linear.app/graphql} default and the
      omnidash port via ${env.POSTGRES_PORT:5436} when unset; the optional Kafka broker, emergency-bypass
      toggle, and optional Linear key resolve to None/"" when unset (prior behaviour). Proven by the focused
      resolution-equivalence suite tests/test_integration_contract_resolution.py (22 assertions).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13563/dod-001/command.yaml"
  - id: "dod-gates"
    description: >-
      The url-authority cross-repo gate drops from 4 canonical violations to 0 new / 0 grandfathered (the
      4 Linear GraphQL URL literals are gone), the no-localhost-fallbacks gate (the REQUIRED env-policy
      CI check in this repo, OMN-10737) stays PASS / 0, and ruff + mypy --strict are clean on src/. This
      migration REMOVES env reads and URL literals, so the diff-based gates cannot regress.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13563/dod-gates/command.yaml"
  - id: "dod-tests"
    description: >-
      The full onex_change_control pytest suite (no -k filter) passes after the migration, including the
      affected existing suites (governance-emitter no-fallback, dispatch claim store, omnidash health,
      contract-compliance-check) which exercise the rewired _get_bootstrap_servers / _claims_dir / _load_password
      / EMERGENCY_BYPASS paths through the descriptor.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13563/dod-tests/command.yaml"
  - id: "dod-occ-pr"
    description: >-
      Self-binding receipt for this OCC contract, which the feature PR's Receipt Gate consumes via Evidence-Source.
      The probe greps the OCC tree and proves contracts/OMN-13563.yaml is present and ticket-bound.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -c '^ticket_id: \"OMN-13563\"$' contracts/OMN-13563.yaml"
