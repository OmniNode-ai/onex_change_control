      via container-driven construction, and the all-node runtime dogfood inventory classifies all three
      nodes as routable (failed==0).
    command: "uv run pytest tests/test_handler_routing_boot_resolvable.py tests/test_golden_chain_ticket_query.py
      tests/test_golden_chain_tool_reuse_matcher.py tests/test_handler_skill_overseer_verify.py tests/test_market_node_runtime_dogfood.py
      -q"
