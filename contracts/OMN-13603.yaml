schema_version: "1.0.0"
ticket_id: "OMN-13603"
title: "fix(OMN-13603): wire 3 protocol-dependency handlers into boot container (ticket_query/tool_reuse_matcher/skill_overseer)"
summary: >-
  Carve-out from OMN-13551 (which resolved 15 of 18 handler-prep boot quarantines). The remaining 3 genuinely-shaped
  handlers required a protocol-typed dependency the boot resolver could not satisfy from the injectable
  params (event_bus / container / ownership_query), so each quarantined at dev-HEAD boot. All three are
  now constructed by the resolver from injectable params alone, via the canonical container-driven handler
  pattern: node_ticket_query/HandlerTicketQuery (EFFECT) and node_tool_reuse_matcher_compute/HandlerToolReuseMatcher
  (COMPUTE) now take the injectable container and resolve their protocol dependency (ProtocolProjectTracker
  / ProtocolGeneratedToolRegistry) from the container at the effect/match boundary; the project-tracker
  adapter owns api_key_ref secret resolution at its own effect boundary, so the handler never touches
  a literal credential. The function-form handle_skill_requested(request, *, task_dispatcher) on node_skill_overseer_verify_orchestrator
  was replaced by a class HandlerSkillRequested(container) (mirroring the sibling node_skill_dispatch_engine_orchestrator
  scaffold); the polymorphic-agent TaskDispatcher is resolved at the dispatch boundary and handle() returns
  a structured FAILED ModelSkillResult until a real bus-backed dispatcher is registered. _UNWIRED_DEPENDENCY_ALLOWLIST
  in tests/test_handler_routing_boot_resolvable.py is now empty; the guard fails closed on any new misclassified/unwired
  entry. No envelope/contract-API change, no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
