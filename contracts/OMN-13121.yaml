schema_version: "1.0.0"
ticket_id: "OMN-13121"
title: "Upsert zero-token/zero-cost delegation terminals (remove over-broad projection drop)"
summary: >-
  handler_projection_delegation._project_delegate_skill_terminal_sync carried an OMN-11923 guard (commit
  2607d41e) that returned rows_upserted=0 — silently dropping the event — when tokens_input, tokens_output
  and cost_usd were all zero, intended to keep synthetic golden-chain noise out of delegation_events.
  That guard was over-broad: zero-token/zero-cost is also the steady state for free local-LLM delegations
  and golden-chain proofs, valid terminals indistinguishable from synthetic ones by token/cost alone,
  so it stranded the organic delegation tail at zero rows. Fix: remove the guard so a well-formed terminal
  always upserts exactly one row. Malformed/empty payloads remain rejected upstream (ModelDelegateSkillTerminalProjection
  requires status, correlation_id, task_type — from_payload() raises a pydantic ValidationError); dedup
  against synthetic re-emits stays handled by the correlation_id UPSERT key plus _preserve_existing_evidence.
  Aligns the sync (live) path with the already-correct async sibling _project_delegate_skill_terminal.
  Adds a row-delta regression test test_zero_token_terminal_event_upserts_exactly_one_row (before=0, publish
  zero-value terminal, after=1).
