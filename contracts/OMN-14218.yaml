ticket_id: "OMN-14218"
title: "fix(OMN-14218): give delegation task type 'refactor' a real acceptance authority (authors code
  locally at $0)"
summary: >-
  omnimarket PR #1660 gives the delegation task type `refactor` a real acceptance authority so a valid
  LOCAL code artifact PASSES the quality gate instead of force-escalating to a PAID cloud tier. `refactor`
  was accepted at the delegation surface (allowed_task_types, the CLI --task-type enum, task_model_overrides,
  routing_tiers.yaml `use_for`) but absent from all three gate authorities: the `task_classes` contract
  in task_class_contracts.v1.yaml, `_VERIFIABLE_TASK_TYPES` (handler_quality_gate.py), and `JUDGE_COMBINABLE_TASK_TYPES`
  (handler_quality_gate_intent.py). The fix adds a `refactor` task-class contract mirroring `code_generation`
  (same deterministic acceptance_authority, required_bar 0.85, and closed tier_order local->cheap_cloud->cheap_frontier->claude)
  plus `refactor` to both frozensets. An independent verifier (separate from the implementing agent) reproduced
  the fix end-to-end via live before/after delegate probes on the co-installed infra venv deploy surface.
