ticket_id: "OMN-13476"
title: "feat: extract delegation escalation/tier decision into a stateless COMPUTE node"
summary: >-
  Track A W4 of the delegation-orchestrator decomposition (epic OMN-13471). The escalate-or-terminate
  decision — whether to escalate and to which tier — was inlined twice in HandlerDelegationWorkflow (the
  inference-error branch and the quality-gate-fail branch), both applying the same precedence rules. Extracts
  that single decision into node_delegation_escalation_decision_compute, a NodeCompute archetype (contract.yaml
  + HandlerEscalationDecision implementing a pure handle(request) -> result, stateless + deterministic
  + zero I/O). The orchestrator now resolves the config-dependent inputs — the next eligible tier and
  the precise no-higher-tier reason, which read routing_tiers.yaml and the task-class contract — and DELEGATES
  the verdict via a new _decide_escalation helper. Behavior preserved exactly: the COMPUTE checks retryability,
  budget, current-tier identifiability, and ladder exhaustion in the same order the inline branches did,
  including the OMN-13167 precise no-higher-tier reason and the OMN-13140 escalation-proof emission. Tiers/providers/models
  are resolved upstream from the routing contract+overlay and arrive as plain values — never from env.
  Shared decision request/result models live in omnimarket.routing so both the COMPUTE and the orchestrator
  import them without a cross-node model reach-in. Purely intra-omnimarket change; no core wire DTO changes.
