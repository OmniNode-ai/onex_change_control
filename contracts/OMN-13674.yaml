summary: >-
  omnimarket PR #1560 brings the 24 nodes in WS-5 waves 1/2/4/6/8/9 (child tickets OMN-13675/OMN-13676/OMN-13678/OMN-13680/OMN-13682/OMN-13683)
  under the strengthened full-declared-state-coverage DoD, now mechanically enforceable via the AST-hardened
  state-coverage gate (OMN-13816 / omnimarket #1556). For each node it adds a per-node contract-declared
  state-coverage regression test (tests/integration/node_<x>/ test_<x>_state_coverage.py) that pins every
  previously-baselined declared output state — the publish topics the runtime auto-emits and the output-class
  fields the projection consumes — to its literal declared value, so a silent contract rename or removal
  now fails at test time instead of only at a live runtime/projection boundary. It then removes those
  42 (node, state) pairs from scripts/validation/ state_coverage_baseline.txt so the hardened gate strict-enforces
  those nodes going forward (baseline shrinks 637 -> 595 non-comment entries). Tests-only change: no handler,
  model, contract, topic, schema, or migration source is modified.
