    description: "All 14 shims are dispatch-only with zero LLM SDK imports"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-8768/dod-shims-dispatch-only/command.yaml\""
  - id: "dod-onex-run-node-dispatch"
    description: "All 14 shims dispatch via onex run-node to their backing node"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-8768/dod-onex-run-node-dispatch/command.yaml\""
  - id: "dod-unit-tests-pass"
    description: "5026 unit tests passing after S21 thinning"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-8768/dod-unit-tests-pass/command.yaml\""
  - id: "dod-precommit-clean"
    description: "Pre-commit hooks pass including S18 AST lint gate"
