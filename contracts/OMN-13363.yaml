  The 2026-06-19 Gate-Zero run reported the 4 synthetic probe events were consumed but wrote 0 rows. Investigation
  drove the EXACT probe wire shape (ModelEventEnvelope[dict].model_dump -> unwrap_envelope -> DelegationProjectionRunner.project_event)
