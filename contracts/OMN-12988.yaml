schema_version: "1.0.0"
ticket_id: "OMN-12988"
title: "fix(OMN-12988): pin stability runtime-worker to replicas 1 + silent-drop census ratchet"
summary: >-
  The base docker/docker-compose.infra.yml:862 defaults runtime-worker to replicas 0 (${WORKER_REPLICAS:-0}).
  The stability-test lane's required state includes a running worker (GATE_ZERO_PROOF.md 4-container census:
  main, effects, worker, projection-api), but the docker-compose.stability-test.yml override pinned the
  worker via an env-interpolation default (${STABILITY_TEST_WORKER_REPLICAS:-1}) — a silent-drop surface:
  a stray exported STABILITY_TEST_WORKER_REPLICAS=0 or removal of the :-1 fallback would scale the worker
  to 0 on a plain compose up/recreate with zero errors and zero signal. Fix pins the override deploy.replicas
  to the literal 1 (no env indirection). Recurrence ratchet (same PR): a deploy-agent census unit test
  asserts runtime-worker stays in SCOPE_SERVICES[RUNTIME] so a missing worker (replicas 0 => absent from
  docker compose ps) is a deploy failure via verify_containers_up, not silence; an integration render
  test asserts the rendered stability worker resolves deploy.replicas == 1; the existing stability-lane
  pin assertion is updated to the literal 1. No live lane mutation in this PR; the rebuild agent applies
  the config.
