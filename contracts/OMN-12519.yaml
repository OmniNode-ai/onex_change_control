title: "Express deployer as contract-declared effect"
summary: >
  Removes the last imperative deployment path in the self-extending agent. src/pipeline/deployer.py previously
  shelled out via raw subprocess SSH/SCP with a hardcoded 192.168.86.201 deploy-host fallback; it now
  expresses deployment as a contract-declared effect, staging artifacts locally and emitting a deployment-request
  command envelope to onex.cmd.platform.node-deployment-requested.v1. The runtime deployment effect handler
  performs remote placement. No subprocess, no hardcoded IP; deploy target resolves from explicit arg
  then ONEX_DEPLOY_TARGET overlay then a logical default name.
