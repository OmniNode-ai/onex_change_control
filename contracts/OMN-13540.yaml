---
schema_version: "1.0.0"
ticket_id: "OMN-13540"
title: "feat(OMN-13540): delegation regression suite — versioned golden-task corpus + Layer-1 CI gate
  + nightly live runner"
summary: >-
  Delegation has only been exercised ad-hoc and regressions are discovered by accident (import break that
  took the orchestrator down — OMN-13539; metered cost never recorded — OMN-13408/13535; empty terminal
  data). This adds a fixed, versioned set of delegation tasks with BEHAVIORAL assertions that run repeatably
  so regressions are caught mechanically. Two layers: (1) a deterministic contract/unit gate (U1-U4) in
  omnimarket's existing pytest CI on every PR with no live model — catches the import/wiring/config regression
  class; (2) a versioned YAML corpus (I1-I9) + a runner that publishes each case to the live bus, reads
  the delegation_events projection, and asserts structure/behavior (routing tier, quality gate, terminal,
  token/cost, escalation), wired as a nightly GitHub Actions workflow against the stability-test lane.
  Assertions encode INTENDED behavior; known-broken cases are xfail with the tracking ticket (OMN-13408
  metered cost, OMN-13535 telemetry, OMN-13140 escalation/exhaust) so the nightly is actionable. Test-only
  + nightly-CI-workflow change — no runtime node source, migration, schema, endpoint, or env-for-model
  change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-layer1-suite"
    description: >-
      Layer-1 contract/unit gate (U1-U4) hard-passes deterministically with no live model. U1 imports
      the node_delegate_skill_orchestrator handler + ModelPremiumCounterfactual (regression for the OMN-13539
      ImportError). U2 resolves every routing tier model to a complete backend (endpoint literal-or-env,
      model_name, secret_ref for non-local tiers). U3 constructs ModelDelegateSkillRequest for each contract
      allowed_task_type and rejects an unknown one. U4 asserts the projection event model + response metrics
      carry model_name + tokens + cost (regression for OMN-13535). Plus corpus-shape + runner pure-logic
      coverage.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13540/dod-layer1-suite/command.yaml"
  - id: "dod-corpus"
    description: >-
      A versioned declarative corpus exists and is the single source of cases: U1-U4 (unit) and I1-I9
