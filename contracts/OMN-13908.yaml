summary: >-
  omniclaude PR #1856 fixes two docs-correctness defects in plugins/onex/skills/worktree/SKILL.md. (1)
  Base-branch bug: the --audit mode computed "ahead" counts via git log --oneline origin/main..HEAD and
  instructed "Use origin/main not main", but every OmniNode repo's integration branch is dev, not main,
  so diffing against origin/main produced meaningless ahead-counts in the hundreds/thousands and misclassified
  merged worktrees as STALE/DIRTY_ACTIVE instead of SAFE_TO_DELETE. Fixed to dynamically resolve the repo's
  actual integration branch via git symbolic-ref refs/remotes/origin/HEAD, falling back to origin/dev;
  the same hardcoded --base main in the --triage ship_it PR-creation recipe was fixed identically. (2)
  Dishonest node-backing claim: added an explicit honest-state note that none of --audit/--triage/--prune
  is backed by an executable ONEX node today (no worktree* entry in omnibase_infra's skill_mapping.yaml),
  and that the candidate backing node for --prune (node_pr_lifecycle_worktree_prune_effect, omnimarket,
  contract routing fixed in OMN-13882) is not yet wired to this skill. This is a docs-only fix with no
  Python node-dispatch surface, so no new pytest test; deploy is not required.
