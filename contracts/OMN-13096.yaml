schema_version: "1.0.0"
ticket_id: OMN-13096
title: "Phase 2b: /onex:delegate single-command rewrite"
summary: >-
  Add `onex delegate "<prompt>" [--task-type X] [--max-tokens N]` as a subcommand on the existing onex
  CLI (omnibase_infra). The command wraps payload construction, task-type classification, node dispatch,
  and result extraction internally and dispatches through the OMN-13094 receipt-mode path: stdout carries
  exactly one ModelSkillResult[ModelDelegateSkillResponse] (full LLM response + metrics, never truncated),
  RuntimeLocal logs go to a capture file + the omnibase_core ArtifactStore, scratch payloads live under
  <state-root>/tmp/ with run_id suffixes (never /tmp). The omniclaude delegate skill is rewritten to ONE
  step (prompt.md), marked skill_kind: dispatch, and exempted from the delegation-enforcer subagent mandate
  so it is handled inline rather than via a ~95k-token subagent spawn. omnimarket untouched — ModelDelegateSkillResponse
  already carries every receipt field (F8). Carries the first-proof acceptance gate for the skill-output-suppression
  plan.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
