title: "Refactor delegation dispatch to canonical effect handler + projection (delete bespoke ports)"
summary: >-
  The local `onex delegate` standalone-CLI path used to news-up the bespoke DirectCurlDelegationDispatchPort
  (port_direct_curl_dispatch.py) as the zero-arg fallback in HandlerDelegateSkill. That port owned three
  responsibilities outside the canonical CONTRACT/NODE/HANDLER architecture: the curl transport, hand-rolled
  bifrost config loading (_load_bifrost_config + _select_backend), and a bespoke sqlite _persist_evidence
  write. A second port, DirectBridgeDelegationDispatchPort, was dead/unreferenced. omnimarket PR #1229
  (branch jonah/omn-13160-delegation-canonical-handler, base=dev, head e2079e624aaa329cd60440bedd19defba3584e30)
  deletes both ports and replaces them with a composition of canonical surfaces: (1) routing/delegation_backend_resolution.py
  resolves model_id + COMPLETE endpoint_ref from the bifrost contract + overlay before the effect; (2)
  node_llm_delegation_call_effect/handlers/transport.py owns the runtime-profile-selected transport (curl
  on local_macos_claude_hooks, httpx elsewhere) and posts the resolved endpoint_url VERBATIM (carries
  OMN-12815/OMN-13159 doctrine into the handler); (3) projection/sqlite_database.py runs the SAME canonical
  HandlerProjectionDelegation in-process for the local CLI evidence tail with a clean additive schema.
  The new zero-arg fallback port_local_delegation_dispatch.py composes these and owns no direct subprocess/httpx/sqlite
  I/O. SEQUENCED AFTER omnimarket #1228 (OMN-13159, same file): #1228 merged into dev at 2026-06-15T18:38:30Z
  (squash b385ca3e); this branch was rebased onto the new dev tip, the modify/delete conflict on port_direct_curl_dispatch.py
  resolved in favor of the deletion, the pre-replayed base_url_env->endpoint_url_env rename dropped (already
  in dev via #1228), and #1228's now-orphaned test_directcurl_verbatim_url.py deleted (coverage replaced
  by the new test_transport_verbatim_url.py). Source refactor only — no DDL, no migration, no live deploy,
  no restart, no .201 mutation by this PR.
