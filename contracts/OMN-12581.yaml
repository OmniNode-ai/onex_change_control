schema_version: "1.0.0"
ticket_id: "OMN-12581"
title: "Production promotion gate for node_redeploy (Phase 6)"
summary: >-
  Bind central evidence for omnimarket PR carrying Phase 6 of the node-based runtime deployment design:
  the production promotion gate. A prod redeploy request now depends on the full set of deterministic
  promotion facts, evaluated BEFORE any deploy-agent invocation — the reducer-owned readiness projection
  must show stability-test READY for the matching promotion batch and image digest, the prod request digest
  must equal that stability READY digest (prod reuses it and never rebuilds), OCC evidence must be merged or
  Receipt-Gate-PASS, and a known rollback target must exist (threaded into the rollback path). A prod request
  that fails any condition routes to BLOCKED with no deploy effect; a digest-drift prod request (the live prod
  0.36.1 vs stability 0.37.0 case) is blocked before the deploy agent is reached. node_redeploy stays the only
  deployment orchestrator (no parallel FSM, no new build/deploy/probe effect node, no new Plugin* class); the
  deploy agent is still reached only over onex.cmd.deploy.rebuild-requested.v1 / onex.evt.deploy.rebuild-completed.v1.
