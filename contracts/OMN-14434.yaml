---
schema_version: "1.0.0"
ticket_id: "OMN-14434"
title: "OCC companion for onex_change_control#4005 — duplicate-registry-ids guard wired for prod_promotion_grants.yaml"
summary: >
  OCC evidence companion for OmniNode-ai/onex_change_control#4005 (OMN-14434). #4005 wires the duplicate-registry-ids
  guard to consume grants/prod_promotion_grants.yaml, declaring grant_id as the unique key -- the field
  the grants file's own schema calls the unique UUID identifying a grant. Two entries sharing a grant_id
  is never legitimate; it is the file's own documented invariant, and the grants file is the prod-promotion
  trust anchor (CLAUDE.md 2a/12), so a duplicate id there is a real authorization hazard. The evidence
  asserts BOTH the config-as-data declaration AND the pre-commit wiring that makes it enforcing rather
  than advisory, plus the negative test that proves the detector actually catches a planted duplicate.
  Every substantive check is a CONTENT READ pinned to #4005's head SHA asserting a SYMBOL the change introduces;
  nothing greps this repo's receipt corpus for status PASS.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "onex_change_control#4005 head SHA carries the change; see dod_evidence check_values"
    command: "content reads pinned to d57b987c3"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-4005-registry-declares-grant-id"
    description: >-
      Product-observing: reads .duplicate-id-registries.yaml at #4005's exact head SHA and asserts it
      declares grant_id as the uniqueness key for the grants registry. grant_id is the field the grants
      file's own schema comment calls the unique UUID identifying this grant -- the real primary key --
      and the grants file is the prod-promotion trust anchor, so a duplicate id there is an authorization
      hazard, not a cosmetic lint. Declaring the correct key is the substance of the ticket: a guard pointed
      at the wrong field would pass while the real invariant rots. RED DIRECTION PROVEN by execution:
      the symbol occurs 5x at #4005's head and ZERO times at OCC dev; exit 1 at dev and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/.duplicate-id-registries.yaml?ref=d57b987c3d2565ae666f287f74a91e9912ebcda8"
          --jq .content | base64 -d | grep -c 'grant_id')" -ge 1
  - id: "dod-verify-4005-guard-wired-in-precommit"
    description: >-
      Product-observing, and the enforcement half: asserts the guard is actually WIRED as a pre-commit
      hook at #4005's head, not merely declared as config. A detection tool that is not wired as a gate
      is advisory and gets ignored (CLAUDE.md operating rule 5: enforcement, not detection) -- so a registry
      declaration alone is NOT evidence the ticket is done; a hook that runs on every change to the grants
      file is. RED DIRECTION PROVEN by execution, and this is the stronger control of the two because
      .pre-commit-config.yaml EXISTS on dev -- a bare existence probe would return a hash at both refs
      and rubber-stamp. The SYMBOL discriminates: the hook id occurs once at #4005's head and ZERO times
      at dev. Exit 1 at dev and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/.pre-commit-config.yaml?ref=d57b987c3d2565ae666f287f74a91e9912ebcda8"
          --jq .content | base64 -d | grep -c 'check-duplicate-registry-ids')" -ge 1
  - id: "dod-verify-4005-detector-negative-test"
    description: >-
      Product-observing: asserts #4005 ships a NEGATIVE test -- one that plants a duplicate grant_id and
      requires the guard to fail on it. A guard that has only ever been observed passing is not known
      to work; the negative test is what proves the detector actually fires rather than silently rubber-stamping
      a clean file. This is the same falsifiability standard this contract holds itself to. RED DIRECTION
      PROVEN by execution: the test file does not exist on OCC dev at all (contents API 404s), so the
      identical command exits 1 there and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/tests/unit/test_no_duplicate_grant_ids.py?ref=d57b987c3d2565ae666f287f74a91e9912ebcda8"
          --jq .content | base64 -d | grep -cE 'def test_detector_actually_catches_a_duplicate')" -ge
          1
  - id: "dod-occ-self-commit"
    description: >-
      Self-bind item for THIS OCC companion PR. occ-preflight (validator_occ_merge_eligibility._receipt_bound_to_pr)
      requires at least one PASS receipt bound to the PR under check -- pr_number == that PR, or commit_sha
      among that PR's commits. The eligibility gate runs TWICE for a companion: once here and once on
      the source PR, so the product receipts above bind the SOURCE (onex_change_control#4005) while this
      one binds the COMPANION. That is why both receipt kinds exist, and it is the trap that cost OCC#4008
      and #4012 a CI round-trip each. Intentionally self-referential, and legitimately so: it asserts
      a fact ABOUT this PR (its branch), so this PR is the correct surface to read. It is a binding item,
      NOT substantive evidence, and makes no claim about onex_change_control#4005's correctness -- that
      is carried by the product-observing entries above, each proven RED at dev and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14434-occ-companion-evidence' drift/dod_receipts/OMN-14434/dod-occ-self-commit/command.yaml
