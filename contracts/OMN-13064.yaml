title: "Fix 3 red tests on dev baseline — delegation runner + sweep_preflight test isolation"
summary: >-
  Three tests on origin/dev (22fe1d668) fail due to ambient host-state bleed. (1) test_build_env_config_stable_rule_id_across_calls
  and (2) test_build_env_config_multiple_backends fail because they set BIFROST_CONTRACT_PATH but not
  BIFROST_OVERLAY_PATH, causing _build_env_config() to load ~/.omninode/delegation/bifrost_overrides.yaml
  which contains api_key_env and extra_headers fields rejected by ModelDelegationBackendContract(extra="forbid").
  Fix: pin BIFROST_OVERLAY_PATH to a nonexistent tmp path in both tests. (3) test_cached_block_returns_block
  asserts that a cached block entry causes an immediate block response, but the hook has always cleared
  cached blocks and re-run live checks so transient failures recover immediately. Fix: rename to test_cached_block_clears_cache_and_rechecks
  and assert the actual invariant. Changes are test-only (tests/delegation/test_runner.py, tests/hooks/test_sweep_preflight.py).
  No source or runtime changes.
