schema_version: "1.0.0"
ticket_id: "OMN-14343"
title: "fix(OMN-14343): harden OCC-Preflight-Dependency poller against rate-limit false-reds"
summary: >-
  omnimarket product PR #1709 (branch jonah/omn-14343-occ-preflight-poller-backoff, head c5a47c5765e6bd21cf7890682a5029d140b43ad1)
  fixes the OCC-Preflight-Dependency rate-limit poller storm. 33 top-level omnimarket workflow files each
  carried an identical wait-loop polling the Checks API every 10s for occ-preflight / eligibility to conclude
  (GH Actions needs: cannot cross workflow-file boundaries). All 33 fire on the same pull_request event
  and share one per-repo GitHub App rate-limit bucket; under set -euo pipefail a 403 aborted the gh api
  call before the case statement ran, so a rate-limited poller reported failure even though occ-preflight
  had already passed. The fix adds start-jitter (0-14s), explicit rate-limit detection with bounded exponential
  backoff (5s doubling to a 60s cap), and an elapsed-wall-clock deadline (720s) replacing the fixed 60-iteration
  count -- while any non-rate-limit gh error, and any genuine failure/cancelled/timed_out/action_required/
  startup_failure conclusion, still fails fast with zero backoff.
