ticket_id: "OMN-12857"
title: "Bifrost logical secret refs resolve through lane secret overlays"
summary: >-
  Moves Bifrost delegation backend secret authority from concrete environment
  variable names toward canonical logical secret_ref values. The core schema
  accepts secret_ref with legacy api_key_ref/api_key_env migration aliases, and
  omnimarket routing/generation consumers propagate the logical ref to the
  inference effect boundary. At the effect boundary, logical refs resolve
  through a typed ModelSecretResolverConfig lane mapping and ProtocolSecretStore.
  This source slice is intentionally not deploy-complete until the infra lane
  overlay/render path writes the resolver config for dev/stability runtime.
