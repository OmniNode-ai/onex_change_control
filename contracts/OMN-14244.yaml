ticket_id: "OMN-14244"
title: "fix(OMN-14244): narrow deploy-gate runtime-path matcher (stop false-positiving non-deploy CLIs,
  catch real deploy CLIs)"
summary: >-
  omniclaude PR #1876 fixes the deploy-gate `RUNTIME_PATH_PATTERNS` heuristic in `.github/actions/deploy-gate/validate_pr_deploy_required.py`,
  which gated every file under a `src/*/cli/` tree unconditionally (added in OMN-9685). That heuristic
  was both too broad (false-positived `src/omnibase_infra/cli/cli_occ.py`, a pure click/text-parser CLI
  with zero docker/subprocess/kafka/ssh surface, purely for living in a directory named "cli") and too
  narrow (missed `src/omnibase_infra/docker/catalog/cli.py`, a genuine `subprocess`+`docker compose` deploy
  CLI, because "cli" is the filename there, not a directory segment). The fix splits `CLI_PATH_PATTERNS`
  out of the unconditional set so a `src/*/cli/*.py` file is a runtime-path hit only when its own content
  references a deploy-relevant surface (docker/subprocess/paramiko/fabric/kafka/rpk/compose/ssh/deploy,
  word-boundary, case-insensitive), fail-closed on unreadable files, and adds an unconditional `src/*/docker/*.py`
  + `src/*/docker/**/*.py` inclusion that does not sweep in `src/*/models/docker/*` pure data models.
  An independent verifier (separate from the implementing agent) reproduced the fix end-to-end.
