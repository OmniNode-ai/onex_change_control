      OMN-14631 evidence branch, remains bound after merge, and contains the initial evidence commit a39cd9d15e1b8068348a8834c436609b1d6ed8c6.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          gh api repos/OmniNode-ai/onex_change_control/pulls/4184 --jq '.head.ref == "jonah/omn-14631-occ-infra-2315"
          and ((.state == "open") or (.state == "closed" and .merged_at != null))' | grep -qx true &&
          gh api repos/OmniNode-ai/onex_change_control/pulls/4184/commits --paginate --jq '.[].sha' |
          grep -Fx a39cd9d15e1b8068348a8834c436609b1d6ed8c6
