ticket_id: "OMN-13827"
title: "fix(OMN-13827): hot-patch ledger preflight accepts dev+main lineage merge_commit list"
summary: >-
  omnibase_infra PR #2181 makes scripts/preflight_hotpatch_ledger.py accept a list of candidate merge
  commits per ledger row in addition to the legacy scalar. Under dev->main squash promotion the same hot-patch
  content lives in two non-linear lineages (a dev merge commit and a main promotion commit that are not
  ancestors of one another), so a single scalar could not satisfy both a dev-ref and a main-ref rebuild.
  A row now passes when ANY candidate is known in the clone AND is an ancestor of the build ref; scalar
  rows are unchanged, all-candidates-unknown still exits 2, and a gate failure lists every candidate.
  The PR adds focused unit coverage (real ephemeral git repos with divergent dev/main lineages) and records
  local ruff, mypy, pre-commit, and full-file test evidence. The change is a preflight-script/test-only
  change with no runtime code, contract, or deploy surface touched.
