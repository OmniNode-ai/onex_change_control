          gh pr view 653 --repo OmniNode-ai/onex_change_control --json files --jq '.files[].path' | grep
          -Fx scripts/audit_branch_protection.sh
  - id: dod-compat-caller
    description: omnibase_compat has a Receipt Gate caller workflow before protection flip
