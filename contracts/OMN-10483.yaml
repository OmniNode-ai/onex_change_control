---
schema_version: 1.0.0
ticket_id: OMN-10483
title: Receipt Gate branch protection enforcement
summary: Audit and stage Receipt Gate required-check enforcement across active ticketed repos.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-audit-script
    description: Branch protection audit supports Receipt Gate required-check drift detection
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 653 --repo OmniNode-ai/onex_change_control --json files --jq '.files[].path' | grep
          -Fx scripts/audit_branch_protection.sh
  - id: dod-compat-caller
    description: omnibase_compat has a Receipt Gate caller workflow before protection flip
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 80 --repo OmniNode-ai/omnibase_compat --json files --jq '.files[].path' | grep -Fx
          .github/workflows/call-receipt-gate.yml
  - id: dod-intelligence-caller
    description: omniintelligence has a Receipt Gate caller workflow before protection flip
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 635 --repo OmniNode-ai/omniintelligence --json files --jq '.files[].path' | grep
          -Fx .github/workflows/call-receipt-gate.yml
  - id: dod-infra-caller
    description: omninode_infra has a Receipt Gate caller workflow before protection flip
    source: manual
    checks:
      - check_type: command
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-infra-caller/command.yaml"
          && grep -q '^evidence_item_id: dod-infra-caller$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-infra-caller/command.yaml"
          && grep -q '^ticket_id: OMN-10483$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-infra-caller/command.yaml"
          && grep -q '^pr_number: 375$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-infra-caller/command.yaml"
          && grep -q '^commit_sha: f98598325ac2c69d91edcf1288c09c6a12afba99$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-infra-caller/command.yaml"
          && grep -q 'id-token: write' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-infra-caller/command.yaml"
  - id: dod-self-evidence-path
    description: omnibase_core Receipt Gate normalizes onex_change_control self-PR evidence paths
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 1027 --repo OmniNode-ai/omnibase_core --json files --jq '.files[].path' | grep -Fx
          .github/workflows/receipt-gate.yml
  - id: dod-occ-eligibility
    description: OCC PR 678 evidence is locally eligible for downstream omninode_infra PR 375
    source: manual
    checks:
      - check_type: command
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-occ-eligibility/command.yaml"
          && grep -q '^evidence_item_id: dod-occ-eligibility$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-occ-eligibility/command.yaml"
          && grep -q '^ticket_id: OMN-10483$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-occ-eligibility/command.yaml"
          && grep -q '^pr_number: 678$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-occ-eligibility/command.yaml"
          && grep -q '^commit_sha: f98598325ac2c69d91edcf1288c09c6a12afba99$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-occ-eligibility/command.yaml"
          && grep -q 'eligible=true' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10483/dod-occ-eligibility/command.yaml"
