---
schema_version: 1.0.0
ticket_id: OMN-10483
title: Receipt Gate branch protection enforcement
summary: Audit and stage Receipt Gate required-check enforcement across active ticketed repos.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-audit-script
    description: Branch protection audit detects Receipt Gate required-check drift
    source: manual
    checks:
      - check_type: command
        check_value: >-
          set -e; tmp=$(mktemp); bash -n scripts/audit_branch_protection.sh; set +e; BRANCH_PROTECTION_AUDIT_JSONL="$tmp"
          bash scripts/audit_branch_protection.sh >/tmp/omn10483-audit.out 2>/tmp/omn10483-audit.err;
          rc=$?; set -e; test "$rc" -eq 1; test -s "$tmp"; jq -e 'select(.check == "required_check_receipt_gate")'
          "$tmp" >/dev/null
  - id: dod-compat-caller
    description: omnibase_compat has a Receipt Gate caller workflow before protection flip
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 80 --repo OmniNode-ai/omnibase_compat --json files --jq '.files[].path' | grep -Fx
          .github/workflows/call-receipt-gate.yml
  - id: dod-intelligence-caller
    description: omniintelligence has a Receipt Gate caller workflow before protection flip
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 635 --repo OmniNode-ai/omniintelligence --json files --jq '.files[].path' | grep
          -Fx .github/workflows/call-receipt-gate.yml
  - id: dod-infra-caller
    description: omninode_infra has a Receipt Gate caller workflow before protection flip
    source: manual
    checks:
      - check_type: command
        check_value: >-
          gh pr view 375 --repo OmniNode-ai/omninode_infra --json files --jq '.files[].path' | grep -Fx
          .github/workflows/call-receipt-gate.yml
