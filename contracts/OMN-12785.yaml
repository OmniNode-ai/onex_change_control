---
schema_version: "1.0.0"
ticket_id: "OMN-12785"
title: "Wave 2C — UI rule-compliance fixes: no truncation, no aggregate-only, authority labels"
summary: >-
  Fixes three shipped rule violations in omnidash delegation-control-plane panels. (1) DelegationCorrelationTracePanel:
  removes 120-char preview truncation and maxHeight:200 clip from ExpandableText so full prompt+response
  is rendered and copyable. (2) DelegationMetricPanels (Savings/ModelRouting/QualityGate/TokenUsage) and
  DelegationEvidenceTabs (Overview/Cost&Tokens/Quality): adds explicit aggregate-only labeling in subtitles
  with pointer to per-run Correlation Trace. (3) Every demo-visible DelegationPanelFrame now carries a
  machine-readable authority prop (projection-backed | runtime-observed | degraded | disabled) rendered
  as a visible badge.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-no-truncation"
    description: >-
      ExpandableText in DelegationCorrelationTracePanel renders full text without any preview clip or
      maxHeight constraint. The 120-char preview (L26) and maxHeight:200 expanded clip (L54) are deleted.
      Collapsed state shows only toggle + char count.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-12785/dod-no-truncation/command.yaml
          && grep -q 'maxHeight' drift/dod_receipts/OMN-12785/dod-no-truncation/command.yaml
          && grep -q 'chars' drift/dod_receipts/OMN-12785/dod-no-truncation/command.yaml
  - id: "dod-aggregate-labeled"
    description: >-
      All four DelegationMetricPanels and the Cost&Tokens and Quality tabs in DelegationEvidenceTabs carry
