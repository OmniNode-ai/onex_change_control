schema_version: 1.0.0
ticket_id: OMN-14403
title: "OCC companion for omnibase_core#1440 — shared def-B fan-out resolver + local adapter"
summary: 'OCC evidence companion for OmniNode-ai/omnibase_core#1440 (OMN-14403). #1440 adds the pure src/omnibase_core/runtime/runtime_fanout_resolver.py
  helper and wires RuntimeLocal / LocalRuntimeBusAdapter to represent typed def-B fan-out returns behind
  the existing ONEX_MULTI_EVENT_PUBLISH_SEAM flag. The change is additive: the seam remains default-off,
  single-return and None paths keep prior behavior, and contracts without published_events keep the existing
  output_topic route. Every substantive check below is a product-tree content read pinned to #1440 head
  db813012e071256f37fe24b331e78595bb47f750. The same resolver file is absent at current dev, so these
  checks fail before the PR and pass only on the PR head. Product CI Summary and the full test matrix
  were live-green before this companion; the product PR was blocked by missing central OCC evidence. #magic___^_^___line '
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - public_api
  - protocols
evidence_requirements:
  - kind: manual
    description: omnibase_core#1440 head SHA defines shared fan-out resolver functions, local adapter
      routing, runtime-local published_events wiring, and no deploy surface.
    command: see dod_evidence check_values pinned to db813012e071256f37fe24b331e78595bb47f750
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
