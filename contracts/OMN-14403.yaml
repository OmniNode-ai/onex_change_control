---
schema_version: "1.0.0"
ticket_id: "OMN-14403"
title: "OCC companion for omnibase_core#1440 — shared def-B fan-out resolver + local adapter"
summary: >
  OCC evidence companion for OmniNode-ai/omnibase_core#1440 (OMN-14403). #1440 adds the pure src/omnibase_core/runtime/runtime_fanout_resolver.py
  helper and wires RuntimeLocal / LocalRuntimeBusAdapter to represent typed def-B fan-out returns behind
  the existing ONEX_MULTI_EVENT_PUBLISH_SEAM flag. The change is additive: the seam remains default-off,
  single-return and None paths keep prior behavior, and contracts without published_events keep the existing
  output_topic route. Every substantive check below is a product-tree content read pinned to #1440 head
  db813012e071256f37fe24b331e78595bb47f750. The same resolver file is absent at current dev, so these
  checks fail before the PR and pass only on the PR head. Product CI Summary and the full test matrix
  were live-green before this companion; the product PR was blocked by missing central OCC evidence.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
  - "protocols"
evidence_requirements:
  - kind: "manual"
    description: "omnibase_core#1440 head SHA defines shared fan-out resolver functions, local adapter
      routing, runtime-local published_events wiring, and no deploy surface."
    command: "see dod_evidence check_values pinned to db813012e071256f37fe24b331e78595bb47f750"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1440-resolver-functions"
    description: >-
      Product-observing content read: fetches runtime_fanout_resolver.py from omnibase_core#1440 head
      db813012e071256f37fe24b331e78595bb47f750 and asserts the shared resolver defines normalize_fanout_elements,
      resolve_published_topic, resolve_fanout_topics, assert_published_events_injective, and explicit
      carrier rejection for ModelEventEnvelope / ModelDelegationEventEnvelope. RED direction: the file
      is absent from dev before the PR, so the same command fails there.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          content="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/src/omnibase_core/runtime/runtime_fanout_resolver.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && printf '%s' "$content" | grep -q 'def normalize_fanout_elements'
          && printf '%s' "$content" | grep -q 'def resolve_published_topic' && printf '%s' "$content"
          | grep -q 'def resolve_fanout_topics' && printf '%s' "$content" | grep -q 'def assert_published_events_injective'
          && printf '%s' "$content" | grep -q 'ModelEventEnvelope' && printf '%s' "$content" | grep -q
          'ModelDelegationEventEnvelope'
  - id: "dod-verify-1440-local-adapter-fanout"
    description: >-
      Product-observing content read: fetches runtime_local_adapter.py and the new fan-out adapter test
      file from #1440 head and asserts LocalRuntimeBusAdapter imports/uses resolve_fanout_topics, exposes
      published_events and multi_event_seam_enabled, branches on is_fanout_sequence, and carries tests
      for seam-on two-topic publish, seam-off unchanged drop, and fail-closed unmapped classes.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          adapter="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/src/omnibase_core/runtime/runtime_local_adapter.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && tests="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/tests/unit/runtime/test_runtime_local_adapter_fanout.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && printf '%s' "$adapter" | grep -q 'resolve_fanout_topics' && printf
          '%s' "$adapter" | grep -q 'is_fanout_sequence(result)' && printf '%s' "$adapter" | grep -q 'published_events'
          && printf '%s' "$adapter" | grep -q 'multi_event_seam_enabled' && printf '%s' "$tests" | grep
          -q 'test_fanout_seam_on_publishes_two_topics_in_order' && printf '%s' "$tests" | grep -q 'test_fanout_seam_off_drops_and_publishes_nothing'
          && printf '%s' "$tests" | grep -q 'test_fanout_unmapped_class_fails_closed'
  - id: "dod-verify-1440-runtime-local-wiring"
    description: >-
      Product-observing content read: fetches runtime_local.py from #1440 head and asserts RuntimeLocal
      loads published_events from the contract, asserts injective class-to-topic mappings at boot, reads
      ONEX_MULTI_EVENT_PUBLISH_SEAM, and passes published_events plus multi_event_seam_enabled into each
      LocalRuntimeBusAdapter.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          content="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/src/omnibase_core/runtime/runtime_local.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && printf '%s' "$content" | grep -q 'def _load_published_events_map'
          && printf '%s' "$content" | grep -q 'assert_published_events_injective' && printf '%s' "$content"
          | grep -q 'multi_event_publish_seam_enabled()' && printf '%s' "$content" | grep -q 'published_events=published_events'
          && printf '%s' "$content" | grep -q 'multi_event_seam_enabled=multi_event_seam_enabled'
  - id: "dod-deploy-assessment-1440"
    description: >-
      Deploy-gate assessment for omnibase_core#1440. The PR changes Python runtime/helper/test files only
      and does not touch Dockerfiles, compose files, deploy scripts, or runtime deployment manifests.
      Falsifiable: the command fails if the PR diff ever grows a deploy-surface file.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          ! (gh pr diff 1440 --repo OmniNode-ai/omnibase_core --name-only | grep -qE 'docker-compose|Dockerfile|deploy/')
  - id: "dod-occ-self-bind-pr-4146"
    description: >-
      Self-bind receipt for this OCC evidence companion. Binds onex_change_control#4146 on branch jonah/omn-14403-occ-core1440
      to the initial evidence commit 8f98e2dc6bbf506b2d36b23b2fa8e815c1eb45ed so onex_change_control's
      own OCC preflight and Receipt Gate can resolve the companion PR. The four product-observing receipts
      above bind to omnibase_core#1440; this L0 item binds the OCC companion itself and does not carry
      the contract substance floor.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'branch: jonah/omn-14403-occ-core1440' drift/dod_receipts/OMN-14403/dod-occ-self-bind-pr-4146/command.yaml
          && grep -q 'pr_number: 4146' drift/dod_receipts/OMN-14403/dod-occ-self-bind-pr-4146/command.yaml
          && grep -q '8f98e2dc6bbf506b2d36b23b2fa8e815c1eb45ed' drift/dod_receipts/OMN-14403/dod-occ-self-bind-pr-4146/command.yaml
