      resolve_published_topic, resolve_fanout_topics, assert_published_events_injective, and explicit
      carrier rejection for ModelEventEnvelope / ModelDelegationEventEnvelope. RED direction: the file
      is absent from dev before the PR, so the same command fails there.'
