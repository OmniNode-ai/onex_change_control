  - id: dod-verify-1440-resolver-functions
    description: 'Product-observing content read: fetches runtime_fanout_resolver.py from omnibase_core#1440
      head db813012e071256f37fe24b331e78595bb47f750 and asserts the shared resolver defines normalize_fanout_elements,
      resolve_published_topic, resolve_fanout_topics, assert_published_events_injective, and explicit
      carrier rejection for ModelEventEnvelope / ModelDelegationEventEnvelope. RED direction: the file
      is absent from dev before the PR, so the same command fails there.'
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: content="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/src/omnibase_core/runtime/runtime_fanout_resolver.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && printf '%s' "$content" | grep -q 'def normalize_fanout_elements'
          && printf '%s' "$content" | grep -q 'def resolve_published_topic' && printf '%s' "$content"
          | grep -q 'def resolve_fanout_topics' && printf '%s' "$content" | grep -q 'def assert_published_events_injective'
          && printf '%s' "$content" | grep -q 'ModelEventEnvelope' && printf '%s' "$content" | grep -q
          'ModelDelegationEventEnvelope'
  - id: dod-verify-1440-local-adapter-fanout
