      adapter test file from #1440 head and asserts LocalRuntimeBusAdapter imports/uses resolve_fanout_topics,
      exposes published_events and multi_event_seam_enabled, branches on is_fanout_sequence, and carries
      tests for seam-on two-topic publish, seam-off unchanged drop, and fail-closed unmapped classes.'
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: adapter="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/src/omnibase_core/runtime/runtime_local_adapter.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && tests="$(gh api 'repos/OmniNode-ai/omnibase_core/contents/tests/unit/runtime/test_runtime_local_adapter_fanout.py?ref=db813012e071256f37fe24b331e78595bb47f750'
          --jq .content | base64 -d)" && printf '%s' "$adapter" | grep -q 'resolve_fanout_topics' && printf
          '%s' "$adapter" | grep -q 'is_fanout_sequence(result)' && printf '%s' "$adapter" | grep -q 'published_events'
