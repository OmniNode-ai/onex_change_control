schema_version: "1.0.0"
ticket_id: "OMN-12959"
title: "P1.3: FSM terminal-state invariant — stranded-workflow sweep + typed watchdog events"
summary: >
  An orchestrator FSM could strand forever in a non-terminal state with zero signal — silent absence in
  every projection (proven by the OMN-12939 delegation strand, live CID a604cd40-84aa-41fa-97c8-a8d3ec320cd6).
  This generalizes the OMN-12939 / PR #1158 fix into a platform invariant: every workflow FSM must reach
  a terminal state or trip a watchdog. New omnimarket.events.watchdog defines the canonical typed-watchdog
  vocabulary EnumWatchdogEventType (workflow-timeout / workflow-unroutable / workflow-stalled) + ModelWatchdogEvent
  + watchdog_topic_for topic authority — typed operator-review failure classes, not generic failures,
  so projections and sweeps distinguish failure modes. NodeRuntimeSweep gains a Phase-4 stranded-workflow
  check: a workflow started-but-no-terminal-event past its per-archetype SLA is flagged CRITICAL with
  its classified watchdog type and surfaced through the runtime_sweep auto-ticket path. The enforcement
  ratchet ships in the same PR: scripts/ci/check_watchdog_topic_authority.py rejects any hardcoded watchdog
  topic literal outside the canonical registry, wired as both a pre-commit hook and a CI gate. Compute
  + CI-gate change only; no topic schema, envelope, or contract API change; no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD tests assert the typed-watchdog vocabulary, classification precedence (unroutable > stalled
      > timeout), per-archetype SLA override, terminal-clears-strand, and that the CI guard fires on a
      hardcoded watchdog topic while allowlisting the registry / skip-token / tests dir.
    command: "uv run pytest tests/test_stranded_workflow_sweep.py tests/ci/test_check_watchdog_topic_authority.py
      -q"
