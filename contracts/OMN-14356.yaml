schema_version: 1.0.0
ticket_id: OMN-14356
title: "fix(OMN-14356): collision-safe consumer-group ACL delimiter (both providers)"
summary: >-
  omninode_infra PR #582 closes a High-severity cross-tenant consumer-GROUP ACL leak in both broker ACL
  provisioners. The per-tenant group grant used a ``-`` tenant-boundary delimiter (``tenant-<slug>-``
  for Redpanda prefixed ACLs; ``tenant-<slug>-*`` for MSK IAM Resource ARNs). Because ``-`` is a LEGAL
  tenant_slug character, tenant ``acme``'s group grant was a literal prefix / IAM glob-match of tenant
  ``acme-foo``'s consumer groups, silently granting cross-tenant DescribeGroup and (on MSK) AlterGroup
  -- offset reset/delete, a cross-tenant integrity / DoS leak. The fix mirrors the already-safe topic
  namespace's ``.`` delimiter for the group namespace in both providers; ``.`` is rejected by the tenant_slug
  charset so overlap is structurally impossible.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - public_api
