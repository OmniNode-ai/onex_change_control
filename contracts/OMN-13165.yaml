schema_version: "1.0.0"
ticket_id: "OMN-13165"
title: "Projection API: delegation summary topic rejects correlation_id filter with missing column"
summary: >-
  The generic /projection/{topic} endpoint unconditionally applied WHERE correlation_id = $1 regardless
  of whether the topic's declared column list included that column. Aggregate/summary topics (e.g. delegation.summary.v1)
  back views with no per-row correlation_id column; the filter caused Postgres to raise column "correlation_id"
  does not exist, which surfaced to callers as a 503 degraded response. Callers were being misled into
  treating a summary projection error as proof of delegation failure, when the delegation.correlation-trace.v1
  topic was returning fresh rows for the same correlation_id. #magic___^_^___line Fix: topic_supports_correlation_id_filter()
  checks the contract-declared column list before issuing SQL. When correlation_id is absent from the
  explicit column list and SELECT * is not used, the endpoint returns a typed 422 unsupported_filter response
  that names the authoritative per-correlation surface (delegation.correlation-trace.v1) so callers are
  not misled. Regression coverage added: 3 new HTTP integration tests and 4 pure-unit tests for the helper
  function. #magic___^_^___line Evidence from the 2026-06-15 night gate-zero run confirms the defect (before)
  and the fix (after) are distinct code paths: correlation-trace returned row_count=1 / data_freshness=fresh
  while summary returned 503 degraded for the same correlation_id.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
