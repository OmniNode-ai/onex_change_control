title: "fix(OMN-13544): reconcile golden_chain expected_fields to real projection columns"
summary: >
  golden_chains.yaml listed delegation_events "columns" in five OMN-12660 WS-G error-chain regression
  guards (d3_local_routing, d1_d2_scaffold, d4_blank_content, d9_wheel_module, f1_publish_loop) that never
  existed in the projection table — they were event-payload field names. The sweep checks `field not in
  row` against projected DB-row keys, so those chains could only ever FAIL. Reconciled each to the real
  delegation_events column (model_name, quality_gate_passed, response_text, timestamp; d9 falls back to
  correlation_id presence), verified against the node_projection_delegation forward migrations. Adds a
  guard test that asserts every expected_field is a real projection-table column so the drift cannot recur.
