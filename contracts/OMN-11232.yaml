  Creates node_session_phase_orchestrator — the tick-driven orchestrator for session phase lifecycle.
  Receives evaluation results (onex.evt.omnimarket.session-phase-evaluated.v1) and routes them: transition_required
  -> SESSION_PHASE_TRANSITION, halt_required -> SESSION_HALT_REQUIRED, no_action -> tick-completed only.
  Halt takes priority over transition in multi-evaluation batches. Topics loaded from contract.yaml. 8
  unit tests. Part of epic OMN-11224.
