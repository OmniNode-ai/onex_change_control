---
schema_version: "1.0.0"
ticket_id: "OMN-12562"
title: "ci: CR Thread Gate caller treadmill"
summary: >-
  Central evidence for omnibase_infra PR #2049. The CR Thread Gate caller previously dispatched the reusable
  self-hosted CodeRabbit thread gate for every issue_comment, pull_request_review, and pull_request_review_comment
  event, so CodeRabbit bot activity could create redundant expensive gate jobs. The fix preserves required
  gating on PR heads and merge_group requests, skips bot-originated comment/review events before the reusable
  gate job allocates a runner, and adds per-PR job concurrency for runnable gate jobs.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: >-
      The CR Thread Gate caller keeps pull_request and merge_group coverage, filters bot-originated CodeRabbit/GitHub
      comment-review events, and validates as GitHub Actions workflow YAML.
    command: "actionlint .github/workflows/cr-thread-gate-caller.yml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-infra-pr-2049"
    description: >-
      omnibase_infra PR #2049 carries the one-file caller workflow change at commit d2d0c14dacd3a40bc1700a42e9495b3adaa9447c.
      The workflow still triggers for pull_request opened/synchronize/reopened and merge_group checks_requested,
      while its runnable job skips dependabot, github-actions[bot], and actors containing coderabbit for
      comment/review events before calling the self-hosted reusable gate.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12562/dod-infra-pr-2049/command.yaml"
          && grep -q '^pr_number: 2049$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12562/dod-infra-pr-2049/command.yaml"
          && grep -q '^commit_sha: "d2d0c14dacd3a40bc1700a42e9495b3adaa9447c"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12562/dod-infra-pr-2049/command.yaml"
  - id: "dod-local-validation"
    description: >-
      Targeted local validation for the workflow change passed: actionlint on the touched workflow, pre-commit
      on the touched workflow file, and git diff --check.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12562/dod-local-validation/command.yaml"
          && grep -q 'actionlint .github/workflows/cr-thread-gate-caller.yml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12562/dod-local-validation/command.yaml"
          && grep -q 'pre-commit run --files .github/workflows/cr-thread-gate-caller.yml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12562/dod-local-validation/command.yaml"
