title: "Route SEA generation-pipeline inference through contract-driven delegation"
summary: >
  onex-self-extending-agent/src/pipeline/consumer.py and src/eval/eval_runner.py were hand-rolled imperative
  inference: raw httpx.post calls with hardcoded max_tokens literals (2048 / 8192) and a hardcoded LAN-IP
  endpoint allowlist. This ticket replaces both with the canonical contract-driven delegation path: emit
  a typed ModelInferenceIntent to TOPIC_DELEGATION_INFERENCE_REQUEST and consume ModelInferenceResponseData
  from TOPIC_DELEGATION_INFERENCE_RESPONSE via an injected event bus (node_delegation_orchestrator ->
  node_llm_inference_effect). max_tokens is resolved from routing_tiers.yaml max_context_tokens, never
  a literal. Supersedes OMN-12438 (max_tokens literal flip).
