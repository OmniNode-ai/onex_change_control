---
schema_version: "1.0.0"
ticket_id: "OMN-13360"
title: "Projection: gate projected:true terminal on rows_upserted >= 1 (no false-positive terminal)"
summary: >
  The omnibase_infra auto-wiring projection callback emitted the projection-delegation-applied.v1 terminal
  with {"projected": true} gated solely on the projection handler not raising; the handler's rows_upserted
  result was logged but never inspected, so any no-raise / zero-row / internally-swallowed path emitted
  a terminal asserting a durable row that never landed (Gate-Zero GZ-1 / defect G-4). Fix gates the terminal
  on the handler's actual write outcome (rows_upserted >= 1) and logs loudly when a no-raise handler wrote
  zero rows. Compute/runtime-wiring change only; no topic schema, envelope, or contract API change; no
  live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Unit test asserts a handler returning rows_upserted=0 emits NO terminal; existing terminal-emission
      + db-injection + projector-dispatch suites stay green (295 passed in tests/unit/runtime/auto_wiring
      + projector integration).
    command: "uv run pytest tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py -q"
