schema_version: "1.0.0"
ticket_id: "OMN-13092"
title: "Phase 0c: capture topics + event types registration + consistency test"
summary: >-
  Registers the durable-capture event types for the skill-output-suppression slice (epic OMN-13089). omnimarket:
  artifact.captured -> onex.evt.omnimarket.artifact-captured.v1 and tool.output.captured -> onex.evt.omnimarket.tool-output-captured.v1,
  both duty_critical, in node_emit_daemon/registries/topics.yaml, mirrored in the emit daemon contract
  publish_topics; also fixes pre-existing hook-side registry drift (delegate.task, agent.action, llm.cost.completed
  were registered in omniclaude but missing from the daemon YAML, previously masked by source_only baseline
  entries). omniclaude: adds both event types to emit_client_wrapper SUPPORTED_EVENT_TYPES, registers
  TopicBase + EVENT_REGISTRY entries, and adds the blocking cross-registry consistency test (hook frozenset
  subset-of daemon registry topics) plus a CI job that checks out omnimarket@dev so the gate blocks in
  omniclaude CI.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
  - "events"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
