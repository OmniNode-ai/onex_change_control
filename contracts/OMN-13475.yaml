schema_version: "1.0.0"
ticket_id: "OMN-13475"
title: "fix: collapse delegation terminal+compat construction onto one contract-owned builder (kills OMN-13408
  class)"
summary: >-
  HandlerDelegationWorkflow built the canonical terminal event (delegation-completed.v1 / delegation-failed.v1
  carrying ModelDelegationResult) AND the backward-compat twin (task-delegated.v1 carrying ModelTaskDelegatedEvent)
  in five separate ad-hoc terminal sites, each reading token counts and measuring cost independently.
  The two events co-write the same delegation projection row, so any drift between the independently-read
  values clobbered the row's tokens/cost to 0 — the OMN-13408 telemetry-zeroing bug class. Patching each
  site to "also carry the tokens" left the divergence possible at every future edit. Fix: introduce a
  single contract-owned builder HandlerDelegationWorkflow._emit_terminal fed by one TerminalEmissionInputs
  value object; it measures cost exactly once (_measure_terminal_cost / recompute_actual_cost_and_savings,
  the same path OMN-13396 wired) and reads the served tokens once, then derives BOTH events from those
  identical values. _build_compat_event becomes _gate_terminal_inputs (returns inputs, not an event);
  the orphaned _escalation_metadata is deleted (folded into the single builder). After the change there
  is exactly ONE ModelDelegationResult and ONE ModelTaskDelegatedEvent construction site (down from 5
  + 3). Does not regress the inference EFFECT served-usage fix (OMN-13408, merged). Purely intra-omnimarket
  fix — no core wire DTO changes. This OCC PR carries the central contract consumed by the omnimarket
  PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
