evidence_requirements:
  - kind: "ci"
    description: "omnibase_infra PR #1626 carries the OMN-11142 executor change."
    command: "gh pr view 1626 --repo OmniNode-ai/omnibase_infra --json state,headRefOid"
  - kind: "tests"
    description: "Focused executor tests, lint, and mypy pass locally."
    command: "PYTHONPATH=${OMNIBASE_CORE_SRC:?set OMNIBASE_CORE_SRC}:$PWD/src uv run pytest tests/unit/gate/test_executor.py
      -q && PYTHONPATH=${OMNIBASE_CORE_SRC:?set OMNIBASE_CORE_SRC}:$PWD/src uv run ruff check src/omnibase_infra/gate
      tests/unit/gate && PYTHONPATH=${OMNIBASE_CORE_SRC:?set OMNIBASE_CORE_SRC}:$PWD/src uv run mypy src/omnibase_infra/gate/executor.py
      src/omnibase_infra/gate/validator_registry.py"
  - kind: "manual"
    description: "No runtime deploy is required before merge for a new library executor."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11142/dod-deploy-assessment/command.yaml"
  - kind: "manual"
    description: "OCC PR #1083 carries the central OMN-11142 contract and receipts."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11142/dod-occ-pr-1083/command.yaml"
