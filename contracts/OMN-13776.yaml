schema_version: "1.0.0"
ticket_id: "OMN-13776"
title: "DoD evidence classifier: HTTP-probe misclassified as UI/Playwright; trivial-infra OCC fast-path"
summary: >-
  (a) node_session_bootstrap/dod_verification_registry.py's RENDERED_OUTPUT DoD check was a Phase-2-deferred
  stub with no classification logic at all. Adds classify_evidence_kind, a pure function fed by two new
  optional ModelDodEvidenceCheck fields (artifact_command, target_endpoint): curl/httpx/wget against a
  non-UI endpoint (/ready, /health, /v1/..., /api/..., /introspection, *.json) classifies HTTP_EVIDENCE
  and passes without a Playwright receipt; any endpoint matching a UI/dashboard/browser-rendered pattern
  classifies UI_RENDERED and still fails without real rendered-output evidence (no regression of the OMN-13024/OMN-13052
  UI-evidence gate — curl-only proof against a UI page is rejected regardless of tool); no artifact metadata
  present preserves the existing deferred-pass behavior. (b) node_pr_lifecycle_fix_effect's deploy_gate_contract_not_found
  route always minted a full OCC contract + receipt-chain PR, even for a one-line non-runtime infra edit.
  Adds classify_trivial_infra_fastpath (adapter_occ_contract.py): a size-AND-path-scoped exemption (all
  changed files match a non-runtime infra allowlist, none touch node business logic or migrations, diff
  stays within trivial thresholds) wired into HandlerPrLifecycleFix._route via two new optional ModelPrLifecycleFixCommand
  fields (changed_files, diff_total_lines) — a mechanical exemption, not a skip token; omitting the fields
  (existing callers) never takes the fast-path. omnimarket PR #1548.
is_seam_ticket: false
interface_change: false
