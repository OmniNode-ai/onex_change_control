schema_version: "1.0.0"
ticket_id: "OMN-13370"
title: "P5: Retire marker heuristics as routing authority in delegation quality gate"
summary: >-
  OMN-13370 retires marker heuristics as quality-gate pass authority in omnimarket. The quality-gate reducer
  keeps legacy length/refusal/marker checks and task-class heuristics as reject-only diagnostics: they
  can fail invalid output and continue to contribute diagnostic quality_score, but they can no longer
  create quality_gate passed=true without deterministic adequacy authority. The change preserves the canonical
  event-bus quality-gate contract and topics; it adds no bespoke REST endpoint and performs no runtime
  mutation. Tests prove schema, length, no-refusal, and marker checks reject invalid output but cannot
  promote marker-rich output to adequate by themselves.
