schema_version: "1.0.0"
ticket_id: "OMN-12535"
title: "ci(OMN-12535): harden sibling compat installs"
summary: >-
  Harden omnibase_infra Sibling Compat CI against transient uv dependency download timeouts by routing
  the base dependency install through the shared retrying setup-python-uv action, setting a long uv HTTP
  timeout and CPU torch backend at workflow scope, and retrying the sibling dry-run install.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      Focused workflow-resilience tests prove Sibling Compat uses the retrying uv setup path and retries
      transient sibling dry-run install failures.
    command: >-
      uv run pytest tests/ci/test_ci_workflow_resilience.py -q && uv run ruff format --check tests/ci/test_ci_workflow_resilience.py
      && uv run ruff check tests/ci/test_ci_workflow_resilience.py && git diff --check
