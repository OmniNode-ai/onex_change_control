schema_version: "1.0.0"
ticket_id: "OMN-12856"
title: "Resolve GitHub token via contract api_key_ref at effect boundary; enforce with gate"
summary: >-
  Migrates all omnimarket handlers, adapters, and consumers off raw os.environ["GH_PAT"] / os.getenv("GH_TOKEN")
  / GITHUB_TOKEN direct reads. Contracts declare a github_token api_key_ref entry; handlers call contract_secret_ref
  + resolve_api_key at the effect boundary (canonical contract-native pattern). A new enforcement gate
  (scripts/ci/check_github_token_env_reads.py) scans omnimarket source and fails CI on any remaining raw
  GitHub-token env read. Wired as a required CI step and a pre-commit hook. Enforcement, not detection.
  The change is a code-only refactor with no runtime topology or topic schema changes; the stability-test
  lane does not require a full redeploy, only a standard image rebuild.
