title: "feat(OMN-14633): canonicalize node_coding_agent_workspace_compute to def-B"
summary: >-
  Central OCC evidence for omnibase_infra PR #2316. The product PR flips node_coding_agent_workspace_compute
  from the canonical-shape baseline to def-B handle(command) form, adds adequacy and equivalence receipts,
  preserves the pure workspace validation fold, and fixes the CI canonical-shape step so repo-local receipts
  are used.
is_seam_ticket: true
interface_change: true
