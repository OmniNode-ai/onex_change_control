  - "protocols"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-infra-pr-2316-product-head"
    description: >-
      Product-observing verification for omnibase_infra PR #2316 at head a53b9c5dda9f9e3deb13fa358930f861821152ae.
      The proof reads PR metadata and changed files from GitHub, verifies the PR targets dev, checks the
      def-B handler file, adequacy/equivalence receipts, baseline shrink, and cross-boundary golden-equivalence
      test.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2316; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=a53b9c5dda9f9e3deb13fa358930f861821152ae;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt" && grep -Fq
          'feat(OMN-14633): canonicalize node_coding_agent_workspace_compute to def-B' "$d/pr.txt" &&
          for p in src/omnibase_infra/nodes/node_coding_agent_workspace_compute/handlers/handler_workspace_validate.py
          scripts/ci/adequacy_receipts/omnibase_infra.nodes.node_coding_agent_workspace_compute.json scripts/ci/adequacy_receipts/omnibase_infra.nodes.node_coding_agent_workspace_compute.equivalence.json
          scripts/ci/canonical_handler_shape_baseline.py tests/unit/nodes/node_coding_agent/test_workspace_compute_golden_equivalence.py
          .github/workflows/ci.yml; do grep -Fq "$p" "$d/pr.txt" && mkdir -p "$d/$(dirname "$p")" && gh
          api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}" --jq .content | base64 --decode
          > "$d/$p"; done && grep -Fq 'async def handle(' "$d/src/omnibase_infra/nodes/node_coding_agent_workspace_compute/handlers/handler_workspace_validate.py"
          && grep -Fq 'ModelWorkspaceValidateResult' "$d/src/omnibase_infra/nodes/node_coding_agent_workspace_compute/handlers/handler_workspace_validate.py"
          && grep -Fq '"meets_target": true' "$d/scripts/ci/adequacy_receipts/omnibase_infra.nodes.node_coding_agent_workspace_compute.json"
          && grep -Fq '"status": "pass"' "$d/scripts/ci/adequacy_receipts/omnibase_infra.nodes.node_coding_agent_workspace_compute.equivalence.json"
          && grep -Fq 'test_handle_reproduces_recorded_golden' "$d/tests/unit/nodes/node_coding_agent/test_workspace_compute_golden_equivalence.py"
          && grep -Fq -- '--receipts-dir' "$d/.github/workflows/ci.yml"
  - id: "dod-infra-pr-2316-local-verification"
    description: >-
      Verification evidence recorded in the omnibase_infra PR #2316 body. The PR body records 74 passing
      focused tests, ruff format/check, mypy for the node package, pre-commit on changed files, and full
      canonical-shape classifier proof with new=0 unproven_flips=0 warn=91.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2316; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=a53b9c5dda9f9e3deb13fa358930f861821152ae;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,body --jq '.headRefOid
          == "'$PRODUCT_HEAD'" and (.body | contains("74 passed")) and (.body | contains("ruff format"))
          and (.body | contains("mypy src/omnibase_infra/nodes/node_coding_agent_workspace_compute/"))
          and (.body | contains("pre-commit run --files")) and (.body | contains("new=0 unproven_flips=0
          warn=91"))' | grep -qx true
  - id: "dod-infra-pr-2316-ci-receipts-dir-gap"
    description: >-
      Product proof for the CI gap fixed in the same PR. The CI workflow now passes --receipts-dir to
      canonical_handler_shape.py so omnibase_infra uses its own committed adequacy receipts instead of
      the sibling omnibase_core checkout path.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2316; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=a53b9c5dda9f9e3deb13fa358930f861821152ae;
          f="$(mktemp)" && gh api "repos/${PRODUCT_REPO}/contents/.github/workflows/ci.yml?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$f" && grep -Fq 'canonical_handler_shape.py' "$f" && grep
          -Fq -- '--receipts-dir' "$f" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json
          body --jq '.body | contains("CI gap found + fixed") and contains("never passes `--receipts-dir`")'
          | grep -qx true
  - id: "dod-infra-pr-2316-deploy-scope"
    description: >-
      Deploy-surface audit for omnibase_infra PR #2316. The PR changes CI workflow config, canonical-shape
      receipts/baseline, node handler code, tests, and golden fixtures. It does not change Dockerfiles,
      compose manifests, deploy scripts, runtime service definitions, migrations, or systemd units. No
      live deploy or restart was performed by this merge lane.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2316; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=a53b9c5dda9f9e3deb13fa358930f861821152ae;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid --jq '.headRefOid ==
          "'$PRODUCT_HEAD'"' | grep -qx true && gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO"
          --name-only | grep -Fxq src/omnibase_infra/nodes/node_coding_agent_workspace_compute/handlers/handler_workspace_validate.py
          && gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --name-only | grep -Fxq .github/workflows/ci.yml
          && ! gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --name-only | grep -qE '(^|/)(Dockerfile|docker-compose[^/]*|compose[^/]*|deploy|migrations|systemd)(/|$)'
  - id: "dod-occ-self-bind-pr-4196"
    description: >-
      OCC companion self-binding for onex_change_control PR #4196. Verifies the PR is on the expected
      OMN-14633 evidence branch and contains the initial evidence commit 6008cc1d8450ee16b24dd8308143208c23fc9f86.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          OCC_PR_NUMBER=4196; OCC_REPO=OmniNode-ai/onex_change_control; OCC_BRANCH=jonah/omn-14633-occ-infra-2316;
          INITIAL_EVIDENCE_COMMIT=6008cc1d8450ee16b24dd8308143208c23fc9f86; gh api "repos/${OCC_REPO}/pulls/${OCC_PR_NUMBER}"
          --jq '.head.ref == "'$OCC_BRANCH'" and ((.state == "open") or (.state == "closed" and .merged_at
