title: "Declare node_shim_scanner handler routing operation"
summary: >-
  The omnimarket node_shim_scanner COMPUTE contract omitted handler_routing.routing_strategy and handlers[0].operation.
  RuntimeLocal defaults missing routing_strategy to operation_match, then validates every handler entry
  has a non-empty operation, so the shim_audit close-out skill failed closed during RuntimeLocal startup
  before any scan could run. The downstream omnimarket PR adds routing_strategy: operation_match and operation:
  scan to the existing single handler, matching the contract shape used by the other single-handler COMPUTE
  nodes. The fix changes only the contract routing declaration for node_shim_scanner; no handler code,
  model, topic, schema, endpoint, or runtime deployment is changed.
