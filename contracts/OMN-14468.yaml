dod_evidence:
  - id: dod-infra-pr-2274-head-b6a685ed
    description: 'omnibase_infra PR #2274 (RT-8) is bound to head b6a685ed on branch jonah/omn-14468-repair-release-chain
      targeting dev -- the exact tree independently verified.'
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: test "$(gh pr view 2274 --repo OmniNode-ai/omnibase_infra --json headRefName,baseRefName,headRefOid
