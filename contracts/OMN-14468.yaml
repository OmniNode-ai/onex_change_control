title: 'fix(OMN-14468): repair release.yml auto-tag->publish chain (RT-8)'
summary: 'Independent verification (rt7-builder, who implemented RT-7 not RT-8; no self-authored evidence)
  of omnibase_infra PR #2274 at head b6a685ed2482a6c2e245a6b40891848e3f9216e1. Confirmed the 8a root cause
  against live gh (v0.38.0-3 are github-actions[bot] annotated tags with zero release.yml runs -- GITHUB_TOKEN
  recursive-suppression), the fix wires an explicit release.yml workflow_dispatch after the tag push,
  the 8b publish_with_retry wrapper + widened cascade window are present, and the backlog was NOT cut
  (no v0.38.4 tag). 26/26 RT-8 tests passed on an independent run. Two non-blocking SHOULD-FIX findings
  noted on the PR (classify_failure phrasing sensitivity; dispatch not fully effect-asserted); fail-closed
  is preserved in both.'
