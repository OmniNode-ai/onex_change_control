          dev b6a685ed2482a6c2e245a6b40891848e3f9216e1"
  - id: dod-rootcause-bot-tag-token-suppression
    description: 'Root cause confirmed live: v0.38.3 is a github-actions[bot] ANNOTATED tag -- the GITHUB_TOKEN
      recursive-suppression signature. Bot-pushed tags never fired release.yml (on: push: tags), so v0.38.0-v0.38.3
      published nothing while v0.37.2 (lightweight/non-bot) did trigger a release run. This is the diagnosed
      8a root cause, verified against live gh rather than the PR body.'
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: test "$(gh api repos/OmniNode-ai/omnibase_infra/git/tags/$(gh api repos/OmniNode-ai/omnibase_infra/git/refs/tags/v0.38.3
          --jq .object.sha) --jq .tagger.name)" = "github-actions[bot]"
  - id: dod-auto-tag-release-dispatch-wired
    description: 'The load-bearing 8a fix is present at the pinned head: auto-tag-on-merge.yml pushes
      the tag then dispatches release.yml via `gh workflow run` (the documented workflow_dispatch exception
      to GITHUB_TOKEN suppression), replacing the token-pushing reusable.'
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: test "$(gh api "repos/OmniNode-ai/omnibase_infra/contents/.github/workflows/auto-tag-on-merge.yml?ref=b6a685ed2482a6c2e245a6b40891848e3f9216e1"
          --jq .content | base64 -d | grep -c 'gh workflow run release.yml')" -ge 1
  - id: dod-publish-retry-wrapper-present
    description: The 8b publish-resilience wrapper (scripts/ci/publish_with_retry.py) exists at the pinned
      head and is wired into release.yml; it retries transient 5xx (the v0.37.2 500 failure mode) and
      is idempotent on already-published. 26/26 RT-8 tests passed on an independent run.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: test "$(gh api "repos/OmniNode-ai/omnibase_infra/contents/scripts/ci/publish_with_retry.py?ref=b6a685ed2482a6c2e245a6b40891848e3f9216e1"
          --jq .content | base64 -d | grep -c 'def publish_with_retry')" -ge 1
  - id: dod-backlog-not-cut-no-v0-38-4-tag
    description: '8c gated-action guard: the PR repairs the chain but does NOT cut the backlog. No v0.38.4
