---
schema_version: "1.0.0"
ticket_id: "OMN-13703"
title: "feat(OMN-13703): Phase 3a — StructuredLogEntry schema unification + onex.evt.platform.log-entry.v1
  topic registration"
summary: >
  Adds canonical StructuredLogEntry Pydantic model to omnibase_core (frozen, strongly typed, no defensive
  defaults) with artifact_refs, source_system, operation, LogEntryStatus, RedactionState, SuppressionDecision,
  correlation_id, session_id, node_id, and timestamp. Registers onex.evt.platform.log-entry.v1 in the
  topic registry YAML with durability_tier: durable. Aligns omnimarket.StructuredEventLogger to emit schema-valid
  StructuredLogEntry payloads, removing duplicate field definitions from the old ModelLogEntry wire format.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - topics
  - public_api
evidence_requirements:
  - kind: tests
    description: StructuredLogEntry unit tests pass in omnibase_core
    command: "uv run pytest tests/unit/models/logging/test_model_structured_log_entry.py -v"
  - kind: tests
    description: StructuredEventLogger schema-validity tests pass in omnimarket
    command: "uv run pytest tests/test_structured_event_logger_schema.py -v"
  - kind: ci
    description: mypy --strict passes on touched omnibase_core modules
    command: "uv run mypy src/omnibase_core/models/logging/ src/omnibase_core/enums/enum_log_entry_status.py
      src/omnibase_core/enums/enum_redaction_state.py src/omnibase_core/enums/enum_suppression_decision.py
      --strict"
  - kind: ci
    description: mypy --strict passes on omnimarket logging module
    command: "uv run mypy src/omnimarket/logging/ --strict"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-structured-log-entry-model
    description: StructuredLogEntry model exists in omnibase_core with all required fields and enums
    source: manual
    checks:
      - check_type: command
        check_value: "python -c 'from omnibase_core.models.logging.model_structured_log_entry import StructuredLogEntry;
          print(StructuredLogEntry.model_fields.keys())'"
  - id: dod-topic-registry
    description: onex.evt.platform.log-entry.v1 registered in topic_registry.yaml with durability_tier=durable
      and schema_ref
    source: manual
    checks:
      - check_type: command
        check_value: "grep -F 'durability_tier: durable' src/omnibase_core/contracts/topic_registry.yaml
          && grep -F 'onex.evt.platform.log-entry.v1' src/omnibase_core/contracts/topic_registry.yaml"
  - id: dod-unit-tests-green
    description: Unit tests for StructuredLogEntry pass with no live infra
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/unit/models/logging/test_model_structured_log_entry.py -v -m
          unit"
  - id: dod-schema-validity-test-green
    description: StructuredEventLogger emits schema-valid payloads (omnimarket unit test)
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/test_structured_event_logger_schema.py -v -m unit"
  - id: dod-mypy-strict
    description: mypy --strict passes on all touched modules (omnibase_core + omnimarket)
    source: manual
    checks:
      - check_type: command
        check_value: "uv run mypy src/omnibase_core/models/logging/ src/omnibase_core/enums/enum_log_entry_status.py
          src/omnibase_core/enums/enum_redaction_state.py src/omnibase_core/enums/enum_suppression_decision.py
          --strict"
  - id: dod-layering-preserved
    description: StructuredLogEntry in omnibase_core only; omnimarket imports from omnibase_core
    source: manual
    checks:
      - check_type: command
        check_value: "python -c 'from omnibase_core.models.logging import StructuredLogEntry; print(\"layering-ok\")'"
