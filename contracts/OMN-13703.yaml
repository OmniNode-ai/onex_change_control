title: "feat(OMN-13703): Phase 3a — StructuredLogEntry schema unification + onex.evt.platform.log-entry.v1
  topic registration"
summary: >
  Adds canonical StructuredLogEntry Pydantic model to omnibase_core (frozen, strongly typed, no defensive
  defaults) with artifact_refs, source_system, operation, LogEntryStatus, RedactionState, SuppressionDecision,
  correlation_id, session_id, node_id, and timestamp. Registers onex.evt.platform.log-entry.v1 in the
  topic registry YAML with durability_tier: durable. Aligns omnimarket.StructuredEventLogger to emit schema-valid
  StructuredLogEntry payloads, removing duplicate field definitions from the old ModelLogEntry wire format.
