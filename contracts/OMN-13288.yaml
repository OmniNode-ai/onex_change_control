ticket_id: "OMN-13288"
title: "feat(omniclaude): wire runtime-profiles validator gate into omniclaude (Wave C fleet)"
summary: >-
  Wave C of the validator-standardization fleet. Wires the existing runtime-profiles pre-commit + CI gate
  (omnibase_core ValidatorRuntimeProfiles, OMN-12957; enforces runtime_profiles_missing / OMN-9886 on
  command-consuming node contracts) into omniclaude. Of the three Wave-C target repos (omniintelligence,
  omnimemory, omniclaude), omniclaude was the only one still missing the gate; omniintelligence and omnimemory
  were already wired by OMN-13297. Pre-grep recorded ABSENT before wiring. The PR adds the repo-local
  allowlist (scripts/validation/runtime_profiles_allowlist.yaml) baseline-freezing the 111 pre-existing
  command-consuming node contracts that lack runtime_profiles (drain tracked by OMN-12982, no mass-remediation
  — mirrors the proven OMN-13297 / OMN-12955 pattern), the wrapper script (scripts/ci/run_runtime_profiles_validator.py)
  so pre-commit and CI run the identical invocation, the onex-validate-runtime-profiles pre-commit hook,
  and the .github/workflows/validator-runtime-profiles.yml CI gate. Fail-closed proven (verifier=gate
  wrapper, runner=agent): a NEW command-consuming contract missing runtime_profiles and not allowlisted
  exits the wrapper non-zero with the specific 'runtime_profiles missing on command-consuming contract'
  error; reverting it returns the clean tree to exit 0. runtime-profiles is not tracked by the validator-requirements
  meta-gate, so validator-requirements-baseline.yaml is intentionally untouched (the authoritative baseline
  for this gate is the repo-local allowlist).
