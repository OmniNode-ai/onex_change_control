---
schema_version: "1.0.0"
ticket_id: "OMN-14436"
title: "DoD runner executes against the product with a digest-bound grandfather ratchet"
summary: >
  Fixes the DoD contract compliance runner so evidence checks execute against the product workspace under
  test, detects checks that can only observe the OCC contract/receipt store, and binds the legacy grandfather
  ratchet to contract content digests instead of ticket ids.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "The OMN-14436 digest-bound grandfather ratchet test suite passes."
    command: "uv run pytest tests/test_dod_runner_ratchet.py -q"
  - kind: "ci"
    description: "The changed runner, generator, and ratchet tests pass strict mypy."
    command: "uv run mypy --strict scripts/ci/run_contract_compliance_check.py scripts/ci/generate_dod_legacy_allowlist.py
      tests/test_dod_runner_ratchet.py"
  - kind: "ci"
    description: "The changed runner, generator, and ratchet tests pass ruff."
    command: "uv run ruff check scripts/ci/run_contract_compliance_check.py scripts/ci/generate_dod_legacy_allowlist.py
      tests/test_dod_runner_ratchet.py"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-ratchet-tests"
    description: "OMN-14436 digest-bound grandfather ratchet behavior is covered by the focused test suite."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/test_dod_runner_ratchet.py -q"
  - id: "dod-strict-mypy"
    description: "The changed runner, allowlist generator, and ratchet tests pass strict mypy."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run mypy --strict scripts/ci/run_contract_compliance_check.py scripts/ci/generate_dod_legacy_allowlist.py
          tests/test_dod_runner_ratchet.py"
  - id: "dod-ruff"
    description: "The changed runner, allowlist generator, and ratchet tests pass ruff."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run ruff check scripts/ci/run_contract_compliance_check.py scripts/ci/generate_dod_legacy_allowlist.py
          tests/test_dod_runner_ratchet.py"
  - id: "dod-occ-self-pr-4022"
    description: "OCC self-binding receipt for onex_change_control PR #4022."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json number,state,headRefName,headRefOid"
  - id: "dod-verify-14436-digest-binding-present"
    description: >-
      Reads the shipped runner SOURCE (not any receipt) and asserts it carries _contract_digest and _is_inert_check.
      _contract_digest is the LOAD-BEARING fix and the autogen checks do not cover it: a ticket-keyed
      allowlist is a PERMANENT laundering channel, because a fresh circular dod_evidence entry appended
      under an old ticket id would inherit that ticket's exemption forever. Without _contract_digest the
      ratchet is an amnesty, and pytest/mypy/ruff would all still pass. This asserts the mechanism, not
      the PR title. RED DIRECTION PROVEN by execution: the identical command against origin/dev's pre-fix
      runner exits 1 -- neither symbol exists there.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'def _contract_digest' scripts/ci/run_contract_compliance_check.py && grep -q '_is_inert_check'
          scripts/ci/run_contract_compliance_check.py
  - id: "dod-verify-14436-allowlist-fully-digest-bound"
    description: >-
      Asserts EVERY allowlist entry carries a contract digest, by requiring that no non-comment line has
      a single field. A digest-less line is a ticket-keyed exemption and would silently re-open the exact
      hole this ticket closes, so a PARTIAL migration is treated as failure rather than progress. Reads
      the shipped artifact directly. RED DIRECTION PROVEN by execution: the identical command against
      a ticket-only (digest-less) allowlist exits 1.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(grep -vE '^\s*#|^\s*$' scripts/ci/dod_runner_legacy_allowlist.txt | awk 'NF != 2' |
          wc -l | tr -d ' ')" -eq 0 #magic___^_^___line
