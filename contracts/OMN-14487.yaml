dod_evidence:
  - id: "dod-verify-2279-recent-responses-json-adapted"
    description: >-
      Product-observing check against omnibase_infra#2279 head f973c737d1383f31bf3e6146a0ad893801230696.
      Reads handler_wiring.py and the adapter test from the PR head and asserts recent_responses is added
      to the _JSONB_LIST_COLUMNS allowlist, and the test test_sync_db_adapter_json_adapts_recent_responses_list_of_objects
      asserts the adapted param is wrapped in psycopg2.extras.Json. Without the allowlist entry the raw
      list[dict] is handed to psycopg2 un-wrapped and the inference-response projection write crashes
      (can't adapt type 'dict').
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          hw="$(mktemp)" && t="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py?ref=f973c737d1383f31bf3e6146a0ad893801230696"
          --jq .content | base64 -d > "$hw" && gh api "repos/OmniNode-ai/omnibase_infra/contents/tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py?ref=f973c737d1383f31bf3e6146a0ad893801230696"
          --jq .content | base64 -d > "$t" && grep -F -- 'frozenset({"corpus_errors", "recent_responses"})'
          "$hw" && grep -F -- 'def test_sync_db_adapter_json_adapts_recent_responses_list_of_objects'
          "$t" && grep -F -- 'params["recent_responses"], psycopg2.extras.Json' "$t"
  - id: "dod-verify-2279-no-overfire-exact-allowlist"
    description: >-
      Product-observing check against the PR head. Reads handler_wiring.py and asserts the adapter wraps
      a list value in Json ONLY when the column key ends with _json/_jsonb OR is an EXACT member of _JSONB_LIST_COLUMNS
      — an exact-name allowlist, so adding recent_responses cannot affect a differently-named genuine
      Postgres text[] array column (the comment names swarm_runs.models_used as the preserved case). This
      is the no-over-reach guard: the fix is surgically scoped to the one crashing column.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          hw="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py?ref=f973c737d1383f31bf3e6146a0ad893801230696"
          --jq .content | base64 -d > "$hw" && grep -F -- 'str(key).endswith(("_json", "_jsonb"))' "$hw"
          && grep -F -- 'str(key) in _JSONB_LIST_COLUMNS' "$hw" && grep -F -- 'models_used' "$hw"
