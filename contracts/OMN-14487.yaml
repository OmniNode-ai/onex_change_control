---
schema_version: "1.0.0"
ticket_id: "OMN-14487"
title: "OCC companion for omnibase_infra#2279 — JSON-adapt recent_responses (projection dict-adapt crash)"
summary: >
  OCC evidence companion for OmniNode-ai/omnibase_infra#2279 (OMN-14487). The inference-response projection
  write crashed on a psycopg2 dict-adapt: recent_responses is a JSONB array-of-objects column (projection_delegation_inference_response_text,
  CHECK jsonb_typeof(recent_responses)='array') named without a _json/_jsonb suffix, so the SyncPsycopg2Adapter
  handed the raw list[dict] to psycopg2 un-wrapped; psycopg2 could not adapt the inner dicts ("can't adapt
  type 'dict'"), the projection write raised, and — with no dlq_topics on that node's contract — the erroring
  event was silently dropped (live cid a7edc49a on the stability lane). The one-line fix adds recent_responses
  to the _JSONB_LIST_COLUMNS allowlist so it is JSON-adapted. The evidence reads the PR head directly
  and asserts: (1) recent_responses is in the allowlist and the adapter test asserts the value is wrapped
  in psycopg2.extras.Json; (2) the fix does NOT over-fire — the adapter wraps ONLY on the _json/_jsonb
  suffix OR an exact _JSONB_LIST_COLUMNS member, so a genuine Postgres text[] array column (e.g. swarm_runs.models_used)
  is preserved un-wrapped. Independently verified: reverting the recent_responses allowlist entry makes
  the adapter test go RED (assert isinstance(params["recent_responses"], psycopg2.extras.Json) fails on
  the raw list[dict] — the un-adaptable live-crash path); GREEN at head (31 passed); the text[]-preservation
  test still passes.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra#2279 head JSON-adapts recent_responses via the _JSONB_LIST_COLUMNS allowlist
      without over-firing on text[] columns."
    command: "see dod_evidence check_values"
emergency_bypass:
  enabled: false
  justification: ""
