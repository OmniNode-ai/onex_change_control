schema_version: "1.0.0"
ticket_id: "OMN-13109"
title: "Runner-fleet monitor: silent-wedge + crash-loop detection"
summary: >
  Adds silent-wedge and crash-loop-on-restart detection to docker/runners/runner-monitor.sh. The legacy
  monitor only checked container Up(healthy) + runner online, both of which stay TRUE for a silently-wedged
  runner (live Runner.Listener, connected long-poll, but not pulling queued jobs). The fix cross-references
  the GitHub runner busy field against the oldest queued job age for watched self-hosted labels (online
  + busy=0 while a job has been queued past WEDGE_QUEUE_AGE_SECONDS => wedged) and flags crash-loops via
  climbing RestartCount or repeated entrypoint re-registration log markers. Both fire Slack alerts with
  a SAFE remediation recipe (force-recreate of named services only, freshly minted token, detached, hard
  time limit; NEVER docker restart, NEVER an empty service filter). Auto-bounce is gated OFF by default
  — the script stays observe-and-alert. Write + test + PR-only: the live .201 fleet was read-only inspected
  and the new script was NOT deployed to the live monitor.
