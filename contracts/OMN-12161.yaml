title: "Fix NotImplementedError runtime bomb in omnimarket executor"
summary: >
  Central OCC evidence for onex-self-extending-agent PR #133, which makes _TierCallable
  properly abstract (ABC + @abstractmethod) to catch missing __call__ implementation at
  class instantiation rather than call time, and converts _run_live() NotImplementedError
  to a clean sys.exit(2) with actionable error message. Adds unit tests for both fixes.
