---
schema_version: "1.0.0"
ticket_id: "OMN-13589"
title: "Route runtime_sweep CI gate through canonical node_runtime_sweep; delete freestanding script"
summary: >-
  omnimarket CI ran a 184-line freestanding imperative script (scripts/ci/run_runtime_sweep.py --import-check)
  that self-described as "the entry-point validation subset of runtime_sweep" yet bypassed the canonical
  COMPUTE node it claimed to be a subset of — architectural drift against the everything-is-nodes / contract-native
  doctrine. The omnimarket product PR #1397 absorbs the single-repo "do the entry points load?" import
  probe into the canonical node_runtime_sweep, splitting facts from decisions: the harness (the I/O boundary,
  __main__.collect_entry_point_probes) walks this repo's pyproject [project.entry-points."onex.nodes"],
  runs the structural + import checks per node, and emits one typed ModelEntryPointProbe each; the PURE
  NodeRuntimeSweep handler turns ok=False probes into BROKEN_ENTRY_POINT findings via a new REGISTRATION
  phase. RuntimeSweepRequest gains entry_point_probes and an enabled_checks selector (None = all phases
  run exactly as before, so existing cross-repo / skill callers are byte-for-byte unaffected); the single-repo
  CI request scopes to enabled_checks=[REGISTRATION] so the cross-repo symmetry / durability / stranded-workflow
  / profile-consumer phases cannot false-positive in a single-repo checkout. ci.yml now invokes 'uv run
  python -m omnimarket.nodes.node_runtime_sweep --import-check'; the freestanding script is DELETED (no
  shim, no re-export). Frozen historical DoD/OCC receipts under docs/work-tracking/contracts/ are intentionally
  left untouched. This OCC contract is the Receipt-Gate Evidence-Source the omnimarket product PR cites.
  No runtime deploy in this scope.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "events"
evidence_requirements:
  - kind: "tests"
    description: >-
      Migrated CI-helper tests (collect_entry_point_probes structural/import probes + probe->BROKEN_ENTRY_POINT
      finding) and extended runtime-sweep golden chain (REGISTRATION phase; registration-only scope suppresses
      symmetry/description; default None runs all phases).
    command: "uv run pytest tests/ci/test_runtime_sweep_import_check.py tests/test_golden_chain_runtime_sweep.py
      -q -m 'not kafka'"
  - kind: "ci"
    description: >-
      Full suite green (no -k); mypy --strict clean; ruff clean; pre-commit --all-files clean (incl. Node
      Purity Gate, OMN-13283); the rewired runtime-sweep gate proves itself in CI; gate proven both ways
      (clean exit 0 / broken exit 1 with BROKEN_ENTRY_POINT).
    command: "uv run python -m omnimarket.nodes.node_runtime_sweep --import-check"
