---
schema_version: "1.0.0"
ticket_id: "OMN-13716"
title: "Fix sweep input-default gaps: shim_audit paths Field required + doc_freshness_sweep hang"
summary: >-
  Two COMPUTE sweep nodes whose no-arg invocations were broken: (a) shim_audit: ModelShimScanRequest.paths
  had no default, so `onex skill shim_audit` (no-arg) raised ValidationError paths Field required. Fixed:
  paths defaults to None; handler resolves workspace repo src/ dirs from OMNI_HOME (matching DocFreshnessSweepRequest.omni_home
  pattern). (b) doc_freshness_sweep: no-scope full-repo scan hung >9min because scanning all default repos
  via resolve_references was unbounded. Fixed: DocFreshnessSweepRequest gains per_repo_timeout_s (default
  30s); each repo is scanned in a ThreadPoolExecutor thread; timed-out repos are skipped with a warning
  and the scan completes in bounded time. Both fixes are in the node input model / handler layer only.
  No skill_mapping.yaml change, no new topics, no interface seam change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
