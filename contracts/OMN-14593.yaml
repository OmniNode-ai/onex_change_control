      it exits 0 only at #1759's head where the test is present.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/tests/test_omn14593_raw_kafka_wrapper_recovery.py?ref=dfcc88a4a175936db4174686f5b99d7a509f65b2"
          --jq .content | base64 -d | grep -c "test_pre_fix_reproduction_would_have_raised_pydantic_validation_error")"
