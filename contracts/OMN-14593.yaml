  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1759-raw-wrapper-recovery"
    description: >-
      Product-observing: reads the actual source of handler_projection_registration.py at #1759's exact
      head commit SHA (dfcc88a4a175936db4174686f5b99d7a509f65b2) via the GitHub contents API and asserts
      the handler genuinely defines/calls _recover_domain_payload_from_raw_wrapper — the recovery routine
      that pulls the real domain event out of the raw ModelEventMessage 'value' field, which is the entire
      substance of the data-loss fix (previously the raw shape reached the canonical model and raised
      ValidationError, then was dropped with no DLQ). This reads the product tree, not this receipt; nothing
      in the command touches the OCC checkout, so it cannot pass merely because someone wrote "status:
      PASS" in a receipt. RED DIRECTION: the identical command run against omnimarket dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22
      — the fix commit's parent), where #1759 has not landed, finds ZERO occurrences (grep -c == 0) and
      exits 1. It exits 0 only at a ref where the fix is genuinely present (head SHA: grep -c == 2).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_projection_registration.py?ref=dfcc88a4a175936db4174686f5b99d7a509f65b2"
          --jq .content | base64 -d | grep -c "_recover_domain_payload_from_raw_wrapper")" -ge 1
  - id: "dod-verify-1759-raw-wrapper-detection"
    description: >-
      Product-observing: reads the actual source of handler_projection_registration.py at #1759's head
      commit SHA and asserts it carries _looks_like_raw_kafka_wrapper — the shape-detection predicate
      (topic+partition+value present and domain node_id absent) that gates the recovery path. Its presence
      is a direct read of the fix's detection seam rather than a restatement of the PR's claim. RED DIRECTION:
      the same file at dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22) contains ZERO occurrences (grep
      -c == 0) and the command exits 1; it exits 0 only at #1759's head (grep -c == 3).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_projection_registration.py?ref=dfcc88a4a175936db4174686f5b99d7a509f65b2"
          --jq .content | base64 -d | grep -c "_looks_like_raw_kafka_wrapper")" -ge 1
  - id: "dod-verify-1759-dlq-topic-declared"
