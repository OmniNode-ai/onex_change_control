schema_version: "1.0.0"
ticket_id: "OMN-14593"
title: "OCC companion for omnimarket#1759 — node_projection_registration raw-kafka-wrapper recovery"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1759 (OMN-14593). #1759 stops node_projection_registration
  from silently dropping node-introspection / node-heartbeat / node-state-change events. Root cause: the
  shared MessageDispatchEngine fans a single dispatch(topic, envelope) call out to EVERY dispatcher registered
  for that topic, not just the consumer group whose callback made the call. Those three topics are ALSO
  subscribed by a sibling raw/audit consumer whose callback builds its envelope as payload=ModelEventMessage.model_dump(mode="json")
  (the undecoded kafka record — topic/key/value/headers/offset/partition), and its dispatch() reaches
  this typed projection handler too, handing it the raw wrapper instead of the decoded domain event. That
  is a guaranteed ValidationError against the extra="forbid" canonical models (missing node_id/...; extra
  topic/partition/value), and with no dlq_topics declared the wiring layer logged "... dropped a malformed/erroring
  event with NO DLQ topic declared" and dropped it forever. The fix (a) detects the raw ModelEventMessage
  shape in the handler and recovers the real domain event from its value field before validating, and
  (b) declares event_bus.dlq_topics so any unrecoverable shape is durably routed instead of dropped. Every
  substantive check below is a CONTENT READ pinned to #1759's head commit SHA (dfcc88a4a175936db4174686f5b99d7a509f65b2).
  It observes the source code #1759 actually wrote, so it does not depend on #1759's CI — which matters
  here because #1759's CI is red precisely BECAUSE this contract was missing (occ-preflight/eligibility
  -> missing Evidence-Source, cascading into the OCC Preflight Dependency and gate jobs). A check keyed
  on #1759's CI would be circular. No check greps this repo's own receipt corpus for "status: PASS". The
  RED direction of every read was verified independently: an implementer-blind reviewer added a worktree
  off the PR head, reverted ONLY the two source hunks (handler + contract.yaml, test file untouched),
  and observed 3 of the 5 regression tests fail with the exact "10 validation errors for ModelNodeIntrospectionEvent"
  drop the ticket describes; restoring the fix returned 5/5 green. Each product-tree read below carries
  its own RED control: the same command at omnimarket dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22,
  the fix commit's exact parent), where the fix has not landed, finds zero occurrences and would fail.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnimarket#1759 head SHA carries the raw-kafka-wrapper recovery + DLQ-route fix"
    command: "see dod_evidence check_values (content reads pinned to dfcc88a4)"
emergency_bypass:
