      RED DIRECTION: the same contract at dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22) declares
      NO such topic (grep -c == 0) and the command exits 1; it exits 0 only at #1759's head (grep -c ==
      1).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/contract.yaml?ref=dfcc88a4a175936db4174686f5b99d7a509f65b2"
          --jq .content | base64 -d | grep -c "onex.dlq.omnimarket.projection-registration-malformed.v1")"
