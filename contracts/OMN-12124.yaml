schema_version: "1.0.0"
ticket_id: "OMN-12124"
title: "Clean error on invalid ADK API key"
summary: >
  ADK authentication errors during client init or runner iteration previously surfaced as 100-line tracebacks.
  Fix adds _is_adk_auth_error() helper in src/__main__.py that checks for google.auth.exceptions.GoogleAuthError,
  google.api_core.exceptions.Unauthenticated, and google.api_core.exceptions.PermissionDenied, wraps InMemoryRunner
  init and runner.run() iteration in targeted try/except blocks, and on auth failure prints a clean one-line
  error message and exits with code 1. Non-auth exceptions are re-raised unchanged. 12 new unit tests
  cover all auth-error paths. Follow-up PR #138 also removes a duplicate response-handling branch that blocked
  strict mypy on the rebased head and carries the live local model registry/pricing refresh on the existing
  OMN-12124 branch.
