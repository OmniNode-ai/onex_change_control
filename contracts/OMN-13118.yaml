      the runtime waited for each trial's terminal across TWO topics (node-generation-completed.v1 + node-generation-failed.v1)
      using ONE ephemeral group_id=None AIOKafkaConsumer assigned BOTH topics' partitions. A single aiokafka
      consumer holds ONE manual subscription; the live log captured the alternating 'Updating subscribed
      topics' flip and a clean 1:1 cid pairing — the COMPLETED delivery window collapsed before surfacing
      the correlated record. Fix (service_pattern_b_broker.py): RuntimePatternBBroker._dispatch_and_wait_with_direct_kafka_consumer
      now opens ONE INDEPENDENT consumer per terminal topic via open_direct_terminal_consumer (each assigned
      + offset-pinned at open() BEFORE publish) and awaits them CONCURRENTLY via asyncio.wait(FIRST_COMPLETED)
