title: "fix(runtime): terminal-consumer consume-leg wedges under sustained multi-trial battery load (post-OMN-13012)"
summary: >-
  SIXTH distinct defect on the context-ROI experiment runtime consume leg, load-dependent and surfacing
  only AFTER OMN-13012 (omnibase_infra PR #1969) closed the metadata-no-op assign race. OMN-13012 made
  the narrow K>=2/single-task probe pass, but the full Exp 1 battery (K=10 x 8 tasks = 160 calls) STILL
  WEDGED on the stability REBUILD-3 image (revision 7aa998bf7dd4): per-trial the COMPLETED-topic terminal
  consumer never correlated; the runner logged 'wait failed ... topic=node-generation-failed.v1' with
  an EMPTY exception every ~30s; context-roi-run-completed watermark FROZEN; node-generation-failed HWM
  0; zero non-degenerate rows. Independently verifier-confirmed HALT_CONFIRMED (HALT_VERIFIER_SIGNOFF.md).
  Root cause (omnibase_infra runtime, NOT the omnimarket handler — handler confirmed correct by the prior
  two-strike diagnosis): HandlerContextRoiRunner opens ONE ephemeral group_id=None terminal consumer PER
  terminal topic BEFORE publishing each generation command (subscribe-before-publish, OMN-13012/13038),
  serially. The FAILED reply topic (onex.evt.omnimarket.node-generation-failed.v1) is only produced to
  on contract_passed=False; in a battery where generations pass it has ZERO messages, so Redpanda (auto-create
  on first produce) never advertises any partition for it. service_pattern_b_broker._assign_direct_terminal_partitions
  then spins forcing metadata refreshes until the full 30s _DIRECT_TERMINAL_ASSIGN_TIMEOUT_CAP_SECONDS
  cap and raises a bare TimeoutError (the empty-message 'wait failed'). Because that open is INLINE in
  the per-trial pre-publish phase, EVERY trial blocks ~30s on the partition-less FAILED open before it
  can correlate the COMPLETED terminal — a 160-trial battery needs >80 min and never completes in window.
  Fix: a partition-less reply topic is a VALID steady state, not a 30s error. _assign_direct_terminal_partitions
  now gives a bounded grace window (_DIRECT_TERMINAL_PARTITIONLESS_GRACE_SECONDS) for a topic that exists
  but is slow to surface metadata; after it, the broker's answer is taken as authoritative — assign whatever
  partitions exist (possibly none) and return promptly instead of burning the cap and raising. A consumer
  with an empty assignment is positioned (seek_to_end is a no-op) and poll_direct_terminal_consumer treats
  it as 'no terminal will arrive here' (sleeps out its own timeout, returns None) WITHOUT calling getone()
  on an unassigned consumer (which would raise IllegalStateError). The COMPLETED-topic session, opened
  separately and assigned its real partition, wins the cross-topic race and correlates fast.
