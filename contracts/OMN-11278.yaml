title: "Create node_session_phase_evaluator (COMPUTE) in omnimarket"
summary: >
  Pure deterministic COMPUTE node that evaluates session phase exit conditions and budget status. Receives
  ModelPhaseEvaluationRequest (phase_name, max_duration_minutes, elapsed_minutes, exit_condition_statuses,
  halt_threshold_pct) and returns ModelPhaseEvaluation with action (no_action | budget_warning | transition_required
  | halt_required), reason, next_phase, and budget_elapsed_pct. No I/O, no side effects, no env reads,
  no network calls.
