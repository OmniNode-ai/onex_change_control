      used by prior merged evidence companions (e.g. OMN-14600 / OCC#4134, OMN-14593 / OCC#4131, OMN-14608
      / OCC#4135, OMN-14587 / OCC#4136).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-14586/dod-occ-self-bind-pr-1757-companion/command.yaml
