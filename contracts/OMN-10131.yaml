---
schema_version: "1.0.0"
ticket_id: OMN-10131
title: "Add consecutive-failure alerting policy to watchdog scheduler"
summary: "Central receipt contract for the omnimarket process watchdog consecutive failure alerting policy
  delivered in omnimarket PR #504."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Consecutive failure alert policy unit tests pass"
    command: "test -f drift/dod_receipts/OMN-10131/dod-consecutive-failure-tests/command.yaml && grep
      -q '^status: PASS$' drift/dod_receipts/OMN-10131/dod-consecutive-failure-tests/command.yaml && grep
      -q '4 passed' drift/dod_receipts/OMN-10131/dod-consecutive-failure-tests/command.yaml"
  - kind: "manual"
    description: "Full node_process_watchdog unit suite passes"
    command: "test -f drift/dod_receipts/OMN-10131/dod-watchdog-tests/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10131/dod-watchdog-tests/command.yaml && grep -q '55 passed' drift/dod_receipts/OMN-10131/dod-watchdog-tests/command.yaml"
  - kind: "manual"
    description: "Process watchdog golden-chain tests pass"
    command: "test -f drift/dod_receipts/OMN-10131/dod-golden-chain-tests/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10131/dod-golden-chain-tests/command.yaml && grep -q '10 passed' drift/dod_receipts/OMN-10131/dod-golden-chain-tests/command.yaml"
  - kind: "manual"
    description: "Touched watchdog alerting paths pass lint and format checks"
    command: "test -f drift/dod_receipts/OMN-10131/dod-lint-format/command.yaml && grep -q '^status: PASS$'
      drift/dod_receipts/OMN-10131/dod-lint-format/command.yaml && grep -q 'All checks passed!' drift/dod_receipts/OMN-10131/dod-lint-format/command.yaml
      && grep -q 'already formatted' drift/dod_receipts/OMN-10131/dod-lint-format/command.yaml"
  - kind: "manual"
    description: "Repo-local contract YAML parses"
    command: "test -f drift/dod_receipts/OMN-10131/dod-contract-parse/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10131/dod-contract-parse/command.yaml && grep -q 'contracts/OMN-10131.yaml'
      drift/dod_receipts/OMN-10131/dod-contract-parse/command.yaml"
  - kind: "manual"
    description: "Process watchdog handler passes mypy"
    command: "test -f drift/dod_receipts/OMN-10131/dod-mypy/command.yaml && grep -q '^status: PASS$' drift/dod_receipts/OMN-10131/dod-mypy/command.yaml"
  - kind: "manual"
    description: "Full pre-commit hooks pass with OMNIBASE_INFRA_PATH set"
    command: "test -f drift/dod_receipts/OMN-10131/dod-precommit/command.yaml && grep -q '^status: PASS$'
      drift/dod_receipts/OMN-10131/dod-precommit/command.yaml && grep -q 'normalization-symmetry.*Passed'
      drift/dod_receipts/OMN-10131/dod-precommit/command.yaml"
emergency_bypass:
