schema_version: "1.0.0"
ticket_id: "OMN-13403"
title: "Workspace sibling-pin guard: allow same-version clone-ahead"
summary: >-
  Make the workspace-mode sibling-pin guard (omnibase_infra scripts/runtime_build/check_sibling_lock_pins.py,
  invoked by stage_workspace.sh) treat a same-version, strictly clone-AHEAD (git-descendant) sibling as
  a non-fatal clone_ahead note instead of fatal drift. onex_change_control is a real omnimarket runtime
  dep AND a checked sibling whose dev SHA advances on every receipt PR (including the receipts pin-bump
  PRs require), so an exact OCC pin can never durably converge — re-locking is unwinnable. compare_pins
  now applies a narrow, version-gated exception: when the clone version EXACTLY matches the lock and the
  clone HEAD is a strict git DESCENDANT of the locked SHA (proven via git merge-base --is-ancestor against
  the actual clone), the SHA difference is recorded, non-fatal, and the build proceeds. Everything else
  stays FATAL: version mismatch (any direction), clone BEHIND the lock (the 2026-06-11 stale-sibling crash),
  unrelated/non-ancestor SHAs, and a locked SHA absent from the clone. The ALLOW_SIBLING_PIN_DRIFT escape
  hatch is unchanged. Shipped on omnibase_infra PR #2055.
