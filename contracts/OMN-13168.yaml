title: "OMN-13168 — evidence-pipeline correlation-traces report EMPTY not DEGRADED for filtered no-match"
summary: >-
  The /v1/evidence-pipeline/correlation-traces endpoint serves only the OCC/deployment evidence-pipeline
  projection (onex.snapshot.projection.evidence_pipeline.correlations.v1). During the 2026-06-16 night
  autonomous runtime matrix it was probed with fresh delegation correlation IDs, which legitimately have
  zero rows there, and returned freshness_state=DEGRADED + row_count=0 — falsely signalling a broken projection.
  Delegation correlation traces are authoritative on onex.snapshot.projection.delegation.correlation-trace.v1
  (OMN-12748), read by the dashboard via /projection/{topic}. Fix (omnimarket PR #1245): a content-filtered
  (correlation_id/ticket_id/repo/ pr_number) query that matches zero rows on a healthy projection now
  reports freshness_state=EMPTY, and every evidence-pipeline response carries query_scope=evidence_pipeline
  + authoritative_correlation_source pointing at the delegation correlation-trace topic. DEGRADED stays
  reserved for genuine staleness / upstream failure. Two TDD regression tests added.
