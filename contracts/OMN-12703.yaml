---
schema_version: "1.0.0"
ticket_id: "OMN-12703"
title: "Wire ModelMechanicalCheck execution in task.execute to node_verification_receipt_generator"
summary: >-
  Central evidence that omnimarket PR #1045 lands Phase 3 of the generic task.execute route. task.execute
  PLANS mechanical DoD checks and dispatches them to node_verification_receipt_generator (the EXECUTION
  authority); it never executes a check itself and aggregates the returned receipt UNCHANGED, deriving
  terminal status from overall_pass. The verification node gains a mechanical-checks dimension that executes
  the four EnumCheckType checks (command_exit_0/file_exists/grep_present/grep_absent) via an injectable
  MechanicalCheckRunner. Verification receipt models graduated to omnimarket.events.verification so no
  new cross-node model reach-in is introduced; no new envelope and no new DoD model are added.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
