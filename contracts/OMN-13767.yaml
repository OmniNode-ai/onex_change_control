---
schema_version: '1.0.0'
ticket_id: OMN-13767
title: "fix(OMN-13767): remove stale omnidash Dockerfile paths breaking ECR build"
summary: >
  docker/omnidash/Dockerfile (omninode_infra) still built/copied scripts/run-migrations.ts, migrations/,
  and demo/recordings — none of which exist on OmniNode-ai/omnidash main anymore (dropped in the composable-widget
  Vite/React rewrite). This broke every push/main build-and-push-omnidash.yml run. The originally-reported
  one-line fix (leading "./" on the esbuild entry point) was confirmed insufficient — the entry point
  file itself is gone, not just its specifier form. Fix removes the stale build/copy steps from the Dockerfile
  and the corresponding stale run-migrations initContainer from k8s/onex-dev/omnidash/deployment.yaml
  (which pulls the floating omnidash:dev tag and would otherwise crash-loop on the next pod restart once
  the fixed image ships). k8s/onex-prod/omnidash/deployment.yaml is digest-pinned to a pre-rewrite image
  and is intentionally left untouched; k8s/dev/omnidash/migrate-job.yaml (OMN-2727, drizzle-kit) is also
  stale but not wired into any Deployment rollout — both flagged as follow-up in the ticket rather than
  fixed in this PR.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: >
      docker/omnidash/Dockerfile no longer builds scripts/run-migrations.ts or copies demo/recordings
      or migrations/ — all three 404 on omnidash main.
    command: >
      grep -c "entryPoints:\['scripts/run-migrations.ts'\]\|COPY --from=builder --chown=appuser:appgroup
      /app/demo/recordings\|COPY --from=builder --chown=appuser:appgroup /app/migrations " docker/omnidash/Dockerfile
  - kind: ci
    description: >
      k8s/onex-dev/omnidash/deployment.yaml no longer wires the run-migrations initContainer.
    command: >
      grep -c '^\s*command: \["node", "dist/run-migrations.js"\]\|^\s*- name: run-migrations$' k8s/onex-dev/omnidash/deployment.yaml
