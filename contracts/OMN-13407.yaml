schema_version: "1.0.0"
ticket_id: "OMN-13407"
title: "feat(OMN-13407): carry delegation context_pack_hash through wire models and projections"
summary: >-
  Phase B SEA dogfood W5 context ON/OFF diagnostic reproduced the missing context propagation defect:
  ModelDelegationRequest and downstream task-delegated/projection surfaces had no authoritative context_pack_hash
  field, so the system could not correlate context-enabled delegation output with the input context pack.
  The fix is a two-PR chain. omnibase_core PR #1299 adds context_pack and context_pack_hash to ModelDelegationRequest
  and context_pack_hash to ModelTaskDelegatedEvent, with focused wire-model tests proving both default-off
  and populated-hash behavior. omnimarket PR #1335 consumes the canonical fields through the event-bus
  workflow, injects context_pack into inference prompts, carries context_pack_hash on task-delegated events,
  persists it in delegation_events, and exposes it through the projection contract. No bespoke REST endpoint
  is introduced.
