        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12927/dod-remote-head/command.yaml
          && grep -q '8d840ed5317c14e4ce8f71844bfa3f57adfbf807' drift/dod_receipts/OMN-12927/dod-remote-head/command.yaml"
  - id: "dod-compose-services-healthy"
    description: "Judge-named compose services on .201 were healthy after isolated recreate."
    source: "manual"
