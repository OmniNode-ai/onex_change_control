          && grep -q 'runtime_attached=true' drift/dod_receipts/OMN-12927/dod-runtime-health/command.yaml"
  - id: "dod-event-bus-proof"
    description: "The judge Redpanda broker hosted the full contract topic catalog and stable consumer
