      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12927/dod-compose-services-healthy/command.yaml
          && grep -q 'omninode-judge-runtime.*healthy' drift/dod_receipts/OMN-12927/dod-compose-services-healthy/command.yaml"
  - id: "dod-runtime-health"
    description: "Main runtime, runtime-effects, and projection API health probes passed in the judge
