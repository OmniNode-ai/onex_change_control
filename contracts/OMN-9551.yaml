---
schema_version: "1.0.0"
ticket_id: OMN-9551
title: "Runtime crash loop fix: boot grace and topic-error handling"
summary: "Central OCC evidence for omnibase_infra PR #1393, covering the runtime crash-loop source fix
  and CI/PR proof surfaces without claiming live restart-count validation."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "PR #1393 body records focused service-runtime-health-monitor unit test evidence."
    command: "uv run pytest tests/unit/services/test_service_runtime_health_monitor.py -v"
  - kind: tests
    description: "PR #1393 body records focused event-bus unit test evidence."
    command: "uv run pytest tests/unit/event_bus/ -v"
  - kind: tests
    description: "PR #1393 adds an integration test for the boot-grace plus topic-error circuit-breaker
      contract."
    command: "uv run pytest tests/integration/test_runtime_crash_loop_fix.py -v"
  - kind: ci
    description: "PR #1393 CI/build checks are the authoritative automated evidence for the downstream
      branch; Receipt Gate was the known central OCC evidence blocker."
    command: "gh pr checks 1393 --repo OmniNode-ai/omnibase_infra"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: "omnibase_infra PR #1393 title/body identify OMN-9551, the crash-loop root cause, and
      the source-level test plan; this does not prove live runtime RestartCount."
    source: manual
    checks:
      - check_type: command
        check_value: >-
          pr="$(gh pr view ${PR_NUMBER} --repo ${REPO} --json title,body,baseRefName,headRefName --jq
          'select(.baseRefName=="main") | (.title + "\n" + .headRefName + "\n" + .body)')" && printf '%s'
          "$pr" | grep -q 'OMN-9551' && printf '%s' "$pr" | grep -q 'Root Cause' && printf '%s' "$pr"
          | grep -q 'Test Plan'
  - id: dod-002
    description: "PR #1393 diff adds ServiceRuntimeHealthMonitor boot_grace_seconds suppression and TestBootGracePeriod
      coverage."
    source: manual
    checks:
      - check_type: command
        check_value: >-
          diff="$(gh pr diff ${PR_NUMBER} --repo ${REPO})" && printf '%s' "$diff" | grep -q 'boot_grace_seconds'
          && printf '%s' "$diff" | grep -q 'suppressing emit during boot grace' && printf '%s' "$diff"
          | grep -q 'TestBootGracePeriod'
  - id: dod-003
    description: "PR #1393 diff catches UnknownTopicOrPartitionError before KafkaError, raises ProtocolConfigurationError,
      and adds circuit-breaker regression tests."
    source: manual
    checks:
      - check_type: command
        check_value: >-
          diff="$(gh pr diff ${PR_NUMBER} --repo ${REPO})" && unknown_line="$(printf '%s' "$diff" | awk
          '/^\+.*except UnknownTopicOrPartitionError/{print NR; exit}')" && kafka_line="$(printf '%s'
          "$diff" | awk '/^\+.*except KafkaError/{print NR; exit}')" && test -n "$unknown_line" && test
          -n "$kafka_line" && test "$unknown_line" -lt "$kafka_line" && printf '%s' "$diff" | grep -q
          'ProtocolConfigurationError' && printf '%s' "$diff" | grep -q 'test_unknown_topic_does_not_trip_circuit_breaker'
  - id: dod-004
    description: "PR #1393 diff wires RUNTIME_HEALTH_BOOT_GRACE_SECONDS through ServiceKernel to ServiceRuntimeHealthMonitor."
    source: manual
    checks:
      - check_type: command
        check_value: >-
          diff="$(gh pr diff ${PR_NUMBER} --repo ${REPO})" && printf '%s' "$diff" | grep -q 'RUNTIME_HEALTH_BOOT_GRACE_SECONDS'
          && printf '%s' "$diff" | grep -q '_health_boot_grace' && printf '%s' "$diff" | grep -q 'boot_grace_seconds=_health_boot_grace'
  - id: dod-005
    description: "PR #1393 diff adds tests/integration/test_runtime_crash_loop_fix.py to prove the source-level
      boot-grace/topic-error contract; live container restart-count validation remains unclaimed."
    source: manual
    checks:
      - check_type: command
        check_value: >-
          diff="$(gh pr diff ${PR_NUMBER} --repo ${REPO})" && printf '%s' "$diff" | grep -q 'diff --git
          a/tests/integration/test_runtime_crash_loop_fix.py' && printf '%s' "$diff" | grep -q 'OMN-9551:
          parent' && printf '%s' "$diff" | grep -q 'test_unknown_topic_does_not_open_circuit_for_subsequent_healthy_publish'
