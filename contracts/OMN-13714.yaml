schema_version: "1.0.0"
ticket_id: "OMN-13714"
title: "fix(OMN-13714): await handle_onboarding coroutine directly in HandlerOnboarding"
summary: >
  OCC receipt for OMN-13714, resolved in omnimarket PR #1511 on branch jonah/omn-13714-bug-node_onboarding-calls-asynciorun-inside-a-running-event.
  HandlerOnboarding.handle() was synchronous and called asyncio.run(handle_onboarding(input_model)). RuntimeLocal
  runs the LocalRuntimeBusAdapter inside an async event loop, so asyncio.run() inside it raises RuntimeError.
  The fix makes handle() async and awaits handle_onboarding(input_model) directly. The runtime adapter
  already handles awaitable return values via inspect.isawaitable(). The proof is local/in-memory only;
  no live runtime mutation or .201 action was performed.
