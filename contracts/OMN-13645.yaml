schema_version: "1.0.0"
ticket_id: "OMN-13645"
title: "Context-ROI terminal-topic flip — project failed roi-runs (un-wedge the experiment battery)"
summary: >-
  Track C Deliverable 1. node_context_roi_runner declared BOTH terminals in its contract publish_topics
  (onex.evt.omnimarket.context-roi-run-completed.v1 AND onex.evt.omnimarket.context-roi-run-failed.v1)
  but _emit_result only ever published to the completed topic, and node_projection_context_roi subscribed
  ONLY to the completed terminal — so a fully-failed roi-run was never materialised into context_roi_scores
  and the N-arm experiment battery wedged with zero usable rows for failed runs. This change makes the
  declared failed terminal real and consumes it: (1) the runner routes a whole-run failure (failed_trials
  == total_trials, or zero cells) to the FAILED terminal and an at-least-one-usable-row run to the COMPLETED
  terminal — both carry the same ModelContextRoiRunResult payload; (2) node_projection_context_roi subscribes
  to BOTH terminals so a failed run materialises rows (final_success=False / failure_stage) through the
  same terminal-agnostic projection path (mirrors node_projection_delegation which already folds completed
  + failed delegation/generation terminals through one operation_match handler). Topics stay contract-sourced;
  no Plugin*, no new REST, event-bus is the transport. Dev lane only; redeploy is a separate serialized
  step. Deliverable 2 (feedback publisher to context-roi-runtime-row-scored.v1) is split out as a documented,
  blocked follow-up: the consumer needs a per-capsule ModelScoredRuntimeRow the arm-level ROI scores do
  not carry and no materialised pack->capsule membership exists, so D2 is blocked on a materialisation
  seam that overlaps OMN-13647. Product PR: omnimarket #1456.
