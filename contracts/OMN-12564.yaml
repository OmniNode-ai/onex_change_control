ticket_id: "OMN-12564"
title: "ci: add versioned host-local CI dependency environment canary for omnibase_infra"
summary: >-
  Adds the omnibase_infra canary for immutable host-local CI dependency environments under /home/runner/.cache/omni/ci-envs/omnibase_infra/<digest>.
  Trusted CI jobs build/reuse the digest environment under a lock, expose it through a checkout-local
  .venv symlink for existing uv run commands, consume it with UV_NO_SYNC=1 and PYTHONPATH=<checkout>/src,
  and leave public fork PRs on isolated setup. This removes repeated dependency resolution from ordinary
  CI jobs while keeping checked-out PR source authoritative.
