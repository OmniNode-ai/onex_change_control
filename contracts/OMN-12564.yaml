schema_version: "1.0.0"
ticket_id: "OMN-12564"
title: "ci: add versioned host-local CI dependency environment canary for omnibase_infra"
summary: >-
  Adds the omnibase_infra canary for immutable host-local CI dependency environments under /home/runner/.cache/omni/ci-envs/omnibase_infra/<digest>.
  Trusted read-only CI jobs build/reuse the digest environment under a lock, expose it through a checkout-local
  .venv symlink and runner-temp uv wrapper for existing uv run commands, consume it with UV_NO_SYNC=1
  and PYTHONPATH=<checkout>/src, and leave public fork PRs plus env-mutating jobs on isolated setup. This
  removes repeated dependency resolution from ordinary CI jobs while keeping checked-out PR source authoritative.
  Shared env builds use bounded retries for transient git and wheel fetch failures, and runner-temp package
  metadata exposes checkout entry points without mutating the shared venv. The follow-up cache-save fix
  disables setup-uv cache upload for the direct OCC contract-compliance job because that job runs uv sync
  --no-cache and merge-group CI proved the post-job cache upload can cancel after the actual validation
  work succeeds.
