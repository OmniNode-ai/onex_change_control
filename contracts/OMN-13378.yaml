      dev redpanda via 'rpk topic produce' was consumed (consumer group lag 0) but DLQ-routed by the running
      dev runtime ('No dispatcher found for message type omnimarket.node-generation-requested' — OMN-12525
      routing-divergence class, independent of this test fix). No prod/judge/stability lane mutation.
      The receipt check_value carries the 'rpk topic produce' / 'docker exec' deploy keyword for the deploy-gate.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13378/dod-deploy-assessment/command.yaml
          && grep -q '^pr_number: 1306$' drift/dod_receipts/OMN-13378/dod-deploy-assessment/command.yaml
          && grep -q 'rpk topic produce' drift/dod_receipts/OMN-13378/dod-deploy-assessment/command.yaml"
  - id: "dod-occ-pr-self"
    description: >
      OCC self-binding receipt for the central evidence PR carrying the OMN-13378 contract and receipts.
    source: "manual"
