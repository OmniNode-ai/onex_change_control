---
schema_version: "1.0.0"
ticket_id: "OMN-13555"
title: "Runtime --all verification: wire broker env into publication probe + db_query_fn into --all/--contract-path"
summary: >-
  Two probe/CLI wiring defects made `python -m omnibase_infra.verification --all` (and `--contract-path`)
  structurally non-functional (108/108 QUARANTINE) from any host without a broker on localhost:9092. Defect
  1: probe_publication._rpk_watermark_fallback ran the rpk subprocess WITHOUT env, ignoring RPK_BROKERS/~/.omnibase/.env
  and dialing the rpk default 127.0.0.1:9092. Fix factors the broker-env merge (previously private in
  probe_subscription._rpk_env) into a shared omnibase_infra.verification.probes.util_rpk_env.rpk_env()
  and passes env=rpk_env() to the publication subprocess; probe_subscription imports the shared util.
  Defect 2: cli.py built VerificationConfig() with db_query_fn=None for --all and --contract-path, so
  the projection probe short-circuited to QUARANTINE for every contract. Fix adds cli._make_runtime_config()
  that wires db_query_fn from OMNIBASE_INFRA_DB_URL (same source --registration-only uses) and applies
  it to both paths. Live proof on the dev lane (192.168.86.201, redpanda:9092 + omnibase_infra DB) flips
  projection_state 108-QUARANTINE -> 108-PASS and overall 0-pass -> 52-pass/56-quarantine (was 108/108
  quarantine). This OCC PR carries the central contract consumed by the omnibase_infra PR (#2095) Receipt
  Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
