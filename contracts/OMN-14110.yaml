schema_version: "1.0.0"
ticket_id: "OMN-14110"
title: "feat(OMN-14110): per-tenant MSK IAM-ACL adapter + ARN-wildcard charset fix"
summary: >-
  omninode_infra PR #581 (Gateway P0B Option B) adds the MSK IAM-ACL adapter for the per-tenant broker-ACL
  provisioning seam behind a new provider-neutral ProtocolBrokerACLProvisioner, and closes an ARN-scope
  smuggling security bug on the same seam. Before the fix an emptiness-only tenant_slug check let a slug
  of '*' (or '?', '/') flow into an IAM Resource ARN 'topic/<cluster>/<uuid>/tenant-*.*', which glob-matches
  EVERY tenant's topics -- a full cross-tenant authorization bypass (safe for Redpanda's LITERAL Kafka-ACL
  prefix matching, NOT safe for MSK's glob-wildcard IAM matching; the seam-parity trap). The fix adds
  a shared fail-closed charset validator tenant_identity.validate_tenant_slug (pattern ^[a-z][a-z0-9-]{1,61}[a-z0-9]$;
  rejects *, ?, /, whitespace, empty, consecutive hyphens, uppercase, and non-ASCII look-alikes) enforced
  on BOTH ProtocolBrokerACLProvisioner impls -- Redpanda (kafka_acl_manager.ensure_tenant_kafka_acls)
  and MSK (msk_acl_manager.build_tenant_resource_arns + MSKACLProvisioner.ensure_tenant_acls) -- as the
  first executable statement, before any broker/AWS call and before the slug is embedded in any resource
  identifier. All changes live under docker/onex-api/ and touch no runtime node, contract, or deploy surface.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
