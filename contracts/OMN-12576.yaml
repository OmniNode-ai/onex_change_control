---
schema_version: "1.0.0"
ticket_id: "OMN-12576"
title: "Runtime deployment contracts and models foundation (OCC source of truth)"
summary: >
  Defines the OCC-owned runtime deployment wire schemas and topic authority for the node-based runtime
  deployment architecture (epic OMN-12574). OCC owns the deployment wire schema as the source of truth:
  the runtime deployment request consumed by node_redeploy and the runtime deployment proof consumed by
  the readiness gate. The authoritative wire schemas are src/onex_change_control/wire_schemas/runtime_deployment_request_v1.yaml
  and src/onex_change_control/wire_schemas/runtime_deployment_proof_v1.yaml. These wire DTOs are mirrored
  transiently through omnibase_compat and graduate to omnibase_core once >=2 repos import them.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "topics"
  - "events"
  - "envelopes"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused OMN-12576 tests validate the runtime deployment request/proof topic authority, freshness
      SLA, and the required runtime_lane / source_sha / image_digest / promotion_batch fields the downstream
      deployment orchestrator and validator consume.
    command: "uv run pytest tests/unit/test_omn_12576_runtime_deployment_contract.py -q"
  - kind: "manual"
    description: >
      Authoritative wire schemas exist at src/onex_change_control/wire_schemas/runtime_deployment_request_v1.yaml
      and src/onex_change_control/wire_schemas/runtime_deployment_proof_v1.yaml.
    command: "uv run validate-yaml contracts/OMN-12576.yaml"

