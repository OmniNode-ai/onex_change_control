---
schema_version: "1.0.0"
ticket_id: "OMN-13636"
title: "detect vendored node migrations that never applied (WS-F Phase 4 migration application gap)"
summary: >-
  WS-F Phase 4: close the migration application gap that left stability-test and prod with a vendored
  node migration (0020_delegation_context_pack_hash.sql) present on disk but never applied — projection
  writes failed with UndefinedColumn: context_pack_hash. The omnibase_infra forward-migration runner vendors
  omnimarket node-owned SQL (src/omnimarket/nodes/<node>/migrations/*.sql, OMN-12559) and applies each
  under a namespaced id node:<node>:<filename> in omnidash_analytics.public.schema_migrations. On a warm
  volume the one-shot runner can silently skip a new file (runner not re-run, or sentinel left TRUE from
  a prior run), leaving a file on disk with no schema_migrations row and a projection node writing to
  a stale schema. Nothing detected that class: node_database_sweep checked Alembic + Drizzle but ignored
  node-vendored migrations entirely. This adds the missing detection path in node_database_sweep (omnimarket):
  _discover_node_migration_ids enumerates the on-disk vendored set, _check_node_migrations compares it
  against the applied set and reports PENDING (naming the exact missing files), CURRENT, NO_TABLE, or
  ERROR. A PENDING node migration flips the sweep to issues_found so the CLI exits non-zero — fail loud,
  never silently CURRENT. Ships no live deploy / runtime restart.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      TDD gate tests/unit/nodes/node_database_sweep/test_handler_database_sweep.py::TestNodeMigrationApplicationGap
      — a vendored node migration on disk with no schema_migrations row surfaces as PENDING (naming the
      missing file), an all-applied set is CURRENT, a missing schema_migrations table is NO_TABLE, an
      unresolvable source tree is ERROR, and the handler aggregate flips to issues_found. The failing
      tests were written before the implementation.
    command: "uv run pytest tests/unit/nodes/node_database_sweep/test_handler_database_sweep.py -q"
  - kind: "ci"
    description: >-
      ruff format + ruff check + mypy --strict clean on the changed module; pre-commit run on the changed
      files passes (incl. stub detector, URL/topic/secret gates, golden-chain + dependency-health gates);
      the full omnimarket pytest suite (not kafka) is green (8904 passed, 46 skipped, 0 failed).
    command: "uv run pytest tests/ -q -p no:cacheprovider -m 'not kafka'"
