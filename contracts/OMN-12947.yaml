---
schema_version: "1.0.0"
ticket_id: "OMN-12947"
title: "Ungate scorer RUNTIME mode in node_context_roi_compute"
summary: >
  Central OCC evidence for omnimarket PR #1159. node_context_roi_compute (the N-arm context-ROI scorer,
  COMPUTE node) previously failed closed when fixture_mode=False (failure_class=runtime_mode_not_implemented),
  gating runtime-observed scoring on the coordinated lane deploy. This change ungates runtime mode: with
  fixture_mode=False the handler now consumes the same ModelArmRunRow rows the runner (OMN-12798) emits
  and scores them through the identical deterministic aggregation path, classifying the bundle as RUNTIME_OBSERVED_ONLY
  (REPLAY_PROVEN remains unchanged for fixture_mode=True). No schema change, no new model, no artifact-path
  hardcoding; only the proof_class label on the result differs between modes. TDD: TestHandlerRuntimeMode
  (8 tests, including a fixture-vs-runtime parity test) replaces the obsolete TestHandlerRuntimeModeGate.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TestHandlerRuntimeMode drives fixture_mode=False through the scorer: status ok, proof_class RUNTIME_OBSERVED_ONLY,
      a parity test asserting identical arm_rows/arm_summary/preferred_arm vs fixture mode (only proof_class
      differs), and invariant coverage (missing-required fails the row, absent-optional warns, negative-control
      never preferred) in runtime mode. Full node suite is 80 passed.
    command: "uv run pytest tests/nodes/node_context_roi_compute/ -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
