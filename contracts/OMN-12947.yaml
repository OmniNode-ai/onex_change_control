      the identical aggregation path to a RUNTIME_OBSERVED_ONLY bundle (REPLAY_PROVEN unchanged for fixture_mode=True),
      proven by TestHandlerRuntimeMode including a fixture-vs-runtime parity test."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12947/dod-runtime-mode-ungated/command.yaml
          && grep -q 'TestHandlerRuntimeMode' drift/dod_receipts/OMN-12947/dod-runtime-mode-ungated/command.yaml
          && grep -q 'RUNTIME_OBSERVED_ONLY' drift/dod_receipts/OMN-12947/dod-runtime-mode-ungated/command.yaml"
  - id: "dod-deploy-runtime-observed-scoring"
