title: "D2 — self-extension loop golden-chain test (generate -> deploy -> registered -> invoked -> output
  verified)"
summary: >-
  Adds a golden-chain test in omnimarket that exercises the full self-extension loop through the REAL
  wired code (no mocks of the logic under test): HandlerGenerationConsumer._emit_deploy / _emit_registration
  publish the node-deploy command and onex.evt.platform.node-registration.v1; the node-deploy command
  is fed VERBATIM into HandlerGeneratedExecutor.on_deploy_event, which sandbox-loads the generated handler,
  invokes it via importlib, and emits the terminal result on onex.evt.omnimarket.generated-node-invoked.v1.
  The proof matches the close-the-loop plan D2 acceptance items: generated output hash (SHA-256 of the
  FULL contract + handler artifacts), the registration event (correct platform topic + A4 payload conformance),
  and the invocation event (terminal shape + verified output). A single correlation_id threads generate
  -> register -> invoke. All topics resolve from contract.yaml, so the test also guards the contract-driven
  wiring.
