schema_version: "1.0.0"
ticket_id: "OMN-13520"
title: "Make test_registration_only hermetic — clear OMNIBASE_INFRA_DB_URL so the no-DB precondition holds"
summary: >-
  Fixes a non-hermetic unit test in omnibase_infra: tests/unit/verification/test_cli.py::TestCLIMain::test_registration_only.
  The test's pass/fail flipped on whether the ambient environment variable OMNIBASE_INFRA_DB_URL was set.
  When set (developer shells and CI runners that export a live Postgres DSN, e.g. the .201 omnibase_infra
  DB), the verification CLI's _make_runtime_db_query_fn() (src/omnibase_infra/verification/cli.py) builds
  a real DB query function via ModelPostgresPoolConfig.from_env("OMNIBASE_INFRA_DB_URL") instead of returning
  None. In _run_registration_only a non-None db_query_fn makes the registration + projection_state checks
  query the live database, which holds real registration rows, so both checks PASS and main() returns
  exit code 0 — violating the test assertion `assert exit_code in (1, 2)` with `assert 0 in (1, 2)`. The
  test docstring already states "No runtime DB is configured in this unit test" but never enforced that
  precondition. The fix is test-only: add a monkeypatch fixture parameter and monkeypatch.delenv("OMNIBASE_INFRA_DB_URL",
  raising=False) at the top of the method, before constructing the contracts, so the no-DB precondition
  holds regardless of the ambient environment. No source change is required — the CLI behaves correctly;
  the test failed to control its own input. The sibling test test_registration_only_uses_runtime_db_for_projection_state
  is already hermetic because it monkeypatches _make_runtime_db_query_fn directly. This OCC PR carries
  the central contract consumed by the omnibase_infra PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
