schema_version: "1.0.0"
ticket_id: "OMN-13520"
title: "Make test_registration_only hermetic to OMNIBASE_INFRA_DB_URL"
summary: >-
  The omnibase_infra unit test tests/unit/verification/test_cli.py::TestCLIMain::test_registration_only
  depended on ambient process state: if OMNIBASE_INFRA_DB_URL was set in a developer shell or runner environment,
  _make_runtime_db_query_fn() returned a live DB query function and the registration-only checks passed
  against real projection state, causing main() to return 0 instead of the no-DB test's expected non-zero
  quarantine path. The downstream PR makes the unit test hermetic by adding a monkeypatch fixture and
  clearing OMNIBASE_INFRA_DB_URL at the start of the test. This is a test-only change; no production source,
  contract, schema, endpoint, runtime, deployment, or database behavior is changed.
