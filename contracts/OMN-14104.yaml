---
schema_version: "1.0.0"
ticket_id: "OMN-14104"
title: "Gate non-OCC CI fanout behind OCC preflight"
summary: >-
  Central evidence for the cross-repo CI process change that makes non-OCC
  repository CI run OCC eligibility before runner-heavy validation fans out.
  The change wires OCC preflight into the primary CI dependency graph for
  omnimarket, omnibase_core, omnibase_infra, and omniclaude, and updates the
  reusable OCC preflight workflow to no-op successfully on non-PR events so push
  CI remains intact.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
contract_completeness: "ENRICHED"
evidence_requirements:
  - kind: "tests"
    description: "Workflow YAML parses and actionlint syntax validation passes for all four non-OCC repos."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14104/dod-workflow-syntax/command.yaml"
  - kind: "manual"
    description: "Downstream branch heads are recorded for the four CI fanout-gating PR branches."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14104/dod-downstream-branch-heads/command.yaml"
  - kind: "manual"
    description: "No live deploy, restart, or runtime mutation is required for this CI process change."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14104/dod-deploy-scope/command.yaml"
  - kind: "manual"
    description: "The OCC companion PR carries the OMN-14104 contract and PASS receipts."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14104/dod-occ-self/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-workflow-syntax"
    description: >-
      Local workflow proof: all four modified CI workflows parse as YAML; actionlint
      syntax validation passes with ShellCheck disabled to ignore pre-existing inline
      script style findings; whitespace checks pass.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-workflow-syntax/command.yaml"
          && grep -q 'actionlint -shellcheck=' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-workflow-syntax/command.yaml"
  - id: "dod-downstream-branch-heads"
    description: >-
      The process-change branches are pushed in omnimarket, omnibase_core,
      omnibase_infra, and omniclaude at the recorded commit SHAs.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-downstream-branch-heads/command.yaml"
          && grep -q 'omnimarket 768ea322a4f720a705dd74a6d57eff1ae346fa8d' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-downstream-branch-heads/command.yaml"
          && grep -q 'omnibase_core 2b2d46ee7e6888c7fac58579938e56f526c5b519' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-downstream-branch-heads/command.yaml"
          && grep -q 'omnibase_infra 1291fa132ee823c545d438cbdec77e54867fabb2' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-downstream-branch-heads/command.yaml"
          && grep -q 'omniclaude 1a8a05f3ef4dacdb2b15fa84b1910240c94d344a' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-downstream-branch-heads/command.yaml"
  - id: "dod-deploy-scope"
    description: >-
      CI workflow dependency ordering changes do not deploy code, restart services,
      mutate .201, or change runtime state. Post-merge validation is GitHub Actions
      check ordering and OCC gate behavior.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-deploy-scope/command.yaml"
          && grep -q 'No live deploy' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-deploy-scope/command.yaml"
  - id: "dod-occ-self"
    description: "The OCC companion branch carries the OMN-14104 central contract and receipt evidence."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-occ-self/command.yaml"
          && grep -q '^ticket_id: OMN-14104$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-14104/dod-occ-self/command.yaml"
