---
schema_version: "1.0.0"
ticket_id: "OMN-10956"
title: "Gate infra node handlers"
summary: >
  Binds omnibase_infra PR #1595, which adds an infra node handler ownership gate rejecting unallowlisted
  `src/omnibase_infra/nodes/*/handlers/**/*.py` files, documents the OMN-10956 baseline allowlist for
  existing infra handler paths, wires the gate into pre-commit and CI Summary, and adds focused tests
  for allowlist, staged, and stale-entry behavior.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnibase_infra PR #1595 carries the OMN-10956 infra node handler ownership gate."
    command: "gh pr view 1595 --repo OmniNode-ai/omnibase_infra --json state,headRefOid"
  - kind: "tests"
    description: "Focused local checks prove the new ownership gate and CI workflow wiring."
    command: "bash scripts/ci/reject-node-implementations.sh --all && bash scripts/ci/reject-node-implementations.sh
      --staged && uv run pytest scripts/ci/tests/test_reject_node_implementations.py -q && uv run pytest
      tests/ci/test_ci_workflow_resilience.py -q"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-10956 to omnibase_infra PR #1595 and the no-runtime-deploy
      assessment."
    command: "find drift/dod_receipts/OMN-10956 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-infra-pr-1595"
    description: "omnibase_infra PR #1595 carries the OMN-10956 infra node handler ownership gate."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10956/dod-omnibase-infra-pr-1595/command.yaml
          && grep -q '^pr_number: 1595$' drift/dod_receipts/OMN-10956/dod-omnibase-infra-pr-1595/command.yaml
          && grep -q '^commit_sha: 3fb99b19008da6d0208277428ca63037fd7c9e32$' drift/dod_receipts/OMN-10956/dod-omnibase-infra-pr-1595/command.yaml"
  - id: "dod-focused-checks"
    description: "Focused infra node handler ownership gate checks and workflow resilience tests pass
      locally."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10956/dod-focused-checks/command.yaml
          && grep -q '6 passed' drift/dod_receipts/OMN-10956/dod-focused-checks/command.yaml && grep -q
          '5 passed' drift/dod_receipts/OMN-10956/dod-focused-checks/command.yaml"
  - id: "dod-deploy-assessment"
    description: >
      Deploy DoD evidence for PR #1595: CI/pre-commit ownership gate and allowlist-only baseline. No live
      Kafka topic, Postgres projection, .201 service mutation, or runtime container restart is required
      before merge.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10956/dod-deploy-assessment/command.yaml
          && grep -q '^pr_number: 1595$' drift/dod_receipts/OMN-10956/dod-deploy-assessment/command.yaml
          && grep -q 'No live deploy' drift/dod_receipts/OMN-10956/dod-deploy-assessment/command.yaml"
