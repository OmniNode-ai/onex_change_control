schema_version: "1.0.0"
ticket_id: "OMN-13216"
title: "Delegation routing feedback reducer crashes on empty payload"
summary: >-
  OMN-13216 fixes node_delegation_routing_feedback_reducer, whose handle() shim expected a hand-crafted
  {"event": ..., "state": ...} wrapper that the live runtime auto-wiring dispatcher never produces. Because
  the node contract declares a nested input_model (not event_model), omnibase_infra auto_wiring resolves
  entry.event_model to None and passes the raw envelope/payload straight to handle(); the shim then read
  input_data["event"] -> {} -> ModelDelegationFeedbackEvent(**{}) -> a 7-field ValidationError that crashed
  the dispatcher and swallowed the terminal for escalated delegation requests (request HWM advanced, terminal
  HWM did not). The fix makes handle() extract and normalize the real payload from whatever the dispatcher
  delivers (ModelEventEnvelope, transport-envelope dict, or flattened payload dict), maps the three raw
  terminal events to ModelDelegationFeedbackEvent by source topic, and treats empty/unidentifiable payloads
  as an explicit no-op instead of crashing, so escalated terminals are never swallowed. Adds real-dispatch-path
  and golden-chain tests.
