ticket_id: "OMN-12858"
title: "Dispatcher route-coverage CI gate (OMN-12858 / OMN-12879 / OMN-12880)"
summary: >-
  Ships a static-analysis CI gate that scans every ONEX contract subscribing to a command topic (onex.cmd.*)
  and asserts it declares handler_routing or runtime_dispatch. Missing wiring causes commands to go to
  DLQ silently. Addresses two regressions: the June 9 node-generation-requested DLQ incident and the June
  12 DEL-01 live finding (delegate-skill consumed-but-undispatched on dev). Gate delivered as scripts/check_dispatcher_route_coverage.py
  (static YAML analysis, no Kafka), .github/workflows/dispatcher-route-coverage.yml (fires on PR / push
  / merge_group, checks out omnimarket sibling, supports changed-contract mode per OMN-12879), and 12
  unit tests in tests/ci/test_dispatcher_route_coverage_gate.py covering RED/GREEN/COMPAT/CHANGED-MODE
  paths. omnimarket-side fixture tests added via companion PR (OMN-12880). Ratchet baseline: 2 pre-existing
  violations allowlisted with ticket refs and expiry dates.
