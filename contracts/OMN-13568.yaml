schema_version: "1.0.0"
ticket_id: "OMN-13568"
title: "doc_content_scan validator: acceptance corpus (ground-truth invariant)"
summary: >
  Hand-author the deterministic acceptance corpus that DEFINES a doc-sanitization violation for PUBLIC-repo
  documentation — the single ground-truth used to (a) accept the generated doc_content_scan COMPUTE validator
  and (b) verify the OMN-13567 cleanup. Modeled on validator_corpora/corpus_hardcoded_ip.py. Violation
  fixtures (must flag): RFC1918 LAN IP in prose (192.168/10/172.16-31 bands), .201/.200 host shorthand,
  personal home paths (/Users, /home), ssh/email leaks, OMN-XXXX refs in prose/heading/list-item. Clean
  fixtures (must NOT flag): localhost/127.0.0.1 (LEFT by decision), doc-reserved IPs (192.0.2/198.51.100/203.0.113)
  + example.com, env-var/portable forms ($OMNI_HOME, ${ONEX_HOST}, Path.home()), # doc-content-ok / #
  doc-content-file-ok suppression, and .200-shaped decimals (0.200) that must NOT fire. 12 violation +
  11 clean fixtures with >=4 adversarial mutations per side, exceeding the IP-validator fixture density.
  Registered as CORPORA["doc-content-scan"]; evaluate_corpus_acceptance runs deterministically against
  it; a correct hand-authored reference scanner proves the corpus is satisfiable, and flag-nothing / flag-everything
  / OMN-only negative controls prove it is meaningful. Corpus + tests only; no node, runtime, or contract
  API change; no live-lane mutation. Blocks child #2 (generation acceptance authority).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      The corpus tests assert each registered corpus is RUNNABLE (non-empty, carries an adversarial mutation
      case), that a correct hand-authored doc-content reference scanner is ACCEPTED (passed=True, errors==[])
      so the corpus is satisfiable, that flag-nothing / flag-everything / OMN-only scanners are REJECTED
      so the corpus is meaningful, and that the corpus meets the DoD fixture-density floor (>= IP-validator
      density, >=4 adversarial mutations per side).
    command: "uv run pytest tests/unit/nodes/node_generation_consumer/test_validator_corpora.py tests/unit/nodes/node_generation_consumer/test_corpus_acceptance.py
      -q"
emergency_bypass:
