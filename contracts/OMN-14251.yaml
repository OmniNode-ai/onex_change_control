  Discovered blocking the omniclaude dev->main promotion PR #1879 (OMN-14249), which runs the full unconditional
  suite per CLAUDE.md Rule #4 (the everyday change-aware selector rarely touches this test file, hiding
  the defect until the promotion boundary).
