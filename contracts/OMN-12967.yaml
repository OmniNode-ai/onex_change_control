schema_version: "1.0.0"
ticket_id: "OMN-12967"
title: "P1.2b-B: Delegation-path config migration — keys/refs in contracts, values in Infisical, bootstrap
  fallback with provenance"
summary: >-
  Inventory and re-home every delegation/routing-path config PATH read onto a single provenance surface
  (omnimarket.inference.delegation_config_provenance). resolve_path_config / resolve_optional_path_config
  emit one structured INFO provenance line per read (source=contract_overlay_env|bootstrap_default, override_present,
  resolved_path), so a cold runtime's resolution order is auditable from logs and proof packets. Re-homed
  reads: DELEGATION_ROUTING_TIERS_PATH and TASK_CLASS_CONTRACT_PATH (handler_delegation_routing), BIFROST_CONTRACT_PATH
  and BIFROST_OVERLAY_PATH (handler_delegation_routing._load_bifrost_endpoints AND node_generation_consumer.handler_generation_consumer._resolve_bifrost_backend),
  and INFERENCE_PROTOCOL_CONFIG_PATH (inference/protocol_config; env path only, explicit config_path=
  arg still wins). The enforcement ratchet ships in the same PR: scripts/ci/check_delegation_env_reads.py
  (already a CI gate, --mode enforce) gains a provenance-bypass rule — a raw os.environ read of any provenance-required
  key outside the provenance module is a hard violation in BOTH report and enforce mode, and a skip token
  does NOT exempt it. This closes the silent-unmanaged-volume-selection hole (BIFROST_CONTRACT_PATH silently
  selecting a drifted volume file) so it cannot reopen. Resolution semantics are unchanged (observability
  + one typed seam); platform-wide env removal is P1.2b-C (OMN-12968), explicitly out of scope. Inventory
  doc in omni_home/docs/audits/2026-06-11-delegation-config-read-inventory.md.
is_seam_ticket: false
