ticket_id: OMN-13098
title: "Phase 4b: skill receipt-mode validator + pre-commit + CI + ratchet"
summary: >-
  Enforcement slice for the skill-output-suppression epic (OMN-13089). Adds validate_skill_dispatch_receipt_mode
  in omnibase_core/validators/ (per the validators-standardized convention) with four checks: (a) every
  skill declares skill_kind: dispatch | methodology in frontmatter (explicit, never heuristic); (b) dispatch
  skills' commands are the single onex skill / onex delegate receipt-mode form — bare onex (run|node|run-node)
  FAILS; (c) dispatch skill directories are markdown only (no *.py, _lib/, shell scripts); (d) prompt-instruction
  consistency — no 'cat workflow_result.json' / 'surface JSON verbatim' instruction (a negation guard
  tolerates prohibitions). Wired into omniclaude in the SAME PR as a blocking pre-commit hook (validate-skill-dispatch-receipt-mode)
  and a required CI check (skill-receipt-mode-gate). A ratchet allowlist (.onex_ratchets/skill_receipt_mode_allowlist.yaml)
  tolerates not-yet-migrated skills at gate-introduction time and FAILS if it grows, if a listed skill
  is migrated (stale entry) or removed, or if a new skill ships an unreceipted dispatch; the allowlist
  shrinks to empty as migrations land, then the file is deleted and the gate is unconditional. Operating
  Rule 5: detection-only is not acceptable — validator + pre-commit + required CI ship together.
