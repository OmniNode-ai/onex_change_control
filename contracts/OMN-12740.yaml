---
schema_version: "1.0.0"
ticket_id: "OMN-12740"
title: "fix(OMN-12740): add browser-safe dashboard id fallback"
summary: >-
  Fix the blank-white-page dashboard risk by replacing direct browser calls to crypto.randomUUID() with
  a shared createId() helper that falls back to crypto.getRandomValues() or timestamp/random IDs when
  randomUUID is unavailable. Hotpatch validation on the dev dashboard runtime proved the app renders with
  crypto.randomUUID disabled before page load.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omnidash build, lint, and focused dashboard/delegation tests pass after the ID fallback
      change."
    command: >-
      npm run build && npm run lint && npm run test:run -- src/pages/DashboardView.test.tsx src/services/dashboardService.test.ts
      src/components/frame/Sidebar.test.tsx src/components/dashboard/delegation-control-plane src/components/dashboard/delegation
  - kind: "manual"
    description: "The dev dashboard runtime renders when crypto.randomUUID is intentionally disabled before
      page load."
    command: "Playwright navigation to http://192.168.86.201:3001/?t=delegation-dev-runtime&uuid=disabled"
  - kind: "ci"
    description: "omnidash PR #172 is merged to dev with required GitHub checks passing."
    command: "gh pr view 172 --repo OmniNode-ai/omnidash --json state,mergeCommit,statusCheckRollup"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-local-ui-verification"
    description: "Local omnidash build, lint, and focused dashboard/delegation tests passed for the dashboard
      ID fallback fix."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-12740/dod-local-ui-verification/command.yaml
          && grep -q '146 tests' drift/dod_receipts/OMN-12740/dod-local-ui-verification/command.yaml &&
          grep -q 'npm run build' drift/dod_receipts/OMN-12740/dod-local-ui-verification/command.yaml
  - id: "dod-runtime-render-fallback"
    description: "The dev dashboard runtime rendered nonblank with crypto.randomUUID disabled before page
      load."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-12740/dod-runtime-render-fallback/command.yaml
          && grep -q 'dashboard: true' drift/dod_receipts/OMN-12740/dod-runtime-render-fallback/command.yaml
          && grep -q 'uuidType: undefined' drift/dod_receipts/OMN-12740/dod-runtime-render-fallback/command.yaml
  - id: "dod-omnidash-pr-172"
    description: "omnidash PR #172 is merged to dev and carries the OMN-12740 browser-safe dashboard ID
      fallback."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-12740/dod-omnidash-pr-172/command.yaml && grep
          -q '^pr_number: 172$' drift/dod_receipts/OMN-12740/dod-omnidash-pr-172/command.yaml && grep
          -q '"state":"MERGED"' drift/dod_receipts/OMN-12740/dod-omnidash-pr-172/command.yaml
  - id: "dod-manual-merge-sweep"
    description: "Manual merge sweep ran against omnidash after the UI PRs merged and found no remaining
      open PRs to process."
    source: "manual"
    status: "verified"
    checks:
