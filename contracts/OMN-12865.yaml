schema_version: "1.0.0"
ticket_id: "OMN-12865"
title: "Fix deploy-agent compose_gen stability service drift"
summary: >
  Stability runtime deploy was blocked because deploy-agent regenerates docker/docker-compose.infra.yml
  from docker/catalog before build/up, while CI validated only the checked-in source compose. The generated
  runtime compose omitted services that docker-compose.stability-test.yml partially overrides, so the
  deploy-time lane compose failed validation before recreating stability containers. The fix aligns catalog
  bundles/manifests with the stability overlay and makes deploy-agent validate the generated lane compose
  artifact with docker compose config --quiet before any deploy effect. The follow-up fix makes the warm-volume
  forward migration create the keycloak database before the keycloak service starts, preventing the generated
  core bundle from deploying into a Keycloak restart loop on existing Postgres volumes. A final hardening pass
  makes malformed create-database directives fail closed in both migration runners instead of being silently
  ignored.
