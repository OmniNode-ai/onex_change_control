schema_version: "1.0.0"
ticket_id: "OMN-8723"
title: "Gate golden_chain probe to GATED when consumers idle"
summary: >-
  Add idle_gate flag to GoldenChainSweepRequest so that missing projected rows produce GATED (non-blocking)
  instead of TIMEOUT when consumers are healthy but no events have flowed. Fixes false-RED probe when
  dispatch loop is idle. Pure compute change — no runtime deploy.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "8 new idle-gate unit tests pass and pre-existing golden chain sweep tests unchanged."
    command: "uv run pytest tests/test_golden_chain_sweep_idle_gate.py tests/test_golden_chain_golden_chain_sweep.py
      -v"
dod_evidence:
