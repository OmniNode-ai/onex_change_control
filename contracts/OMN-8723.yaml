schema_version: "1.0.0"
ticket_id: "OMN-8723"
title: "Gate golden_chain probe to GATED when consumers idle"
summary: >-
  Add idle_gate flag to GoldenChainSweepRequest so that missing projected rows produce GATED (non-blocking)
  instead of TIMEOUT when consumers are healthy but no events have flowed. Fixes false-RED probe when
  dispatch loop is idle. Pure compute change — no runtime deploy.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "8 new idle-gate unit tests pass and pre-existing golden chain sweep tests unchanged."
    command: "uv run pytest tests/test_golden_chain_sweep_idle_gate.py tests/test_golden_chain_golden_chain_sweep.py
      -v"
dod_evidence:
  - id: "dod-omnimarket-pr-749"
    description: "omnimarket PR #749 delivers idle-gate fix with 8 new unit tests, all hooks green."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '"overall_status": "PASS"' "$CONTRACT_REPO_DIR/evidence/OMN-8723/dod_report.json" &&
          grep -q '"verified_count": 9' "$CONTRACT_REPO_DIR/evidence/OMN-8723/dod_report.json" && grep
          -q '"failed_count": 0' "$CONTRACT_REPO_DIR/evidence/OMN-8723/dod_report.json"
  - id: "dod-deploy-verify"
    description: "Pure compute handler — no runtime deploy required. Verifies module importable post-deploy."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          docker exec omnibase-runtime python -c "from omnimarket.nodes.node_golden_chain_sweep.handlers.handler_golden_chain_sweep
          import NodeGoldenChainSweep, EnumSweepStatus; assert EnumSweepStatus.GATED == 'gated'" || uv
          run python -c "from omnimarket.nodes.node_golden_chain_sweep.handlers.handler_golden_chain_sweep
          import NodeGoldenChainSweep, EnumSweepStatus; assert EnumSweepStatus.GATED == 'gated'"
