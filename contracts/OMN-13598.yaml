ticket_id: "OMN-13598"
title: "fix(delegation): savings projection writes ZERO rows — deployed SavingsProjectionRunner ignores
  task-delegated.v1, savings_estimates never materializes"
summary: >-
  Central evidence for omnimarket PR #1416, which fixes the deployed SavingsProjectionRunner (handler_savings.py)
  so it materializes savings_estimates rows from the canonical onex.evt.omniclaude.task-delegated.v1 SOURCE
  stream. Previously task-delegated.v1 events fell through to the savings-estimated path, which requires
  session_id/model_local/cost fields absent from that payload, causing every event to be DLQ'd as malformed
  and savings_estimates to write zero rows. The from_task_delegated_event logic (OMN-12494) existed only
  in the non-deployed handler. Fix: add _project_task_delegated_savings to SavingsProjectionRunner with
  _topic_delegated wired from the contract subscribe_topics. Six new unit tests prove materialization
  through the deployed handler (TDD -- written failing first). This contract supplies the Receipt-Gate
  and deploy-gate evidence cited by the product PR.
