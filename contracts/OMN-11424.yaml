title: "Trigger receipt gate on PR body edits"
summary: >-
  Add the `edited` pull_request trigger to receipt-gate caller workflows so adding or repairing Evidence-Source
  and Evidence-Ticket lines reruns receipt validation without an empty commit.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
contract_completeness: "ENRICHED"
evidence_requirements:
  - kind: "manual"
    description: "Each open OMN-11424 PR head is recorded with the receipt-gate caller workflow change."
    command: "See drift/dod_receipts/OMN-11424/dod-*-pr-*/command.yaml"
  - kind: "manual"
    description: "The onex_change_control caller workflow parses with the edited pull_request trigger."
    command: "grep -Fq 'types: [opened, synchronize, reopened, edited]' .github/workflows/call-receipt-gate.yml"
  - kind: "manual"
    description: "No live deploy is required for CI workflow trigger wiring."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11424/dod-deploy/command.yaml"
