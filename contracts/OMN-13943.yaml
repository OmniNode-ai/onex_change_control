schema_version: "1.0.0"
ticket_id: OMN-13943
title: "fix(delegation): bus-less local dispatch treats retryable transport failures (429/timeout) as
  terminal instead of escalating tier_order"
summary: >
  LocalDelegationDispatchPort.dispatch() (the bus-less `onex delegate` CLI path) treated every transport/timeout
  failure as terminal, even a retryable one (429/timeout/model-unavailable), so a GLM RATE_LIMITED on
  the cheap_cloud tier terminated the whole delegation instead of falling through to the next tier. Fixed
  by classifying the effect result's failure_class and routing retryable failures through the same up-tier
  escalation the quality-gate-FAIL branch already uses, bounded by max_escalations. Also fixes two independent
  secret-name-drift bugs (Gemini/OpenRouter dotted secret_ref never matching the canonical ~/.omnibase/.env
  vars) via a contract-declared env_var_fallback, and makes cheap_frontier (OpenRouter, free tier) reachable
  in code_generation's escalation_policy.tier_order. Live-proven: Gemini completes a real gemini-2.5-flash-lite
  call end-to-end; OpenRouter's secret resolves and the real HTTP call reaches openrouter.ai (genuine
  external free-tier 429, orthogonal to this fix).
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
