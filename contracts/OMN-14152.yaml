schema_version: "1.0.0"
ticket_id: "OMN-14152"
title: "feat(OMN-14152): migrate onex-dev omnidash deployment to the new SPA architecture"
summary: >-
  Central OCC evidence for omninode_infra PR #594. The product PR updates the onex-dev omnidash manifests
  and scoped staging deploy workflow for the new SPA-on-Express-bridge architecture, including the contract
  ConfigMap mount, runtime-config probe path, RDS CA trust bundle, staging issuer secret sourcing, and
  a scoped dev-to-staging deploy workflow.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-infra-pr-594-head-32e04c2-product"
    description: >-
      Product-head verification for omninode_infra PR #594 at head 32e04c220d01dbce80750c444cd54c33088dbeb8.
      Verifies the PR targets dev, has the expected OMN title, and touches only the omnidash staging workflow,
      onex-dev omnidash manifests, contract values file, and RDS CA bundle.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=594; PRODUCT_REPO=OmniNode-ai/omninode_infra; PRODUCT_HEAD=32e04c220d01dbce80750c444cd54c33088dbeb8;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "$d/pr.txt" && grep -Fxq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt" && grep
          -Fq 'feat(OMN-14152): migrate onex-dev omnidash deployment to the new SPA architecture' "$d/pr.txt"
          && tail -n +4 "$d/pr.txt" | sort > "$d/actual.txt" && printf '%s\n' '.github/workflows/deploy-omnidash-staging.yml'
          'k8s/onex-dev/omnidash/deployment.yaml' 'k8s/onex-dev/omnidash/kustomization.yaml' 'k8s/onex-dev/omnidash/omnidash-contract-values.yaml'
          'k8s/onex-dev/omnidash/rds-global-bundle.pem' | sort > "$d/expected.txt" && diff -u "$d/expected.txt"
          "$d/actual.txt"
  - id: "dod-infra-pr-594-head-32e04c2-local"
    description: >-
      Local validation for omninode_infra PR #594 at refreshed head 32e04c220d01dbce80750c444cd54c33088dbeb8
      after merging current dev into the PR branch. The changed-file pre-commit hook set passed locally.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_REPO=OmniNode-ai/omninode_infra; PRODUCT_HEAD=32e04c220d01dbce80750c444cd54c33088dbeb8;
          test "$(gh pr view 594 --repo "$PRODUCT_REPO" --json headRefOid --jq .headRefOid)" = "$PRODUCT_HEAD"
          && gh pr checks 594 --repo "$PRODUCT_REPO" --watch=false | awk -F '\t' '$1 == "pre-commit" &&
          $2 == "pass" {found=1} END {exit found ? 0 : 1}'
  - id: "dod-infra-pr-594-head-32e04c2-deploy"
    description: >-
      Deploy-surface assessment for omninode_infra PR #594 at head 32e04c220d01dbce80750c444cd54c33088dbeb8.
      The PR intentionally touches a scoped dev-to-staging omnidash deployment workflow and onex-dev omnidash
      deployment manifests only; it does not mutate production manifests, Terraform, migrations, or non-omnidash
      services.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=594; PRODUCT_REPO=OmniNode-ai/omninode_infra; PRODUCT_HEAD=32e04c220d01dbce80750c444cd54c33088dbeb8;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid --jq '.headRefOid ==
          "'$PRODUCT_HEAD'"' | grep -qx true && gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO"
          --name-only | tee /tmp/omn-14152-files.txt && ! grep -qE '(^|/)(onex-prod|terraform|migrations)(/|$)'
          /tmp/omn-14152-files.txt && grep -Eq '^k8s/onex-dev/omnidash/|^\.github/workflows/deploy-omnidash-staging\.yml$'
          /tmp/omn-14152-files.txt
  - id: "dod-infra-pr-594-head-32e04c2-ci"
    description: >-
      Hosted CI evidence for omninode_infra PR #594 at refreshed head 32e04c220d01dbce80750c444cd54c33088dbeb8.
      Verifies the product PR has current successful deploy-gate, contract compliance, YAML syntax, env-var
      injection, and hosted kustomize validation contexts before central OCC evidence is stamped.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=594; PRODUCT_REPO=OmniNode-ai/omninode_infra; PRODUCT_HEAD=32e04c220d01dbce80750c444cd54c33088dbeb8;
          test "$(gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid --jq .headRefOid)"
          = "$PRODUCT_HEAD" && for ctx in 'deploy-gate' 'Contract Compliance Check' 'Validate YAML Syntax'
          'Validate env-var injection in Kubernetes Deployments' 'Validate Kustomize'; do gh pr checks
          "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --watch=false | awk -F '\t' -v c="$ctx" '$1 == c
          && $2 == "pass" {found=1} END {exit found ? 0 : 1}'; done
  - id: "dod-occ-self-bind-pr-4230"
    description: >-
