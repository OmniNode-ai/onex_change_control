ticket_id: OMN-14063
title: "delegation: retry flaky local health probe before cloud escalation"
summary: >
  Retries transient local delegation /health probe failures before escalating from local-first delegation
  to a cloud backend, and surfaces the escalation ladder on the typed delegate response. This prevents
  a single transient Tailscale/DERP timeout from silently burning paid cloud calls while the local backend
  is actually healthy.
