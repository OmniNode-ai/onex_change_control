schema_version: "1.0.0"
ticket_id: "OMN-13634"
title: "projection DLQ error classification — poison vs recoverable + unify runner/handler paths (WS-F
  Phase 2)"
summary: >-
  WS-F Phase 2 (epic OMN-13629): projection DLQ error classification. The omnimarket projection runner
  and handlers previously had two divergent error policies — handler_wiring (infra) DLQ-and-committed
  on ANY error (silently dropping recoverable infra errors like UndefinedColumn / OperationalError / connection
  failures), while BaseProjectionRunner._handle_message re-raised + infinite-retried ALL errors including
  genuine poison (a malformed-payload ValidationError). A migration gap therefore looked like a bad event
  and was silently quarantined as "malformed". This contract carries the omnimarket fix: a single canonical
  classifier (omnimarket.projection.error_classification.classify_projection_error) returning POISON vs
  RECOVERABLE, applied in BaseProjectionRunner._handle_message so the runner path matches the infra handler_wiring
  policy. POISON (ValidationError / PoisonEventError) routes to the contract-declared poison DLQ with
  the offset COMMITTED (not retried, durably recoverable by correlation_id); RECOVERABLE (asyncpg PostgresError
  incl. UndefinedColumn + the OperationalError-equivalent server errors, InterfaceError, connection errors,
  OSError, TimeoutError) re-raises WITHOUT committing the offset (loud, re-read + retried); an unknown
  error defaults to RECOVERABLE (fail-safe: never silently drop). A migration gap now produces a loud,
  retryable failure, never silent malformed-quarantine. Ships no live deploy / runtime restart; dev +
  stability are pre-authorized, prod redeploy is gated (OMN-13418) and out of autonomous scope.
is_seam_ticket: true
interface_change: true
interfaces_touched:
