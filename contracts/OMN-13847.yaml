title: "feat(OMN-13847): add per-hook wall-clock latency instrumentation (emit side)"
summary: >-
  omniclaude PR #1834 lands the emit-side foundational piece for per-hook latency
  measurement identified as a gap in the OMN-13244 measurement baseline: a reusable
  monotonic-timer instrumentation primitive (plugins/onex/hooks/lib/hook_latency_instrumentation.py)
  that wraps a hook body and emits a structured hook.executed telemetry event through the
  existing emit-daemon socket path so hook usefulness becomes data-driven (p50/p95 latency per
  hook). The primitive is inert when hooks are disabled (nothing runs at import; duration is
  measured only while a hook body runs inside the context manager/decorator), fire-and-forget
  (never raises, never blocks the hook), and does not re-enable any hook. The daemon-side routing
  and projection are deliberately deferred as a coordinated cross-repo change. 14 unit tests lock
  in duration emission, blocked propagation, timing-on-raise, fail-open emission, and decorator
  metadata preservation.
