---
schema_version: "1.0.0"
ticket_id: "OMN-12569"
title: "Orchestrator owns a durable, reconstructable PR ledger (derived projection)"
summary: >-
  The pr_lifecycle_orchestrator (omnimarket) now owns a durable PR ledger materialized as a derived projection
  from typed source events (PR inventoried, workflow run observed, merge-group SHA minted, rerun attempted,
  final conclusion). Each entry records run id, head SHA, synthetic merge-group SHAs, rerun attempts,
  final conclusion, and a full provenance trail (workflow run, merge-group SHA, branch SHA, orchestrator
  action, timestamp). The ledger is a derived projection — not authoritative truth on its own; authoritative
  truth remains GitHub state plus durable orchestrator receipts — and is reconstructable from its source
  events via reconstruct_pr_ledger(). The projection lands in a control-plane durable store (the projection
  database boundary), not a repo artifact. Implemented in omnimarket PR #1013.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "events"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
