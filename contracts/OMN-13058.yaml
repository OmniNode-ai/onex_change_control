schema_version: "1.0.0"
ticket_id: "OMN-13058"
title: "TerminalConsumerSession leaks worker thread + event loop when open() fails (error-path leak behind
  the fixed OMN-13010 session.close Major)"
summary: >-
  Found by the P3.3 doctrinal review of merged omnibase_infra #1951 (head b9712af9, dev merge 36d98275)
  and the omnimarket #1184 fold. The CodeRabbit Major on #1184 ("session.close possibly never called after
  wait()") is FIXED in the merged runner (try/finally around session.wait plus close-order test), but
  a sibling leak exists one layer down: TerminalConsumerSession.__init__ (omnibase_infra src/omnibase_infra/runtime/service_terminal_event_consumer.py)
  starts its dedicated worker loop thread immediately, and TerminalEventConsumer.open did 'session = TerminalConsumerSession(...);
  return session.open()' with no cleanup. Any failure inside session.open() (consumer start timeout, partition-assign
  TimeoutError at the 30s cap, broker auth error, missing event-bus attributes) propagated out of the
  raising expression, the session reference was lost, _closed stayed False, and the daemon worker thread
  plus its never-closed asyncio event loop leaked -- one pair per failed open. The Kafka client itself
  is not leaked (open_direct_terminal_consumer stops it on BaseException). The motivating caller (HandlerContextRoiRunner)
  opens one session per trial, so a 160-560-trial battery against a degraded broker accumulates hundreds
  of leaked threads in the long-lived effects container. Fix (omnibase_infra PR #1957): wrap session.open()
  in try/except BaseException -> session.close() (idempotent: stops the loop, joins the thread) -> re-raise;
  covers both the two-phase .open(topic) path and the legacy single-call __call__ path. No topic, envelope,
  or contract API change.
