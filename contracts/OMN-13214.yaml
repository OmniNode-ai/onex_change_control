ticket_id: "OMN-13214"
title: "Close merge-queue armed-but-not-enqueued gap"
summary: >-
  OMN-13214 hardens omnimarket auto-merge behavior after the 2026-06-17 dev merge wave exposed that GitHub
  auto-merge arming is not equivalent to entering a merge queue. The omnimarket PR adds a stdlib-only
  helper with unit-tested queue classification/verification behavior and updates .github/workflows/auto-merge.yml
  to arm auto-merge, update behind branches when strict-update requires it, explicitly enqueue via GraphQL,
  and verify the PR actually enters the merge queue. A follow-up fix in the same PR fetches queue-only
  PullRequest fields through GraphQL because this runner's gh pr view JSON surface does not include isInMergeQueue.
