ticket_id: "OMN-13214"
title: "Merge queue: auto-merge-armed PRs never enqueue (armed-but-not-enqueued)"
summary: >-
  Close the armed-but-not-enqueued gap: arming auto-merge is not the same as enqueuing, so CLEAN + all-required-green
  + armed PRs sat outside the dev merge queue for hours during the 2026-06-17 wave. The Auto-Merge GitHub
  Actions workflow now arms bare --auto, runs gh pr update-branch first on strict-update repos when the
  PR is BEHIND, explicitly calls enqueuePullRequest, and verifies the PR actually entered the queue (failing
  loudly if a green+armed PR is not enqueued). The classify/verify decision logic is a stdlib-only, unit-tested
  helper.
