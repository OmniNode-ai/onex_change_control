ticket_id: "OMN-12632"
title: "fix: drain-proof lag observation crashes — aiokafka 0.13.0 admin has no list_offsets"
summary: >-
  OMN-12618 follow-up. The merged OMN-12623 drain-proof gate wired ServiceConsumerLagObserver.observe()
  to call admin.list_offsets(...) (declared on ProtocolKafkaAdminLike), but the pinned aiokafka==0.13.0
  AIOKafkaAdminClient has NO list_offsets method, so against the real runtime admin the gate raised `AttributeError:
  'AIOKafkaAdminClient' object has no attribute 'list_offsets'`. The lag/drain-proof gate — the largest
  net-new piece of OMN-12623 — was therefore non-functional in the deployed runtime. CI missed it because
  the admin client was MOCKED in the unit tests, with the fake admin stubbing list_offsets into existence;
  the live .201 stability-test proof of OMN-12623 (2026-06-03) found it and bridged it with a shim to
  demonstrate the gate's block-at-lag=2 / allow-at-lag=0 logic. omnibase_infra PR <INFRA_PR> fixes the
  defect with the lower-risk adapter approach (no aiokafka bump): src/omnibase_infra/migration/adapter_kafka_admin_lag.py
  adds AdapterKafkaAdminLag implementing the full ProtocolKafkaAdminLike surface — committed offsets delegate
  to the real admin's list_consumer_group_offsets (which 0.13.0 does provide); per-partition log-end offsets
  (list_offsets) are served via AIOKafkaConsumer.end_offsets() (which 0.13.0 also provides). ServiceConsumerLagObserver
  is wired to the adapter, never a raw AIOKafkaAdminClient. A new regression test (tests/unit/migration/test_lag_adapter_list_offsets.py)
  exercises observe() against a fake mirroring the real 0.13.0 surface (admin has list_consumer_group_offsets
  but NO list_offsets; consumer has end_offsets): test_observer_crashes_on_raw_0_13_0_admin pins the pre-fix
  AttributeError, and the adapter-wired tests pass. The OMN-12623 migration tests were refactored to drop
  the list_offsets stub that masked the bug, routing log-end offsets through the consumer instead. A minimal
  ProtocolKafkaLagConsumer captures only the end_offsets surface (registered in the protocol-ownership
  allowlist). The live .201 stability-test lag re-proof is operator-gated and was NOT run by this change.
