ticket_id: "OMN-13882"
title: "Remove non-routable GitWorktreeAdapter from prune-effect handler_routing"
summary: >-
  OCC evidence for omnimarket PR #1593, which removes the non-routable GitWorktreeAdapter entry from node_pr_lifecycle_worktree_prune_effect's
  handler_routing.handlers. The adapter is a plain git side-effect dependency injected into HandlerWorktreePrune's
  constructor, not an event-payload-routed handler. Under the payload_type_match strategy RuntimeLocal._validate_routing
  requires every entry to declare event_model.name + event_model.module, so the adapter entry (which had
  no event_model) failed routing validation on every dispatch and the node exited 1 before the handler
  ran. The fix drops the adapter entry so only the real ProtocolMessageHandler is routed; the adapter
  stays wired as the handler's injected dependency. Contract-only change plus three new contract-routing
  regression guards. No runtime deploy.
