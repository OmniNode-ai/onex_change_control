---
schema_version: "1.0.0"
ticket_id: "OMN-12810"
title: "Projection handlers must not own AIOKafkaProducer — runtime injects the publisher"
summary: >-
  Refactors the omnimarket projection handlers so the projection runtime (BaseProjectionRunner) owns the
  Kafka producer lifecycle instead of each handler constructing its own AIOKafkaProducer. node_projection_delegation
  and node_projection_savings drop their self._producer field, self._publish_fn re-declaration, and _get_publish_fn()
  method; every emit / DLQ path delegates to the runtime-owned BaseProjectionRunner.get_publish_fn(),
  which lazily builds a single producer (or returns an injected publish_fn) and is torn down in shutdown()/run().
  Product PR: omnimarket #1482.
is_seam_ticket: false
interface_change: false
