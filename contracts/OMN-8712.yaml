---
schema_version: '1.0.0'
ticket_id: OMN-8712
summary: 'fix(pipeline_fill): use project ID GraphQL filter + no-bus dispatched.yaml'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: CI passes on merge PR
    command: gh pr checks
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: 'state=$(gh pr view {pr} --repo {repo} --json state,baseRefName -q ''[.state, .baseRefName]
          | @tsv''); [ "$(echo "$state" | cut -f1)" = "OPEN" ] && [ "$(echo "$state" | cut -f2)" = "main"
          ]'
  - id: dod-002
    description: PR merged to main
    source: generated
    checks:
      - check_type: command
        check_value: 'result=$(gh pr view {pr} --repo {repo} --json mergedAt,baseRefName -q ''[.mergedAt,
          .baseRefName] | @tsv''); mergedAt=$(echo "$result" | cut -f1); base=$(echo "$result" | cut -f2);
          [ -n "$mergedAt" ] && [ "$mergedAt" != "null" ] && [ "$base" = "main" ]'
  - id: dod-003
    description: Tests pass in CI
    source: generated
    checks:
      - check_type: command
        check_value: 'result=$(gh pr view {pr} --repo {repo} --json statusCheckRollup -q ''[.statusCheckRollup[]
          | select(.name == "Tests") | .conclusion] | first // empty''); [ "$result" = "SUCCESS" ]'
