schema_version: "1.0.0"
ticket_id: "OMN-12580"
title: "Phase 5: OCC evidence draft orchestrator + deterministic validator (omnimarket)"
summary: >-
  Bind central evidence for omnimarket Phase 5 of the node-based runtime deployment + OCC automation design.
  Adds node_occ_evidence_draft_orchestrator (orchestrator) that drafts OCC evidence via local-model delegation
  over onex.cmd.omnibase-infra.delegation-request.v1 (never calling a model directly; drafts are always
  PROVISIONAL) and node_occ_evidence_validator_compute (pure deterministic compute) whose PASS path emits
  the EXISTING compat ModelEvidenceValidationResult on onex.evt.omnimarket.evidence-validated.v1 so the
  existing node_occ_pr_writer_effect consumer fires (blocker B4), rejecting on onex.evt.omnimarket.occ-evidence-draft-rejected.v1.
  No new Plugin* classes, no parallel deployment FSM, and no new build/deploy/probe effect node; node_redeploy
  remains the only deployment orchestrator. The nodes touch a node path (src/omnimarket/nodes/**), so
  the deploy-keyword evidence below runs the redeploy lane FSM deploy tests alongside the Phase 5 draft-to-validate-to-OCC-PR
  chain.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
  - "envelopes"
