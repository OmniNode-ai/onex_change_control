schema_version: "1.0.0"
ticket_id: "OMN-13676"
title: "WS-5 Wave 2 multi-parameter integration tests — runtime/infra sweeps (+ collector seam)"
summary: >-
  omnimarket PR #1481 adds real multi-parameter end-to-end integration tests (full in-process handler
  passes, not smoke and not SKILL.md-shape grep) for seven Wave 2 nodes: node_env_parity_compute, node_bus_audit_compute,
  node_runtime_sweep, node_platform_readiness, node_environment_health_scanner, node_duplication_sweep,
  and node_database_sweep. Each test parametrizes at least three distinct param sets and carries at least
  one negative control that must force a concrete finding; assertions are on typed result fields / terminal-state
  payloads (counts, statuses, finding structures). All external I/O (psql, container/kafka/projection
  probes, filesystem scans) is satisfied by constructor-injected collaborators or real synthetic fixtures
  under tmp_path; nothing is monkeypatched. PRE-WORK adds an additive, backward-compatible collector seam
  to node_database_sweep (a constructor-injected PsqlRunner probe; production leaves it None and falls
  through to the live _psql at call time, so existing tests are unaffected). The change is otherwise test-only
  — no runtime handler, model, contract, topic, schema, migration, or .201/.200 runtime state is mutated.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >-
      The seven Wave 2 node integration test directories pass in-process on the direct handler path with
      no live Kafka, psql, or .201 (54 parametrized cases passed).
    command: "uv run pytest tests/integration/node_env_parity_compute tests/integration/node_bus_audit_compute
      tests/integration/node_runtime_sweep tests/integration/node_platform_readiness tests/integration/node_environment_health_scanner
      tests/integration/node_duplication_sweep tests/integration/node_database_sweep -q"
  - kind: "tests"
    description: >-
      The existing node_database_sweep unit, golden-chain, and integration suites remain green after the
      additive PsqlRunner seam (36 passed).
    command: "uv run pytest tests/unit/nodes/node_database_sweep tests/test_golden_chain_database_sweep.py
      tests/integration/node_database_sweep -q"
  - kind: "tests"
    description: >-
      Full non-Kafka omnimarket suite passed locally before opening PR #1481 (9942 passed, 46 skipped).
    command: "uv run pytest -m 'not kafka'"
