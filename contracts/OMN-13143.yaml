---
schema_version: "1.0.0"
ticket_id: "OMN-13143"
title: "omnimarket _load_bifrost_endpoints() silently returns {} on contract load failure — fail loud
  (Rule-8 residue)"
summary: >-
  _load_bifrost_endpoints() in the delegation-routing reducer swallowed contract/overlay load failures
  (except (FileNotFoundError, ValueError, yaml.YAMLError): return {}) so a misconfigured or missing bifrost
  contract silently yielded zero backends, degraded the router to tier-only routing, and froze the empty
  result for the process lifetime via @lru_cache — a silent wrong-default of exactly the class CLAUDE.md
  Rule 8 exists to prevent. Folded into omnimarket PR #1215 (branch jonah/omn-13140-cloud-escalation,
  base=dev, head 3d507076965b94c185846a0c2e19cec9f5c200fb) because it touches the same file as OMN-13140
  GATE 3. The fix replaces the silent return {} with fail-loud behavior: emit structured evidence (bifrost_endpoint_load_failed
  / bifrost_no_usable_endpoints) and re-raise ProtocolConfigurationError, distinguishing "no override
  configured -> packaged default" (legitimate; loader still loads the packaged default) from "configured-but-unloadable
  / zero usable endpoints" (must fail). A failing-first test asserts a missing/invalid contract raises
  (not silent {}) and that structured evidence is logged on failure. Scope kept narrow per the ticket:
  loader fallback semantics only; no runtime restart / re-probe work folded in.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
