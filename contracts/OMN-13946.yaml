ticket_id: "OMN-13946"
title: "CI runner image missing libatomic1 — Pyright fails with \"node: libatomic.so.1: cannot open shared
  object file\""
summary: >-
  The self-hosted CI runner image's bundled GitHub Actions node runtime (used by node-based actions, e.g.
  the Pyright action) dlopens libatomic.so.1 at load time. Ubuntu 22.04 does not pull libatomic1 in transitively,
  so every node-based action on the runner image fails deterministically with "node: libatomic.so.1: cannot
  open shared object file" — a real missing-system-lib defect, not a transient fleet issue. This blocked
  omniclaude PR #1860 (OMN-13502) and would block any omniclaude PR that runs pyright regardless of fleet
  health. omnibase_infra PR binds this contract: adds libatomic1 to the runner image apt install list,
  bumps image_version 5->6 (a real image content change), and regenerates the bound identity in docker/runners/runner-image.lock.json.
  The Dockerfile apt-list is not itself a binding input to the identity digest, so identity_digest only
  moves because image_version does; shared_env_digest is unchanged. This is pre-deploy code evidence only
  — the image rebuild + fleet redeploy on .201 is a separate gated live-runtime step, out of scope here.
