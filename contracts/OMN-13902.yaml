---
schema_version: "1.0.0"
ticket_id: "OMN-13902"
title: "Cross-repo sibling version-alignment automation — sibling-lock-refresh workflow (canary + fan-out)"
summary: >-
  Closes the recurring stale-sibling-lock drift class. Detection existed (sibling-pin guard OMN-12977,
  orphan-pin gate OMN-13509) but alignment was manual, so drift recurred and blocked work (OMN-13156,
  OMN-13402, OMN-13814 were one-off repin tickets; the 2026-07-03 R3 stability refresh was blocked by
  a stale core pin). The fix is a Dependabot-shaped, per-repo scheduled workflow (.github/workflows/sibling-lock-refresh.yml)
  that runs `uv lock --upgrade-package` for each omninode sibling on a daily schedule (and workflow_dispatch)
  and opens a bot PR when uv.lock changes. Git/tag-pinned siblings in [tool.uv.sources] are left untouched
  — `uv lock --upgrade-package` cannot move an immutable rev/tag — so the Dep-Provenance state is preserved
  automatically with no per-repo tuning. Landed on the omnimemory canary first (PR #400, all gates green
  incl. Dep Provenance Gate), then fanned out to the other PyPI-range consumers (omniclaude, omniintelligence,
  omnibase_infra). This is a docs/CI-only change: each PR adds one workflow YAML file, touches no runtime
  contract, and performs no deploy, restart, image build/push, or live cluster mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
