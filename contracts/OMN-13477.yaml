title: "refactor: drive delegation FSM via contract typed-FSM advance + per-step dispatch (zero _transition
  calls)"
summary: >-
  Track A W5 of the delegation-orchestrator decomposition (epic OMN-13471), gated on W2 (OMN-13474, DONE):
  builds on its typed, executor-bound ModelFSMSubcontract binding. Before this wave HandlerDelegationWorkflow
  hand-drove its FSM through an imperative _transition guard (15 call sites) backed by a parallel _VALID_TRANSITIONS
  set, and routed every payload through a hand-maintained isinstance ladder in handle(). This wave removes
  both. State advancement now flows through a single _advance(workflow, target) surface that resolves
  each edge from the typed _DECLARED_TRANSITIONS projection of the contract FSM (the same typed ModelFSMStateTransition
  objects the canonical core FSM executor consumes) and rejects any edge the contract does not declare
  — so the contract FSM, not handler logic, is the transition authority. The imperative _transition method,
  its _VALID_TRANSITIONS set, and all 15 _transition call sites are gone (imperative _transition call
  count = 0, asserted by an AST gate test). Payload dispatch is table-driven via _PER_STEP_DISPATCH (one
  entry per handler_routing event_model the contract declares, routing_strategy payload_type_match), with
  no catch-all branch: an undeclared payload type fails closed. Behavior preserved: the full delegation
  unit suite passes unchanged and the async handle() dispatch path reaches identical FSM state + identical
  terminal events vs the per-step methods. Purely intra-omnimarket change; no core wire DTO changes. Blocks
  W6 (OMN-13478, ARCH-004 ratchet baseline-exemption removal).
