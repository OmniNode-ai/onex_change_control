---
schema_version: "1.0.0"
ticket_id: "OMN-11245"
title: "feat(OMN-11245): contract registry node in omnimarket"
summary: >
  Adds node_contract_registry in omnimarket as the central policy enforcement node for dynamic contract
  registration requests. The node validates request schema, contract hash, handler allowlist, runtime
  profile eligibility, and version conflicts before publishing materialization or rejection events.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "topics"
  - "public_api"
evidence_requirements:
  - kind: "ci"
    description: "omnimarket PR #706 carries the implementation branch."
    command: "gh pr view 706 --repo OmniNode-ai/omnimarket"
  - kind: "tests"
    description: "Focused node unit tests pass locally."
    command: "cd omnimarket && uv run pytest tests/unit/nodes/test_node_contract_registry/ -q"
  - kind: "tests"
    description: "Runtime profile ownership validation passes locally."
    command: "cd omnimarket && uv run pytest tests/validation/test_runtime_profile_contracts.py -q"
  - kind: "manual"
    description: "No live deploy or .201 mutation was performed; post-merge runtime image must import
      the handler before live producers publish registration commands."
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnimarket.nodes.node_contract_registry.handlers.handler_contract_registry
      import ContractRegistryHandler; print(ContractRegistryHandler.__name__)\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-706"
    description: "omnimarket PR #706 is open against main and points at the validated OMN-11245 branch
      head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11245/dod-omnimarket-pr-706/command.yaml
          && grep -q '^pr_number: 706$' drift/dod_receipts/OMN-11245/dod-omnimarket-pr-706/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused node unit tests passed locally on the PR worktree."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11245/dod-focused-tests/command.yaml
          && grep -q '7 passed' drift/dod_receipts/OMN-11245/dod-focused-tests/command.yaml"
  - id: "dod-runtime-profile"
    description: "Runtime ownership validation passed for node_contract_registry descriptor.runtime_profiles."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11245/dod-runtime-profile/command.yaml
          && grep -q '1 passed' drift/dod_receipts/OMN-11245/dod-runtime-profile/command.yaml"
  - id: "dod-runtime-sweep"
    description: "Runtime sweep loaded all onex.nodes entry points including node_contract_registry."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11245/dod-runtime-sweep/command.yaml
          && grep -q '186/186 entry points OK' drift/dod_receipts/OMN-11245/dod-runtime-sweep/command.yaml"
  - id: "dod-deploy-assessment"
    description: "No live deploy, runtime restart, Kafka mutation, or .201 mutation was performed; deploy
      validation is post-merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11245/dod-deploy-assessment/command.yaml
          && grep -q 'No live deploy' drift/dod_receipts/OMN-11245/dod-deploy-assessment/command.yaml"
  - id: "dod-occ-pr"
    description: "OCC PR carrying the central OMN-11245 contract and binding receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11245/dod-occ-pr/command.yaml"
