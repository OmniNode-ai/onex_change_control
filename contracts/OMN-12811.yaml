  residual are all in out-of-scope task-delegated e2e-probe, shadow-comparison/node-generation, and shared
  project_event terminal-emit paths). Snake_case field-name fallbacks within the one schema are retained.
  _preserve_existing_evidence is retained; it is a load-bearing OMN-13596/13408/13535 terminal-ordering
  race guard, not a camelCase shim. No runtime node behavior change, no deploy, no .201 mutation.
