---
schema_version: "1.0.0"
ticket_id: "OMN-13415"
title: "Deployed-migration-tree sync gate — abort deploy on stale bind-mounted forward-migration tree"
summary: >
  Recurrence guard for the stability-promotion footgun where ~/.omnibase/infra/deployed/<ver>/docker/migrations/forward
  was bind-mounted and carried a stale 0016 (4645 bytes) with no 0018/0019, so the lane looked "deployed"
  while forward-migration ran the WRONG migration SQL — caught only by an out-of-band rsync from the .201
  canonical clone before recreate. scripts/check_deployed_migration_tree_sync.py asserts the deployed
  (bind-mounted) forward-migration tree is byte-identical to the canonical clone @ the target SHA, using
  the clone's git object at the ref as the source of truth (git ls-tree / git cat-file blob); it detects
  missing, stale/modified, and extra-leftover files (exit 1 on drift, exit 2 on config error — fails closed).
  deploy-runtime.sh calls assert_deployed_migration_tree_synced after sync_files and BEFORE snapshot_migration_tree
  / the forward-migration phase, so a drifted deployed tree ABORTS the deploy instead of silently mis-migrating.
  node-migration-sync.yml gains a deployed-migration-tree-sync-logic job that runs the unit suite as a
  logic-regression gate (the live deploy-time compare cannot run on a hosted runner with no deployed tree;
  the logic gate guards the comparison from regressing — same pattern as the sibling-lock-pins logic gate).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Deployed-migration-tree sync unit + live-smoke suite: in-sync-passes, stale-fails (the footgun),
      missing-fails (the 0018/0019 case), extra-leftover-fails, nested-node-migration drift, and bad-ref
      / non-git / absent-tree config errors.
    command: "uv run pytest tests/scripts/test_check_deployed_migration_tree_sync.py -q"
