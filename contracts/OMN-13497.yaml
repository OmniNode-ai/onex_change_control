title: "SEA-generated no-faked-boundary validator (corpus-accepted, report-only)"
summary: >-
  Lands a generated, corpus-accepted COMPUTE validator that bans hand-written fakes/stubs of the platform's
  OWN inference / routing / dispatch boundary (the "handler-isolation passes while live fails" fakes).
  The acceptance corpus + generation driver land in omnimarket (PR #1348); the generated validator (handler
  + models + two-transport runner + pre-commit hook) lands in omnibase_core (PR #1305). The scanning logic
  was generated by node_generation_consumer against the live local model Qwen3.6-35B-A3B and accepted
  ONLY because it passed a deterministic acceptance corpus in the hardened sandbox (corpus is the authority,
  not the LLM). The gate lands REPORT-ONLY: a real shadow run across omnimarket + omnibase_core + omniclaude
  surfaced ~106 pre-existing genuine boundary-fakes (not false positives); it flips to blocking when that
  population reaches zero. This central OCC evidence binds OMN-13497 to omnibase_core PR #1305 and omnimarket
  PR #1348 and records that the PRs add no live deploy mutation.
