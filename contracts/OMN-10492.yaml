ticket_id: OMN-10492
title: Replace raw Postgres probe with runtime HTTP health check in system_status
summary: >-
  The check_database_health sub-skill described probing Postgres directly from the Mac, which violates
  the architecture rule that the Mac must never connect to Postgres directly. Replace the raw psql/psycopg2
  probe with an HTTP GET against the runtime health endpoint (http://192.168.86.201:8085/health), overridable
  via OMNINODE_RUNTIME_HEALTH_URL. Update SKILL.md to reflect the HTTP-based data path (Mac -> runtime
  health endpoint -> Postgres) and add unit tests asserting no psql/psycopg2 usage.
