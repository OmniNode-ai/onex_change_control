title: "feat(OMN-11244): event-driven contract materialization in KafkaContractSource"
summary: >
  Adds materialize_cached_contract() to KafkaContractSource so that a node descriptor already in the in-memory
  cache can be wired into the live dispatch engine post-startup without a runtime restart. Adds EnumMaterializationStatus,
  EnumMaterializationRejection, EnumContractSource enums and ModelDynamicMaterializationResult frozen
  Pydantic model. Idempotency via (node_name, sha256_hash) keyed set. Version conflict guard prevents
  different-hash re-wiring. Profile/handler policy delegated to omnimarket. Part of epic OMN-11241.
