ticket_id: "OMN-12942"
title: "fix(OMN-12942): restore llm_routing base-table-before-view migration + base-table-before-view
  ordering gate"
summary: >-
  Restore the node_projection_llm_routing projection view migration that was pruned during the 2026-06-11
  04:24Z stability hot-patch. The 0001 view composes projection_routing_decision over llm_routing_decisions,
  but that base table only existed in the flat infra forward set (065) — never in the node's own migration
  set — so a clean node-set forward run hard-fails on the missing relation (leading hypothesis for the
  :13002 projection-api instability, P0.1b / OMN-12953). The fix adds an idempotent, self-contained base
  table migration 0000_create_llm_routing_decisions.sql (schema identical to infra 065) ordered before
  the view, and ships an enforcement ratchet — scripts/ci/check_migration_base_before_view.py — that statically
  asserts every node migration set creates base tables (or earlier views) before any view that reads them,
  wired as a pre-commit hook AND a ci.yml step with tests/ci/test_check_migration_base_before_view.py.
  node_projection_savings/077 was pruned alongside but is already correctly ordered in-node (074 base
  before 077 view); the gate confirms it. No live lane mutated; runtime re-verification is deploy_pending
  behind the batch stability rebuild.
