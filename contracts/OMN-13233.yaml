schema_version: "1.0.0"
ticket_id: OMN-13233
title: "feat(delegation): remove ANTHROPIC_API_KEY ceiling default; ceiling resolves per-tenant from config
  like every tier"
summary: >
  Remove the committed api_key_env: ANTHROPIC_API_KEY from cloud-sonnet and cloud-haiku backends in bifrost_delegation.yaml.
  Both backends already declare secret_ref: llm.anthropic.api_key, which is the per-tenant contract+store
  resolution path. The api_key_env field is the legacy env-var fallback that special-cased the ceiling
  tier. After this change, ceiling tier auth resolves through secret_ref (per-tenant store path) identical
  to cheap_cloud and every other tier. No handler changes required — resolved_secret_ref property already
  prioritises secret_ref.
