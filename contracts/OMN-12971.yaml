ticket_id: "OMN-12971"
title: "P2.6: Vertex runtime wiring — Vertex backend in routing overlay + ADC bearer-token delivery to
  effects container (secret-ref discipline)"
summary: >-
  Wire the Vertex-served Gemini path (the Vertex $500-credit / ADC path, proven HTTP 200 from .201) into
  the routing authority and runtime, ADDITIVE next to the existing Gemini AI-Studio API-key path. Both
  routes stay selectable so the platform remains provider-agnostic; neither provider is removed or forced.
  omnimarket adds the cloud-vertex-gemini bifrost backend (secret_ref=llm.vertex.access_token, endpoint_url
  null in repo default so the runtime policy contract supplies the COMPLETE project+region Vertex OpenAI-compat
  URL via BIFROST_VERTEX_GEMINI_ENDPOINT_URL), a vertex-gemini-flash routing-tier entry, and a model-registry
  entry plus a requires_secret_ref field on ModelLlmModelProfile. The Vertex backend reuses the standard
  api-key/bearer dispatch path (backend.resolved_secret_ref -> intent.api_key_ref -> Authorization: Bearer
  <token>), so no inference-handler change is required. The bearer token is a short-lived OAuth access
  token minted from ADC and resolved fail-closed at the effect boundary; the token VALUE is never committed
  — only the logical ref name lives in config. omnibase_infra delivers ADC to the runtime: runtime_policy.contract.yaml
  adds a secret-source mapping llm.vertex.access_token (source_type=file, /run/secrets/vertex_access_token)
  to the dev/stability-test/judge profiles, adds aiplatform.googleapis.com to the cloud host allowlist,
  owns GOOGLE_CLOUD_PROJECT / GOOGLE_CLOUD_LOCATION / BIFROST_VERTEX_GEMINI_ENDPOINT_URL in the rendered
  runtime-policy.env surface, and docker-compose.infra.yml binds the operator-supplied host token file
  read-only into the main and effects runtimes (default /dev/null so non-Vertex lanes still start and
  the Gemini key path is unaffected). ENFORCEMENT RATCHET (same PR set): omnimarket scripts/ci/check_backend_secret_discipline.py
  fails if any literal credential value lands in routing-authority config or if an authenticated cloud
  backend lacks a logical secret/credential ref; wired as a pre-commit hook AND a CI gate. No topic schema,
  envelope, or contract API change. Runtime effect arrives only via the standard batched stability/runtime
  image rebuild — no live deploy is performed by these PRs.
