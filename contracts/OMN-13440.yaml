ticket_id: "OMN-13440"
title: "feat(OMN-13440): deploy-effect prod-refusal + grant target binding"
summary: >-
  Phase 3 (epic OMN-13410, parent OMN-13418) defense-in-depth: close the deploy-agent off-gate path, shipped
  on omnimarket source PR #1330. The deploy publish-monitor EFFECT (node_redeploy_deploy_effect / handler_deploy_publish_monitor)
  now independently refuses a prod ModelDeployPublishCommand unless it carries a verified promotion_grant
  whose (approved_lane == PROD, approved_image_digest, approved_promotion_batch_id) MATCH the command's
  (runtime_lane, image_digest, promotion_batch_id) — target binding, NOT mere grant_id presence: a grant
  for batch/digest A never authorizes a deploy of batch/digest B. On a refusal the deploy EFFECT publishes
  NOTHING to the deploy agent — the rebuild-requested command is never emitted — and instead emits a typed
  ModelDeployRefusedEvent (EnumProdGrantReason: missing_promotion_grant | grant_lane_mismatch | grant_digest_mismatch
  | grant_batch_mismatch | expired_promotion_grant) on the contract-declared onex.evt.omnimarket.redeploy-deploy-refused.v1
  topic. The pure verify_prod_deploy_grant_binding helper mirrors the prod-gate COMPUTE so the deploy-agent
  path is closed even if the upstream gate were bypassed. The redeploy ORCHESTRATOR threads the out-of-band-resolved
  grant + batch + evaluated_at from the gate command into the deploy-publish command (the grant is taken
  ONLY from the gate command, NEVER from the start request; absent grant -> deploy fails closed). Scoped
  to the deploy-agent path only — raw ssh+docker is Phase 4 doctrine + script-locking (OMN-13413), tracked
  not closed; 3.2 closeout-orchestrator routing stays in OMN-13413. Canonical EFFECT, NO REST. dev/stability
  deploys are byte-for-byte unchanged (the non-prod binding check is a no-op). Depends on the grant model
  (OMN-13436) + resolver (OMN-13439), both merged on dev. This OCC PR carries the central contract consumed
  by the omnimarket PR #1330 Receipt Gate via Evidence-Source.
is_seam_ticket: false
