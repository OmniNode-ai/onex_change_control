---
schema_version: "1.0.0"
ticket_id: "OMN-11697"
title: "Add closeout chain compute nodes to omnimarket"
summary: >-
  Bind central OCC evidence for omnimarket PR #757, which adds the Wave 1 closeout-chain compute nodes
  node_chain_diff_compute and node_closeout_verifier_compute using shared omnibase_core pipeline models.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "topics"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "Focused closeout-chain node tests, import/entry-point checks, runtime sweep, and catalog
      validation pass locally."
    command: >-
      uv run pytest tests/nodes/node_chain_diff_compute tests/nodes/node_closeout_verifier_compute -q
      && uv run pytest tests/ci/test_check_no_hardcoded_topics.py tests/ci/test_check_unimported_handlers.py
      tests/test_all_node_entry_points_are_package_form.py -q && uv run python scripts/ci/run_runtime_sweep.py
      && uv run python scripts/lint_no_hardcoded_topics.py && uv run python scripts/validate_node_drift.py
      --check-changed origin/main --strict && uv run python scripts/validate_catalog.py --root src/omnimarket
      --check-pack-fields
  - kind: "ci"
    description: "omnimarket PR #757 required non-receipt CI passes at the observed PR head."
    command: "gh pr checks 757 --repo OmniNode-ai/omnimarket --required"
  - kind: "manual"
    description: "No live deploy, runtime restart, Kafka mutation, or .201 mutation was performed for
      these pure compute nodes."
    command: "uv run python scripts/ci/run_runtime_sweep.py"
dod_evidence:
  - id: "dod-omnimarket-pr-757"
    description: "Bind OMN-11697 evidence to omnimarket PR #757 at the observed Wave 1 closeout-chain
      head."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-omnimarket-pr-757/command.yaml"
          && grep -q '^pr_number: 757$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-omnimarket-pr-757/command.yaml"
          && grep -q '^commit_sha: "44d21f30e213f3c331087285a53d0f09b7324c47"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-omnimarket-pr-757/command.yaml"
          && grep -q 'node_chain_diff_compute' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-omnimarket-pr-757/command.yaml"
          && grep -q 'node_closeout_verifier_compute' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-omnimarket-pr-757/command.yaml"
  - id: "dod-local-validation"
    description: "Focused local validation passed for the new closeout-chain nodes and repo gates that
      cover their registration."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-local-validation/command.yaml"
          && grep -q '13 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-local-validation/command.yaml"
          && grep -q '22 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-local-validation/command.yaml"
          && grep -q 'runtime_sweep: 207/207 entry points OK' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-local-validation/command.yaml"
          && grep -q 'node-drift-gate: PASS' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-local-validation/command.yaml"
          && grep -q 'catalog validate: OK' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-local-validation/command.yaml"
  - id: "dod-deploy-assessment"
    description: "Deploy assessment for pure compute nodes: no live deploy or runtime mutation was performed;
      runtime sweep proves entry-point load locally."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-deploy-assessment/command.yaml"
          && grep -q 'No live deploy' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-deploy-assessment/command.yaml"
          && grep -q 'runtime_sweep: 207/207 entry points OK' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-deploy-assessment/command.yaml"
  - id: "dod-occ-pr-self"
    description: "Bind OMN-11697 central evidence to the OCC PR that carries this contract and receipt
      bundle."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-occ-pr-self/command.yaml"
          && grep -q '^ticket_id: "OMN-11697"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11697/dod-occ-pr-self/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
