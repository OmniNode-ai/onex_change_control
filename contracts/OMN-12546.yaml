schema_version: "1.0.0"
ticket_id: "OMN-12546"
title: "S-1b: Promote rich ModelDispatchResult (+ModelDispatchOutputs/Metadata/HandlerRef) to core"
summary: >-
  Binds central OCC evidence for two PRs landing the S-1b dispatch-model promotion (epic OMN-12525). omnibase_core
  PR #1351 (commit fe2d82cbaa852cd2b93bb23ca7e5ba982554b0bc) replaces the thin dead core ModelDispatchResult
  (handler_id/list[str]/dict/str-error_code) with the rich infra shape (dispatcher_id, ModelDispatchOutputs,
  ModelDispatchMetadata, EnumCoreErrorCode, output_events, output_intents, projection_intents, dlq_topic,
  required started_at). Three new models are added to omnibase_core/models/dispatch/: model_dispatch_outputs.py,
  model_dispatch_metadata.py, model_handler_ref.py. The dead core MessageDispatchEngine (runtime_message_dispatch.py)
  and its test (test_message_dispatch_engine.py) are deleted -- the engine had zero production callers,
  only imported by its own test, and the real live dispatch path is the infra MessageDispatchEngine (message_dispatch_engine.py).
  omnibase_infra PR #2119 (commit eec3f2d6a) converts four infra model files to re-exports from core (same
  pattern as S-1a EnumDispatchStatus, OMN-12545): model_dispatch_result, model_dispatch_outputs, model_dispatch_metadata,
  model_handler_ref. Core pin bumped from 287511f20 to fe2d82cbaa8. Import identity verified: infra symbols
  are the same class objects as core symbols. No live deploy, runtime restart, or topic mutation required
  -- pure model/code relocation. Core: 37 handler-registry tests pass, 0 new mypy errors. Infra: 6599
  unit tests pass, 0 failures. S-1c (ModelHandlerRoutingEntry unify, OMN-12547) is now unblocked.
is_seam_ticket: false
