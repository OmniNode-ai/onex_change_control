---
schema_version: "1.0.0"
ticket_id: "OMN-11029"
title: "Install exact built wheel path in shared Receipt Gate installer"
summary: >
  Binds omnibase_core PR #1079, which changes the shared Receipt Gate workflow installer to install the
  exact locally built `omnibase_core-*.whl` path instead of resolving the bare `omnibase-core` package
  name. This prevents downstream caller repositories from installing stale published core versions during
  receipt-gate validation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnibase_core PR #1079 carries the exact built wheel-path installer fix."
    command: "gh pr view 1079 --repo OmniNode-ai/omnibase_core --json state,headRefOid"
  - kind: "tests"
    description: "Focused workflow-shape regression tests pass for the shared Receipt Gate workflow."
    command: "uv run pytest tests/unit/validation/test_receipt_gate_workflow_shape.py -q"
  - kind: "manual"
    description: "Temp-venv repro shows the old package-name install fails on omnibase-core==0.40.1 while
      the patched exact wheel path installs locally built 0.40.2."
    command: "manual temp-venv repro from omniintelligence caller context"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11029 to omnibase_core PR #1079 and the implementation
      validation evidence."
    command: "find drift/dod_receipts/OMN-11029 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-core-pr-1079"
    description: "omnibase_core PR #1079 carries the OMN-11029 exact built wheel-path installer fix."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11029/dod-omnibase-core-pr-1079/command.yaml
          && grep -q '^pr_number: 1079$' drift/dod_receipts/OMN-11029/dod-omnibase-core-pr-1079/command.yaml
          && grep -q '^commit_sha: fad949cf4644fb4e732b503e94aa9d09f0c1d7ca$' drift/dod_receipts/OMN-11029/dod-omnibase-core-pr-1079/command.yaml"
  - id: "dod-workflow-shape-tests"
    description: "Focused Receipt Gate workflow-shape tests pass and cover exact local wheel-path installation."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11029/dod-workflow-shape-tests/command.yaml
          && grep -q '13 passed' drift/dod_receipts/OMN-11029/dod-workflow-shape-tests/command.yaml"
  - id: "dod-temp-venv-repro"
    description: "Temp-venv repro from omniintelligence proves the old install command fails on stale
      omnibase-core==0.40.1 and the patched command installs the locally built 0.40.2 wheel."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11029/dod-temp-venv-repro/command.yaml
          && grep -q 'old command fails on omnibase-core==0.40.1' drift/dod_receipts/OMN-11029/dod-temp-venv-repro/command.yaml
          && grep -q 'locally built omnibase-core==0.40.2' drift/dod_receipts/OMN-11029/dod-temp-venv-repro/command.yaml"
  - id: "dod-occ-pr-1022"
    description: "onex_change_control PR #1022 carries the central OMN-11029 contract and receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11029/dod-occ-pr-1022/command.yaml
          && grep -q '^pr_number: 1022$' drift/dod_receipts/OMN-11029/dod-occ-pr-1022/command.yaml"
