---
schema_version: "1.0.0"
ticket_id: "OMN-13030"
title: "feat(OMN-13030): per-repo VCS provenance in build-provenance.json + evidence-probe gate"
summary: >-
  OCC evidence for omnibase_infra product PR. Extends scripts/runtime_build/stage_workspace.sh to stamp
  per-sibling {vcs_ref, vcs_dirty, vcs_branch} at staging time (the only point where the source clone's
  git history is reachable; rsync strips .git from the staged tree) into workspace/sibling-vcs-provenance.json,
  aborting the build non-zero when any sibling's git history is unreadable rather than stamping "unknown".
  compute_workspace_provenance.py folds that per-repo VCS provenance into /app/build-provenance.json under
  per_repo_vcs_provenance and renames the ambiguous top-level vcs_ref field to infra_vcs_ref. Adds a pre-commit
  + CI evidence-lint gate (scripts/check_evidence_provenance_probe.py) rejecting any handoff/OCC doc that
  asserts a concrete deployed SHA without an adjacent docker-exec build-provenance.json probe. Ships a
  per-container-SHA handoff template and a build-provenance JSON schema.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
