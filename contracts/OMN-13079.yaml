title: "feat(omnimarket): projection contract for live-events stream (NC-06)"
summary: >-
  Adds node_projection_live_events — a reducer node that projects platform-wide bus events into the live_events
  table, backing the omnidash live-event-stream widget (onex.snapshot.projection.live-events.v1). The
  widget was palette-hidden because no contract existed; this PR adds the canonical contract, handler,
  migration, and 33 unit tests. Node subscribes to platform log-entry, node-heartbeat, node-introspection,
  node-state-change, and omnibase-infra delegation terminal events. Deduplicates by event_id.
