summary: >-
  omnibase_core PR #1422 retires 20 of the 24 `types.** -> models` import-layering back-edges (epic OMN-3210)
  via three mechanisms: (1) ModelSemVer field annotations (9 edges, 345+ importers, cannot relocate —
  ModelSemVer imports ModelOnexError) repointed to a new structural ProtocolSemVer in types/type_semver.py;
  (2) eight immovable domain-model annotations widened to object / Sequence[object] as producer-only pass-through
  fields; (3) the dead ModelBaseCollection/ModelBaseFactory lazy re-export removed from types/type_constraints.py
  + types/__init__.py. The two `types -> models` wildcard ignore lines are NARROWED (partial ratchet)
  to 4 residual pins, each genuinely pinned to a concrete model and deferred to follow-up OMN-14339 (type_schema_aliases->model_schema_value;
  typed_dict_validator_info->model_validation_result; typed_dict_output_format_options_kwargs->model_value;
  typed_dict_lifecycle_event_fields->model_semver). Verified by the import-linter oracle with unmatched_ignore_imports_alerting=ERROR:
  4 kept / 0 broken / 0 unmatched proves both that the 20 edges are genuinely gone and that all 4 residual
  pins are real edges.
