title: "refactor(OMN-14246): colonize node_code_enrichment_effect to thin canonical shape"
summary: >-
  omnimarket product PR (branch jonah/omn-14242-canary-code-enrichment, head c78fa7ce8d29f41e2c806ed82d39eec6c730f7fc)
  migrates HandlerCodeEnrichmentEffect from the bucket-C flattened-kwargs shape to the canonical thin
  shape under the OMN-14242 node-scaffolder colonization pass. The repository dependency is now constructor-injected
  and handle() takes a single typed ModelCodeEnrichmentRequest payload instead of the flattened (correlation_id,
  repository, llm_endpoint_override, batch_size) kwargs. Behavior shift: batch_size <= 0 validation moves
  from a manual in-handler ValueError to Field(gt=0) on ModelCodeEnrichmentRequest, so it now fails at
  payload construction rather than inside handle(); a new test test_invalid_batch_size_rejected_by_model
  covers this. The change is limited to the node's handler + test modules and has no runtime dispatch
  blast radius (no production caller instantiates the handler outside tests today). This is public-safe
  generic architecture-hygiene work, not RSD-mechanism code.
