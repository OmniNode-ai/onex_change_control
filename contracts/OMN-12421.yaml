    description: "omnibase_infra PR #1782 carries the Dockerfile runtime pin update."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"drift/dod_receipts/OMN-12421/dod-omnibase-infra-pr-1782/command.yaml\"
          && grep -q '^pr_number: 1782$' \"drift/dod_receipts/OMN-12421/dod-omnibase-infra-pr-1782/command.yaml\""
  - id: "dod-pin-validation"
    description: "The new omnibase_compat pin was validated as an ancestor of compat main and as exporting
      MAX_WORDS_PER_SENTENCE_RE; Dockerfile pin validation passed."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"drift/dod_receipts/OMN-12421/dod-pin-validation/command.yaml\"
          && grep -q 'MAX_WORDS_PER_SENTENCE_RE' \"drift/dod_receipts/OMN-12421/dod-pin-validation/command.yaml\""
  - id: "dod-deploy-readiness"
    description: "Runtime deploy gate evidence: the stale pin was the clean-redeploy crash root, and the
