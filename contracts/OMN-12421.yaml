schema_version: "1.0.0"
ticket_id: "OMN-12421"
title: "Advance stale OMNIBASE_COMPAT_REF pin so clean runtime redeploy works"
summary: >
  Bind central evidence for omnibase_infra PR #1782, which advances the runtime Dockerfile's
  OMNIBASE_COMPAT_REF from a stale commit that predates MAX_WORDS_PER_SENTENCE_RE to compat main
  commit 4d887307aae34d9d40d389ba91070cb411ce3df5. Without this pin update, a clean runtime image
  rebuild can crash PluginDelegation wiring when omnimarket@dev imports the newer compat symbol.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - protocols
  - public_api
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
