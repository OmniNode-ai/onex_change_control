schema_version: "1.0.0"
ticket_id: "OMN-13066"
title: "Cost projections 503 — unquoted reserved SQL identifier 'window'"
summary: >-
  Fixes a 503 on the cost.summary.v1 and cost.savings-overview.v1 projection endpoints caused by the column
  name 'window' being emitted unquoted in the SELECT list. 'window' is a PostgreSQL 14+ reserved word;
  an unquoted reference is misread as a WINDOW clause keyword, producing a syntax error. Fix: extend _quote_column_identifier
  in api_server.py with a _PG_RESERVED_WORDS frozenset so any contract column whose bare lowercase name
  is a PG reserved word is double-quoted at the single rendering callsite. No contract column rename,
  no DB migration, no wire-format change.
