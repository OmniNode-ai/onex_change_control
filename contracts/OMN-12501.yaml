schema_version: "1.0.0"
ticket_id: "OMN-12501"
title: "Quarantine Protocol handler declarations during auto-wiring"
summary: >
  The .201 stability runtime refresh exposed handler_routing entries that import typing.Protocol interfaces
  as handler classes. The resolver correctly treats Protocols as non-instantiable, but auto-wiring classified
  the resulting TypeError as resolver exhaustion and crashed runtime-effects boot. This contract records
  the fix: keep ordinary resolver TypeError fail-fast, but quarantine Protocol handler declarations as
  visible migration work.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra PR #1800 carries the Protocol handler quarantine fix at the recorded
      head SHA."
    command: "gh pr view 1800 --repo OmniNode-ai/omnibase_infra --json number,url,state,headRefOid,headRefName,title,baseRefName"
  - kind: "tests"
    description: "Focused auto-wiring quarantine regression suite passes locally at the recorded head
      SHA."
    command: "env -u PYTHONPATH uv run pytest tests/unit/runtime/auto_wiring/test_handler_wiring_async_incompat_quarantine.py
      -q"
  - kind: "manual"
    description: "onex_change_control PR #1938 publishes the OMN-12501 central contract and receipts."
    command: "gh pr view 1938 --repo OmniNode-ai/onex_change_control --json number,url,state,headRefOid,headRefName,title,baseRefName"
  - kind: "manual"
    description: "onex_change_control PR #1939 formats and hash-binds the OMN-12501 receipts."
