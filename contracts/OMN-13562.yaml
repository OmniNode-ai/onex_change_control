      os.environ["QDRANT_HOST"] / int(os.environ["QDRANT_PORT"]) reads across dev / stability-test / prod
      lane values, and fails closed (raises) when QDRANT_HOST is unset or blank — no silent localhost
      fallback. The port resolves via the inline ${env.QDRANT_PORT:6333} default when unset. Proven by
      the focused resolution-equivalence suite tests/nodes/node_memory_retrieval_effect/test_contract_descriptor.py
      plus the retrieval-node and navigation-history reducer suites (75 passed).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13562/dod-001/command.yaml"
