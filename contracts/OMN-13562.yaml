---
schema_version: "1.0.0"
ticket_id: "OMN-13562"
title: "env→contract migration (omnimemory Wave 1): QDRANT_HOST/QDRANT_PORT endpoint reads → overlay descriptor
  seam"
summary: >-
  Wave-1 endpoint→overlay migration (epic OMN-13556). Moves the direct os.environ QDRANT_HOST / QDRANT_PORT
  reads in omnimemory off raw env onto the canonical overlay seam: the node_memory_retrieval_effect contract
  declares descriptor.qdrant_host = "${env.QDRANT_HOST}" and descriptor.qdrant_port = "${env.QDRANT_PORT:6333}"
  (same convention as the infra node_vector_store_effect.descriptor.qdrant_url, OMN-13558), and a new
  contract_descriptor module resolves them through omnibase_infra.runtime.overlay.contract_env_ref.expand_contract_env_refs
  — the one sanctioned env-reading boundary — fail-closed (unset/blank host raises rather than silently
  defaulting to localhost). The runtime dispatch ModelHandlerQdrantConfig build (dispatch_handlers.py)
  and the navigation-history reducer's Qdrant client boundary now resolve via the descriptor; the module-level
  os.environ QDRANT_HOST/QDRANT_PORT reads and their # node-purity-ok grandfather suppressions are removed.
  A resolution-equivalence test proves the overlay resolves the same dev/stability/prod value the env
  var gave and fails closed when unset. The infra dependency is bumped 0.38.3→0.38.4 (rev 7e52d5b, matching
  omnimarket OMN-13557) to ship contract_env_ref. LLM_EMBEDDING_URL / OMNIMEMORY__EMBEDDING__SERVER_URL
  (Bifrost routing wave, OMN-12803/12815), OMNIMEMORY_PG_DSN / OMNIMEMORY_DB_URL (kernel/secret), and
  MEMGRAPH_* are DEFERRED and left untouched. This OCC PR carries the central contract consumed by the
  omnimemory PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
