ticket_id: "OMN-13026"
title: "A-4: Transport-mock lint — bare AsyncMock/MagicMock on EventBus/transport surfaces must carry
  spec=/spec_set="
summary: >-
  Retro A-4 (PROCESS_FAILURE_RETRO.md §3.A, Wall of Shame row 1). PR #1181 used AsyncMock() without spec=
  for an EventBusKafka mock; the test silently passed because MagicMock auto-generates attributes, masking
  a runtime-fatal missing EventBusKafka.stop(). Ships: (1) omnibase_core validator omnibase_core.validators.transport_mock_lint
  with 25 unit tests; (2) pre-commit hook transport-mock-lint exported from omnibase_core .pre-commit-hooks.yaml;
  (3) CI lint step in omnimarket and omnibase_infra with ratchet baseline (omnimarket: 101 violations/26
  files; omnibase_infra: 218 violations/63 files frozen in validation/transport_mock_baseline.yaml). New
  violations blocked immediately; existing violations tracked for drain via per-site tickets. DoD gate:
  reverting the #1181 fix (restoring bare AsyncMock) causes the test_pr_1181_pattern_fails_gate unit test
  to fail.
