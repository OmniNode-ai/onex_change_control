title: "P3 score-vs-required-bar escalation and projection visibility"
summary: >-
  Implements P3 of the delegation quality-gate redesign in omnimarket. Required-bar authority resolves
  from task_class contract defaults, workflow overrides that can narrow or raise, and request overrides
  only within declared contract bounds. Delegation escalation now compares actual_score to required_bar
  instead of trusting marker fallback hints; deterministic pre-filters remain reject-only and cannot promote
  output to adequate. Event/projection evidence exposes required_bar, actual_score, escalation_count,
  authority_source, score_source, and request override flags.
