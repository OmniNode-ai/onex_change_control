---
schema_version: "1.0.0"
ticket_id: OMN-10457
title: "Receipt evidence for YC demo epic PRs"
summary: "Adds central OCC ModelTicketContract YAML and DoD receipts for the OMN-10460, OMN-10461, OMN-10465,
  and OMN-10457 demo CLI PRs so downstream receipt gates can validate durable evidence from onex_change_control."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: ci
    description: "OCC evidence batch contracts validate and receipt gate passes for PR #618"
    command: "uv run validate-yaml contracts/OMN-10457.yaml contracts/OMN-10460.yaml contracts/OMN-10461.yaml
      contracts/OMN-10465.yaml && python -m omnibase_core.validation.receipt_gate_cli --pr-body '' --pr-title
      'docs(OMN-10457): receipt evidence for YC demo epic PRs' --contracts-dir contracts --receipts-dir
      drift/dod_receipts --current-repo onex_change_control --current-pr-number 618"
  - kind: ci
    description: "OmniMarket demo CLI focused tests pass for PR #520."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-demo-tests/command.yaml && grep
      -q '^pr_number: 520$' drift/dod_receipts/OMN-10457/dod-demo-tests/command.yaml"
  - kind: ci
    description: "OmniMarket strict typecheck passes for PR #520."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-demo-typecheck/command.yaml &&
      grep -q '^pr_number: 520$' drift/dod_receipts/OMN-10457/dod-demo-typecheck/command.yaml"
  - kind: ci
    description: "OmniMarket repo-local OMN-10457 deploy contract validates."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-demo-contract/command.yaml &&
      grep -q '^pr_number: 520$' drift/dod_receipts/OMN-10457/dod-demo-contract/command.yaml"
  - kind: ci
    description: "OmniMarket AB registry endpoint focused tests pass for PR #521."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-tests/command.yaml
      && grep -q '^pr_number: 521$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-tests/command.yaml"
  - kind: ci
    description: "OmniMarket AB registry endpoint lint passes for PR #521."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-lint/command.yaml
      && grep -q '^pr_number: 521$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-lint/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: "OCC evidence batch contracts validate and receipt gate passes for PR #618"
    source: generated
    checks:
      - check_type: command
        check_value: "if test -f drift/dod_receipts/OMN-10457/dod-001/command.yaml; then grep -q '^status:
          PASS$' drift/dod_receipts/OMN-10457/dod-001/command.yaml; else gh api repos/OmniNode-ai/onex_change_control/contents/drift/dod_receipts/OMN-10457/dod-001/command.yaml
          --jq .content | tr -d '\n' | base64 -d | grep -q '^status: PASS$'; fi"
  - id: dod-demo-tests
    description: "OmniMarket demo CLI focused tests pass for PR #520."
    source: manual
    checks:
      - check_type: command
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-demo-tests/command.yaml
          && grep -q '^pr_number: 520$' drift/dod_receipts/OMN-10457/dod-demo-tests/command.yaml"
  - id: dod-demo-typecheck
    description: "OmniMarket strict typecheck passes for PR #520."
    source: manual
    checks:
      - check_type: command
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-demo-typecheck/command.yaml
          && grep -q '^pr_number: 520$' drift/dod_receipts/OMN-10457/dod-demo-typecheck/command.yaml"
  - id: dod-demo-contract
    description: "OmniMarket repo-local OMN-10457 deploy contract validates."
    source: manual
    checks:
      - check_type: command
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-demo-contract/command.yaml
          && grep -q '^pr_number: 520$' drift/dod_receipts/OMN-10457/dod-demo-contract/command.yaml"
  - id: dod-ab-endpoint-tests
    description: "OmniMarket AB registry endpoint focused tests pass for PR #521."
    source: manual
    checks:
      - check_type: command
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-tests/command.yaml
          && grep -q '^pr_number: 521$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-tests/command.yaml"
  - id: dod-ab-endpoint-lint
    description: "OmniMarket AB registry endpoint lint passes for PR #521."
    source: manual
    checks:
      - check_type: command
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-lint/command.yaml
          && grep -q '^pr_number: 521$' drift/dod_receipts/OMN-10457/dod-ab-endpoint-lint/command.yaml"
