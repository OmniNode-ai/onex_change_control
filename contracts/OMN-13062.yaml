schema_version: "1.0.0"
ticket_id: "OMN-13062"
title: "migration-gate vacuity fix — sentinel discipline, wait-for-postgres, skip-manifest, sync-check
  nonzero (retro A-10)"
summary: >-
  Retro A-10 (recurrences OMN-12885, OMN-12934). Three vacuity bugs in the migration subsystem: (1) run-forward-migrations.sh
  set migrations_complete=TRUE via SQL migration 037 in mid-sequence, so later migrations (038-084) could
  fail while the gate read TRUE. Fix: clear the sentinel at startup, set TRUE + runner_completed_at only
  as the runner's FINAL act after all infra and node migrations succeed; any nonzero exit leaves the gate
  UNHEALTHY. Committed skip-manifest.yaml is the sole escape for intentionally-skipped migrations. (2)
  sync-node-migrations.sh --check exited 0 when omnimarket source was unresolvable — a vacuous gate that
  never detected drift. Fix: exit 2 when source absent in --check mode; single opt-out via SYNC_NODE_MIGRATIONS_SKIP_UNRESOLVABLE=1.
  (3) No Postgres-ready wait guard — first-boot initdb race could allow the runner to attempt DB operations
  before Postgres accepted connections. Fix: wait loop with PG_WAIT_RETRIES (default 30 x 2s). Migration
  085 adds runner_completed_at TIMESTAMPTZ column to db_metadata as the durable stamp of a successful
  runner completion. 22 regression tests. No live deploy required — migration 085 applies on the next
  scheduled lane rebuild.
