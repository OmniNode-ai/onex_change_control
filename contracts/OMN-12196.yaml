ticket_id: "OMN-12196"
title: "Resolve bifrost source contract from omnimarket package on first boot"
summary: >
  OMN-10865 deleted omnibase_infra/configs/bifrost_delegation.yaml when delegation moved to omnimarket,
  but BIFROST_SOURCE_CONTRACT_PATH in docker-compose.infra.yml still defaulted to the deleted path. On
  first boot or after a mid-write crash leaving a 0-byte target, the render script raised ProtocolConfigurationError.
  Fix: _resolve_default_source_path() resolves from omnimarket package via importlib.resources at import
  time, falling back to the legacy infra path when omnimarket is unavailable. Empty BIFROST_SOURCE_CONTRACT_PATH
  env var now falls through to the resolved default. Stale default cleared from docker-compose.infra.yml.
  4 new unit tests; 13/13 pass total.
