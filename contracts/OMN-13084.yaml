---
schema_version: "1.0.0"
ticket_id: "OMN-13084"
title: "feat(OMN-13084): expose swarm_runs on the projection API"
summary: >-
  node_projection_swarm (REDUCER) already upserts the swarm_runs table from terminal swarm-dispatch events,
  but its contract.yaml carried no projection_api stanza, so onex.snapshot.projection.swarm.runs.v1 was
  never discovered by build_projection_topic_map() nor served on the projection API surface. omnimarket
  PR #1537 adds the projection_api stanza (expose/topic/table/columns/order_by/freshness_column/limit
  with the onex-topic-allow snapshot-prefix annotation), declares db_io.db_tables[swarm_runs].migration,
  and ships a node-local migration 0001_create_swarm_runs.sql so the table materializes in the projection
  database (omnidash_analytics / NODE_POSTGRES_DB) the API reads; the pre-existing omnibase_infra forward/082_swarm_runs.sql
  only creates it in the flat infra DB (POSTGRES_DB), which would have left the topic DEGRADED. The PR
  is bound to head commit 228c9b8d24b608eca6c0e32c7175ba04d527ac07. This OCC contract supplies the central
  Evidence-Source/Evidence-Ticket proof required by the receipt and OCC eligibility gates.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "New TDD projection_api tests + the full-topic-map migration-coverage gate pass for PR
      #1537."
    command: "uv run pytest tests/test_golden_chain_projection_swarm.py -q"
  - kind: "ci"
    description: "omnimarket PR #1537 code and CI checks are green."
    command: "gh pr view 1537 --repo OmniNode-ai/omnimarket --json headRefOid,mergeable,statusCheckRollup"
  - kind: "manual"
    description: "Deploy assessment documents that this evidence PR performs no live deploy, restart,
      or .201 mutation."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13084/dod-deploy-assessment/command.yaml"
