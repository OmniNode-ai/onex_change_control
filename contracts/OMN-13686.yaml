---
schema_version: "1.0.0"
ticket_id: OMN-13686
title: "prune-worktrees.sh — batch gh pr list per repo instead of 2 calls per worktree (timeouts at volume)"
summary: >-
  omniclaude prune-worktrees.sh issued two `gh pr list` calls per worktree (one for MERGED state, one
  for the PR number). At 50+ worktrees that is 100+ sequential gh API calls and frequent overnight timeouts.
  The fix groups discovered worktrees by repo slug and issues ONE `gh pr list --state merged --json number,headRefName
  --limit 200` per unique repo slug, stored in an associative array keyed by branch name; per-worktree
  live gh calls are replaced with local map lookups. Staleness classification (MERGED / remote-branch-gone
  / ACTIVE) is unchanged. The hardcoded macOS-volume defaults for WORKTREES_ROOT and ONEX_REGISTRY_ROOT
  are replaced with OMNI_HOME-derived values plus existence guards. This OCC PR carries the OMN-13686
  contract + DoD receipts consumed by the omniclaude code PR via Evidence-Source. It performs no deploy,
  restart, or cluster mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      Stubbed-gh subprocess test proves exactly N_repos merged-state gh calls across >=30 worktrees /
      >=3 repos, and unchanged MERGED / remote-gone / ACTIVE classification.
    command: "uv run pytest tests/scripts/test_prune_worktrees_batch.py -q"
  - kind: ci
    description: "shellcheck scripts/prune-worktrees.sh exits 0 with no warnings."
    command: "shellcheck scripts/prune-worktrees.sh"
