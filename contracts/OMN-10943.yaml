    description: "Unit and integration tests for operation alias dispatch pass"
    command: >-
      uv run pytest tests/unit/runtime/test_runtime_local_ingress.py tests/integration/test_runtime_local_ingress_operation_alias.py
      -q
  - kind: "tests"
    description: "Pattern B broker route-map regression tests pass"
    command: "uv run pytest tests/unit/runtime/test_service_pattern_b_broker.py -q"
