---
schema_version: '1.0.0'
ticket_id: OMN-10048
summary: 'Replace broken MCP-callable Linear adapter with Linear GraphQL httpx adapter'
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: Unit + integration tests pass on the omnibase_infra PR
    command: uv run pytest tests/unit/adapters/test_linear_graphql_project_tracker_adapter.py tests/services/test_resolver.py
      -v
  - kind: ci
    description: CI pipeline green on the omnibase_infra PR
    command: gh pr checks 1430 --repo OmniNode-ai/omnibase_infra
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: New AdapterLinearGraphQLProjectTracker module present in omnibase_infra PR 1430 diff
    source: manual
    checks:
      - check_type: command
        check_value: gh pr diff 1430 --repo OmniNode-ai/omnibase_infra | grep -q 'linear_graphql_project_tracker_adapter'
  - id: dod-002
    description: Old MCP-callable adapter file deleted in omnibase_infra PR 1430 diff (no backwards compat
      shim)
    source: manual
    checks:
      - check_type: command
        check_value: gh pr diff 1430 --repo OmniNode-ai/omnibase_infra | grep -E '^-.*linear_project_tracker_adapter\.py'
          | grep -qv graphql
  - id: dod-003
    description: Resolver imports the new GraphQL adapter (resolver.py change in PR 1430 diff)
    source: manual
    checks:
      - check_type: command
        check_value: gh pr diff 1430 --repo OmniNode-ai/omnibase_infra | grep -q 'AdapterLinearGraphQLProjectTracker'
  - id: dod-004
    description: Unit test file for new GraphQL adapter present in PR 1430 diff
    source: manual
    checks:
      - check_type: command
        check_value: gh pr diff 1430 --repo OmniNode-ai/omnibase_infra | grep -q 'test_linear_graphql_project_tracker_adapter'
  - id: dod-005
    description: omnibase_infra PR 1430 has CI passing
    source: manual
    checks:
      - check_type: command
        check_value: gh pr checks 1430 --repo OmniNode-ai/omnibase_infra | grep -c 'pass' | grep -qv '^0$'
  - id: dod-006
    description: omnibase_infra PR 1430 open against main branch
    source: manual
    checks:
      - check_type: command
        check_value: gh pr view 1430 --repo OmniNode-ai/omnibase_infra --json state,baseRefName --jq 'select(.state=="OPEN"
          and .baseRefName=="main") | "ok"' | grep -q ok
  - id: dod-deploy
    description: Post-deploy guidance — runtime container resolves project tracker without raising NotImplementedError
      (manual check after redeploy; documented for the deploy gate runtime-paths matcher)
    source: manual
    checks:
      - check_type: command
        check_value: 'echo deploy: docker exec omninode-runtime python -c ''from omnibase_infra.services.project_tracker.resolver
          import resolve_project_tracker; t = resolve_project_tracker(); assert t.__class__.__name__ in
          ("AdapterLinearGraphQLProjectTracker", "LocalStubProjectTracker")'''
  - id: dod-007
    description: PR title or body cites this ticket
    source: generated
    checks:
      - check_type: command
        check_value: 'gh pr view ${PR_NUMBER} --repo ${REPO} --json title,body --jq ''.title + " " + (.body
          // "")'' | grep -q ''${TICKET_ID}'''
