---
schema_version: '1.0.0'
ticket_id: OMN-10420
title: "feat(OMN-10420): ticket-identity binding in receipt_gate.py"
summary: >
  Add ticket-identity binding to receipt_gate.py so that a code PR's evidence is provably about the same
  ticket the PR claims to address. Enforces invariant I3 from the gate-collapse-fix plan.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
evidence_requirements:
  - kind: ci
    description: All receipt_gate unit tests pass including the 5 required identity-binding cases
    command: >
      uv run pytest tests/unit/validation/test_receipt_gate_identity_binding.py -v --tb=short
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: Five identity-binding failure cases pass (missing Evidence-Ticket, PR title mismatch,
      branch mismatch, contract ticket_id mismatch, receipt ticket_id mismatch)
    source: generated
    checks:
      - check_type: command
        check_value: >
          uv run pytest tests/unit/validation/test_receipt_gate_identity_binding.py -v --tb=short -m unit
  - id: dod-002
    description: No regressions in existing receipt_gate tests (adversarial, skip-token, workflow shape,
      CLI)
    source: generated
    checks:
      - check_type: command
        check_value: >
          uv run pytest tests/unit/validation/test_receipt_gate_adversarial.py tests/unit/validation/test_receipt_gate_skip_token_allowlist.py
          tests/unit/validation/test_receipt_gate_skip_token_hardening.py tests/unit/validation/test_receipt_gate_workflow_shape.py
          tests/unit/validation/test_receipt_gate_cli.py -v --tb=short
  - id: dod-003
    description: EVIDENCE_SOURCE_PATTERN and EVIDENCE_TICKET_PATTERN exported in __all__
    source: generated
    checks:
      - check_type: command
        check_value: >
          python -c "from omnibase_core.validation.receipt_gate import EVIDENCE_SOURCE_PATTERN, EVIDENCE_TICKET_PATTERN;
          print('ok')"
  - id: dod-004
    description: CLI accepts --evidence-ticket and --branch-name flags
    source: generated
    checks:
      - check_type: command
        check_value: >
          python -m omnibase_core.validation.receipt_gate_cli --help | grep -E 'evidence-ticket|branch-name'
