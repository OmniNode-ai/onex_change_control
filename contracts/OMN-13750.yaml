---
schema_version: "1.0.0"
ticket_id: "OMN-13750"
title: "fix(OMN-13750): remove duplicate onex-prod ingresses + add CI dedup gate"
summary: >
  Root-cause fix for the 2026-06-29 website 502 outage. Duplicate Ingress resources in onex-prod and onex-dev
  claimed the same public hostnames (app.omninode.ai, api.omninode.ai, umami.omninode.ai, omniweb.omninode.ai).
  Traefik picks backends non-deterministically among duplicates; the onex-prod copies had invalid or missing
  TLS secrets, causing intermittent HTTP 502s despite healthy backends. Live recovery was performed by
  deleting the onex-prod duplicates. This PR makes that state permanent by deleting the four duplicate
  ingress.yaml files, updating kustomization.yaml entries with exclusion comments citing CANONICAL_INGRESS.md,
  adding that doc to record the onex-dev canonical router decision, and wiring a Python-based CI gate
  in k8s-validate.yml that blocks any future PR that re-introduces duplicate hostnames across Ingress
  files.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "kustomize build k8s/onex-prod exits 0 producing 0 Ingress objects; kustomize build k8s/onex-dev
      produces 4 canonical Ingress objects."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13750/dod-ingress-dedup/command.yaml"
  - kind: "ci"
    description: "New validate-ingress-host-uniqueness CI gate in k8s-validate.yml exits 0 on the PR branch."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13750/dod-ci-gate/command.yaml"
