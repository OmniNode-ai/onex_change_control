schema_version: '1.0.0'
ticket_id: OMN-12813
title: "SEA generation output format — force fenced yaml+python blocks + one-shot exemplar, suppress reasoning"
summary: >
  Root cause of contract_passed=false / empty generation_events row: the local
  coder model Qwen3.6-35B-A3B (a reasoning model) returns reasoning prose instead
  of the required two-fenced-block output. Fix: strengthen the generation system
  prompt + add two inference-protocol profiles (local-qwen-generation-no-think,
  local-qwen-generation-exemplar) scoped to task_type=node_generation, wired via
  apply_inference_protocol in HandlerGenerationConsumer._call_llm. Profiles add a
  /no_think directive and a one-shot exemplar (valid yaml contract + python
  handler) to force the output format. Non-Qwen models and non-generation task
  types are unaffected. Reuses the OMN-12738 inference_protocols machinery.
  Proven GREEN e2e on stability-test (real contract_passed=true, non-empty
  contract_yaml + handler_source).
