---
schema_version: "1.0.0"
ticket_id: "OMN-14584"
title: "OCC companion for omniclaude#1900 — delete dead delegation orchestrator and add node identity
  gate"
summary: >
  OCC evidence companion for OmniNode-ai/omniclaude#1900 (OMN-14584). #1900 removes the confirmed-dead
  omniclaude node_delegation_orchestrator implementation, removes its dead topic/runtime references, and
  adds a cross-repo node identity keying gate so future bare-name node collisions are caught before runtime
  boot or graph ingestion. Every substantive check below observes omniclaude#1900's exact product head
  (a2d272ce57e7d1fa600c83267863d35118d291d0) through GitHub product-tree reads or PR diff commands; no
  check reads this OCC repository's own receipts for PASS text.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniclaude#1900 head SHA carries the dead-node deletion and node-identity gate"
    command: "see dod_evidence check_values pinned to a2d272ce57e7d1fa600c83267863d35118d291d0"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1900-dead-node-contract-deleted"
    description: >-
      Product-observing: asserts the dead omniclaude node_delegation_orchestrator contract.yaml is absent
      at omniclaude#1900's exact head commit. This is the primary deletion #1900 exists to land. RED DIRECTION:
      the same GitHub contents API path exists at the parent/dev ref before #1900 and exits 0; this check
      exits 0 only when the file is genuinely gone at the PR head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          ! gh api "repos/OmniNode-ai/omniclaude/contents/src/omniclaude/nodes/node_delegation_orchestrator/contract.yaml?ref=a2d272ce57e7d1fa600c83267863d35118d291d0"
          >/dev/null 2>&1
  - id: "dod-verify-1900-node-identity-validator"
    description: >-
      Product-observing: reads scripts/validation/check_node_identity_keying.py at #1900's exact head
      and asserts it defines the AST-based ModelNodeIdentityKeyingViolation checker and the node-collection
      scoping predicate. This proves the new shared guard exists in the product tree, not merely in a
      PR description. RED DIRECTION: the file does not exist at the pre-#1900 dev ref and this contents
      read would 404/fail.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omniclaude/contents/scripts/validation/check_node_identity_keying.py?ref=a2d272ce57e7d1fa600c83267863d35118d291d0"
          --jq .content | base64 -d | grep -c "ModelNodeIdentityKeyingViolation")" -ge 1 && test "$(gh
          api "repos/OmniNode-ai/omniclaude/contents/scripts/validation/check_node_identity_keying.py?ref=a2d272ce57e7d1fa600c83267863d35118d291d0"
          --jq .content | base64 -d | grep -c "_looks_like_node_collection")" -ge 1
  - id: "dod-verify-1900-precommit-wires-validator"
    description: >-
      Product-observing: reads .pre-commit-config.yaml at #1900's exact head and asserts the check_node_identity_keying.py
      validator is wired into the author-time gate. This distinguishes a shipped mechanism from an inert
      script. RED DIRECTION: the hook entry is absent at the pre-#1900 dev ref and grep count would be
      zero.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omniclaude/contents/.pre-commit-config.yaml?ref=a2d272ce57e7d1fa600c83267863d35118d291d0"
          --jq .content | base64 -d | grep -c "check_node_identity_keying.py")" -ge 1
  - id: "dod-verify-1900-collision-regression-tests"
    description: >-
      Product-observing: reads the #1900 regression tests and asserts both the cross-repo duplicate contract-name
      test and the validator unit tests exist. The first prevents reintroducing an omniclaude/omnimarket
      bare node-name collision; the second proves the AST gate catches both incident shapes while allowing
      qualified keys and scoped false-positive cases. RED DIRECTION: both files are absent at the pre-#1900
      dev ref and would fail the contents read.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omniclaude/contents/tests/unit/test_no_duplicate_node_contracts.py?ref=a2d272ce57e7d1fa600c83267863d35118d291d0"
          --jq .content | base64 -d | grep -c "test_no_omniclaude_contract_name_collides_with_omnimarket")"
          -ge 1 && test "$(gh api "repos/OmniNode-ai/omniclaude/contents/tests/validation/test_check_node_identity_keying.py?ref=a2d272ce57e7d1fa600c83267863d35118d291d0"
          --jq .content | base64 -d | grep -c "test_flags_dict_comprehension_bare_name_keying")" -ge 1
  - id: "dod-deploy-assessment-1900"
    description: >-
      Deploy-gate assessment for omniclaude#1900. The PR deletes a dead node implementation and adds validation/test
      wiring, but does not modify Dockerfiles, compose files, or deploy scripts. This is a source/validation
      change and does not perform or require a live deploy in this merge lane. Falsifiable: the command
      fails if the PR diff grows Dockerfile, compose, deployment, or deploy script changes.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          ! (gh pr diff 1900 --repo OmniNode-ai/omniclaude --name-only | grep -qE "(^|/)(Dockerfile|docker-compose|deploy/|deployment/)")
  - id: "dod-occ-self-4138"
    description: >-
      OCC self-binding receipt for onex_change_control#4138. This binds the OMN-14584 central evidence
      companion for omniclaude#1900 to the opened OCC PR number and initial evidence commit. Product proof
      remains in the product-observing receipts above; this entry only closes the OCC PR identity loop.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^pr_number: 4138$' drift/dod_receipts/OMN-14584/dod-occ-self-4138/command.yaml && grep
          -q '754680f265c9f606785d454e365aae24327b2015' drift/dod_receipts/OMN-14584/dod-occ-self-4138/command.yaml
          && grep -q '^status: PASS$' drift/dod_receipts/OMN-14584/dod-occ-self-4138/command.yaml
