schema_version: "1.0.0"
ticket_id: "OMN-13220"
title: "deploy-runtime.sh cold-start crash-loop + missing intelligence-migration"
summary: >-
  OMN-13220 fixes two fresh-DB / fully-cold dev-runtime redeploy crash-loops diagnosed during the OMN-13215
  redeploy. (1) deploy-runtime.sh's migration preflight omitted intelligence-migration; the compose file
  gates omninode-runtime on it (service_completed_successfully) but the runtime restart uses 'up -d --no-deps',
  which bypasses depends_on, so on a fresh-DB lane public.db_metadata for omniintelligence was never stamped
  and the kernel crash-looped. The fix adds intelligence-migration to RUNTIME_MIGRATION_SERVICES and docker-waits
  on the run-to-completion migrations via RUNTIME_MIGRATION_ONESHOTS (forward-migration, intelligence-migration);
  the migration-gate keepalive stays excluded from the wait set. (2) On a fully-cold lane the kernel joins
  a consumer group per subscribed topic; with 1300+ topics on a freshly-provisioned broker the default
  30s per-consumer KAFKA_TIMEOUT_SECONDS blew on the slow group-coordinator tail and the kernel recycled
  before reaching healthy. The fix adds warm_broker_topic_provisioning() (bring redpanda healthy + apply
  redpanda-partition-cap BEFORE the kernel boots, since the --no-deps restart bypasses the compose cap
  gate) and exports a raised KAFKA_TIMEOUT_SECONDS (default 180s, clamped to the config le=300 bound)
  wired through a new KAFKA_TIMEOUT_SECONDS:-30 entry in x-runtime-env. Enforcement: a new shellcheck
  pre-commit hook scoped to the deploy-runtime surface (+ .shellcheckrc) and 7 regression tests in tests/scripts/test_deploy_runtime_coldstart.py.
  Scope is DEV lane only; this PR does not deploy, restart runtime, or mutate stability-test/prod/judge.
