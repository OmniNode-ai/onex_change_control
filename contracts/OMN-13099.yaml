schema_version: "1.0.0"
ticket_id: "OMN-13099"
title: "fix(omnimarket): context-roi runner _extract_row reads envelope top-level, not payload — probe4
  degenerate while generation succeeds"
summary: >-
  HandlerContextRoiRunner._extract_row() checked "attempt_count" not in event_payload against the outer
  ModelEventEnvelope dict. EventBusKafka.publish() wraps raw ModelGenerationBenchmark bytes in an envelope
  so attempt_count lives under event_payload["payload"], not at the top level. The CID match succeeded
  (envelope copies correlation_id to top level), but the attempt_count check fail-closed every row as
  failure_stage=GENERATION, attempt_count=0, model_id="" — the probe4 degenerate-row defect (2026-06-12).
  Fix: detect the "payload" key in event_payload and use event_payload["payload"] as the telemetry dict;
  fall back to the raw dict when no "payload" key is present (backwards-compatible). Four new real-dispatch-path
  regression tests: 3 RED on dev tip, 4 GREEN after fix.
