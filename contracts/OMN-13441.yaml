ticket_id: "OMN-13441"
title: "feat(OMN-13441): prod-health fact resolver EFFECT — EnumProdHealth, un-forgeable, fail-closed
  on UNKNOWN"
summary: >-
  Phase 1.3 of the prod-promotion authorization gate (epic OMN-13410, parent OMN-13418), shipped on omnimarket
  source PR #1423. Adds a canonical EFFECT node node_prod_health_fact_resolver_effect that resolves the
  prod-lane health into a deterministic ModelProdHealthFact { lane=PROD, health: EnumProdHealth, probed_at,
  source } BEFORE the prod gate evaluates — the un-forgeable input that makes the prod-promotion grant
  requirement health-conditional WITHOUT opening a bypass. Un-forgeable source: the health value comes
  only from a LIVE prod-lane health probe at evaluation time (resolved from the deploy target), never
  from a caller-supplied field — ModelProdHealthResolveCommand carries no health key (extra=forbid). Fail-closed:
  EnumProdHealth is tri-state (HEALTHY/UNHEALTHY/UNKNOWN); any indeterminate probe (error/timeout/unreachable/no
  status) classifies to UNKNOWN, which the gate treats as "grant required", so a broken probe cannot induce
  the recovery-waiver path. Only a CONFIRMED healthy probe (reachable+2xx) -> HEALTHY; only a CONFIRMED
  down/failed probe (reachable+non-2xx) -> UNHEALTHY. The resolved fact (value + probe source + probed_at)
  is threaded into ModelProdPromotionGateCommand.prod_health by the orchestrator — NEVER from start. prod_health
  defaults to None on the gate command (absent == fail closed, treated like UNKNOWN). The pure classify_health
  helper plus an injectable ProtocolHealthProber (default HttpHealthProber maps transport errors to UNREACHABLE
  -> UNKNOWN and HTTP error status to UNHEALTHY) keep the EFFECT testable without network. This OCC PR
  carries the central contract consumed by the omnimarket PR #1423 Receipt Gate via Evidence-Source.
