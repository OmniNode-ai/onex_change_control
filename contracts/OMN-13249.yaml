---
schema_version: "1.0.0"
ticket_id: "OMN-13249"
title: "Structural agent_invocation carve-out for canonical inference gate"
summary: >-
  OMN-13249 adds the Phase C validator carve-out for canonical inference enforcement. ValidatorCanonicalInference
  continues to fail closed for model CLI subprocess usage unless the enclosing node contract.yaml declares
  descriptor.agent_invocation: true as a strict YAML boolean. The permission is structural and contract-owned,
  not a widened free-text suppression comment. scan_source now accepts an optional source_path so scan_tree,
  _validate_file, and the staged-files CLI path can locate the enclosing contract. Text-only scans without
  a source path still fail closed. The carve-out covers only the shell-out surface for codex, claude,
  gemini, or opencode command invocation; model-id environment reads are never licensed by the flag. The
  PR also adds fail-closed tests for no-flag, strict-flag, and inference-tier cases, plus a YAML validation
  allowlist entry for the validator that reads generic node contracts.
is_seam_ticket: false
interface_change: false
