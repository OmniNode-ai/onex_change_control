schema_version: "1.0.0"
ticket_id: "OMN-12719"
title: "SubagentStop claim verifier blocks every subagent stop on newer Claude Code payload shapes"
summary: >-
  Central OCC contract + receipts for omniclaude PR #1737. The SubagentStop claim verifier (_extract_last_assistant_message)
  now accepts the last_assistant_message direct field and reads the transcript_path / agent_transcript_path
  JSONL files, scanning assistant entries only. Fail-closed is preserved for genuinely missing claim data
  (missing fence, malformed JSON, unreadable/malformed transcript, non-assistant report entries) — it
  is not a compat shim that passes everything.
