---
schema_version: "1.0.0"
ticket_id: "OMN-13746"
title: "fix(OMN-13746): vendor omnimarket baselines projection migrations (node-migration-sync drift)"
summary: >
  Vendor the two missing omnimarket node migration SQL files into omnibase_infra's docker/migrations/forward/nodes/
  directory. node_projection_baselines_quality and node_projection_baselines_roi were merged into omnimarket
  without vendoring their migration SQL into the infra forward-migration tree, causing the node-migration-sync
  CI gate (OMN-13124) to fail on every subsequent infra PR. Fix runs scripts/sync-node-migrations.sh to
  produce byte-identical copies of the two source migrations under the namespaced node path. No SQL is
  hand-authored; no runtime lane mutation, live deploy, Kafka topic change, or database mutation is required
  — the vendored files are applied at the next scheduled migration run.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "PASS receipts bind the omnibase_infra sync-check and deploy-assessment evidence for
      OMN-13746."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13746/dod-sync-check/command.yaml && grep
      -q '^status: PASS$' drift/dod_receipts/OMN-13746/dod-deploy-assessment/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-13746/dod-occ-self/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-sync-check"
    description: >
      scripts/sync-node-migrations.sh --check exits 0 ("check: in sync.") on the feature branch, confirming
      both node_projection_baselines_quality and node_projection_baselines_roi migration SQL files are
      vendored and byte-identical to omnimarket source.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13746/dod-sync-check/command.yaml"
  - id: "dod-deploy-assessment"
    description: >
      Deploy DoD evidence: this change only vendors SQL migration files into the docker/migrations/forward/nodes/
      tree. No live deploy, restart, Kafka mutation, database mutation, .201 mutation, or runtime lane
      mutation was performed or required. The vendored SQL is applied at the next scheduled migration
      run (not a deploy gate).
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13746/dod-deploy-assessment/command.yaml
          && grep -q 'No live deploy' drift/dod_receipts/OMN-13746/dod-deploy-assessment/command.yaml"
  - id: "dod-occ-self"
    description: >
      Self-binding OCC receipt: this onex_change_control PR carries the OMN-13746 contract and receipts.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13746/dod-occ-self/command.yaml"
