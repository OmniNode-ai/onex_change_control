---
schema_version: "1.0.0"
ticket_id: "OMN-11528"
title: "test(OMN-11523): end-to-end live verification with correlation continuity"
summary: >-
  Harden the live ADK agent verification path so the in-memory runner creates its session before execution,
  live runs fail when ADK emits no events, and validator output displays explicit severity and registration-blocked
  state.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
contract_completeness: "ENRICHED"
evidence_requirements:
  - kind: "manual"
    description: "onex-self-extending-agent PR #109 carries the OMN-11528 live-agent hardening patch."
    command: "gh pr view 109 --repo OmniNode-ai/onex-self-extending-agent --json number,state,headRefName,headRefOid,url,title"
  - kind: "tests"
    description: "Targeted and full local checks pass for the live-agent and validator display changes."
    command: "uv run pytest tests/unit -q && uv run mypy src/ --strict --ignore-missing-imports && uv
      run ruff check src tests"
  - kind: "manual"
    description: "Replay/demo paths still execute without a live key and preserve mode banners."
    command: "env -u ONEX_TRACK_A_API_KEY uv run python -m src --demo && uv run python -m src --replay
      docs/evidence/golden/golden_fixture.json"
  - kind: "manual"
    description: "Live agent reaches Gemini after the ADK session fix; available Gemini key is quota-blocked."
    command: "ONEX_TRACK_A_API_KEY=$GOOGLE_API_KEY uv run python -m src --agent --task '<sentiment classifier
      task>'"
  - kind: "ci"
    description: "onex_change_control PR carrying this central evidence is bound to OMN-11528."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11528/dod-occ-pr/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-product-pr-109-open"
    description: "onex-self-extending-agent PR #109 carries OMN-11528 at the recorded head SHA."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-product-pr-109-open/command.yaml\"
          && grep -q '^pr_number: 109$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-product-pr-109-open/command.yaml\"
          && grep -q '^commit_sha: \"387b56589517f51173fb5345a702fd256de7797c\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-product-pr-109-open/command.yaml\""
  - id: "dod-local-checks"
    description: "Targeted tests, full unit tests, ruff, and strict mypy passed locally."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-local-checks/command.yaml\"
          && grep -q '853 passed, 1 skipped' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-local-checks/command.yaml\""
  - id: "dod-replay-demo"
    description: "Declared demo and golden replay execute without live API key."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-replay-demo/command.yaml\"
          && grep -q 'AGENT: REPLAY | EXECUTED' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-replay-demo/command.yaml\""
  - id: "dod-live-quota-blocker"
    description: "Live ADK agent reaches Gemini; provider quota blocks full live verification."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-live-quota-blocker/command.yaml\"
          && grep -q 'RESOURCE_EXHAUSTED' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-live-quota-blocker/command.yaml\""
  - id: "dod-occ-pr"
    description: "onex_change_control PR carries the central OMN-11528 contract and receipts."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-occ-pr/command.yaml\"
          && grep -q '^pr_number:' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11528/dod-occ-pr/command.yaml\""
