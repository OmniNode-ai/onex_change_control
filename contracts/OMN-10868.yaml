ticket_id: "OMN-10868"
title: "fix(OMN-10868): wire delegation routing dispatcher in DI kernel"
summary: >
  node_delegation_routing_reducer was subscribed to the delegation-routing-request topic but MessageDispatchEngine
  had no dispatcher registered for category='command' + message_type='omnibase-infra.delegation-routing-request',
  causing all routing-request commands to fall through to the DLQ. Fix adds DispatcherDelegationRoutingRequest,
  wire_delegation_routing_dispatcher() in node_delegation_orchestrator/wiring.py, and calls it from PluginDelegation.wire_dispatchers()
  — pure DI wiring, no migration needed.
