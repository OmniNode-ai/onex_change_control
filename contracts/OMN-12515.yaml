interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Full pytest suite (no -k filter) passes including new freestanding scanner and CLI tests."
    command: "uv run pytest tests/ -q"
  - kind: "ci"
    description: "mypy --strict, ruff, and pre-commit all pass on the change."
    command: "uv run mypy src/ --strict && uv run ruff check src/ tests/ && pre-commit run --all-files"
  - kind: "manual"
    description: "End-to-end proof: --scan-freestanding flags onex-self-extending-agent src/pipeline/consumer.py
      (raw httpx.post + max_tokens=2048)."
    command: "uv run check-imperative-contracts --repo-root \"$OMNI_HOME/onex-self-extending-agent\" --scan-freestanding"
