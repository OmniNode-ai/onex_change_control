title: "Extend imperative-contract scanner to detect freestanding imperative IO"
summary: >-
  Extend the handler-contract-compliance scanner to audit freestanding modules (everything under src/
  outside node_*/handlers/), closing the detection hole where raw HTTP inference, direct DB connections,
  raw Kafka clients, hardcoded inference params, topics, LAN IPs, and subprocess network ops went unscanned.
