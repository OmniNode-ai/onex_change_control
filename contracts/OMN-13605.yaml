---
schema_version: "1.0.0"
ticket_id: "OMN-13605"
title: "WS-C Phase 0.1: Redesign handler_generated_executor — hot-load + full-package scaffold"
summary: >
  Wave-0 serial spine of the SEA -> canonical migration (epic OMN-13604). HandlerGeneratedExecutor in
  omnimarket node_generation_consumer is redesigned to perform BOTH halves of the generation flow on a
  single node-deploy: (a) sandbox hot-load + in-session importlib invoke (kept; hot-reload is planned),
  AND (b) full 10-file canonical package scaffold into a worktree staging dir via the node_generate_node_effect
  scaffolder. The hackathon-tagged _SANDBOX_SUBDIR=("hackathon","generated") hack is removed: the sandbox
  resolves to a node-scoped, hackathon-free subdir and the staging root resolves fail-fast from ONEX_GENERATED_STAGING_DIR
  or the runtime state root (no hardcoded paths, CLAUDE.md Rule 6/8). The scaffolder I/O models (ModelGenerateNodeCommand/Result,
  EnumNodeType) are promoted from node_generate_node_effect's node-local models package to shared omnimarket.models.model_generate_node
  so both nodes import the shared home (no cross-node reach-in, OMN-9263). Architecture: canonical node/contract/handler;
  no Plugin*; strongly typed (UUID, StrEnum, frozen ConfigDict); generation file-writes are the scaffolder
  EFFECT. Phase 0.2 (publish effect) and 0.3 (strip remaining contract hackathon tags) are separate later
  children and are NOT in this PR. No topic schema, envelope, or contract-API change; no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD golden chain proves NL deploy -> (a) hot-loaded + invokable in-session AND (b) full 10-file
      canonical package written to the worktree staging dir; the scaffolder-model promotion keeps the
      cross-node reach-in guard green.
    command: "uv run pytest tests/unit/nodes/node_generation_consumer/test_handler_generated_executor.py
      tests/test_node_generate_node_effect.py tests/test_no_cross_node_reach_in.py -q"
