schema_version: '1.0.0'
ticket_id: OMN-13024
title: 'A-2: UI evidence-class gate — Receipt-Gate rejects ui/dashboard DoD evidence without Playwright
  proxy-origin trace'
summary: >-
  The Receipt-Gate now classifies a dod_evidence receipt as ui/dashboard-class when its probe_command
  uses a direct HTTP client (curl/wget/httpx) without referencing Playwright, or when the receipt declares
  evidence_class=ui_dashboard. UI/dashboard-class evidence fails the gate unless probe_command references
  a Playwright run AND probe_stdout carries a network trace whose /api requests share the dashboard proxy
  origin (not a direct backend port). A new optional evidence_class field on ModelDodReceipt lets a receipt
  declare the class explicitly (UI_DASHBOARD forces strict validation; BACKEND opts a legitimate HTTP-client
  probe out of the UI gate). This PR carries the central OMN-13024 contract + DoD receipts consumed by
  omnibase_core via Evidence-Source.
