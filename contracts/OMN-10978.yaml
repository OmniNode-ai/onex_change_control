---
schema_version: "1.0.0"
ticket_id: "OMN-10978"
title: "Make cross-repo boundary validation blocking in omnibase_core CI"
summary: "Bind omnibase_core PR #1080 to central OCC evidence proving the boundary validation bypass was
  removed and the boundary parity baseline is clean."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Workflow-shape regression tests assert boundary validation is blocking and included
      in CI Summary."
    command: "uv run pytest tests/unit/validation/test_ci_workflow_shape.py -q"
  - kind: "manual"
    description: "Focused lint for the updated workflow-shape tests."
    command: "uv run ruff check tests/unit/validation/test_ci_workflow_shape.py"
  - kind: "manual"
    description: "Pinned boundary parity validator passes with this omnibase_core worktree and the explicit
      repo set used by CI."
    command: "uv run check-boundary-parity --repos-root <local sibling repo root>"
  - kind: "ci"
    description: "omnibase_core PR #1080 is open for OMN-10978."
    command: "gh pr view 1080 --repo OmniNode-ai/omnibase_core --json headRefOid,title"
  - kind: "ci"
    description: "onex_change_control PR #1027 carries central OCC evidence for OMN-10978."
    command: "gh pr view 1027 --repo OmniNode-ai/onex_change_control --json headRefOid,title"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-workflow-shape-tests"
    description: "Workflow-shape tests pass after making boundary validation blocking."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-workflow-shape-tests/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10978\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-workflow-shape-tests/command.yaml\"
          && grep -q '7 passed' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-workflow-shape-tests/command.yaml\""
  - id: "dod-workflow-shape-lint"
    description: "Focused ruff check passes for the updated workflow-shape tests."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-workflow-shape-lint/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10978\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-workflow-shape-lint/command.yaml\"
          && grep -q 'All checks passed' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-workflow-shape-lint/command.yaml\""
  - id: "dod-boundary-parity"
    description: "Pinned boundary parity validator passes with the CI repo set including onex_change_control."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-boundary-parity/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10978\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-boundary-parity/command.yaml\"
          && grep -q 'MISMATCH: 0' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-boundary-parity/command.yaml\""
  - id: "dod-pr-open"
    description: "omnibase_core PR #1080 is bound to OMN-10978 at the observed head commit."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-pr-open/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10978\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-pr-open/command.yaml\"
          && grep -q '^pr_number: 1080$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-pr-open/command.yaml\"
          && grep -q '^commit_sha: \"d382aaac0' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-pr-open/command.yaml\""
  - id: "dod-occ-pr-open"
    description: "onex_change_control PR #1027 is bound to OMN-10978 for OCC Receipt Gate."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-occ-pr-open/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10978\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-occ-pr-open/command.yaml\"
          && grep -q '^pr_number: 1027$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-occ-pr-open/command.yaml\"
          && grep -q '^commit_sha: \"4b84286d62c4764ed629dcf821ec391f535a718f\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10978/dod-occ-pr-open/command.yaml\""
