---
schema_version: "1.0.0"
ticket_id: "OMN-10979"
title: "Make omniclaude Dockle and Checkov security scanners blocking"
summary: >-
  Binds omniclaude PR #1588, which runs security-scan.yml on pull_request and makes Dockle fatal findings
  plus Checkov HIGH/CRITICAL findings block PRs while preserving scoped advisory findings.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniclaude PR #1588 carries the security scanner blocking workflow change."
    command: "gh pr view 1588 --repo OmniNode-ai/omniclaude --json number,state,headRefOid,title"
  - kind: "manual"
    description: "PR evidence file records actionlint, YAML parse, Checkov, and Dockle validation."
    command: "gh api repos/OmniNode-ai/omniclaude/contents/.evidence/OMN-10979/security-scanner-blocking.md?ref=<branch>"
  - kind: "manual"
    description: "security-scan.yml has PR trigger coverage and explicit blocking scanner thresholds."
    command: "gh api repos/OmniNode-ai/omniclaude/contents/.github/workflows/security-scan.yml?ref=<branch>"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omniclaude-pr-1588"
    description: "omniclaude PR #1588 is open with the OMN-10979 implementation at the recorded head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10979/dod-omniclaude-pr-1588/command.yaml
          && grep -q '^pr_number: 1588$' drift/dod_receipts/OMN-10979/dod-omniclaude-pr-1588/command.yaml
          && grep -q '^commit_sha: \"4b465a7e99bbbeac4d368c9aa32f816314d8c1c5\"$' drift/dod_receipts/OMN-10979/dod-omniclaude-pr-1588/command.yaml"
  - id: "dod-security-evidence-file"
    description: "The PR evidence file records PASS results for actionlint, YAML parsing, Checkov, and
      Dockle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10979/dod-security-evidence-file/command.yaml
          && grep -q 'Checkov threshold validation' drift/dod_receipts/OMN-10979/dod-security-evidence-file/command.yaml
          && grep -q 'Dockle threshold validation' drift/dod_receipts/OMN-10979/dod-security-evidence-file/command.yaml"
  - id: "dod-workflow-blocking-gates"
    description: "security-scan.yml runs on pull_request and configures Dockle/Checkov blocking thresholds."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10979/dod-workflow-blocking-gates/command.yaml
          && grep -q 'pull_request' drift/dod_receipts/OMN-10979/dod-workflow-blocking-gates/command.yaml
          && grep -q 'exit-level fatal' drift/dod_receipts/OMN-10979/dod-workflow-blocking-gates/command.yaml
          && grep -q 'hard_fail_on: HIGH,CRITICAL' drift/dod_receipts/OMN-10979/dod-workflow-blocking-gates/command.yaml"
  - id: "dod-occ-pr-self"
    description: "onex_change_control PR #1030 carries the central OMN-10979 contract and receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10979/dod-occ-pr-self/command.yaml
          && grep -q '^pr_number: 1030$' drift/dod_receipts/OMN-10979/dod-occ-pr-self/command.yaml"
