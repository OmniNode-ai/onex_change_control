title: "WS-C SEA Phase 7.1: wire generated-node golden-chain as blocking CI gate + pre-commit hook"
summary: >-
  OMN-13624 closes the enforcement gap (Operating Rule #5) on the SEA self-extension loop golden-chain
  tests. The broad golden-chains CI job already ran test_golden_chain_generation_self_extension.py (8
  tests, §D2 loop proof: generate→deploy-consumed→registered→invoked→output verified) and test_golden_chain_generated_node_publish_effect.py
  (5 tests, §publish chain) — but as anonymous entries in a 1,000+ test sweep, not as named required gates
  scoped to the generation node surface. This PR adds: (1) a dedicated required CI job generated-node-golden-chain
  in ci.yml, wired into the ci-summary rollup; (2) a pre-commit hook generated-node-golden-chain-gate
  in .pre-commit-config.yaml that executes the same 13 tests when node_generation_consumer/, node_generated_node_publish_effect/,
  or the test files themselves are staged. Zero infra required; all assertions use injected fakes and
  sandbox execution. Product PR: omnimarket #1461.
