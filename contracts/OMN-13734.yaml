title: "OMN-12847(b): Backfill machine-readable state_machine blocks into 14 reducer contracts + redeploy
  FSM reducer"
summary: >-
  Additive contract-only backfill in omnimarket. Adds a machine-readable state_machine: block (initial_state,
  states, transitions {from_state,to_state,trigger}, terminal_states) to the 14 reducer contracts that
  previously had only code-level FSMs, plus the current dev redeploy FSM reducer contract. Each FSM is
  transcribed from the node's authoritative handler/model source and validated by util_fsm_executor.validate_fsm_contract
  (no unreachable or dangling states). No handler refactor, no new runtime surface, event-bus topic, REST
  endpoint, or live infrastructure mutation. Drift convergence enforcement is sub-issue (c).
