ticket_id: "OMN-14260"
title: "fix(OMN-14260): revert nested occ-preflight from deploy-gate-reusable (unblock org-wide deploy-gate)"
summary: >-
  omniclaude PR #1884 reverts a nested cross-repo `occ-preflight` job that the OMN-14249 devâ†’main promotion
  (#1879, merge commit 3650658b3) carried into `.github/workflows/deploy-gate-reusable.yml`. All caller
  repos (omnibase_infra / omnibase_core / omnimarket) resolve this reusable at `@main`, so the break went
  live for everyone: the nested job runs in a reusable-within-reusable context (caller `deploy-gate.yml`'s
  `deploy-gate` job, which has no `permissions:` block, calls this reusable, which itself calls a nested
  `occ-preflight` requesting job-level `permissions: pull-requests: read`). A nested reusable can only
  narrow the token its caller job passed down, so the request is a compile-time permissions escalation
  â€” the whole "Deploy Gate" workflow `startup_failure`s (0 jobs, empty check-suite) on every caller PR,
  taking the required `deploy-gate` status check down org-wide. The fix removes the nested `occ-preflight`
  job and the `deploy-gate` job's `needs: occ-preflight` line, restoring the job body byte-identical to
  its pre-#1879 form (verified: `git diff 3650658b3^ <PR-head> -- deploy-gate-reusable.yml` shows only
  an added explanatory comment, zero behavioral diff). No OCC-preflight coverage is lost: every caller
  repo already gates its own `deploy-gate` job behind its own TOP-LEVEL `occ-preflight` job, which is
  a structurally different (non-nested) case that does not hit the permissions-escalation constraint â€”
  omnibase_infra `deploy-gate.yml` (`occ-preflight: uses: .../occ-preflight.yml@<pinned-sha>` with its
  own `permissions:` block, `deploy-gate: needs: occ-preflight`), omnibase_core `deploy-gate.yml` (local
  `occ-preflight: uses: ./.github/workflows/occ-preflight.yml`, `deploy-gate: needs: occ-preflight`),
  and omnimarket `deploy-gate.yml` (`occ-preflight: name: OCC Preflight Dependency`, an inline job that
  waits on the repo's own required OCC check). An independent verifier (separate from the implementing
  agent) reproduced the root-cause claim live and confirmed the fix is a minimal, coverage-preserving
  revert.
