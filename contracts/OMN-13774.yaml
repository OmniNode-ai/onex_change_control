schema_version: '1.0.0'
ticket_id: OMN-13774
title: "fix(OMN-13774): recreate spool dir before every _spool_event write"
summary: >
  BoundedEventQueue._ensure_spool_dir() (node_emit_daemon) only ran once at construction time. If the
  .onex_state/event-spool/ directory was later removed (tmp cleanup, ONEX_STATE_DIR reset between sessions,
  GC of an idle runtime dir), every subsequent _spool_event write raised FileNotFoundError, silently swallowed
  as a logged failure — turning a transient Kafka outage into total drain loss ("Drained 0 events from memory
  to spool"). The fix re-creates the spool dir (mkdir(parents=True, exist_ok=True)) immediately before every
  write_text() call in _spool_event, not just at __init__. The ticket's original reference path
  (omniclaude/src/omniclaude/publisher/event_queue.py:155) was removed by OMN-10120 (legacy omniclaude
  publisher deleted); the live code path is omnimarket/src/omnimarket/nodes/node_emit_daemon/event_queue.py.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
