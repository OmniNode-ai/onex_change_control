schema_version: "1.0.0"
ticket_id: "OMN-12565"
title: "ci: durable runner Python write-contract (remove --system installs)"
summary: >-
  Removes uv pip install --system from the central merge-group reusable workflows receipt-gate.yml and
  occ-preflight.yml so the Receipt Gate no longer writes the system dist-packages path that a freshly
  recreated self-hosted runner cannot write. Both workflows now install omnibase_core and compat into
  a uv-managed virtual environment under GITHUB_WORKSPACE via uv venv plus uv pip install --python, and
  the gate steps run the venv interpreter instead of bare python. A new Preflight runner Python write
  contract step runs before install and gate, proves the workspace venv path is writable, references the
  system dist-packages path it guarantees is not required, and fails loudly with an error annotation and
  exit 1 if the contract is violated. The OMN-9198 and OMN-9283 wheel-build pattern that pins omnibase-core
  from source is preserved; only the install target changed from the system interpreter to the workspace
  venv. The fresh-runner recreation acceptance is a runtime step.
