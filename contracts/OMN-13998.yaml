schema_version: "1.0.0"
ticket_id: OMN-13998
title: "feat(OMN-13998): 2x2 SWE-discriminator harness + truncation-confound fix (local-first, offline)"
summary: >
  Promotes the OMN-13988 de-risk spike into a durable, tested harness under omnimarket.delegation.swe_discriminator
  (extends graded_ladder, does not rebuild it) and fixes the capability-vs-plumbing confound. New package:
  2x2 arm runner (monolith/decomposed x frontier/cost_routed), offline blind deterministic-floor grader
  (verifier != runner), and classify.py — detect_truncation + classify_run separate PASS/FAIL_WRONG (real
  capability signals) from TRUNCATED/BLOCKED (plumbing/infra, EXCLUDED from scoring) so a token-cap truncation
  cannot deflate the hard-tier numbers (the OMN-13335 hazard). model_client captures finish_reason and
  resolves endpoints from the committed graded_ladder ladder_rungs.yaml routing config (no URL literal,
  no hardcoded IP). proof_class = offline over captured artifacts (NOT a live runtime loop). Local-first.
  The full 2x2 headline run remains gated on frontier-endpoint reachability (blocker #1, operator/provider
  decision) and a larger hard-task budget.
