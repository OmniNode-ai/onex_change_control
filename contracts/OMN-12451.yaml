evidence_requirements:
  - kind: ci
    description: >
      gitignore-baseline.yaml present at architecture-handshakes/ with universal and python sections,
      each carrying start_marker, end_marker, applies_when, and ordered patterns list.
    command: >
      python -c "import yaml, pathlib; spec = yaml.safe_load(pathlib.Path('architecture-handshakes/gitignore-baseline.yaml').read_text());
      blocks = spec['managed_blocks']; assert 'universal' in blocks and 'python' in blocks; assert blocks['universal']['applies_when']
      == 'always'; assert blocks['python']['applies_when'] == 'pyproject_toml_present'; assert len(blocks['universal']['patterns'])
      >= 9; assert len(blocks['python']['patterns']) >= 14; print('PASS')"
  - kind: tests
    description: 13-test schema-locking suite passes for the new spec file
    command: "uv run pytest tests/validation/test_gitignore_baseline_spec.py -v --tb=short"
