summary: >
  Adds architecture-handshakes/gitignore-baseline.yaml to omnibase_core as the machine-readable single
  source of truth for .gitignore managed blocks. Defines universal (all repos) and python (pyproject.toml
  repos) sections with verbatim markers and ordered pattern lists for the T2 validator.
