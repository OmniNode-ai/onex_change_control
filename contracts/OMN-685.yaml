  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "PR opened against main branch"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --json state -q .state --repo ${REPO}"
  - id: "dod-002"
    description: "PR merged to main"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --json mergedAt -q .mergedAt --repo ${REPO}"
  - id: "dod-003"
    description: "Tests pass in CI"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr checks ${PR_NUMBER} --watch --repo ${REPO}"
  - id: "dod-004"
    description: "Pre-commit hooks clean"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "pre-commit run --all-files"
  - id: "dod-005"
    description: "Test coverage meets minimum threshold"
    source: "generated"
    checks:
      - check_type: "test_passes"
        check_value: "uv run pytest --cov --cov-fail-under=80"
  - id: "dod-core-1457-head"
    description: "Product PR #1457 exists on dev at exact head d0ec1fd4."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "PR_NUMBER=1457; REPO=OmniNode-ai/omnibase_core; gh pr view ${PR_NUMBER} --repo ${REPO}
          --json number,headRefOid,headRefName,baseRefName,title"
  - id: "dod-core-1457-test-only"
    description: "PR #1457 changes only the runtime file registry unit test."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "PR_NUMBER=1457; REPO=OmniNode-ai/omnibase_core; gh pr view ${PR_NUMBER} --repo ${REPO}
          --json files"
  - id: "dod-core-1457-local-proof"
    description: "PR #1457 body records targeted pytest, ruff, mypy, and pre-commit proof for the exact
      test-only change."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "PRODUCT_PR_NUMBER=1457; PRODUCT_REPO=OmniNode-ai/omnibase_core; gh pr view \"$PRODUCT_PR_NUMBER\"
          --repo \"$PRODUCT_REPO\" --json body --jq '.body' | grep -E '2 passed|ruff|mypy|pre-commit'"
  - id: "dod-core-1457-no-deploy"
    description: "PR #1457 is test-only and does not deploy, push images, restart runtime, mutate live
      infrastructure, mutate branch protection, or cut over required contexts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "PRODUCT_PR_NUMBER=1457; PRODUCT_REPO=OmniNode-ai/omnibase_core; gh pr diff \"$PRODUCT_PR_NUMBER\"
          --repo \"$PRODUCT_REPO\" --name-only | grep -qx 'tests/unit/runtime/test_file_registry.py'"
  - id: "dod-supersede-002-product-open-1457"
    description: "Append-only supersession for the generated merged-to-main check; product PR #1457 is
      open on dev at the exact tested head and will be merged only after this OCC companion lands."
    evidence_artifact: "supersedes_dod_evidence:dod-002"
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "PRODUCT_PR_NUMBER=1457; PRODUCT_REPO=OmniNode-ai/omnibase_core; gh pr view \"$PRODUCT_PR_NUMBER\"
          --repo \"$PRODUCT_REPO\" --json state,baseRefName,headRefOid --jq '.state == \"OPEN\" and .baseRefName
          == \"dev\" and .headRefOid == \"d0ec1fd40ab94ec2e9a387f6110d9fddcf4188a9\"' | grep -q true"
  - id: "dod-supersede-003-occ-cascade-1457"
    description: "Append-only supersession for the generated CI watch check; product PR #1457 has only
      OCC-preflight cascade failures before this companion."
    evidence_artifact: "supersedes_dod_evidence:dod-003"
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "PRODUCT_PR_NUMBER=1457; PRODUCT_REPO=OmniNode-ai/omnibase_core; gh pr view \"$PRODUCT_PR_NUMBER\"
          --repo \"$PRODUCT_REPO\" --json statusCheckRollup --jq '[.statusCheckRollup[] | select((.__typename
          == \"CheckRun\" and .status == \"COMPLETED\" and (.conclusion | IN(\"SUCCESS\",\"SKIPPED\",\"NEUTRAL\")
          | not)) or (.__typename == \"StatusContext\" and (.state | IN(\"SUCCESS\",\"PENDING\") | not)))
          | select(((.name // .context) | test(\"occ-preflight|Canonical Inference Gate|receipt-honesty|call-reject-skip-token\"))
          | not)] | length == 0' | grep -q true"
  - id: "dod-supersede-004-product-precommit-1457"
    description: "Append-only supersession for the generated all-files pre-commit check; PR #1457 body
      records pre-commit and ruff proof for the test-only change."
    evidence_artifact: "supersedes_dod_evidence:dod-004"
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "PRODUCT_PR_NUMBER=1457; PRODUCT_REPO=OmniNode-ai/omnibase_core; gh pr view \"$PRODUCT_PR_NUMBER\"
          --repo \"$PRODUCT_REPO\" --json body --jq '.body' | grep -E 'pre-commit|ruff'"
  - id: "dod-supersede-005-product-test-1457"
    description: "Append-only supersession for the generated coverage command; PR #1457 body records the
      targeted runtime_file_registry unit proof."
    evidence_artifact: "supersedes_dod_evidence:dod-005"
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "PRODUCT_PR_NUMBER=1457; PRODUCT_REPO=OmniNode-ai/omnibase_core; gh pr view \"$PRODUCT_PR_NUMBER\"
