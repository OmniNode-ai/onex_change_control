ticket_id: OMN-14471
title: 'refactor(OMN-14471): check_release_identity.py -> canonical node_release_identity_compute'
summary: >-
  Independent verification (rt8-builder, who implemented RT-8 not this refactor; no self-authored evidence,
  OMN-14055) of omnibase_infra PR #2275 at head fe3048daecd61c1f80217c2fcea1feee928f14b4. The legacy freestanding
  gate scripts/check_release_identity.py was refactored into the canonical node_release_identity_compute
  COMPUTE node fronted by a thin CLI shim at the same path. Verified against live gh at the pinned head:
  (1) the cross-boundary equivalence is NOT vacuous -- the frozen legacy fixture is byte-identical (same
  git blob f3b670e8) to the pre-PR legacy gate on dev, and the 13-scenario regression asserts identical
  exit_code + stdout + stderr between the frozen legacy gate and the new shim, with independently pinned
  expected exits (33 tests passed on an independent run); (2) the handler is def-B handle(request: ModelReleaseIdentityRequest)
  -> ModelReleaseIdentityDecision with zero ModelEventEnvelope references (OMN-14355 clean; the head fixup
  fe3048da dropped the last literal token from the docstring); (3) the node lives under src/omnibase_infra,
  not omnimarket; (4) the fresh-deploy-fitness release-identity job + pre-commit check-release-identity
  still invoke the shim, now via `uv run --frozen` (the shim imports the node) with an unchanged command/base
  and timeout raised 10->30 to absorb the ~14s import; behavior is byte-identical, proven by the equivalence
  test exercising the same main(argv) CI invokes. Both flagged decisions (uv-workspace execution; ~14s
  import tax) validated. Import-tax follow-up filed as OMN-14480. Non-blocking note: PR head moved 8bb6b199
  -> fe3048da under verification (builder still active on the refactor task); this companion binds fe3048da
  and must be re-bound if the head advances again.
