ticket_id: OMN-14367
title: "refactor(OMN-14367): shared canonical tenant-stamp helper (slug in tenant_id)"
summary: >-
  omnibase_infra PR #2257 introduces omnibase_infra.shared.tenant_stamp.stamp_verified_tenant_slug as
  the single source of truth for the verified-tenant payload shape (payload["tenant_id"] = DNS-safe slug,
  no separate tenant_slug key) and routes the #2254 auto-wiring tenant_scoped_ingress stamp (handler_wiring._stamp_tenant_id_from_topic_prefix)
  through it. This is a behavior-preserving no-op refactor — the stamp already emitted {**payload, "tenant_id":
  slug}; it now produces the identical dict via the helper so the two tenant-stamp producers cannot diverge
  on the shape again. Gateway (#2252) adoption and the ommarket OMN-14208 xfail flip are separate paired
  follow-ups (do not auto-close).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
