---
schema_version: "1.0.0"
ticket_id: "OMN-12671"
title: "Bind OCC evidence for omnibase_infra uv dependency bump"
summary: >
  Central OCC evidence for omnibase_infra PR #1864, a ticketed replacement for Dependabot PR #1858. The
  product PR carries the uv dependency group update for aiohttp 3.14.0 and tuf 7.0.0 lock resolution in
  omnibase_infra.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra PR #1864 is open against dev at the recorded ticketed head."
    command: "gh pr view 1864 --repo OmniNode-ai/omnibase_infra --json state,headRefOid,baseRefName"
  - kind: "ci"
    description: "Required non-Receipt-Gate checks on omnibase_infra PR #1864 are SUCCESS or SKIPPED."
    command: "gh pr checks 1864 --repo OmniNode-ai/omnibase_infra --required --json name,state,workflow"
  - kind: "manual"
    description: "The runner-image-build-smoke disposition for omnibase_infra PR #1864 is recorded."
    command: "gh pr checks 1864 --repo OmniNode-ai/omnibase_infra --json name,state,workflow"
  - kind: "manual"
    description: "The OCC PR carrying this central evidence is open and bound to OMN-12671."
    command: "gh pr view jonah/omn-12671-infra-uv-occ --repo OmniNode-ai/onex_change_control --json state,headRefOid"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
