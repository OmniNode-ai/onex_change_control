    description: "omnibase_infra PR #1864 is open against dev at the recorded ticketed uv bump head."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12671/dod-infra-pr-1864-head/command.yaml"
          && grep -q '^pr_number: 1864$' "drift/dod_receipts/OMN-12671/dod-infra-pr-1864-head/command.yaml"
          && grep -q '^commit_sha: "224629e7a102a7e324a0152539b80dea1d9eb109"$' "drift/dod_receipts/OMN-12671/dod-infra-pr-1864-head/command.yaml"
  - id: "dod-infra-pr-1864-required-non-receipt-checks"
    description: "Required non-Receipt-Gate checks on omnibase_infra PR #1864 are green or skipped."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12671/dod-infra-pr-1864-required-non-receipt-checks/command.yaml"
          && grep -q 'required non-Receipt-Gate checks are SUCCESS or SKIPPED' "drift/dod_receipts/OMN-12671/dod-infra-pr-1864-required-non-receipt-checks/command.yaml"
  - id: "dod-runner-image-smoke-disposition"
    description: "Runner image smoke status is captured for omnibase_infra PR #1864."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12671/dod-runner-image-smoke-disposition/command.yaml"
          && grep -q 'runner-image-build-smoke' "drift/dod_receipts/OMN-12671/dod-runner-image-smoke-disposition/command.yaml"
  - id: "dod-occ-pr-self"
    description: "onex_change_control PR carries the OMN-12671 central contract and receipts."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12671/dod-occ-pr-self/command.yaml" && grep
          -q '^ticket_id: "OMN-12671"$' "drift/dod_receipts/OMN-12671/dod-occ-pr-self/command.yaml"
