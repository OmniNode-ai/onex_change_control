title: "suppress cross-DB agent_routing_decisions duplicate (infra 021 / omnimarket node 0021) — unblock
  OCC Migration Conflict Check"
summary: >-
  The OCC Migration Conflict Check job hard-failed (exit 1) the dev merge_group with a single unsuppressed
  conflict: EXACT_DUPLICATE table agent_routing_decisions, reported twice under omnibase_infra (021_create_agent_routing_decisions_table.sql
  and 0021_create_agent_routing_decisions.sql, both 13 columns). This is a benign cross-DB duplicate:
  infra docker/migrations/forward/021 creates agent_routing_decisions in the omnibase_infra DB; the omnimarket
  node_projection_routing_decision migration 0021 — vendored into omnibase_infra/docker/migrations/forward/nodes/
  and landed via OMN-13150 (infra PR #1985) — creates the projection copy in omnidash_analytics, the node
  contract's declared db_io.db_tables[0].database. Identical 13-column DDL, two different databases, both
  load-bearing; git-rm of either breaks a database. The canonical mechanism for this exact pattern is
  migration_conflict_suppressions.yaml under cross_repo_shared_schema; every sibling cross-DB projection
  table (session_outcomes, llm_routing_decisions, llm_cost_aggregates, delegation_events, evidence_*)
  is already suppressed. agent_routing_decisions was simply never added when OMN-13150 introduced the
  second copy. Self-contained OCC PR onex_change_control#2637 adds the missing entry AND carries this
  contract + receipts (Evidence-Source: self). Repro via the exact OCC gate command (check-migration-conflicts
  --repos-root <repos> --check-columns --warn-columns --suppressions-file migration_conflict_suppressions.yaml):
  before = Found 1 migration conflict(s) EXACT_DUPLICATE agent_routing_decisions, exit 1; after = No migration
  conflicts found, Suppressed 39 known conflict(s), exit 0. The 36 MISSING_COLUMN findings remain --warn-columns
  warnings (non-fatal, pre-existing) and were never the blocker. Suppressions-file change only — no DDL,
  no migration, no code, no live deploy, no .201 mutation. Broader consolidation tracked under OMN-13127.
