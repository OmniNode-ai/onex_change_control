title: "P0 DEV effects-lane crash-loop repair"
summary: >-
  OMN-13201 repairs the DEV effects-lane crash loop through two coordinated PRs. The omnibase_infra PR
  lane-namespaces the intelligence-migration container name so the DEV migration one-shot no longer collides
  with other lanes and can apply the omniintelligence db_metadata migration. The omnimarket PR makes the
  intent-event-consumer and kreuzberg-parse effect handlers resolver-satisfiable: zero-argument construction
  is pure, heavy configuration/storage dependencies are resolved lazily at the handle boundary, and focused
  tests prove the runtime auto-wiring boot path can instantiate both handlers. Runtime/deploy validation
  is represented as deploy-gate evidence only; live .201 deployment or restart is intentionally not performed
  from this PR.
