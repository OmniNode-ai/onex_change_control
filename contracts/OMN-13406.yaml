schema_version: "1.0.0"
ticket_id: "OMN-13406"
title: "Harden flat migration 087_drop_stale_delegation_events_decoy with CASCADE (warm-DB apply fails)"
summary: >-
  Flat forward migration 087 used a bare DROP TABLE IF EXISTS delegation_events (no CASCADE). On a WARM
  omnibase_infra DB carrying the stale decoy delegation_events (40 rows on stability) plus its dead dependent
  views, Postgres refuses the drop ("cannot drop table delegation_events because other objects depend
  on it") → forward-migration exits 3 → blocks node migrations 0017/0018/0019. Cold dev had no decoy so
  it passed there; stability hit it and remediated by a manual CASCADE drop (infra DB only; live omnidash_analytics.delegation_events
  untouched), and PROD would hit the identical blocker on first forward-migration. The fix changes the
  drop to DROP TABLE IF EXISTS public.delegation_events CASCADE. The five dependent views the CASCADE
  removes (projection_delegation_summary, projection_delegation_model_routing, projection_delegation_quality_gate,
  projection_delegation_token_usage from node_projection_delegation 0010; projection_delegation_savings
  from node_projection_savings 076) are DEAD copies that exist ONLY in the omnibase_infra DB — created
  there historically when NODE_POSTGRES_DB defaulted to POSTGRES_DB(=omnibase_infra) before the node runner
  was repointed to omnidash_analytics. The LIVE views of the same names live in omnidash_analytics, are
  rebuilt there by those same node migrations under NODE_POSTGRES_DB=omnidash_analytics, and are NEVER
  touched by this flat infra migration (it runs only against POSTGRES_DB=omnibase_infra). The id-based
  runner (schema_migrations PRIMARY KEY, no checksum) skips 087 on lanes that already applied it, so editing
  it re-runs nowhere already-migrated and is a harmless no-op (IF EXISTS) on cold DBs. Shipped on omnibase_infra
  PR (flat migration + contract). This OCC PR carries the central contract consumed by the omnibase_infra
  PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
