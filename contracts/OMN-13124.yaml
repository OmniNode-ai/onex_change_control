schema_version: "1.0.0"
ticket_id: "OMN-13124"
title: "Add node_projection_pattern_learning (pattern-stored.v1 -> pattern_learning_artifacts)"
summary: >-
  The pattern_learning golden chain had no consume-leg: onex.evt.omniintelligence.pattern-stored.v1 had
  no projection consumer, so the pattern_learning_artifacts tail table was never written and the golden-chain
  sweep timed out (0/N). This ticket adds node_projection_pattern_learning, a reducer projection node
  that subscribes to pattern-stored.v1, UPSERTs into pattern_learning_artifacts keyed on pattern_id (latest-state-wins),
  preserves richer materialized evidence when a later sparse event arrives (mirrors node_projection_delegation._preserve_existing_evidence),
  and emits onex.evt.omnimarket.projection-pattern-learning-applied.v1. Ships the node (contract.yaml,
  metadata.yaml, HandlerProjectionPatternLearning projection handler + PatternLearningProjectionRunner
  Kafka consume-leg), the migration 0000_create_pattern_learning_artifacts.sql (target DB omnidash_analytics),
  the pyproject.toml entry-point, and golden-chain tests including an OMN-13121-style row-delta proof
  (test_row_delta_before_zero_after_one: before=0, project one terminal, after=exactly 1 row). The runtime
  dogfood inventory count is bumped 300 -> 301 for the new addressable node.
is_seam_ticket: false
interface_change: false
