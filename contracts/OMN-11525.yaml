---
schema_version: "1.0.0"
ticket_id: "OMN-11525"
title: "feat(OMN-11525): declared demo pipeline + mode banners + preflight"
summary: >-
  Add a typed judge-facing demo pipeline with declared AGENT, ENTROPY, REGRESSION, and SUMMARY stages,
  explicit execution mode banners, startup preflight, and replay fallback when the cloud API key is absent.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
contract_completeness: "ENRICHED"
evidence_requirements:
  - kind: "manual"
    description: "onex-self-extending-agent PR #107 carries the OMN-11525 implementation at the recorded
      head."
    command: "gh pr view 107 --repo OmniNode-ai/onex-self-extending-agent --json number,state,headRefName,headRefOid,url,title"
  - kind: "tests"
    description: "Unit, lint, format, and strict typecheck verification passed locally."
    command: "uv run ruff check src tests && uv run ruff format --check src tests && uv run mypy src/
      --strict --ignore-missing-imports && PYTHONDONTWRITEBYTECODE=1 uv run pytest tests/unit -q"
  - kind: "manual"
    description: "No-key judge demo runs in replay/fixture modes and completes without requiring ONEX_TRACK_A_API_KEY."
    command: "env -u ONEX_TRACK_A_API_KEY PYTHONDONTWRITEBYTECODE=1 uv run python -m src --demo"
  - kind: "manual"
    description: "Broken entropy import is classified as DEGRADED by typed preflight instead of crashing."
    command: "PYTHONDONTWRITEBYTECODE=1 uv run pytest tests/unit/test_demo_pipeline.py::test_broken_entropy_import_is_degraded_not_fatal
      -q"
  - kind: "ci"
    description: "onex_change_control PR carrying this central evidence is bound to OMN-11525."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11525/dod-occ-pr/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-product-pr-107-open"
    description: "onex-self-extending-agent PR #107 carries OMN-11525 at the recorded head SHA."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-product-pr-107-open/command.yaml\"
          && grep -q '^pr_number: 107$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-product-pr-107-open/command.yaml\"
          && grep -q '^commit_sha: \"29a3c2993d340a8e7ee97719bd95caa00f77f14b\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-product-pr-107-open/command.yaml\""
  - id: "dod-local-verification"
    description: "Ruff lint, Ruff format check, strict mypy, and full unit suite passed locally."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-local-verification/command.yaml\"
          && grep -q '842 passed, 1 skipped' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-local-verification/command.yaml\"
          && grep -q 'Success: no issues found in 94 source files' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-local-verification/command.yaml\""
  - id: "dod-no-key-demo"
