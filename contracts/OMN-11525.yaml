    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-no-key-demo/command.yaml\"
          && grep -q 'AGENT: REPLAY | EXECUTED' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-no-key-demo/command.yaml\"
          && grep -q 'ENTROPY: FIXTURE | EXECUTED' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-no-key-demo/command.yaml\"
          && grep -q 'REGRESSION: FIXTURE | EXECUTED' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11525/dod-no-key-demo/command.yaml\""
