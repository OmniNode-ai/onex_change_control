    description: "Focused typed contract config and NodeCoreBase config tests pass at the omnibase_core
      PR head."
    command: "env -u PYTHONPATH uv run pytest tests/unit/contracts/test_model_contract_config.py tests/unit/infrastructure/test_node_core_base_contract_config.py
      -q"
  - kind: "ci"
    description: "CI-equivalent omnibase_core mypy validation passes at the omnibase_core PR head."
    command: "env -u PYTHONPATH uv run mypy src/ --config-file=mypy.ini"
