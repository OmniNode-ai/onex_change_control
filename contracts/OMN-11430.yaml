title: "Replace loose contract config dicts with strongly typed ModelContractConfig"
summary: >
  Replace loose `dict[str, object]` contract config surfaces in omnibase_core with a frozen Pydantic `ModelContractConfig`
  hierarchy, validate YAML config at load/read time, and keep `NodeCoreBase.contract_config` from silently
  accepting malformed non-mapping config values.
