schema_version: "1.0.0"
ticket_id: "OMN-13131"
title: "OMN-13131 — Phase 1 bus-native action loop (renderer-as-effect emitter + capability projection)
  DoD contract"
summary: >-
  Phase 1 of the Contract-Driven UI Platform (epic OMN-13129), per plan docs/plans/2026-06-13-contract-driven-ui-platform-unified-plan.md
  §8 Phase 1 and §7. Generalizes the runtime action loop so that the renderer effect node emits every
  UI action as a canonical command envelope directly onto the event bus over bus transport (the WebSocket↔Kafka
  write-direction bridge), removing both HTTP hops from the action path — the omnidash per-action route
  /api/delegation/trigger and the /v1/effects REST surface. Generalizes ProjectionContainer + the OMN-10282
  resolveChartAdapter into a ModelRendererCapabilityContract-driven dispatcher (capabilities become dispatch-driving,
  not metadata). Adds the capability registry projection per §7: each renderer publishes its capability
  contract on startup/heartbeat over command topic onex.cmd.ui.renderer-capability-declared.v1, consumed
  by node_renderer_capability_projection (omnimarket reducer) which materializes the projection; the projection
  service refuses to send a client a UI contract requiring a component kind that client's capability row
  does not freshly advertise, surfacing typed upstream-blocked rather than rendering blind. Hard rules
  become enforcement gates: every action is a declared command emitter; every disabled state carries an
  EnumEmptyStateReason; the no-projection-fallback generalizes into a cross-renderer enforcement gate;
  every screen traces to a projection. This OCC contract is the central, citable Evidence-Source making
  OMN-13131 a gate-valid ticket so the Phase-1 code PRs pass the verify/verify Receipt Gate. The per-code-PR
  binding receipts (renderer effect-node emitter, capability-projection reducer, typed empty-state, cross-renderer
  gate) accrue under drift/dod_receipts/OMN-13131/ as the Phase-1 PRs land — and are consolidated via
  the W8 contract-derived golden-chain OCC pass; this initial landing carries the dod-occ-self self-binding
  evidence item so the OCC PR satisfies its own OCC eligibility check now.
is_seam_ticket: true
interface_change: true
