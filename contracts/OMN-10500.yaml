interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "Focused repair and SessionStart plugin venv tests pass on omniclaude PR #1507"
    command: "cd omni_worktrees/OMN-10500/omniclaude && uv run pytest tests/scripts/test_repair_plugin_venv.py
      -q"
  - kind: "manual"
    description: "Post-merge deploy validation command is recorded; live deploy/restart requires explicit
      approval"
    command: "deploy validation: bash plugins/onex/hooks/scripts/ensure-plugin-venv.sh"
  - kind: "tests"
    description: "Infra trusted namespace constants and default runtime security integration tests pass
      on omnibase_infra PR #1493"
    command: "cd omni_worktrees/OMN-10500/omnibase_infra && PYTHONPATH=src uv run pytest tests/unit/runtime/test_constants_security.py
      tests/integration/runtime/test_security_namespace_defaults_integration.py -q"
  - kind: "manual"
    description: "Infra repo-local namespace trust deploy contract validates"
    command: "cd omni_worktrees/OMN-10500/omnibase_infra && uv run validate-yaml contracts/OMN-10500.yaml"
