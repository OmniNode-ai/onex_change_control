  OCC evidence for the omniclaude follow-up PR that migrates the legacy ONEX_EVIDENCE_ROOT env-var read
  in dod_evidence_runner.resolve_evidence_output_dir to the canonical core resolver resolve_evidence_root()
  landed by OMN-13136 (omnibase_core.utils.util_omni_home_paths). The resolver reads OMNI_HOME fail-fast
  and returns $OMNI_HOME/onex_change_control/evidence — the same path the legacy ONEX_EVIDENCE_ROOT env
