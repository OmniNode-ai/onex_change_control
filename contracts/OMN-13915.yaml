ticket_id: "OMN-13915"
title: "fix(runners): listener liveness — heartbeat healthcheck, entrypoint watchdog, fleet-status canary"
summary: >-
  Root-cause fix for the 2026-07-03 zombie fleet: 37/48 self-hosted runner listeners were dead-in-container
  since ~2026-06-29 while every Docker healthcheck stayed green, because the healthcheck asserted container
  liveness rather than listener liveness. omnibase_infra PR #2194 delivers three enforced layers: (1)
  healthcheck.sh asserts the RUNNER_HOME-anchored Runner.Listener process is alive AND its _diag heartbeat
  is fresh (default 900s) AND github.com egress; (2) an entrypoint watchdog recycles the runner when the
  listener dies under a still-alive wrapper tree (bounded restarts); (3) a NEW scheduled GitHub-hosted
  canary workflow (runner-fleet-canary.yml, every 15 min on ubuntu-latest) compares the org runner registry
  against config/runner_fleet.yaml expected_count and fails loudly when offline+missing runners exceed
  the threshold. Code + PR only — NO live-fleet mutation; rollout is a separate step documented in the
  runbook and the ticket rollout-plan comment.
