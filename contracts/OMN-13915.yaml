ticket_id: "OMN-13915"
title: "fix(runners): listener liveness - heartbeat healthcheck, entrypoint watchdog, fleet-status canary"
summary: >-
  Root-cause fix for the 2026-07-03 zombie fleet: 37/48 self-hosted runner listeners were dead-in-container
  since ~2026-06-29 while every Docker healthcheck stayed green, because the healthcheck asserted container
  liveness rather than listener liveness. omnibase_infra PR #2194 delivers three enforced layers: (1)
  healthcheck.sh asserts the RUNNER_HOME-anchored Runner.Listener process is alive and its _diag heartbeat
  is fresh and github.com egress works; (2) an entrypoint watchdog recycles the runner when the listener
  dies under a still-alive wrapper tree; (3) a scheduled GitHub-hosted canary compares the org runner
  registry against config/runner_fleet.yaml. Code plus PR evidence only; live fleet deploy remains a separate
  operator action.
