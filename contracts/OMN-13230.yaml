schema_version: "1.0.0"
ticket_id: "OMN-13230"
title: "two-layer worktree GC: catch-up backstop + retained hourly timer (T6)"
summary: >-
  OMN-13230 completes the merge-triggered worktree GC epic (OMN-13008, T6) by adding the Layer 2 timer-backstop
  / catch-up sweep that complements the T4 (OMN-13228) event-first reaper, and by documenting the two-layer
  model so both layers are proven to converge. Layer 1 (event-first) reaps each newly-merged PR's worktree
  within one short poll interval by reading the onex.evt.github.pr-merged.v1 projection ?since=<cursor>.
  Layer 2 (this ticket) is a cursor-INDEPENDENT full reconciliation that drives the canonical prune-worktrees.sh
  directly across every root, reaping ALL already-merged worktrees still present — not just the since-cursor
  window — to catch events missed during daemon downtime or dropped before the cursor advanced. The catch-up
  sweep reuses the SAME prune safety (merged + clean + pushed-only; dirty / no-upstream / detached SKIPPED)
  and never touches the cursor, so it can never regress Layer 1's watermark. Two feature PRs: omniclaude
  ships run_catch_up_sweep() in scripts/worktree_reaper.py with --catch-up / --catch-up-interval CLI flags
  (a sweep runs once on daemon start and every hour in --loop, the Mac equivalent of the .201 onex-disk-gc.timer),
  the daemon launcher passes ONEX_REAPER_CATCH_UP_INTERVAL through, and unit tests prove the catch-up
  sweep converges on a seeded stale-but-merged worktree while SKIPPING a dirty one through the real prune
  subprocess path, with the cursor untouched; omnibase_infra ships docs/runbooks/worktree-reaper-two-layer-gc.md
  + a deploy/disk-gc README pointer documenting the two-layer model and RETAINING the hourly onex-disk-gc.timer
  backstop (no behavior removal), and vendors the already-merged omnimarket-dev node migrations to clear
  the pre-existing node-migration-sync gate drift (vendored SQL matches omnimarket dev tip exactly, mechanically
  generated). ruff + mypy --strict clean; full non-integration omniclaude suite green. Scope is code +
  docs only; the live cross-machine catch-up verification belongs to the orchestrator's deploy step. This
  contract does NOT deploy, install or enable any systemd/launchd unit, restart runtime, mutate prod/judge/.201,
  or publish live traffic.
is_seam_ticket: false
