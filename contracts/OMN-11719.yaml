---
schema_version: "1.0.0"
ticket_id: "OMN-11719"
title: "Define promotion bot identity and permissions model"
summary: >
  Defines a typed OCC promotion bot policy for the nightly dev-to-main promotion path. The policy scopes
  the nightly-promotion-bot identity to the 13 OmniNode repositories, dev as source, main as target, and
  explicitly denies direct pushes, force pushes, branch deletion, protection edits, and gate skips.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused OMN-11719 tests validate the default bot identity, verifier identity, repository scope,
      dev-to-main branch scope, allowed actions, denied actions, and policy validators.
    command: "uv run pytest tests/overseer/test_promotion_bot_policy.py tests/overseer/test_overseer_module_present.py
      -q"
  - kind: "manual"
    description: >
      Ticket contract validates against the central OCC ticket contract model.
    command: "uv run validate-yaml contracts/OMN-11719.yaml"

dod_evidence:
  - id: "dod-promotion-bot-policy-tests"
    description: "OMN-11719 focused promotion bot policy and overseer export tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11719/dod-promotion-bot-policy-tests/command.yaml"
          && grep -q '19 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11719/dod-promotion-bot-policy-tests/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11719 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11719/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11719.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11719/dod-ticket-contract-valid/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
