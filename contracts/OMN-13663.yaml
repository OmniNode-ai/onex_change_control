schema_version: "1.0.0"
ticket_id: "OMN-13663"
title: "Projection exposure⇄column drift validator + wire as pre-commit hook + required CI gate"
summary: >-
  OMN-13663 (T4, epic OMN-13659) makes the cost_tier_name class of bug self-detecting. Root cause: delegation_events.cost_tier_name
  existed in DDL (omnimarket migration 0018, ALTER TABLE ADD COLUMN) but was OMITTED from the node_projection_delegation
  decisions.v1 projection_api exposure column list, so the tier silently dropped at the projection boundary
  and the dashboard fell back to a model-name regex; no gate reconciled exposures against source columns.
  Fix: a projection exposure⇄column drift validator shipped in omnibase_core (the canonical validator
  repo, PR #1350) that reconciles every projection node contract.yaml's projection_api.exposures against
  the materialized columns of the table/view each exposure reads from (DDL extracted from the node's own
  migrations: CREATE TABLE / ALTER TABLE ADD COLUMN / CREATE [OR REPLACE] VIEW). EXISTENCE drift (an exposure
  references a column its table/view does not materialize -> the projection query fails at runtime) is
  always blocking. OMISSION drift (a materialized identity/tier/cost column surfaced by no exposure --
  the cost_tier_name class) is enforced via --fail-on-omission against an annotated ratchet baseline.
  omnimarket PR #1464 wires the validator as a pre-commit hook AND a blocking "Projection Exposure Drift
  Gate" CI job over omnimarket's projection node contracts (Operating Rule #5: detection without enforcement
  is ignored). omnimarket PRs #1466/#1467 follow up by re-pinning both enforcement surfaces from the transient
  feature-branch SHA to the permanent omnibase_core dev merge SHA after #1350 landed (#1466 was closed
  unmerged; #1467 is the live replacement). Cross-repo install mirrors the Canonical Inference / URL Authority
  gates (a pinned git dependency on omnibase_core). Product PRs: omnibase_core #1350, omnimarket #1464,
  omnimarket #1467.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
