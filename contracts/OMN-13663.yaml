    description: >-
      omnibase_core PR #1350 ships the check-projection-exposure-drift validator (omnibase_core.validators.projection_exposure_drift)
      + severity/kind enums + finding model + 18 unit tests + an exported .pre-commit-hooks.yaml hook
      id. The validator's string/comment-aware SQL pass extracts base-table columns (CREATE TABLE + ALTER
      TABLE ADD COLUMN) and view output columns, runs the EXISTENCE check (blocking) over precise base-table
      columns and the OMISSION heuristic over identity/tier/cost keywords. Proven safe against the full
      real omnimarket projection-contract corpus (EXIT 0, 0 false existence errors); 3 parser false-positive
      classes were found and fixed during the retro-scan before they could block legitimate PRs. The probe
      re-runs the validator unit suite and proves 18 passed.
    source: "manual"
    status: "verified"
    checks:
