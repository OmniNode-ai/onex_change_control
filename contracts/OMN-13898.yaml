summary: >-
  WS-F F2 release enabler. Binds OCC evidence for omnibase_core promotion PR #1380 (promotion/omn-13898-core-dev-to-main,
  base=main, v0.46.4). The PR promotes origin/dev (@6e2edf79, CI-green) to main via git merge -s ours
  origin/main (main is strict:false; tree byte-identical to origin/dev except two pre-existing .onex_state/evidence/*
  files restored from main so the squash does not delete them). 0.46.4 ships the no-faked-boundary detector
  false-positive fix (OMN-13502, #1377 — exempts the canonical recorded-replay seam so omnibase_core reports
  0 findings) plus the blocking gate wiring (OMN-13895, #1379 — no-faked-boundary.yml required CI workflow
  + pre-commit hook without --report-only). Net-new OCC evidence for OMN-13898 because the merged OMN-13502/OMN-13895
  receipts bind to the detector-fix PR #1377 and the gate-flip PR #1379/#1378, not this dev->main promotion
  PR, and the net-new-only OCC constraint (OMN-13888 whole-file-hash defect) forbids re-editing the merged
  contracts.
