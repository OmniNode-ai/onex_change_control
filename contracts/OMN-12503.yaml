schema_version: "1.0.0"
ticket_id: "OMN-12503"
title: "Add stability runtime ONEX health probe env"
summary: >-
  Require ONEX_INFRA_HOST and ONEX_INFRA_USER in the stability-test runtime lane so node_session_orchestrator
  health, deploy-agent, and observability probes can run inside the deployed runtime process.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra PR #1801 carries the stability runtime env fix."
    command: "gh pr view 1801 --repo OmniNode-ai/omnibase_infra --json number,url,state,headRefOid,headRefName,title,baseRefName"
  - kind: "tests"
    description: "Stability runtime compose and lane regression tests pass locally."
    command: "env -u PYTHONPATH uv run pytest tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
      -q"
  - kind: "ci"
    description: "Touched stability runtime tests pass ruff checks."
    command: "env -u PYTHONPATH uv run ruff format --check tests/unit/infra/test_stability_test_runtime_lane.py
      tests/integration/infra/test_stability_test_runtime_compose_render.py && env -u PYTHONPATH uv run
      ruff check tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py"
  - kind: "manual"
    description: "Deploy-gate assessment records required post-merge stability runtime redeploy and session_orchestrator
      smoke."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12503/dod-deploy-assessment/command.yaml"
  - kind: "manual"
    description: "onex_change_control PR #1945 publishes the OMN-12503 central contract and receipts."
    command: "gh pr view 1945 --repo OmniNode-ai/onex_change_control --json number,url,state,headRefOid,headRefName,title,baseRefName"
