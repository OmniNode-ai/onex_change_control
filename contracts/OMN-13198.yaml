ticket_id: "OMN-13198"
title: "B5: remove ModelOnexEnvelope from docs/docstrings + fix fabricated handler-protocol doc row"
summary: >-
  Phase B5 of the envelope-dedup / platform-debt workstream (with OMN-13204). Removes every ModelOnexEnvelope
  reference from documentation and docstrings across omnibase_infra, omnibase_spi, and omniintelligence,
  and corrects a fabricated handler-protocol doc row. The legacy ModelOnexEnvelope class and its dedicated
  tests are deleted by B4 (OMN-13196 / omnibase_core PR #1250) and are out of scope here; this phase is
  strictly docstring/markdown so it stays clear of the deploy-gate runtime-path matcher. omnibase_infra
  CLAUDE.md claimed "ProtocolHandler | Envelope-based (runtime) | ModelOnexEnvelope -> ModelOnexEnvelope";
  verified against omnibase_spi/src/omnibase_spi/protocols/handlers/protocol_handler.py the real signature
  is ProtocolHandler.execute(request: ModelProtocolRequest, operation_config: ModelOperationConfig) ->
  ModelProtocolResponse (request/response I/O for HTTP/DB/Kafka, not envelope-based). The row and the
  matching TERMINOLOGY_GUIDE.md prose are corrected to the real types. All other doc/docstring ModelOnexEnvelope
  references are retargeted to the canonical ModelEventEnvelope: omnibase_infra (TERMINOLOGY_GUIDE.md,
  mixin_kafka_broadcast.py, handler_llm_openai_compatible.py), omnibase_spi (protocols/README.md, PROTOCOL_SEQUENCE_DIAGRAMS.md),
  and omniintelligence (model_event_bus_config.py). grep -rn 'ModelOnexEnvelope' over *.md/*.py (excluding
  .venv) on each of the three impl branches returns 0. No Kafka topic schema change, no DDL/migration,
  no runtime/deploy/.201 mutation. Residual: omnibase_core docs (node-building tutorials, NAMING_CONVENTIONS.md,
  onex_terminology.md, IMPORT_COMPATIBILITY_MATRIX.md) plus several omnibase_core src/test files still
  reference ModelOnexEnvelope; those belong to B4's repo (the class still exists there until PR #1250
  merges) and are not in this phase's scope.
