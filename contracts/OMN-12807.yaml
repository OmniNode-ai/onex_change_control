schema_version: "1.0.0"
ticket_id: "OMN-12807"
title: "Internal-infra URLs to contract overlay (runtime health lane_policy, OMNIDASH_API_URL, bolt://localhost)"
summary: >-
  Removes three groups of hardcoded internal-infra URLs from omnimarket source and replaces them with
  overlay-resolved contract references that fail closed when the binding is absent. (1) bolt://localhost
  defaults in handler_architecture_graph_populate.py (two sites) bypassed the ModelArchitectureGraphPopulateConfig
  default_factory guard; replaced with explicit RuntimeError when self._config is None. (2) _DEFAULT_BASE_URL
  = "http://localhost:3002" in cli/commands/trace.py removed; _base_url() now raises click.ClickException
  when OMNIDASH_API_URL is unset. (3) Hardcoded Docker service DNS health URLs in events/runtime_deployment.py
  (_LANE_TARGETS health_targets tuples) replaced with RUNTIME_{DEV,STABILITY,PROD}_HEALTH_URLS overlay
  env vars resolved via _resolve_health_targets(). Contract declarations added to node_redeploy_orchestrator
  and node_redeploy_deploy_effect contracts. All callers fail closed (KeyError / RuntimeError / ClickException)
  on missing values.
