---
schema_version: "1.0.0"
ticket_id: "OMN-11887"
title: "fix(OMN-11887): ship node-owned baselines projection migration"
summary: >-
  node_projection_baselines (omnimarket) declared four omnidash_analytics tables — baselines_snapshots,
  baselines_comparisons, baselines_trend, baselines_breakdown — under db_io.db_tables, but every row referenced
  0001_omnidash_analytics_read_model.sql, a file that exists in no repo, and the node shipped no migrations/
  directory. The omnimarket projection migration runner (scripts/run-projection-migrations.py) discovers
  node-owned SQL by globbing src/omnimarket/nodes/<node>/migrations/*.sql, so the four tables were never
  created and the projection could never materialize. This adds migrations/0001_create_baselines_tables.sql
  — idempotent (CREATE TABLE IF NOT EXISTS) DDL whose column shapes mirror BaselinesProjectionRunner (handler_baselines.py),
  the handler whose contract db_tables roles (snapshots/comparisons/trend/breakdown) back these tables
  — repoints all four db_tables[].migration values at the new file, and reconciles the sibling node_projection_overnight
  db_tables[].migration values from the stale schema_overnight_sessions.sql to the shipped 0000_create_overnight_sessions_tables.sql
  (the 0001 file is the readiness view, not a base table). No live deploy is performed; this is a migration
  + contract-metadata change.
