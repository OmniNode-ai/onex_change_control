---
schema_version: "1.0.0"
ticket_id: "OMN-11292"
title: "Bind omnibase_core actions dependency PR to OCC evidence"
summary: >
  Central OCC evidence for omnibase_core PR #1119. The PR is a Dependabot GitHub Actions group update;
  this contract binds the exact product PR head and records that all visible non-Receipt-Gate checks are
  green or skipped.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_core PR #1119 is open against main at the recorded Dependabot head."
    command: "gh pr view 1119 --repo OmniNode-ai/omnibase_core --json state,headRefOid,baseRefName"
  - kind: "ci"
    description: "All visible non-Receipt-Gate checks on omnibase_core PR #1119 are SUCCESS or SKIPPED."
    command: "gh pr checks 1119 --repo OmniNode-ai/omnibase_core --json name,state"
  - kind: "manual"
    description: "The OCC PR carrying this central evidence is open and bound to OMN-11292."
    command: "gh pr view ${PR_NUMBER} --repo OmniNode-ai/onex_change_control --json state,headRefOid"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-core-pr-1119"
    description: "omnibase_core PR #1119 is open against main at the recorded Dependabot actions head."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-omnibase-core-pr-1119/command.yaml\"
          && grep -q '^pr_number: 1119$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-omnibase-core-pr-1119/command.yaml\"
          && grep -q '^commit_sha: \"7bad7d942878277174a35802ba091290cb69ff42\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-omnibase-core-pr-1119/command.yaml\""
  - id: "dod-non-receipt-checks"
    description: "All visible non-Receipt-Gate checks on omnibase_core PR #1119 are green or skipped."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-non-receipt-checks/command.yaml\"
          && grep -q 'all visible non-Receipt-Gate checks are SUCCESS or SKIPPED' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-non-receipt-checks/command.yaml\""
  - id: "dod-occ-pr"
    description: "onex_change_control PR carrying the OMN-11292 central contract and receipts is open."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-occ-pr/command.yaml\"
          && grep -q '^ticket_id: \"OMN-11292\"' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-occ-pr/command.yaml\"
          && grep -q '^pr_number: 1221$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11292/dod-occ-pr/command.yaml\""
