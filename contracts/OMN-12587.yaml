  - id: "dod-sea-live-unblock-pr-202"
    description: >
      onex-self-extending-agent PR #202 lands the fix that truly unblocks SEA live delegation, found by
      a live proof on the stability-test lane. DEFECT 1: _KafkaStabilityTransport.close() called EventBusKafka.stop()
      (no such method; EventBusKafka exposes close()), crashing every live delegation round-trip at teardown
      — fixed to close(), with a REAL-API regression test that constructs a real EventBusKafka and asserts
      the adapter only calls methods that exist on it (fails on the old stop() code, closes the stub-hides-API-drift
      gap). DEFECT 2: the model registry pinned local inference at localhost:8000 (unreachable off-host),
      skipping Track-B — added the documented SEA_LOCAL_INFERENCE_BASE_URL env seam that rewrites local_vllm
      endpoint hosts (path/cloud preserved; explicit overlay endpoint wins). DEFECT 3: the delegation
      effect appends /v1/chat/completions to intent.base_url but SEA endpoints declare the full URL (404
      double-path) — InferenceClient.infer now normalizes base_url to its origin. Proven green by the
      new unit tests, full pytest (no -k), mypy --strict, ruff, and pre-commit (incl. the OMN-12608 inference-architecture
      guard + OMN-12609 architecture-verdict).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12587/dod-sea-live-unblock-pr-202/command.yaml"
