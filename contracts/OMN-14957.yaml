schema_version: "1.0.0"
ticket_id: "OMN-14957"
title: "OCC evidence for omnibase_infra#2397 chained release-train deploy trigger"
summary: "Central OCC evidence for the OMN-14957 portion of omnibase_infra#2397, which chains the release-train
  deploy job into the same workflow run after the cut-tag job because refs created with GITHUB_TOKEN do
  not fire a second push workflow. Evidence is limited to the PR's code, tests, and recorded verification;
  no live deploy re-fire is claimed by this contract."
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra PR #2397 is open at the recorded OMN-14957 head."
    command: "test -f drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-head/command.yaml && grep
      -Fq '388b7a8eabdb9fdaa03099429405a6f1073fd433' drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-head/command.yaml"
  - kind: "manual"
    description: "omnibase_infra PR #2397 scope includes the release-train workflow, cut-tag script, and
      workflow trigger tests."
    command: "test -f drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-scope/command.yaml && grep
      -Fq '.github/workflows/release-train-lab.yml' drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-scope/command.yaml
      && grep -Fq 'tests/scripts/test_release_train_lab_workflow_trigger.py' drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-scope/command.yaml"
  - kind: "manual"
    description: "omnibase_infra PR #2397 body records chained deploy trigger behavior and green tests."
    command: "test -f drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-verification/command.yaml
      && grep -Fq 'deploy chained onto cut-tag' drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-verification/command.yaml
      && grep -Fq '50 passed' drift/dod_receipts/OMN-14957/dod-omnibase-infra-pr-2397-verification/command.yaml"
  - kind: "manual"
    description: "OCC companion PR #4633 carries central OMN-14957 evidence for omnibase_infra#2397."
    command: "test \"$(gh api repos/OmniNode-ai/onex_change_control/pulls/4633 --jq .head.ref)\" = codex-letter/occ-omn-14956-14957-infra2397"
