schema_version: "1.0.0"
ticket_id: "OMN-13535"
title: "Propagate per-tier metered cost across escalation to the delegation projection"
summary: >
  On an escalated delegation the metered tier's cost_usd never reached the delegation_events projection:
  each attempted tier was recorded into escalation_history without its tokens/cost and workflow.inference_*
  was reset for the next tier, so the terminal reported only the FINAL accepted tier. When a metered cheap_cloud
  tier ran, was rejected by the quality gate, and escalation landed on a free tier, the terminal recorded
  cost_usd=0 despite a real multi-thousand-token metered call. The fix prices each attempted tier once
  (the same recompute_actual_cost_and_savings the projection uses), stamps the cost into escalation_history
  before the inference reset, accumulates non-terminal attempt spend (banked only on escalation branches
  so the terminal attempt is not double-counted), and reports final_tier_cost + cumulative_prior_attempt_cost.
  The projection re-derives the same total. Net: an escalated metered delegation now produces a row with
  tokens>0 and cost_usd>0.
is_seam_ticket: false
