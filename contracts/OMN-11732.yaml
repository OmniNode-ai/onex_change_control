---
schema_version: "1.0.0"
ticket_id: "OMN-11732"
title: "Build nightly promotion workflow"
summary: >
  Adds the OCC-owned nightly dev-to-main promotion workflow scaffold. The workflow runs on the 06:00 UTC
  schedule and manual dispatch, generates an intended promotion manifest, classifies code/integration/runtime
  failure classes from observed evidence artifacts, records wave-ordered per-repository PR results, and
  creates promotion PRs only when execute-mode gates are promotable.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused promotion tests validate manifest generation, workflow evidence helpers, failure classification,
      promotion wave ordering, and promotion bot policy boundaries.
    command: "uv run pytest tests/promotion/test_manifest.py tests/promotion/test_workflow.py tests/overseer/test_promotion_bot_policy.py
      -q"
  - kind: "manual"
    description: >
      Ruff validates formatting, import ordering, and lint rules for the promotion package, tests, and
      script entrypoint registration.
    command: "uv run ruff format src/onex_change_control/promotion tests/promotion pyproject.toml && uv
      run ruff check src/onex_change_control/promotion tests/promotion pyproject.toml"
  - kind: "manual"
    description: "Mypy validates the promotion package under strict repo typing rules."
    command: "uv run mypy src/onex_change_control/promotion"
  - kind: "manual"
    description: "Actionlint validates the nightly promotion workflow syntax and shell snippets."
    command: "actionlint .github/workflows/nightly-promote.yml"
  - kind: "manual"
    description: >
      Ticket contract validates against the central OCC ticket contract model.
    command: "uv run validate-yaml contracts/OMN-11732.yaml"

dod_evidence:
  - id: "dod-nightly-promotion-tests"
    description: "OMN-11732 focused promotion workflow tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-tests/command.yaml"
          && grep -q '15 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-tests/command.yaml"
  - id: "dod-nightly-promotion-lint"
    description: "OMN-11732 promotion package passes ruff format and lint checks."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-lint/command.yaml"
          && grep -q 'All checks passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-lint/command.yaml"
  - id: "dod-nightly-promotion-mypy"
    description: "OMN-11732 promotion package passes mypy."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-mypy/command.yaml"
          && grep -q 'Success: no issues found' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-mypy/command.yaml"
  - id: "dod-nightly-promotion-actionlint"
    description: "OMN-11732 nightly promotion workflow passes actionlint."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-actionlint/command.yaml"
          && grep -q 'actionlint .github/workflows/nightly-promote.yml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-nightly-promotion-actionlint/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11732 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11732.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11732/dod-ticket-contract-valid/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
