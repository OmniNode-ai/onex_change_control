ticket_id: "OMN-13950"
title: "Docker Build workflow optimization — fix the ~2/30-success, 130-150min saturation driver (SAT2)"
summary: >-
  Fleet-load reduction (Track 1, OMN-13932 §5.3 / SAT2). The Docker Build workflow was the runner fleet's
  saturation driver. Root cause: warm-cache builds are ~8 min, but BuildKit --mount=type=cache is local
  to a single runner, so a build landing on a cold runner re-ran the full torch + uv-sync install (~40-89
  min); and much of the low success rate was superseded-run cancellations (addressed by OMN-13949 cancel-in-progress).
  omnibase_infra PR #2210 switches the docker-build job's buildx to the docker-container driver and adds
  a shared GHCR registry layer cache (cache-from always; cache-to on main push only, mode=max) so a cold
  runner imports unchanged layers instead of rebuilding, and gates the informational continue-on-error
  docker-integration-tests job off pull_request events (it held a self-hosted runner up to 30 min per
  docker PR for zero merge-gating value; it now runs post-merge on push + workflow_dispatch). The required
  docker-build gate still runs on PRs, so merge safety is unchanged. This is CI-configuration evidence
  only; no runtime deploy, restart, docker exec, rpk topic produce, AWS mutation, or live cluster mutation
  was performed.
