schema_version: "1.0.0"
ticket_id: "OMN-12851"
title: "Auto-wired generation consumer must receive runtime event_publisher"
summary: >-
  Fixes the stability-test close-loop blocker where infra auto-wiring constructed omnimarket HandlerGenerationConsumer
  through the zero-arg path because event_publisher was optional. The handler therefore used its noop
  publisher default: node-generation-completed could project from the returned benchmark, but deploy,
  registration, and escalation side-emits were silently dropped. The infra fix materializes a runtime-backed
  event_publisher for handlers that declare it, fails fast when an event-publishing handler is wired without
  a runtime event bus, and adds focused auto-wiring regression coverage for the HandlerGenerationConsumer-shaped
  constructor path.
