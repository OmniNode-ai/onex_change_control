emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-001
    description: PR opened against main branch
    source: generated
    checks:
      - check_type: command
        check_value: gh pr view ${PR_NUMBER} --json state -q .state --repo ${REPO}
  - id: dod-002
    description: PR merged to main
    source: generated
    checks:
      - check_type: command
        check_value: gh pr view ${PR_NUMBER} --json mergedAt -q .mergedAt --repo ${REPO}
  - id: dod-003
    description: Tests pass in CI
    source: generated
    checks:
      - check_type: command
        check_value: gh pr checks ${PR_NUMBER} --watch --repo ${REPO}
  - id: dod-004
    description: Pre-commit hooks clean
    source: generated
    checks:
      - check_type: command
        check_value: pre-commit run --all-files
  - id: dod-005
    description: Test coverage meets minimum threshold
    source: generated
    checks:
      - check_type: test_passes
        check_value: uv run pytest --cov --cov-fail-under=80
  - id: dod-claude-1908-head
    description: 'Product PR #1908 exists on dev at exact head d1a58967.'
    source: manual
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json state,baseRefName,headRefOid --jq '.state == "OPEN" and .baseRefName
          == "dev" and .headRefOid == "d1a5896774677c3459bf88f9f83cc2f4c7de88ca"' | grep -q true
  - id: dod-claude-1908-test-only
    description: 'PR #1908 changes only the dedicated pattern_tracker unit tests file.'
    source: manual
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; diff_paths="$(gh pr
          diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --name-only)"; printf '%s\n' "$diff_paths"
          | grep -qx 'tests/unit/lib/utils/test_pattern_tracker.py'; test "$(printf '%s\n' "$diff_paths"
          | wc -l)" -eq 1
  - id: dod-claude-1908-local-proof
    description: 'PR #1908 body records 48 passed, 76% target-module coverage, and local quality gates.'
    source: manual
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json body --jq '.body' | grep -E '48 passed|76%|ruff|pre-commit'
  - id: dod-claude-1908-no-deploy
    description: 'PR #1908 is test-only and does not deploy, push images, restart runtime, mutate live
      infrastructure, mutate branch protection, or cut over required contexts.'
    source: manual
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; diff_paths="$(gh pr
          diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --name-only)"; printf '%s\n' "$diff_paths"
          | grep -qx 'tests/unit/lib/utils/test_pattern_tracker.py'; test "$(printf '%s\n' "$diff_paths"
          | wc -l)" -eq 1
  - id: dod-supersede-002-product-open-1908
    description: 'Append-only supersession for the generated merged-to-main check; product PR #1908 is
      open on dev at the exact tested head.'
    evidence_artifact: supersedes_dod_evidence:dod-002
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json state,baseRefName,headRefOid --jq '.state == "OPEN" and .baseRefName
          == "dev" and .headRefOid == "d1a5896774677c3459bf88f9f83cc2f4c7de88ca"' | grep -q true
  - id: dod-supersede-003-occ-cascade-1908
    description: 'Append-only supersession for the generated CI watch check; product PR #1908 has only
      OCC/receipt cascade failures before this companion.'
    evidence_artifact: supersedes_dod_evidence:dod-003
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json statusCheckRollup --jq '[.statusCheckRollup[] | select((.__typename
          == "CheckRun" and .status == "COMPLETED" and (.conclusion | IN("SUCCESS","SKIPPED","NEUTRAL")
          | not)) or (.__typename == "StatusContext" and (.state | IN("SUCCESS","PENDING") | not))) |
          select((((.name // .context) + " " + (.workflowName // "")) | test("occ-preflight|Receipt Gate|CI
          Summary|Quality Gate|Security Gate|Tests Gate|Hostile Review Gate|Omni Standards Gate")) | not)]
          | length == 0' | grep -q true
  - id: dod-supersede-004-product-precommit-1908
    description: 'Append-only supersession for the generated all-files pre-commit check; PR #1908 body
      records pre-commit and ruff proof for the test-only change.'
    evidence_artifact: supersedes_dod_evidence:dod-004
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json body --jq '.body' | grep -E 'pre-commit|ruff'
  - id: dod-supersede-005-product-coverage-1908
    description: 'Append-only supersession for the generated coverage command; PR #1908 body records targeted
      pattern_tracker coverage proof.'
    evidence_artifact: supersedes_dod_evidence:dod-005
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: PRODUCT_PR_NUMBER=1908; PRODUCT_REPO=OmniNode-ai/omniclaude; gh pr view "$PRODUCT_PR_NUMBER"
          --repo "$PRODUCT_REPO" --json body --jq '.body' | grep -E 'pattern_tracker|48 passed|76%'
