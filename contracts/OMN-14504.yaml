title: "OCC companion for omnibase_infra#2282 — check_release_identity.py PYTHONPATH-shadow bootstrap
  actually protects"
summary: >
  Non-implementer DoD companion for omnibase_infra#2282 (OMN-14504, follow-up to OMN-14471/#2275). #2275's
  primary refactor (freestanding scripts/check_release_identity.py → canonical node_release_identity_compute
  COMPUTE node) is real and unaffected — its 13/13 cross-boundary equivalence proof stands. #2282 fixes
  ONE dead defensive line added mid-#2275 to repair a CI subprocess-import failure: `if _SRC_DIR.is_dir()
  and str(_SRC_DIR) not in sys.path: sys.path.insert(0, str(_SRC_DIR))`. That guard is a no-op at BOTH
  real call sites (the .pre-commit-config.yaml check-release-identity hook and the fresh-deploy-fitness.yml
  release-identity CI job — both `uv run` inside this project's own venv), because the venv's editable
  install already appends the IDENTICAL `_SRC_DIR` string to sys.path via a plain-path .pth file at interpreter
  startup, BEFORE the shim's bootstrap line runs — so `str(_SRC_DIR) not in sys.path` is already False
  and the insert never fires, letting an adversarial PYTHONPATH entry ahead of it win the import race.
  The fix strips any existing occurrence(s) of _SRC_DIR from sys.path then inserts unconditionally at
  index 0, making the promotion idempotent and unconditional instead of a no-op in the realistic invocation
  shape. HONESTY NOTE ON THE PROOF STANDARD — read before trusting the greens below. This is RED-against-
  EXISTS-but-WRONG, not RED-on-absence: the defect is a guard that LOOKS protective and IS present, not
  a missing guard. dod-verify-2282-static-markers proves both states via gh-api reads at pinned SHAs (merged
  #2275 132cf776 vs. #2282 head d2b8ad4e): the vulnerable conditional line is present verbatim in the
  OLD file and absent (as executable code, not merely absent from a comment restating it) from the NEW
  file, and the NEW file's replacement lines (strip-then-unconditional-insert) are present. This check_value
  does NOT re-prove the runtime RED-then-GREEN behavior — the DoD runner's cwd is the OCC clone (OMN-14427
  taxonomy), so it cannot execute omnibase_infra's pytest against a local worktree, and a local-path check_value
  would be INERT in CI (OMN-14436) and must not be allowed to launder a red PR into green evidence. That
  dynamic proof WAS independently performed by this companion's author (not #2282's implementer), workspace-locally:
  swapped #2282's fixed scripts/check_release_identity.py for the verbatim merged-#2275 content, ran ONLY
  the new regression test (test_real_shim_resists_pythonpath_shadow_from_editable_install) → FAILED, decoy
  sentinel CRID_DECOY_SENTINEL_9f3a observed winning the import race (RED); restored the fix and ran the
  full test file → 15/15 PASSED (GREEN); worktree left clean afterward. That transcript is recorded in
  this PR's discussion as audit narrative, not as a machine-replayable dod_evidence check. occ-self-bind-pr-4081
  binds this OCC companion to its own PR number, required by the occ-preflight eligibility gate because
  this PR's title token (OMN-14504) makes it self-referential under ticket-token extraction.
