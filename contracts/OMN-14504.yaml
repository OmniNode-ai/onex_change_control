  - id: "dod-verify-2282-static-markers"
    description: >-
      Product-observing check against omnibase_infra#2282 head d2b8ad4e41c8e965f91c5110007c519da5ffc2ad
      and the merged #2275 commit 132cf776c397e5ea8e9522297af392e1a265738b it follows up on. Asserts,
      via gh-api content reads (no local checkout required, hermetically reproducible by anyone with gh
      access): (1) the OLD file at the merged #2275 SHA contains the vulnerable conditional verbatim —
      `if _SRC_DIR.is_dir() and str(_SRC_DIR) not in sys.path:` — establishing the RED premise is a real,
      present defect, not an absence; (2) the NEW file at #2282's head does NOT contain that conditional
      as executable code (its only occurrence in the new file is inside an explanatory comment, so the
      check targets the `if _SRC_DIR.is_dir() and str(_SRC_DIR) not in sys.path:` line form specifically,
      not a bare substring); (3) the NEW file contains both replacement lines — the strip-prior-occurrences
      filter and the unconditional `sys.path.insert(0, _src_str)` — proving the fix is the strip-then-insert
      shape described in the PR, not merely a deleted guard; (4) the NEW test file tests/scripts/test_check_release_identity.py
      contains the new regression test `test_real_shim_resists_pythonpath_shadow_from_editable_install`
      by name and its decoy-sentinel marker `CRID_DECOY_SENTINEL_9f3a`, proving the regression coverage
      is real and not merely claimed in prose.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          old="$(mktemp)" && new="$(mktemp)" && t="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/scripts/check_release_identity.py?ref=132cf776c397e5ea8e9522297af392e1a265738b"
          --jq .content | base64 -d > "$old" && gh api "repos/OmniNode-ai/omnibase_infra/contents/scripts/check_release_identity.py?ref=d2b8ad4e41c8e965f91c5110007c519da5ffc2ad"
          --jq .content | base64 -d > "$new" && gh api "repos/OmniNode-ai/omnibase_infra/contents/tests/scripts/test_check_release_identity.py?ref=d2b8ad4e41c8e965f91c5110007c519da5ffc2ad"
          --jq .content | base64 -d > "$t" && grep -F -- 'if _SRC_DIR.is_dir() and str(_SRC_DIR) not in
