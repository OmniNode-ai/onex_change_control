title: "cost.by_repo projection WRITER — materialize rows from live delegation-completed"
summary: >-
  Central Evidence-Source for the OMN-13077 writer cycle. The Wave-5 diagnosis found node_projection_cost_by_repo
  declared a projection_api over cost_by_repo_snapshots but had NO writer at all — the handler returned
  a pure dict and nothing persisted, so the table stayed empty (HWM=0 on the dead onex.evt.omniintelligence.llm-call-completed.v1
  source). This cycle builds the full materialization path: (a) a CostByRepoProjectionRunner(BaseProjectionRunner)
  + a db_io.db_tables write block, mirroring node_projection_llm_cost's LlmCostProjectionRunner; the handler
  now persists rows via asyncpg UPSERT into cost_by_repo_snapshots instead of returning a dict; (b) the
  contract re-subscribes from the dead llm-call-completed.v1 (HWM=0) to the LIVE onex.evt.omnibase-infra.delegation-completed.v1
  topic that carries real metered cost; (c) a deployed writer service (omnimarket-projection-cost-by-repo)
  lands in the omnibase_infra docker catalog so the writer actually runs in the lane; (d) repo dimension
  is read from the delegation terminal payload when present — Wave-5 found the upstream emitter does not
  populate repo today, so rows currently key on the honest "unknown" sentinel (no fabricated repo). Aggregation
  is additive within the canonical (repo_name, window, snapshot_timestamp_minute) unique key. No live
  deploy in this scope; live materialization readback is deferred to the serialized dev redeploy workstream.
