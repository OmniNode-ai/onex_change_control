---
schema_version: "1.0.0"
ticket_id: "OMN-13418"
title: "OCC evidence for approved omnibase_infra .201 prod-promotion grant"
summary: "Central OCC evidence for onex_change_control#4436, which approves a time-bounded prod-promotion
  grant for promoting the stability-proven omnibase_infra 0.38.4 runtime digest to the .201 prod lane.
  Evidence is limited to the grant registry update, local and hosted validator proof, and explicit no-raw-deploy
  guardrails; the actual prod promotion remains gated post-merge and is not performed by this PR."
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
  - kind: "manual"
    description: "The prod-promotion grant registry contains the approved OMN-13418 grant id, sole platform-lead
      approver, and absolute UTC expiry."
    command: "test -f drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-values/command.yaml && grep
      -Fq 'grant-da7450c5-d4f4-4882-94d8-654ddeb0f110' drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-values/command.yaml
      && grep -Fq 'approved_by: jonahgabriel' drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-values/command.yaml
      && grep -Fq 'expires_at: \"2026-07-24T00:00:00Z\"' drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-values/command.yaml"
  - kind: "manual"
    description: "Local validation proved the grant registry passes validate-prod-promotion-grants and
      focused validator tests."
    command: "test -f drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-validation/command.yaml &&
      grep -Fq 'PASS: grants/prod_promotion_grants.yaml' drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-validation/command.yaml
      && grep -Fq '41 passed' drift/dod_receipts/OMN-13418/dod-prod-promotion-grant-validation/command.yaml"
  - kind: "manual"
    description: "The PR body and grant reason state that no raw .201 deploy, restart, retag, or recreate
      is performed by this PR."
    command: "test -f drift/dod_receipts/OMN-13418/dod-prod-promotion-no-raw-deploy/command.yaml && grep
      -Fq 'No raw .201 SSH/docker retag/recreate path' drift/dod_receipts/OMN-13418/dod-prod-promotion-no-raw-deploy/command.yaml
      && grep -Fq 'No deploy/restart in this PR' drift/dod_receipts/OMN-13418/dod-prod-promotion-no-raw-deploy/command.yaml"
  - kind: "manual"
    description: "OCC PR #4436 carries the OMN-13418 grant registry update."
    command: "test -f drift/dod_receipts/OMN-13418/occ-self-bind-pr-4436-omn13418/command.yaml && grep
      -Fq 'jonah/prod-promote-stability-runtime' drift/dod_receipts/OMN-13418/occ-self-bind-pr-4436-omn13418/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-prod-promotion-grant-values"
    description: "Binds the approved OMN-13418 prod-promotion grant id, digest, approver, and expiry in
      grants/prod_promotion_grants.yaml."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "test -f grants/prod_promotion_grants.yaml && grep -Fq 'grant-da7450c5-d4f4-4882-94d8-654ddeb0f110'
          grants/prod_promotion_grants.yaml && grep -Fq 'approved_by: jonahgabriel' grants/prod_promotion_grants.yaml
          && grep -Fq 'expires_at: \"2026-07-24T00:00:00Z\"' grants/prod_promotion_grants.yaml"
  - id: "dod-prod-promotion-grant-validation"
    description: "Local validation passed for the grant registry and focused prod-promotion grant validator
      tests after the rebase conflict resolution."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "uv run validate-prod-promotion-grants --file grants/prod_promotion_grants.yaml &&
          uv run pytest tests/test_prod_promotion_grants.py tests/unit/scripts/test_validate_prod_promotion_grants.py
          tests/unit/test_no_duplicate_grant_ids.py -q"
  - id: "dod-prod-promotion-no-raw-deploy"
    description: "This PR only approves the grant registry entry; the runtime promotion remains gated
      and no raw .201 deploy/restart/retag/recreate is performed."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "gh pr view 4436 --repo OmniNode-ai/onex_change_control --json body --jq .body |
          grep -Fq 'No raw `.201` SSH/docker retag/recreate path.'"
  - id: "occ-self-bind-pr-4436-omn13418"
    description: "OCC PR #4436 is open on the expected prod-promotion grant branch and carries the OMN-13418
      grant update."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "test \"$(gh api repos/OmniNode-ai/onex_change_control/pulls/4436 --jq .head.ref)\"
          = jonah/prod-promote-stability-runtime"
