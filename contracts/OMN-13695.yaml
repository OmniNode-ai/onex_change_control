---
schema_version: "1.0.0"
ticket_id: "OMN-13695"
title: "fix(omnimarket): route frontier LLM tiers through ModelPolicyLoader"
summary: >
  Replaces raw assemble_live.py env reads for GLM, OpenAI, Google, and fast local LLM routing with ModelPolicyLoader-backed
  resolution. The product PR removes silent empty-string fallbacks from the build-loop orchestrator path,
  adds explicit model policy entries for OpenAI and Google frontier tiers, and keeps the routing-authority
  residue ratchet at the existing baseline by using endpoint_ref for new policy endpoint references rather
  than adding legacy env_var entries.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Focused model-policy and routing-authority tests pass, including the default validator_routing_authority
      CLI that failed before the product fix.
    command: "uv run pytest src/omnimarket/nodes/node_build_loop_orchestrator/tests/test_model_policy.py
      tests/test_routing_authority_gate.py -q"
  - kind: "ci"
    description: >
      Routing-authority residue audit passes with the default OMN-12877 baseline; no new legacy env_var
      declarations are introduced in model_policy.yaml.
    command: "uv run python -m omnibase_core.validation.validator_routing_authority --repo omnimarket
      --repo-root ."
  - kind: "ci"
    description: >
      Strict mypy passes for the node_build_loop_orchestrator package after adding endpoint_ref support
      to ModelPolicyLoader.
    command: "uv run mypy src/omnimarket/nodes/node_build_loop_orchestrator/ --strict"
  - kind: "manual"
    description: >
      Deploy assessment for the runtime-path product change: no live deploy, docker exec, rpk topic produce,
      runtime restart, ECR push, or cluster mutation was performed by the product PR. Rollout remains
      under the normal omnimarket merge/deploy pipeline after CI and deploy-gate pass.
    command: "grep -Eq '^status: \"?PASS\"?$' drift/dod_receipts/OMN-13695/dod-deploy-assessment/command.yaml"
