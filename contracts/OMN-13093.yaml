schema_version: "1.0.0"
ticket_id: "OMN-13093"
title: "Phase 1: minimal ArtifactStore slice"
summary: >-
  Adds the minimal content-addressed artifact store slice for the skill-output-suppression plan (epic
  OMN-13089): omnibase_core.artifacts.artifact_store.ArtifactStore with write_blob (sha256 content addressing
  via ModelArtifactRef.from_bytes, sharded <root>/<hh>/<full-hex> layout, atomic temp+rename writes, idempotent
  on existing hash), a JSON metadata sidecar <full-hex>.meta.json carrying the parent artifact-captured
  required fields (artifact_hash, artifact_size_bytes, artifact_media_type, artifact_kind, source_system,
  scope_ref, correlation_id, redaction_state=raw, token_estimate, created_at_utc) plus writer_version,
  hash-verified read_blob, and read_meta. Store root from required env ONEX_ARTIFACT_STORE_ROOT (KeyError
  on absence, no silent default). Stdlib + Pydantic only so omniclaude hooks import it cleanly. This is
  the SAME store the parent durable-capture plan specifies; parent Phase 1 extends it in place (retention/quota,
  redaction transforms, restricted-topic handling, authorized read API) — marked with a parent-plan extension
  comment in the module.
