schema_version: "1.0.0"
ticket_id: "OMN-13581"
title: "fix(OMN-13581): deploy-runtime.sh layers the lane overlay on all compose invocations"
summary: >
  deploy-runtime.sh invoked every docker compose call with only -f docker-compose.infra.yml, never layering
  the lane overlay (docker-compose.<lane>.yml). The base infra compose hardcodes container_name omnibase-infra-redpanda
  (the DEV name) and the dev network, so warm_broker_topic_provisioning's 'up redpanda' step recreated
  redpanda as the DEV-named container on any non-dev lane, collided with the live dev broker, got a Docker
  hash prefix, and landed in 'created' -- destroying the lane's own correctly-named broker (the ~3-day
  stability outage). The fix adds resolve_lane_overlay_filename()/resolve_compose_file_args(), which derive
  the lane from the compose project suffix and layer the matching overlay onto infra.yml for stability-test/prod/judge
  projects; unknown non-dev projects fail closed. All compose call sites and operator-facing print/summary
  paths route through the resolver.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
