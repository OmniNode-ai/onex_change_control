title: "OMN-13132 — Contract Graph IR + read-only import (Phase 2)"
summary: >-
  Phase 2 of the Contract-Driven UI Platform (epic OMN-13129). omnibase_core PR #1256 adds the canonical
  read-only Contract Graph IR: six frozen Pydantic IR models in the DISTINCT namespace src/omnibase_core/models/contract_graph/
  with non-colliding names (ModelContractGraphIr, ModelContractGraphNode, ModelContractGraphEdge, ModelContractGraphProtocol,
  ModelContractGraphContractRef, ModelContractGraphSourceSet) plus EnumContractGraphNodeRole (includes
  'renderer') and EnumContractGraphEdgeKind (includes component_renders / action_emits / data_binds).
  These are distinct from the pre-existing workflow-viz graph models (models/graph/ ModelGraphNode/ModelGraphEdge,
  UUID-keyed) and the validation-event ModelContractRef, per plan §8. Read-only dialect adapters (src/omnibase_core/contract_graph/)
  import backend node contracts and Phase-0 UI component contracts into one IR via manifest-driven discovery
  excluding .venv/omni_worktrees/generated; each source carries a stable sha256 over canonicalized bytes
  plus a stable per-adapter version hash embedded in the IR. A no-op round-trip back to canonical normalized
  contract form produces zero semantic diff, verified through the shipped cli_contract_diff spine (reused,
  not rebuilt). This OCC contract is the central Evidence-Source for PR #1256's Receipt Gate; the paired
  receipts carry the real probe evidence captured by re-running the code PR's verification commands at
  PR head 061fc854d5ece09d2bd7d8881e9c29107f687de9.
