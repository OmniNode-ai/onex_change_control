schema_version: "1.0.0"
ticket_id: "OMN-13808"
title: "fix(OMN-13808): provision onex.cmd.omnimarket.node-generation-requested.v1 (producer-created-topic
  gap, sibling of OMN-13771)"
summary: >-
  node_generation_consumer (omnimarket) correctly declares a subscription to onex.cmd.omnimarket.node-generation-requested.v1
  in event_bus.subscribe_topics, but this broker auto-creates topics only on PRODUCE, not on subscribe.
  The only producer (the projection-API /api/generate route) does not run on the runtime lane, so the
  topic stays at 0 partitions and the effects-profile consumer cannot bind — blocking generation golden
  chains G-01..G-05. omnimarket is not a build dependency of omnibase_infra, so its contract is not guaranteed
  to be in the installed-package topic scan on the runtime lane. Fix adds the command topic to omnibase_infra
  src/omnibase_infra/services/topics.yaml — the explicit provisioning target set the runtime kernel's
  TopicProvisioner scans on every lane (extract_from_skill_manifests) — mirroring the existing cross-repo
  onex.cmd.omninode.routing-requested.v1 precedent (p1/r1 default). Config/manifest change only; the live
  topic-creation + effects-profile deploy on the lane is a separate operator step. Product PR: omnibase_infra
  #2169.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
