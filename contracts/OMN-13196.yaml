ticket_id: "OMN-13196"
title: "B4: delete ModelOnexEnvelope entirely + retarget tests + clean cross-repo references"
summary: >-
  Completes the envelope-dedup workstream by deleting the legacy ModelOnexEnvelope class and collapsing
  the canonical envelope surface to ModelEventEnvelope[T]. omnibase_core deletes src/omnibase_core/models/core/model_onex_envelope.py
  and its 2 exports in models/core/__init__.py, deletes the 4 ModelOnexEnvelope-specific test files (test_model_onex_envelope.py,
  test_model_onex_envelope_source_node_id.py, test_model_onex_envelope_chunking.py, and the perf benchmark
  test_source_node_id_overhead.py — these exercised ModelOnexEnvelope's own fields, source_node_id/chunking/operation,
  which have no ModelEventEnvelope equivalent), and retargets tests/unit/validation/test_envelope_validator.py
  to a minimal frozen Pydantic stub because the surviving EnvelopeValidator is duck-typed (getattr) over
  dispatch-routing fields (source_node/operation/target_node) that ModelEventEnvelope[T] does not carry.
  Stale docstring/comment references in model_envelope_metadata.py, model_chunked_envelope.py, type_serializable_value.py,
  and the mixin_metadata.yaml `requires` entry are retargeted to ModelEventEnvelope. A coordinated omnibase_infra
  PR retargets the one live ModelOnexEnvelope import in tests/performance/test_production_benchmarks.py
  (the _make_envelope helper, used only for model_dump_json() serialization in the benchmarks) to ModelEventEnvelope[dict[str,
  Any]] and corrects two stale src docstrings, so omnibase_infra stays green after the core deletion.
  Grep across all repos under omni_home shows zero ModelOnexEnvelope references in src + tests after this
  phase. No Kafka topic schema change, no DDL/migration, no runtime/deploy/.201 mutation. Predecessor
  B3 (OMN-13194, impl PR #1248) is MERGED to dev (merge commit b7ed3f0f0845f7ccd26f84473841b8061afb7d98,
  the base of this work).
