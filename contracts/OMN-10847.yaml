---
schema_version: "1.0.0"
ticket_id: "OMN-10847"
title: "Populate routing_outcomes.quality_score from canary grading"
summary: >
  Extend materialize() to produce rows for BOTH capability_scores AND routing_outcomes tables. Introduce
  ModelMaterializeResult to hold both output row sets. routing_outcomes.quality_score is set to the composite
  score from canary grading, enabling platform readiness checks to pass with real data. Part of the canary-to-routing
  feedback loop (OMN-10843). Code delivered via PR #606 (cherry-picked from PR #605).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "PR #606 merged to main on OmniNode-ai/omnimarket"
    command: "gh pr view 606 --repo OmniNode-ai/omnimarket --json state --jq '.state'"
  - kind: "manual"
    description: "ModelMaterializeResult type exists in omnimarket PR #606 diff"
    command: "gh pr diff 606 -R OmniNode-ai/omnimarket | grep 'ModelMaterializeResult' | head -1"
  - kind: "manual"
    description: "routing_outcomes rows with quality_score populated appear in PR #606 diff"
    command: "gh pr diff 606 -R OmniNode-ai/omnimarket | grep 'quality_score' | head -1"
  - kind: "tests"
    description: "Non-Kafka test suite passes with no regressions"
    command: "uv run pytest tests/ -m 'not kafka' --tb=short -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
