---
schema_version: "1.0.0"
ticket_id: "OMN-10757"
title: "Consolidate no-env-fallback validator into omniintelligence and omniclaude"
summary: >
  Bind omniintelligence PR #647 and omniclaude PR #1556, which replace local no-env-fallback validator
  variants with the canonical omnibase_infra validator and keep the enforcement wired through local validation
  surfaces.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omniintelligence validator consolidation passes focused local validator, unit, lint,
      and pre-commit checks."
    command: "cd omni_worktrees/OMN-10658/omniintelligence && uv run python scripts/validate_no_env_fallbacks.py
      && uv run pytest tests/unit/scripts/test_validate_no_env_fallbacks.py -q && uv run ruff check scripts/validate_no_env_fallbacks.py
      tests/unit/scripts/test_validate_no_env_fallbacks.py && uv run pre-commit run no-env-fallbacks --all-files
      --verbose"
  - kind: "tests"
    description: "omniclaude validator consolidation matches the canonical validator and passes validator,
      hook, lint, and cron syntax checks."
    command: "cd omni_worktrees/OMN-10658/omniclaude && diff -u scripts/validate_no_env_fallbacks.py ../../omnibase_infra/scripts/validate_no_env_fallbacks.py
      && python3 scripts/validate_no_env_fallbacks.py && pre-commit run no-env-fallbacks --all-files &&
      uv run ruff check scripts/validate_no_env_fallbacks.py && ONEX_DOT201_HOST=192.168.86.201 ONEX_DOT200_HOST=192.168.86.200
      ONEX_KAFKA_BOOTSTRAP=192.168.86.201:19092 bash -n scripts/cron-201-baseline.sh"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omniintelligence-validator"
    description: "omniintelligence PR #647 carries the canonical validator and passes focused validator
      checks."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10757/dod-omniintelligence-validator/command.yaml
          && grep -q '^ticket_id: OMN-10757$' drift/dod_receipts/OMN-10757/dod-omniintelligence-validator/command.yaml"
  - id: "dod-omniclaude-validator"
    description: "omniclaude PR #1556 carries the canonical validator and passes focused validator checks."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10757/dod-omniclaude-validator/command.yaml
          && grep -q '^ticket_id: OMN-10757$' drift/dod_receipts/OMN-10757/dod-omniclaude-validator/command.yaml"
