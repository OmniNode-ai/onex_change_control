---
schema_version: "1.0.0"
ticket_id: "OMN-10757"
title: "Consolidate and harden no-env-fallback validators"
summary: >
  Bind omniintelligence PR #647 and omniclaude PR #1556, which replace local no-env-fallback validator
  variants with the canonical omnibase_infra validator, plus omnibase_infra PR #1553, which hardens the
  canonical validator against embedded triple-quote docstring-scanner false negatives.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omniintelligence validator consolidation passes focused local validator, unit, lint,
      and pre-commit checks."
    command: "cd omni_worktrees/OMN-10658/omniintelligence && uv run python scripts/validate_no_env_fallbacks.py
      && uv run pytest tests/unit/scripts/test_validate_no_env_fallbacks.py -q && uv run ruff check scripts/validate_no_env_fallbacks.py
      tests/unit/scripts/test_validate_no_env_fallbacks.py && uv run ruff format --check scripts/validate_no_env_fallbacks.py
      tests/unit/scripts/test_validate_no_env_fallbacks.py && uv run pre-commit run no-env-fallbacks --all-files
      --verbose"
  - kind: "tests"
    description: "omniclaude validator consolidation matches the canonical validator and passes validator,
      hook, lint, and cron syntax checks."
    command: "cd omni_worktrees/OMN-10658/omniclaude && diff -u scripts/validate_no_env_fallbacks.py ../../omnibase_infra/scripts/validate_no_env_fallbacks.py
      && python3 scripts/validate_no_env_fallbacks.py && uv run pytest tests/unit/scripts/test_validate_no_env_fallbacks.py
      -q && pre-commit run no-env-fallbacks --all-files && uv run ruff check scripts/validate_no_env_fallbacks.py
      tests/unit/scripts/test_validate_no_env_fallbacks.py && uv run ruff format --check scripts/validate_no_env_fallbacks.py
      tests/unit/scripts/test_validate_no_env_fallbacks.py && ONEX_DOT201_HOST=192.168.86.201 ONEX_DOT200_HOST=192.168.86.200
      ONEX_KAFKA_BOOTSTRAP=192.168.86.201:19092 bash -n scripts/cron-201-baseline.sh"
  - kind: "tests"
    description: "omnibase_infra canonical validator hardening passes focused unit, lint, format, self-run,
      and byte-diff parity checks against the hardened omniclaude copy."
    command: "cd omni_worktrees/OMN-10757/omnibase_infra && uv run pytest tests/unit/scripts/validation/test_validate_no_env_fallbacks.py
      -q && uv run ruff check scripts/validate_no_env_fallbacks.py tests/unit/scripts/validation/test_validate_no_env_fallbacks.py
      && uv run ruff format --check scripts/validate_no_env_fallbacks.py tests/unit/scripts/validation/test_validate_no_env_fallbacks.py
      && uv run python scripts/validate_no_env_fallbacks.py && diff -u /Volumes/PRO-G40/Code/omni_home/omni_worktrees/OMN-10658/omniclaude/scripts/validate_no_env_fallbacks.py
      scripts/validate_no_env_fallbacks.py"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
