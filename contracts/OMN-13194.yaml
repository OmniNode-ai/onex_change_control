  Re-annotates the four ModelOnexEnvelope annotation sites in src/omnibase_core/validation/envelope_validator.py
  to ModelEventEnvelope[Any]: the TYPE_CHECKING import (now from omnibase_core.models.events.model_event_envelope)
  plus the three parameter annotations on EnvelopeValidator.validate / _validate_structure / _validate_payload.
  The two prose docstring mentions are updated for the same name so the module references zero ModelOnexEnvelope.
  Runtime behavior is unchanged: the validator reads every field via getattr(envelope, ..., None) (duck-typed),
  never via the concrete type, so swapping the annotation does not alter any code path. ModelEventEnvelope[T]
  is a PEP 695 generic class (class ModelEventEnvelope[T]), so ModelEventEnvelope[Any] is a valid parametrization;
  Any is imported at runtime and ModelEventEnvelope under TYPE_CHECKING (annotations are stringized by
  `from __future__ import annotations`). This leaves only the class definition + 7 test files + the export
  lines referencing ModelOnexEnvelope, all of which B4 (OMN-13196) deletes. No Kafka topic schema change,
  no DDL/migration, no runtime/deploy/.201 mutation. Predecessor B2 (OMN-13192, impl PR #1245) is MERGED
