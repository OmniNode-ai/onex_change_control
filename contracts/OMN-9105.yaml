---
schema_version: "1.0.0"
ticket_id: "OMN-9105"
title: "Remove /onex:session legacy fallback — primary path must work end-to-end"
summary: >
  Removes the legacy /onex:overnight skill (physically deleted from omniclaude) and marks /onex:preflight
  as non-user-invocable (health-probe only, callable from node_session_orchestrator). The /onex:session
  skill is already a clean dispatch-only shim to node_session_orchestrator.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "PR merged to omniclaude main with CI green."
    command: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state --jq .state"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-overnight-deleted"
    description: "plugins/onex/skills/overnight/ deleted from omniclaude — legacy skill physically removed."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state --jq .state | grep -q MERGED"
  - id: "dod-preflight-non-user-invocable"
    description: "preflight/SKILL.md updated with user_invocable:false and replacement_skill:session."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state --jq .state | grep -q MERGED"
  - id: "dod-session-skill-clean"
    description: "/onex:session has no legacy fallback references."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state --jq .state | grep -q MERGED"
  - id: "dod-node-overnight-removed-from-deploy"
    description: "node_skill_overnight_orchestrator removed from runtime deploy surface — node deleted,
      no deploy action needed."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json files --jq '[.files[].path] | map(select(startswith(\"src/omniclaude/nodes/node_skill_overnight_orchestrator\")))
          | length' | grep -qE '^[1-9]' && echo 'node files confirmed removed from deploy surface'"
