schema_version: "1.0.0"
ticket_id: "OMN-14255"
title: "fix(OMN-14255): verify receipt commit_sha by PR-commit membership, not squash-identity"
summary: >-
  omnimarket product PR #1684 (branch jonah/omn-14255-receipt-sha-ancestry, head 057fa39f2de3b088cb3414fb0425d8b2d4bece6d)
  fixes the systemic receipt-SHA defect that made DurableEvidenceGate Check 2 (CONTRACT_CITES_MERGE_COMMIT)
  structurally un-passable. These repos are squash-merge-only, so a receipt citing the pre-merge headRefOid
  has no ancestry to the synthetic squash mergeCommit.oid and identity can never hold. The gate leg (durable_evidence_gate.py)
  now PASSES Check 2 when the cited SHA matches the squash mergeCommit.oid OR is a member of the PR's
  commit set, and fails closed on state != MERGED or an empty/unresolvable PR-commits set. The writer
  leg (adapter_occ_autobind.py OccAutobindAdapter) stamps the actual squash mergeCommit.oid once the PR
  is merged, falling back to the reviewed head SHA pre-merge.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
