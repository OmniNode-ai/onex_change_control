---
schema_version: "1.0.0"
ticket_id: "OMN-14634"
title: "refactor(OMN-14634): fix check-no-fallbacks debt in compliance handlers"
summary: >-
  Central OCC evidence for omnibase_core PR #1444, which removes the remaining check-no-fallbacks debt
  in compliance evidence and compliance scan handlers. The branch was rebased onto current dev at ad2748fed17bcc541ccb086ef783c5316322df5b,
  preserving the merged def-B handler entry points while replacing temporary fallback-ok suppressions
  with explicit precedence logic and a no-op completion event-bus stub.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-core-pr-1444-product-head"
    description: >-
      Product-head verification for omnibase_core PR #1444 at ad2748fed17bcc541ccb086ef783c5316322df5b.
      The proof reads live PR metadata and changed files from GitHub, then checks the branch is based
      on dev, carries the expected OMN-14634 title, and includes only the compliance evidence/scan handler
      plus focused regression test surfaces.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1444; PRODUCT_REPO=OmniNode-ai/omnibase_core; PRODUCT_HEAD=ad2748fed17bcc541ccb086ef783c5316322df5b;
          d="$(mktemp -d)" && gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,baseRefName,title,files
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "${d}/pr.txt" && grep -Fq "${PRODUCT_HEAD}" "${d}/pr.txt" && grep -Fxq dev "${d}/pr.txt" &&
          grep -Fq 'refactor(OMN-14634): fix check-no-fallbacks debt in compliance handlers' "${d}/pr.txt"
          && for p in src/omnibase_core/nodes/node_compliance_evidence_effect/event_bus_no_op.py src/omnibase_core/nodes/node_compliance_evidence_effect/handler.py
          src/omnibase_core/nodes/node_compliance_scan_compute/handler.py tests/unit/canary/test_effect_golden.py
          tests/unit/nodes/node_compliance_scan_compute/test_compliance_scan_compute.py tests/unit/nodes/test_compliance_evidence_effect/test_compliance_evidence_effect.py;
          do grep -Fq "$p" "${d}/pr.txt"; done
  - id: "dod-omnibase-core-pr-1444-rebase-proof"
    description: >-
      Rebase and local proof verification for omnibase_core PR #1444. Codex resolved the expected conflicts
      against the merged OMN-14629 rank2 def-B handlers by keeping dev's canonical entry points and preserving
      OMN-14634's no-fallback behavior. Focused local proof passed after the rebase.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1444; PRODUCT_REPO=OmniNode-ai/omnibase_core; PRODUCT_HEAD=ad2748fed17bcc541ccb086ef783c5316322df5b;
          RECEIPT=drift/dod_receipts/OMN-14634/dod-omnibase-core-pr-1444-rebase-proof/command.yaml; gh
          pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid --jq '.headRefOid
          == "'${PRODUCT_HEAD}'"' | grep -qx true && grep -Fq '31 passed' "${RECEIPT}" && grep -Fq 'ruff
          format/check PASS' "${RECEIPT}" && grep -Fq 'status: PASS' "${RECEIPT}"
  - id: "dod-omnibase-core-pr-1444-deploy-scope"
    description: >-
      Deploy-scope audit for omnibase_core PR #1444. The diff is limited to omnibase_core handler/test
      code; it does not perform a live deploy, restart, .201 mutation, systemd change, compose change,
      or deploy-script change.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1444; PRODUCT_REPO=OmniNode-ai/omnibase_core; PRODUCT_HEAD=ad2748fed17bcc541ccb086ef783c5316322df5b;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,files --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and ((.files | map(.path)) | all((startswith("src/omnibase_core/") or
          startswith("tests/")) and (. | test("(^|/)(systemd|deploy/scripts|docker/compose)(/|$)") | not)))'
          | grep -qx true
  - id: "dod-occ-self-bind-pr-4218"
    description: >-
      OCC companion self-binding for onex_change_control PR #4218. Verifies the PR is on the expected
      OMN-14634 evidence branch and contains initial evidence commit 02f0e21131ea4eca646c220fcece8cf008d4d407.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          OCC_PR_NUMBER=4218; OCC_REPO=OmniNode-ai/onex_change_control; OCC_BRANCH=jonah/omn-14634-occ-core-1444;
          INITIAL_EVIDENCE_COMMIT=02f0e21131ea4eca646c220fcece8cf008d4d407; gh api "repos/${OCC_REPO}/pulls/${OCC_PR_NUMBER}"
          --jq '.head.ref == "'$OCC_BRANCH'" and ((.state == "open") or (.state == "closed" and .merged_at
          != null))' | grep -qx true && gh api "repos/${OCC_REPO}/pulls/${OCC_PR_NUMBER}/commits" --jq
          '.[].sha' | grep -Fx "$INITIAL_EVIDENCE_COMMIT"
