schema_version: "1.0.0"
ticket_id: "OMN-13538"
title: "Sweep nodes no longer false-clean — share $OMNI_HOME default-scope resolution into handlers"
summary: >
  Fixes the systemic sweep false-clean defect (Rule 5: an enforcement gate that silently passes is worse
  than no gate). On the operator-canonical no-arg dispatch path (cd <repo> && uv run onex skill <name>
  -> RuntimeLocal dispatch), the coverage_sweep, aislop_sweep, gap_compute, and duplication_sweep nodes
  scanned 0 repos and returned status=clean / findings=[] because each node's default repo set and repo-name->path
  resolution lived only in __main__.py, which the dispatch handler never executes. A new shared leaf module
  omnimarket.nodes.sweep_scope owns the canonical $OMNI_HOME default repo set + resolver, imported by
  both __main__ and the dispatch handlers so they scan identically. Fail-loud contract: empty AND unresolvable
  scope -> status=error / raise, never clean. This is the NODE-HANDLER default-scope side, distinct from
  the registry/field side (OMN-13511) and the merged compliance_sweep fix (OMN-13514).
