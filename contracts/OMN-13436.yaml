ticket_id: "OMN-13436"
title: "feat(OMN-13436): ModelProdPromotionGrant + prod-gate authorization condition + boundary-proof
  tests"
summary: >-
  Keystone (Phase 1+4.5) of the prod-promotion authorization gate (epic OMN-13410, parent OMN-13418),
  shipped on omnimarket source PR #1328. Adds a frozen ModelProdPromotionGrant (grant_id, approved_lane:
  EnumRuntimeLane, approved_image_digest, approved_promotion_batch_id, approved_by, created_at, approver-set
  ABSOLUTE expires_at) and a typed EnumProdGrantReason. Threads promotion_grant, requested_by, and a deterministic
  evaluated_at through ModelProdPromotionInputs and ModelProdPromotionGateCommand (no datetime.now() in
  the COMPUTE). evaluate_prod_promotion_gate gains a grant-authorization block AFTER the existing technical
  checks: for runtime_lane == PROD it fails CLOSED unless the grant satisfies approved_lane == PROD, digest
  match, batch match, approved_by != requested_by (anti-self-grant), and evaluated_at <= expires_at (inclusive).
  dev / stability behavior is byte-for-byte unchanged (the compute short-circuits non-prod lanes before
  the grant block). The redeploy orchestrator DROPS any caller-supplied grant from the start request (a
  request cannot author the authorization that approves it — the grant is resolved out-of-band by the
  Phase-2b resolver) and threads requested_by into the gate command. Known follow-on gap: requester identity
  is forgeable, so approved_by != requested_by is anti-self-grant, NOT cryptographic two-person integrity
  (explicitly not claimed). This OCC PR carries the central contract consumed by the omnimarket PR #1328
  Receipt Gate via Evidence-Source.
