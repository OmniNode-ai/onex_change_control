ticket_id: "OMN-13352"
title: "fix(omnimarket): widen node_gap_compute _TOPIC_RE to canonical (cmd|evt|dlq|snapshot|intent)"
summary: >-
  node_gap_compute's topic-name probe (handler_gap_compute.py:27-29, _TOPIC_RE) only accepted the topic
  kinds cmd|evt|intent and lowercase-only segments [a-z0-9_-]. The canonical ONEX bus pattern (omnibase_core/src/omnibase_core/topics.py:28-30,
  _CANONICAL_TOPIC_PATTERN) accepts cmd|evt|dlq|snapshot|intent with [a-zA-Z0-9_-] segments. Because the
  probe was stricter than canonical, every contract declaring a valid onex.snapshot.* or onex.dlq.* topic
  was flagged as a CRITICAL topic_name_mismatch drift finding, producing 17 of 18 false-positive CRITICAL
  topic-drift findings. This change widens _TOPIC_RE to match _CANONICAL_TOPIC_PATTERN exactly and adds
  tests/test_gap_compute_topic_regex.py, which imports _CANONICAL_TOPIC_PATTERN from omnibase_core.topics
  and asserts the probe and canonical agree on accept/reject across a representative topic corpus (all
  5 canonical kinds, including the previously rejected snapshot/dlq, plus malformed rejects) and a gap-detect
  regression proving onex.snapshot.* / onex.dlq.* contracts now yield zero findings. The parity test fails
  loudly if the two patterns ever diverge again. Detection-tooling-only change in omnimarket node_gap_compute;
  no runtime node, no contract topic change, no image build input change, no .201 mutation.
is_seam_ticket: false
interface_change: false
