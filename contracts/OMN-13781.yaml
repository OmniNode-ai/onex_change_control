---
schema_version: "1.0.0"
ticket_id: "OMN-13781"
title: "OMN-13674 child: contract-state-coverage CI gate (enforcement backbone)"
summary: >-
  Implements scripts/validate_state_coverage.py (omnimarket), which extracts each node's declared state
  set from contract.yaml (FSM states via fsm.states / state_machine.states[].state_name for orchestrators;
  output field names + published event/topic types for compute/effect/reducer) and diffs it against states
  literally asserted (quoted string or attribute access) in that node's test files, FAILing CI when a
  directly-touched node has an uncovered state. Wired as a required CI gate (.github/workflows/state-coverage-gate.yml,
  runs --check-changed <base-ref> --strict on every pull_request/merge_group event) and a local pre-commit
  hook (state-coverage-gate, --check-changed HEAD --strict) in the same PR, per Rule 5 (enforcement, not
  detection). 639 pre-existing (node, state) gaps across 262 nodes as of 2026-07-01 are catalogued in
  scripts/validation/state_coverage_baseline.txt as a grandfather clause (WARN in non-strict --check-all
  mode only); strict mode promotes a baselined node's gaps back to FAIL the moment that node is directly
  touched by a diff, so the gate is real enforcement for all future changes without requiring a 262-node
  backfill to land. omnimarket PR #1545.
is_seam_ticket: false
interface_change: false
