ticket_id: "OMN-12195"
title: "Pin OMNIMARKET_REF to dev branch in runtime Dockerfile"
summary: >
  omnimarket's default branch is dev, not main. Docker's git cache resolved @main to a stale SHA on rebuilds.
  Fix changes ARG OMNIMARKET_REF=main to ARG OMNIMARKET_REF=dev in Dockerfile.runtime, updates the deploy-runtime.sh
  fallback from "main" to "dev", and updates the executor.py OMNI_HOME-unset fallback to match. Unit test
  test_executor_cache_bust updated to assert the new dev fallback.
