---
schema_version: "1.0.0"
ticket_id: OMN-10125
title: "Drop emit daemon launcher log append redirection"
summary: >
  Update the omniclaude emit daemon launch/restart paths to pass --log-path to the omnimarket daemon while
  no longer appending daemon stdout/stderr into the daemon-owned log file from the shell wrapper.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "Static launcher tests prove --log-path is used without append redirection"
    command: "uv run pytest tests/scripts/test_omnimarket_launcher.py -q"
  - kind: manual
    description: "Changed launcher test file passes ruff"
    command: "uv run ruff check tests/scripts/test_omnimarket_launcher.py"
  - kind: manual
    description: "No emit-daemon log append redirection remains in launch/restart scripts"
    command: "grep -n '>> \"${ONEX_STATE_DIR}/hooks/logs/emit-daemon.log\"' plugins/onex/hooks/scripts/session-start.sh
      plugins/onex/hooks/scripts/common.sh; test $? -eq 1"
  - kind: manual
    description: "Changed launcher shell scripts parse cleanly"
    command: "bash -n plugins/onex/hooks/scripts/session-start.sh plugins/onex/hooks/scripts/common.sh
      && echo 'bash syntax ok'"
  - kind: manual
    description: "Repo-local OMN-10125 contract validates"
    command: "uv run validate-yaml contracts/OMN-10125.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
