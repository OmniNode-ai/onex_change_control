---
schema_version: "1.0.0"
ticket_id: OMN-8400
title: "Add onex market CLI"
summary: "Register an `onex market` CLI extension with list, search, and install commands for installed
  and packaged ONEX market packages."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Focused market CLI tests and market skill smoke pass"
    command: "uv run pytest tests/unit/cli/test_market_cli.py tests/test_market_skill_smokes.py::test_market_skill_baseline_includes_ticket_pipeline
      -q"
  - kind: "manual"
    description: "Touched market CLI paths pass lint"
    command: "uv run ruff check src/omnimarket/cli/market.py tests/unit/cli/test_market_cli.py"
  - kind: "manual"
    description: "Packaged market search emits machine-readable JSON"
    command: "uv run onex market search ticket --json"
  - kind: "manual"
    description: "Installed package listing emits machine-readable JSON"
    command: "uv run onex market list --json"
  - kind: "manual"
    description: "Market install delegates to onex install in dry-run JSON mode"
    command: "tmp_oncp=$(mktemp -t node_ticket_pipeline.XXXXXX.oncp) && uv run onex pack src/omnimarket/nodes/node_ticket_pipeline
      -o \"$tmp_oncp\" >/tmp/omn8400_pack.out && uv run onex market install \"$tmp_oncp\" --dry-run --json"
  - kind: "manual"
    description: "Post-merge deploy smoke plan for the packaged market CLI"
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnimarket.cli.market
      import market; print(market.name)\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-tests"
    description: "Focused market CLI tests and market skill smoke pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/unit/cli/test_market_cli.py tests/test_market_skill_smokes.py::test_market_skill_baseline_includes_ticket_pipeline
          -q"
  - id: "dod-lint"
    description: "Touched market CLI paths pass lint"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run ruff check src/omnimarket/cli/market.py tests/unit/cli/test_market_cli.py"
  - id: "dod-search"
    description: "Packaged market search emits machine-readable JSON"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run onex market search ticket --json"
  - id: "dod-list"
    description: "Installed package listing emits machine-readable JSON"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run onex market list --json"
  - id: "dod-install"
    description: "Market install delegates to onex install in dry-run JSON mode"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "tmp_oncp=$(mktemp -t node_ticket_pipeline.XXXXXX.oncp) && uv run onex pack src/omnimarket/nodes/node_ticket_pipeline
          -o \"$tmp_oncp\" >/tmp/omn8400_pack.out && uv run onex market install \"$tmp_oncp\" --dry-run
          --json"
  - id: "dod-deploy"
    description: "Post-merge deploy smoke plan for the packaged market CLI; no live deploy or runtime
      restart was performed in this PR"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "printf '%s\n' 'post-merge deploy smoke: docker exec ${RUNTIME_CONTAINER:-omninode-runtime}
          python -c \"from omnimarket.cli.market import market; print(market.name)\"'"
