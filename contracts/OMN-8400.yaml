---
schema_version: "1.0.0"
ticket_id: OMN-8400
title: "Add onex market CLI"
summary: "Register an `onex market` CLI extension with list, search, and install commands for installed
  and packaged ONEX market packages."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "Focused market CLI tests and market skill smoke pass"
    command: "test -f drift/dod_receipts/OMN-8400/dod-tests/command.yaml && grep -q '^status: PASS$' drift/dod_receipts/OMN-8400/dod-tests/command.yaml
      && grep -q '10 passed' drift/dod_receipts/OMN-8400/dod-tests/command.yaml"
  - kind: "manual"
    description: "Touched market CLI paths pass lint"
    command: "test -f drift/dod_receipts/OMN-8400/dod-lint/command.yaml && grep -q '^status: PASS$' drift/dod_receipts/OMN-8400/dod-lint/command.yaml
      && grep -q 'All checks passed!' drift/dod_receipts/OMN-8400/dod-lint/command.yaml"
  - kind: "manual"
    description: "Packaged market search emits machine-readable JSON"
    command: "test -f drift/dod_receipts/OMN-8400/dod-search/command.yaml && grep -q '^status: PASS$'
      drift/dod_receipts/OMN-8400/dod-search/command.yaml && grep -q 'node_ticket_pipeline' drift/dod_receipts/OMN-8400/dod-search/command.yaml"
  - kind: "manual"
    description: "Installed package listing emits machine-readable JSON"
    command: "test -f drift/dod_receipts/OMN-8400/dod-list/command.yaml && grep -q '^status: PASS$' drift/dod_receipts/OMN-8400/dod-list/command.yaml
      && grep -q '\"packages\"' drift/dod_receipts/OMN-8400/dod-list/command.yaml"
  - kind: "manual"
    description: "Market install delegates to onex install in dry-run JSON mode"
    command: "test -f drift/dod_receipts/OMN-8400/dod-install/command.yaml && grep -q '^status: PASS$'
      drift/dod_receipts/OMN-8400/dod-install/command.yaml && grep -q 'delegated_to' drift/dod_receipts/OMN-8400/dod-install/command.yaml
      && grep -q '\"status\": \"ok\"' drift/dod_receipts/OMN-8400/dod-install/command.yaml"
  - kind: "manual"
    description: "Post-merge deploy smoke plan for the packaged market CLI"
    command: "test -f drift/dod_receipts/OMN-8400/dod-deploy/command.yaml && grep -q '^status: PASS$'
      drift/dod_receipts/OMN-8400/dod-deploy/command.yaml && grep -q 'No deploy' drift/dod_receipts/OMN-8400/dod-deploy/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
