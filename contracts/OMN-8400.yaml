    description: "Focused market CLI tests and market skill smoke pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-8400/dod-tests/command.yaml && grep -q '^status:
          PASS$' drift/dod_receipts/OMN-8400/dod-tests/command.yaml && grep -q '10 passed' drift/dod_receipts/OMN-8400/dod-tests/command.yaml"
  - id: "dod-lint"
    description: "Touched market CLI paths pass lint"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-8400/dod-lint/command.yaml && grep -q '^status: PASS$'
          drift/dod_receipts/OMN-8400/dod-lint/command.yaml && grep -q 'All checks passed!' drift/dod_receipts/OMN-8400/dod-lint/command.yaml"
  - id: "dod-search"
    description: "Packaged market search emits machine-readable JSON"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-8400/dod-search/command.yaml && grep -q '^status:
          PASS$' drift/dod_receipts/OMN-8400/dod-search/command.yaml && grep -q 'node_ticket_pipeline'
          drift/dod_receipts/OMN-8400/dod-search/command.yaml"
  - id: "dod-list"
    description: "Installed package listing emits machine-readable JSON"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-8400/dod-list/command.yaml && grep -q '^status: PASS$'
          drift/dod_receipts/OMN-8400/dod-list/command.yaml && grep -q '\"packages\"' drift/dod_receipts/OMN-8400/dod-list/command.yaml"
  - id: "dod-install"
    description: "Market install delegates to onex install in dry-run JSON mode"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-8400/dod-install/command.yaml && grep -q '^status:
          PASS$' drift/dod_receipts/OMN-8400/dod-install/command.yaml && grep -q 'delegated_to' drift/dod_receipts/OMN-8400/dod-install/command.yaml
          && grep -q '\"status\": \"ok\"' drift/dod_receipts/OMN-8400/dod-install/command.yaml"
  - id: "dod-deploy"
