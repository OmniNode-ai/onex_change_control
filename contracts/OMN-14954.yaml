---
schema_version: "1.0.0"
ticket_id: "OMN-14954"
title: "OCC evidence for omnimarket#1862 representative-N composition"
summary: "Central OCC evidence for omnimarket#1862, which makes the representative-N=10 OCC autoauthor
  window criterion representable and enforced by carrying tuple identity, verification-path metadata,
  tuple deduplication, fail-reset behavior, and composition thresholds. Evidence is limited to the PR's
  GitHub state and recorded verification; no runtime or production mutation is claimed."
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "events"
  - "public_api"
evidence_requirements:
  - kind: "manual"
    description: "omnimarket PR #1862 is open at the recorded OMN-14954 head."
    command: "test \"$(gh pr view 1862 --repo OmniNode-ai/omnimarket --json state --jq .state)\" = OPEN
      && test \"$(gh pr view 1862 --repo OmniNode-ai/omnimarket --json commits --jq '.commits[-1].oid')\"
      = 7b7ad3b1effc40739105c7353fbb8cb0ad948c11"
  - kind: "manual"
    description: "omnimarket PR #1862 touches only the representative-N composition model, node, source-effect,
      and test paths."
    command: "gh pr view 1862 --repo OmniNode-ai/omnimarket --json files --jq '[.files[].path] | sort
      | join(\"\\n\")' | grep -Fxq src/omnimarket/events/occ_observation_record.py && gh pr view 1862
      --repo OmniNode-ai/omnimarket --json files --jq '[.files[].path] | sort | join(\"\\n\")' | grep
      -Fxq tests/unit/nodes/node_occ_autoauthor_window/test_window_composition_omn14954.py"
  - kind: "manual"
    description: "omnimarket PR #1862 body records focused green tests, strict mypy on changed modules,
      and governed pre-push full-suite evidence."
    command: "gh pr view 1862 --repo OmniNode-ai/omnimarket --json body --jq .body | grep -Fq '78 focused
      tests pass' && gh pr view 1862 --repo OmniNode-ai/omnimarket --json body --jq .body | grep -Fq '13173
      passed, 34 skipped, 1 xfailed'"
