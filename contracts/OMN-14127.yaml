---
schema_version: "1.0.0"
ticket_id: OMN-14127
title: "ci(OMN-14127): keep required CI aggregator contexts off saturated self-hosted runners"
summary: >
  OCC companion for omniclaude PR #1870. The PR fixes the workflow-structure wedge where required branch-protection
  contexts could fail to post under self-hosted runner saturation because the lightweight result-reading
  aggregation layer itself queued behind the saturated fleet. The change keeps the heavy CI leaves on
  the self-hosted fleet, but moves the required aggregation contexts and their static security leaves
  to GitHub-hosted ubuntu-latest runners: CI Summary, Security Gate, Quality Gate, Tests Gate, Python
  Security Scan, and Secret Detection. Job/context names remain stable and no branch-protection change
  or live runtime mutation is performed by this PR.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniclaude PR #1870 is open against dev at the validated workflow head and changes only
      .github/workflows/ci.yml"
    command: "gh pr view 1870 --repo OmniNode-ai/omniclaude --json number,state,headRefName,headRefOid,baseRefName"
  - kind: "manual"
    description: "Independent YAML parse confirms the required CI aggregation contexts and static security
      leaves use ubuntu-latest; all gate aggregators retain if: always()"
    command: "python3 -c 'import yaml; data=yaml.safe_load(open(\".github/workflows/ci.yml\")); print(len(data[\"jobs\"]))'"
  - kind: "manual"
    description: "Local pre-commit verification passes for the changed workflow file"
    command: "pre-commit run --files .github/workflows/ci.yml"
  - kind: "manual"
    description: "Deploy-scope evidence: PR #1870 changes CI workflow structure only and performs no live
      deploy, restart, runner bounce, or branch-protection mutation"
    command: "git diff --name-only origin/dev...HEAD"
  - kind: "manual"
    description: "Self-binding OCC receipt for this OCC companion PR carrying OMN-14127 central evidence"
    command: "git rev-parse --verify HEAD && git status --short --branch"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
