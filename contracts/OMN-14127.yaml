---
schema_version: "1.0.0"
ticket_id: OMN-14127
title: "ci(OMN-14127): keep required CI aggregator contexts off saturated self-hosted runners"
summary: >
  OCC companion for the OMN-14127 required-check wedge fixes. omniclaude PR #1870 fixes the original workflow-structure
  wedge where required branch-protection contexts could fail to post under self-hosted runner saturation
  because the lightweight result-reading aggregation layer itself queued behind the saturated fleet. omnibase_infra
  PR #2230 ports the proven pattern to infra by converting the required CI Summary context into a no-needs,
  GitHub-hosted, fail-closed poller that instantiates immediately, preserves the CI Summary context name,
  and reads job conclusions from the GitHub API. Heavy CI leaves remain on the self-hosted fleet. No branch-protection
  change, live deploy, service restart, or runner bounce is performed by these PRs.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniclaude PR #1870 is open against dev at the validated workflow head and changes only
      .github/workflows/ci.yml"
    command: "gh pr view 1870 --repo OmniNode-ai/omniclaude --json number,state,headRefName,headRefOid,baseRefName"
  - kind: "manual"
    description: "Independent YAML parse confirms the required CI aggregation contexts and static security
      leaves use ubuntu-latest; all gate aggregators retain if: always()"
    command: "python3 -c 'import yaml; data=yaml.safe_load(open(\".github/workflows/ci.yml\")); print(len(data[\"jobs\"]))'"
  - kind: "manual"
    description: "Local pre-commit verification passes for the changed workflow file"
    command: "pre-commit run --files .github/workflows/ci.yml"
  - kind: "manual"
    description: "Deploy-scope evidence: PR #1870 changes CI workflow structure only and performs no live
      deploy, restart, runner bounce, or branch-protection mutation"
    command: "git diff --name-only origin/dev...HEAD"
  - kind: "manual"
    description: "Self-binding OCC receipt for this OCC companion PR carrying OMN-14127 central evidence"
    command: "git rev-parse --verify HEAD && git status --short --branch"
  - kind: "manual"
    description: "Self-binding OCC receipt for onex_change_control PR #3684 carrying the infra #2230 OMN-14127
      central evidence update"
    command: "gh pr view 3684 --repo OmniNode-ai/onex_change_control --json number,state,headRefOid"
  - kind: "manual"
    description: "omnibase_infra PR #2230 is open against dev at the validated workflow-poller head and
      changes only the CI workflow, poller script, and focused tests"
    command: "gh pr view 2230 --repo OmniNode-ai/omnibase_infra --json number,state,headRefName,headRefOid,baseRefName"
  - kind: "manual"
    description: "Independent YAML parse confirms omnibase_infra CI Summary has no needs, runs on ubuntu-latest,
      retains if: always(), and has read-only actions/content permissions"
    command: "python3 -c 'import yaml; data=yaml.safe_load(open(\".github/workflows/ci.yml\")); print(data[\"jobs\"][\"ci-summary\"])'"
  - kind: "manual"
    description: "Focused local verification passes for the omnibase_infra CI Summary poller and workflow
      resilience tests"
    command: "uv run pytest tests/ci/test_ci_summary_gate.py -q && uv run pytest tests/ci/test_ci_workflow_resilience.py
      -q"
  - kind: "manual"
    description: "omnibase_core PR #1397 is open against dev at the validated workflow-poller head and
      changes the CI workflow, CI Summary poller, rollup-coverage validator, and focused tests"
    command: "gh pr view 1397 --repo OmniNode-ai/omnibase_core --json number,state,headRefName,headRefOid,baseRefName,files"
  - kind: "manual"
    description: "Independent YAML parse confirms omnibase_core CI Summary has no needs, runs on ubuntu-latest,
      retains if: always(), and has read-only actions/content permissions"
    command: "python3 -c 'import yaml; data=yaml.safe_load(open(\".github/workflows/ci.yml\")); print(data[\"jobs\"][\"ci-summary\"])'"
  - kind: "manual"
    description: "Focused local verification passes for the omnibase_core CI Summary poller and rollup-coverage
      tests using the worktree source path"
    command: "PYTHONPATH=src uv run pytest tests/unit/scripts/ci/test_ci_summary_gate.py tests/validation/test_validator_rollup_coverage.py
      -q"
  - kind: "manual"
    description: "Self-binding OCC receipt for onex_change_control PR #3685 carrying the core #1397 OMN-14127
      central evidence update"
    command: "gh pr view 3685 --repo OmniNode-ai/onex_change_control --json number,state,headRefOid"
  - kind: "manual"
    description: "omnibase_core PR #1398 is open against dev at the validated zone-filter head and changes
      only the reusable zone-filter workflow"
    command: "gh pr view 1398 --repo OmniNode-ai/omnibase_core --json number,state,headRefName,headRefOid,baseRefName,files"
  - kind: "manual"
    description: "Independent YAML parse confirms the omnibase_core reusable zone-filter classify job
      runs on ubuntu-latest while preserving the Zone Filter context"
    command: "python3 -c 'import yaml; data=yaml.safe_load(open(\".github/workflows/zone-filter.yml\"));
      print(data[\"jobs\"][\"classify\"])'"
