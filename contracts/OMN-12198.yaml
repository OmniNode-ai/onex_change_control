ticket_id: "OMN-12198"
title: "Accept raw auto-wired delegation dispatch payloads"
summary: >
  Stability dispatch tests publish a raw JSON payload to onex.cmd.omnimarket.swarm-dispatch.v1. The omnimarket
  request model rejected the caller-supplied model_tier field, and the omnibase_infra auto-wiring callback
  rejected raw non-envelope dicts before the handler could run. The fix adds model_tier to ModelSwarmDispatchRequest
  and synthesizes a ModelEventEnvelope around raw dict payloads in the infra auto-wiring callback while
  preserving the normal envelope path.
