ticket_id: "OMN-14245"
title: "fix(OMN-14245): preserve handler_routing + yaml event decls through ContractMergeEngine merge"
summary: >-
  omnibase_core product PR #1416 (branch jonah/omn-14245-contract-merge-handler-routing, head 1be7c225193be01baaf227e47ffc2b87462e2e25)
  fixes Bug 2 of OMN-14245: ContractMergeEngine._apply_patch_to_base built its output ModelHandlerContract
  from only 9 named fields and silently dropped handler_routing / yaml_consumed_events / yaml_published_events
  on every merge, because ModelHandlerContract had no such fields. The fix adds those three fields to
  ModelHandlerContract (additive; frozen=True, extra=ignore -> backward compatible) and threads base.handler_routing
  / base.yaml_consumed_events / base.yaml_published_events through _apply_patch_to_base and both call
  sites (_merge_internal, _apply_overlay_entry) as pure preservation. Bug 1 (the risky public-model schema
  drift) is explicitly out of scope per the ticket. Independently verified by a distinct agent (verifier
  != implementer); public-safe library-only change.
