---
schema_version: "1.0.0"
ticket_id: "OMN-14632"
title: "fix(OMN-14632): write dep-health-sweep evidence bundle under tmp_path"
summary: >-
  Central OCC evidence for omnimarket PR #1771. The product PR prevents the dep-health sweep golden-chain
  test from writing generated evidence into the committed docs/evidence tree during normal pytest runs
  by routing the evidence bundle to pytest tmp_path.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-1771-product-head"
    description: >-
      Product-observing verification for omnimarket PR #1771 at head 43da9b615026687a40247c2ad531b040a766ec29.
      Verifies the PR targets dev, changes only tests/test_golden_chain_dep_health_sweep.py, and the test
      now routes _write_evidence_bundle through tmp_path instead of the committed docs/evidence tree.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1771; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=43da9b615026687a40247c2ad531b040a766ec29;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt" && grep -Fq
          'fix(OMN-14632): write dep-health-sweep evidence bundle under tmp_path' "$d/pr.txt" && grep
          -Fxq tests/test_golden_chain_dep_health_sweep.py "$d/pr.txt" && test "$(tail -n +4 "$d/pr.txt"
          | wc -l | tr -d ' ')" = "1" && gh api "repos/OmniNode-ai/omnimarket/contents/tests/test_golden_chain_dep_health_sweep.py?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/test.py" && grep -Fq 'def _write_evidence_bundle(' "$d/test.py"
          && grep -Fq 'evidence_root: Path' "$d/test.py" && grep -Fq 'evidence_dir = evidence_root / "dep-health-sweep"
          / run_id' "$d/test.py" && grep -Fq 'evidence_root=tmp_path' "$d/test.py"
  - id: "dod-omnimarket-pr-1771-local-verification"
    description: >-
      Verification record for omnimarket PR #1771 at head 43da9b615026687a40247c2ad531b040a766ec29. The
      PR body records non-vacuous RED/GREEN proof that the pre-fix test dirtied docs/evidence and the
      fixed test keeps generated evidence under tmp_path, plus local pytest, ruff, mypy-baseline, and
      pre-commit results.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1771; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=43da9b615026687a40247c2ad531b040a766ec29;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,body --jq '.headRefOid
          == "'$PRODUCT_HEAD'" and (.body | contains("modified 7 tracked files under `docs/evidence/dep-health-sweep/proof-of-life-001/`"))
          and (.body | contains("evidence bundle instead lands under `tmp_path/dep-health-sweep/proof-of-life-001/run_manifest.json`"))
          and (.body | contains("7/7 passed")) and (.body | contains("pre-commit run --files tests/test_golden_chain_dep_health_sweep.py"))'
          | grep -qx true
  - id: "dod-omnimarket-pr-1771-deploy-scope"
    description: >-
      Deploy-surface assessment for omnimarket PR #1771. The diff is limited to one pytest file; it does
      not touch Dockerfiles, compose manifests, deploy scripts, migrations, runtime service definitions,
      or infrastructure configuration.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1771; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=43da9b615026687a40247c2ad531b040a766ec29;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid --jq '.headRefOid ==
          "'$PRODUCT_HEAD'"' | grep -qx true && ! gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO"
          --name-only | grep -qE '(^|/)(Dockerfile|docker-compose[^/]*|compose[^/]*|deploy|migrations)(/|$)'
