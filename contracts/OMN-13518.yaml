title: "fix: pin OMN-13408 dod-001 evidence check cwd to omnimarket repo (dod_verify cross-repo bug)"
summary: >-
  node_dod_verify false-failed OMN-13408's dod-001 evidence check with "grep: tests/unit/delegation/test_cumulative_cost_accumulation_omn13408.py:
  No such file or directory". The OMN-13408 contract is OCC-resident but its dod-001 evidence file lives
  in the omnimarket repo. EvidenceCollector._infer_occ_cwd forces the onex_change_control repo root as
  the cwd for every check in an OCC-resident contract, so the omnimarket-relative grep ran from the wrong
  repo. The platform already ships the per-check cwd field (OMN-10078) with ${OMNI_HOME} template expansion
  + containment checks. Fix: pin dod-001's cwd to ${OMNI_HOME}/omnimarket and point the grep at the real
  omnimarket test path, de-dodging a prior self-referential grep that matched the contract file itself.
  No code change required. The five OMN-13408 dod receipts are re-pinned to the new contract hash; the
  dod-001 receipt records the de-dodged probe.
