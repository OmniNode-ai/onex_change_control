schema_version: "1.0.0"
ticket_id: "OMN-13701"
title: "fix(OMN-13701): remove node_intent_event_consumer_effect duplicate from omnimemory (dual-consumer
  race)"
summary: >
  Dogfood sweep found node_intent_event_consumer_effect declared in BOTH omnimemory and omnimarket with
  identical UUID 6fc349b1-34f0-4760-b547-6e8bebf0c9c0. Two consumers on the same Kafka consumer group
  and topic (onex.evt.omniintelligence.intent-classified.v1) causes a non-deterministic race. Per node-consolidation
  doctrine, the canonical owner is omnimarket. The omnimemory duplicate is deleted; runtime wiring, message
  type registry, and all related tests are updated accordingly.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
