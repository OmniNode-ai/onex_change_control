    description: "omnimemory unit suite passes after removing the duplicate node and updating runtime
      wiring"
    command: "cd omnimemory && uv run python -m pytest tests/unit/ -q --tb=short && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-13701/dod-boundary-registry/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
