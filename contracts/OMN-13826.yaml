ticket_id: "OMN-13826"
title: "fix(OMN-13826): lane-aware container resolution in deploy-runtime verify_deployment"
summary: >-
  omnibase_infra PR #2180 makes deploy-runtime.sh verify_deployment() lane-aware. It previously resolved
  the runtime container by the hardcoded dev name omninode-runtime (an anchored docker ps name filter
  plus a docker logs line), so on a non-dev lane -- where the dev container commonly runs alongside the
  lane -- it resolved the wrong (dev) container and emitted a false "Image label mismatch" warning. The
  PR adds resolve_lane_runtime_container_name() (mirroring resolve_lane_overlay_filename's lane derivation
  and fail-closed whitelist), mapping the compose project to the lane-scoped container_name (dev->omninode-runtime,
  stability-test->omninode-stability-test-runtime, prod->omninode-prod-runtime, judge->omninode-judge-runtime),
  and routes verify_deployment's name probe and docker-logs line through it. The change is scripts-only
  with no runtime contract change; it adds per-lane derivation regression tests and records local shellcheck,
  ruff, focused pytest, and pre-commit evidence. Runtime rebuild/deploy is explicitly outside this OCC
  evidence PR and remains operator-gated.
