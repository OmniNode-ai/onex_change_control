    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-contract-artifacts/command.yaml"
          && grep -q 'node_evidence_pipeline_orchestrator/contract.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-contract-artifacts/command.yaml"
          && grep -q 'node_deployment_evidence_reducer/contract.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-contract-artifacts/command.yaml"
          && grep -q 'tests/test_evidence_pipeline_contracts.py' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-contract-artifacts/command.yaml"
