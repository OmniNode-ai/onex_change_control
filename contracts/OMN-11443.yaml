---
schema_version: "1.0.0"
ticket_id: "OMN-11443"
title: "Epic: Evidence Pipeline — Automated OCC Contract Validation Nodes"
summary: >-
  Wave 1 adds temporary omnibase_compat wire DTOs for the evidence pipeline so downstream omnimarket contracts
  can reference stable typed payload surfaces. This is provisional wave evidence only; it does not prove
  the full epic is complete.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
contract_completeness: "ENRICHED"
evidence_requirements:
  - kind: "tests"
    description: "Focused evidence-pipeline DTO tests pass in omnibase_compat."
    command: "uv run pytest src/omnibase_compat/tests/contracts/evidence_pipeline/wire/test_evidence_pipeline_wire_dtos.py
      -q"
  - kind: "tests"
    description: "The omnibase_compat unit suite passes after adding the DTOs."
    command: "uv run pytest -m unit -q"
  - kind: "ci"
    description: "The new DTO surface passes lint, type checks, and upstream dependency validation."
    command: "uv run ruff check src/ tests/ && uv run mypy src/omnibase_compat/contracts/evidence_pipeline
      src/omnibase_compat/tests/contracts/evidence_pipeline --strict && uv run python scripts/validate_no_upstream_deps.py"
  - kind: "manual"
    description: "The compat PR carries exactly the Wave 1 DTO and focused test artifacts."
    command: "gh pr view 98 --repo OmniNode-ai/omnibase_compat --json number,state,headRefName,headRefOid,url,title"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-compat-pr-98"
    description: "omnibase_compat PR #98 carries the Wave 1 evidence pipeline DTO branch."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-compat-pr-98/command.yaml"
          && grep -q '^pr_number: 98$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-compat-pr-98/command.yaml"
          && grep -q '^commit_sha: "af40ec3c1c2d260a26417af14f17f1ab6b371d21"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-compat-pr-98/command.yaml"
  - id: "dod-dto-artifacts"
    description: "The compat commit adds the evidence_pipeline wire DTO package and focused tests."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-dto-artifacts/command.yaml"
          && grep -q 'model_evidence_pipeline_command.py' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-dto-artifacts/command.yaml"
          && grep -q 'test_evidence_pipeline_wire_dtos.py' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-dto-artifacts/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused evidence-pipeline DTO tests passed."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-focused-tests/command.yaml"
          && grep -q '9 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-focused-tests/command.yaml"
  - id: "dod-unit-suite"
    description: "The omnibase_compat unit suite passed after the DTO change."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-unit-suite/command.yaml"
          && grep -q '134 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-unit-suite/command.yaml"
  - id: "dod-lint-type-deps"
    description: "Lint, type, and no-upstream-dependency checks passed for the new DTO surface."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-lint-type-deps/command.yaml"
          && grep -q 'All checks passed!' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-lint-type-deps/command.yaml"
          && grep -q 'Success: no issues found in 13 source files' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-lint-type-deps/command.yaml"
          && grep -q 'OK .* no forbidden imports' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-lint-type-deps/command.yaml"
  - id: "dod-retention-metadata"
    description: "New compat DTO model modules declare migration target and removal metadata."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-retention-metadata/command.yaml"
          && grep -q 'COMPAT_REMOVAL_DATE: 2027-06-01' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-retention-metadata/command.yaml"
  - id: "dod-occ-self"
    description: "onex_change_control PR #1302 carries the central OMN-11443 contract and receipts."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-occ-self/command.yaml"
          && grep -q '^pr_number: 1302$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-occ-self/command.yaml"
          && grep -q '^commit_sha: "38920d8e969d30c59653a97b58612fbd93ed562b"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-occ-self/command.yaml"
