          && grep -q '^pr_number: 1302$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-occ-self/command.yaml"
          && grep -q '^commit_sha: "38920d8e969d30c59653a97b58612fbd93ed562b"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-occ-self/command.yaml"
  - id: "dod-omnimarket-pr-738"
