---
schema_version: "1.0.0"
ticket_id: "OMN-11443"
title: "Epic: Evidence Pipeline — Automated OCC Contract Validation Nodes"
summary: >-
  Wave 1 adds temporary omnibase_compat wire DTOs for the evidence pipeline so downstream omnimarket contracts
  can reference stable typed payload surfaces. Wave 2 registers contract-only omnimarket node packages
  for the evidence pipeline topology. This is provisional wave evidence only; it does not prove the full
  epic is complete.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
contract_completeness: "ENRICHED"
evidence_requirements:
  - kind: "tests"
    description: "Focused evidence-pipeline DTO tests pass in omnibase_compat."
    command: "uv run pytest src/omnibase_compat/tests/contracts/evidence_pipeline/wire/test_evidence_pipeline_wire_dtos.py
      -q"
  - kind: "tests"
    description: "The omnibase_compat unit suite passes after adding the DTOs."
    command: "uv run pytest -m unit -q"
  - kind: "ci"
    description: "The new DTO surface passes lint, type checks, and upstream dependency validation."
    command: "uv run ruff check src/ tests/ && uv run mypy src/omnibase_compat/contracts/evidence_pipeline
      src/omnibase_compat/tests/contracts/evidence_pipeline --strict && uv run python scripts/validate_no_upstream_deps.py"
  - kind: "manual"
    description: "The compat PR carries exactly the Wave 1 DTO and focused test artifacts."
    command: "gh pr view 98 --repo OmniNode-ai/omnibase_compat --json number,state,headRefName,headRefOid,url,title"
  - kind: "manual"
    description: "The omnimarket PR carries the Wave 2 evidence pipeline node contract packages."
    command: "gh pr view 738 --repo OmniNode-ai/omnimarket --json number,state,headRefName,headRefOid,url,title"
  - kind: "tests"
    description: "Focused omnimarket contract, metadata, entry-point, and catalog tests pass for the Wave
      2 contract slice."
    command: "uv run pytest tests/test_evidence_pipeline_contracts.py tests/test_metadata_schema.py tests/test_all_node_entry_points_are_package_form.py
      tests/test_catalog_validator.py tests/test_catalog_generator.py -q"
  - kind: "ci"
    description: "Wave 2 node packages pass local lint, runtime sweep, metadata dependency, hardcoded
      topic, and topic naming checks."
    command: "uv run ruff check pyproject.toml src/omnimarket/nodes/node_evidence_pipeline_orchestrator
      src/omnimarket/nodes/node_readiness_gate_orchestrator src/omnimarket/nodes/node_evidence_extractor_compute
      src/omnimarket/nodes/node_contract_matcher_compute src/omnimarket/nodes/node_gap_analyzer_compute
      src/omnimarket/nodes/node_readiness_scorer_compute src/omnimarket/nodes/node_evidence_collector_effect
      src/omnimarket/nodes/node_occ_pr_writer_effect src/omnimarket/nodes/node_linear_updater_effect src/omnimarket/nodes/node_evidence_publisher_effect
      src/omnimarket/nodes/node_deployment_evidence_reducer tests/test_evidence_pipeline_contracts.py
      && uv run python scripts/ci/run_runtime_sweep.py && uv run python scripts/ci/check_node_metadata_dependencies.py
      && uv run python scripts/ci/check_no_hardcoded_topics.py && OMNIBASE_INFRA_PATH=${OMNIBASE_INFRA_PATH:?set
      OMNIBASE_INFRA_PATH} bash scripts/validation/run_topic_lint.sh"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-compat-pr-98"
    description: "omnibase_compat PR #98 carries the Wave 1 evidence pipeline DTO branch."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-compat-pr-98/command.yaml"
          && grep -q '^pr_number: 98$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-compat-pr-98/command.yaml"
          && grep -q '^commit_sha: "af40ec3c1c2d260a26417af14f17f1ab6b371d21"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-compat-pr-98/command.yaml"
  - id: "dod-dto-artifacts"
    description: "The compat commit adds the evidence_pipeline wire DTO package and focused tests."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-dto-artifacts/command.yaml"
          && grep -q 'model_evidence_pipeline_command.py' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-dto-artifacts/command.yaml"
          && grep -q 'test_evidence_pipeline_wire_dtos.py' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-dto-artifacts/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused evidence-pipeline DTO tests passed."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-focused-tests/command.yaml"
          && grep -q '9 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-focused-tests/command.yaml"
  - id: "dod-unit-suite"
    description: "The omnibase_compat unit suite passed after the DTO change."
    source: "manual"
    status: "verified"
    checks:
