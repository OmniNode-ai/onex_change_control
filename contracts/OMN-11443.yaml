        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-pr-738/command.yaml"
          && grep -q '^pr_number: 738$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-pr-738/command.yaml"
          && grep -q '^commit_sha: "c3e4be2fe137f289aee2b2e2dc162be5cf50c5f0"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11443/dod-omnimarket-pr-738/command.yaml"
  - id: "dod-omnimarket-contract-artifacts"
    description: "The omnimarket commit adds 11 evidence pipeline node contracts, metadata files, package
