title: "fix(OMN-10810): remove ModelONEXContainer instantiation from intent_query_effect docstrings"
summary: >
  node_intent_query_effect handlers/__init__.py and handler_intent_query.py contained ModelONEXContainer()
  instantiation in docstring Example:: blocks, which the ticket tracker identified as import-time container
  creation. Fix updates all docstring examples to show container as a DI-injected parameter, and adds
  tests verifying the injected container is stored unchanged and that package import produces zero container
  instantiations.
