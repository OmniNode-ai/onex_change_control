---
schema_version: "1.0.0"
ticket_id: "OMN-12950"
title: "Wire evidence/readiness reducers to a deployed runtime profile (compute -> workers)"
summary: >
  node_deployment_evidence_reducer and node_evidence_dashboard_reducer (omnimarket) declared descriptor.runtime_profiles:
  [compute]. compute is NOT a registered runtime profile (omnibase_infra.runtime.runtime_profile._PROFILES
  = local-dev/default/main/effects/workers/ projection-api/canary/staging/production) and no deployed
  runtime runs RUNTIME_PROFILE=compute. The auto-wiring ownership filter profile_ownership.filter_manifest_for_runtime_profile
  wires a contract with an explicit runtime_profiles list ONLY into a runtime named in that list, so both
  REDUCER_GENERIC contracts were owned by no running runtime: no consumer group was started, they never
  consumed evidence-validated.v1 / readiness-scored.v1 / occ-pr-created.v1 / evidence-dashboard-normalized.v1,
  their terminal topics deployment-evidence-reduced.v1 / evidence-dashboard-reduced.v1 stayed at offset
  0, and the five evidence/readiness projection tables stayed empty even though upstream handlers succeeded
  and emitted their terminal events. Fix changes both reducer contracts to runtime_profiles: [workers]
  (the deployed standalone-consumer lane) and adds a TDD validation test plus a recurrence guard asserting
  every REDUCER_GENERIC contract is owned by a deployed standalone-consumer runtime. Contract-only change
  to two YAML descriptors plus a test; no topic schema, envelope, or contract API change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD-first test through the real omnibase_infra wiring functions asserts both reducers are owned
      by the workers runtime and that every REDUCER_GENERIC contract is owned by a deployed standalone-consumer
      runtime. Red on [compute], green on [workers].
    command: "uv run pytest tests/validation/test_reducer_runtime_profile_consumer_ownership.py -q"
