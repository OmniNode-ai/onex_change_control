title: "feat(OMN-12619): contract-native DLQ replay node + quarantine path"
summary: >-
  Port the manual DLQ-replay CLI (scripts/dlq_replay.py) to a contract-native EFFECT node (NodeDlqReplayEffect)
  in omnibase_infra, and end silent message loss by quarantining non-replayable messages to onex.dlq.quarantine.v1
  instead of skip-and-dropping them. Reuses should_replay() for eligibility, adds a persistent onex-dlq-replay
  consumer group, the EnumReplayStatus.QUARANTINED member, and authored quarantine ownership semantics.
