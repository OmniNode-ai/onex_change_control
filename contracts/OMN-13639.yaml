---
schema_version: "1.0.0"
ticket_id: "OMN-13639"
title: "feat(golden-chain): per-chain freshness/recency assertion in node_golden_chain_sweep"
summary: >
  node_golden_chain_sweep validated that the latest projected tail row contains the expected fields but
  never asserted the row is recent, so a chain read green when its only matching row was a weeks-old fixture/seed
  and no fresh flow had occurred -- a green verdict masked a dead/idle producer. This adds an optional
  per-chain freshness threshold: ModelChainDefinition gains max_row_age_seconds (int | None, ge=0) and
  timestamp_field (default created_at), configured in golden_chains.yaml / the chain contract. When a
  chain declares max_row_age_seconds and the latest tail row's timestamp_field value is older than the
  threshold -- or recency cannot be proven (timestamp column absent or unparseable) -- the chain is downgraded
  to a distinct STALE tri-state (EnumChainStatus.STALE; overall sweep status EnumSweepStatus.WARN, non-blocking)
  and the row age is reported (ModelChainResult.row_age_seconds, GoldenChainSweepResult.chains_stale).
  Green now requires recent flow, not merely a matching historical row. Field-presence FAIL still takes
  precedence over freshness; GATED (idle) takes precedence over WARN (stale); STALE + FAIL -> PARTIAL.
  The compute stays pure and deterministic: the reference clock is injected via now_iso (request) / --now-iso
  (CLI) and the handler never reads the system clock; a freshness-gated chain dispatched without now_iso
  fails fast (ERROR), never a silent pass. The pattern_learning and evaluation chains gain a 24h freshness
  window. No new node, no envelope/contract-API change, no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      A new failing-first suite proving the freshness downgrade: fresh row -> PASS, stale row -> STALE
      (overall WARN), row-age reporting, no-threshold back-compat (old rows still PASS), field-presence
      FAIL precedence over freshness, missing/unparseable timestamp -> STALE, missing now_iso on a freshness-gated
      chain -> ERROR (fail-fast), mixed PASS+STALE -> WARN, STALE+FAIL -> PARTIAL, boundary-exactly-at-threshold
      -> PASS, and the packaged registry exposing the threshold on the pattern_learning + evaluation chains.
      Existing registry-driven sweep tests updated to inject now_iso and a fresh created_at for the two
      newly-gated chains.
    command: "uv run pytest tests/test_golden_chain_sweep_freshness.py -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
