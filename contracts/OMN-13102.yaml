title: "docs(omnimarket): live materialization proof for pattern_learning golden chain"
summary: >-
  The pattern_learning golden chain (head onex.evt.omniintelligence.pattern-stored.v1 -> tail pattern_learning_artifacts)
  was diagnosed broken on 2026-06-12: no projection consumer subscribed pattern-stored.v1, pattern_learning_artifacts
  was never materialized, and the omnibase_infra table diverged (missing correlation_id). The structural
  fix landed via OMN-13124 (PR #1210) on dev: a canonical projection node node_projection_pattern_learning
  (REDUCER) subscribing pattern-stored.v1 and UPSERTing pattern_learning_artifacts by pattern_id; a per-node
  migration creating the table WITH correlation_id plus an idempotent ADD COLUMN IF NOT EXISTS backfill
  ALTER that reconciles any legacy (omnibase_infra 064-era) deployment; a byte-identical infra-vendored
  copy of that migration; and a golden_chains.yaml entry registering head->tail. This ticket supplies
  the live, end-to-end materialization proof OMN-13102's DoD requires. On the stability-test proof lane
  (.201) a real pattern-stored.v1 event was published to the head topic and the live projection_pattern_learning
  consumer (consumer group Stable) UPSERTed a row into omnidash_analytics.pattern_learning_artifacts with
  the expected pattern_id, pattern_name, composite_score, and correlation_id; the consumer-group offset
  advanced (LAG 0), proving end-to-end consumption. Decision-tree reconciliation (consumer exists -> verify/wire;
  correlation_id gap = schema-version divergence reconciled by migration; chain registered) is recorded
  in the evidence file. PR #1341 is docs-only (a single evidence file under docs/evidence/); it gates
  no image rebuild and performs no .201 mutation beyond a read-only synthetic publish to the proof lane
  to exercise the already-deployed live consumer.
