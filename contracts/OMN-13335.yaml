schema_version: "1.0.0"
ticket_id: "OMN-13335"
title: "escalation up-tier discriminator — terminal emission must not crash on negative savings"
summary: >
  OMN-13335 is the SEA customer-beta discriminator: an escalating delegation must reach a terminal carrying
  escalation_count>=1 with a cloud model_name and a quality-gate verdict. The prior "routing config is
  correct" theory (PR #1402 / merged 2026-06-25) was REFUTED by a fresh live run (CID 67d2bfc8): an escalating
  code_generation delegation walks the ladder, delegation-escalation-triggered.v1 fires, the higher-tier
  inference RESPONSE arrives — but the escalation silently EXHAUSTS the ladder without ever emitting a
  terminal. The ticket was reopened. #magic___^_^___line Root cause (environment-independent, proven by
  a failing-then-green unit test in the orchestrator's single terminal builder _emit_terminal): the builder
  computes total_savings_usd = cost.cost_savings_usd - prior_attempt_cost_usd. On an escalation that ran
  a metered prior tier (e.g. cheap_cloud GLM) and then landed on a FAILED / escalation-exhausted terminal
  whose final tier carries no premium counterfactual (cost.cost_savings_usd == 0.0), this subtraction
  goes NEGATIVE. The builder then constructs the compat ModelTaskDelegatedEvent with that negative cost_savings_usd,
  but the core wire DTO pins cost_savings_usd with ge=0.0, so construction raises ValidationError — crashing
  the dispatcher with NO terminal emitted. That is the silent terminal loss the live run observed: an
  escalated-to-ceiling delegation can never yield a passing terminal because the terminal is lost to a
  validation error before it is ever published. #magic___^_^___line Fix (orchestrator emitter layer, root
  cause — not a core constraint relaxation): clamp total_savings_usd to its honest floor of 0.0 in _emit_terminal.
  Savings cannot be negative — an escalation that burned metered budget did not "save" negative money;
  that spend is already captured in cost_usd. With the clamp, a valid terminal is ALWAYS emitted (completed
  when the gate passes, a clean FAILED terminal otherwise) instead of being silently lost.
