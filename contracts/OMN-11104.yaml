schema_version: "1.0.0"
ticket_id: "OMN-11104"
title: "2026-05-16 release batch — bind OCC evidence for v0.21.0/v0.36.0/v0.4.0/v0.24.0/v0.24.0/v0.16.0
  release PRs"
summary: >-
  Batch OCC evidence binder for the 2026-05-16 cross-repo release wave: omnibase_spi v0.21.0, omnibase_infra
  v0.36.0, omnimarket v0.4.0, omniclaude v0.24.0, omniintelligence v0.24.0, omnimemory v0.16.0. Evidence
  is added incrementally as release PRs land, mirroring the OMN-10895 incremental-binding pattern.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "All targeted release PRs pass CI and merge cleanly without skip tokens."
    command: "gh pr checks ${PR_NUMBER} --repo OmniNode-ai/${REPO}"
dod_evidence:
  - id: "dod-release-spi-v0.21.0"
    description: "Bind OMN-11104 release evidence to omnibase_spi PR #209 (release/v0.21.0) at the observed
      PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11104/dod-release-spi-v0.21.0/command.yaml\"
          && grep -q '^pr_number: 209$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11104/dod-release-spi-v0.21.0/command.yaml\"
          && grep -q '^commit_sha: \"6498ca241f71da1c59f6b5b650d70d91a5341cb6\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11104/dod-release-spi-v0.21.0/command.yaml\""
  - id: "dod-occ-pr-self"
