---
schema_version: '1.0.0'
ticket_id: OMN-13671
title: "feat(OMN-13671): make deploy-onex-prod.yml runtime-only-aware"
summary: >
  Add deploy_target input (runtime-only | onex-api | all) to deploy-onex-prod.yml so a runtime-only prod
  deploy can proceed without being blocked by the stale onex-api Trivy scan (b4c32554, 2026-03-30 image
  with accumulated CVEs). Onex-api is still fully Trivy-scanned whenever it is the deploy target.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >
      TDD: 8-test suite was RED before implementation (6 failures) and GREEN after (34/34 tests pass).
      Test file tests/k8s/test_deploy_onex_prod_workflow.py proves Trivy still runs when onex-api IS the
      deploy target.
    command: >
      uv run pytest tests/k8s/test_deploy_onex_prod_workflow.py -v --no-header 2>&1 | grep -E "passed|failed"
  - kind: ci
    description: >
      deploy-onex-prod.yml has deploy_target input with runtime-only option and Trivy step carries if
      condition referencing runtime-only.
    command: >
      grep -q "deploy_target" .github/workflows/deploy-onex-prod.yml && grep -A2 "Security scan image
      with Trivy" .github/workflows/deploy-onex-prod.yml | grep -q "runtime-only"
