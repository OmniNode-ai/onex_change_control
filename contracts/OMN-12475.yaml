ticket_id: "OMN-12475"
title: "node_agent_orchestrator — ADK as a bus-wired node (non-env injection, contract model id + prompt)"
summary: >
  Build node_agent_orchestrator, a bus-wired ORCHESTRATOR node (command onex.cmd.sea-agent.agent-task-requested.v1
  -> terminal onex.evt.sea-agent.agent-task-completed.v1) wrapping the ADK self-extending loop. src/agent/agent.py
  drops the hardcoded model='gemini-2.5-flash', the inline _SYSTEM_PROMPT, and the import-time os.environ.setdefault
  mutation; it becomes a thin build_app/build_root_agent delegate. The ADK model id is resolved by tier
  via entry_for_tier(adk_model_tier).served_model_id from the registry; the system prompt comes from the
  node's typed prompts contract (self_extending_agent_v1, byte-fidelity pinned); the credential is injected
  via google.genai.Client(api_key=...) through an ADK Gemini subclass — no os.environ writes remain anywhere
  in src/. The contract (extra=forbid) declares the topics + config.agent_runtime.adk_model_tier + prompt_ref
  and is wired in node_wiring. SEA owns no routing ladder — route authority stays in omnimarket; zero
  httpx.post added in SEA.
