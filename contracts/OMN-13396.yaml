schema_version: "1.0.0"
ticket_id: "OMN-13396"
title: "Terminal-path cost_usd fix: delegate-skill-terminal persists measured actual cost"
summary: >-
  The omnimarket delegation workflow handler (handler_delegation_workflow.py) constructed every terminal
  event with a hardcoded cost_usd=0.0 (and candidate_cost_usd=0.0 on the baseline intent) at the four
  delegate-skill-terminal construction points. The OMN-13355 savings recompute landed only on the projection
  project() path, so the live SEA/delegation chain (which emits via the delegate-skill-terminal path)
  persisted a zero actual cost and the savings number was counterfactual - 0. This change mirrors the
  projection's _measure_actual_cost computation at the terminal-event construction points by reusing the
  SAME canonical pricing function (recompute_actual_cost_and_savings): it resolves the serving tier's
  typed cost model (EnumTierCostType / ModelTierCost from omnibase_core OMN-13234) by tier name from the
  canonical routing registry and prices the measured tokens through it (free_local -> 0.0; metered ->
  rate*tokens). The compat terminal events also carry the cost provenance fields (cost_tier_type / cost_tier_name
  / cost_measurement_source / budget_headroom_consumed_usd). Proven by a new focused test (3 passing)
  plus the full omnimarket suite (7824 passing) and mypy --strict (2455 files) on omnimarket PR #1325.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "events"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
