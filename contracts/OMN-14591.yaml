title: "fix(OMN-14591): recognize on-demand ingress roots in contract topic graph"
summary: >-
  Central OCC evidence for omnimarket PR #1758, which fixes the contract_topic_graph DISCONNECTED_SUBGRAPH
  false-positive for on-demand ingress-root clusters while preserving the ratchet for genuinely dead islands.
