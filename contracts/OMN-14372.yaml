          && gh pr view 1751 --repo OmniNode-ai/omnimarket --json body --jq .body > "$body" && grep -Fq
          'af94511c5af914f277a27bf28185988d10793d17' "$pr" && grep -Fq '.github/workflows/ci.yml' "$pr"
