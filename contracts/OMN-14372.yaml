---
schema_version: 1.0.0
ticket_id: OMN-14372
title: OCC companion for omnimarket#1751 - canonical handler-shape ratchet CI enforcement
summary: >-
  OCC evidence companion for OMN-14372. omnimarket#1751 wires the canonical handler-shape ratchet into
  the required omnimarket CI Summary path and regenerates the baseline additively for two pre-existing
  canonical-shape gaps.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      omnimarket#1751 must prove the canonical handler-shape classifier is actually invoked by the required
      CI lint path and that the baseline regeneration is additive and RED/GREEN proven.
    command: >-
      gh pr view 1751 --repo OmniNode-ai/omnimarket --json headRefOid,files,body and inspect product workflow/baseline
      content at head ad1c705c906880c5610e265e5d5cd1dc2bcaa191.
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-1751-head-ad1c705-canon-shape-surfaces
    description: >-
      Product-observing verification that omnimarket#1751 head ad1c705c906880c5610e265e5d5cd1dc2bcaa191
      changes only the CI workflow and canonical handler-shape baseline, with no pre-commit manifest,
      deploy, runtime, Docker, compose, k3s/helm, or migration changes.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 1751 --repo OmniNode-ai/omnimarket --json headRefOid,files,commits
          --jq '.headRefOid + "\n" + ((.files | map(.path)) | join("\n")) + "\n" + ((.commits | map(.oid))
          | join("\n"))' > "$f" && grep -Fq 'ad1c705c906880c5610e265e5d5cd1dc2bcaa191' "$f" && grep -Fq
          '.github/workflows/ci.yml' "$f" && grep -Fq 'scripts/ci/canonical_handler_shape_baseline.py'
          "$f" && ! grep -Fq '.pre-commit-config.yaml' "$f" && ! grep -Eq '(^|/)deploy/|docker/|compose[.]ya?ml|Dockerfile|k3s|helm|migrations?/'
          "$f"
  - id: dod-1751-head-ad1c705-ci-enforcement-wiring
    description: >-
      Product workflow verification that the PR's CI workflow at head ad1c705c906880c5610e265e5d5cd1dc2bcaa191
      adds the Canonical handler-shape ratchet step to the existing lint job path, invokes the sibling
      omnibase_core classifier with omnimarket package/src-root arguments, and runs full-scope mode.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh api 'repos/OmniNode-ai/omnimarket/contents/.github/workflows/ci.yml?ref=ad1c705c906880c5610e265e5d5cd1dc2bcaa191'
          --jq .content | base64 --decode > "$f" && grep -Fq '  lint:' "$f" && grep -Fq 'Canonical handler-shape
          ratchet' "$f" && grep -Fq 'canonical_handler_shape.py' "$f" && grep -Fq -- '--package omnimarket'
          "$f" && grep -Fq -- '--src-root src' "$f" && grep -Fq -- '--baseline scripts/ci/canonical_handler_shape_baseline.py'
          "$f" && grep -Fq -- '--full' "$f" && grep -Fq 'ci-summary:' "$f" && grep -Fq 'needs: [occ-preflight,
          zone-filter, lint' "$f"
  - id: dod-1751-head-ad1c705-red-green-proof
    description: >-
      Product PR body verification for OMN-14372: the PR documents zero prior workflow/pre-commit references,
      the fail-closed CI Summary enforcement path, the two additive baseline entries, local RED/GREEN
      proof, and the deliberately separate OMN-14563 scope for pre-commit module relocation.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 1751 --repo OmniNode-ai/omnimarket --json headRefOid,body --jq '.headRefOid
          + "\n" + .body' > "$f" && grep -Fq 'ad1c705c906880c5610e265e5d5cd1dc2bcaa191' "$f" && grep -Fq
          'zero references in `.github/workflows/` or `.pre-commit-config.yaml`' "$f" && grep -Fq 'required
          `ci-summary` / "CI Summary" check' "$f" && grep -Fq 'node_hybrid_codegen_orchestrator' "$f"
          && grep -Fq 'node_occ_companion_compute' "$f" && grep -Fq 'NEW non-canonical node(s)' "$f" &&
          grep -Fq 'new=0 unproven_flips=0 warn=111' "$f" && grep -Fq 'OMN-14563' "$f"
  - id: dod-occ-self-4109
    description: >-
      OCC companion self-binding receipt for onex_change_control#4109. The receipt binds the companion
      PR number and the initial evidence commit a99057f66cca622cc72bb24c47b0db484353496a so hosted receipt
      gates can verify the exact central evidence chain used for omnimarket#1751.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          grep -Fq 'pr_number: 4109' drift/dod_receipts/OMN-14372/dod-occ-self-4109/command.yaml && grep
          -Fq 'a99057f66cca622cc72bb24c47b0db484353496a' drift/dod_receipts/OMN-14372/dod-occ-self-4109/command.yaml
