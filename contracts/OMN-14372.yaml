          --jq .content | base64 --decode > "$wf"; } && grep -Fq '  lint:' "$wf" && grep -Fq 'Canonical
          handler-shape ratchet' "$wf" && grep -Fq -- '--package omnimarket' "$wf" && grep -Fq -- '--src-root
          src' "$wf" && grep -Fq -- '--baseline scripts/ci/canonical_handler_shape_baseline.py' "$wf"
          && grep -Fq -- '--full' "$wf" && grep -Fq 'ci-summary:' "$wf" && grep -Fq 'needs: [occ-preflight,
          zone-filter, lint' "$wf"
  - id: dod-1751-head-af94511-red-green-proof
