---
schema_version: "1.0.0"
ticket_id: "OMN-10998"
title: "Clean up omniclaude stale infra delegation imports and contract lookup docs"
summary: >-
  Binds omniclaude PR #1587, which migrates stale delegation imports away from deleted omnibase_infra
  delegation nodes and onto the current omnimarket-owned delegation surface.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniclaude PR #1587 is open at the implementation head carrying the delegation import
      migration."
    command: "gh pr view 1587 --repo OmniNode-ai/omniclaude --json number,state,headRefOid,title"
  - kind: "tests"
    description: "Direct import proof passes for omnimarket delegation models/handlers and omniclaude
      in-process runner."
    command: "uv run python - <<'PY' ... PY"
  - kind: "tests"
    description: "Focused delegation smoke and in-process wiring tests pass."
    command: "uv run pytest tests/delegation/test_e2e_smoke.py tests/delegation/test_e2e_inprocess_wiring.py
      -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omniclaude-pr-1587"
    description: "omniclaude PR #1587 carries the stale delegation import migration at the recorded head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10998/dod-omniclaude-pr-1587/command.yaml
          && grep -q '^pr_number: 1587$' drift/dod_receipts/OMN-10998/dod-omniclaude-pr-1587/command.yaml
          && grep -q '^commit_sha: \"ccfce3ebb076498ecb816443a253192fc0c80dff\"$' drift/dod_receipts/OMN-10998/dod-omniclaude-pr-1587/command.yaml"
  - id: "dod-import-proof"
    description: "Direct import proof verifies the current omnimarket delegation import path."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10998/dod-import-proof/command.yaml
          && grep -q 'omnimarket delegation imports' drift/dod_receipts/OMN-10998/dod-import-proof/command.yaml"
  - id: "dod-focused-delegation-tests"
    description: "Focused delegation smoke and in-process wiring tests pass with expected skips."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10998/dod-focused-delegation-tests/command.yaml
          && grep -q '7 passed, 13 skipped' drift/dod_receipts/OMN-10998/dod-focused-delegation-tests/command.yaml"
  - id: "dod-live-llm-skip"
    description: "Live LLM delegation test is explicitly skipped when no live endpoint is configured."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10998/dod-live-llm-skip/command.yaml
          && grep -q '1 skipped' drift/dod_receipts/OMN-10998/dod-live-llm-skip/command.yaml"
  - id: "dod-ruff-diff-check"
    description: "Touched omniclaude delegation files pass ruff and git diff whitespace checks."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10998/dod-ruff-diff-check/command.yaml
          && grep -q 'All checks passed' drift/dod_receipts/OMN-10998/dod-ruff-diff-check/command.yaml"
  - id: "dod-occ-pr-self"
    description: "onex_change_control PR carries the OMN-10998 central contract and receipt bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-10998/dod-occ-pr-self/command.yaml && grep -q '^status:
          PASS$' drift/dod_receipts/OMN-10998/dod-occ-pr-self/command.yaml"
