summary: >-
  omnibase_core PR #1428 lands scripts/ci/canonical_handler_shape.py — the missing enforcement surface
  for the RSD canonical rewrite. compliance_sweep checks handler hygiene (topic/transport/logic-in-node)
  but is blind to handler SHAPE, so a non-canonical handler passes green CI; this AST-classifies each
  node's contract-declared handler and ratchets the non-canonical set non-increasing. Canonical = definition
  B (operator-locked): a typed-payload core handle(request) -> response bound via the contract, adapted
  by the shared runtime (runtime_local_adapter, OMN-8724), with no ModelEventEnvelope in the core. WARN-only
  on the frozen baseline, HARD-FAIL on a new non-canonical node or baseline growth. A baselined node flips
  canonical only with a 3-part adequacy+equivalence gate: (1) shape-canonical (2) an adequacy receipt
  whose verdict the gate RE-DERIVES from raw numbers (never trusts the receipt's self-asserted meets_target;
  recomputes pct >= target and re-hashes the handler module live for staleness) (3) a green equivalence
  replay bound to the same selected_input_hashes — coverage is not equivalence. Change-aware: --scope
  changed classifies only nodes owning the diff's files; --full scans the whole repo; fail-closed escalation
  to full when the classifier, baseline, or a shared module changes. Wired as CI job + pre-commit hook.
  Canary scope omnibase_core only: 2 canonical, 6 baselined non-canonical. Scripts + CI-config + tests
  only; no runtime node-handler path touched, no deploy scope (Deploy Gate SKIPPED on the code PR).
