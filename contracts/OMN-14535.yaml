ticket_id: OMN-14535
title: "OCC companion for omnimarket#1743 — context_roi_scores drops factor_subset_hash/routing_source
  on every row"
summary: "OCC evidence companion for OmniNode-ai/omnimarket#1743 (OMN-14535). node_context_roi_runner
  has computed and populated both factor_subset_hash (SHA-256 of the ordered factor-subset label set for
  the arm) and routing_source (provenance of the model/endpoint selection) on every ModelAttemptReductionRow
  since their introduction. node_projection_context_roi's handler never captured either field into the
  context_roi_scores INSERT/UPSERT row, and the table (migration 001) never had columns for them — 100%
  silent loss on every row ever written. 488 existing rows predate the fix and cannot be backfilled: the
  real per-row values were never persisted anywhere to recover from, and an empty string is not distinguishable
  from a legitimately empty value (the 'off' arm's factor_subset_hash is also '' by design). Fix: migration
  002 adds both columns (TEXT NOT NULL DEFAULT ''); handler_projection_context_roi.py's project() now
  carries both fields from the row model into the projected row; contract.yaml's projection_api exposure
  columns list updated. Also closes a pre-existing state-coverage-gate baseline gap for this node (no
  top-level test asserted on the declared terminal_event output) while touching its contract. A new test
  drives real, non-default producer values through project(); RED-verified via file-scoped checkout of
  the pre-fix handler (KeyError: 'factor_subset_hash')."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "omnimarket#1743 head adds migrations/002_add_factor_subset_hash_and_routing_source.sql
      (2 new columns) and makes handler_projection_context_roi.py's project() carry factor_subset_hash/routing_source
      from the row model into the projected row (previously silently dropped on every row) — proven by
      test_factor_subset_hash_and_routing_source_are_projected_omn14535 driving real non-default producer
      values through project(), plus an independent RED (checkout the parent commit for the handler file,
