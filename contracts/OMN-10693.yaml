        check_value: "uv run pytest src/omnimarket/nodes/node_adr_document_ingestion_effect/tests/ -v
          -m 'not integration' 2>&1 | grep '28 passed'"
  - id: "dod-precommit"
    description: "Pre-commit hooks pass for all new node files."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "OMNIBASE_INFRA_PATH=${OMNIBASE_INFRA_PATH:?set OMNIBASE_INFRA_PATH} pre-commit run
