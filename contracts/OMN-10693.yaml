schema_version: "1.0.0"
ticket_id: "OMN-10693"
title: "Build document ingestion node (read-only filesystem effect)"
summary: >
  EFFECT node node_adr_document_ingestion_effect added to omnimarket. Crawls markdown files recursively,
  computes sha256 content hashes, and extracts git metadata via async subprocess. Subscribes to adr-document-ingestion-requested.v1,
  publishes adr-document-ingestion-completed.v1. Read-only — no writes, no LLM, no network. 28 unit tests,
  all pre-commit hooks pass.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
  - "events"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
evidence_requirements:
  - kind: "tests"
    description: "28 unit tests covering sha256, exclude patterns, git metadata parsing, multi-root, and
      subprocess failure graceful fallback."
    command: "uv run pytest src/omnimarket/nodes/node_adr_document_ingestion_effect/tests/ -v -m 'not
      integration'"
  - kind: "ci"
    description: "All CI checks pass on omnimarket PR #562."
    command: "gh pr checks 562 --repo OmniNode-ai/omnimarket --watch"
dod_evidence:
