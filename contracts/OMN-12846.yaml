---
schema_version: "1.0.0"
ticket_id: "OMN-12846"
title: "Category-weighted typed user-correction event (Misunderstanding vs New-Information), linked to
  context_pack_hash"
summary: >-
  Central evidence for omnibase_core PR #1288 (the two cross-repo enums) and omnimarket PR #1314 (ModelUserCorrectionEvent
  + node_user_correction_observer_effect + aggregation). The correction event carries first-class category
  and failure_axis fields with no single rolled-up score, requires context_pack_hash and factor_subset_hash
  (orphan-signal guard), publishes via a contract-declared topic (no hardcoded literal), and feeds context
  selection only — never an agent-output reward.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "topics"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
evidence_requirements:
  - kind: "tests"
    description: >-
      The 7 ticket TDD tests pass RED->GREEN: categories-not-flattened, requires-context_pack_hash, category-enum-exhaustive,
      failure-axis-misunderstanding-vs-new-information, new-information-excluded-from-context-failure-rate,
      correction-rate-not-wired-to-agent-output-reward, topic-declared-in-contract-not-hardcoded.
    command: "uv run pytest tests/intelligence/ -q  # omnimarket; tests/unit/enums/test_enum_user_correction.py
      \ # core"
dod_evidence:
  - id: "dod-core-pr-1288"
    description: >-
      omnibase_core PR #1288 adds EnumUserCorrectionCategory (7 members) and EnumCorrectionFailureAxis
      (MISUNDERSTANDING, NEW_INFORMATION) at branch head bd67ac4d62b6a708985c7a642209be6fe9882424. Both
      are StrEnum, Enum-prefixed; 8 enum tests pass; mypy + ruff + pre-commit clean.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-core-pr-1288/command.yaml"
          && grep -q '^pr_number: 1288$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-core-pr-1288/command.yaml"
          && grep -q 'bd67ac4d62b6a708985c7a642209be6fe9882424' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-core-pr-1288/command.yaml"
  - id: "dod-omnimarket-pr-1314"
    description: >-
      omnimarket PR #1314 adds ModelUserCorrectionEvent (frozen, required context_pack_hash + factor_subset_hash,
      distinct category + failure_axis, no rolled-up score), the node_user_correction_observer_effect
      EFFECT node (contract-declared publish topic, no hardcoded literal), and the MISUNDERSTANDING-only
      aggregation, at branch head 5dcfa4f8630c7f455d7fe0c52741e8aac34f5406. Full suite (no -k): 7645 passed;
      mypy --strict + ruff + runtime sweep (314/314) + pre-commit clean.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-omnimarket-pr-1314/command.yaml"
          && grep -q '^pr_number: 1314$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-omnimarket-pr-1314/command.yaml"
          && grep -q '5dcfa4f8630c7f455d7fe0c52741e8aac34f5406' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-omnimarket-pr-1314/command.yaml"
  - id: "dod-tdd-red-green"
    description: >-
      The 7 ticket TDD tests are RED on current main/dev (model + enums + aggregation absent) and GREEN
      after implementation. Verified by an independent probe re-running the focused suites.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-tdd-red-green/command.yaml"
          && grep -q 'RED' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-tdd-red-green/command.yaml"
          && grep -q 'GREEN' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-tdd-red-green/command.yaml"
  - id: "dod-deploy"
    description: >-
      Deploy posture for the new EFFECT node and its publish topic. The node ships on the next effects-lane
      runtime deploy; the new topic onex.evt.omnimarket.user-correction.v1 is contract-declared (event_bus.publish_topics)
      and auto-provisioned by the runtime topic-provisioning path on first publish. No DB migration. The
      deploy receipt records this runtime-ship posture.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-deploy/command.yaml"
          && grep -q 'deploy' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-deploy/command.yaml"
  - id: "dod-occ-pr-self"
    description: >-
      OCC self-binding receipt for this central evidence PR carrying the OMN-12846 contract and receipts.
      Binds a PASS receipt directly to the onex_change_control evidence PR so OCC eligibility can validate
      the evidence PR before the downstream Receipt Gate on the core and omnimarket PRs cites it.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-occ-pr-self/command.yaml"
          && grep -q '^pr_number: 2853$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12846/dod-occ-pr-self/command.yaml"
