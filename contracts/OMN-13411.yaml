---
schema_version: "1.0.0"
ticket_id: "OMN-13411"
title: "Release-identity gate for omnibase_core — block src/** merged onto a published version without
  a bump"
summary: >
  Port the omnibase_infra release-identity gate (OMN-13412, scripts/check_release_identity.py) to omnibase_core,
  the literal root-cause repo of OMN-13402 (A3) / OMN-13405 (A6). omnibase_core is a published PyPI package
  that downstream repos pin and `uv sync` against; its dev HEAD carried unreleased modules (e.g. enum_correction_failure_axis,
  OMN-13234) while still labelled 0.45.0 — the same version as the published wheel that LACKED them, so
  a workspace build installed the released enum-LESS wheel and crash-looped on the missing import because
  the version string could not disambiguate the two code states. scripts/check_release_identity.py fails
  (exit 1) when packaged src/** changed since the PR base AND project.version is NOT strictly ahead of
  the latest published v* tag; docs/tests/CI-only diffs are exempt; no-tag repos pass; a missing project.version
  is a config error (exit 2). Wired as a standalone validator-release-identity.yml CI workflow (runs the
  unit suite + the gate) matching the 14 existing validator-*.yml workflows, plus a check-release-identity
  pre-commit hook. Making the workflow a branch-protection-required context is the deferred serial flip
  (additive, verify-on-merge_group-first), per the no-reflexive-live-mutation rule.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Release-identity gate unit + live-smoke suite: ahead-passes, equals-fails (the OMN-13405 footgun),
      behind-fails, exempt-diff, no-tag, config-error, src-prefix detection, explicit-changed-file override.
    command: "uv run pytest tests/scripts/test_check_release_identity.py -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
