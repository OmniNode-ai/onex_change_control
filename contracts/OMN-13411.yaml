      and mypy --strict are clean; pre-commit runs all hooks green including the new check-release-identity
      gate, Verify Model-B rollup coverage (OMN-13574), and Enforce validator-requirements.yaml (OMN-9115).
      Manual proof: a src/ change at the equal-to-published version exits 1 (the OMN-13405 footgun), and
      the current 0.46.0 > published 0.45.0 strict run exits 0.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13411/dod-omnibase-core-pr-1334/command.yaml
          && grep -q '^pr_number: 1334$' drift/dod_receipts/OMN-13411/dod-omnibase-core-pr-1334/command.yaml
          && grep -q '9 passed' drift/dod_receipts/OMN-13411/dod-omnibase-core-pr-1334/command.yaml"
