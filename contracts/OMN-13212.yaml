title: "[B2] Rebuild node_pr_review_bot canonically"
summary: >-
  Phase B2 of the canonical node migration (epic OMN-13205) rebuilds the non-canonical node_pr_review_bot
  workflow into canonical CONTRACT + NODE + HANDLER primitives. omnimarket PR #1263 deletes the bespoke
  workflow_runner shell and introduces four canonical nodes: node_pr_review_orchestrator (ORCHESTRATOR),
  node_pr_review_fsm_reducer (REDUCER), node_github_review_effect (EFFECT), and node_judge_verdict_parse_compute
  (COMPUTE). It reuses B1's node_github_diff_effect + prompt/parse COMPUTE and A1's omnimarket.inference
  bridge, deletes the raw-httpx HandlerJudgeVerifier (the judge call now goes through the canonical inference
  bridge), and re-homes the shared PR-review domain/FSM/node-IO models to omnimarket.review (no cross-node
  reach-in). The pr-review-bot-start command topic and the ReviewVerdict output shape are preserved (replay-compatible).
  The declared-but-unwired emergency-bypass / commit-citation-verify / webhook-reconcile / verification-loop
  command surfaces (baselined as dead handlers) are retired with the shell. Depends on A1 (OMN-13208)
  and B1 (OMN-13210), both merged to dev.
