title: "fix(OMN-14228): precondition fail-open->fail-closed for runner-fleet health classifier (Slice
  A, no fleet mutation)"
summary: >-
  Slice A of OMN-14228 (runner-fleet remediation Increment 2). omnibase_infra PR #2246 threads the already-gathered
  source-determinacy facts (github_source_ok / docker_source_ok) from ModelRunnerFleetSnapshot onto every
  ModelRunnerHealthAssessment (as is_determinate) and onto ModelRunnerFleetHealthVerdict, adds typed re-arm
  signal fields (docker_restart_count, diag_heartbeat_age_seconds) and a buildx_determinate flag, and
  annotates the verdict detail with an honest INDETERMINATE note when a probed source failed. This closes
  a fail-open gap: a full SSH/Docker probe outage previously defaulted docker_restart_count to 0 upstream,
  structurally preventing the CRASH_LOOPING (0.9) and LISTENER_ZOMBIE (0.85) classifications from ever
  firing. Slice A is a precondition-only change: no gate COMPUTE, no remediation EFFECT, no ledger REDUCER,
  and no fleet mutation. Slices B and C stay operator-design-gated and out of scope. This evidence companion
  does not close the parent OMN-14228 ticket. An independent lander (not the implementing agent) reproduced
  the change end-to-end.
