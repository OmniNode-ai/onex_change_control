ticket_id: "OMN-13151"
title: "feat(OMN-13151): Phase 0 registry unification — extend ModelContentDiscoveredEvent + duty-critical
  capture-topic metadata"
summary: >-
  OCC evidence for omnimarket PR (Phase 0 of the emit/hook-registry unification, epic OMN-13129 wave I).
  (1) Extends ModelContentDiscoveredEvent (omnimarket node_filesystem_crawler_effect) with durable-ingestion
  fields content_blob_ref, source_type (new EnumContentSourceType StrEnum), scope_ref, source_version,
  tags, priority_hint, artifact_kind — all optional/defaulted so pre-OMN-13151 payloads still parse and
  round-trip (migration-compat). (2) Adds per-topic metadata (transform, max_payload, schema_ref) to the
  two duty-critical durable-capture topics (artifact.captured, tool.output.captured) in the tiered registry
  topics.yaml and extends the EventRegistry loader (FanOutRule) to carry max_payload_bytes/schema_ref/transform_name.
  (3) Adds contract tests proving both capture topics are duty_critical, declare a schema_ref, and declare
  a max_payload bounded strictly below the daemon stream cap (1_048_576), plus a ratchet rejecting any
  new duty-critical topic not on the explicit allowlist. (4) Adds a synthetic-divergence test proving
  the existing cross-registry drift check (omnimarket.validators.event_registry_drift — already a pre-commit
  + CI gate) fires on a duty-critical capture-topic divergence. omniclaude hook registry + topics.py already
  align (topic names + passthrough transforms match; existing test_registry_consistency.test_registry_consistency_capture_topics_duty_critical
  passes against the modified registry) — no omniclaude source change required. Epic OMN-13129.
