schema_version: "1.0.0"
ticket_id: "OMN-13003"
title: "node_context_roi_runner contract omits event_model — live dispatcher crash halts Exp 1-3"
summary: >-
  The first-ever run-request on onex.cmd.omnimarket.context-roi-run-requested.v1 crashed the stability-test
  dispatcher with "AttributeError: 'dict' object has no attribute 'tasks'", halting experiment batteries
  Exp 1-3 (920 runs). Root cause (CONTRACT defect, same class as OMN-12420 node_dod_verify): the node_context_roi_runner
  handler_routing.handlers[0] entry omitted the event_model block, so the runtime auto-wiring dispatcher
  (_make_dispatch_callback in omnibase_infra runtime/auto_wiring/handler_wiring.py) took the event_model-is-None
  branch and handed HandlerContextRoiRunner.handle the raw materialized dispatch envelope (a dict) instead
  of a validated ModelContextRoiRunRequest; "for task in request.tasks" then raised AttributeError. The
  node's golden-chain/unit tests construct ModelContextRoiRunRequest(...) directly and call handle(),
  never exercising the auto-wiring deserialize step, so the defect shipped green. omnimarket PR #1180
  adds the event_model (+ event_type + message_category: command) mapping to the handler entry and a real-dispatch-path
  regression test that replays the exact crashing envelope through _make_dispatch_callback (fails before
  fix with KeyError: 'event_model', passes after). No topic, envelope, or contract API change beyond the
  handler event_model declaration.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
