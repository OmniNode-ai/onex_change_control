schema_version: "1.0.0"
ticket_id: "OMN-13401"
title: "Vendor delegation cost/budget migrations 0018/0019 into omnibase_infra deployed tree"
summary: >-
  Vendor the two node-owned delegation migrations that omnimarket origin/dev ships (0018_delegation_cost_measurements,
  0019_delegation_budget_state) into omnibase_infra's deployed forward-migration tree under docker/migrations/forward/nodes/node_projection_delegation/.
  The omnibase_infra vendored tree topped out at 0017; the forward-migration runner reads only the vendored
  tree, so a dev rebuild applied 0017 only and left the dev ledger at 0016->0017, leaving required 0018/0019
  unapplied and invalidating Phase 5 savings/cost runtime readback (measured cost, budget state). Vendored
  1:1 via the canonical scripts/sync-node-migrations.sh path (OMN-12559 — no hand-copy, no renumber);
  the runner applies them under namespaced ids node:node_projection_delegation:0018_... / 0019_... in
  a separate identity space from the flat infra sequence. Both files are byte-for-byte identical to the
  omnimarket source (sha256 match) and were not hand-edited. Mirrors the 0017 vendoring (OMN-13355 / infra#2050).
  0018 carries OMN-13234's typed per-tier actual-cost columns; 0019 carries OMN-13235's per-tenant ceiling
  budget-state table.
