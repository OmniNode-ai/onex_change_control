schema_version: "1.0.0"
ticket_id: "OMN-13596"
title: "response_text never shows a timeout string on a metered PASS delegation row"
summary: >-
  On the authoritative metered PASS delegation row (cost_usd>0 AND quality_gate_passed=true), the delegation_events.response_text
  projection field displayed a delegation timeout string ("Timed out…") instead of the model's actual
  answer, so a customer reading a successful, metered delegation got a timeout string (a success that
  looks like a failure). Root cause: omnimarket node_projection_delegation/handlers/handler_projection_delegation.py
  _canonical_result_to_task_delegated_payload() blindly mapped payload.get("content") -> response_text;
  on the canonical delegation-completed.v1 / delegation-failed.v1 terminal, content can carry the caller-side
  delegation-wait timeout text (orchestrator contract error_message "Delegation timed out before runtime
  completion"; runtime dispatch port "timed out after <N>s waiting for delegation result") rather than
  the model output, and that string landed in response_text on the very row the projection treats as the
  metered PASS. The fix is three layers, all in node_projection_delegation: (1) new _canonical_response_text()
  suppresses a delegation timeout/error string (returns None) when quality_passed is True, so the UPSERT
  COALESCE + _preserve_existing_evidence keep a genuine answer; FAILED rows still surface their content;
  (2) model_delegate_skill_terminal_projection.from_terminal_event() only falls through to error_message
  when quality_gate_passed is False; (3) _preserve_existing_evidence() never lets a later FAILED/timeout
  terminal overwrite a confirmed PASS row's response_text. Distinct from OMN-12732 / OMN-12737 (empty/dropped
  response_text); this is the wrong-value case. This OCC contract is the Receipt-Gate Evidence-Source
  the omnimarket product PR #1418 cites. No runtime deploy is performed by this PR itself.
is_seam_ticket: false
