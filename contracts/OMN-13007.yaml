title: "Dashboard chrome: honest, runtime-switchable DATA SOURCE control replaces the timezone-lookalike
  dropdown"
summary: >
  The omnidash chrome filter cluster's left-most dropdown was a timezone picker that read as a data-source
  selector, while the dashboard's real data source (file fixtures vs live projection backend) was invisible
  and unswitchable at runtime (env-only via VITE_DATA_SOURCE / VITE_PROJECTION_API_URL). This burned the
  operator: SEA Demo silently ran in file mode, every panel showed fixture empty-states, and the SEA generate
  widget failed with "Missing data source base URL". omnidash PR #213 adds an honest DATA SOURCE chrome
  control + a single runtime override seam (src/data-source/data-source-override.ts) consulted by projection-base-url,
  data-source/index, useDataSourceMode, delegation-api, and the SEA generate submit; renders a prominent
  fixture treatment in file mode; and relocates the timezone picker out of the data-source position.
