title: "fix(OMN-14330): re-add OMN-7018 worktree guard as targeted hooks.json carve-out"
summary: >-
  omniclaude PR #1891 restores the OMN-7018 `git worktree add` canonical-root guard that OMN-13244 silently
  disabled when it gutted `plugins/onex/hooks/hooks.json` to a measurement baseline. Mirroring the OMN-13856
  Done-flip-guard precedent, the PR extracts a new, dedicated `plugins/onex/hooks/scripts/pre_tool_use_worktree_guard.sh`
  containing ONLY the `git worktree add` canonical-root check (gated on the `WORKTREE_GUARD` bit, `EnumHookBit.WORKTREE_GUARD
  = 1 << 59`), registers it as a second PreToolUse entry in hooks.json, and updates the regression-lock
  test (`tests/hooks/test_hooks_baseline_omn_13244.py`) to assert exactly two registered hooks. `pre_tool_use_bash_guard.sh`
  / `bash_guard.py` (which bundle the same worktree check together with unrelated destructive-command
  HARD_BLOCK/SOFT_ALERT/CONTEXT_ADVISORY logic) stay untouched and unregistered. An independent verifier
  (not the implementing agent) re-executed the guard's synthetic proof cases directly against the PR head,
  confirmed the scope is exactly the 3 claimed files with zero drift into bash_guard.py, and confirmed
  the hooks.json/test wiring is internally consistent.
