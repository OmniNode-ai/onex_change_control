---
schema_version: "1.0.0"
ticket_id: OMN-10603
title: "Ban hardcoded .201 runner/runtime references in GitHub workflows"
summary: >
  Replace hardcoded OMNINODE_SELF_HOSTED_RUNS_ON_V1 / USE_SELF_HOSTED_RUNNERS patterns with the canonical
  OMNI_RUNNER_SELECTOR_V1 pattern (vars.OMNI_TRUSTED_CI_RUNS_ON_JSON) across all public OmniNode repos.
  Add a reusable ban-hardcoded-runner-ip CI gate that rejects PRs introducing 192.168.86.201 IP literals
  in workflow files.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "Accessible OMN-10603 PR check surfaces are queryable for CI and runner-IP gate evidence"
    command: "gh pr checks 1569 --repo OmniNode-ai/omniclaude && gh pr checks 207 --repo OmniNode-ai/omnibase_spi
      && gh pr checks 79 --repo OmniNode-ai/omnidash && gh pr checks 649 --repo OmniNode-ai/omniintelligence
      && gh pr checks 309 --repo OmniNode-ai/omnimemory && gh pr checks 86 --repo OmniNode-ai/omnibase_compat"
  - kind: "manual"
    description: "No USE_SELF_HOSTED_RUNNERS or OMNINODE_SELF_HOSTED_RUNS_ON_V1 patterns remain"
    command: "grep -rn 'USE_SELF_HOSTED_RUNNERS\\|OMNINODE_SELF_HOSTED_RUNS_ON_V1' omniclaude/.github/workflows/
      omnibase_spi/.github/workflows/ omnidash/.github/workflows/ omniintelligence/.github/workflows/
      omnimemory/.github/workflows/ omninode_infra/.github/workflows/ omnibase_compat/.github/workflows/"
