        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-no-runtime-mutation/command.yaml"
          && grep -q 'deploy gate:' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-no-runtime-mutation/command.yaml"
