---
schema_version: "1.0.0"
ticket_id: "OMN-13711"
title: "Handler handle() signatures reject runtime correlation_id kwarg"
summary: >-
  Systemic Finding #4: RuntimeLocal dispatches contract-declared typed-command handlers by introspecting
  handle() signatures. Handlers with additional positional parameters after the command model fell through
  to kwargs dispatch and rejected the command payload correlation_id field. The omnimarket fix makes secondary
  handle() parameters keyword-only across the eight affected typed-command entry handlers, preserving
  contract topics and runtime interfaces while allowing the command model to dispatch positionally.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "PASS receipts bind focused conformance proof and affected-node suites."
    command: >-
      grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-reproduce-and-regress/command.yaml"
      && grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-affected-node-suites/command.yaml"
      && grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-no-runtime-mutation/command.yaml"
      && grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-occ-self/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-reproduce-and-regress"
    description: >-
      Focused conformance test passes and confirms every contract-declared typed-command entry handler
      exposes exactly one positional handle() parameter. Local build_loop and design_to_plan dry-run probes
      reach handler execution and no longer raise the targeted correlation_id TypeError; both now surface
      the known downstream tuple return-shape condition instead.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-reproduce-and-regress/command.yaml"
  - id: "dod-affected-node-suites"
    description: >-
      Affected-node pytest lane passes for build_loop, design_to_plan, data_verification, overnight, process_watchdog,
      release, ticket_work, ticket_research, and signature_conformance tests.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-13711/dod-affected-node-suites/command.yaml"
  - id: "dod-no-runtime-mutation"
    description: >-
      Deploy-gate assessment: the omnimarket change is a handler signature and conformance-test update
      only. No live deploy, restart, broker topic change, .201 mutation, production data mutation, REST
