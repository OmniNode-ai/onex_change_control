summary: >-
  Two enablement gaps blocking the first RSD mechanical-regeneration wave outside omnibase_core, found
  during OMN-14355 canary-scout recon. omnibase_core PR #1429 parameterizes scripts/ci/canonical_handler_shape.py
  (--package/--src-root/--nodes-glob/--receipts-dir, all defaulting to today's omnibase_core-only values
  so core CI behavior is unchanged) so the growth ratchet can classify a target package other than omnibase_core.
  omnimarket PR #1713 vendors scripts/ci/compute_golden.py (OMN-14353, pure stdlib, zero omnibase_core
  imports) byte-identical into omnimarket, adds a smoke test proving the vendored copy record/replay round-trips,
  commits the omnimarket canonical-shape baseline generated with the parameterized classifier (352 nodes:
  canonical=242, non_canonical=110), and documents a read-only handler_routing/runtime_local dispatch
  trace proving the canary node's operation_match routing does not need updating for the planned check()->handle()
  rename. No runtime contract, topic, migration, or deployed-service surface is touched by either PR;
  both are scripts/tests-only.
