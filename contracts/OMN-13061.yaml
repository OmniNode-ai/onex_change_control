title: "fix(omnibase_core): OCC eligibility validator None-bypass — hard-fail on contract_sha256=None"
summary: >-
  validator_occ_merge_eligibility.py lines 184-185 contained a silent `pass` when receipt.contract_sha256
  is None, allowing post-cutoff receipts to bypass hash enforcement. The migration window closed on 2026-04-30
  (OMN-10421). This fix replaces the silent pass with a hard CONTRACT_HASH_MISMATCH failure, aligning
  with validator_receipt_gate's post-cutoff enforcement. Historical corpus ADVISORY scanners (OMN-13060)
  are unchanged. Adds test_missing_contract_hash_is_ineligible_post_cutoff which verifies the red-case:
  contract_sha256=None yields eligible=False, reason=contract_hash_mismatch. All 13 tests in test_occ_merge_eligibility.py
  pass.
