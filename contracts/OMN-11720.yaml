---
schema_version: "1.0.0"
ticket_id: "OMN-11720"
title: "Build promotion manifest generator"
summary: >
  Adds typed intended promotion manifest generation and verification for the OMN-11714 dev-to-main promotion
  path. The generator records per-repo dev head SHA, main base SHA, package metadata, dependency ranges,
  lock hashes, runtime target, and a canonical manifest SHA-256 digest that can be bound into promotion
  receipts.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused OMN-11720 tests validate manifest generation, canonical digest serialization, manifest loading,
      and mismatch detection when dev state changes after the intended manifest is generated.
    command: "uv run pytest tests/promotion/test_manifest.py -q"
  - kind: "manual"
    description: >
      Ruff validates formatting, import ordering, and lint rules for the promotion package, tests, and
      script entrypoint registration.
    command: "uv run ruff format src/onex_change_control/promotion tests/promotion pyproject.toml && uv
      run ruff check src/onex_change_control/promotion tests/promotion pyproject.toml"
  - kind: "manual"
    description: "Mypy validates the promotion package under strict repo typing rules."
    command: "uv run mypy src/onex_change_control/promotion"
  - kind: "manual"
    description: >
      The generator creates a real manifest for the local onex_change_control checkout and verifies it
      against current dev/main state.
    command: "uv run generate-promotion-manifest --workspace /Volumes/PRO-G40/Code/omni_home --promotion-batch-id
      promotion-2026.05.23-test.1 --runtime-lane stability-test --runtime-profile stability-test --repo
      onex_change_control --output /tmp/omn-11720-manifest.json && uv run generate-promotion-manifest
      --workspace /Volumes/PRO-G40/Code/omni_home --promotion-batch-id promotion-2026.05.23-test.1 --verify-manifest
      /tmp/omn-11720-manifest.json --repo onex_change_control"
  - kind: "manual"
    description: >
      Ticket contract validates against the central OCC ticket contract model.
    command: "uv run validate-yaml contracts/OMN-11720.yaml"

dod_evidence:
  - id: "dod-manifest-tests"
    description: "OMN-11720 focused promotion manifest tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-tests/command.yaml"
          && grep -q '3 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-tests/command.yaml"
  - id: "dod-manifest-lint"
    description: "OMN-11720 promotion manifest package passes ruff format and lint checks."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-lint/command.yaml"
          && grep -q 'All checks passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-lint/command.yaml"
  - id: "dod-manifest-mypy"
    description: "OMN-11720 promotion manifest package passes mypy."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-mypy/command.yaml"
          && grep -q 'Success: no issues found' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-mypy/command.yaml"
  - id: "dod-manifest-cli"
    description: "OMN-11720 manifest CLI generates and verifies a real local manifest."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-cli/command.yaml"
          && grep -q 'Manifest verified:' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-manifest-cli/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11720 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11720.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11720/dod-ticket-contract-valid/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
