title: "fix(OMN-14294): await AsyncResult.data() in architecture-graph query node"
summary: >-
  omnimarket product PR #1695 (branch jonah/omn-14294-arch-graph-query-await-fix, head b6d644e351d409666f5f90e39995cd9ee8921f8b)
  fixes node_architecture_graph_query_effect: all 4 query operations called neo4j.AsyncResult.data() without
  await, which always raised TypeError against a real async driver — the golden-chain suite masked it
  with a synchronous MagicMock. The await fix surfaced a second gap: Memgraph 2.18 lacks shortestPath()
  and list-comprehension RETURN, so dependency_path and circular_deps were rewritten to Memgraph *BFS/variable-length
  path syntax (wiring the previously-dead max_path_depth config bound). Adds a live-Memgraph integration
  test (opt-in OMN_ALLOW_LIVE_E2E_PROBE) and tightens the golden-chain mocks to assert on response content.
  Handler + tests only; no contract topic, model, or runtime-surface change.
