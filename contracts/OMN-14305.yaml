title: "refactor(OMN-14305): canonicalize HandlerRuntimeTargetCollect handle() to single typed payload"
summary: >-
  omnibase_infra product PR #2251 (branch jonah/omn-14305-canonicalize-handlerruntimetargetcollect-handle-to-single,
  head 0a5911052d5b2f776bf863bf9b31af54876a9613) canonicalizes HandlerRuntimeTargetCollect in node_rrh_emit_effect
  to the thin contract+handler shape. The handler now accepts one frozen ModelRuntimeTargetCollectRequest
  payload carrying the optional environment, kafka_broker, and kubernetes_context overrides instead of
  flattened keyword-only arguments. The behavior remains the same: payload values are bound to locals
  first and the existing environment fallback block resolves the runtime target when an override is omitted.
