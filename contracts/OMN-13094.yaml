      ModelSkillResult; zero runtime INFO lines on stdout/stderr; artifacts
      retrievable and hash-verified; events spooled when daemon unreachable;
      failure asymmetry both directions; default mode unchanged.
    command: "uv run pytest tests/unit/cli/test_cli_node_receipt.py -v"
