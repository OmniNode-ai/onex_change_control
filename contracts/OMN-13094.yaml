ticket_id: OMN-13094
title: "Phase 2a: --output receipt mode on onex node/run"
summary: >-
  Add --output receipt to onex node/onex run (omnibase_infra). Receipt mode routes ALL RuntimeLocal logging
  to a run_id-suffixed capture file under the state root (no console handlers — kills the 25-50-line INFO
  stream at the source), content-addresses the full capture log and full handler result in the omnibase_core
  ArtifactStore (OMN-13093), emits artifact.captured + tool.output.captured via the emit daemon socket
  (spool-on-failure), and prints exactly one typed ModelSkillResult JSON carrying the full handler result
  to stdout. Failure asymmetry: artifact write failure prints the FULL output (no hidden loss); emission
  failure still prints the receipt and spools the event for replay. Default output mode unchanged (enforcement
  is Phase 4).
