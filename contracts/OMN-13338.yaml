ticket_id: "OMN-13338"
title: "R3: Tiered proof-packet (L0-L3) in ModelDodReceipt schema"
summary: >-
  Bind omnibase_core PR #1282 to central OCC evidence for the tiered (L0-L3) proof-packet on the DoD receipt
  schema. The core PR adds EnumProofTier (L0-L3 with rank/satisfies ordering), EnumTicketClass (docs/code/runtime/customer
  -> minimum required tier), ModelProofPacket (per-tier required fields enforced by a model validator,
  plus the F1-autobind source-field slots from OMN-13317), an optional proof_packet field on ModelDodReceipt,
  and a pure validator_proof_tier_gate.evaluate_proof_tier that rejects a receipt whose packet tier is
  below the tier required for its ticket class. The implementation is net-new Pydantic schema and pure
  static validation code only; it does not require a live deploy, runtime restart, Kafka topic mutation,
  or database migration.
