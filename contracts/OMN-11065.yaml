title: "Fix: Codex market delegation dispatch publishes to unconsumed Pattern B topic"
summary: >
  AdapterCodex was publishing Pattern B dispatch commands to onex.cmd.omnimarket.pattern-b-dispatch.v1
  but the .201 runtime consumers are active only on onex.cmd.omnibase-infra.pattern-b-dispatch.v1. Delegation
  messages were silently dropped (Empty consumer groups on the omnimarket topic). Fix aligns the default
  topic constants in adapters/codex/topics.py to the runtime-consumed omnibase-infra namespace and adds
  2 regression tests that fail if the defaults drift back.
