ticket_id: OMN-604
title: '[BETA-10] Implement state mutation protection'
summary: >-
  FSM state mutation protection for MixinFSMExecution.execute_fsm_transition: _fsm_state is mutated ONLY
  on a successful transition (result.success is True), which is the single authoritative write site. A
  guard-rejected transition (success=False, no raise) early-returns so state and history stay untouched;
  a raised ModelOnexError (invalid current state / unknown trigger) propagates from the pure executor
  BEFORE the guarded write, so the exception path never mutates state. The committed snapshot stores a
  deep copy of the execution context so a later mutation of the caller's dict cannot retroactively corrupt
  committed FSM state. Paired feature PR: omnibase_core#1309 (mixin + tests).
