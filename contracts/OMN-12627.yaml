title: "Vendor node_service_registry owner migrations into the infra forward set"
summary: >-
  Adds omnimarket node_projection_registration to the omnibase_infra node-owned migration allowlist and
  vendors its idempotent node_service_registry migrations into docker/migrations/forward/nodes/. The forward
  migration runner applies these under canonical namespaced ids node:node_projection_registration:<file>,
  so a clean runtime/migration image can create the missing prod table without an undocumented hand-created
  table. This contract binds the code PR evidence only; the prod DB apply remains gated for the approved
  runtime sync window.
