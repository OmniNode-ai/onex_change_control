schema_version: "1.0.0"
ticket_id: OMN-11271
title: "Handoff CI enforcement: pre-commit + CI check that handoff docs include infra health section"
summary: >
  Wire a CI check and pre-commit hook in omniclaude that rejects handoff documents missing the mandatory
  ## Infra Health section (OMN-8867 spec). Both layers block unconditionally — no warn-only mode.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "Pre-commit hook and GHA workflow added in omniclaude PR"
    command: "gh pr view ${PR_NUMBER} --repo ${REPO} --json state,statusCheckRollup"
  - kind: "manual"
    description: "6 unit tests cover accept/reject/ignore paths for the hook"
    command: "gh pr view ${PR_NUMBER} --repo ${REPO} --json additions,deletions"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "Pre-commit hook check-handoff-infra-health.sh added to omniclaude"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json files --jq '[.files[].path] | map(select(contains(\"check-handoff-infra-health\")))
          | length > 0'"
  - id: "dod-002"
    description: "GHA workflow handoff-infra-health-gate.yml added to omniclaude"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json files --jq '[.files[].path] | map(select(contains(\"handoff-infra-health-gate\")))
          | length > 0'"
  - id: "dod-003"
    description: "6 unit tests pass for the hook (accept/reject/ignore paths)"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json statusCheckRollup --jq '[.statusCheckRollup[]
          | select(.name | contains(\"Code Quality\")) | .conclusion] | first == \"SUCCESS\"'"
