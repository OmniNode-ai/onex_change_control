summary: >-
  omnimarket PR #1600 fixes the runtime_sweep skill executable-path defect. onex skill runtime_sweep dispatched
  the pure NodeRuntimeSweep handler with only {scope, dry_run}, so every run reported status=no_input
  with zero entities checked while the dispatch receipt said status=success/exit_code=0 (a vacuous false-green,
  second observation of the OMN-13715/OMN-13708 class). The fix extracts the __main__ contract-collection
  harness into a shared collection.py used by both the CLI and the handler; handle() now resolves the
  default $OMNI_HOME contract set when the request carries no entities, and a run that still checks zero
  entities raises instead of returning a reportable no_input result. Unset $OMNI_HOME with no entities
  fails fast (CLAUDE.md rule 8). Runtime rebuild/deploy is outside this OCC evidence PR and remains operator-gated.
