---
schema_version: '1.0.0'
ticket_id: OMN-13725
title: 'Lift generate_deep_dive.py pure + scan logic into importable omnibase_infra.deep_dive module'
summary: >-
  Extract the portable, deterministic deep-dive logic (PR categorisation, drift score, velocity/effectiveness
  V2 scoring, family-dedup, runtime-state parsing) plus the git/gh scan helpers out of the standalone
  scripts/generate_deep_dive.py script into an importable package src/omnibase_infra/deep_dive/. The script
  now imports from the module so there is one source of truth (no copy-paste drift). node_deep_dive_report_effect
  (omnimarket) imports the same module via its injected ProtocolReportDataSource adapter. Script output
  is byte-identical (modulo the volatile runtime-state timestamp line).
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
evidence_requirements:
  - kind: tests
    description: PASS receipts bind the omnibase_infra deep-dive extraction evidence for OMN-13725.
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13725/dod-001/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-13725/dod-002/command.yaml && grep -q '^status: PASS$' drift/dod_receipts/OMN-13725/dod-003/command.yaml
      && grep -q '^status: PASS$' drift/dod_receipts/OMN-13725/dod-occ-self/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-13725/dod-omnimarket-pr-1523/command.yaml"
  - kind: manual
    description: Deploy-gate-compatible central evidence exists for the omnimarket EFFECT node PR.
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13725/dod-deploy-assessment/command.yaml
      && grep -q '^pr_number: 1523$' drift/dod_receipts/OMN-13725/dod-deploy-assessment/command.yaml &&
      grep -q 'deploy' drift/dod_receipts/OMN-13725/dod-deploy-assessment/command.yaml && grep -q 'docker
      exec' drift/dod_receipts/OMN-13725/dod-deploy-assessment/command.yaml && grep -q 'rpk topic produce'
      drift/dod_receipts/OMN-13725/dod-deploy-assessment/command.yaml"
  - kind: ci
    description: CI pipeline green on PR
    command: gh pr checks <pr> --repo OmniNode-ai/omnibase_infra
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
