    description: >-
      ruff format + ruff check + mypy --strict clean on the new test file; full pre-commit run on the
      changed file passes; the full omnimarket pytest suite (not kafka) is green.
    command: "uv run mypy tests/test_repo_health_lane_split_integration.py --strict"
