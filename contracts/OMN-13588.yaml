schema_version: "1.0.0"
ticket_id: "OMN-13588"
title: "RH-6: Integration coverage — prove PR-scoped vs repo-baseline lane split"
summary: >-
  Acceptance proof for the merge-sweep repo-health repair lane (epic OMN-13316). Adds three focused integration
  tests plus one cross-scenario invariant over the real orchestrator -> classify -> repair -> reducer
  chain in omnimarket. Only the outermost I/O boundaries (event bus and Linear client) are stubbed; every
  node handler under test (RH-1 classify COMPUTE, RH-2 repair EFFECT, RH-3 reducer folds, RH-4 orchestrator
  fan-out) runs its real logic. Scenario 1: a PR-introduced failure (a failing path in the PR changed-file
  set) classifies PR_SCOPED, the orchestrator emits repo-health-classify but NOT repo-health-repair-start,
  no repair task is emitted, and the reducer terminal state records pr_scoped_count=1 with repair_tasks_emitted=0.
  Scenario 2: a pre-existing repo-baseline hook failure (a failing path not in the PR set, known-failing
  on the dev baseline) classifies REPO_BASELINE, the orchestrator emits BOTH classify and repair-start,
  the repair EFFECT emits exactly one repair task, and the reducer terminal state records repo_baseline_count=1
  with repair_tasks_emitted=1 and one repair_task_ref. Scenario 3: a clean PR fires neither command and
  the reducer repo_health sub-record stays all-zero. A fourth invariant test proves the repo_health fold
  never perturbs the PR-lane FSM fields, so the terminal reducer state records both lanes distinctly.
  This is a tests-only PR: it ships no runtime contract, topic, or migration change and performs no live
  deploy or runtime restart.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
