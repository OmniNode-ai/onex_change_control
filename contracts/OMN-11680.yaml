---
schema_version: "1.0.0"
ticket_id: "OMN-11680"
title: "node_golden_chain_generator compute node (AST-based, deterministic)"
summary: >-
  Bind central OCC evidence for omnimarket PR #754, which adds node_golden_chain_generator: a new ONEX
  compute node that derives the expected golden chain from contract topology and generated tests (AST-based
  static analysis, no execution). Fully deterministic.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omnimarket PR #754 tests pass in CI (20 unit tests covering determinism, topology, AST
      supplement, edge cases)."
    command: "gh pr checks 754 --repo OmniNode-ai/omnimarket"
  - kind: "manual"
    description: "Central OCC evidence PR carries this contract and PASS receipts."
    command: "gh pr view <occ-pr> --repo OmniNode-ai/onex_change_control"
dod_evidence:
  - id: "dod-omnimarket-pr-754"
    description: "Bind OMN-11680 evidence to omnimarket PR #754 at the observed PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-omnimarket-pr-754/command.yaml\"
          && grep -q '^pr_number: 754$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-omnimarket-pr-754/command.yaml\"
          && grep -q '^commit_sha: \"66b26bfd902a8a228ef07ad05e7751141b14d356\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-omnimarket-pr-754/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "Pure compute node — no live deploy, docker exec, or rpk topic produce required pre-merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-deploy-assessment/command.yaml\"
          && grep -q 'No live deploy' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-deploy-assessment/command.yaml\"
          && grep -q 'deploy-gated' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr-self"
    description: "Bind OMN-11680 central evidence to the OCC PR that carries this bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-occ-pr-self/command.yaml\"
          && grep -q '^ticket_id: \"OMN-11680\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11680/dod-occ-pr-self/command.yaml\""
emergency_bypass:
  enabled: false
