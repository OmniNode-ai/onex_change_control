      aborts on mismatch), stage_workspace.sh .build-sha markers, deploy-runtime.sh preflight wiring,
      and the lock_pin_comparison fold into build-provenance.json. tests/scripts/test_check_sibling_lock_pins.py
      (11 tests) proves stale infra 0.37.0/2c1d672f vs lock-pinned 0.38.1/e2dbdc95 FAILS the preflight
      and matched pins PASS; tests/scripts/test_deploy_runtime_build_context.py statically asserts the
      deploy/stage wiring. Live proof: the preflight run against the canonical clones correctly exits
      1 flagging infra 0.38.3@b7c93a8e vs lock 0.38.1@e2dbdc95. ruff/pre-commit clean; full uv run pytest
      tests/ = 23776 passed (the 13 live-infra/integration/performance failures are pre-existing on origin/dev
      and untouched by this change). Evidence anchor: omnibase_infra head commit 51ac72847."
    source: "manual"
