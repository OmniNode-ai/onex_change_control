---
schema_version: "1.0.0"
ticket_id: "OMN-12987"
title: "fix(OMN-12987): workspace-build sibling lock-pin preflight (vendored stale infra 0.37.0-dev caused
  the 06-11 stability bootstrap crash)"
summary: >-
  Recurrence ratchet for the 2026-06-11 stability bootstrap crash. The 11:20Z --no-cache stability-test
  rebuild vendored omnibase_infra 0.37.0-dev (~2c1d672f, 2026-05-29, pre-OMN-12501-guard) + omnibase_core
  0.42.0 even though omnimarket dev's uv.lock pinned infra 0.38.1 @ e2dbdc95 + core 0.44.0 @ c97c2c9a.
  The build ignored the consuming repo's lock and shipped a 13-day-stale sibling lacking the OMN-12501
  Protocol-quarantine guard, turning a latent contract defect into a fatal bootstrap crash that crash-looped
  the main runtime on demo day. Fix adds a host-side fail-fast preflight (scripts/runtime_build/check_sibling_lock_pins.py)
  that resolves expected sibling versions/SHAs from the consuming repo's (omnimarket) uv.lock and aborts
  the build if any vendored tree mismatches the pin; stage_workspace.sh emits a .build-sha marker per
  staged sibling (rsync drops .git); deploy-runtime.sh runs the preflight after staging and aborts on
  mismatch; compute_workspace_provenance.py + Dockerfile.runtime fold the expected-vs-actual lock_pin_comparison
  into build-provenance.json so deploy verifiers can detect a stale-sibling build. No live rebuild performed;
  local/throwaway proof only.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
dod_evidence:
  - id: "dod-infra-pr-1944"
    description: "omnibase_infra PR #1944 adds the build-vendor lock-pin ratchet: scripts/runtime_build/check_sibling_lock_pins.py
