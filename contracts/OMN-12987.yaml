  - id: "dod-infra-pr-caller-fix"
    description: >-
      Follow-up to OCC#2488: the OMN-12987 preflight wiring in scripts/deploy-runtime.sh called check_sibling_lock_pins.py
      with the removed --provenance-out flag. The script interface changed under OMN-12977/12987 to require
      --lock (the omnimarket uv.lock pin authority), repeatable --repo PACKAGE=PATH (the canonical clones
      the build vendors), and --output (the comparison JSON destination). The stale caller failed EVERY
      workspace --execute deploy at argparse ("the following arguments are required: --lock") before any
      build started — it blocked the clean stability-test rebuild; the dev redeploy only worked because
      it used a different build script. omnibase_infra PR fixes check_sibling_lock_pins() to build guard_args
      with the current interface (identical behavior: same lock authority, same vendored repo paths, same
      output destination, same fail-fast abort), honors ALLOW_SIBLING_PIN_DRIFT=1 -> --allow-drift (OMN-12977
      operator override), and adds the permanent regression test test_deploy_runtime_uses_current_lock_pin_preflight_interface.
      No bypass; no live deploy/restart/mutation.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-caller-fix/command.yaml"
          && grep -q '^ticket_id: "OMN-12987"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-caller-fix/command.yaml"
  - id: "dod-infra-pr-build-context"
    description: >-
      Follow-up to OCC#2617: after the caller-fix the OMN-12987 preflight passed, but the workspace --execute
      build then failed at docker build with "failed to calculate checksum of ref ...:/workspace/sibling-pin-comparison.json:
      not found". Dockerfile.runtime (~line 278) COPYs workspace/sibling-pin-comparison.json, but deploy-runtime.sh
      sync_files() only rsynced workspace/sibling-repos/ into the deployed build context — the root-level
      comparison file (committed placeholder in release mode; the real expected-vs-actual comparison stage_workspace.sh
      writes in workspace mode, OMN-12977) was never carried over. The dev compose build masked this because
      docker compose build runs from the repo root where the file exists; deploy-runtime.sh builds from
      the assembled deployed context, which lacked it. This blocked EVERY deploy-runtime.sh workspace
      --execute deploy, including the stability-lane clean rebuild after the caller-fix preflight correctly
      passed. omnibase_infra PR rsyncs workspace/sibling-pin-comparison.json into the deployed context
      alongside workspace/sibling-repos/, and adds the permanent regression test test_deploy_runtime_stages_every_workspace_copy_source
      that parses Dockerfile.runtime's COPY-from-workspace paths and asserts deploy-runtime.sh stages
      each — so a future Dockerfile COPY without a matching rsync fails CI (negative-control verified).
      No bypass; the live stability rebuild proof is recorded in the receipt.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-build-context/command.yaml"
          && grep -q '^ticket_id: "OMN-12987"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-build-context/command.yaml"
  - id: "dod-infra-pr-forward-migration-name"
    description: >-
      Follow-up to the build-context re-prove: after workspace-mode docker build succeeded, the clean
      stability-test deploy stopped at the migration preflight because docker-compose.infra.yml used a
      lane-blind forward-migration container_name. omnibase_infra PR #1981 project-namespaces the forward-migration
      container, updates the catalog source of truth and generated compose output, and changes deploy-runtime.sh
      to wait/probe the lane-scoped compose project containers instead of hard-coded dev-lane names. This
      removes the cross-lane container collision without force-removing any live container. The receipt
      binds the PR number and head SHA for Receipt Gate.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-forward-migration-name/command.yaml"
          && grep -q '^ticket_id: "OMN-12987"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-forward-migration-name/command.yaml"
          && grep -q '^pr_number: 1981$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12987/dod-infra-pr-forward-migration-name/command.yaml"
