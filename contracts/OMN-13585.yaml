schema_version: "1.0.0"
ticket_id: "OMN-13585"
title: "RH-3: Extend pr_lifecycle reducer state with additive repo_health sub-record"
summary: >-
  Part of the merge-sweep repo-health repair lane. Adds a frozen ModelRepoHealthLaneState sub-record to
  ModelPrLifecycleState in omnimarket with 6 int counters (classified_count, pr_scoped_count, repo_baseline_count,
  external_dependency_count, unknown_count, repair_tasks_emitted) and a repair_task_refs tuple[str, ...]
  (deduplicated). Wires two pure module-level fold functions: fold_repo_health_classified (subscribes
  to onex.evt.omnimarket.repo-health-classified.v1) and fold_repo_health_repair_emitted (subscribes to
  onex.evt.omnimarket.repo-health-repair-emitted.v1). Both folds update only the repo_health sub-record;
  all existing PR-lane FSM fields are byte-identical. handle_dict dispatches repo-health event topics
  to these fold functions; all other events fall through to the existing delta() FSM path. contract.yaml
  updated to declare the two new subscribe topics. 24 new fold tests assert additive isolation. No runtime
  deploy in scope; this is a pure model + handler extension with zero I/O. This OCC contract is the Receipt-Gate
  Evidence-Source the omnimarket product PR cites.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
