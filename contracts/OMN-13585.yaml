    description: >-
      24 new fold tests in tests/test_pr_lifecycle_repo_health_fold.py assert additive isolation (byte-identical
      PR-lane fields before/after repo_health folds), counter accumulation, deduplication, frozen/extra=forbid
      retention, and handle_dict dispatch. Existing golden chain tests in test_golden_chain_pr_lifecycle_state_reducer.py
      (31 tests) remain green. CI topic gate (test_check_no_hardcoded_topics) passes.
    command: "uv run pytest tests/test_pr_lifecycle_repo_health_fold.py tests/test_golden_chain_pr_lifecycle_state_reducer.py
      tests/ci/test_check_no_hardcoded_topics.py -q"
