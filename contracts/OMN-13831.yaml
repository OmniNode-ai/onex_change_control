schema_version: "1.0.0"
ticket_id: "OMN-13831"
title: "fix(OMN-13831): fail-closed merge_sweep --verify for code-file PRs"
summary: >-
  omnimarket PR #1561 makes the VERIFYING phase of node_pr_lifecycle_orchestrator fail-CLOSED for code-file
  PRs. Previously merge_sweep --verify excluded a PR only on VERIFICATION_FAILED; every indeterminate
  outcome (VERIFICATION_UNAVAILABLE / _TIMEOUT / _TOOL_ERROR / SKIPPED_NO_MAPPING) fell through to cleared.append(pr),
  merging code PRs unverified. Additionally _pr_changed_files returned [] on any gh error, mapping to
  a neutral SKIPPED_NO_MAPPING skip. The fix blocks code-file PRs on any indeterminate outcome or un-enumerable
  changed-files list, retries gh once then raises ChangedFilesUnavailableError, and preserves NEUTRAL
  pass for genuine docs-only / no-mapping PRs and successful verification. Runtime rebuild/deploy of the
  orchestrator is operator-gated and declared for post-merge validation; no live redeploy or Kafka mutation
  was performed pre-merge.
