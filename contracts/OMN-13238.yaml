schema_version: "1.0.0"
ticket_id: "OMN-13238"
title: "Contract-declared per-topic config + migrate ALL_PROVISIONED_TOPIC_SPECS"
summary: >
  Ticket 2 of 2 of epic OMN-12651 (W3/W4). W3 makes per-topic provisioning config (partitions / replication_factor
  / kafka_config) contract-declared: the EXISTING ModelContractTopicEntry (omnibase_infra tools/contract_topic_extractor.py)
  is extended with partitions|replication_factor|kafka_config (PEP 604, frozen, no new parallel model);
  _extract_raw_topics_from_contract threads the parsed topic_config onto each entry; and service_topic_manager._build_topic_specs
  maps it onto ModelTopicSpec (which already supports all four fields), falling back to ModelTopicSpec
  defaults when absent. W4 migrates the 9 config-bearing topics whose owning omnibase_infra contract already
  declares a published_events entry into those contracts' published_events[].topic_config (5 contracts;
  config attached to pre-existing entries only so orchestrator/effect event-purity stays green). ALL_PROVISIONED_TOPIC_SPECS
  is NOT deleted but explicitly annotated TRANSITIONAL (a warm source pending per-repo migration, NOT
  a standing provisioning authority; the misleading "single source of truth for topic creation" docstring
  is corrected) because 118 of 141 source entries are owned by other-repo contracts, emitted by the runtime
  kernel, or are cmd/intent topics. registry_outcome = transitional. #magic___^_^___line
is_seam_ticket: false
interface_change: false
interfaces_touched: []

