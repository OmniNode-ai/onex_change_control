title: "A-followup: remove the onex.runtime.intents hardcoded topic + dead intent-publisher path (OMN-13188
  / OMN-12803 topic-authority family)"
summary: >-
  Removes the onex.runtime.intents hardcoded topic at its root by deleting the dead publisher path that
  was its sole consumer. Per the OMN-13197 DoD (contract-source the topic OR confirm-and-delete the dead
  path), the decision is confirm-and-delete: the topic could not be contract-sourced — no contract declares
  onex.runtime.intents and ServiceTopicRegistry lives in omnibase_infra (omnibase_core cannot import it
  per layering) — and the mechanism was architecturally dead from both sides (MixinIntentPublisher, the
  sole publisher, had zero production call sites; onex.runtime.intents had zero Kafka consumers, IntentExecutor
  being a synchronous in-memory runtime service, verified in OMN-13188/OMN-13192). Removed: the duplicate
  TOPIC_EVENT_PUBLISH_INTENT constant (a copy of the canonical TOPIC_RUNTIME_INTENTS) + all re-exports;
  MixinIntentPublisher + ModelIntentPublishResult + their capability-mapping/metadata census entries;
  the dead tests/fixtures and the intent-publisher guide docs (with inbound links). Retained: TOPIC_RUNTIME_INTENTS
  (canonical taxonomy derivation) and ModelEventPublishIntent (live consumer in util_payload_migration).
  Added a regression guard test. No Kafka topic schema change, no DDL/migration, no runtime/deploy/.201
  mutation.
