title: "Retarget Gemini registry entry gemini-2.0-flash -> gemini-2.5-flash-lite + regenerate routing
  constants"
summary: >
  The live stability-test inference effect sources the Gemini wire model id from the omnimarket model
  registry (model_registry_v1.yaml + generated_llm_routing_constants.py), NOT the bifrost backend. The
  stale id gemini-2.0-flash is free-tier quota-exhausted (HTTP 429); gemini-2.5-flash-lite probes HTTP
  200 on the deployed key. This change retargets the registry entry (key/model_id/model_name) and regenerates
  the routing constants via scripts/generate_llm_routing_constants.py so the live effect's Gemini attempts
  resolve a quota-available model. Defect (2) of the OMN-12890 live-leg diagnosis of record. Source-only
  YAML/constant change with no runtime topology, topic schema, or contract API change; applies on the
  next stability-test effects-image rebuild and next normal deploy.
