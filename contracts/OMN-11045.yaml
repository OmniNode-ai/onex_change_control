---
schema_version: "1.0.0"
ticket_id: "OMN-11045"
title: "Route omniintelligence merge queue off the disk-exhausted self-hosted runner"
summary: >-
  Binds omniintelligence PR #652, which changes the OMNI_RUNNER_SELECTOR_V1 workflow expressions so merge_group
  events use the public PR runner selector instead of the trusted self-hosted omnibase-ci runner that
  repeatedly failed with ENOSPC during merge queue validation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omniintelligence PR #652 carries the merge_group runner selector fix."
    command: "gh pr view 652 --repo OmniNode-ai/omniintelligence --json number,state,headRefOid,title"
  - kind: "tests"
    description: "All changed GitHub workflow YAML files parse successfully."
    command: "uv run python - <<'PY' ... yaml.safe_load(...)"
  - kind: "manual"
    description: "Merge-group runs for PRs #650 and #651 failed with ENOSPC on the self-hosted runner."
    command: "gh run view --repo OmniNode-ai/omniintelligence --job <failed-job-id>"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omniintelligence-pr-652"
    description: "omniintelligence PR #652 carries the OMN-11045 runner selector change at the recorded
      head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11045/dod-omniintelligence-pr-652/command.yaml
          && grep -q '^pr_number: 652$' drift/dod_receipts/OMN-11045/dod-omniintelligence-pr-652/command.yaml
          && grep -q '^commit_sha: \"5942778bc89ee98c9b4fcd038dffd675f5b540f7\"$' drift/dod_receipts/OMN-11045/dod-omniintelligence-pr-652/command.yaml"
  - id: "dod-workflow-yaml-parse"
    description: "Changed workflow YAML files parse successfully after the selector edit."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11045/dod-workflow-yaml-parse/command.yaml
          && grep -q 'workflow YAML parse OK' drift/dod_receipts/OMN-11045/dod-workflow-yaml-parse/command.yaml"
  - id: "dod-runner-enospc-evidence"
    description: "Failed merge-group job annotations show ENOSPC on the self-hosted runner, motivating
      the merge_group routing change."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11045/dod-runner-enospc-evidence/command.yaml
          && grep -q 'ENOSPC' drift/dod_receipts/OMN-11045/dod-runner-enospc-evidence/command.yaml &&
          grep -q 'No space left on device' drift/dod_receipts/OMN-11045/dod-runner-enospc-evidence/command.yaml"
  - id: "dod-occ-pr-1025"
    description: "onex_change_control PR #1025 carries the central OMN-11045 contract and receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11045/dod-occ-pr-1025/command.yaml
          && grep -q '^pr_number: 1025$' drift/dod_receipts/OMN-11045/dod-occ-pr-1025/command.yaml"
