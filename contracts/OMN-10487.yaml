---
schema_version: "1.0.0"
ticket_id: "OMN-10487"
title: "Persist OCC dependency edges and rerun downstream gates"
summary: >
  Adds OCC dependency edge persistence (drift/occ_dependency_edges.yaml) and rerun state (drift/occ_rerun_state.yaml)
  so that product PRs blocked on an OCC ticket are automatically retried when that OCC ticket's contracts
  and receipts land on main. Includes Pydantic models (ModelOccDepEdge, ModelOccRerunRecord) and two GHA
  workflows: occ-record-dep-edge.yml (called by product repos on OCC_DEPENDENCY_OPEN/MISSING failures)
  and occ-rerun-downstream.yml (triggered on OCC main push, fires at most once per OCC commit per downstream
  PR).
is_seam_ticket: false
