          && grep -Fq 'failure_class' "$d/src/omnibase_infra/event_bus/mixin_kafka_dlq.py" && grep -Fq
          'validation_detail' "$d/src/omnibase_infra/event_bus/mixin_kafka_dlq.py" && grep -Fq 'serialization_fallback'
          "$d/src/omnibase_infra/event_bus/mixin_kafka_dlq.py" && grep -Fq 'TestDlqFailureClassification'
          "$d/tests/unit/runtime/test_message_dispatch_engine_type_scoping.py" && grep -Fq 'build_dlq_topic("quarantine")'
          "$d/tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py"
