ticket_id: "OMN-14492"
title: "feat(OMN-14492): classify DLQ/no-dispatcher drops with validation detail"
summary: >-
  Central OCC evidence for omnibase_infra PR #2314. The product PR distinguishes a true no-dispatcher
  wiring gap from a type-scoped dispatcher whose event_model rejects malformed publisher payloads, records
  the real validation detail in dispatch results and DLQ envelopes, and adds a quarantine fallback for
  projection-handler errors with no declared dlq_topics.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "topics"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
