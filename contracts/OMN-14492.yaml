      The proof reads PR metadata and changed files from GitHub and checks the DLQ failure-class enum,
      dispatch matcher/runtime changes, DLQ wiring, and focused regression tests.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2314; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=7e305a3ba83b78b82a94248545f3980c38118e8f;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt" && grep -Fq
          'feat(OMN-14492): classify DLQ/no-dispatcher drops as publisher_malformed vs no_dispatcher with
          real ValidationError detail' "$d/pr.txt" && for p in src/omnibase_infra/enums/enum_dlq_failure_class.py
          src/omnibase_infra/runtime/message_dispatch_engine.py src/omnibase_infra/runtime/auto_wiring/handler_wiring.py
          src/omnibase_infra/runtime/event_bus_subcontract_wiring.py src/omnibase_infra/event_bus/mixin_kafka_dlq.py
          tests/unit/runtime/test_message_dispatch_engine_type_scoping.py tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py
          tests/unit/runtime/auto_wiring/test_dispatcher_route_coverage_omn14488.py; do grep -Fq "$p"
          "$d/pr.txt" && mkdir -p "$d/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'publisher_malformed' "$d/src/omnibase_infra/enums/enum_dlq_failure_class.py"
          && grep -Fq 'validation_detail' "$d/src/omnibase_infra/runtime/message_dispatch_engine.py" &&
