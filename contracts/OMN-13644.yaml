ticket_id: "OMN-13644"
title: "Plumb context_pack_hash through delegation orchestrator + projection on all terminals"
summary: >-
  Plumbs context_pack_hash through the omnimarket delegation orchestrator and the delegation projection
  so it persists on ALL terminals. ModelDelegationResult gained the field upstream (OMN-13646, omnibase_core
  0.46.1 @ 52ee18b4c8fcc517996084437266f0738caf1cb5) but omnimarket never set it: the orchestrator collected
  the hash into TerminalEmissionInputs at the three terminal sites yet built ModelDelegationResult WITHOUT
  it (dead field), and the projection converter dropped it, so every row read the '' default. This change
  pins the hash ONCE at request acceptance into DelegationWorkflowState (handle_delegation_request) and
  sets ModelDelegationResult(context_pack_hash=...) inside the single terminal builder (_emit_terminal),
  so it persists identically on COMPLETED and FAILED/ESCALATED terminals (the terminals read the pinned
  state value, not the live request — escalation / prompt-text loss cannot drop it). The projection converter
  (_canonical_result_to_task_delegated_payload) carries the hash into ModelTaskDelegatedEvent so the row
  mapping reads a real value. Non-empty only on the ON arm (an actual context pack was injected); the
  '' OFF-arm default is preserved verbatim. No bespoke co-writer event (OMN-13629 anti-pattern), no Plugin*,
  no new REST; topics stay contract-sourced. Pin bump (pyproject.toml + uv.lock) adopts the upstream field.
  Dev lane only; redeploy is a separate serialized step. Product PR: omnimarket #1455.
