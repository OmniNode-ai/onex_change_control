schema_version: "1.0.0"
ticket_id: "OMN-13371"
title: "Fix delegation quality-gate result contract model so dev e2e reaches terminal event"
summary: >-
  Central evidence for omnimarket PR #1300. A live dev e2e delegation probe after the June 20 quality-gate
  deploy proved that the delegation request, routing, inference, and quality-gate reducer all executed,
  but the emitted quality-gate-result event was DLQed before terminal emission because the orchestrator
  contract declared the stale core ModelQualityGateResult DTO while the reducer publishes the omnimarket
  DTO carrying deterministic acceptance evidence fields. The fix aligns the orchestrator event_model with
  the reducer output_model and adds a contract guard to prevent future DTO drift.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "events"
