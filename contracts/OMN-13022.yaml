---
schema_version: "1.0.0"
ticket_id: "OMN-13022"
title: "Remove the hotfix bypass from OCC main-target-guard"
summary: >-
  Ports the OMN-12477 main-target-guard behavior into onex_change_control so PRs targeting main must come
  from dev with a promotion receipt. The previous hotfix/* escape path, including hotfix-evidence and
  backmerge declarations, is removed to close retro A-7.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-main-target-guard-port"
    description: "The OCC main-target-guard workflow documents the OMN-12477/OMN-13022 port and keeps
      main restricted to dev promotions."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13022/dod-main-target-guard-port/command.yaml
          && grep -q 'OMN-13022' .github/workflows/main-target-guard.yml && grep -q 'main accepts only
          promotion PRs' .github/workflows/main-target-guard.yml"
  - id: "dod-hotfix-bypass-removed"
    description: "The old hotfix/* bypass and its hotfix-evidence/backmerge acceptance path are absent
      from the workflow."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13022/dod-hotfix-bypass-removed/command.yaml
          && ! grep -q 'HEAD_REF.*hotfix' .github/workflows/main-target-guard.yml && ! grep -q 'hotfix-evidence'
          .github/workflows/main-target-guard.yml && ! grep -q 'backmerge' .github/workflows/main-target-guard.yml"
  - id: "dod-occ-pr-2543"
    description: "onex_change_control PR #2543 carries the guard change and this central OMN-13022 evidence."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13022/dod-occ-pr-2543/command.yaml
          && grep -q '^pr_number: 2543$' drift/dod_receipts/OMN-13022/dod-occ-pr-2543/command.yaml"
