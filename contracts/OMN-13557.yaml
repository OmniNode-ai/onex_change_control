ticket_id: "OMN-13557"
title: "env→contract migration (Wave 1, omnimarket): resolve ARCH_GRAPH_BOLT_URI via overlay seam"
summary: >-
  Wave-1 endpoint→overlay migration (epic OMN-13556). The architecture-graph query and populate EFFECT
  config models (model_architecture_graph_query_config.py / model_architecture_graph_populate_config.py)
  read os.environ["ARCH_GRAPH_BOLT_URI"] directly inside a Pydantic default_factory — a scattered endpoint
  read outside the sanctioned overlay boundary. This change routes both reads through expand_contract_env_refs
  (omnibase_infra.runtime.overlay.contract_env_ref — the ONE sanctioned env-reading surface) against the
  contract reference ${env.ARCH_GRAPH_BOLT_URI}. The owning contracts now declare bolt_uri default as
  ${env.ARCH_GRAPH_BOLT_URI} (overlay-resolved, bound per-lane). Resolution is equivalent: same var, same
  dev/stability/prod value the direct read gave, now via the overlay seam. The resolver fails closed (ValueError)
  when the overlay does not bind the var, replacing the prior direct-read KeyError and explicitly rejecting
  a silent localhost fallback. Each node's metadata.yaml declares the new omnibase-infra dependency. This
  is the template-establishing migration for the omnimarket endpoint→overlay wave; LLM_*_URL family and
  kernel/overlay machinery are out of scope (Bifrost-owned / sanctioned resolver, respectively). url-authority,
  delegation-env-read, and no-silent-env-fallbacks gates stay green with ZERO new violations. This OCC
  PR carries the central contract consumed by the omnimarket PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
