schema_version: "1.0.0"
ticket_id: "OMN-13557"
title: "env→contract migration (omnimarket): Wave-1 ARCH_GRAPH_BOLT_URI endpoint + Wave-2 Codex adapter
  config via overlay seam"
summary: >-
  env→contract migration (epic OMN-13556), omnimarket. Two waves of the same ticket route scattered os.environ
  reads through the ONE sanctioned overlay boundary (expand_contract_env_refs in omnibase_infra.runtime.overlay.contract_env_ref)
  against ${env.VAR} contract references. WAVE 1 (endpoint): the architecture-graph query and populate
  EFFECT config models (model_architecture_graph_query_config.py / model_architecture_graph_populate_config.py)
  read os.environ["ARCH_GRAPH_BOLT_URI"] in a Pydantic default_factory; both now resolve bolt_uri through
  the overlay seam against ${env.ARCH_GRAPH_BOLT_URI}, failing closed (ValueError) when unbound (no silent
  localhost fallback). WAVE 2 (config cluster): the Codex runtime adapter (adapters/codex/runtime_client.py)
  read four config tunables directly — ONEX_PATTERN_B_COMMAND_TOPIC / ONEX_PATTERN_B_RESPONSE_TOPIC /
  ONEX_PATTERN_B_REQUESTER (default_command_topic / default_response_topic / default_requester) and KAFKA_API_VERSION
  (_direct_kafka_client_version_kwargs). All four now resolve through the overlay seam against ${env.VAR}
  contract-ref constants; because topic/requester config legitimately carries a contract default, an unbound
  overlay var (empty expansion) falls back to the canonical default constant rather than failing closed
  (vs the default-less endpoint in Wave 1, which fails closed). Resolution is equivalent in both waves:
  same var, same value, now via the seam. Endpoint-classed reads on the Codex file (ONEX_TARGET_RUNTIME_ADDRESS,
  ONEX_RUNTIME_SELECTION) target the address-registry path (OMN-10345) and are OUT of scope. url-authority,
  delegation-env-read, and no-silent-env-fallbacks gates stay green with ZERO new violations across both
  waves. This OCC contract is consumed by the omnimarket PR Receipt Gate via Evidence-Source for both
  product PRs (#1383 Wave-1, #1391 Wave-2).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
