schema_version: "1.0.0"
ticket_id: "OMN-11425"
title: "Repowise critical: harden omnibase_infra runtime and dispatch hotspots"
summary: >
  Harden two local Repowise critical hotspot paths in omnibase_infra by fixing GitHub failing-run extraction
  and flattening malformed contract protocol extraction, with focused regression coverage.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Focused omnibase_infra GitHub adapter and contract capability tests pass."
    command: "uv run pytest tests/integration/adapters/test_github_http_client_integration.py tests/unit/capabilities/test_contract_capability_extractor.py
      -q"
  - kind: "ci"
    description: "omnibase_infra PR #1695 non-receipt CI gates pass; Receipt Gate is blocked only on central
      OCC evidence."
    command: "gh pr checks 1695 --repo OmniNode-ai/omnibase_infra"
  - kind: "manual"
    description: "omnibase_infra PR #1695 is open against main at the recorded head SHA."
    command: "gh pr view 1695 --repo OmniNode-ai/omnibase_infra --json headRefOid,state,url,headRefName,baseRefName"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
