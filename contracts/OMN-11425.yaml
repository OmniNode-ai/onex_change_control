        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11425/dod-focused-tests/command.yaml\"
          && grep -q '^commit_sha: \"12bdc28ad549e50ea80b2938e3e16dd4541f3277\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11425/dod-focused-tests/command.yaml\""
