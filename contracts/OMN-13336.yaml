schema_version: "1.0.0"
ticket_id: "OMN-13336"
title: "R1: Plan-template Current-Verified-State CI gate — block plan_to_tickets on missing/stale verified-state
  section"
summary: >-
  Retro enforcement R1 (audit docs/audits/2026-06-19-ratchet-enforcement-audit.md, parent OMN-13325).
  Plans assert system state without a verified baseline and plan_to_tickets ticketizes them anyway — the
  failure mode this session repeatedly disproved (doc-asserted state diverging from live state). This
  ticket ships a net-new gate on the plan_to_tickets host repo (omniclaude): scripts/lint_plan_verified_state.py
  parses every plan markdown under docs/plans/ and docs/tracking/ and FAILs (exit 1) when a plan lacks
  a "## Current Verified State" section containing a "verified: <YYYY-MM-DD> via <command>" line dated
  within the freshness window (default 14 days). The gate fails closed on unreadable / non-UTF-8 plans
  and on future-dated proofs. It is wired as a CI workflow (.github/workflows/plan-verified-state-gate.yml
  — the Plan Verified State Gate check on pull_request + merge_group) and as a pre-commit hook (lint-plan-verified-state
  over staged docs/plans|docs/tracking markdown). Plans predating the gate are grandfathered in .onex_ratchets/plan_verified_state_allowlist.yaml
  (burn-down only — the 3 existing plan/tracking docs). 21 unit tests cover missing/empty/stale/malformed/future/no-command
  lines, the max-age boundary, case-insensitivity, allowlist skip vs non-allowlisted block, CI full-tree
  mode, and fail-closed on non-UTF-8. Child of OMN-13325 (ratchet enforcement retro). Promoting the new
  check to a REQUIRED status check on dev branch protection is an additive branch-protection mutation
  deliberately left to a user-gated step, not performed in the code PR.
is_seam_ticket: false
