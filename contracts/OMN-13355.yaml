---
schema_version: "1.0.0"
ticket_id: "OMN-13355"
title: "Delegation: emit auditable premium counterfactual per task"
summary: >-
  When a cheaper tier serves a delegated task the premium model never runs, so savings must be auditable
  from pinned provenance rather than an opaque estimate. This carries a premium counterfactual with model,
  price_in/out_per_1k, as_of, tokens_in, tokens_out, counterfactual_cost_usd, pricing_source, and measured
  through the delegation event/projection path. The persisted saving is recomputable as counterfactual
  minus actual cost. The pinned price/as_of come from the canonical pricing manifest; the calibrated premium
  proof was run through Claude Code OAuth with no required Anthropic/OpenAI API key.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "events"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
