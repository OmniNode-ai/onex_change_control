schema_version: "1.0.0"
ticket_id: "OMN-13144"
title: "fix(emit-daemon): standalone runner never wires Kafka publish — --kafka-bootstrap-servers is a
  no-op dead path"
summary: >-
  The node_emit_daemon standalone runner accepted --kafka-bootstrap-servers and logged "Kafka publishing
  enabled", but publish_fn was never reassigned off the _noop_publish stub. Even with bootstrap servers
  supplied the daemon acked-and-dropped every event through a no-op logger. This is the live production
  path: the omniclaude session-start hook launches `python -m omnimarket.nodes.node_emit_daemon start
  --kafka-bootstrap-servers $KAFKA_BOOTSTRAP_SERVERS`, so live hook events were being silently dropped.
  Fix (ticket Option 1, preferred): build + start a real EventBusKafka on the running event loop when
  --kafka-bootstrap-servers is supplied, and rebind the publisher loop's publish callable to route through
  bus.publish — the same canonical bus path the in-process omniclaude lifecycle wrapper (_OmnimarketEmitDaemon._publish_to_kafka)
  already uses. Empty bootstrap fails fast; absent bootstrap stays spool-only; the bus is closed on shutdown.
  Option 2 (remove the flag) was rejected because the live session-start hook depends on the flag — removing
  it would break the live emit path.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
