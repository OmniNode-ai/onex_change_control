  bucket. Adds _publish_repo_health_fanout to HandlerPrLifecycleOrchestrator: in the FIXING phase, publishes
  onex.cmd.omnimarket.repo-health-classify.v1 for all fix_prs with a non-None origin, and additionally
  publishes onex.cmd.omnimarket.repo-health-repair-start.v1 only for REPO_BASELINE origins. contract.yaml
  publish_topics updated with the two new cmd topics. Guardrail enforced: repo_baseline debt does not
  hard-block auto-merge arming — sweep completes normally. Four TDD transition tests prove the four routing
  branches. No runtime deploy; this is a pure handler + protocol extension.
