  The change is a pure handler-shape fold: unused handler IDs, uuid4, and ModelHandlerOutput imports are
  removed; the runtime remains responsible for wrapping returned values. Verification covers the touched
  golden-chain and reach-in tests, formatting/lint/type checks, golden-chain coverage, state coverage,
  and node metadata dependency scope.
