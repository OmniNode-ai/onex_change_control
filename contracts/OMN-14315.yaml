  omnimarket product PR #1702 (branch jonah/omn-14315-canonicalize-node_pr_lifecycle_fix_effect-admin-merge-auto,
  head 3a59d8a1f654bf80b67a9ac82e8d93aacc5d6729) canonicalizes the two node_pr_lifecycle_fix_effect handlers
  to the thin contract+handler shape in one combined PR. HandlerAdminMerge now takes a single typed ModelAdminMergeRequest
