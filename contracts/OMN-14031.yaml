schema_version: "1.0.0"
ticket_id: OMN-14031
title: "fix(OMN-14031): bound every gh/git subprocess in pr_lifecycle so merge-sweep skill can't hang"
summary: >
  Root cause of the 2026-07-06 fleet-wide merge gap: the merge_sweep skill (node_pr_lifecycle_orchestrator)
  hung forever and drove zero merges because the inventory sub-node ran every gh CLI call via a bare subprocess.run
  with NO timeout. Under GitHub API throttling / fleet egress saturation a single stalled gh call blocks
  in select() indefinitely and wedges the org-wide sweep with zero stdout (captured live via faulthandler
  at _collect_check_runs). Fix: a _run_gh helper bounds every gh call at 90s and, on TimeoutExpired, returns
  a synthetic non-zero CompletedProcess so each caller's existing returncode!=0 fail-soft branch handles
  it; the two OCC fix-effect _run_git helpers are bounded at 120s. Fail-soft, never a hang; org-wide census
  fails CLOSED on timeout. Proven: fixed skill completes end-to-end and its org-wide census matches the
  manual gh census exactly.
is_seam_ticket: false
interface_change: false
