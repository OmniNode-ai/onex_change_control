ticket_id: "OMN-13150"
title: "node_projection_routing_decision DB target repoint to omnidash_analytics + runtime proof (FIX-1)"
summary: >-
  FIX-1 (Phase 2.4). The projection node node_projection_routing_decision writes agent_routing_decisions.
  Its runtime DSN resolvers (RoutingDecisionProjectionRunner via ModelProjectionRuntimeBinding.from_legacy_settings,
  and the projection-API reader api_server._projection_database_binding_from_settings) BOTH resolve omnidash_analytics_db_url
  FIRST, ignoring the contract db_io database field. The prior OMN-13127 repoint to omnibase_infra fed
  ONLY the canonical message_dispatch_engine path (handler_wiring._DB_URL_ENV_MAP), splitting the writer
  DSN from the reader DSN, and the table never existed in omnidash_analytics. Every sibling projection
  table lives in omnidash_analytics — the canonical projection DB. Fix: repoint the contract database
  field to omnidash_analytics; add a per-node forward migration creating agent_routing_decisions there
  (owned by this node, vendored into omnibase_infra forward/nodes/); flip metadata ddl_owner to the node;
  expose the table over the projection API. Proven on the dev lane with a 3-part runtime triple (write
  via the real handler / read-back / projection-API HTTP 200).
