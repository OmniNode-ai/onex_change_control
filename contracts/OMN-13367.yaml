schema_version: "1.0.0"
ticket_id: "OMN-13367"
title: "feat(omnimarket): reproducible judge verdict events for non-verifiable delegation classes"
summary: >-
  OMN-13367 adds a controlled, reproducible, auditable judge-verdict contract surface for non-verifiable
  delegation task classes in omnimarket. The code PR defines ModelDelegationJudgeVerdictEvent with the
  required identity bundle (judge_model, judge_model_version, judge_provider, rubric_id, rubric_hash,
  prompt_hash, input_hash, temperature, judge_node_version, reasoning_hash, verdict, actual_score), declares
  the event on the delegation quality-gate reducer contract, records non-verifiable task-class adequacy
  authority metadata through symbolic event_topic_ref wiring, and materializes verdicts through the existing
  node_projection_delegation projection path into delegation_judge_verdict_events with event_hash idempotency.
  Judge failures are represented as typed judge_failed verdict events with failure_kind/failure_message
  and actual_score null, not as silent zero scores. The change preserves the canonical event-bus/projection
  architecture and adds a calibration corpus covering known-good, known-bad, borderline, marker-rich-wrong,
  and marker-light-correct cases. Child of OMN-12646 and related to OMN-12964.
