---
schema_version: "1.0.0"
ticket_id: "OMN-13531"
title: "Skill node catalog resolver and pr_review skill surface alignment"
summary: >
  Binds the paired omnibase_infra and omniclaude PRs that close the skill-to-node mapping regression:
  omnibase_infra adds a CI gate proving skill_mapping node_name values resolve in the canonical omnimarket
  node catalog, while omniclaude repoints the pr_review/pr_review_bot skill surface to node_pr_review_orchestrator
  after the old shell node was deleted.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "omnibase_infra skill mapping resolver tests pass."
    command: "uv run pytest tests/unit/cli/test_cli_skill.py -q"
  - kind: "tests"
    description: "omniclaude deterministic skill-routing validation and pre-commit checks pass."
    command: "uv run pytest tests/validation/ -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-infra-pr-2080"
    description: "omnibase_infra PR #2080 adds the skill-node catalog resolver fixture and CI gate."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json headRefOid -q .headRefOid"
  - id: "dod-omniclaude-pr-1796"
    description: "omniclaude PR #1796 repoints pr_review/pr_review_bot skill metadata to node_pr_review_orchestrator."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json headRefOid -q .headRefOid"
  - id: "dod-deploy-no-runtime-impact"
    description: "Metadata/tests/CI validation only; no live deploy, broker mutation, or runtime restart
      required before merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "echo 'deploy-gate: OMN-13531 changes skill metadata and validation tests only; no
          live deploy required before merge'"
  - id: "dod-occ-pr-self"
    description: "OCC self-binding receipt for the central evidence PR carrying the OMN-13531 contract
      and receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json headRefOid -q .headRefOid"
