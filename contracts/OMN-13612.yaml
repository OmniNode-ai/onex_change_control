      registry, the tool is retrievable (get_tool/has_tool/list_tools), the stored tags satisfy ServiceMCPToolSync._is_mcp_exposable,
      re-registering the same artifact is idempotent, a revised artifact mints a new version, and empty
      node_name fails fast.
    command: "uv run pytest tests/unit/services/mcp/test_service_mcp_tool_registry_generated.py tests/unit/services/mcp/test_service_mcp_tool_registry.py
      tests/unit/services/mcp/test_service_mcp_tool_sync_exposure.py -q"
