schema_version: "1.0.0"
ticket_id: "OMN-13612"
title: "WS-C Phase 2.2: Route SEA tool_registry.py registration onto the canonical omnibase_infra MCP
  registration path"
summary: >
  Wave-1 ROUTE leg of the SEA -> canonical migration (epic OMN-13604, plan docs/tracking/2026-06-24-sea-canonicalization-plan.md
  Phase 2.2). Routes the registration semantics of the bespoke SEA agent/tool_registry.py (onex-self-extending-agent)
  onto the canonical omnibase_infra MCP registration path. New ServiceMCPToolRegistry.register_generated_tool(node_name,
  description, contract_yaml, handler_source, correlation_id) builds a canonical ModelMCPToolDefinition
  carrying the generated-compute exposure tags required by ServiceMCPToolSync._is_mcp_exposable (mcp-enabled
  + node-type:compute + generated + mcp-tool:<name>), upserts it into the canonical ServiceMCPToolRegistry
  (reusing upsert_tool -- no parallel store), derives the registry version key from artifact content hashes
  (idempotent), and returns a typed frozen ModelMCPGeneratedToolRegistration binding the contract/handler
  artifact hashes + correlation id + version key. ROUTE-1 gate PASSED: canonical MCP registration service
  exists, owned by omnibase_infra MCP server (feedback_mcp_server_in_omnibase_infra.md), wired via mcp_server_lifecycle
  + handler_mcp, already SEA-aware (OMN-12827 B2). In-process exec()/invoke() of the handler is NOT migrated
  here -- that hot-load sandbox concern is Phase 0 (OMN-13605, Done, omnimarket handler_generated_executor).
  SEA agent/tool_registry.py deletion is DEFERRED to Phase 8.1 (OMN-13626): the SEA file is the demo backbone
  (register AND invoke) consumed by node_registration_effect / node_invocation_effect / node_demo_orchestrator
  / tools.py / __main__.py + 6 test files (the explicit Phase 8.1 deletion scope), and SEA depends only
  on omnibase-core not omnibase-infra; deleting it in Wave 1 with Phases 1-7 open would break the SEA
  repo mid-migration, violating TRANSFORM->PROVE->DELETE ordering. No topic schema, envelope, contract-API,
  migration, or live-lane mutation -- a library service method + typed-model addition under services/mcp.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
