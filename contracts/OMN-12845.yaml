---
schema_version: "1.0.0"
ticket_id: "OMN-12845"
title: "M5 — Live closed loop: feed runtime outcomes back onto scored capsule selection"
summary: >
  Wire the first live, end-to-end closed loop of the Behavior-Augmented Context plan. Adds node_capsule_effectiveness_feedback_reducer,
  a consume-side REDUCER/EFFECT that takes a scored runtime ROI row and writes its effectiveness back
  onto the durable M2 capsule store (node_projection_capsule_store) keyed by the deterministic capsule_hash,
  so M3 context selection re-ranks on the live-updated score. Attribution honesty is enforced: only a
  CONTROLLED_INTERVENTION runtime-observed row may carry an effectiveness CLAIM (republished as context-roi-score-completed.v1
  and folded onto capsule_store via the M2 projection, the sole capsule_store writer); an OBSERVATIONAL
  row may only generate a HYPOTHESIS (capsule-effectiveness-hypothesis.v1) and is never written as a measured
  score. The existing node_context_roi_runner EFFECT is extended to carry the full per-row metadata set:
  routing_source and factor_subset_hash are added so a winning factor is distinguishable from a routing-authority
  artifact; node_context_roi_compute stays a pure COMPUTE scorer. Adds routing_source to ModelContextRoiRequest's
  row model (ModelArmRunRow). Topics are contract-declared and referenced via omnimarket.events.topics
  constants, never hardcoded; endpoints/models are echoed from the routing authority, never env.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - topics
  - events
  - public_api
