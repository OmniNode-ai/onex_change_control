---
schema_version: "1.0.0"
ticket_id: "OMN-8721"
title: "fix(OMN-8721): surface standing-orders load failures structurally in handler_session_orchestrator"
summary: >-
  HandlerSessionOrchestrator._load_standing_orders had a bare `except Exception: logger.warning(...);
  return {}` that silently swallowed JSON-decode / IO / parse errors, making a genuine load failure indistinguishable
  from "no standing orders configured" (the same silent-swallow failure class as OMN-9561 in _fetch_linear_active_tickets).
  This change keeps the absent-file path as the legitimate empty-result case (returns {} after a structured
  warning log citing the path) and replaces the swallow with a typed SessionStandingOrdersError that the
  Phase 2 caller converts into a structured ERROR result, so real load/parse failures surface in the node
  envelope instead of vanishing. Code-only change; no deploy, no runtime mutation, no new REST endpoint,
  no event-bus topic change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
