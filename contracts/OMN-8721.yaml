    description: "Four integration tests prove the contract (absent -> {} + structured log; empty-list
      -> {}; malformed JSON -> raises SessionStandingOrdersError; IO error -> raises) and the full omnimarket
      suite stays green."
    command: >-
      grep -q '^status: PASS$' drift/dod_receipts/OMN-8721/dod-tests-green/command.yaml
  - kind: "manual"
