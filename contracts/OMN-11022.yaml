---
schema_version: "1.0.0"
ticket_id: "OMN-11022"
title: "Migrate omnimarket persona navigation learning DTOs to omnimemory"
summary: >
  Binds omnimarket PR #628, which replaces duplicate persona, navigation, and agent-learning DTO definitions
  with compatibility imports from canonical omnimemory models while preserving existing omnimarket import
  paths and schema refs.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Downstream PR #628 reports focused import/schema-ref compatibility and golden-chain
      tests."
    command: "gh pr view 628 --repo OmniNode-ai/omnimarket --json state,headRefOid"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11022 to omnimarket PR #628, D4, node drift, and deploy
      evidence."
    command: "find drift/dod_receipts/OMN-11022 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-628"
    description: "omnimarket PR #628 carries the OMN-11022 DTO compatibility migration."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >
          grep -q '^status: PASS$' drift/dod_receipts/OMN-11022/dod-omnimarket-pr-628/command.yaml &&
          grep -q '^pr_number: 628$' drift/dod_receipts/OMN-11022/dod-omnimarket-pr-628/command.yaml &&
          grep -q '^commit_sha: d402f367bfd73d38a4e9dff883d959d531aa67a1$' drift/dod_receipts/OMN-11022/dod-omnimarket-pr-628/command.yaml
  - id: "dod-focused-tests"
    description: "Focused omnimarket import/schema-ref compatibility and golden-chain tests pass."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >
          grep -q '^status: PASS$' drift/dod_receipts/OMN-11022/dod-focused-tests/command.yaml && grep
          -q '67 passed' drift/dod_receipts/OMN-11022/dod-focused-tests/command.yaml
  - id: "dod-d4-delta"
    description: "Scoped D4 mini-workspace check shows zero model name collisions for the migrated node
      slices."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >
          grep -q '^status: PASS$' drift/dod_receipts/OMN-11022/dod-d4-delta/command.yaml && grep -q 'No
          cross-repo model name collisions' drift/dod_receipts/OMN-11022/dod-d4-delta/command.yaml
  - id: "dod-node-drift"
    description: "Changed omnimarket node directories pass strict node drift validation after handler
      metadata repair."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >
          grep -q '^status: PASS$' drift/dod_receipts/OMN-11022/dod-node-drift/command.yaml && grep -q
          'node-drift-gate: PASS' drift/dod_receipts/OMN-11022/dod-node-drift/command.yaml
  - id: "dod-deploy"
    description: >
      Deploy DoD evidence for PR #628: model import compatibility change, no live deploy, restart, or
      .201 mutation required before merge; post-merge import smoke is recorded.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >
          grep -q '^status: PASS$' drift/dod_receipts/OMN-11022/dod-deploy/command.yaml && grep -q '^pr_number:
          628$' drift/dod_receipts/OMN-11022/dod-deploy/command.yaml && grep -q 'No live deploy' drift/dod_receipts/OMN-11022/dod-deploy/command.yaml
  - id: "dod-occ-pr"
    description: "onex_change_control PR #1018 carries the central OMN-11022 contract and receipts."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >
          grep -q '^status: PASS$' drift/dod_receipts/OMN-11022/dod-occ-pr/command.yaml && grep -q '^pr_number:
          1018$' drift/dod_receipts/OMN-11022/dod-occ-pr/command.yaml
