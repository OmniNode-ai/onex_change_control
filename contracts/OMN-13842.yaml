schema_version: 1.0.0
ticket_id: OMN-13842
title: Fix delegate skill objc fork() SIGABRT on macOS (spawn effect child)
summary: >-
  omnimarket PR #1569 changes the bus-less local delegation dispatch port to resolve the multiprocessing
  start method by platform: spawn on macOS, fork (with a spawn fallback) elsewhere. The delegation effect
  child was started with fork; on macOS the effect makes a real LLM call that initializes the Objective-C
  runtime in the parent, so the fork-ed child aborted with SIGABRT (objc "+[NSNumber initialize] may have
  been in progress ... when fork() was called ... Crashing instead"), exit -6. dispatch() raised
  "delegation effect process exited without returning a result", so the delegate mapped skill returned no
  typed delegation payload and was classified broken in the M5 capstone dogfood sweep. spawn starts a clean
  interpreter with no inherited objc state and is fork-safe.
