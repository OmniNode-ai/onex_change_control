---
schema_version: "1.0.0"
ticket_id: "OMN-13620"
title: "feat(OMN-13620): canonical replayable event-chain projection (WS-C Phase 5.1 ROUTE)"
summary: >
  WS-C Phase 5.1 ROUTE of the SEA->canonical migration (epic OMN-13604). Routes the SEA bespoke event-chain
  ledger (src/pipeline/event_chain_capture.py, which wrote .onex_state/hackathon/event_chains/{correlation_id}.json)
  to a canonical, bus-backed, replayable projection. New canonical REDUCER node node_projection_event_chain
  in omnimarket subscribes to the canonical platform log-entry topic onex.evt.platform.log-entry.v1 and
  materializes one durable row per ordered (correlation_id, sequence) event into the event_chain table
  (omnidash_analytics) via a node-owned migration. The idempotency conflict key (correlation_id, envelope_id)
  makes the runtime UPSERT replay-safe (a replayed canonical event overwrites its own row and keeps its
  sequence, no duplicate append). The read-side /projection/{topic} surface onex.snapshot.projection.event_chain.v1
  declares correlation_id in columns and order_by sequence ASC, so the projection API honours the correlation_id
  WHERE-filter (api_server.topic_supports_correlation_id_filter) and deterministic ordering. Operator
  hard-acceptance proven: given a correlation_id, the ordered event chain reconstructs deterministically
  from canonical projection rows. node_projection_traces only materializes an aggregated one-row-per-correlation
  summary, which cannot reconstruct the ordered per-event chain, hence a new per-event projection. All
  archetype constraints met: REDUCER_GENERIC, handler-based, topics contract-sourced, no Plugin* base,
  no hardcoded paths/IPs, strongly-typed frozen models, fail-fast on missing _db adapter. The SEA event_chain_capture.py
  deletion ships in the paired SEA PR after parity; envelope.py (build_envelope) is retained as foundational
  standalone-repo infra imported by 15 non-test src modules with no canonical home under this ticket (same
  retain-load-bearing posture as OMN-13616). No envelope/contract-API change, no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      A failing-first golden-chain + contract suite proving the chain ModelEventChainProjectionEvent ->
      HandlerProjectionEventChain.handle -> ordered event_chain rows: one row per (correlation_id, sequence),
      monotonic sequence assignment, replay idempotency (same envelope_id dedups and keeps sequence),
      correlation isolation, and the operator hard-acceptance that given a correlation_id the ordered
      chain reconstructs deterministically. The contract declares db_io write (runtime materialization),
      projection_api with correlation_id + order_by sequence ASC, and the node is discoverable as an onex.nodes
      entry-point.
    command: "uv run pytest tests/test_event_chain_projection_omn13620.py tests/test_golden_chain_event_chain.py
      -q"
