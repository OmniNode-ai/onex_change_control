schema_version: "1.0.0"
ticket_id: "OMN-13515"
title: "RuntimeLocal._instantiate_handler injects event_bus for handlers that declare it"
summary: >-
  RuntimeLocal._instantiate_handler (omnibase_core/runtime/runtime_local.py) injected only the state_root
  runtime-owned dependency by parameter name and NEVER injected event_bus, so any handler whose __init__
  declares a non-defaulted event_bus crashed at instantiation with "__init__() missing 1 required positional
  argument: 'event_bus'". This broke 8 omnimarket handlers via the event-driven and single-handler RuntimeLocal
  paths (aislop_sweep, architectural_invariant_loop, autopilot_orchestrator, build_loop_orchestrator,
  overseer_verifier, pr_lifecycle_orchestrator, swarm_supervisor_orchestrator, version_skew_detector);
  surfaced by the aislop_sweep dogfood run on 2026-06-22 (the sweep could not scan because the runtime
  crashed instantiating its own handler). Fix (runtime-side, OMN-13515 preferred option): _instantiate_handler
  takes a keyword-only bus: ProtocolLocalRuntimeBus | None and injects kwargs["event_bus"] = bus when
  the constructor advertises an event_bus param AND a bus is provided, mirroring the existing state_root
  injection. The two bus-owning call sites (_run_single_handler, _run_event_driven) thread their in-scope
  bus; the compute path (_run_compute) owns no bus and keeps bus=None (handler not injected, prior behavior
  preserved). Handlers are NOT changed to make event_bus optional (that would hide the bug and silently
  disable sweep-result telemetry per OMN-8172); the 2 already-tolerant handlers keep working and now receive
  the real bus. This OCC PR carries the central contract consumed by the omnibase_core PR (#1307) Receipt
  Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
