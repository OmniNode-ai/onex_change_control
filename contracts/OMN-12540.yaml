---
schema_version: "1.0.0"
ticket_id: "OMN-12540"
title: "Harden freestanding-imperative detector precision"
summary: >-
  Tighten precision of scan_freestanding_imperative_io and helpers in the handler-contract-compliance
  scanner (added in OMN-12515). Local git operations (rev-parse, log, describe, status, branch, show,
  diff) are no longer flagged as subprocess_network — only ssh/scp/rsync/curl/wget and network git verbs
  (fetch/clone/push/pull/ls-remote) flag. Topic literals stay strictly flagged everywhere outside contracts
  (no topics.py exemption). The ambiguous local 'timeout=' kwarg is removed from the inference-param set;
  all true sampling/generation params remain flagged.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
