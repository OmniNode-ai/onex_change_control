---
schema_version: "1.0.0"
ticket_id: "OMN-11542"
title: "Deploy evidence projection API and dashboard truth chain to stability runtime"
summary: >-
  Bind OCC evidence for the OMN-11542 follow-up that packages the OmniMarket projection API, wires the
  stability runtime projection-api service, updates runtime build refs so evidence-pipeline DTOs are installed,
  and records the Wave 3 live stability blocker evidence.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
  - "protocols"
evidence_requirements:
  - kind: "tests"
    description: "OmniMarket focused projection API and evidence dashboard node tests pass."
    command: >-
      uv run pytest tests/test_evidence_dashboard_nodes.py tests/unit/projection/test_projection_api_dynamic.py
      -q
  - kind: "tests"
    description: "Infra deploy-agent cache-bust/build-source tests pass."
    command: >-
      uv run pytest scripts/deploy-agent/tests/unit/test_executor_cache_bust.py scripts/deploy-agent/tests/unit/test_executor_build_source.py
      -q
  - kind: "manual"
    description: "Runtime compose config resolves for base, stability, and prod overlays."
    command: >-
      docker compose -f docker/docker-compose.infra.yml --profile runtime config --quiet && docker compose
      -f docker/docker-compose.infra.yml -f docker/docker-compose.stability-test.yml --profile runtime
      config --quiet && docker compose -f docker/docker-compose.infra.yml -f docker/docker-compose.prod.yml
      --profile runtime config --quiet
