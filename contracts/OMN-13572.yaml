---
schema_version: "1.0.0"
ticket_id: "OMN-13572"
title: "Wire doc_content_scan as a required gate (Model B rollup, omnibase_core pilot)"
summary: >
  Promote the doc_content_scan validator (OMN-13569, already merged to dev) from advisory to a REAL required,
  blocking gate by dogfooding the Model B failing-rollup mechanism (OMN-13574, #1327): no new gate type
  is invented. omnibase_core ci.yml gains a doc-content-scan job that runs the corpus-accepted COMPUTE
  validator over the full tracked documentation set and is added to quality-gate.needs + the quality-gate
  pass/fail logic, so a doc-content violation turns the single required CI Summary rollup red. The validator-requirements.yaml
  spec gains an additive doc-content-scan entry (pre_commit + ci_workflow required) and the Model B model_b_rollup_enforcement.validator_jobs
  map registers doc-content-scan so the rollup-coverage meta-check (validator_rollup_coverage.py) keeps
  it from silently dropping out. The check-doc-content-scan pre-commit hook is exported and wired. The
  handler gains the operator-set SKILL.md `ticket: OMN-NNNN` frontmatter exemption (with a unit test).
  applies_to_repos is scoped to the pilot repo (omnibase_core) only; fleet rollout to the other 11 repos
  is OMN-13576 — a global required:true would break their handshake gate before their wiring lands. Proven
  additive: the consumer gap set for all 11 other repos is byte-identical between canonical dev spec and
  this branch's spec.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Doc-content COMPUTE validator unit + corpus tests including the new SKILL.md ticket-frontmatter
      exemption, plus the Model-B rollup-coverage meta-check asserting the live ci.yml covers doc-content-scan
      in the CI Summary transitive needs graph.
    command: "uv run pytest tests/unit/validation/doc_content_scan/ tests/validation/test_validator_rollup_coverage.py
      -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
