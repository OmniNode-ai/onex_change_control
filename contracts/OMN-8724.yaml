---
schema_version: "1.0.0"
ticket_id: "OMN-8724"
title: "golden_chain_sweep — fix dict-not-typed dispatch crash + downgrade live-evidence claim"
summary: >-
  node_golden_chain_sweep crashed via the canonical onex node path with AttributeError: 'dict' object
  has no attribute 'chains' at handler_golden_chain_sweep.py. runtime_local_adapter._invoke_handle_method
  handed the raw decoded dict to handle(self, request: GoldenChainSweepRequest) instead of the typed model.
  Fix (A1, systemic): coerce a raw dict payload into the handler's single annotated BaseModel parameter
  inside the omnibase_infra runtime adapter, fixing the whole dict-not-typed dispatch-boundary class (same
  family as OMN-13141). Root cause completion: PEP 563 string annotations (every node handler uses from
  __future__ import annotations) made the parameter annotation a literal string so the BaseModel-subclass
  check never matched — resolved via inspect.signature(eval_str=True). cli_node default mode now emits
  the documented SkillRoutingError JSON envelope on non-zero exit instead of a raw traceback. Companion
  omnimarket change adds the runtime-injected correlation_id field to GoldenChainSweepRequest and downgrades
  the node/skill docs: the node is pure compute over caller-supplied projected_rows (zero live I/O) and
  must NOT be cited as live row / end-to-end data-flow evidence (OMN-13126). A real live-Postgres fetch
  + row-count-delta assertion remains tracked under this ticket and is explicitly not implemented in this
  PR.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "CI passes on both the omnibase_infra and omnimarket merge PRs"
