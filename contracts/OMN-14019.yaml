ticket_id: "OMN-14019"
title: "fix(OMN-14019): bounded-recency window on ROI overlay aggregation (regression-blindness fix)"
summary: >-
  omnimarket PR #1635 fixes the regression-blindness limitation found during OMN-14011 recon: the ROI
  overlay aggregated the whole context_roi_scores table's lifetime per-tier success rate with no recency
  scope, so a tier that later regresses could never be suppressed once it accrued enough historical successes.
  Two env-tunable knobs (DELEGATION_ROI_LOOKBACK_ROWS, DELEGATION_ROI_WINDOW_SECONDS) scope each tier's
  cohort to its most-recent rows before the rate is computed. Both default unset, in which case the aggregation
  is byte-identical to the prior whole-table behaviour so every golden-chain replay is untouched; only
  an opt-in surface enables a window.
