  infers endpoint behavior from a closed provider enum or unique model tier. The agent
  orchestrator selects a named model registry entry by `adk_model_ref`, and each entry
  declares the ADK endpoint handler as contract data. Multiple local/cloud/OpenRouter-style
  configs can coexist, with overlays selecting the active agent config by name.
