schema_version: "1.0.0"
ticket_id: "OMN-12715"
title: "SEA ADK model registry selects backend descriptors by contract overlay"
summary: >-
  Central evidence for onex-self-extending-agent PR #211. SEA ADK orchestration no longer infers endpoint
  behavior from a closed provider enum or unique model tier. The agent orchestrator selects a named model
  registry entry by `adk_model_ref`, and each entry carries the canonical backend descriptor shape (`backend_id`,
  `endpoint_url`, `model_name`, `api_key_env`, tier, timeout, capabilities). Multiple local/cloud/OpenRouter-style
  configs can coexist, with overlays selecting the active agent config by name; Python ADK adapters remain
  internal runtime implementation, not contract data.
