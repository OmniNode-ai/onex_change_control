    description: "A/B compare contract and registry schema tests pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10477/dod-contract-tests/command.yaml
          && grep -q '^ticket_id: OMN-10477$' drift/dod_receipts/OMN-10477/dod-contract-tests/command.yaml
          && grep -q '^evidence_item_id: dod-contract-tests$' drift/dod_receipts/OMN-10477/dod-contract-tests/command.yaml"
  - id: "dod-lint"
    description: "Ruff lint and format checks pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10477/dod-lint/command.yaml && grep
          -q '^ticket_id: OMN-10477$' drift/dod_receipts/OMN-10477/dod-lint/command.yaml && grep -q '^evidence_item_id:
          dod-lint$' drift/dod_receipts/OMN-10477/dod-lint/command.yaml"
  - id: "dod-node-gates"
    description: "Node metadata and drift gates pass"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10477/dod-node-gates/command.yaml
          && grep -q '^ticket_id: OMN-10477$' drift/dod_receipts/OMN-10477/dod-node-gates/command.yaml
          && grep -q '^evidence_item_id: dod-node-gates$' drift/dod_receipts/OMN-10477/dod-node-gates/command.yaml"
  - id: "dod-deploy"
