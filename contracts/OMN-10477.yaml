        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10477/dod-deploy/command.yaml &&
          grep -q '^ticket_id: OMN-10477$' drift/dod_receipts/OMN-10477/dod-deploy/command.yaml && grep
          -q '^evidence_item_id: dod-deploy$' drift/dod_receipts/OMN-10477/dod-deploy/command.yaml &&
