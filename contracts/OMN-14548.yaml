summary: >
  Non-implementer-style DoD companion for omnibase_infra#2287 (OMN-14548, child of epic OMN-14507). #2287
  fixes the root silent-death mechanism traced this session: `_make_event_bus_callback` (the auto-wired
  Kafka consume boundary) caught every handler exception, logged it once, and returned normally — no DLQ,
  no redelivery, no metric. The message vanished, ACKed by omission. Staged behind `ONEX_BOUNDARY_DLQ_ENABLED`
  (DEFAULT OFF, warn-first): flag off preserves the exact historical swallow-and-ACK semantics plus a
  new observable metric log line; flag on adds a bounded retry (3 attempts, 0.1/0.4s backoff) then durable
  best-effort DLQ preservation via the EXISTING duck-typed `_publish_raw_to_dlq` contract `EventBusSubcontractWiring._publish_to_dlq`
  already depends on (`EventBusKafka`/`MixinKafkaDlq`) — no new DLQ machinery, no changes to `event_bus_subcontract_wiring.py`
  or `event_bus_kafka.py`. HONESTY NOTE ON THE PROOF STANDARD. This companion documents TWO independent
  verification events, neither self-authored by #2287's implementer: (1) `forbid-verify` (a separate teammate
  with the deepest context on the §7 `extra="forbid"` wire-model constraint this fix unblocks) independently
  re-ran all tests and matched the DLQ call signature against the REAL production code at `event_bus/mixin_kafka_dlq.py:560-570`
  — refuting the sharpest risk (a silent signature mismatch) and finding the core mechanism correct while
  enumerating six gaps (G1-G6); (2) this companion's static gh-api markers (`dod-verify-2287-static-markers`)
  independently confirm the G1/G2/G3 fixes forbid-verify requested are actually present in the shipped
  code at #2287's head `3b3b2aba04ef4f3c2da501131d2eca6039caf7b2`, not merely claimed in prose. G4/G5
  (idempotency note, wording precision) are documentation-only fixes, verified by the same markers. G6
  (a live DLQ readback on .201 stability-test, upgrading proof_class from code-only to deployed) is explicitly
  NOT claimed here — #2287 stays DRAFT and `ONEX_BOUNDARY_DLQ_ENABLED` stays default-OFF until G1 (best-effort-DLQ
  vs. true nack/redelivery) is decided and G6 is proven.
