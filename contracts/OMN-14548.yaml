title: "OCC companion for omnibase_infra#2288 — auto-wired consume boundary DLQ fix (boundary-loudness)"
summary: >
  Non-implementer-style DoD companion for omnibase_infra#2288 (OMN-14548, child of epic OMN-14507). #2288
  fixes the root silent-death mechanism traced this session: `_make_event_bus_callback` (the auto-wired
  Kafka consume boundary) caught every handler exception, logged it once, and returned normally — no DLQ,
  no redelivery, no metric. The message vanished, ACKed by omission. Staged behind `ONEX_BOUNDARY_DLQ_ENABLED`
  (DEFAULT OFF, warn-first): flag off preserves the exact historical swallow-and-ACK semantics plus a
  new observable metric log line; flag on adds a bounded retry (3 attempts, 0.1/0.4s backoff) then durable
  best-effort DLQ preservation via the EXISTING duck-typed `_publish_raw_to_dlq` contract `EventBusSubcontractWiring._publish_to_dlq`
  already depends on (`EventBusKafka`/`MixinKafkaDlq`) — no new DLQ machinery, no changes to `event_bus_subcontract_wiring.py`
  or `event_bus_kafka.py`. SUPERSESSION NOTE: this ticket originally companioned omnibase_infra#2287,
  which was reissued as #2288 at the SAME product-fix commit (identical seam/markers) on a correctly-named
  branch to satisfy the branch↔ticket identity-binding gate (branch must reference OMN-14548, not the
  epic OMN-14507) — see reference_branch_ticket_identity_samesha_rename. #2288 also carries one follow-up
  commit (f7588b2979df1b73e87a1087fe3d06d6d4b5ab19) removing a redundant `cast("UUID", ...)` mypy --strict
  flagged (no behavior change) and adding the deploy-gate evidence item below. HONESTY NOTE ON THE PROOF
  STANDARD. This companion documents TWO independent verification events, neither self-authored by #2288's
  implementer: (1) `forbid-verify` (a separate teammate with the deepest context on the §7 `extra="forbid"`
  wire-model constraint this fix unblocks) independently re-ran all tests and matched the DLQ call signature
  against the REAL production code at `event_bus/mixin_kafka_dlq.py:560-570` — refuting the sharpest risk
  (a silent signature mismatch) and finding the core mechanism correct while enumerating six gaps (G1-G6);
  (2) this companion's static gh-api markers independently confirm the G1/G2/G3 fixes forbid-verify requested
  are actually present in the shipped code at #2288's head `f7588b2979df1b73e87a1087fe3d06d6d4b5ab19`,
  not merely claimed in prose. G4/G5 (idempotency note, wording precision) are documentation-only fixes,
  verified by the same markers. G6 (a live DLQ readback on .201 stability-test, upgrading proof_class
  from code-only to deployed) is explicitly NOT claimed here — the flip-on decision and live proof are
  tracked separately as OMN-14551 (child of OMN-14507), which also gates OMN-14546 (the `extra=forbid`
  wire-model teeth pause) — landing this default-OFF fix does NOT by itself unblock OMN-14546.
