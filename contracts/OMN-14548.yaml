dod_evidence:
  - id: "dod-verify-2288-static-markers"
    description: >-
      Product-observing check against omnibase_infra#2288 head f7588b2979df1b73e87a1087fe3d06d6d4b5ab19.
      Asserts, via gh-api content reads (no local checkout required, hermetically reproducible by anyone
      with gh access): (1) G2 — the bounded-retry loop classifies `PydanticValidationError` and `ProtocolConfigurationError`
      as non-retryable (breaks out on first occurrence instead of burning the full retry budget on a guaranteed-repeat
      content/config error — the exact §7 forbid-mode death signal); (2) G3 — the metric log lines are
      split into `boundary_swallow_observed` (nothing prevented) vs. `boundary_swallow_prevented` (only
      when `dlq_routed=true`, real prevention), so an operator alerting on the "prevented" counter cannot
      be misled by a lost message; (3) G1 — the docstrings carry the explicit "BEST-EFFORT DLQ" honesty
      caveat and `message_lost=true` marker instead of the earlier over-claiming "durably preserved...
      instead of vanishing" language.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          v="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py?ref=f7588b2979df1b73e87a1087fe3d06d6d4b5ab19"
