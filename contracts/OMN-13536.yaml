title: "Omnimarket dispatch-venv drift guard"
summary: >
  omniclaude skills dispatch ONEX nodes from the installed omnimarket package in the plugin venv. omniclaude
  PR #1797 adds a lock and live-venv guard that compares the uv.lock omnimarket git SHA against an explicit
  approved release-lane baseline and fails on unapproved drift. The script still accepts canonical-main
  SHA injection for callers ready to enforce omnimarket@main, but this PR deliberately ratchets the current
  approved baseline because the full omnimarket@main upgrade is blocked by omniintelligence's transitive
  source pin.
