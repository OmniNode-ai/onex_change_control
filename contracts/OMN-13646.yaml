title: "Add context_pack_hash to ModelDelegationResult delegation terminal wire DTO"
summary: >-
  Add the additive context_pack_hash field (str, default "") to the ModelDelegationResult terminal wire
  DTO in omnibase_core so the omnimarket delegation orchestrator can attach the injected context-pack
  hash onto the canonical terminal result for ROI correlation. The sibling wire DTOs ModelTaskDelegatedEvent
  and ModelDelegationWireRequest already carry the field; the terminal result was the only missing link
  (root cause of the OMN-13407 empty-hash-on-failed-terminal symptom). Frozen=True + extra="forbid" preserved;
  strongly typed; empty-string default for back-compat with existing emitters; no behavior change. Patch-bumps
  omnibase_core 0.46.0 -> 0.46.1 so omnimarket can pin the new git-rev (B2b / OMN-13644). Proven by the
  omnibase_core delegation wire-model unit suite (88 passing, including 2 new context_pack_hash tests).
