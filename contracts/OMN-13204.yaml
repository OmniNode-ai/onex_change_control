title: "B5 residual: clean ModelOnexEnvelope doc-only ref in handler_llm_openai_compatible Protocol Conformance
  Note"
summary: >-
  Final B5 residual of the envelope-dedup / platform-debt workstream (sibling of OMN-13198, follow-up
  to OMN-13196 B4 which deleted ModelOnexEnvelope from omnibase_core). The sibling B5 ticket OMN-13198
  (omnibase_infra PR #2013) claimed to retarget handler_llm_openai_compatible.py's Protocol Conformance
  Note off ModelOnexEnvelope but the merged dev result still contained the broken note at src/omnibase_infra/nodes/node_llm_inference_effect/handlers/handler_llm_openai_compatible.py:153
  ("Those protocols operate on ModelOnexEnvelope and ModelEventEnvelope respectively"). This was the last
  ModelOnexEnvelope reference in omnibase_infra on dev (verified by grep). This phase corrects that note
  to the real protocol I/O types: ProtocolHandler.execute(request: ModelProtocolRequest, operation_config:
  ModelOperationConfig) -> ModelProtocolResponse (omnibase_spi protocols/handlers/protocol_handler.py:113-117)
  and ProtocolMessageHandler.handle(envelope: ModelEventEnvelope) -> ModelHandlerOutput (omnibase_core
  protocols/runtime/protocol_message_handler.py). Adds a TestProtocolConformanceNote regression guard.
  Docstring-only edit to one src file plus its unit test. No Kafka topic schema change, no DDL/migration,
  no runtime/code path changed, no .201/deploy mutation. After this PR, grep -rniE 'ModelOnexEnvelope|model_onex_envelope'
  over omnibase_spi + omniintelligence + omnibase_infra returns 0 outside the regression test that must
  name the symbol to assert its absence. omnibase_core src/test/doc references remain B4's scope (OMN-13196)
  and are out of scope here.
