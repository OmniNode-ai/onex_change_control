ticket_id: "OMN-13922"
title: "feature_dashboard audits the live onex skill dispatch registry"
summary: >-
  node_feature_dashboard_compute discovered skills by scanning stale SKILL.md directory layouts (plugins/onex/skills,
  adapters/codex/skills), so dispatch-registered skills that demonstrably work reported 0% coverage or
  vanished from the audit, and an empty audit returned a vacuous status='empty' success receipt. omnimarket
  PR #1597 re-anchors discovery on the live onex skill dispatch registry (the skill_mapping.yaml that
  'onex skill <name>' loads from omnibase_infra.cli): a skill is discovered iff it is dispatch-registered,
  and each registered skill is audited against the real surfaces its registry entry declares (backing
  node package, contract.yaml, handler modules incl. handler_routing, models/result model, tests, onex.nodes
  entry point, event-bus topics), resolved either from a repo_root override or from installed-package
  resolution (find_spec / importlib entry_points) — the exact path 'onex skill feature_dashboard' takes.
  Two regression-pinned guarantees: auditing zero skills raises instead of returning empty-success, and
  a dispatch-registered skill scoring 0 emits a CRITICAL registry_inconsistency gap. A new test runs the
  handler with NO repo_root against the installed omnibase_infra registry + onex.nodes entry points and
  pins merge_sweep/contract_sweep as covered.
