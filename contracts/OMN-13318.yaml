      the sweep-done gate (_apply_org_wide_done_gate) to node_pr_lifecycle_orchestrator, and the DoD tests.
      Contract + metadata bumped to 1.1.0. Evidence anchor: omnimarket head commit 9c7a45386b6b2cbc3a83a201e47d01db5c2a1ee6.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13318/dod-omnimarket-pr-1377/command.yaml
          && grep -q '^pr_number: 1377$' drift/dod_receipts/OMN-13318/dod-omnimarket-pr-1377/command.yaml
          && grep -q 'passed' drift/dod_receipts/OMN-13318/dod-omnimarket-pr-1377/command.yaml"
