---
schema_version: "1.0.0"
ticket_id: "OMN-13318"
title: "org-wide open-PR census as mandatory sweep-done gate"
summary: >
  The overnight merge sweep could briefly look complete after two PRs merged while omnibase_infra#2043
  was still open — the repo-by-repo inventory missed it because there was no org-wide precondition on
  the done-report. This adds an org-wide open-PR census to node_pr_lifecycle_inventory_compute (collect_org_wide_open_prs,
  the GitHub-search equivalent of 'gh api /search/issues?q=org:OmniNode-ai is:pr is:open') returning ModelOrgWideOpenPrInventory(open_count,
  remainders, query_failed), attached to ModelPrInventoryOutput.org_wide_open. The node_pr_lifecycle_orchestrator
  captures the census during INVENTORYING and gates its reported final_state: COMPLETE is downgraded to
  NOT_DONE while open_count > 0 (or the census failed), surfacing the exact blocking remainders; result.json
  reports status=not_done with the remainder list. Fail-closed: a failed or invalid census query is never
  reported as done. Compute + report-gating change only; no topic schema, envelope, or contract API change;
  no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      DoD tests assert the org-wide census (seed one open PR -> NOT_DONE listing the remainder; close
      it -> done), fail-closed behavior on query failure / invalid JSON, ModelPrInventoryOutput.org_wide_open
      population, and the orchestrator sweep-done gate downgrading COMPLETE to NOT_DONE while open PRs
      remain (with remainders surfaced).
    command: "uv run pytest tests/test_golden_chain_pr_lifecycle_inventory_compute.py tests/test_golden_chain_pr_lifecycle_orchestrator.py
      -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
