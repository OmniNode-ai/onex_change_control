---
schema_version: "1.0.0"
ticket_id: OMN-13965
title: "feat(skill-mapping): input-coverage gate enforcing defaulted-arg drift"
summary: >
  Systemic enforcement follow-up to OMN-13964. The onex skill CLI injects every skill_mapping.yaml arg
  carrying a default into the node-input payload on every invocation; if the model the backing handler
  validates rejects it (extra=forbid plus missing field) the skill fails 100% of CLI calls with extra_forbidden.
  The omnimarket change adds a validator that resolves each skill's runtime-validated input model(s) (the
  handle() first-param BaseModel members for compute/effect/reducer handlers plus handler_routing event_models
  for orchestrators, excluding envelope wrappers) and FAILs on any defaulted arg no candidate accepts.
  Wired as a required-status CI gate plus a pre-commit hook plus a pytest test. Resolves all 31 registered
  skills with zero skips.
is_seam_ticket: false
interface_change: false
evidence_requirements:
  - kind: "tests"
    description: "skill-mapping input-coverage validator resolves all 31 skills and passes with the OMN-13964
      fix present"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13965/dod-guard-resolution/command.yaml"
  - kind: "ci"
    description: "ruff, mypy --strict, and pytest pass on the validator and its test"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13965/dod-lint-typecheck/command.yaml"
  - kind: "manual"
    description: "omnimarket PR #1620 carries the OMN-13965 gate"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13965/dod-omnimarket-pr-1620/command.yaml"
  - kind: "manual"
    description: "onex_change_control PR #3624 carries this OMN-13965 contract and receipt set"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13965/dod-occ-pr-3624/command.yaml"
  - kind: "manual"
