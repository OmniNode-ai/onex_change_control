  file) into a typed ModelEffectReadback carrying missing_effects; topics are contract-driven (parsed
  + Pydantic-validated from contract.yaml publish_topics); a volatile mask excludes run_id/timestamp/correlation_id
  from effect-payload equivalence. tests/unit/canary/test_effect_golden.py proves the oracle is non-vacuous
  on a real EFFECT node (NodeComplianceEvidenceEffect). Scripts + tests only; no runtime node handler,
  no deploy scope.
