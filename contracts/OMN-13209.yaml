title: "[A2] Re-home node_redeploy OCC + runtime models; promote compat dups to core"
summary: >-
  Phase A2 of the canonical node migration (epic OMN-13205, plan docs/plans/2026-06-17-canonical-node-migration-noncanonical-cleanup.md
  §3.3 / §4 Phase A2), consuming the A0 ledger (OMN-13206). Closes the A2 exit gate: zero canonical Python
  import OR contract module declaration of node_redeploy.* (verified by grep over src/**/*.py AND src/**/*.yaml
  in omnimarket, excluding the node_redeploy/ dir which B3 rebuilds/deletes). Two paired code PRs. (1)
  omnibase_core #1254 graduates the runtime-deployment lane enum (EnumRuntimeLane) and deployment-proof
  wire DTO (ModelRuntimeDeploymentProof) from the transient omnibase_compat mirror to their canonical
  core home, per the compat copy's COMPAT_MIGRATION_TARGET and the >=2-repos graduation condition; promoted
  from the existing compat copy, not authored fresh. (2) omnimarket #1252 makes omnimarket.events.occ_evidence
  the OWNER of the OCC evidence draft DTOs (defined there, not re-exported from the node package), re-exports
  the runtime DTOs from core, repoints node_occ_evidence_draft_orchestrator/contract.yaml (handler.input_model
  + input_model.module + output_model.module) to the owner module, and collapses the duplicate node copies
  of EnumRuntimeLane + ModelRuntimeDeploymentProof onto core. The two canonical OCC consumers (node_occ_evidence_draft_orchestrator,
  node_occ_evidence_validator_compute) import via events.occ_evidence, so they come off the node-backed
  path automatically. No new Kafka topic schema, no DDL/migration, no external API surface, no .201 runtime
  mutation in this change.
