title: "UTC timestamp discipline pre-commit hook for mtime-cited handoff and evidence docs"
summary: >-
  Ships the retro B-11 process ratchet in omniclaude PR #1746: a pre-commit hook rejects Z-suffixed UTC-looking
  clock times when they are adjacent to file-mtime markers in docs/handoffs/** or docs/evidence/** markdown.
  The hook prevents local filesystem mtimes from being transcribed as UTC incident facts, which created
  a false outage narrative in the June 11 handoff review. The implementation adds the hook, wires it into
  .pre-commit-config.yaml, and covers it with focused hook tests and fixtures. No runtime deploy, restart,
  topic mutation, or service contract change is part of this PR.
