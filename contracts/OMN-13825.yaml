summary: >-
  omnimarket PR #1559 fixes the dep_health projection consume-then-drop defect by adding the runtime-required
  handle(input_data) entrypoint to HandlerProjectionDepHealth. The shim consumes the injected DatabaseAdapter
  from input_data['_db'], builds ModelDepHealthSweepCompletedEvent, delegates to project(), and returns
  the serialized projection result. The PR adds focused golden-chain projection tests and records local
  ruff, mypy, pre-commit, and targeted test evidence. Runtime rebuild/deploy is explicitly outside this
  OCC evidence PR and remains operator-gated. Defect 2 (topic_match reducer route registration) is fixed
  in omnibase_infra PR #2178: the runtime now honors a topic_match handler entry's contract-declared topic
  so node_projection_swarm registers dispatch routes instead of orphaning its dispatcher. Live swarm_runs
  materialization remains deferred to OMN-13772 (.201 stability rebuild).
