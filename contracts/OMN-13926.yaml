title: "fix(OMN-13926): skill_functional_audit emits STATIC_OK not OK — static checks are never certification"
summary: >-
  omnimarket PR #1605 fixes the skill_functional_audit skill executable-path defect. node_skill_functional_audit_compute
  does pure static analysis (backing node mapped on disk, contract.yaml present, handler file exists,
  no stub markers) but emitted per-skill verdict status="ok" for a passing skill — a false certification.
  It marked dispatch_engine "ok" while dispatch_engine's live --dry-run execution actually fails (OMN-13834).
  The fix relabels the passing per-skill verdict STATIC_OK (never ok/certified/LIVE_VERIFIED), documents
  the STATIC_OK vs LIVE_VERIFIED vocabulary on ModelSkillVerdict.status, and hard-fails (raises) when
  zero skills are discovered instead of returning a vacuous status="ok", total_audited=0 result. Runtime
  rebuild/deploy is outside this OCC evidence PR and remains operator-gated.
