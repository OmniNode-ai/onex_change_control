title: "feat: topic-migration executor + lag/drain gate + status projection + replay-equivalence harness
  (Section 6b, infra)"
summary: >-
  Section 6b of the divergent-transport convergence epic (OMN-12618), in omnibase_infra. Builds the four
  load-bearing pieces the migration substrate lacked. (1) Lag/offset observation: ProtocolKafkaAdminLike
  (protocols/protocol_kafka_admin_like.py) is extended with list_consumer_group_offsets + list_offsets;
  ServiceConsumerLagObserver (migration/service_consumer_lag_observer.py) computes per-partition committed-vs-
  log-end lag (ModelTopicPartitionOffset / ModelConsumerGroupLag); ServiceDrainProofGate (migration/service_drain_proof_gate.py)
  blocks old-consumer-group retirement until residual lag is zero, and refuses to treat absence-of-offsets
  as drain. (2) Migration executor: NodeTopicMigrationExecutorEffect (contract-native EFFECT) consumes
  ModelTopicMigrationContract from omnibase_core (OMN-12621), provisions the new topic via ModelTopicSpec/TopicProvisioner,
  mints the new consumer group via compute_consumer_group_id, advances PLANNED->DUAL_WRITE->DUAL_READ->CUTOVER->COMPLETE
  forward-only, gates CUTOVER/COMPLETE on the drain-proof gate, and emits a ModelTopicMigrationLifecycleEvent
  per advanced phase. (3) Status projection: NodeTopicMigrationProjection (COMPUTE) + schemas/schema_topic_migration_projection.sql
  with FSM current_state enum + idempotency columns (last_applied_event_id/sequence/offset/partition)
  modeled on schema_registration_projection.sql. (4) Cross-boundary replay-equivalence harness (tests/replay/
  test_topic_migration_replay_equivalence.py) that projects the same source corpus through old- and new-topic
  paths and asserts equivalent projected state via ModelOutputDiff/deepdiff. The omnibase_core git pin
  is bumped to dev HEAD a1e73fff (OMN-12621 #1191) which adds ModelTopicMigrationContract; uv.lock regenerated.
  Governance updates land in the same PR: protocol lockfile regen, infra-node-allowlist entries (infra-only
  nodes), subscribe-wiring-health baseline (the command topic is operator/runtime-issued), test-selection
  adjacency for the new migration module, validation-exemptions for the Service<Name> naming + Kafka group_id
  string, and onex.nodes entry points. Live .201 consumer-group runtime proof is OPERATOR-GATED and was
  NOT run; this contract covers the landable code + local/integration proof only.
