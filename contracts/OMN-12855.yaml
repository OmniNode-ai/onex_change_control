ticket_id: "OMN-12855"
title: "Stability-test cloud-tier GLM api_key_ref resolves through runtime config"
summary: >-
  Fixes the stability-test L7 forced escalation blocker where routing authority selected the GLM cloud-tier
  backend with api_key_ref=LLM_GLM_API_KEY, but the recreated runtime/effects containers did not expose
  that ref to the active env-backed ProtocolSecretStore. The change registers GLM URL/model/key refs in
  the shared Infisical inventory and LLM transport map, and passes the refs through the runtime compose
  env anchor so provider selection remains contract/routing-owned while secret values stay outside source
  control and logs.
