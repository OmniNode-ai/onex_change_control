---
schema_version: "1.0.0"
ticket_id: "OMN-14767"
title: "Contract DoD-authoring hygiene gate"
summary: >-
  Add a contract DoD-authoring hygiene gate that rejects placeholder no-op check_values and impossible
  self-PR merged assertions before contract evidence can pass.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Focused validator tests cover placeholder and impossible pre-merge checks."
    command: "uv run pytest tests/test_check_contract_dod_authoring.py -q"
  - kind: "manual"
    description: "Full committed contract corpus passes under the shipped legacy allowlist."
    command: "uv run python scripts/validation/check_contract_dod_authoring.py --all"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-validator-tests"
    description: "Focused tests cover placeholder, impossible self-PR merge assertion, clean checks, and
      allowlist ratchet behavior."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "uv run pytest tests/test_check_contract_dod_authoring.py -q"
  - id: "dod-corpus-sweep"
    description: "The shipped allowlist keeps the full existing contracts corpus green while still fail-closing
      new violations."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "uv run python scripts/validation/check_contract_dod_authoring.py --all"
  - id: "dod-ci-precommit-wiring"
    description: "The hygiene gate is wired into pre-commit and CI, with the validator entrypoint allowlisted."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'check-dod-authoring-hygiene' .pre-commit-config.yaml && grep -q 'check_contract_dod_authoring.py
          --all' .github/workflows/ci.yml && grep -q 'check_contract_dod_authoring.py' allowlists/scripts_exceptions.yaml
