title: "Ship claude+codex in the runtime effects image with DEV read-only credential mounts"
summary: >-
  Phase B of the canonical CLI coding-agent workflow. omnibase_infra PR #2036 updates the runtime effects
  image to install pinned `codex` and `claude` CLIs, creates runtime-user-owned home directories for their
  state, and wires DEV-lane read-only credential mounts through the service catalog and live compose.
  Credential values are operator-provided host files/directories and are never baked into the image or
  committed. The PR includes DEV-lane proof from the `.201` project: the deployed effects image contains
  both CLIs, mounted credentials authenticate `codex exec` and `claude -p`, and the effects container
  stayed healthy with no rollback needed. Stability, production, and judge lanes are not mutated by this
  evidence.
