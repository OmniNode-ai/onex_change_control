ticket_id: "OMN-13365"
title: "fix(omnimarket): delegation orchestrator terminates cleanly when all tiers fail QG (reconcile
  token accounting)"
summary: >-
  When a delegation escalated through every tier to a reasoning-model ceiling (gemini-2.5-flash) and that
  ceiling re-dispatch also failed the quality gate, node_delegation_orchestrator crashed the dispatcher
  with a pydantic ValidationError instead of emitting a terminal onex.evt.omnibase-infra.delegation-failed.v1
  event. Verified 2026-06-19 reprove on stability-test: the runtime logged "service_kernel: Dispatcher
  'node_delegation_orchestrator.HandlerDelegationWorkflow.delegation_orchestrate_quality_<hash>' failed:
  ValidationError" on CID7 (22:27:19) and CID8 (22:32:21); the delegation-failed topic HWMs never moved
  and those correlation_ids never projected — the terminal outcome was silently lost. Root cause: ModelInferenceResponseData
  carries prompt/completion/total token counts with no sum constraint, and reasoning-model providers bundle
  thinking tokens into total_tokens so total != prompt + completion. Every terminal event the orchestrator
  emits builds the canonical omnibase_core ModelDelegationResult wire DTO, which enforces total_tokens
  == prompt_tokens + completion_tokens via a model_validator. Building it from the raw ceiling response
  therefore raised ValidationError on the all-tiers-failed path. Fix (code-only, one line plus a docstring):
  _record_inference_response now derives inference_total_tokens from prompt_tokens + completion_tokens
  so the wire invariant always holds; prompt_tokens and completion_tokens are preserved exactly as the
  provider reported (they drive cost estimation independently). The provider's bundled reasoning-token
  total is not modeled anywhere downstream and every projection consumer already assumes this invariant,
  so this fixes the crash on EVERY terminal construction path (completed/failed/ all-tiers-failed/omnidash
  compat) — fail closed but TERMINATE, never crash the dispatcher. A regression test (TestAllTiersFailMismatchedCeilingTokensTerminatesCleanly)
  asserts a delegation where every tier fails QG with a non-summing ceiling response emits exactly one
  terminal delegation-failed event with no ValidationError, terminal_failure_reason set, and the full
  escalation_history carried; with the fix reverted these tests reproduce the exact reported ValidationError
  at the terminal construction. Child of OMN-12646 (Delegation, SEA & Model-Routing Quality).
