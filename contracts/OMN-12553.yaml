title: "node_model_eval_orchestrator — measures across tiers, consumes omnimarket routing (does not route)"
summary: >
  Reticketed replacement for the OMN-12473 eval-orchestrator evidence collision. Replaces the plain EvalRunner
  class (src/eval/eval_runner.py run:137) in onex-self-extending-agent with node_model_eval_orchestrator:
  command onex.cmd.sea-eval.model-eval-requested.v1 -> event onex.evt.sea-eval.model-eval-completed.v1.
  The node MEASURES generation quality across declared tiers and does NOT own routing/escalation — tier
  selection consumes omnimarket ModelRoutingDecision events on onex.evt.omnibase-infra.routing-decision.v1.
  The _QUALITY_WEIGHT/_COST_EFFICIENCY_WEIGHT literals moved into the eval_scoring contract (sum-validated 1.0);
  cost-efficiency keys on EnumModelCostBasis (not the deleted _LOCAL_PROVIDERS frozenset); the eval system prompt
  moved into the eval_prompts contract (node_generator_eval_v1). All inference reuses InferenceClient.infer —
  zero httpx added in SEA. Pure scoring.py extracted. eval_runner.py + its tests deleted, __main__ progressive-eval
  rewired to dispatch through the node.
