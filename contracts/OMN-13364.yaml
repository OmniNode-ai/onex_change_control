ticket_id: "OMN-13364"
title: "fix(OMN): deploy-runtime.sh redpanda warmup false-fail + backup-restore reverts vendored migration
  tree"
summary: >-
  Two coupled deploy-runtime.sh defects, observed on the 2026-06-19 stability-test redeploy, made every
  recent stability-test redeploy require manual broker surgery + manual migration rsync and risked silent
  migration loss. (1) warm_broker_topic_provisioning() ran `docker compose up -d --no-deps --wait redpanda`
  and keyed broker readiness off the compose-wait exit status; when the broker container_name collides
  with another project's broker, Docker assigns a random prefix (e.g. 3ed1fdb8d50b_omnibase-infra-redpanda)
  and/or leaves the recreate in 'Created', so `up --wait` errors / never reaches healthy even though a
  healthy broker is already reachable on the lane network, and the bare call aborted under set -e, triggering
  the destructive backup-restore. (2) On that failure with --force, cleanup_on_exit() restored the WHOLE
  pre-build deployment tree including docker/migrations/forward/ (rsynced under docker/ with --delete),
  silently regressing deployed migrations to the backup snapshot (it dropped node_projection_delegation/
  0015_generation_corpus_acceptance.sql). Fix: the compose up --wait is now best-effort (guarded); broker
  readiness is keyed off ACTUAL reachability via assert_broker_reachable(), which resolves the broker
  by compose service label (com.docker.compose.service=redpanda, surviving a Docker name prefix) and probes
  `rpk cluster health` on TCP/9092 inside the lane, so a prefixed name and an already-present healthy
  broker no longer false-fail. snapshot_migration_tree() captures the freshly-synced vendored migration
  tree after sync_files; restore_migration_tree_after_revert() re-applies it (rsync --delete) onto a restored
  tree so deployed migrations always match the build source (origin/dev), never silently losing a forward
  migration. Adds tests/scripts/test_deploy_runtime_warmup_restore.py (8 shell-asserting regression tests).
  Code-only; no .201 mutation. Child of OMN-12651 (Runtime Deployment & Topic/Consumer-Group Provisioning).
