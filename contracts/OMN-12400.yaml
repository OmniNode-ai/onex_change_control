---
schema_version: "1.0.0"
ticket_id: "OMN-12400"
title: "omnidash projection API CORS + stale .env.local block direct dashboard render"
summary: >-
  Close the two OMN-12400 defects with an omnidash-only, contract-native increment. (1) CORS: the dashboard
  never calls the projection API cross-origin — resolveProjectionBaseUrl() returns a relative base when
  VITE_PROJECTION_API_URL is set and the serving layer proxies same-origin /projection/*; this PR documents
  that bridge-only design in .env.example (acceptance part 1, already-resolved via the proxy-relative
  architecture under OMN-12833/OMN-13007). (2) Stale .env.local: a machine-local .env.local pinning VITE_PROJECTION_API_URL
  at a dead port (localhost:8765, retired SEA demo) silently breaks the running machine because Vite loads
  .env.local over .env; this PR adds vite.env-guard.ts assertProjectionEnv() that fails loudly at config-load
  time when projection env points at a banned non-authoritative port (:8765/:3010/:3002), wired into vite.config.ts.
  No new REST route, no backend dependency, no deploy, no topic schema, no envelope, no contract API change.
