title: "B6: bump omnibase_core to v0.45.0 + propagate the core pin to dependents"
summary: >-
  Final phase (B6) of the platform-debt envelope-dedup workstream. The legacy ModelOnexEnvelope public
  API was deleted from omnibase_core in B4 (PR #1250, merged to dev at e9bb51aacac98c6b9ae89f5aa26b2668e6508404),
  collapsing the canonical envelope surface to ModelEventEnvelope[T]. This phase bumps the omnibase_core
  package version from 0.44.2 to 0.45.0 in pyproject.toml — a minor bump under the repo's pre-1.0 semver
  convention for a breaking public-API deletion (the historical bump history shows minor bumps carry breaking/feature
  changes while patch bumps are release-promotion chores). pyproject is the single source of truth for
  the version; __version__ in src/omnibase_core/__init__.py reads dynamically from package metadata via
  version("omnibase-core"), and the IMPORT_COMPATIBILITY_MATRIX doc is historical (v0.4.0) and not version-derived,
  so no matrix hand-edit is required. uv.lock is regenerated so its self-reference reads 0.45.0, and a
  CHANGELOG entry is added under Breaking Changes. The version bump propagates the breaking-deletion signal
  to dependents and triggers cross-repo pin-update bot PRs (omnibase_infra, omnibase_spi, omnimarket,
  omniintelligence); B4 + B5 already removed every live ModelOnexEnvelope reference across those repos
  so the pin bumps stay green. Grep across omnibase_core src/ + tests/ shows zero ModelOnexEnvelope references.
  No Kafka topic schema change, no DDL/migration, no runtime/deploy/.201 mutation. Predecessor B4 (OMN-13196,
  impl PR #1250) is MERGED to dev (merge commit e9bb51aacac98c6b9ae89f5aa26b2668e6508404, the base of
  this work).
