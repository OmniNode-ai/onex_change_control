schema_version: "1.0.0"
ticket_id: "OMN-12819"
title: "Bifrost deployed targets must keep complete endpoint_url authority"
summary: >-
  Fixes the stability-test L7 regression where OMN-12855 correctly propagated the GLM secret refs, but
  the deployed Bifrost contract still reused a stale pre-rendered target with cloud-glm.endpoint_url set
  to a bare provider path. The runtime posts endpoint_url verbatim after OMN-12815, so rendered Bifrost
  HTTP endpoints must be complete chat completion URLs, stale incomplete targets must be regenerated from
  the source/env contract instead of trusted, and the packaged omnimarket source contract must declare
  the GLM endpoint/model/key authority durably. Source-backed stability replay also exposed that the LLM
  endpoint health checker must probe sibling health/model-discovery paths for complete chat-completion
  URLs and must not open the GLM circuit solely because cloud model discovery is auth-gated. Post-health-fix
  replay then exposed that route selection must skip authenticated backends when their declared secret
  reference is unavailable in the active runtime, so OpenRouter is not selected in stability when OPENROUTER_API_KEY
  is absent and GLM fallback remains available.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
