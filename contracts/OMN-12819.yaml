schema_version: "1.0.0"
ticket_id: "OMN-12819"
title: "Bifrost deployed targets must keep complete endpoint_url authority"
summary: >-
  Fixes the stability-test L7 regression where OMN-12855 correctly propagated the GLM secret refs, but
  the deployed Bifrost contract still reused a stale pre-rendered target with cloud-glm.endpoint_url set
  to a bare provider path. The runtime posts endpoint_url verbatim after OMN-12815, so rendered Bifrost
  HTTP endpoints must be complete chat completion URLs and stale incomplete targets must be regenerated
  from the source/env contract instead of trusted.
