schema_version: "1.0.0"
ticket_id: "OMN-14541"
title: "OCC companion for omnimarket#1738 — compliance_sweep missing-routing check implemented for real
  + scanned_count>0 gate"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1738 (OMN-14541, child of OMN-14531 "16/16 sweeps
  structurally blind"). compliance_sweep advertised a "missing-routing" check in ALL_CHECKS, the node
  docstring, and contract.yaml's description with zero implementation behind it — no code path ever emitted
  MISSING_HANDLER_ROUTING. Combined with the shared detector-shelf class defect, an unresolvable/empty
  scan scope (bad repo name, nonexistent target_dirs) silently reported status="compliant" because the
  roll-up only checked `if not violations`, never `handlers_scanned > 0`. The fix: _check_missing_routing
  is now real (a node's canonical contract.yaml handler must be reachable through its own handler_routing
  table — calibrated against the live workspace to zero false positives across 318 real node contracts
  and 3 real contract dialects); ComplianceSweepResult gained contracts_checked + a scanned_count property,
  and handle() refuses to report a verdict (status="error") whenever scanned_count == 0; __main__.py gained
  --target-dirs so the census is collected by real harness code (the CI checkout root), not an operator-typed
  repo name; a new compliance-sweep CI job is wired into the CI Summary required check (fail-closed enforcement,
  not detection). RED-proof: an unresolvable scope refuses (not compliant); a real fixture whose canonical
  handler is absent from its own routing table flips the sweep to violations_found with a MISSING_HANDLER_ROUTING
  violation; the mirror-image correctly-routed fixture stays green; a real-scale regression against a
  clean copy of the omnimarket source tree (827 handlers, 365 contracts) confirms zero false positives.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omnimarket#1738 head implements _check_missing_routing for real (previously MISSING_HANDLER_ROUTING
      was never emitted anywhere), adds contracts_checked/scanned_count and a status=\"error\" refusal
      when scanned_count == 0, adds --target-dirs to __main__.py, and wires a required compliance-sweep
      CI gate into CI Summary — proven by reading the PR head source directly, not merely the implementer's
      own claim."
    command: "see dod_evidence check_values"
emergency_bypass:
