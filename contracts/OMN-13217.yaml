ticket_id: "OMN-13217"
title: "SEA semantic verifier false-REJECTs behaviorally-correct handlers (stdlib import + loose-substring
  fixtures)"
summary: >-
  The OMN-13166 semantic validation layer caught false-greens but the 2026-06-18 dev SEA/complexity matrix
  (dev rev 5abf8c963187) surfaced the inverse failure mode: false-RED. Two distinct sub-defects, both
  producing semantic_passed=false on handlers that are actually correct. (1) The restricted-builtins semantic
  sandbox omitted __import__, so any module-level import — even a safe stdlib "import re", used or merely
  declared — raised ImportError ("__import__ not found") and was recorded as a semantic failure. Evidence:
  dev cell M1-MEDIUM-CAMEL-EXEMPLAR (correct camelCase handler with an UNUSED "import re") and C1-COMPLEX-JSONNORM-EXEMPLAR
  (handler that genuinely USES re). (2) derive_semantic_fixtures matched the bare substring "uppercase"
  inside the structured task "normalizes ticket_id to uppercase OMN-123 form ... returns ticket_id, title,
  and valid boolean" and derived plain whole-string uppercase fixtures (hello -> HELLO) irrelevant to
  the ticket's actual transform, judging the handler against the wrong invariant. Fix: (1) add a controlled
  __import__ to the sandbox builtins that admits a curated, pure, deterministic, I/O-free stdlib allowlist
  (re, string, math, itertools, functools, collections, json, ...) and raises ImportError for everything
  else (os, sys, io, socket, subprocess, pathlib), so correct handlers pass while the I/O prohibition
  that catches malicious/open()/import-os handlers stays intact; (2) decline whole-string casing/reversal
  fixtures for structured/multi-field tasks (JSON object, multiple named outputs, field-targeted normalization),
  and require pascal/camel branches to carry BOTH the strong keyword AND snake_case framing. Regression
  tests assert: correct handler importing re passes (used + unused), the safe stdlib set imports, I/O
  modules + open() are still blocked, the structured json-normalizer derives no whole-string fixtures,
  genuine whole-string upper/lower still derive, and the OMN-13166 behaviorally-wrong impostor still fails
  even with an import present (no OMN-13166 regression).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
