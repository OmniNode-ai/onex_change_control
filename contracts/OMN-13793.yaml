title: "docs(OMN-13793): standardize on kubectl-ssm.sh for cloud k3s access"
summary: >
  Direct kubectl to the k3s API server (52.2.16.208:6443) is SG-blocked for most operator networks. Operators
  were hand-rolling raw "aws ssm send-command" calls or implying a direct-kubectl SSM tunnel because README.md
  and docs/CLUSTER_SETUP.md never pointed at the existing scripts/kubectl-ssm.sh wrapper (OMN-3673, safe/guarded/blocked
  verb classification). This ticket points README.md, docs/CLUSTER_SETUP.md, and AGENT.md at the wrapper
  as the standard remote-kubectl path and notes the cluster security group is owned by the contractor
  lane (OMN-12984/12985/12986/13771/10687) — no SG, k8s, or terraform change is made or requested.
