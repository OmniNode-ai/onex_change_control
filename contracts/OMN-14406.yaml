title: "OCC companion for omnimarket#1731 — reconcile node_occ_companion_compute per-entry hash to core.compute_contract_entry_sha256"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1731 (OMN-14406). node_occ_companion_compute (the
  RSD-1 OCC-companion producer, OMN-14285) minted contract_entry_sha256 from a private _entry_sha256 preimage
  (ticket_id|evidence_id|check_value|commit_sha) that omnibase_core's canonical compute_contract_entry_sha256
  can never recompute -- that function hashes the canonical-JSON of the parsed dod_evidence entry plus
  a pinned header subset (ticket_id, schema_version), and commit_sha is absent from the contract entirely.
  check_receipt_contract_binding gives contract_entry_sha256 strict precedence over the legacy whole-file
  hash, so 100% of receipts the producer minted failed the gate with an "entry hash mismatch" -- an OMN-14208
  PAIR_INCOMPATIBLE seam (the producer and the gate were each individually green, but never matched field-by-field,
  so wiring anything on top of the producer before this fix is an immediate 100% hard-fail). The merged
  #1717 attestation oracle's deterministic_fingerprint folds the same wrong hash, poisoning that surface
  too. This ticket was the hard prerequisite blocking the entire OCC autogen-producer thread (docs/handoff/2026-07-13-0035Z-rsd-factory-seam-reaping-handoff.md
  §5). The fix deletes the private preimage and calls core's canonical compute_contract_entry_sha256 over
  the producer's own rendered/parsed contract; a receipt whose evidence_item_id is not a declared dod_evidence
  item (the OCC self-bind receipt) now carries no per-entry hash, mirroring the born-path emitter's existing
  invariant. The evidence below is product-observing (reads the omnimarket PR head directly) plus the
  independent RED-then-GREEN reproduction of the new cross-boundary gate-binding test suite.
is_seam_ticket: true
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omnimarket#1731 head reconciles node_occ_companion_compute's per-entry hash to core's
      canonical compute_contract_entry_sha256, proven by a cross-boundary gate-binding test suite that
      drives the actual gate functions (check_receipt_contract_binding + compute_contract_entry_sha256),
      independently reproduced RED (pre-fix, exact 'entry hash mismatch') then GREEN (post-fix)."
    command: "see dod_evidence check_values"
