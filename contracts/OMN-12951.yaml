schema_version: "1.0.0"
ticket_id: "OMN-12951"
title: "Port overseer observer Protocol handlers to concrete ABCs"
summary: >
  omnimarket's node_overseer_observer declared EvidenceEvaluator and SideEffectObserver as runtime-checkable
  typing.Protocol classes. The infra 0.37.0 handler resolver instantiates zero-arg handler_cls values
  directly, so resolving either Protocol as a handler raised TypeError ("Protocols cannot be instantiated")
  during runtime bootstrap. omnimarket PR #1364 ports those declarations to abc.ABC + abstract methods,
  keeps the Null implementations concrete, and adds regression coverage for Protocol removal, abstract
  instantiation, and concrete subclass behavior.
