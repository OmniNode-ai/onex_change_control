schema_version: "1.0.0"
ticket_id: "OMN-13345"
title: "fix(omnimarket): thread contract-declared backend max_tokens through delegation escalation re-dispatch"
summary: >-
  The bus-native delegation pipeline (onex.cmd.omnibase-infra.delegation-request.v1 -> node_delegation_orchestrator
  -> node_delegation_routing_reducer) discarded the contract-declared per-backend output-token ceiling
  (cloud-glm declares max_tokens 65536 in bifrost_delegation.yaml) and posted the delegation request's
  max_tokens instead, which is structurally pinned at the small DELEGATION_MAX_TOKENS_HARD_LIMIT default.
  Cloud GLM then truncated output (finish_reason=length) and the quality gate scored low on every escalated
  cloud up-tier. Same defect class as OMN-13342 (node_generation_consumer), but a separate node path and
  NOT covered by it — this is the path the live prober exercised for the delegation-request command and
  the escalation re-dispatch through the routing reducer. The routing reducer loaded backends into BifrostBackendRef
  (no max_tokens slot, value read then dropped) and ModelRoutingDecision threaded timeout_ms but had no
  max_tokens field, so the ceiling never reached the orchestrator. This fix adds a max_tokens slot to
  BifrostBackendRef (populated from backend.max_tokens), adds max_tokens (Field ge=1) to ModelRoutingDecision
  (threaded from backend.max_tokens in the reducer), and posts decision.max_tokens on the wire at both
  orchestrator inference-intent construction sites (initial dispatch, escalation re-entry, and compliance-repair
  re-dispatch) — fail-closed >= 1, no hardcoded literal. Regression tests assert the inference intent
  posts the contract backend ceiling (explicit non-default value and the production cloud-glm 65536) on
  the initial routing decision and the escalation re-entry, and that the routing decision carries the
  contract-declared ceiling. Child of OMN-12646 (Delegation, SEA & Model-Routing Quality).
