schema_version: "1.0.0"
ticket_id: "OMN-13949"
title: "Concurrency cancel-in-progress + job timeouts to kill superseded/zombie runs (SAT1)"
summary: >-
  Fleet-load reduction (Track 1, OMN-13932 §5.2 / SAT1). Superseded and zombie CI runs were occupying
  saturated self-hosted runners. omnibase_infra PR #2209 adds top-level concurrency groups with cancel-in-progress:true
  to PR-triggered check/test/gate workflows (killing superseded PR runs) and normalizes five workflows
  that previously kept superseded PR runs alive. The concurrency group keys on PR number falling back
  to github.ref; merge_group entries carry a unique github.ref so distinct queue entries never cross-cancel
  and required contexts still report. Deploy/release/prod-mutation/tag workflows (release, release-python-reusable,
  build-and-push-*, auto-tag-on-merge, runtime-rebuild-trigger, prod-promotion-lineage) are deliberately
  excluded — they stay serialized (cancel:false) or untouched so an in-flight prod build/tag/deploy is
  never cancelled. A safety-net timeout-minutes is added to every job that lacked one so a hung job cannot
  hold a runner indefinitely. This is CI-configuration evidence only; no runtime deploy, restart, docker
  exec, rpk topic produce, AWS mutation, or live cluster mutation was performed.
