title: "WS-D/D2 merge-sweep delegation harness Slice 0 — deterministic ruff-fix path"
summary: >-
  Builds the merge-sweep delegation harness with zero LLM calls, proving the risky plumbing (worktree
  resolution, safety-gate refusal/rollback, commit-with-trailer, re-entry into the existing gate/verify/push
  flow) before any model-authored diff lands in Slice 1. omnimarket PR #1612 delivers: RECEIPT_FAILURE
  split out of the delegatable branch (safety bar #5); a delegation eligibility gate (path/keyword denylist
  + blast-radius size gate + persistent two-strike escalation store); the new node_pr_delegated_fix_effect
  (deterministic ruff format/check --fix, defense-in-depth re-check on the actual diff, commit-with-trailer,
  re-entry into node_pr_polish via CLI with --skip-repair-dispatch --no-automerge so a delegated fix never
  self-arms auto-merge); a fix for a pre-existing bug where node_pr_polish always dispatched a redundant
  repair-worker agent even when an already-fixed worktree was supplied; and delegation counters wired
  through the fix-effect result, the orchestrator's FixResult aggregate, and the sweep-level result. It
  also binds omniclaude PR #1861, which removes the stale executable cron quarantine so the periodic merge-sweep
  entrypoint can reach runtime dispatch.
