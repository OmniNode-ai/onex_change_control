ticket_id: "OMN-13405"
title: "Workspace build vendors omnibase_core from the dev-HEAD clone"
summary: >-
  Make the workspace-mode runtime image (omnibase_infra docker/Dockerfile.runtime, staged by scripts/runtime_build/stage_workspace.sh)
  install omnibase_core from the staged dev-HEAD clone instead of the lock-pinned released wheel. The
  image previously installed omnibase_core only from omnibase_infra/uv.lock + pyproject [tool.uv.sources]
  (a released 0.45.0 git rev predating dev enum modules); omnimarket dev imports omnibase_core.enums.enum_correction_failure_axis
  at module import, so the enum-less wheel crash-looped omnimarket-projection-api and the runtime kernel.
  The fix stages omnibase_core, then reinstalls it from the staged tree defeating [tool.uv.sources] (install
  run from / with --no-sources + explicit file:// direct reference + --no-cache + --reinstall-package),
  and adds omnibase_core to the build-provenance WORKSPACE_PACKAGES so a future regression fails the build.
  release mode is unchanged (core from the lock). Proven by a cold dev-lane bring-up coming up HEALTHY:
  runtime + effects + projection-api running/healthy restarts=0, projection-api no longer crash-loops,
  broker EventBusKafka, migration ledger 0017/0018/0019 applied. Shipped on omnibase_infra PR #2058.
