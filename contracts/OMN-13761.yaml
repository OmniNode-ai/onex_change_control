---
schema_version: "1.0.0"
ticket_id: "OMN-13761"
title: "feat(OMN-13761): durable node-level ECR credential refresh (Candidate B) + Candidate A hostNetwork
  unblock"
summary: >-
  Prod/dev ecr-cred pulls silently die every ~12h because the in-pod ecr-secret-refresh CronJob (OMN-13749
  #527) cannot authenticate on this k3s cluster (IMDS hop-limit=1 drops pod metadata requests, no IRSA
  fallback). omninode_infra PR #539 provisions the durable node-level systemd timer (ecr-cred-refresh.service/.timer)
  via terraform user_data on the k3s server node, mirrored across aws/cluster (prod) and aws/cluster-dev
  (dev) user_data templates, per docs/plans/2026-07-01-omn-13749-ecr-token-refresh-design.md Candidate
  B. It also fixes the legacy in-pod CronJob into a functional same-day fallback (Candidate A, hostNetwork:
  true), extends pod-crash-alerts.yaml with the OnexDevPodImagePullBackOff refresh-failure alert (parity
  with the existing prod alert) and repoints both alerts' diagnostics at the node timer, and adds a permanent
  regression test (tests/scripts/test_ecr_cred_refresh_timer.py) asserting template parity, refresh cadence,
  and namespace-list sync. This PR authors the terraform/CI/alerting change only; no terraform apply (dev
  or prod) was performed — no terraform/tofu binary is available in the authoring environment. Prod apply
  additionally requires a fresh CODEOWNERS-approved prod-promotion grant per CLAUDE.md §2a/§12 and is
  explicitly flag-before-fire.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
