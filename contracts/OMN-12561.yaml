---
schema_version: "1.0.0"
ticket_id: "OMN-12561"
title: "Release omnibase_core v0.43.0 and omnibase_infra v0.38.0"
summary: >
  Publishes central release evidence for the paired omnibase_core v0.43.0 and omnibase_infra v0.38.0 release
  PRs. The infra release is bound to the core 0.43.0 release head so dependency resolution and installed-package
  checks use omnibase-core 0.43.x, not the stale 0.42.0 main lock source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_core replacement PR #1190 release lock and install checks pass at v0.43.0."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-core-pr-1190-release/command.yaml"
  - kind: "manual"
    description: "omnibase_infra replacement PR #1827 release lock resolves and install-checks against
      omnibase-core 0.43.0."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-infra-pr-1827-core-043-lock/command.yaml"
  - kind: "manual"
    description: "onex_change_control PR #2029 retargets the release receipts to replacement PR identities."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-occ-pr-2029-retarget/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-core-pr-1190-release"
    description: >
      omnibase_core replacement PR #1190 release head declares version 0.43.0 and passes uv lock --check,
      uv sync, and uv pip check.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-core-pr-1190-release/command.yaml
          && grep -q '^pr_number: 1190$' drift/dod_receipts/OMN-12561/dod-core-pr-1190-release/command.yaml
          && grep -q '^commit_sha: \"4ffca7643294fcad4f9654f4d1839ca8002b4454\"$' drift/dod_receipts/OMN-12561/dod-core-pr-1190-release/command.yaml"
  - id: "dod-infra-pr-1827-core-043-lock"
    description: >
      omnibase_infra replacement PR #1827 release lock/source resolves omnibase-core to version 0.43.0
      at the paired core release head, and uv pip check passes after syncing the repaired lock.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-infra-pr-1827-core-043-lock/command.yaml
          && grep -q '^pr_number: 1827$' drift/dod_receipts/OMN-12561/dod-infra-pr-1827-core-043-lock/command.yaml
          && grep -q '^commit_sha: \"63733e545202060a7a9d18a8f8137176c29ac25f\"$' drift/dod_receipts/OMN-12561/dod-infra-pr-1827-core-043-lock/command.yaml"
  - id: "dod-occ-pr-2024"
    description: >
      onex_change_control PR #2024 carries the OMN-12561 central contract and release receipt bundle for
      downstream Evidence-Source binding.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-occ-pr-2024/command.yaml
          && grep -q '^pr_number: 2024$' drift/dod_receipts/OMN-12561/dod-occ-pr-2024/command.yaml"
  - id: "dod-occ-pr-2029-retarget"
    description: >
      onex_change_control PR #2029 carries the OMN-12561 receipt retarget from old draft PR identities
      to replacement release PR identities.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-occ-pr-2029-retarget/command.yaml
          && grep -q '^pr_number: 2029$' drift/dod_receipts/OMN-12561/dod-occ-pr-2029-retarget/command.yaml"
