    description: "onex_change_control replacement evidence PR carries the OMN-12561 compat PR #130 receipt binding."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-occ-pr-compat-130-evidence/command.yaml"
  - kind: "manual"
    description: "omniclaude PR #1717 release dependency lock resolves to the paired core and infra release
