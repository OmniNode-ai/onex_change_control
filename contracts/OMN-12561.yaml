schema_version: "1.0.0"
ticket_id: "OMN-12561"
title: "Release omnibase_core v0.43.0 and omnibase_infra v0.38.0"
summary: >
  Publishes central release evidence for the paired omnibase_core v0.43.0 and omnibase_infra v0.38.0 release
  PRs. The infra release is bound to the core 0.43.0 release head so dependency resolution and installed-package
  checks use omnibase-core 0.43.x, not the stale 0.42.0 main lock source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_core replacement PR #1190 release lock and install checks pass at v0.43.0."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-core-pr-1190-release/command.yaml"
  - kind: "manual"
    description: "omnibase_infra replacement PR #1827 release lock resolves and install-checks against
      omnibase-core 0.43.0."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-infra-pr-1827-core-043-lock/command.yaml"
  - kind: "manual"
    description: "onex_change_control PR #2029 retargets the release receipts to replacement PR identities."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-occ-pr-2029-retarget/command.yaml"
  - kind: "manual"
    description: "omnibase_compat PR #128 release lock and regression checks pass at v0.4.2 without upstream
      runtime dependencies."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12561/dod-compat-pr-128-release/command.yaml"
