schema_version: "1.0.0"
ticket_id: "OMN-12636"
title: "fix: node_dirty_canonical_sweep bases rescue worktree on canonical HEAD, not origin/<base>"
summary: >-
  Epic OMN-7466 / skill /onex:ship_dirty_canonical. HandlerDirtyCanonicalSweep._ship_repo (omnimarket/src/omnimarket/nodes/node_dirty_canonical_sweep/handlers/handler_dirty_canonical_sweep.py)
  created the rescue worktree from origin/<base_branch> (dev) and copied the canonical clone's dirty file
  CONTENTS onto that base. git status --porcelain reports dirtiness relative to the clone's actual HEAD,
  not origin/<base>; when the clone is behind dev these reference points diverge and the copy reverts
  already-merged dev commits, producing a regressive partial PR. Observed 2026-06-03: omnibase_infra canonical
  clone was 20 commits behind dev -> the node produced PR #1845 with only 11 of 31 dirty files (+50/-329),
  reverting already-merged dev work; it was closed and re-shipped as #1846. Fix (omnimarket PR #1023):
  resolve the canonical clone HEAD via `git rev-parse HEAD` (new _canonical_head helper) and branch the
  rescue worktree from that SHA, so copied dirty contents land on the same tree they were diffed against;
  the PR base on GitHub remains <base_branch> (dev) via --base. This OCC PR also carries the paired OMN-12635
  fix (untracked-directory crash) shipped in the same omnimarket PR.
