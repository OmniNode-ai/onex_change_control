---
schema_version: "1.0.0"
ticket_id: "OMN-13534"
title: "fix(OMN-13534): data_flow_sweep dispatch crash on forbidden collect key + shared flow resolution"
summary: >
  The onex skill data_flow_sweep (RuntimeLocal dispatch) path crashed: the skill_mapping injects collect:
  false into the dispatch payload, but DataFlowSweepRequest declared only flows + dry_run with extra="forbid",
  so the default payload was rejected with extra_forbidden and the prescribed skill invocation could not
  run at all. collect lived only as a __main__ argparse flag, and _DEFAULT_FLOW_STUBS + live collection
  lived only in __main__.py (which the dispatch path never executes) — so even past the crash a no-arg
  dispatch classified zero flows and false-cleaned. The fix (mirroring the merged OMN-13514 compliance_sweep
  reconciliation) adds collect: bool to DataFlowSweepRequest and moves the built-in critical-chain descriptors
  + _collect_live + a shared resolve_flows() into the handler module, so both the CLI and the dispatch
  path resolve flows identically and collect=True runs the live rpk/psql collector on the dispatch path.
  The gap python3.12 default-scope defect was already fixed under OMN-13538 (PR #1363, which credits OMN-13534);
  node_gap_compute's live probes are by-design out of the deterministic compute path (lane targeting tracked
  in OMN-13552). The OMN-13514 .201 venv redeploy is a runtime action tracked separately, not folded into
  this code PR.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
