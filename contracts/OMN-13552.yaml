        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13552/dod-live-201-verdict/command.yaml"
  - id: "dod-fail-loud-unreachable"
    description: >-
      Unreachable target lane fails LOUD. Pointing the dev lane at an unroutable host (192.0.2.1, TEST-NET-1)
      yields status=error, broken=0, exit 2 — never a false PRODUCER_DOWN-as-broken or false-clean for
      a lane that was never actually probed.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q 'PASS' drift/dod_receipts/OMN-13552/dod-fail-loud-unreachable/command.yaml"
