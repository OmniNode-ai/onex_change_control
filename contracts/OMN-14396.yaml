ticket_id: "OMN-14396"
title: "fix(OMN-14396): contract_model_ref override must respect use_for on id collision"
summary: >-
  omnimarket PR #1720 fixes a local-first routing bug: routing_tiers.yaml's local tier declares two backends
  (local-coder, local-heavy-reasoning) that share the model id Qwen3.6-35B-A3B for different capabilities.
  _select_model_for_task's contract_model_ref loop matched on model.id alone, so a task-class override
  pointing at that shared id always resolved to whichever backend was declared first (local-coder), even
  when local-coder does not declare the task type. A live incident (2026-07-11T16:27:43Z stability-test)
  showed task_type=research routed to local-coder, whose failure then escalated the whole local tier to
  cloud (z.ai glm-5.2, itself quota-exhausted). The fix disambiguates an id collision by preferring the
  match whose use_for declares the task type, falling back to the first id match (unchanged) only when
  none of the id matches declare it — preserving the OMN-10942/13140 explicit-pin override behavior for
  the common single-match case. Independently verified (S-C adversarial verifier, not the implementer):
  RED-before/GREEN-after reproduced against the two new regression tests, the duplicate-id premise confirmed
  against the real routing_tiers.yaml/task_class_contracts.v1.yaml, a live before/after probe against
  the real config showing the fix also silently corrects reasoning/planning/review (same root cause, not
  disclosed in the PR body, no regression), the 752-passed/2-skipped delegation suite reproduced locally,
  and CI red classified as occ-preflight cascade only (no independent failures). Proof class is code-only
  / test-proven -- delegation_events was empty on stability-test postgres so the live incident could not
  be replayed.
