ticket_id: "OMN-13057"
title: "fix(omnidash): SEA Control Plane view clips bottom ~52px — .main overflow-y:hidden / missing inner
  scroll"
summary: >-
  The SEA Control Plane full-page view (.ev-root inside .main) was clipped at the viewport: .ev-root used
  display:block + min-height:100% which does NOT participate as a flex child of .main (display:flex, overflow:hidden).
  Content grew to scrollHeight=2566px while .main clipped at 912px, making ~1706px unreachable. .ev-scroll
  had overflow-y:auto but clientHeight equaled scrollHeight (no height constraint), so the inner scroll
  never activated. Fix in src/styles/event-dash.css: .ev-root → display:flex + flex-direction:column +
  flex:1 + min-height:0; .ev-scroll → flex:1 + min-height:0 (overflow-y:auto already present). After fix:
  .ev-root fills .main at 860px (912 - 52px topbar), .ev-scroll constrains to 759px with scrollHeight=2465
  — inner scroll active and all content reachable. Adds EvPageShell.test.tsx with 8 structural DOM regression
  tests. No runtime paths, no Kafka topics, no handler/contract changes.
