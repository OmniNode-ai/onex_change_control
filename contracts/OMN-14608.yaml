---
schema_version: "1.0.0"
ticket_id: "OMN-14608"
title: "OCC companion for omnimarket#1760 — node_codegen_outcome_reducer + real codegen golden chain"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1760 (OMN-14608 / OMN-14403 G1). #1760 closes the
  tier-4a codegen dead-chain: the hybrid-codegen ORCHESTRATOR subscribes to codegen-{validation,typecheck,serialize}-outcome.v1,
  but nothing in src/ produced them — the three pure downstream nodes emit RAW verdicts that carry no
  pipeline state (their request models are extra="forbid", so they cannot echo it). On a real bus the
  factory died after the validate command; the golden-chain test only passed because a test-only _DownstreamHarness
  hand-rolled the missing reducer and doubled three of six legs (OMN-14208: individually green, silent
  runtime no-op). The fix builds node_codegen_outcome_reducer (definition B — handle(request) dispatched
  by isinstance, never imports ModelEventEnvelope) which seeds a per-correlation ModelCodegenPipelineState
  store from codegen-llm-generated.v1 and joins each raw verdict back to the retained state on correlation_id,
  republishing the state-carrying *Outcome event the orchestrator expects. contract.yaml wires all four
  subscribe topics with topic_match + a per-topic event_model + explicit message_category: event (the
  OMN-14534/OMN-14605 mixed-category dispatch-trap fix pattern), and the golden-chain test is rebuilt
  to drive the REAL validator/mypy/serialize handlers plus the real reducer over the actual in-memory
  bus, deleting _DownstreamHarness entirely. Every substantive check below is a CONTENT READ pinned to
  #1760's head commit SHA (f64e53747e2a755ec624222089cc664e87c947c4). It observes the source code #1760
  actually wrote, so it does not depend on #1760's CI — which matters here because #1760's CI is red precisely
  BECAUSE this contract was missing (occ-preflight/eligibility -> missing Evidence-Source, cascading into
  CI Summary, Hostile Review Gate, Omni Standards Gate, PR Arch Review Gate, OCC Preflight Dependency).
  A check keyed on #1760's own CI would be circular. No check greps this repo's own receipt corpus for
  "status: PASS". Each product-tree read below carries its own RED control: the same command at omnimarket
  dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22, the fix's base commit, where node_codegen_outcome_reducer
  does not exist at all and the old test still used _DownstreamHarness) finds zero/wrong-direction occurrences
  and would fail.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnimarket#1760 head SHA builds node_codegen_outcome_reducer and retires _DownstreamHarness
      from the golden chain"
    command: "see dod_evidence check_values (content reads pinned to f64e5374)"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1760-reducer-handler-exists"
    description: >-
      Product-observing: reads the actual source of handler_codegen_outcome_reducer.py at #1760's exact
      head commit SHA (f64e53747e2a755ec624222089cc664e87c947c4) via the GitHub contents API and asserts
      it defines class HandlerCodegenOutcomeReducer — the new node this ticket builds, whose handle(request)
      joins each raw downstream verdict to the retained per-correlation pipeline state. This reads the
      product tree, not this receipt; nothing in the command touches the OCC checkout, so it cannot pass
      merely because someone wrote "status: PASS" in a receipt. RED DIRECTION: the file does not exist
      at all at omnimarket dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22) — the contents API returns
      404, so the command finds zero occurrences and exits 1; it exits 0 only at a ref where the node
      genuinely exists (head SHA: grep -c == 1).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_codegen_outcome_reducer/handlers/handler_codegen_outcome_reducer.py?ref=f64e53747e2a755ec624222089cc664e87c947c4"
          --jq .content | base64 -d | grep -c "class HandlerCodegenOutcomeReducer:")" -ge 1
  - id: "dod-verify-1760-topic-match-four-event-entries"
    description: >-
      Product-observing: reads the actual contract.yaml of node_codegen_outcome_reducer at #1760's head
      commit SHA and asserts it declares exactly 4 handler_routing entries with message_category: event
      — one per subscribed topic (codegen-llm-generated.v1 seed leg plus the three verdict-join legs).
      This is the OMN-14534/OMN-14605 dispatch-trap fix pattern: an explicit per-topic message_category
      is what lets the real MessageDispatchEngine route each event to handle() instead of mis-stamping
      it from subscribe_topics[0] (a mixed-category NO_DISPATCHER drop). RED DIRECTION: this contract.yaml
      does not exist at all at dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22) — 404 from the contents
      API, zero occurrences, exit 1; it exits 0 only at #1760's head (grep -cE match == 4).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_codegen_outcome_reducer/contract.yaml?ref=f64e53747e2a755ec624222089cc664e87c947c4"
          --jq .content | base64 -d | grep -cE "^\s+message_category: event$")" -eq 4
  - id: "dod-verify-1760-downstream-harness-retired"
    description: >-
      Product-observing: reads the actual test_golden_chain_composition.py at #1760's head commit SHA
      and asserts the synthetic class _DownstreamHarness (the test-only fabricator that hand-rolled the
      missing reducer and hardcoded is_valid=True/success=True, doubling three of six legs — OMN-14208)
      is genuinely GONE from the test's code, not merely renamed in a comment. This is the net-negative-surface
      retirement proof: the golden chain now drives the real reducer end-to-end instead of a fabricator.
      RED DIRECTION: the identical command at omnimarket dev HEAD (c624422dbe5a5dc246c54c318f44d00fbed9ec22)
      finds the harness's real class definition (grep -c "^class _DownstreamHarness" == 1 there) and would
      exit 1 against this check's == 0 assertion; it is == 0 only at #1760's head, where only a historical
      docstring sentence mentions the name (no "^class _DownstreamHarness" line remains).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/tests/nodes/node_hybrid_codegen_orchestrator/test_golden_chain_composition.py?ref=f64e53747e2a755ec624222089cc664e87c947c4"
          --jq .content | base64 -d | grep -c "^class _DownstreamHarness")" -eq 0
  - id: "dod-deploy-assessment-1760"
    description: >-
      Deploy-gate assessment for omnimarket#1760. The PR adds a new node (contract + handler + models
      edits + tests) and touches no Dockerfile, compose file, or deploy script — it is a source-change/new-node
      addition, not a live runtime rollout. The PR's own body is explicit that real-runtime dispatchability
      is P3a-gated (the orchestrator needs a def-B re-signature before onex run-node can reach it) and
      this reducer is replay-proven, not yet live-readback — no deploy or .201 mutation is claimed or
      required by this evidence. Falsifiable: the command fails if the PR diff ever grows a Dockerfile/compose/deploy-script
      change.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          ! (gh pr diff 1760 --repo OmniNode-ai/omnimarket --name-only | grep -qE "docker-compose|Dockerfile|deploy/")
  - id: "dod-occ-self-bind-pr-4608-companion"
    description: >-
      Self-bind receipt for this OCC evidence companion. Binds an OMN-14608 PASS receipt to this companion's
