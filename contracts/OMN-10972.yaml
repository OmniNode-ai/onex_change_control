---
schema_version: "1.0.0"
ticket_id: "OMN-10972"
title: "Gate hardening epic for advisory CI gates"
summary: >
  Central OCC evidence for the OMN-10972 gate hardening sweep. Existing evidence binds omnibase_core PR
  #1106; this contract also binds omniclaude PR #1604, which flips five advisory omniclaude gates to blocking
  and repairs the strict typing fallout needed for those gates.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
  - kind: "ci"
    description: "omnibase_core PR #1106 visible non-evidence checks pass at the recorded head."
    command: "gh pr checks 1106 --repo OmniNode-ai/omnibase_core"
  - kind: "tests"
    description: "Local gate-hardening validation commands pass in the product worktree."
    command: "uv run mypy src/ --strict && uv run python scripts/check_node_purity.py --verbose"
  - kind: "manual"
    description: "Deploy-gate assessment records that no live deploy or restart is required before merge."
    command: "printf '%s\n' 'deploy-gate: no live deploy required before merge'"
  - kind: "ci"
    description: "omniclaude PR #1604 is open at the recorded OMN-10972 gate-hardening head."
    command: "gh pr view 1604 --repo OmniNode-ai/omniclaude --json state,headRefOid,url"
  - kind: "manual"
    description: "No live deploy, restart, .201 mutation, or runtime mutation was performed for the omniclaude
      evidence repair."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10972/dod-omniclaude-deploy-assessment/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnibase-core-pr-1106"
    description: "omnibase_core PR #1106 is open against main at the recorded gate-hardening head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omnibase-core-pr-1106/command.yaml\"
          && grep -q '^commit_sha: \"261feab293cef28d51bd7a44ef551aac331d6891\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omnibase-core-pr-1106/command.yaml\""
  - id: "dod-local-gate-validation"
    description: "Local gate validation commands passed for the product worktree."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-local-gate-validation/command.yaml\"
          && grep -q 'Success: no issues found' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-local-gate-validation/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "Deploy-gate evidence for the runtime-path typing cleanup in cli_run_node.py."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "printf '%s\n' 'deploy-gate: no live deploy, docker exec, or rpk topic produce required
          before merge' | grep -q 'deploy' && grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr"
    description: "onex_change_control PR carries the OMN-10972/OMN-11156 through OMN-11160 evidence bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-occ-pr/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10972\"' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-occ-pr/command.yaml\""
  - id: "dod-omniclaude-pr-1604"
    description: "omniclaude PR #1604 is open against main at the recorded OMN-10972 gate-hardening head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omniclaude-pr-1604/command.yaml\"
          && grep -q '^pr_number: 1604$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omniclaude-pr-1604/command.yaml\"
          && grep -q '^commit_sha: \"0719a0d7a9252241f384ff3d1c647f1c4a066328\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omniclaude-pr-1604/command.yaml\""
  - id: "dod-omniclaude-deploy-assessment"
    description: "No live deploy or runtime mutation was performed for the omniclaude PR #1604 evidence
      repair."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omniclaude-deploy-assessment/command.yaml\"
          && grep -q 'No live deploy' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-omniclaude-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr-1604"
    description: "onex_change_control PR carries the central OMN-10972 omniclaude PR #1604 evidence bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-occ-pr-1604/command.yaml\"
          && grep -q '^ticket_id: \"OMN-10972\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-10972/dod-occ-pr-1604/command.yaml\""
