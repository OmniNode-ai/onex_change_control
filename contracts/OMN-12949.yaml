ticket_id: "OMN-12949"
title: "P2-5c context-ROI E2E battery orchestrator (task x arm x trial harness)"
summary: >
  Lands the context-ROI E2E battery orchestrator (scripts/run_context_roi_battery.py) in omnimarket. The
  orchestrator drives a full (task x arm x trial) context-ROI experiment battery end-to-end by wiring
  three already-built nodes (no node rebuilt): the EFFECT node_context_roi_runner (OMN-12798), the canonical
  7-arm factor matrix (OMN-12797), and the COMPUTE scorer node_context_roi_compute (OMN-12796). It builds
  the E1-E6 difficulty ladder as the default task battery (so cells span difficulties and escalation-relevant
  cells exist), constructs arms from build_canonical_factor_matrix (including the permanent full_guidance_negative_control),
  invokes the runner per cell over an injected bus, translates runner ModelAttemptReductionRow rows into
  scorer ModelArmRunRow rows, feeds the scorer in fixture_mode (REPLAY_PROVEN), and writes a result artifact
  JSON plus a correlation-ID manifest that tags every cell experiment + arm + cell with selection_reason=experiment_assignment
  + experiment_cohort (Context Authority Rule). Dry-run mode validates the full wiring with zero bus traffic.
  Content resolution flows through the runner's artifact_content_map seam, never hardcoded artifact paths.
  No in-process GenerationConsumer import, no kafka_runner, no hardcoded topic literals; runner stays
  EFFECT, scorer stays pure COMPUTE. Code-only change (one new script + one new test); no runtime topology,
  topic schema, or contract API change. Applies on the next normal omnimarket image rebuild.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
