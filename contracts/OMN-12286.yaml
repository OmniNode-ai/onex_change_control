title: "feat(OMN-12286): wire --agent scaffold to DelegationExecutor local-first routing"
summary: >-
  Root cause D3: scaffold_onex_node hardcoded entry_for_tier(CLOUD_FALLBACK), raising ValueError when
  ONEX_TRACK_A_API_KEY is unset before any bus publish. Local Qwen was healthy but never called. Fix:
  scaffold_onex_node now builds a DelegationExecutor from load_default_config() which produces a local-first
  tier ladder (coding_primary → reasoning_fallback → cloud_fallback) from model_registry.yaml. SEA owns
  no ladder/escalation logic — routing decision is consumed from the existing delegation config. Also
  adds explicit fail-fast when cloud_api_key is None before ADK root agent construction.
