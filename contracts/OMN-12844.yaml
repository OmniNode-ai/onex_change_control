title: "M4 — Exploration policy: contract-config bandit + effectiveness decay"
summary: >
  omnimarket PR #1315 adds node_context_exploration_policy_compute, a pure COMPUTE node that replaces
  the greedy argmax in node_context_roi_compute (_select_preferred_arm) with a probabilistic explore/exploit
  bandit over scored, decay-adjusted capsule candidates. Prevents cold-start starvation and winner lock-in.
  Every bandit parameter is resolved from the contract config block into a frozen ModelExplorationPolicyConfig
  — never module-level constants or env. Consumes M2's (OMN-12842) already-decayed confidence; never recomputes
  decay. Deterministic given a typed seed; no I/O, no bus, no inference, no datetime.now(), no ambient
  random(). Six TDD invariant tests RED-before-implementation then GREEN; full suite 7696 passed / 0 failed;
  mypy --strict clean; runtime sweep 316/316 routable.
