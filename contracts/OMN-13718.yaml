---
schema_version: "1.0.0"
ticket_id: "OMN-13718"
title: "[Bug] plan_to_tickets — documented invocation broken (--plan-path unknown; positional → unresolved
  input_model)"
summary: >-
  Two-repo fix restoring the documented `onex skill plan_to_tickets --plan-path <file> --dry-run` invocation.
  (1) omnibase_infra: skill_mapping.yaml declared plan-path with positional:true, causing --plan-path
  to be rejected as an unknown flag. Removing positional:true registers it as a named required option.
  (2) omnimarket: node_plan_to_tickets/contract.yaml lacked a top-level input_model field, causing RuntimeLocal's
  event-driven path to refuse to seed the initial command envelope and exit with result=failed. Adding
  input_model + event_model on the handler_routing entry mirrors the pattern from node_dod_verify (OMN-13253).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "PASS receipts bind the omnimarket runtime-local proof, no-runtime-mutation assessment,
      and this OCC PR self-binding."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13718/dod-runtime-local-proof/command.yaml
      && grep -q '^status: PASS$' drift/dod_receipts/OMN-13718/dod-no-runtime-mutation/command.yaml &&
      grep -q '^status: PASS$' drift/dod_receipts/OMN-13718/dod-occ-self/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-runtime-local-proof"
    description: >-
      RuntimeLocal executes node_plan_to_tickets end-to-end with a plan fixture and produces result=completed,
      exit_code=0, terminal_payload.status=parsed, entry_count=2. Before the fix this test would fail
      with 'could not resolve initial-payload model for contract node_plan_to_tickets'.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13718/dod-runtime-local-proof/command.yaml
  - id: "dod-no-runtime-mutation"
    description: >-
      OMN-13718 is a contract YAML + skill_mapping.yaml fix with no live deploy, restart, .201 mutation,
      production data mutation, new REST endpoint, or event-bus topic change performed.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13718/dod-no-runtime-mutation/command.yaml &&
          grep -q 'deploy gate' drift/dod_receipts/OMN-13718/dod-no-runtime-mutation/command.yaml
  - id: "dod-occ-self"
    description: >-
      Self-binding OCC receipt: this onex_change_control PR carries the OMN-13718 contract and receipts.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-13718/dod-occ-self/command.yaml
