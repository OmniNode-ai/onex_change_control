---
schema_version: "1.0.0"
ticket_id: OMN-14005
title: "fix(mcp-tools): derive MCP eligibility from generation registration tags"
summary: >
  The node_generation_consumer producer emits registration payloads with a generic
  tags list, including mcp-enabled and mcp-tool:<name>, and deliberately does not
  emit the legacy mcp_eligible/mcp_tags field pair. The projection MCP tools
  reducer still expected the legacy fields, so real generation-sourced registration
  events were acknowledged with rows_upserted=0 and no invokable mcp_tools row.
  The omnimarket fix derives mcp_eligible and mcp_tags from the producer's tags
  field only when explicit MCP fields are absent, preserving existing explicit
  callers while accepting the real wire shape.
is_seam_ticket: false
interface_change: false
evidence_requirements:
  - kind: "tests"
    description: "Projection MCP tools regression suite passes with real producer tag-shape coverage"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14005/dod-projection-mcp-tools-tests/command.yaml"
  - kind: "manual"
    description: "omnimarket PR #1632 carries the OMN-14005 fix at the recorded head SHA"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-14005/dod-omnimarket-pr-1632/command.yaml"
emergency_bypass:
