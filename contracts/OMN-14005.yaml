summary: >-
  omnimarket PR #1632 fixes the data-shape half of SEA register-as-invokable-tool.
  The real generation consumer emits registration payloads with a generic tags list
  such as mcp-enabled and mcp-tool:<name>; it does not emit the older
  mcp_eligible/mcp_tags field pair. The MCP tools projection now derives
  mcp_eligible and mcp_tags from the real tags wire shape when explicit MCP fields
  are absent, while preserving explicit MCP fields when callers provide them.
