      Product-observing check against omnimarket#1732 head 96438e9531b6da07e16852cf45a5aaab443e2c0e. Reads
      handler_projection_registration.py from the PR head and asserts the locally-redefined slim ModelNodeHeartbeatEvent
      class is GONE and the module now imports the canonical producer model from omnibase_infra.models.registration.model_node_heartbeat_event.
      Note the file retains exactly one extra="ignore" model, ModelNodeStateChangeEvent, which is explicitly
      OUT OF SCOPE per the operator ruling (dead topic, no producer anywhere — OMN-14508).
    source: "generated"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          f="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_projection_registration.py?ref=96438e9531b6da07e16852cf45a5aaab443e2c0e"
          --jq .content | base64 -d > "$f" && ! grep -Eq '^class ModelNodeHeartbeatEvent\(BaseModel\):'
          "$f" && grep -Fq -- 'from omnibase_infra.models.registration.model_node_heartbeat_event import'
          "$f" && grep -Fq -- 'ModelNodeHeartbeatEvent.model_validate(' "$f"
  - id: "dod-verify-1732-heartbeat-metrics-persisted"
    description: >-
      Product-observing check against the PR head. Asserts BOTH consumer paths now persist the heartbeat
      payload rather than discarding it. The handler path writes the full canonical model_dump() into
      the metadata JSONB; the runner path (the live Kafka->Postgres projector) now binds a metrics JSON
      and MERGES it into the existing metadata with the jsonb concat operator (||) instead of the previous
      UPDATE that bound only health_status + service_name. The merge — rather than a replace — is what
      stops a heartbeat clobbering the rich introspection metadata that OMN-14490 persists on the same
      row.
    source: "generated"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          h="$(mktemp)" && r="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_projection_registration.py?ref=96438e9531b6da07e16852cf45a5aaab443e2c0e"
          --jq .content | base64 -d > "$h" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_registration.py?ref=96438e9531b6da07e16852cf45a5aaab443e2c0e"
          --jq .content | base64 -d > "$r" && grep -Fq -- 'metadata.update(event.model_dump(mode="json"))'
