---
schema_version: "1.0.0"
ticket_id: "OMN-14506"
title: "OCC companion for omnimarket#1732 — node_projection_registration consumes the canonical ModelNodeHeartbeatEvent;
  heartbeat metrics no longer dropped, and heartbeats now actually land on a row"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1732 (OMN-14506, landed in the same PR as its sibling
  OMN-14490 — same file, same handler, same defect class). node_projection_registration locally redefined
  ModelNodeHeartbeatEvent (extra="ignore", 6 fields: service_name, node_id, node_name, health_status,
  timestamp, uptime_seconds) while the producer (omnibase_infra MixinNodeIntrospection) publishes the
  canonical extra="forbid" omnibase_infra.models.registration.ModelNodeHeartbeatEvent (9 fields) on the
  same topic onex.evt.platform.node-heartbeat.v1. Because the consumer copy was extra="ignore", every
  heartbeat SILENTLY DROPPED node_type, node_version, active_operations_count, memory_usage_mb, cpu_usage_percent
  and correlation_id — and heartbeats are high-frequency, so this bled continuously. The fix imports the
  canonical producer model, deletes the slim copy, and persists the full model_dump() into the metadata
  JSONB (MERGED, not replaced, so a heartbeat never clobbers the rich introspection metadata OMN-14490
  persists on the same row). Both consumer paths are fixed: HandlerProjectionRegistration AND the sibling
  RegistrationProjectionRunner (the live Kafka->Postgres projector, whose heartbeat UPDATE previously
  bound only health_status + service_name and persisted none of the metrics). ROW-IDENTITY BUG found en
  route and fixed in the same PR, because without it the field-drop fix would be cosmetic: node_service_registry
  is keyed by service_name, which introspection resolves to node_name, but the canonical heartbeat carries
  NO service_name and NO node_name — only node_id. So every heartbeat resolved to a UUID key that matched
  ZERO introspection rows; in the runner path, "UPDATE ... WHERE service_name = <uuid>" affected 0 rows
  and heartbeats never landed at all. Verified empirically against real producer payloads (introspection
  key "node_build_loop" vs heartbeat key "11111111-2222-...", MATCH=False). Both paths now join through
  the node_id that introspection persists into the metadata JSONB.
is_seam_ticket: true
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "omnimarket#1732 head consumes the canonical omnibase_infra ModelNodeHeartbeatEvent,
      deletes the slim extra=ignore copy, persists the six previously-dropped health metrics, and joins
      the heartbeat to its introspection row via node_id — proven by a cross-boundary seam test driving
      the producer's real wire dump through BOTH consumer paths, reproduced RED (pre-fix) then GREEN."
    command: "see dod_evidence check_values"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
