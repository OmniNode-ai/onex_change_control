      points every heartbeat at a row that introspection (keyed on node_name) never created — the runner's
      UPDATE matched ZERO rows. Asserts the handler path resolves its row via a node_id join helper (_find_registry_row)
      and the runner's heartbeat UPDATE matches on metadata->>'node_id' in addition to service_name.
    source: "generated"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          h="$(mktemp)" && r="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_projection_registration.py?ref=96438e9531b6da07e16852cf45a5aaab443e2c0e"
          --jq .content | base64 -d > "$h" && gh api "repos/OmniNode-ai/omnimarket/contents/src/omnimarket/nodes/node_projection_registration/handlers/handler_registration.py?ref=96438e9531b6da07e16852cf45a5aaab443e2c0e"
          --jq .content | base64 -d > "$r" && grep -Fq -- 'def _find_registry_row(' "$h" && grep -Fq --
