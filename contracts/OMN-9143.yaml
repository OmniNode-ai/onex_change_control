schema_version: "1.0.0"
ticket_id: "OMN-9143"
title: "Task 1: [Pattern G] Scrub polymorphic-agent from omniclaude enforcement code paths"
summary: >
  The legacy `polymorphic-agent` dispatch target was already scrubbed from the omniclaude hook enforcement
  surface (now `onex:`-prefixed subagents, with `general-purpose` allowed unprefixed). This ticket lands
  the regression-guard half (CLAUDE.md Rule #5, enforcement-not-detection): a fail-closed grep guard over
  `plugins/onex/hooks/{scripts,lib}` + `hooks.json`, a pytest regression test, a blocking pre-commit hook,
  and a `no-polymorphic-agent` CI job wired into the Quality Gate aggregator. Historical observability
  SQL and routing-fallback tests outside the enforcement surface legitimately reference the retired name
  and are intentionally out of scope. Docs untouched per the ticket DoD; the OMNICLAUDE_HOOKS_DISABLE
  kill-switch (OMN-9140) is preserved.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "regression test passes (0 offenders + guard agreement + injected-offender negative test)"
    command: "cd omniclaude && uv run pytest tests/unit/hooks/test_no_polymorphic_agent_references.py
      -q"
  - kind: "ci"
    description: "grep guard exits 0 on the clean enforcement surface and exits 1 on an injected offender"
    command: "cd omniclaude && bash plugins/onex/hooks/scripts/grep_guard_no_polymorphic_agent.sh"
