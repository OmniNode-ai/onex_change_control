---
schema_version: "1.0.0"
ticket_id: "OMN-12670"
title: "Raise reusable Receipt Gate timeout for merge-group evidence checks"
summary: >
  Central OCC evidence for omnibase_core PRs #1199 and #1200. The product change raises the reusable Receipt
  Gate timeout from 5 minutes to 15 minutes so downstream merge-group evidence checks can complete without
  changing receipt validation semantics, bypass handling, cache policy, or fallback behavior.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_core PR #1199 is open against dev at the recorded backmerge head."
    command: "gh pr view 1199 --repo OmniNode-ai/omnibase_core --json state,headRefOid,baseRefName"
  - kind: "manual"
    description: "omnibase_core PR #1200 is open against main from a hotfix branch at the recorded head."
    command: "gh pr view 1200 --repo OmniNode-ai/omnibase_core --json state,headRefOid,headRefName,baseRefName"
  - kind: "ci"
    description: "All visible non-Receipt-Gate checks on omnibase_core PR #1199 are SUCCESS or SKIPPED."
    command: "gh pr checks 1199 --repo OmniNode-ai/omnibase_core --json name,state"
  - kind: "ci"
    description: "All visible non-Receipt-Gate checks on omnibase_core PR #1200 are SUCCESS or SKIPPED."
    command: "gh pr checks 1200 --repo OmniNode-ai/omnibase_core --json name,state"
  - kind: "manual"
    description: "The OCC PR carrying this central evidence is open and bound to OMN-12670."
    command: "gh pr view jonah/omn-12670-receipt-timeout-occ --repo OmniNode-ai/onex_change_control --json
      state,headRefOid"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
