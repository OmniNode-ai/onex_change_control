          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12670/dod-core-pr-1199-head/command.yaml" &&
          grep -q '^pr_number: 1199$' "drift/dod_receipts/OMN-12670/dod-core-pr-1199-head/command.yaml"
          && grep -q '^commit_sha: "c2f9412d44d2ff6700b461ce901c640c9e5b0c63"$' "drift/dod_receipts/OMN-12670/dod-core-pr-1199-head/command.yaml"
