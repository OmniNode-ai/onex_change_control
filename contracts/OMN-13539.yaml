  (v0.38.4), which contains 71848f81a4. uv lock regenerates the lock; the omnibase-infra pin moves 0.38.3
  (f2533f5a) -> 0.38.4 (7e52d5b0). No other sibling pin changes. Pure dependency-pin re-lock: only pyproject.toml
  pins + uv.lock change; no source, version specifier, migration, schema, endpoint, or env change.
