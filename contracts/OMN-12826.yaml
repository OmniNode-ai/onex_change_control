ticket_id: "OMN-12826"
title: "B1: wire HandlerGeneratedExecutor as node-deploy.v1 consumer; sandbox invoke; future terminal
  result"
summary: >-
  Close-the-loop plan track B1 (docs/plans/2026-06-08-close-the-loop-plan.md). Wires HandlerGeneratedExecutor
  as the consumer of node-deploy via the new on_deploy_event entrypoint: deploys generated source to the
  sandbox, invokes via importlib, and returns/emits the terminal result on the contract-declared generated-node-invoked
  topic. The terminal result mirrors the SAME evidence-key shape future runtime dispatch (NodeInvocationAdapter.dispatch)
  produces (_runtime_backend, _event_bus_backend, _state_store_backend, _node_contract, _command_topic,
  status) and is explicitly labelled non-hot-load (_runtime_backend=sandbox, hot_load=False) so a future
  runtime hot-load path can replace the sandbox path without changing the result contract. All topics
  resolve from contract.yaml — no hardcoded topic strings in the handler.
