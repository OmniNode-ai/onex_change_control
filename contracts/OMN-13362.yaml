title: "Resolve dual delegation_events tables — drop the stale omnibase_infra decoy"
summary: >-
  delegation_events existed in TWO databases on .201: omnidash_analytics (live, canonical writer — node_projection_delegation)
  and omnibase_infra (stale decoy, last write 2026-05-13, read by nothing). Querying the decoy produced
  the 2026-06-19 Gate-Zero misdiagnosis. Forward migration 087 drops the decoy from the omnibase_infra
  DB so omnidash_analytics is the single canonical delegation_events. The migration runs in the flat infra
  sequence against POSTGRES_DB=omnibase_infra, so it can only hit the decoy, never the live copy in the
  separate omnidash_analytics DB. Also re-vendors the omnimarket node-migration tree to clear pre-existing
  capsule_store vendoring drift so the node-migration-sync gate is green. Proven by the omnibase_infra
  migration-discovery suite (16 passing) plus the migration-sequence and node-migration-sync validators.
