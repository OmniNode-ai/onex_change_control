---
schema_version: "1.0.0"
ticket_id: "OMN-10485"
title: "Gate auto-merge and merge_group on OCC eligibility"
summary: "Add a reusable GHA preflight workflow that prevents auto-merge from arming when OCC eligibility
  is false. PR metadata and OCC main SHA are resolved exactly once; merge_group events re-run eligibility
  against current OCC main. OCC PRs avoid circular dependency by validating evidence in their PR diff."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "occ-preflight.yml reusable workflow exists in omnibase_core and produces a passing eligibility
      check run named 'occ-preflight / eligibility' on PRs with valid OCC receipts."
    command: "gh api repos/OmniNode-ai/omnibase_core/contents/.github/workflows/occ-preflight.yml"
  - kind: "ci"
    description: "call-occ-preflight.yml caller workflow exists in onex_change_control and is wired to
      pull_request + merge_group events."
    command: "gh api repos/OmniNode-ai/onex_change_control/contents/.github/workflows/call-occ-preflight.yml"
  - kind: "ci"
    description: "auto-merge.yml in onex_change_control checks 'occ-preflight / eligibility' status before
      arming auto-merge, deferring when pending and failing when the preflight check fails."
    command: "grep -q 'occ-preflight' .github/workflows/auto-merge.yml"
  - kind: "tests"
    description: "Unit tests cover OCC eligibility gate logic: PASS proceeds, PENDING defers, FAILURE
      blocks arming."
    command: "cd onex_change_control && uv run pytest tests/unit/workflows/ -q -k occ_preflight"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "occ-preflight.yml reusable workflow added to omnibase_core with all four design invariants:
      single-fetch PR snapshot (I1), merge_group cache-disabled re-evaluation (I2), OCC in-tree self-check
      (I3), and hard-fail on OCC fetch failure (I4)."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10485/dod-001/command.yaml && grep
          -q '^ticket_id: \"OMN-10485\"$' drift/dod_receipts/OMN-10485/dod-001/command.yaml"
  - id: "dod-002"
    description: "call-occ-preflight.yml caller added to onex_change_control, wiring the reusable workflow
      as a required status check on pull_request and merge_group events."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10485/dod-002/command.yaml && grep
          -q '^ticket_id: \"OMN-10485\"$' drift/dod_receipts/OMN-10485/dod-002/command.yaml"
  - id: "dod-003"
    description: "auto-merge.yml in onex_change_control updated with OCC eligibility gate: queries GitHub
      Checks API for 'occ-preflight / eligibility' result, defers when pending, hard-fails when the preflight
      check fails, and only arms when the check succeeds."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10485/dod-003/command.yaml && grep
          -q '^ticket_id: \"OMN-10485\"$' drift/dod_receipts/OMN-10485/dod-003/command.yaml"
