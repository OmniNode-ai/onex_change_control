schema_version: '1.0.0'
ticket_id: OMN-13693
title: 'fix: replace hardcoded DLQ topic prefix string literal with named constant in node_pipeline_audit_orchestrator
  handler'
summary: >-
  Production handler at omnimarket/src/omnimarket/nodes/node_pipeline_audit_orchestrator/handlers/handler_pipeline_audit_orchestrator.py:333
  contained topic.startswith("onex.dlq.") — a raw topic namespace string hardcoded in source. ONEX doctrine
  requires all topic references come from contract YAML or named constants, never as string literals in
  handler code. Fix: introduce DLQ_TOPIC_PREFIX = "onex.dlq." in a new constants.py module and replace
  the literal. Three TDD regression-guard tests added. No interface change; no live deploy or runtime
  restart is performed by this PR.
