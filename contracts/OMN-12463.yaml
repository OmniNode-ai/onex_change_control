---
schema_version: "1.0.0"
ticket_id: OMN-12463
title: "Producer-side adapter — emit ModelHandlerContract-shaped registration payload for market node
  hot-load"
summary: >
  Third hot-load blocker (follow-up to OMN-12449). Market node contract.yaml files declare handler / handler_routing
  and nest their I/O models; they lack the top-level handler_id / input_model / output_model / descriptor
  shape the runtime descriptor parser (omnibase_infra ContractYamlParser.parse) validates against omnibase_core's
  ModelHandlerContract. node_contract_registry published the raw market contract_yaml verbatim, so every
  market node failed model_validate before materialization. Approach A (producer-side): add market_contract_adapter.to_handler_contract_payload(),
  invoked by ContractRegistryHandler before publishing to onex.evt.platform.node-registration.v1, transforming
  the market contract into a ModelHandlerContract-shaped payload (handler_id, name, contract_version,
  descriptor, input_model, output_model, handler_class via metadata.handler_class). Fail-fast on undeducible
  required fields. omnibase_infra is untouched (market knowledge stays out of infra). No market-contract
  or schema changes.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Adapter unit tests map compute + orchestrator archetypes to a valid ModelHandlerContract,
      normalize *_GENERIC node_type, and fail-fast on missing input_model / handler_class / contract_version
      / unmappable archetype; round-trip through omnibase_infra ContractYamlParser.parse."
    command: "uv run pytest tests/unit/nodes/test_node_contract_registry/test_market_contract_adapter.py
      -v"
  - kind: "tests"
    description: "Handler tests confirm the published contract_yaml is the adapted ModelHandlerContract
      payload and unadaptable contracts are rejected with ADAPTER_FAILURE."
    command: "uv run pytest tests/unit/nodes/test_node_contract_registry/ -v"
  - kind: "manual"
    description: "omnimarket PR #997 carries the producer-side adapter and tests, based on dev."
    command: "gh pr view 997 --repo OmniNode-ai/omnimarket --json number,state,headRefOid,baseRefName"
emergency_bypass:
