schema_version: "1.0.0"
ticket_id: "OMN-14207"
title: "fix(OMN-14207): fail dod_verify closed on unmerged or CI-red PR-bound evidence"
summary: >-
  omnimarket PR #1659 fixes a dod_verify false-positive where static PASS receipts could make a ticket
  appear verified even when the cited product PR was still open or had non-green checks. EvidenceCollector
  now adds a live GitHub PR-state check for PR-bound dod_evidence, fails closed when the live state cannot
  be proven merged and green, and leaves non-PR evidence unaffected.
is_seam_ticket: false
