schema_version: "1.0.0"
ticket_id: "OMN-12571"
title: "Codify small-batch, evidence-backed draft-promotion rules for the infra queue"
summary: >-
  Adds a pure-logic draft-promotion policy that gates how draft PRs are promoted into the infra merge
  queue. ModelPromotionPolicy carries a configurable, evidence-backed batch size (default 3); any non-default
  batch_size must cite an evidence_ref or validation rejects it, so the limit is codified rather than
  permanently hardcoded. select_promotion_batch promotes only rebased and locally-validated, non-conflict-dirty,
  non-parked drafts, and never promotes the whole eligible backlog in one pass (whole_backlog_blocked
  guard). build_promotion_record / ModelDraftPromotionRecord produce per-PR ledger records carrying the
  OMN-12569 provenance fields (head SHA, local verification, branch checks, merge-group checks, worktree
  cleanup status, ledger run id) as a derived projection fed into the durable PR ledger; the module references
  that interface and does not duplicate the ledger. The promotion procedure is documented in omniclaude/docs/process/draft-promotion-procedure.md
  and the conflict-dirty drafts plus parked release draft are noted in the codex-nightly-controller runbook.
