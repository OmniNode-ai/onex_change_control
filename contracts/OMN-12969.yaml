---
schema_version: "1.0.0"
ticket_id: "OMN-12969"
title: "Dashboard ws invalidation 403 (:13002/ws) — remove the dead ws path + reintroduction ratchet"
summary: >
  The omnidash dashboard opened a `/ws` invalidation/live-tail WebSocket whose URL was derived from the
  projection backend (VITE_PROJECTION_API_URL = FastAPI projection-api on :13002). That backend (omnimarket/src/omnimarket/projection/api_server.py)
  is a FastAPI app exposing HTTP GET routes plus a single advisory SSE endpoint (/v1/evidence-pipeline/events/stream);
  it never registered a `/ws` websocket route, so every browser upgrade against :13002/ws was rejected
  (403) — the source of the pre-existing console errors. The omnidash Express server (server/index.ts)
  did expose a `/ws` WebSocketServer, but broadcast() had zero callers and no Kafka consumer fed it, so
  it could never deliver an INVALIDATE frame. The path was dead on both ends; dashboard panels were already
  poll-only via useProjectionQuery. Remediation removes the dead path with no half-dead code: client-side
  useWebSocketInvalidation hook + Providers mount, EventStream.useEventWebSocket (component stays poll-driven),
  getWebSocketUrl(), DATA_SOURCE_DEFAULT_WS_URL, contract.yaml data_source.ws_url, VITE_WS_URL and the
  test WebSocket mocks; server-side the /ws WebSocketServer, broadcast(), clients map, upgrade handler,
  ws import and broadcast.test.ts. The Express HTTP projection routes and the Kafka dispatch producer
  are untouched. Enforcement ratchet (same PR set): new local/no-projection-websocket ESLint rule (error)
  bans raw browser `new WebSocket(...)` in client source, wired into eslint.config.js with unit tests,
  so an unwired socket cannot be reintroduced.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      ESLint rule unit tests assert the new local/no-projection-websocket rule fires on new WebSocket
      / new window.WebSocket / new globalThis.WebSocket in client source and stays silent in test files
      and for non-WebSocket constructors. EventStream tests assert poll-only rendering with no WebSocket
      mock. Build (tsc + vite build) and full lint/typecheck are green after the removal.
    command: "npx vitest run src/no-projection-websocket.test.ts src/components/dashboard/events/EventStream.test.tsx
      && npm run lint && npx tsc --noEmit && npm run build"
emergency_bypass:
