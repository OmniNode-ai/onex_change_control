schema_version: "1.0.0"
ticket_id: "OMN-12289"
title: "Route SEA CLI commands through onex CLI entry point"
summary: >-
  Bind central OCC evidence for onex-self-extending-agent PR #160, which routes SEA demo and run commands
  through the standard onex CLI extension surface and collapses the PR onto current dev as a single T8
  payload.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "onex-self-extending-agent PR #160 is locally verified at the observed PR head."
    command: "gh pr checks 160 --repo OmniNode-ai/onex-self-extending-agent"
  - kind: "manual"
    description: "No live deploy or .201 mutation is required before merge."
    command: "printf '%s\n' 'deploy-gated CLI/demo surface; no live runtime mutation performed pre-merge'"
dod_evidence:
  - id: "dod-onex-pr-160"
    description: "Bind OMN-12289 evidence to onex-self-extending-agent PR #160 at the observed PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"drift/dod_receipts/OMN-12289/dod-onex-pr-160/command.yaml\"
          && grep -q '^pr_number: 160$' \"drift/dod_receipts/OMN-12289/dod-onex-pr-160/command.yaml\"
          && grep -q '^commit_sha: \"640a7c7ed9899da240785310129e6ce5c9905823\"$' \"drift/dod_receipts/OMN-12289/dod-onex-pr-160/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "CLI/demo entry-point routing only; no live deploy, restart, .201 mutation, docker exec,
      or rpk produce required pre-merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"drift/dod_receipts/OMN-12289/dod-deploy-assessment/command.yaml\"
          && grep -q 'No live deploy' \"drift/dod_receipts/OMN-12289/dod-deploy-assessment/command.yaml\"
          && grep -q 'deploy-gated' \"drift/dod_receipts/OMN-12289/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr-self"
    description: "Bind OMN-12289 central evidence to the OCC PR that carries this bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"drift/dod_receipts/OMN-12289/dod-occ-pr-self/command.yaml\"
          && grep -q '^pr_number: 1797$' \"drift/dod_receipts/OMN-12289/dod-occ-pr-self/command.yaml\"
          && grep -q '^ticket_id: \"OMN-12289\"$' \"drift/dod_receipts/OMN-12289/dod-occ-pr-self/command.yaml\""
emergency_bypass:
  enabled: false
