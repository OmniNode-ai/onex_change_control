title: "[Phase 0.1] /ready fix — remove strict=True from ModelHealthCheckResponse"
summary: >
  Fixes /ready endpoint returning HTTP 503 by removing strict=True from ModelHealthCheckResponse.model_config.
  Pydantic strict mode rejected tuple[str, ...] fields (e.g. ModelEventBusReadiness.required_topics) when
  model_dump() is called without mode="json", causing 15 ValidationErrors that the health handler re-raised
  as 503. The model retains frozen=True and extra="forbid". Adds regression unit test and integration
  contract test.
