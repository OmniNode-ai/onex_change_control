schema_version: "1.0.0"
ticket_id: "OMN-13708"
title: "fix(OMN-13708): default nodes to local adapters over the in-memory bus (Systemic #2)"
summary: >
  Eight omnimarket nodes crashed or emitted vacuous clean/epoch-0 data when run over the canonical in-memory/local
  event bus because they required a Kafka/remote adapter instead of defaulting to a local impl (remote
  as override). This makes the in-memory/local adapter the contract default; Kafka/remote stay opt-in
  overrides. Follows node_recall_compute's honest-degradation pattern. Handlers stay stateless/contract-driven
  — no new topics, REST endpoints, or runtime mutation. Proved over the in-memory bus via 10 targeted
  tests + full suite (10354 passed) + mypy strict + pre-commit. No live deploy required.
