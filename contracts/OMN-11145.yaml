    description: "omnimarket PR #682 carries the OMN-11145 OmniGate node implementation."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11145/dod-omnimarket-pr-682/command.yaml
          && grep -q '^pr_number: 682$' drift/dod_receipts/OMN-11145/dod-omnimarket-pr-682/command.yaml
          && grep -q '^commit_sha: \"6566a43bce1958c04a7db717a3b502530383e210\"$' drift/dod_receipts/OMN-11145/dod-omnimarket-pr-682/command.yaml"
  - id: "dod-focused-checks"
    description: "Focused OmniGate node tests, lint, mypy, runtime sweep, per-node topic lint, and entry
      point smoke pass locally."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11145/dod-focused-checks/command.yaml
          && grep -q '8 passed' drift/dod_receipts/OMN-11145/dod-focused-checks/command.yaml && grep -q
          'runtime_sweep: 180/180 entry points OK' drift/dod_receipts/OMN-11145/dod-focused-checks/command.yaml"
  - id: "dod-deploy-assessment"
    description: >
      Deploy DoD evidence for PR #682: node packages and entry points are deployable runtime code, but
      no live .201 deploy, Kafka topic creation, Postgres migration, or container restart is performed
      by this PR.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11145/dod-deploy-assessment/command.yaml
          && grep -q '^pr_number: 682$' drift/dod_receipts/OMN-11145/dod-deploy-assessment/command.yaml
          && grep -q 'No live deploy' drift/dod_receipts/OMN-11145/dod-deploy-assessment/command.yaml"
  - id: "dod-occ-pr-1096"
    description: "OCC PR #1096 carries the OMN-11145 central contract and receipt evidence."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11145/dod-occ-pr-1096/command.yaml
          && grep -q '^pr_number: 1096$' drift/dod_receipts/OMN-11145/dod-occ-pr-1096/command.yaml"
