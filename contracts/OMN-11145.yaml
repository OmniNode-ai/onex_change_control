---
schema_version: "1.0.0"
ticket_id: "OMN-11145"
title: "Task 9: OmniGate Nodes in OmniMarket"
summary: >
  Binds omnimarket PR #682, which adds OmniGate check executor, receipt generator, receipt verifier, and
  projection nodes, including node contracts, metadata, typed handlers/models, reducer-owned projection
  snapshot topics, tests, and onex.nodes entry points.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "topics"
  - "events"
  - "public_api"
evidence_requirements:
  - kind: "ci"
    description: "omnimarket PR #682 carries the OMN-11145 OmniGate node implementation."
    command: "gh pr view 682 --repo OmniNode-ai/omnimarket --json state,headRefOid"
  - kind: "ci"
    description: "OCC PR #1096 carries the central OMN-11145 contract and receipts."
    command: "gh pr view 1096 --repo OmniNode-ai/onex_change_control --json state,headRefOid"
  - kind: "tests"
    description: "Focused OmniGate node tests, lint, typecheck, runtime sweep, and topic validation pass."
    command: "find drift/dod_receipts/OMN-11145 -type f -name command.yaml"
  - kind: "manual"
    description: >
      Deploy assessment records that this PR adds node packages and projection contracts but does not
      perform a live .201 deploy or restart.
    command: "grep -q 'No live deploy' drift/dod_receipts/OMN-11145/dod-deploy-assessment/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
