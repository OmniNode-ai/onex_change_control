schema_version: "1.0.0"
ticket_id: "OMN-13496"
title: "Remove the SEA harness fixture prompt-echo stub (false-green)"
summary: >-
  The SEA/delegation in-process harness (omnibase_core.runtime.harness, OMN-13420) shipped a false-green
  stub: RecordedFixtureInferenceAdapter echoed the prompt as "[recorded] {prompt}" when no recorded completion
  was supplied, and harness_cli's `--inference fixture` defaulted to that path. A run of `harness sea
  --prompt "generate a COMPUTE node that returns the SHA-256 hex digest of its input"` reported terminal_status:
  success, inference_adapter "fixture", model "recorded-fixture" while generating nothing — a simplified
  flow that passes without a real model call or real artifact. This OMN-13496 change deletes the prompt-echo
  path: RecordedFixtureInferenceAdapter now REQUIRES a non-empty completion recorded from a real model
  call (golden-chain replay) and fails fast on an empty/blank completion; harness_cli `--inference fixture`
  requires `--fixture-completion` and raises rather than reporting success on a run with no real or recorded-from-real
  inference. Tests assert the prompt-echo path is unreachable: the fixture adapter replays the recorded
  completion verbatim (never the prompt), an empty completion is rejected, and a CLI sea/delegation fixture
  run with no --fixture-completion cannot reach terminal_status: success. This OCC PR carries the central
  contract consumed by the omnibase_core PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
