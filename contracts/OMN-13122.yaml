ticket_id: "OMN-13122"
title: "Add node_projection_routing_decision (routing-decision.v1 -> agent_routing_decisions)"
summary: >-
  Adds the canonical omnimarket projection node node_projection_routing_decision that closes the golden
  "registration" chain: it consumes onex.evt.omniclaude.routing-decision.v1 (emitted by the omniclaude
  polymorphic router) and projects each routing decision into the agent_routing_decisions table via INSERT
  ... ON CONFLICT (id) DO NOTHING (append-only; the router mints the UUID idempotency key). Ships a reducer
  contract.yaml + metadata.yaml, HandlerProjectionRoutingDecision (DatabaseAdapter projection) and RoutingDecisionProjectionRunner
  (Kafka consumer runtime), a single pyproject.toml entry-point line, a docker-compose.projection.yml
  consumer service, and golden-chain tests including the row-delta proof (before=0, publish routing-decision,
  after=1). agent_routing_decisions DDL is owned by omnibase_infra migration 021 (021_create_agent_routing_decisions_table.sql);
  this node is a NON-OWNER WRITER and ships no CREATE TABLE migration (metadata declares duplicate_migration_policy:
  forbid_cross_repo_create_table). This PR ships code + wiring only. The RoutingDecisionProjectionRunner
  consumer is not live on the dev lane in this PR; the registration golden chain becomes owned by a canonical
  node at runtime via a coordinated dev redeploy folded with OMN-13121 / OMN-13124.
