title: "Repair node_dod_verify RuntimeLocal dispatch"
summary: >-
  OMN-13253 fixes node_dod_verify so the onex dod_verify skill and the receipt-gate / DoD path that depends
  on it can produce a structured result again. The omnimarket PR adds operation: verify to the operation_match
  handler entry, adds the top-level input_model required by RuntimeLocal's event-driven initial command
  builder, and changes the handler callable shape so the adapter dispatches the ModelDodVerifyStartCommand
  positionally instead of keyword-fanning model fields. The fix is code-only: it changes the node contract
  and handler dispatch convention, does not add or rename Kafka topics, does not change schemas, and does
  not deploy or restart runtime. The CLI/skill RuntimeLocal path works from the package immediately; the
  deployed daemon's dod-verify-start routing benefits after the normal post-merge redeploy.
