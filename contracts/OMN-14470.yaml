dod_evidence:
  - id: "dod-1729-silent-skip-deleted-failclosed-wired"
    description: >-
      Asserts scripts/trigger_rebuild_on_merge.py at #1729's head both (a) routes the producer through
      require_producer_preconditions (the fail-closed precondition gate, N>=1) AND (b) no longer contains
      the silent-skip CODE PATH — a click.echo(...) call printing "skipping publish" (N==0). The deletion
      clause matches the click.echo( CALL, not a bare "skipping publish" substring, because the new fail-closed
      block carries an explanatory COMMENT quoting the old phrase, so a naive substring check would false-RED
      at #1729's head. The two clauses combine so the check is not vacuous on absence. RED PROVEN against
      exists-but-WRONG: omnimarket dev (dea272ac) HAS trigger_rebuild_on_merge.py but calls require_producer_preconditions
      zero times -> clause (a) fails -> exit 1. Exit 1 at a bogus SHA (empty content). Identical CLI input
      (real runtime change, broker unset, not --dry-run) exits 0 GREEN at dev and exits 1 RED at #1729's
      head — reproduced live by the verifier.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          C=$(gh api "repos/OmniNode-ai/omnimarket/contents/scripts/trigger_rebuild_on_merge.py?ref=3c6baef160863cbe54304c8d8c85b3f936765701"
          --jq .content 2>/dev/null | base64 -d 2>/dev/null); test "$(printf '%s' "$C" | grep -c 'require_producer_preconditions')"
          -ge 1 && test "$(printf '%s' "$C" | grep -cE 'click\.echo\([^)]*skipping publish')" -eq 0
  - id: "dod-1729-emit-count-assertion-wired"
    description: >-
      Asserts scripts/trigger_rebuild_on_merge.py at #1729's head calls assert_producer_emitted after
      the publish, so a completed publish that delivered zero commands fails closed rather than reporting
      success ("produced N>0, and here it is" is the only completion signal for a producer). RED PROVEN
      at omnimarket dev, where the file EXISTS but never calls assert_producer_emitted (symbol absent
      pre-#1729) -> grep count 0 -> exit 1; exit 1 at a bogus SHA. A positive presence check (>=1), which
      cannot pass on empty/absent content.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnimarket/contents/scripts/trigger_rebuild_on_merge.py?ref=3c6baef160863cbe54304c8d8c85b3f936765701"
          --jq .content 2>/dev/null | base64 -d 2>/dev/null | grep -c 'assert_producer_emitted')" -ge
          1
  - id: "dod-1729-colocated-copy-noimport-todo"
    description: >-
      Asserts the co-located pure fail-closed module scripts/producer_effect_assertion.py exists at #1729's
      head and (a) defines all three primitives ProducerZeroOutputError, require_producer_preconditions,
      assert_producer_emitted (>=3 defining lines), (b) carries the tracked TODO(OMN-14470) de-dup marker,
      and (c) does NOT import omnibase_infra (0 import/from omnibase_infra lines) — the co-located-copy
      invariant: market cannot import the canonical infra util (frozen git rev) and must not pin infra's
      PR-branch head. The three clauses combine so the check is not vacuous on absence — the >=3 primitive
      presence clause fails on an empty/absent file, so the no-import clause never passes trivially. RED
      PROVEN at omnimarket dev: the file does NOT exist there -> primitive count 0 -> exit 1; exit 1 at
      a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          C=$(gh api "repos/OmniNode-ai/omnimarket/contents/scripts/producer_effect_assertion.py?ref=3c6baef160863cbe54304c8d8c85b3f936765701"
          --jq .content 2>/dev/null | base64 -d 2>/dev/null); test "$(printf '%s' "$C" | grep -cE 'class
