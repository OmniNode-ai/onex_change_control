title: "RT-5 mirror — omnimarket deploy trigger fails closed on zero output (omnimarket #1729)"
summary: >-
  Central OCC evidence for OmniNode-ai/omnimarket#1729 (OMN-14470, RT-5 market mirror; sibling OMN-14467
  / omnibase_infra #2271; epic OMN-13674). Mirrors the RT-5 effect-assertion gate into omnimarket via
  a co-located copy of the pure fail-closed assertion (omnimarket pins omnibase_infra to a frozen git
  rev, so the canonical util is not importable and infra's PR-branch head must not be pinned — never_pin_a_feature_branch_head).
  scripts/trigger_rebuild_on_merge.py no longer prints "skipping publish" then sys.exit(0) on a real runtime
  change with the broker/creds absent; a missing precondition or a zero-delivery emit now fails closed
  (exit 1); no-op / --dry-run still exit 0. Authored by the independent verifier (rt5mirror-verifier),
  not the implementer, per no-self-authored-evidence. Each product entry is a workspace-independent gh-api
  content read at #1729's head, proven RED against omnimarket dev (dea272ac — trigger exists but never
  calls require_producer_preconditions; the co-located module does not exist) and against a bogus SHA,
  and the A/B was reproduced live by the verifier.
is_seam_ticket: false
