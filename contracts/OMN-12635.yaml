schema_version: "1.0.0"
ticket_id: "OMN-12635"
title: "fix: node_dirty_canonical_sweep crashes on untracked directories (read_bytes IsADirectoryError)"
summary: >-
  Epic OMN-7466 / skill /onex:ship_dirty_canonical. The Step 2 dirty-file copy loop in HandlerDirtyCanonicalSweep._ship_repo
  (omnimarket/src/omnimarket/nodes/node_dirty_canonical_sweep/handlers/handler_dirty_canonical_sweep.py)
  called read_bytes() on each dirty path. git status --porcelain reports an untracked DIRECTORY as a single
  entry (e.g. evidence/OMN-12584/); read_bytes() on a directory raises "[Errno 21] Is a directory" and
  the ship aborts with status=failed, producing no rescue PR. Observed 2026-06-03 on onex_change_control
  (had an untracked evidence/OMN-12584/ dir) — the sweep crashed and the repo had to be shipped manually.
  Fix (omnimarket PR #1023): when a dirty path is a directory, recurse (rglob) and copy every contained
  file with preserved relative paths; no directory ever has read_bytes() called on it. Shipped in the
  same omnimarket PR as OMN-12636 (stale-base diff); the primary OCC contract and Evidence-Ticket for
  that PR is OMN-12636.
