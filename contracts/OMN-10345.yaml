schema_version: "1.0.0"
ticket_id: "OMN-10345"
title: "Runtime address registry and routing target selection"
summary: "Add typed runtime address, registry, and target selector models so work and contract updates
  can target specific runtimes by address instead of special flags."
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "Focused runtime address model tests pass"
    command: "cd omnibase_core && uv run pytest tests/unit/models/runtime/test_model_runtime_address.py
      -q"
  - kind: "tests"
    description: "Runtime address model lint, enum governance, and typing checks pass"
    command: "cd omnibase_core && uv run python -m omnibase_core.validation.checker_enum_governance src/omnibase_core/
      && uv run ruff check --fix src/omnibase_core/enums/enum_runtime_selection_mode.py src/omnibase_core/enums/__init__.py
      src/omnibase_core/models/runtime/model_runtime_target_selector.py tests/unit/models/runtime/test_model_runtime_address.py
      && uv run mypy src/omnibase_core/models/runtime/model_runtime_address_registry.py src/omnibase_core/models/runtime/model_runtime_target_selector.py
      src/omnibase_core/models/runtime/model_runtime_address.py"
  - kind: "ci"
    description: "Implementation PR for OMN-10345 exists in omnibase_core"
    command: "gh pr view 984 --repo OmniNode-ai/omnibase_core --json number,state,url,headRefOid"
  - kind: "tests"
    description: "OmniMarket Codex runtime client and plugin shim tests prove broker-free compile-only
      preflight"
    command: "cd omnimarket && env -u PYTHONPATH uv run pytest tests/test_codex_runtime_client.py tests/test_codex_plugin_shims.py
      -q"
  - kind: "manual"
    description: "OmniMarket compile-only command emits an addressed broker command envelope without Kafka
      or runtime startup"
    command: "cd omnimarket && env -u PYTHONPATH uv run python scripts/run_codex_runtime_request.py --command-name
      pr_lifecycle_orchestrator --payload '{\"inventory_only\":true,\"dry_run\":true}' --target-runtime-address
      runtime://omninode-pc/stability-test/main --compile-only"
  - kind: "ci"
    description: "Implementation PR for OMN-10345 broker-free preflight exists in omnimarket"
    command: "gh pr view 458 --repo OmniNode-ai/omnimarket --json number,state,url,headRefOid"
