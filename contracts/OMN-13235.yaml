title: "Per-tenant ceiling budget-state surface (cap + consumption), event-sourced, projection-readable"
summary: >-
  A bus-sourced, projection-readable budget state (cap + period consumption) for budgeted ceiling tiers.
  Migration 0019 adds delegation_budget_state (one row per tenant / cost_tier_name / budget_period: monthly_cap_usd,
  consumed_usd, overage_usd, headroom_remaining_usd, delegation_count), reusing the foundation migration
  prefix family (next free after 0018). handler_budget_state.materialize_budget_state event-sources consumption
  from delegation source events for budgeted tiers, per-tenant and per-period, idempotent per source event
  via last_correlation_id. Wired into HandlerProjectionDelegation.project(); a no-op for free_local /
  metered tiers. The contract exposes onex.snapshot.projection.delegation.budget-state.v1 so the surface
  is readable. Proven by the omnimarket budget-state suite (9 passing): event-sourced consumption, per-tenant
  + per-period isolation, idempotent replay, non-budgeted tiers produce no row.
