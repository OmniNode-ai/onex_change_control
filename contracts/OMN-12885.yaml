schema_version: "1.0.0"
ticket_id: "OMN-12885"
title: "Make delegation projection migrations idempotent on warm volumes"
summary: >
  Dev-lane restore reused an older Postgres volume whose delegation_events table predated the current
  node-owned projection schema. The node migration used CREATE TABLE IF NOT EXISTS and then created indexes
  and views that referenced columns the warm table did not have, leaving forward-migration dirty even
  while runtime health endpoints booted. The fix makes the node-owned delegation base migration repair
  existing table shape before indexes, keeps the vendored infra migration tree in sync with omnimarket,
  vendors the missing generation output/proof-field migrations required by integration evidence, and hardens
  deploy-agent runtime-policy parsing so shell-quoted resolver JSON is not passed through to stability-test
  runtime containers. The CI runtime boot path also advertises and probes generated compose container
  names so self-hosted runner containers can reach the ephemeral Redpanda/Postgres stack after joining
  the compose network, and the prod-lineage guard uses an uncached direct setup path to avoid required
  check cleanup hangs.
is_seam_ticket: false
