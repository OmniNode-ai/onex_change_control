---
schema_version: "1.0.0"
ticket_id: "OMN-14489"
title: "OCC companion for omnibase_infra#2280 — remote-agent invoke canonical models"
summary: >
  OCC evidence companion for OmniNode-ai/omnibase_infra#2280 (OMN-14489). The node_remote_agent_invoke_effect
  contract declared local stub input/output models while the live producer and consumer use the canonical
  omnibase_core delegation models. Because the node routes with operation_match, dispatch did not type-scope
  the payload, but runtime local ingress still validates the payload against the contract-declared input_model.
  The stub rejected the real producer payload, starving remote-agent-invoke.v1 to agent-task-lifecycle.v1.
  The product PR repoints the contract to canonical omnibase_core ModelInvocationCommand and ModelAgentTaskLifecycleEvent,
  deletes the now-unused local stub models, and adds a cross-boundary test that drives the producer-shaped
  payload through the real runtime ingress validator against the contract-declared model.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
  - "topics"
evidence_requirements:
  - kind: "manual"
    description: "Product PR #2280 head declares canonical omnibase_core delegation models and proves
      the producer payload validates through runtime ingress."
    command: "see dod_evidence check_values"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-2280-canonical-model-contract"
    description: >-
      Product-observing check against omnibase_infra#2280 head 07d15c6b0380bb822b080f7517fdebfe4daef96e.
      Reads the node contract and unit scaffold test from the PR head and asserts the contract declares
      the canonical omnibase_core ModelInvocationCommand and ModelAgentTaskLifecycleEvent modules instead
      of the removed local stub model package.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          c="$(mktemp)" && t="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/nodes/node_remote_agent_invoke_effect/contract.yaml?ref=07d15c6b0380bb822b080f7517fdebfe4daef96e"
          --jq .content | base64 -d > "$c" && gh api "repos/OmniNode-ai/omnibase_infra/contents/tests/unit/nodes/node_remote_agent_invoke_effect/test_node_scaffold.py?ref=07d15c6b0380bb822b080f7517fdebfe4daef96e"
          --jq .content | base64 -d > "$t" && grep -F -- 'module: "omnibase_core.models.delegation.model_invocation_command"'
          "$c" && grep -F -- 'module: "omnibase_core.models.delegation.model_agent_task_lifecycle_event"'
          "$c" && grep -F -- 'test_input_output_models_use_canonical_core_module' "$t"
  - id: "dod-verify-2280-runtime-ingress-cross-boundary"
    description: >-
      Product-observing check against the PR head. Reads the integration test and asserts it imports the
      canonical producer/consumer models, builds a ModelRuntimeLocalIngressRoute from the contract, calls
      validate_runtime_local_ingress_payload, and checks rich producer fields survive validation. This
      is the load-bearing exists-but-wrong RED surface: the old local stub contract rejected the real
      payload.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          t="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/tests/integration/test_remote_agent_invoke_effect_contract.py?ref=07d15c6b0380bb822b080f7517fdebfe4daef96e"
          --jq .content | base64 -d > "$t" && grep -F -- 'ModelRuntimeLocalIngressRoute' "$t" && grep
          -F -- 'validate_runtime_local_ingress_payload(route, payload)' "$t" && grep -F -- 'test_producer_payload_validates_through_runtime_ingress'
          "$t" && grep -F -- 'test_contract_output_model_validates_handler_event' "$t" && grep -F -- 'for
          field in ("task_id", "invocation_kind", "target_ref")' "$t"
  - id: "dod-deploy-assessment-head-07d15c6b"
    description: >-
      Deploy assessment for omnibase_infra PR #2280 at head 07d15c6b0380bb822b080f7517fdebfe4daef96e.
      The PR touches node contract/model/test paths for runtime-discovered remote-agent invocation behavior,
      but this OCC evidence update performs no live deploy, runtime restart, docker exec, rpk topic produce,
      database mutation, topic mutation, or .201/.200 runtime mutation. Runtime rollout/readback remains
      under the normal post-merge deploy path.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-14489/dod-deploy-assessment-head-07d15c6b/command.yaml
          && grep -qi 'no live deploy' drift/dod_receipts/OMN-14489/dod-deploy-assessment-head-07d15c6b/command.yaml
  - id: "occ-self-bind-pr-4069"
    description: >-
      Self-bind item for this OCC companion PR. It binds PR #4069 and the stable OMN-14489 OCC branch;
      product-observing evidence is carried by the canonical-model and runtime-ingress entries.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          gh pr view ${PR_NUMBER} --repo ${REPO} --json number,headRefName --jq '.number == 4069 and .headRefName
          == "jonah/omn-14489-occ-infra-2280"'
  - id: "dod-verify-2280-scope-boundary-hop13-unreachable"
    description: >-
      SCOPE-LIMITING disclosure, not a defect fix. Product-observing check against omnibase_infra#2280
      head 07d15c6b0380bb822b080f7517fdebfe4daef96e AND the same-head copy of runtime/auto_wiring/handler_wiring.py
      (unchanged by this PR). This PR's fix is real and necessary — it stops validate_runtime_local_ingress_payload
      from rejecting the real producer payload against the old stub contract (the HW=19-IN/HW=0-OUT starvation).
      It does NOT make the agent.a2a_task operation reachable end to end: HandlerA2ATask (handler_a2a_task.py:316)
      exposes only async submit()/watch(), no handle()/handle_async() anywhere in the class or its MRO.
      _make_dispatch_callback (handler_wiring.py:412-462) falls through to _missing_handle when neither
      is present, which raises ModelOnexError("...does not expose a callable handle() or handle_async()
      dispatch entrypoint.") on the first real dispatch to this operation. This PR's own dod_evidence
      (test_remote_agent_invoke_effect_contract.py) drives validate_runtime_local_ingress_payload directly
      and never exercises _make_dispatch_callback, so it neither catches nor claims to fix this. Tracked
      as a third confirmed instance on the pre-existing systemic ticket OMN-14135 (added 2026-07-13, not
      a new ticket — HandlerLedgerProjection and HandlerBuildLoopAppend were the first two instances).
      This item exists so the gap is a durable, checked fact rather than a silent omission from this companion's
      claim of what OMN-14489/#2280 fixes.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          h="$(mktemp)" && w="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/nodes/node_remote_agent_invoke_effect/handlers/handler_a2a_task.py?ref=07d15c6b0380bb822b080f7517fdebfe4daef96e"
          --jq .content | base64 -d > "$h" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py?ref=07d15c6b0380bb822b080f7517fdebfe4daef96e"
          --jq .content | base64 -d > "$w" && grep -F -- 'class HandlerA2ATask' "$h" && grep -F -- 'async
          def submit(self, command' "$h" && grep -F -- 'async def watch(' "$h" && ! grep -E -- '(async
          )?def handle(_async)?\(' "$h" && grep -F -- 'def _missing_handle' "$w" && grep -F -- 'does not
          expose a callable' "$w"
  - id: "dod-verify-2280-dispatch-entrypoint-head-38d78e6b"
    description: >-
      Follow-up product-observing check against omnibase_infra#2280 head 38d78e6b31ad0504c5387c35181df793ff9a6964.
      The live PR head now closes the dispatch-reachability gap disclosed by the prior OCC#4069 evidence:
      the contract declares handler_routing.handlers[].event_model for ModelInvocationCommand so operation_match
      can register the payload-class alias, HandlerA2ATask exposes async handle(self, request: ModelInvocationCommand)
      returning ModelAgentTaskLifecycleEvent, and the new tests cover both the concrete A2A dispatch path
      and the platform-wide handler-dispatch entrypoint regression class.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          c="$(mktemp)" && h="$(mktemp)" && it="$(mktemp)" && ut="$(mktemp)" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/nodes/node_remote_agent_invoke_effect/contract.yaml?ref=38d78e6b31ad0504c5387c35181df793ff9a6964"
          --jq .content | base64 -d > "$c" && gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/nodes/node_remote_agent_invoke_effect/handlers/handler_a2a_task.py?ref=38d78e6b31ad0504c5387c35181df793ff9a6964"
          --jq .content | base64 -d > "$h" && gh api "repos/OmniNode-ai/omnibase_infra/contents/tests/unit/nodes/node_remote_agent_invoke_effect/test_a2a_dispatch_entrypoint_omn14489.py?ref=38d78e6b31ad0504c5387c35181df793ff9a6964"
          --jq .content | base64 -d > "$it" && gh api "repos/OmniNode-ai/omnibase_infra/contents/tests/unit/runtime/auto_wiring/test_handler_dispatch_entrypoint_coverage_omn14489.py?ref=38d78e6b31ad0504c5387c35181df793ff9a6964"
          --jq .content | base64 -d > "$ut" && grep -F -- 'patch: 3' "$c" && grep -F -- 'event_model:'
          "$c" && grep -F -- 'module: "omnibase_core.models.delegation.model_invocation_command"' "$c"
          && grep -F -- 'async def handle(' "$h" && grep -F -- 'ModelAgentTaskLifecycleEvent(' "$h" &&
          grep -F -- 'test_real_dispatch_callback_invokes_handler_and_emits_lifecycle_event' "$it" &&
          grep -F -- 'test_no_new_entrypointless_handlers' "$ut" && grep -F -- 'test_entrypoint_predicate_discriminates'
          "$ut"
