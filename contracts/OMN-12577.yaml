---
schema_version: "1.0.0"
ticket_id: "OMN-12577"
title: "Extend node_redeploy WorkflowPackage with lane policy, digest gate, rollback"
summary: >-
  Bind central evidence for omnimarket PR carrying Phase 2 of the node-based runtime deployment design:
  extends the live node_redeploy WorkflowPackage in place (no parallel FSM, no new deploy/build/probe
  effect node) with lane policy (dev/stability-test/prod), digest pinning plus the prod same-digest gate
  (prod is blocked before any deploy effect unless a stability-test READY event exists for the same image_digest,
  and prod reuses that digest without rebuilding), an additive post-deploy verification FSM segment (VERIFY_HEALTH
  -> PROBING -> SWEEPING -> EVIDENCE_REDUCING -> OCC_DRAFTING -> OCC_VALIDATING -> READINESS_SCORING ->
  READY|BLOCKED) plus a rollback segment (ROLLING_BACK -> ROLLED_BACK), rollback that emits onex.evt.omnimarket.redeploy-rolled-back.v1
  via a ProtocolDeploymentAdapter.rollback() (OMN-9579), and the readiness handoff topics. The deploy
  agent is still reached only over onex.cmd.deploy.rebuild-requested.v1 / onex.evt.deploy.rebuild-completed.v1.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
  - "envelopes"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-redeploy-fsm-tests"
    description: "The node_redeploy lane / FSM / rollback test suite passes locally on the implementation
      branch, including the deploy-agent effect-boundary and rolled-back deploy event coverage."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-redeploy-fsm-tests/command.yaml"
          && grep -q '65 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-redeploy-fsm-tests/command.yaml"
          && grep -q 'uv run pytest tests/test_redeploy' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-redeploy-fsm-tests/command.yaml"
  - id: "dod-rollback-xfail-now-passes"
    description: "The OMN-9579 rollback tests (previously xfail) now pass: a failed post-deploy health
      check restores the previous image and emits onex.evt.omnimarket.redeploy-rolled-back.v1."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-rollback-xfail-now-passes/command.yaml"
          && grep -q 'redeploy-rolled-back' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-rollback-xfail-now-passes/command.yaml"
  - id: "dod-lint-typecheck"
    description: "ruff format/check and mypy --strict pass for node_redeploy on the implementation branch."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-lint-typecheck/command.yaml"
          && grep -q 'no issues found' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-lint-typecheck/command.yaml"
  - id: "dod-omnimarket-pr-1015"
