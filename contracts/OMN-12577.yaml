      head commit, and merge commit."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-omnimarket-pr-1015/command.yaml"
          && grep -q '^pr_number: 1015$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-omnimarket-pr-1015/command.yaml"
          && grep -q '^commit_sha: "5231ae4229ac3a5763f1e22fbff13e2be0714557"$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-omnimarket-pr-1015/command.yaml"
          && grep -q '"state":"MERGED"' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-omnimarket-pr-1015/command.yaml"
          && grep -q '"mergeCommit":{"oid":"d54219b368432fd0f586f8b0526977707dad3de0"}' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12577/dod-omnimarket-pr-1015/command.yaml"
  - id: "dod-occ-pr-self"
