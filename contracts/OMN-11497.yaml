title: "In-process ToolRegistry with restricted exec and validation gate"
summary: >-
  onex-self-extending-agent PR #79 adds src/agent/tool_registry.py with a ToolRegistry class that validates
  dynamically generated handlers, exec()s them in a restricted globals dict (strips open/exec/eval/compile/__import__),
  and enforces a ThreadPoolExecutor-based timeout for safe concurrent invocations. Replaces the pre-existing
  SIGALRM-based timeout (unsafe from worker threads) per CodeRabbit review.
