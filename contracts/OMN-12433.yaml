schema_version: "1.0.0"
ticket_id: "OMN-12433"
title: "Self-hosted CI runner github.com egress healthcheck — dead runners self-remove"
summary: >
  Add a github.com egress healthcheck to the CI runner image so a runner that has silently lost its GitHub
  connection is marked unhealthy and removed from rotation, instead of staying "healthy" in Docker while
  offline in the pool. Root cause of the 2026-05-29 CI wedge where ~9 of 20 runners were disconnected
  but Docker-healthy. omnibase_infra PR replaces the pgrep-only healthcheck with healthcheck.sh (listener
  + github.com probe), wired in the Dockerfile and mounted into every runner service.
