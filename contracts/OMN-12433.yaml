    description: >-
      Runner healthcheck.sh probes github.com egress in addition to the Runner.Listener process; the compose
      healthcheck for every omninode-runner service invokes the script (not bare pgrep) and mounts it.
      Verified by tests/unit/observability/runner_health/test_runner_fleet_config.py (151 passed) and
      shellcheck-clean script.
    source: "manual"
    status: "verified"
    checks:
