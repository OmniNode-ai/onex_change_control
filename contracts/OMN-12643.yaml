title: "Delegation inference handler fails fast on empty model content"
summary: >
  Central evidence for the OMN-12643 stability hotpatch and omnimarket PR #1030. The inference effect
  no longer publishes null or whitespace-only model content as a success-shaped ModelInferenceResponseData.
  Blank content now routes through the existing error_message envelope path so SEA and the delegation
  orchestrator observe a typed failure instead of an empty node.
