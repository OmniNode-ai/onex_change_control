      --strict && OMNIBASE_INFRA_PATH=/Users/jonah/Code/omni_home/omnibase_infra uv run pre-commit run
      --all-files"
  - kind: "manual"
    description: "Deploy impact is reviewed for the new omnimarket runtime node and dev-target PR behavior."
    command: "deploy impact review for omnimarket PR #951"
  - kind: "manual"
    description: "omniclaude PR #1695 carries the OMN-7466 skill shim at the recorded head."
    command: "gh pr view 1695 --repo OmniNode-ai/omniclaude --json number,url,headRefOid,headRefName,title,state,baseRefName"
  - kind: "tests"
    description: "Focused skill/backing-node tests and staged pre-commit hooks pass for the omniclaude
      shim."
    command: "OMNIMARKET_ROOT=/Users/jonah/Code/omni_home/omnimarket uv run pytest tests/unit/skills/_lib/test_validate_skill_backing_node.py
      tests/skills/test_no_monorepo_refs_in_plugin_skills.py -q && uv run pre-commit run"
  - kind: "manual"
    description: "Deploy impact is reviewed for the omniclaude dispatch-only skill shim and generated
      node shells."
    command: "deploy impact review for omniclaude PR #1695"
