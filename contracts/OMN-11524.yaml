evidence_requirements:
  - kind: "manual"
    description: "onex-self-extending-agent PR #103 carries the OMN-11524 implementation at the recorded
      head."
    command: "gh pr view 103 --repo OmniNode-ai/onex-self-extending-agent --json number,state,headRefName,headRefOid,url,title"
  - kind: "tests"
    description: "Unit, lint, format, and strict typecheck verification passed locally."
    command: "uv run ruff check src tests && uv run ruff format --check src tests && uv run mypy src/
      --strict --ignore-missing-imports && PYTHONDONTWRITEBYTECODE=1 uv run pytest tests/unit -q"
  - kind: "manual"
    description: "Source grep confirms no legacy endpoint/model env reads remain under src/."
    command: "rg -n 'os\\.environ\\.get\\(\"ONEX_TRACK_A_ENDPOINT\"\\)|os\\.environ\\[\"ONEX_TRACK_A_ENDPOINT\"\\]|ONEX_TRACK_A_MODEL|LLM_CODER_URL|LLM_CODER_MODEL'
      src || true"
  - kind: "ci"
    description: "onex_change_control PR carrying this central evidence is bound to OMN-11524."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11524/dod-occ-pr/command.yaml"
