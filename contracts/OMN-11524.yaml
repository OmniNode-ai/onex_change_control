ticket_id: "OMN-11524"
title: "feat(OMN-11524): contract-first model registry + env var elimination"
summary: >-
  Move live model endpoint and model identity configuration for the SEA demo into the typed model registry
  contract while keeping the API key as the only runtime secret overlay.
is_seam_ticket: false
interface_change: true
