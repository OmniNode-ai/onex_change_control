  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-1761-product-head"
    description: >-
      Product-observing verification for omnimarket PR #1761 at head cc8aa7034d92f050b67d3d0ba0ca7856de39780b.
      The proof reads PR metadata and changed files from GitHub at that exact head, verifies the PR targets
      dev, and checks the load-bearing RSD-2 surfaces: node_occ_state_effect contract/handler/request
      model, the optional downstream_check_value seam in node_occ_companion_compute, and focused regression
      tests.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1761; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=cc8aa7034d92f050b67d3d0ba0ca7856de39780b;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + ((.files | map(.path)) | join("\n"))'
          > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fxq dev "$d/pr.txt" && grep -Fq
          'feat(OMN-14619): RSD-2 read-EFFECT for node_occ_companion_compute' "$d/pr.txt" && for p in
          src/omnimarket/nodes/node_occ_state_effect/contract.yaml src/omnimarket/nodes/node_occ_state_effect/handlers/handler_occ_state_effect.py
          src/omnimarket/nodes/node_occ_state_effect/models/model_occ_state_request.py src/omnimarket/nodes/node_occ_companion_compute/models/model_occ_companion_request.py
          src/omnimarket/nodes/node_occ_companion_compute/handlers/handler_occ_companion_compute.py tests/unit/nodes/node_occ_state_effect/test_symbol_derivation.py
          tests/nodes/node_occ_state_effect/test_golden_chain_occ_state_effect.py tests/unit/nodes/node_occ_companion_compute/test_occ_companion_compute_seam.py;
          do grep -Fq "$p" "$d/pr.txt" && mkdir -p "$d/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'node_occ_state_effect' "$d/src/omnimarket/nodes/node_occ_state_effect/contract.yaml"
          && grep -Fq 'class ModelOccStateRequest' "$d/src/omnimarket/nodes/node_occ_state_effect/models/model_occ_state_request.py"
          && grep -Fq 'downstream_check_value' "$d/src/omnimarket/nodes/node_occ_companion_compute/models/model_occ_companion_request.py"
          && grep -Fq 'select_asserted_check' "$d/src/omnimarket/nodes/node_occ_state_effect/handlers/handler_occ_state_effect.py"
          && grep -Fq 'build_content_read_check' "$d/src/omnimarket/nodes/node_occ_state_effect/handlers/handler_occ_state_effect.py"
          && grep -Fq 'TestDownstreamCheckOverride' "$d/tests/unit/nodes/node_occ_companion_compute/test_occ_companion_compute_seam.py"
          && grep -Fq 'build_content_read_check(' "$d/tests/unit/nodes/node_occ_state_effect/test_symbol_derivation.py"
  - id: "dod-omnimarket-pr-1761-local-verification"
    description: >-
      Verification evidence recorded in the omnimarket PR #1761 body at head cc8aa7034d92f050b67d3d0ba0ca7856de39780b.
      The proof binds the live PR head and checks that the body records the live canary RED-control proof,
      no-op/idempotency proof against already-bound OCC references, focused tests, mypy/ruff, and pre-commit.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1761; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=cc8aa7034d92f050b67d3d0ba0ca7856de39780b;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,body --jq '.headRefOid
          == "'$PRODUCT_HEAD'" and (.body | contains("exit 0 (1 match) at head SHA")) and (.body | contains("exit
          1 (0 matches, RED) at base SHA")) and (.body | contains("OCC#4135")) and (.body | contains("OCC#4136"))
          and (.body | contains("proof_class: receipt-bound")) and (.body | contains("tests/unit/nodes/node_occ_state_effect/test_symbol_derivation.py"))
          and (.body | contains("tests/nodes/node_occ_state_effect/test_golden_chain_occ_state_effect.py"))
          and (.body | contains("TestDownstreamCheckOverride")) and (.body | contains("uv run mypy --strict"))
          and (.body | contains("uv run pre-commit run"))' | grep -qx true
  - id: "dod-omnimarket-pr-1761-runtime-scope"
    description: >-
      Runtime-surface assessment for omnimarket PR #1761. The product diff adds a read-only OCC state-effect
      node, contract metadata, GitHub API helpers, and unit/golden-chain tests. It deliberately excludes
      write-side clone/push/PR-open effects, Kafka wiring, live deploys, restarts, docker exec, rpk topic
      produce, database mutation, and .201 mutation.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1761; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=cc8aa7034d92f050b67d3d0ba0ca7856de39780b;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,files,body
          --jq '.headRefOid + "\n---FILES---\n" + ((.files | map(.path)) | join("\n")) + "\n---BODY---\n"
          + .body' > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt" && grep -Fq 'src/omnimarket/github_api.py'
          "$d/pr.txt" && grep -Fq 'src/omnimarket/nodes/node_occ_state_effect/contract.yaml' "$d/pr.txt"
          && grep -Fq 'src/omnimarket/nodes/node_occ_state_effect/handlers/handler_occ_state_effect.py'
          "$d/pr.txt" && grep -Fq 'RSD-3 (write-EFFECT: clone/push/PR-open + trigger/orchestrator)' "$d/pr.txt"
          && grep -Fq 'Not wired to Kafka' "$d/pr.txt" && ! grep -Eiq '(docker exec|rpk topic produce|database
          mutation|live deploy|restart .201|restart.*omninode-pc)' "$d/pr.txt"
