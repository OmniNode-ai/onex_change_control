schema_version: "1.0.0"
ticket_id: "OMN-12638"
title: "fix: node_dirty_canonical_sweep auto-ship PRs satisfy pr-title + receipt gates"
summary: >-
  Epic OMN-7466 / skill /onex:ship_dirty_canonical. HandlerDirtyCanonicalSweep._create_pr (omnimarket/src/omnimarket/nodes/node_dirty_canonical_sweep/handlers/handler_dirty_canonical_sweep.py)
  generated rescue PRs whose TITLE ("auto-ship(<repo>): rescue uncommitted changes [<repo>]") contained
  no OMN-XXXX reference and matched no exempt deps/release prefix, and whose BODY cited no ticket in a
  form the receipt gate parses. Both gates are required, so every rescue PR was permanently unmergeable.
  Evidence: omniclaude PR #1722, titled "auto-ship(omniclaude): rescue uncommitted changes", failed pr-title/check-title
  AND verify/Run Receipt-Gate and was closed unmerged. The very automation meant to rescue uncommitted
  work produced PRs that could not land, defeating OMN-7466. Fix (omnimarket PR): stamp the tracking epic
  OMN-7466 into the generated title ("chore(OMN-7466): auto-ship <repo> — rescue uncommitted canonical
  changes") and body, so pr-title/check-title matches OMN-[0-9]+ (path 4) and the receipt gate resolves
  the OMN-7466 citation against its existing PASS dod_evidence receipts. The free-text skip-receipt-gate
  escape hatch is intentionally NOT used: the OMN-10417 hardening rejects any bracketed skip token that
  is not a bare allowlisted identifier (SKIP_TOKEN_PATTERN matches it but OVERRIDE_PATTERN does not),
  so the ticket-citation path is the only form that passes both gates without per-PR allowlist plumbing.
  Both generated strings were verified end-to-end against the live pr-title and validator_receipt_gate
  validators (receipt gate: 12 checks across OMN-7466, all PASS).
