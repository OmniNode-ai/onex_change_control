schema_version: "1.0.0"
ticket_id: OMN-13395
title: "fix(OMN-13395): receipt-gate identity-binding rejects dual-ticket branch names (omn-A-B fails
  to match OMN-B)"
summary: >
  Fix the receipt-gate identity-binding branch axis (omnibase_core .../validation/validator_receipt_gate.py::_verify_ticket_identity)
  so a dual-ticket branch like jonah/omn-13234-13362-... with Evidence-Ticket: OMN-13362 passes the Axis-2
  branch check. The exact-token pattern only matched a literal OMN-<n>, so a trailing id in an omn-A-B(-C...)
  cluster (preceded by '-', not 'OMN-') never matched, even though the PR title and the receipt binding
  both referenced the same ticket. The fix is scoped to the branch axis only: when the exact-token match
  fails, scan the branch for every omn-<n>(-<n>)* cluster and test the Evidence-Ticket's numeric id for
  membership. Axis 1 (PR title) is unchanged.
