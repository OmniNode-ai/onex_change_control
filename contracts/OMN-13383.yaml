schema_version: "1.0.0"
ticket_id: "OMN-13383"
title: "Fix wrong stability-test broker port (39092) in e2e harness docs"
summary: >-
  Central evidence for omnimarket PR #1316. The e2e-probe harness and the delegation golden-chain integration
  test documented the dev lane Kafka port (19092) for the stability-test lane. Stability-test Redpanda
  is on 39092 (cluster ae26157e); dev is 19092 (cluster a54e5d22). The mislabeling caused a contractor
  to publish synthetic events to the dev broker while querying stability-test, producing a Gate-Zero false
  alarm (discovered during OMN-13363). The fix corrects the documented stability-test defaults/examples
  to 39092 and clarifies that the harness _DEFAULT_KAFKA constant is the dev default (stability-test overrides
  via ONEX_E2E_KAFKA_BOOTSTRAP). The golden-chain test's connection constants are explicitly the stability-test
  lane (PG default 15436), so its Kafka default is corrected to 39092. Documentation/default-correctness
  only: no event-bus topic, REST endpoint, node contract, image dependency, or live runtime mutation is
  changed. Parent ticket OMN-13363.
