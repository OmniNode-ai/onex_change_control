schema_version: "1.0.0"
ticket_id: "OMN-14567"
title: "omniclaude status line hangs ~75s on unroutable host probe — bound nc connect timeout with -G"
summary: >-
  omniclaude PR #1899 bounds the `nc` connect phase in `plugins/onex/hooks/scripts/statusline.sh`'s `tcp_up()`
  with `-G 1`. macOS BSD `nc`'s `-w` bounds only the final read, not connection setup, so against an unroutable
  host (e.g. a 192.168.86.x LAN IP while off-network) `connect()` blocks ~75s on kernel SYN-retransmit
  and stalls the whole status line past Claude Code's render timeout (blank status line). `-G` is the
  portable BSD-nc connect timeout and keeps the probe within its 1s budget. Scripts-only change (no src/
  or runtime-path change), so deploy-gate is deploy-neutral.
