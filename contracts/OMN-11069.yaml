    description: "OverlayConfigResolver unit tests pass — resolves keys, raises RequiredConfigMissingError,
      apply_to_environment returns injection result."
    command: >-
      uv run pytest tests/unit/runtime/overlay/test_overlay_config_resolver.py -v
  - kind: "tests"
    description: "OverlayFileLoader unit tests pass — loads valid YAML, rejects invalid schema and bad
      permissions."
