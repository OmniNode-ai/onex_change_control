title: "feat(OMN-11069): Contract-overlay configuration — replace .env with contract overlays"
summary: >-
  Wire the existing overlay infrastructure into runtime boot and onboarding so that contracts + overlays
  replace .env files as the single configuration source of truth. Implements ModelOverlayFile, ModelOverlayResolutionManifest
  (omnibase_core), OverlayFileLoader, OverlayConfigResolver, OverlayWriter, boot_overlay.py, and CI os.environ
  anti-regression gate (omnibase_infra).
