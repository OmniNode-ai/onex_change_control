schema_version: "1.0.0"
ticket_id: "OMN-12972"
title: "fix(OMN-12972): align Gemini registry+tiers with Vertex-served names per environment (P2.7)"
summary: >-
  P2.7 Gemini registry/version hygiene. gemini-2.0-flash 404'd on Vertex; the registry was retargeted
  to gemini-2.5-flash-lite (OMN-12937) but carried a single bare served name and so could not express
  that Vertex serves the publisher-qualified resource path (publishers/google/models/<name>) while AI
  Studio (generativelanguage) serves the bare name. Posting the bare name to the Vertex environment 404s.
  This adds a served_model_names per-environment map to the Gemini registry entry (ai_studio bare, vertex
  publisher-qualified), a typed served_model_names field + validator on ModelLlmModelProfile, a registry
  version bump (1.2.0 -> 1.3.0) with regenerated routing constants, and an enforcement ratchet: scripts/ci/check_model_registry_served_names.py
  wired as a pre-commit hook AND a CI step that bans retired/404 model ids, requires Vertex names publisher-qualified
  and AI-Studio names bare, enforces model_name == served_model_names[ai_studio], and enforces registry<->bifrost-backend
  model_name agreement (no registry/tier drift). Pure contract/config; live Vertex 200-probe is deploy_pending
  behind the batched stability rebuild.
