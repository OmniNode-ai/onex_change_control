---
schema_version: "1.0.0"
ticket_id: "OMN-13321"
title: "feat(merge-sweep): emit durable per-PR ledger projection every sweep iteration"
summary: >
  Enforcement Map F5 (hardens OMN-12569). The PR-lifecycle state reducer (node_pr_lifecycle_state_reducer)
  now materializes one user-readable ledger row per PR EVERY sweep iteration -- not only at sweep end
  -- so an operator can answer "what does the ledger say right now?". Each row carries the ticket-required
  fields found_at / repo+pr / initial_state / action_taken / evidence / final_state / next_check_at, keyed
  by (sweep_id, repo, pr_number, iteration) so two consecutive iterations both produce rows and neither
  overwrites the other. A new shared model omnimarket.projection.pr_ledger_projection (ModelPrLedgerProjectionRow
  + pure build_ledger_rows) is homed in the shared projection package (not a node package) to satisfy
  the cross-node reach-in guard and avoid an import cycle. The reducer handle() gains projection_db +
  sweep_id + iteration + found_at and UPSERTs one row per PR per iteration through ProtocolProjectionDatabaseSync;
  with no projection_db AND no sweep_id the reducer remains the pure classifier, and supplying one without
  the other fails fast (no half-configured durable surface silently dropping rows -- the OMN-12569 failure
  mode this hardens). The orchestrator passes projection_db + sweep_id(=run_id) + a per-sweep iteration
  index resolved from the durable projection (max+1) so consecutive passes append distinct rows. contract.yaml
  declares projection_api + db_io (topic onex.snapshot.projection.pr-lifecycle-ledger.v1, table pr_lifecycle_ledger_entries
  -- declared in the contract, not hardcoded only in code) and a node-owned migration creates pr_lifecycle_ledger_entries
  in omnidash_analytics with UNIQUE(sweep_id,repo,pr_number,iteration). No new node, no envelope/contract-API
  change, no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Focused tests proving the per-iteration emission and the DoD probe semantics. The new suite covers
      the pure row-builder (exact ticket fields), the reducer handle() writing one row per PR per iteration
      through the projection database, two consecutive iterations both producing distinct durable rows
      (DoD count >= open-PR count for the sweep), fail-fast on a half-configured durable surface, and
      the contract declaring the projection topic + table. An orchestrator-path integration test drives
      the REAL reducer through two consecutive passes and asserts iterations [0,1] both materialize rows.
    command: "uv run pytest tests/test_pr_lifecycle_ledger_projection_omn13321.py -q"
emergency_bypass:
