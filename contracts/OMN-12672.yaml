---
schema_version: "1.0.0"
ticket_id: "OMN-12672"
title: "Bind OCC evidence for omnibase_infra a2a-sdk compatibility cap"
summary: >
  Central OCC evidence for omnibase_infra PR #1865, a ticketed replacement for Dependabot PR #1854. The
  product PR caps the a2a-sdk dependency range in omnibase_infra at >=0.3.4,<1.0.0 after review found
  the proposed v1.x allowance unsafe for the current v0.3-era A2A handler surface.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra PR #1865 is open against dev at the recorded ticketed head."
    command: "gh pr view 1865 --repo OmniNode-ai/omnibase_infra --json state,headRefOid,baseRefName"
  - kind: "manual"
    description: "Focused local dependency and A2A handler verification passed for omnibase_infra PR #1865."
    command: "uv lock --check && uv run pytest tests/unit/nodes/node_remote_agent_invoke_effect/test_handler_a2a_task.py
      tests/integration/test_remote_agent_invoke_effect_contract.py tests/integration/test_remote_agent_invoke_runtime_discovery.py
      -q"
  - kind: "ci"
    description: "Required non-Receipt-Gate checks on omnibase_infra PR #1865 are SUCCESS or SKIPPED."
    command: "gh pr checks 1865 --repo OmniNode-ai/omnibase_infra --required --json name,state,workflow"
  - kind: "manual"
    description: "The runner-image-build-smoke disposition for omnibase_infra PR #1865 is recorded."
    command: "gh pr checks 1865 --repo OmniNode-ai/omnibase_infra --json name,state,workflow"
  - kind: "manual"
    description: "The OCC PR carrying this central evidence is open and bound to OMN-12672."
    command: "gh pr view jonah/omn-12672-a2a-sdk-occ --repo OmniNode-ai/onex_change_control --json state,headRefOid"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-infra-pr-1865-head"
    description: "omnibase_infra PR #1865 is open against dev at the recorded ticketed a2a-sdk cap head."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12672/dod-infra-pr-1865-head/command.yaml"
          && grep -q '^pr_number: 1865$' "drift/dod_receipts/OMN-12672/dod-infra-pr-1865-head/command.yaml"
          && grep -q '^commit_sha: "ac28553669909baedb0b46fd332915cc5068a55c"$' "drift/dod_receipts/OMN-12672/dod-infra-pr-1865-head/command.yaml"
  - id: "dod-local-a2a-verification"
    description: "Focused local dependency, A2A handler, runner identity, and diff checks passed for PR
      #1865."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12672/dod-local-a2a-verification/command.yaml"
          && grep -q '23 passed' "drift/dod_receipts/OMN-12672/dod-local-a2a-verification/command.yaml"
          && grep -q '37fdee0d8f3f91a39a178c781903f487' "drift/dod_receipts/OMN-12672/dod-local-a2a-verification/command.yaml"
  - id: "dod-infra-pr-1865-required-non-receipt-checks"
    description: "Required non-Receipt-Gate checks on omnibase_infra PR #1865 are green or skipped."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12672/dod-infra-pr-1865-required-non-receipt-checks/command.yaml"
          && grep -q 'required non-Receipt-Gate checks are SUCCESS or SKIPPED' "drift/dod_receipts/OMN-12672/dod-infra-pr-1865-required-non-receipt-checks/command.yaml"
  - id: "dod-runner-image-smoke-disposition"
    description: "Runner image smoke status is captured for omnibase_infra PR #1865."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12672/dod-runner-image-smoke-disposition/command.yaml"
          && grep -q 'runner-image-build-smoke' "drift/dod_receipts/OMN-12672/dod-runner-image-smoke-disposition/command.yaml"
  - id: "dod-occ-pr-self"
    description: "onex_change_control PR carries the OMN-12672 central contract and receipts."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "drift/dod_receipts/OMN-12672/dod-occ-pr-self/command.yaml" && grep
          -q '^ticket_id: "OMN-12672"$' "drift/dod_receipts/OMN-12672/dod-occ-pr-self/command.yaml"
