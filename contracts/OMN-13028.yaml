ticket_id: "OMN-13028"
title: "Contract validator — command-category handler_routing entries MUST declare event_model (commit-time
  fail-fast)"
summary: >-
  Bind omnibase_core PR #1337 to central OCC evidence for OMN-13028 (A-9): a commit-time contract validator
  requiring that every handler_routing entry tagged message_category=command declares a non-empty event_model.
  A command entry with no event_model is the exact OMN-13003 failure (command handler with no event_model)
  — ladder layer 1 of the OMN-13003/13005 top-10 failure (Wall of Shame row 14). The PR adds the validator
  module, a Pydantic finding model, 12 unit tests, an exported pre-commit hook, and a standalone required
  CI workflow (validator-command-category-event-model.yml) that runs the unit tests and self-scans src/omnibase_core.
  The boot-time half of the ticket (auto-wiring raising on a no-op/None-returning injected consumer, the
  OMN-13005 leg) is scoped as a follow-up per the ticket DoD; this PR delivers the commit-time, pure-code
  validator. The PR changes a validator module, a model, tests, a pre-commit hook, and a CI workflow only;
  no live service deploy, runtime restart, Kafka topic mutation, or database migration is required before
  merge.
