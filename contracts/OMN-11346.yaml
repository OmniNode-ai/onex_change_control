  pin fix release), omnimarket v0.3.1 (first PyPI publish — prior v0.3.0 tag workflow failed at version-match
  assertion), omniclaude v0.24.0 (feature wave since v0.20.0). Evidence is added incrementally as release
  PRs land, mirroring the OMN-11104 batch precedent.
