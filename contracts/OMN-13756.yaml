title: "fix(OMN-13756,OMN-13757): widen PR-check to Backlog + enumerate orphaned/stale tickets"
summary: >-
  Two correctness fixes in node_linear_triage handler. OMN-13756: _phase_pr_check hardcoded {"In Progress","In
  Review"}, silently skipping Backlog tickets even though _ACTIVE_STATES already declares Backlog eligible.
  Changed the filter to use _ACTIVE_STATES. OMN-13757: ModelLinearTriageResult reported orphaned/stale
  as bare int counts; added orphaned_tickets and stale_tickets list fields populated with the full ticket
  list (no cap), with len==count invariant enforced before return.
