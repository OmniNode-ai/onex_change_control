schema_version: "1.0.0"
ticket_id: "OMN-12957"
title: "Runtime-profile contract validator — registered-profile + consumer-lane rules (P1.1)"
summary: >
  Generalizes OMN-12950. A node contract could declare any runtime_profiles string; a nonexistent profile
  (e.g. [compute]) silently orphaned the node — the auto-wiring ownership filter (omnibase_infra profile_ownership.filter_manifest_for_runtime_profile)
  assigned it to no running runtime, so zero consumer groups, zero errors, empty projection tables. This
  change adds the canonical runtime-profile registry in omnibase_core (constants_runtime_profiles.REGISTERED_RUNTIME_PROFILES
  = the 9 profile names the runtime can boot; CONSUMER_ATTACHED_RUNTIME_PROFILES = main/effects/workers)
  and extends ValidatorRuntimeProfiles with two new rules: runtime_profile_unregistered (every declared
  profile must be in REGISTERED_RUNTIME_PROFILES — catches the OMN-12950 class directly and finds 16 real
  orphans in omnimarket) and runtime_profile_no_consumer_lane (a subscribing REDUCER/EFFECT must name
  a consumer-attached profile or its subscriptions are never drained — the second silent-orphan class
  flagged in operator review: manifest-declares-node != consumer-attached). Core owns the profile NAME
  set so contract validation enforces membership without a core->infra dependency; infra owns the BEHAVIOUR
  (_PROFILES) and carries a parity test (test_profiles_match_core_registry). The omnimarket runtime_sweep
  node gains the operator-review dual check (PROFILE_NO_LIVE_CONSUMER): manifest profile vs live consumer-group
  census. Consumer repos vendor a frozen baseline allowlist at <repo>/validation/runtime_profiles_allowlist.yaml,
  discovered deterministically by walking up to the pyproject.toml root (no env var — passes the no-new-os.environ
  gate). The gate blocks NEW orphans; pre-existing ones (19 in omnibase_infra, 133 in omnimarket) are
  frozen and drained via OMN-12982.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      tests/unit/validation/test_validator_runtime_profiles.py (omnibase_core): 24 tests pass covering
      both new rules (unregistered x4, no-consumer-lane x6), deterministic repo-baseline allowlist discovery
      (x2), registry parity, and the pre-existing OMN-9886 missing-profile suite. tests/test_golden_chain_runtime_sweep.py
      (omnimarket): 14 pass including the 4 PROFILE_NO_LIVE_CONSUMER dual-check cases. mypy --strict clean
      on the changed modules.
    command: "uv run pytest tests/unit/validation/test_validator_runtime_profiles.py -q"
