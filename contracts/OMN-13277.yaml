ticket_id: "OMN-13277"
title: "Resolve RuntimeLocal event-driven initial payload from event_model or handler"
summary: >-
  OMN-13277 hardens omnibase_infra RuntimeLocal event-driven dispatch so the initial command payload model
  is resolved from the top-level input_model, the first routing entry event_model, the handler input_model,
  or the handler's typed BaseModel positional parameter. If no model can be resolved, RuntimeLocal fails
  loud with a typed ModelOnexError instead of publishing a degenerate correlation_id-only payload. The
  PR also vendors the node migrations required by the current omnimarket dev tree so clean redeploys keep
  projection tables in sync.
