---
schema_version: "1.0.0"
ticket_id: "OMN-10602"
title: "Fix omnibase_core Auto-Merge workflow fanout queue flood"
summary: "check_suite fires on every CI workflow completion, flooding the Actions queue with runs that
  immediately no-op because there is no PR context. This fix adds a lightweight pre-check job (no checkout,
  no Python/uv setup) that emits skip=true when there is no associated PR, so the expensive auto-merge
  job is skipped entirely. A concurrency group per PR cancels redundant queued runs."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnibase_core PR #1046 is open against main with the workflow fix committed"
    command: "gh pr view 1046 --repo OmniNode-ai/omnibase_core --json state,baseRefName --jq '.state +
      \":\" + .baseRefName' | grep -q 'OPEN:main'"
  - kind: "manual"
    description: "No runtime deploy is required; this change only modifies GitHub Actions workflow behavior."
    command: "echo 'no runtime deploy required: GitHub Actions workflow-only change'"
