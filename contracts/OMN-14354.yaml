      non-sensitive keys. The 9 tests genuinely exercise all of the above (waiver both directions, degenerate-zero,
      scrub-deep, input-hash-order-independence, handler-hash-file-match, greedy selection drops redundant
      candidates, and two end-to-end build_receipt fail-closed cases); 9 passed. ruff clean; mypy --strict
      clean on adequacy_receipt.py. MEDIUM FINDING (adversarial probe beyond the stated criteria; non-blocking,
      documented for follow-up): _check enforces the waiver<->meets_target consistency but does NOT verify
      meets_target == (branch_coverage_pct >= coverage_target), so a hand-built/persisted receipt with
      branch_coverage_pct=10, coverage_target=80, meets_target=True, selected_count=1, uncovered_waiver=None
