ticket_id: "OMN-13886"
title: "local Mac dev-lane omninode-runtime crash-loop: arch-aware coding-agent CLI install"
summary: >-
  The local Apple Silicon dev-lane omninode-runtime crash-looped on ONEX_CORE_041 (local_ingress.enabled_profiles
  / pattern_b_broker.enabled_profiles extra_forbidden), killing the canonical bus-based dod_verify dispatch
  path. Root cause: the OMN-13248 coding-agent CLI block in docker/Dockerfile.runtime hard-pins the x64-only
  npm platform packages (@openai/codex-linux-x64, @anthropic-ai/claude-code-linux-x64), so every linux/arm64
  image build fails ("notsup Actual cpu: arm64") and the local image was frozen at 2026-05-03 - predating
  the enabled_profiles schema fields added 2026-05-08 (OMN-10207, af2124bd). omnibase_infra PR #2195 selects
  the platform npm package via BuildKit TARGETARCH (amd64 -> -linux-x64, arm64 -> -linux-arm64) with exact
  version pins preserved. Verified on the local lane: arm64 build succeeds, omninode-runtime healthy with
  RestartCount=0, dod-verify-start consumer group Stable, and a live bus-based dod_verify round-trip completed
  (correlation caff11e2-763b-4a45-ac7e-6c61ab88c1e6).
