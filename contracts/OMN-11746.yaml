---
schema_version: "1.0.0"
ticket_id: "OMN-11746"
title: "Write wave-ordered dev/main cutover script"
summary: >
  Adds an OCC-owned dev/main cutover CLI that plans all 13 repositories in dependency-ordered waves, enforces
  one-wave-at-a-time live execution stop points, recreates missing dev branches, copies main branch protection
  to dev, switches the default branch to dev, retargets open PRs through a safe Python loop, and writes
  a cutover_manifest.json evidence report.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
  - "protocols"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused cutover tests validate manifest generation, stop-point enforcement, missing-dev branch creation,
      branch-protection payload normalization, and PR retarget planning.
    command: "uv run pytest tests/promotion/test_cutover.py -q"
  - kind: "tests"
    description: >
      Promotion package regression tests validate the new cutover CLI alongside existing promotion manifest/workflow
      and promotion bot policy behavior.
    command: "uv run pytest tests/promotion/test_cutover.py tests/promotion/test_manifest.py tests/promotion/test_workflow.py
      tests/overseer/test_promotion_bot_policy.py -q"
  - kind: "manual"
    description: "Ruff validates formatting, import ordering, and lint rules for the cutover files."
    command: "uv run ruff format src/onex_change_control/promotion/cutover.py tests/promotion/test_cutover.py
      && uv run ruff check src/onex_change_control/promotion/cutover.py tests/promotion/test_cutover.py"
  - kind: "manual"
    description: "Mypy validates the cutover CLI under strict repo typing rules."
    command: "uv run mypy src/onex_change_control/promotion/cutover.py"
  - kind: "manual"
    description: >
      Live dry-run uses GitHub read APIs only and writes a full 13-repo cutover manifest.
    command: "uv run dev-main-cutover --output /tmp/omn11746-cutover-dry-run.json"
  - kind: "manual"
    description: "Ticket contract validates against the central OCC ticket contract model."
    command: "uv run validate-yaml contracts/OMN-11746.yaml"

dod_evidence:
  - id: "dod-cutover-focused-tests"
    description: "OMN-11746 focused cutover tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-focused-tests/command.yaml"
          && grep -q '6 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-focused-tests/command.yaml"
  - id: "dod-cutover-regression-tests"
    description: "OMN-11746 promotion regression tests pass."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-regression-tests/command.yaml"
          && grep -q '21 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-regression-tests/command.yaml"
  - id: "dod-cutover-lint"
    description: "OMN-11746 cutover files pass ruff format and lint checks."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-lint/command.yaml"
          && grep -q 'All checks passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-lint/command.yaml"
  - id: "dod-cutover-mypy"
    description: "OMN-11746 cutover CLI passes mypy."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-mypy/command.yaml"
          && grep -q 'Success: no issues found' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-mypy/command.yaml"
  - id: "dod-cutover-dry-run"
    description: "OMN-11746 live dry-run generated a 13-repo cutover manifest."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-dry-run/command.yaml"
          && grep -q 'repo_count=13' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-cutover-dry-run/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11746 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11746.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11746/dod-ticket-contract-valid/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
