title: "Projection freshness from contract cadence — idle is a distinct honest state"
summary: >-
  Central evidence for omnimarket PR #1401, which makes projection freshness contract-declared (retro
  B-7 cry-wolf fix). Contracts declare an OPTIONAL expected_event_interval_seconds; the projection API
  computes fresh/idle/stale against that declaration. On-demand topics (no cadence) never report stale
  from silence; idle becomes a first-class freshness state distinct from stale. The change is contract-native
  and serving-path only (no runtime mutation); this contract supplies the central Receipt-Gate and deploy-gate
  evidence cited by the product PR.
