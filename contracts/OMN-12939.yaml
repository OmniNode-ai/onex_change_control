schema_version: "1.0.0"
ticket_id: "OMN-12939"
title: "Terminate delegation FSM when escalation tier is unroutable (projection-row gap)"
summary: >
  Live stability-test delegation CID a604cd40 produced zero delegation_events projection rows because
  the FSM stranded permanently in ROUTED. On quality-gate failure across local and cheap_cloud, the orchestrator
  escalated to the next declared tier via next_eligible_tier(), which returned a tier name by declaration
  order without checking routability. Escalating a document task off cheap_cloud returned the claude/frontier_api
  tier whose backend endpoints are empty, so the routing reducer's delta() raised ProtocolConfigurationError
  [ONEX_CORE_041], crashing the dispatcher with no routing-decision and no terminal delegation event —
  so the materializer had nothing to project. Fix makes next_eligible_tier task-aware (skip tiers that
  cannot route the task), so the orchestrator's existing no_higher_tier_available branch drives the FSM
  to terminal delegation-failed and a projection row always materializes even when escalation is impossible.
  Code-only handler change to omnimarket; no topic schema, envelope, or contract API change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Failing-first tests through the real dispatch path assert terminal FAILED, a delegation-failed event,
      and terminal_failure_reason=no_higher_tier_available when escalation has no routable higher tier.
    command: "uv run pytest tests/unit/delegation/test_delegation_tier_escalation.py -q"
emergency_bypass:
