schema_version: "1.0.0"
ticket_id: "OMN-13521"
title: "fix(OMN-13521): doc_freshness_sweep resolver O(refs x repos) serial grep — non-terminating; also
  scans nested worktrees"
summary: >-
  Dogfooding /onex:doc_freshness_sweep never completed: a background run was still grepping at >70 min
  wall time (~28s CPU) with no terminal result. Root cause is doc_reference_resolver._resolve_class_or_function:
  for every class/function reference in every markdown file across the repo set it ran one subprocess
  `grep -r -l` per reference per repo-root — O(total_refs x repo_roots) serial subprocess spawns, each
  scanning entire src/ trees. A secondary defect amplified it: the omnimarket handler _collect_md_files
  did not exclude nested git worktrees (.claude/worktrees, omni_worktrees), so ~50% (omniclaude) to ~89%
  (omnimarket) of scanned docs were duplicate worktree copies. Fix (two repos): (1) onex_change_control
  — batch class/function resolution by building an in-memory symbol index ONCE per repo-root (single os.walk
  over each src/ tree, nested-worktree/.venv dirs pruned in place) and resolving every reference in pure
  Python against the prebuilt index; no subprocess is spawned during resolution. Add a wall-clock time_budget_seconds
  guard (default 120s) that returns remaining references as exists=None (fail-loud, bounded) instead of
  running unbounded. Backward-compatible signature resolve_references(references, repo_roots, env_file=None,
  time_budget_seconds=120.0). (2) omnimarket — add a path-segment-scoped exclusion set to _collect_md_files
  covering .claude / worktrees / omni_worktrees plus generated trees, so nested worktree copies are skipped
  while legitimately-named docs survive. This OCC PR carries the central contract; the omnimarket PR cites
  OMN-13521 via Evidence-Ticket.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
