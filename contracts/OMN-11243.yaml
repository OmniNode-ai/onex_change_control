schema_version: "1.0.0"
ticket_id: "OMN-11243"
title: "Projection migration runner for omnimarket nodes"
summary: >
  Add an automated omnimarket projection migration runner that discovers node-local migrations, applies
  SQL in deterministic filename order, tracks applied schema migrations by node/version/checksum, and
  seeds the contract_registry projection DDL for node_contract_registry.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
  - "protocols"
evidence_requirements:
  - kind: "tests"
    description: "Focused projection migration runner unit tests pass."
    command: "uv run pytest tests/unit/test_projection_migration_runner.py -q"
  - kind: "ci"
    description: "omnimarket PR #705 non-receipt CI, test, typecheck, and deploy gates pass."
    command: "gh pr checks 705 --repo OmniNode-ai/omnimarket"
  - kind: "manual"
    description: "Stable migration runner artifacts and contract_registry DDL are present on omnimarket
      PR #705."
    command: "gh pr view 705 --repo OmniNode-ai/omnimarket --json files,headRefOid,state,url"
emergency_bypass:
