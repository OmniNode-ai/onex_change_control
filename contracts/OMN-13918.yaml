ticket_id: "OMN-13918"
title: "fix(OMN-13918): register redeploy as executable onex skill with explicit lane targeting + dry_run"
summary: >-
  omnimarket PR #1606 + omnibase_infra PR #2201 fix the redeploy skill executable-path defect. `onex skill
  redeploy` had no skill_mapping.yaml entry (Unknown skill) and no explicit lane targeting for the .201
  runtime redeploy path. omnibase_infra PR #2201 adds a `redeploy` entry mapping to node_redeploy_orchestrator
  with an explicit --lane arg (payload_field: runtime_lane) the mapping never defaults, so the lane can
  never silently resolve to prod; --scope / --git-ref / --dry-run round out the CLI surface. omnimarket
  PR #1606 adds ModelRedeployStartCommand.dry_run and threads it through HandlerRedeployOrchestrator._on_start
  so a dry-run short-circuits BEFORE the grant-resolve / gate-evaluate / deploy-publish / readiness-gate
  bus round-trip and emits a REAL terminal ModelRedeployCompletedEvent with no live deploy I/O: DONE for
  dev/stability-test, BLOCKED for prod (a dry-run cannot resolve the out-of-band promotion grant, so it
  never fabricates a passing gate decision and never silently succeeds as a real deploy). PR #1606 also
  fixes a state-coverage-gate false negative for TOPIC_GRANT_RESOLVE (already behaviorally tested, just
  via the imported constant rather than the literal contract string) and adds an honest test pinning that
  redeploy-phase-transition / readiness-gate-start remain contract-declared future outputs of the separate,
  unimplemented OMN-12577 readiness-handoff work. Live runtime rebuild/redeploy of the omninode-runtime
  image is outside this OCC evidence PR and remains operator-gated.
