schema_version: "1.0.0"
ticket_id: "OMN-12843"
title: "M3: policy-based context selection + Context Authority Rule (auditable per-run injection)"
summary: >-
  Adds EnumSelectionReason (omnibase_core) and node_context_selection_policy_compute (omnimarket COMPUTE)
  implementing the Context Authority Rule: every selected context factor carries the typed Authority 5-tuple
  {factor, source, selection_reason, effectiveness_score, experiment_cohort}. The compute node is stateless/deterministic
  with no I/O (mirrors node_routing_policy_engine), ranks candidates by M2-resolved measured effectiveness
  (passed in, never fetched) with ties broken deterministically by stable source id, and stamps each selection
  with one of five reasons: POLICY_EFFECTIVENESS, POLICY_REQUIRED_FACTOR, EXPERIMENT_ASSIGNMENT, EXPLORATION
  (reserved for M4), FALLBACK_NO_SCORE. The node REJECTS the hidden-authority case (a candidate justified
  only by profile declaration with no effectiveness score and no experiment cohort) and REJECTS a forced/arm-fixed
  candidate with no matching active experiment cohort. The effectiveness_score is None XOR selection_reason
  == FALLBACK_NO_SCORE invariant is enforced by a model validator (no silent defaults). CONTRACT/NODE/HANDLER
  only — no Plugin*/engine/router/manager class. Node-private models (single-repo importer; no cross-node
  private imports). No topic schema, envelope, protocol, or public API change. omniclaude live-wiring
  of HandlerContextInjection (ticket step #4) is DEFERRED to a follow-up ticket — out of scope for this
  omnimarket-only slice.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
