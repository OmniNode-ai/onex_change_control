schema_version: "1.0.0"
ticket_id: "OMN-14220"
title: "fix(OMN-14220): give declared local-first delegation classes a real local acceptance authority"
summary: >-
  omnimarket PR #1661 gives the four delegation task classes code_review, review, agent_delegation, and
  planning a real LOCAL acceptance authority so a valid LOCAL output PASSES the quality gate instead of
  force-escalating to a PAID cloud tier. Each class had a task_class_contracts entry but no non-reject-only
  authority: they were absent from _VERIFIABLE_TASK_TYPES, carried no semantic_adequacy in their DoD,
  and were not JUDGE_COMBINABLE, so delta() could never return passed=true on the local hop. The fix adds
  semantic_adequacy (the same local authority the OMN-13218/OMN-13963 siblings use) to all four DoD heuristic
  sets; removes the reject-only catch-22 markers explains_tradeoffs (review) and no_obvious_regressions
  (code_review) while keeping cites_specific_lines as the genuine "is this a code review" reject-only
  filter; implements planning's two declared-but-executorless heuristic markers structured_output and
  covers_dependencies as real reject-only checks (they previously hard-failed MALFORMED); and fixes two
  documentation false positives — the substring refusal phrase "error:" is moved to a word-boundary regex
  so a bare leading "Error:" still trips while an in-word "...ZeroDivisionError:" does not, and the docstring
  "raises:" section is made optional so a non-raising function is not rejected. An independent verifier
  (separate from the implementing agent) reproduced the before/after end-to-end: the pure delta() resolution
  per class via the merge-base (pre-fix) handler+contract vs the HEAD (post-fix) handler+contract, plus
  a live before/after `onex delegate --task-type review` on the co-installed infra venv deploy surface.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
