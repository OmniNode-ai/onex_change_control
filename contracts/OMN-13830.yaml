ticket_id: OMN-13830
title: "feat(OMN-13830): emit skill lifecycle events from receipt-mode CLI"
summary: >
  Headless `onex skill/node <name>` invocations run through omnibase_infra/src/omnibase_infra/cli/receipt_mode.py,
  which previously emitted only artifact.captured and tool.output.captured and never populated the skill_executions
  projection (migration 048_create_skill_executions.sql), whose consumer subscribes to onex.evt.omniclaude.skill-started.v1
  / skill-completed.v1. The downstream omnibase_infra PR emits a skill-started event before the node body
  runs and a skill-completed event after it finishes, through the same emit daemon socket used by the
  two capture events. Both share one run_id (projection join key) and one correlation_id; payloads are
  shaped for the migration-048 columns and topic strings resolve from the canonical omnibase_infra.topics
  registry (never hardcoded, never imported from omniclaude).
