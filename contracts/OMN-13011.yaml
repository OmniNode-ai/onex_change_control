# OMN-13011 central OCC contract.
schema_version: "1.0.0"
ticket_id: "OMN-13011"
title: "LANE CENSUS RECONCILIATION ratchet - declared desired-state per lane, drift = auto-ticket"
summary: >-
  Ships a steady-state lane census reconciler for recurring runtime lane drift. Desired state is declared
  in deploy/lane-census/lane-manifest.yaml, reconciled against live docker container and network inventory
  by scripts/lane_census_plan.py, and converted to a typed drift event plus auto-ticket payload by scripts/lane_census_event.py.
  The implementation shares the OMN-13008 onex-disk-gc.service timer via drop-in instead of adding a second
  timer, exits fail-fast on drift, and refuses localhost/default broker fallbacks.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
