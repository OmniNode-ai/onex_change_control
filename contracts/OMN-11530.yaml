    command: "clean clone command bundle recorded in dod-clean-clone-qa"
  - kind: "tests"
    description: "Two no-key replay runs produce byte-identical output and matching SHA-256 hashes."
    command: "openssl dgst -sha256 replay-run1.log replay-run2.log && cmp -s replay-run1.log replay-run2.log"
