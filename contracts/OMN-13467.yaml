ticket_id: "OMN-13467"
title: "fix(OMN-13467): await terminal-event broker ACK before node-generation offset commit"
summary: >-
  OCC evidence for omnimarket PR #1340. node_generation_consumer previously committed the input Kafka
  offset before the terminal node-generation-completed / node-generation-failed event was durably broker
  ACKed. The runtime sync publisher schedules async publish work and returns immediately, so a crash in
  that window could lose the terminal event for fresh subscribers. The fix makes terminal emit helpers
  awaitable, accepts both sync and async EventPublisher callables, awaits every terminal publish in handle(),
  and preserves idempotence through the replay guard on redelivery.
