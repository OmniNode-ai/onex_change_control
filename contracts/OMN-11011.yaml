---
schema_version: "1.0.0"
ticket_id: "OMN-11011"
title: "Classify omnimarket package migrations after generated-tree exclusion"
summary: >
  Binds omnimarket PR #669, which classifies the package-owned migrations for nightly_loop_decisions,
  nightly_loop_iterations, and review_bot_bypass_log after generated-tree exclusion. The target tables
  each have exactly one scanned omnimarket node migration and require no suppression or DDL repair.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "ci"
    description: "omnimarket PR #669 carries the OMN-11011 evidence doc and ownership regression test."
    command: "gh pr view 669 --repo OmniNode-ai/omnimarket --json state,headRefOid"
  - kind: "tests"
    description: "Focused omnimarket regression test proves the three target tables have single package
      owners."
    command: "uv run pytest tests/test_migration_ownership_omn11011.py -q"
  - kind: "tests"
    description: "Duplication sweep D3 tests prove generated worktrees are excluded and suppressions are
      wired."
    command: "uv run pytest tests/test_golden_chain_duplication_sweep.py -q"
  - kind: "manual"
    description: "Standard suppressions-aware migration conflict scan has no unsuppressed standard-repo
      conflicts."
    command: "check-migration-conflicts --repos-root $OMNI_HOME --repos omnibase_core omnibase_infra omniclaude
      omnidash omniintelligence omnimarket omnimemory onex_change_control --suppressions-file $OMNI_HOME/onex_change_control/migration_conflict_suppressions.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-669"
    description: "omnimarket PR #669 carries the OMN-11011 classification and target ownership regression
      test."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11011/dod-omnimarket-pr-669/command.yaml
          && grep -q '^pr_number: 669$' drift/dod_receipts/OMN-11011/dod-omnimarket-pr-669/command.yaml
          && grep -q '2840a5458ca7e45eb4af624184241abad13894bc' drift/dod_receipts/OMN-11011/dod-omnimarket-pr-669/command.yaml"
  - id: "dod-target-ownership-test"
    description: "Focused OMN-11011 ownership regression test passes."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11011/dod-target-ownership-test/command.yaml
          && grep -q '1 passed' drift/dod_receipts/OMN-11011/dod-target-ownership-test/command.yaml"
  - id: "dod-d3-generated-exclusion"
    description: "Duplication sweep D3 coverage and suppressions-aware standard scan pass after generated-tree
      exclusion."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11011/dod-d3-generated-exclusion/command.yaml
          && grep -q '16 passed' drift/dod_receipts/OMN-11011/dod-d3-generated-exclusion/command.yaml
          && grep -q 'No migration conflicts found' drift/dod_receipts/OMN-11011/dod-d3-generated-exclusion/command.yaml"
  - id: "dod-deploy"
    description: "No deploy or runtime restart is required for docs/test-only classification."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11011/dod-deploy/command.yaml &&
