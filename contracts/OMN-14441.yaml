---
schema_version: "1.0.0"
ticket_id: "OMN-14441"
title: "OCC companion for onex_change_control#4010 — prod-promotion-grant validator folded into the required
  CI Summary rollup"
summary: >
  OCC evidence companion for OmniNode-ai/onex_change_control#4010 (OMN-14441). #4010 folds the prod-promotion-grant
  trust anchor (CLAUDE.md 2a/12) into the REQUIRED CI Summary rollup: the validator previously lived in
  a standalone workflow that was structurally invisible to the required rollup, so it could not block
  a merge. #4010 deletes that standalone workflow and wires the job into ci.yml, adds validate_prod_promotion_grants.py
  and a platform-leads review tripwire. This is an enforcement-vs-detection fix, so the evidence asserts
  the WIRING, not merely that a validator file exists. Every substantive check is a CONTENT READ pinned
  to #4010's head SHA (6b3989903bb7a20868a6fb09f1de49df363da97c) asserting a SYMBOL the change introduces;
  nothing greps this repo's receipt corpus for status PASS, and no check is keyed on #4010's CI (which
  is red BECAUSE this contract is missing -- that would be circular).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "onex_change_control#4010 head SHA carries the change; see dod_evidence check_values"
    command: "content reads pinned to 6b398990"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-4010-gate-wired-in-required-rollup"
    description: >-
      Product-observing, and THE check for this ticket's class: asserts the prod-grant validator is actually
      WIRED as a job inside ci.yml -- the workflow that produces the REQUIRED CI Summary rollup -- at
      #4010's exact head SHA. The whole point of OMN-14441 is that a validator sitting in a standalone
      workflow is structurally invisible to the required rollup and therefore cannot block a merge: it
      declares protection it does not have. So 'the validator exists' is NOT evidence the ticket is done;
      'the validator is a job in the required rollup' is. RED DIRECTION PROVEN by execution: the job name
      occurs once in ci.yml at #4010's head and ZERO times in ci.yml at OCC dev -- and ci.yml EXISTS at
      both refs, so a bare existence probe would rubber-stamp; the symbol is what discriminates. Exit
      1 at dev and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/.github/workflows/ci.yml?ref=6b3989903bb7a20868a6fb09f1de49df363da97c"
          --jq .content | base64 -d | grep -c 'validate-prod-promotion-grants:')" -ge 1
  - id: "dod-verify-4010-standalone-workflow-removed"
    description: >-
      Product-observing NEGATIVE assertion, the necessary other half of the fold: the old standalone workflow
      file must be GONE at #4010's head. Wiring the job into ci.yml while leaving the standalone workflow
      in place would duplicate the validator, not fold it -- and would leave the merge-invisible copy
      still running and still declaring false protection. This check asserts the GitHub contents API 404s
      for that path at #4010's head. RED DIRECTION PROVEN by execution against the strongest possible
      control: the file demonstrably STILL EXISTS on OCC dev (blob 8390cdc7), so the identical command
      exits 1 there. It exits 0 only at a ref where #4010 genuinely deleted it.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          ! gh api "repos/OmniNode-ai/onex_change_control/contents/.github/workflows/validate-prod-promotion-grants.yml?ref=6b3989903bb7a20868a6fb09f1de49df363da97c"
          --jq .sha >/dev/null 2>&1
  - id: "dod-verify-4010-validator-implementation"
    description: >-
      Product-observing: asserts the new validator implementation at #4010's head carries GRANT_ID_RE,
      the compiled pattern that constrains grant_id -- the field the grants file's own schema calls the
      unique primary key of a grant. A validator that does not constrain the identity field cannot be
      a trust anchor, so this reads the mechanism rather than restating the PR's claim. RED DIRECTION
      PROVEN by execution: the file does not exist on OCC dev at all (contents API 404s), so the identical
      command exits 1 there and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/onex_change_control/contents/src/onex_change_control/scripts/validate_prod_promotion_grants.py?ref=6b3989903bb7a20868a6fb09f1de49df363da97c"
          --jq .content | base64 -d | grep -c 'GRANT_ID_RE')" -ge 1
  - id: "dod-occ-self-commit"
    description: >-
      Self-bind item for THIS OCC companion PR. occ-preflight (validator_occ_merge_eligibility._receipt_bound_to_pr)
      requires at least one PASS receipt bound to the PR under check -- pr_number == that PR, or commit_sha
      among that PR's commits. The eligibility gate runs TWICE for a companion: once here and once on
      the source PR, so the product receipts above bind the SOURCE (onex_change_control#4010) while this
      one binds the COMPANION. That is why both receipt kinds exist, and it is the trap that cost OCC#4008
      and #4012 a CI round-trip each. Intentionally self-referential, and legitimately so: it asserts
      a fact ABOUT this PR (its branch), so this PR is the correct surface to read. It is a binding item,
      NOT substantive evidence, and makes no claim about onex_change_control#4010's correctness -- that
      is carried by the product-observing entries above, each proven RED at dev and at a bogus SHA.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14441-occ-companion-evidence' drift/dod_receipts/OMN-14441/dod-occ-self-commit/command.yaml
