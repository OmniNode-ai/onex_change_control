schema_version: "1.0.0"
ticket_id: "OMN-14516"
title: "OCC companion for omnibase_infra#2286 — event_ledger has never held a row; ledger projection was
  SKIPPED at wiring"
summary: >
  OCC evidence companion for OmniNode-ai/omnibase_infra#2286 (OMN-14516, child of OMN-14135). The audit
  ledger `event_ledger` has held ZERO rows on every lane since node_ledger_projection_compute shipped,
  while its 7 subscribed topics carried live traffic (638 events on node-registration alone) and the consumer
  group never existed among 562 live groups. Nothing was ever red. ROOT CAUSE (proven by running the real
  discovery+wiring path, not by reading): the contract declares consumer_purpose "audit", making it a
  raw event projection contract, and handler_wiring.py:3329 SKIPS such a contract outright unless the
  kernel registered a result applier for it BY NAME — otherwise the node would consume Kafka offsets while
  dropping every intent it emits. No applier was registered, so the contract never wired and no consumer
  was ever created. This is NOT the operation_match/handler_routing_loader theory: that loader is a legacy
  path auto-wiring never calls, operation_match is first-class (~70 contracts use it including the healthy
  node_ledger_write_effect), and the routing entry parses fine and is assigned all 7 topics — rewriting
  the contract to payload_type_match would have papered over the real defect, so the contract is UNCHANGED.
  Two independent defects, either of which alone keeps the table empty: (1) the missing kernel result
  applier (load-bearing), and (2) the missing def-B handle() entrypoint, without which handler_wiring
  binds the _missing_handle sentinel that raises on every event and is then log-and-discarded by the auto-wired
  consume boundary (no DLQ, no redelivery). handle() alone = still zero rows; applier alone = still zero
  rows.
is_seam_ticket: true
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra#2286 head registers the ledger-projection result applier and adds the
      def-B handle() entrypoint; live stability-test readback shows non-zero event_ledger rows."
    command: "see dod_evidence check_values"
emergency_bypass:
