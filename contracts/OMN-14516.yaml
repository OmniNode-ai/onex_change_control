dod_evidence:
  - id: "dod-verify-2286-ledger-projection-wiring"
    description: >-
      Product-observing check against omnibase_infra#2286 head 5f64390c3d703d328ecd46fc04aba0757dbacb84.
      Asserts BOTH load-bearing halves of the fix are present at the pinned head, because either one alone
      leaves event_ledger at zero rows: (1) service_kernel registers a result applier under the exact
      contract name node_ledger_projection_compute AND registers the ledger.append intent handler — without
      this the contract is SKIPPED at wiring and no consumer is ever created; (2) HandlerLedgerProjection
      exposes an async handle() dispatch entrypoint — without this auto-wiring binds _missing_handle,
      which raises on every dispatched event and is swallowed by the consume boundary; (3) IntentEffectLedgerAppend
      exists to carry the emitted intent to the write effect. The check reads the PR head content directly,
      so it goes RED on the EXISTS-but-WRONG mutations, not merely on file absence: deleting the applier
      registration line drops K to 0 (exit 1) while every file still exists and the routing entry still
      parses; deleting handle() drops H to 0 (exit 1) while the applier is still registered. Both mutations
      were executed locally and both produced the expected RED before this evidence was written.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          S=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/service_kernel.py?ref=5f64390c3d703d328ecd46fc04aba0757dbacb84"
          --jq .content | base64 -d); H=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/nodes/node_ledger_projection_compute/handlers/handler_ledger_projection.py?ref=5f64390c3d703d328ecd46fc04aba0757dbacb84"
          --jq .content | base64 -d); E=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/intent_effects/intent_effect_ledger_append.py?ref=5f64390c3d703d328ecd46fc04aba0757dbacb84"
          --jq .content | base64 -d); K=$(printf '%s' "$S" | grep -c 'auto_wiring_result_appliers\["node_ledger_projection_compute"\]');
          R=$(printf '%s' "$S" | grep -c '"ledger.append"'); D=$(printf '%s' "$H" | grep -c 'async def
          handle('); C=$(printf '%s' "$H" | grep -c '_coerce_event_message'); I=$(printf '%s' "$E" | grep
          -c 'class IntentEffectLedgerAppend'); test "$K" -ge 1 && test "$R" -ge 1 && test "$D" -ge 1
          && test "$C" -ge 1 && test "$I" -ge 1
