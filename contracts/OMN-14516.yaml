  - id: "dod-deploy-assessment-2286-head-e5ccbcd5"
    description: >-
      Deploy-gate assessment for omnibase_infra#2286 head e5ccbcd5d6965a7de5fd6a5274d8aeea88ae8554. The
      PR touches runtime paths, so the downstream deploy gate requires central deploy DoD evidence. No
