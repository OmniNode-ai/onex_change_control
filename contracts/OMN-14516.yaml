  - id: "dod-head-e5ccbcd5-contract-appliers"
    evidence_artifact: "supersedes_dod_evidence:dod-rebind-2286-head-61782b9a"
    description: >-
      Product-observing supplement for omnibase_infra#2286 head e5ccbcd5d6965a7de5fd6a5274d8aeea88ae8554.
      This head replaces the first product repair's by-name kernel result-applier allowlist with contract-derived
