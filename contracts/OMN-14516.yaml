      consumer groups (one per subscribed topic) with node_ledger_write_effect Stable on onex.cmd.platform.ledger-append.v1
      — where before the fix it had zero consumer groups. This proves the derived-applier wired path is
      live end to end: consume the 7 platform topics -> emit ledger.append -> IntentEffectDispatchBridge
      -> HandlerLedgerAppend.handle -> event_ledger. The CI-runnable assertion binds the head and confirms
