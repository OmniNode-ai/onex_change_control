    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: |-
          H=$(gh pr view 2286 --repo OmniNode-ai/omnibase_infra --json headRefOid --jq .headRefOid)
          test -n "$H"
          C=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/nodes/node_ledger_projection_compute/contract.yaml?ref=$H" --jq .content | base64 -d)
          printf '%s' "$C" | grep -q 'intent_routing_table'
          printf '%s' "$C" | grep -q 'node_ledger_write_effect'
          printf '%s\n' 'live deploy readback (manual, independent verifier verify-2286, .201 stability-test lane, 2026-07-13): ssh omni-201-ts docker exec omnibase-infra-stability-test-postgres psql -U postgres -d omnibase_infra -tAc "SELECT count(*) FROM event_ledger" -> 1203 rows and growing (was 0 for the entire prior life of the table on every lane); ssh omni-201-ts docker exec omnibase-infra-stability-test-redpanda rpk group list -> 7 Stable consumer groups for node_ledger_projection_compute plus a Stable node_ledger_write_effect group on onex.cmd.platform.ledger-append.v1 (was 0 groups; the legacy hardcoded group onex-ledger-projection-compute is Dead). Wired path proven live end-to-end: consume 7 platform topics -> emit ledger.append -> IntentEffectDispatchBridge -> HandlerLedgerAppend.handle -> event_ledger. NOTE: a WHERE topic=onex.cmd.platform.ledger-append.v1 scoping returns 0 because event_ledger.topic stores the SOURCE event topic (node-heartbeat etc.), not the command topic; the correctly-scoped readback is the unscoped count above.'
