    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          H=$(gh pr view 2286 --repo OmniNode-ai/omnibase_infra --json headRefOid --jq .headRefOid); test
          "$H" = "e5ccbcd5d6965a7de5fd6a5274d8aeea88ae8554"; gh api "repos/OmniNode-ai/omnibase_infra/compare/61782b9a3cd466bfb1868077ff3bccc1c5ecf69e...$H"
          --jq '(.files | map({(.filename): .status}) | add) as $m | ($m["src/omnibase_infra/nodes/node_ledger_projection_compute/contract.yaml"]
          == "modified") and ($m["src/omnibase_infra/runtime/service_kernel.py"] == "modified") and ($m["src/omnibase_infra/runtime/auto_wiring/handler_wiring.py"]
          == "modified") and ($m["src/omnibase_infra/runtime/intent_effects/intent_effect_dispatch_bridge.py"]
          == "added") and ($m["src/omnibase_infra/runtime/intent_effects/intent_effect_build_loop_append.py"]
          == "removed") and ($m["src/omnibase_infra/runtime/intent_effects/intent_effect_pr_state_upsert.py"]
