  - id: "dod-reshape-derivation-verified"
    evidence_artifact: "supersedes_dod_evidence:dod-head-e5ccbcd5-contract-appliers"
    description: >-
      Reshape-aware product-observing check for omnibase_infra#2286. It reads the LIVE merge-candidate
      head dynamically (gh pr view headRefOid) rather than pinning a snapshot SHA, so a test-only advance
      of the product branch (e.g. f72f9b47 -> 1420b2f4, which touched only test files) does not stale
      it; it always verifies whatever head Codex is about to land. It supersedes the e5ccbcd5-bound contract-appliers
      item that pins a now-stale head. Re-verified INDEPENDENTLY by verify-2286 (adversarial verifier,
      not the ledger-reshape implementer): the by-name kernel result-applier allowlist for node_ledger_projection_compute
      is DELETED and appliers are DERIVED from each projection contract's intent_consumption.intent_routing_table
      via load_intent_routing_table plus the single generic IntentEffectDispatchBridge; the raw-projection
      wiring outcome is FAILED (not SKIPPED) when no applier is wired. The check reads file CONTENT at
      the pinned head, so it is RED against EXISTS-but-WRONG mutations, not merely on file absence: re-adding
      auto_wiring_result_appliers["node_ledger_projection_compute"] drives A to non-zero (RED, proven
      by a mutation dry-run); reverting the SKIPPED->FAILED reshape brings back the old "requires dedicated
      raw event projection wiring" reason (O non-zero, RED). The verifier independently reproduced both
      the derivation-without-allowlist proof and the SKIPPED->FAILED revert-run-restore RED-proof before
      this receipt was written.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: |-
          H=$(gh pr view 2286 --repo OmniNode-ai/omnibase_infra --json headRefOid --jq .headRefOid)
          test -n "$H"
          S=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/service_kernel.py?ref=$H" --jq .content | base64 -d)
          W=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py?ref=$H" --jq .content | base64 -d)
          B=$(gh api "repos/OmniNode-ai/omnibase_infra/contents/src/omnibase_infra/runtime/intent_effects/intent_effect_dispatch_bridge.py?ref=$H" --jq .content | base64 -d)
          D=$(printf '%s' "$S" | grep -c 'load_intent_routing_table'; true)
          U=$(printf '%s' "$S" | grep -c 'IntentEffectDispatchBridge'; true)
          A=$(printf '%s' "$S" | grep -c 'auto_wiring_result_appliers\["node_ledger_projection_compute"\]'; true)
          F=$(printf '%s' "$W" | grep -c 'no result applier is wired'; true)
          O=$(printf '%s' "$W" | grep -c 'requires dedicated raw event projection wiring'; true)
          G=$(printf '%s' "$B" | grep -c 'class IntentEffectDispatchBridge'; true)
          test "$D" -ge 1 && test "$U" -ge 1 && test "$A" -eq 0 && test "$F" -ge 1 && test "$O" -eq 0 && test "$G" -ge 1
  - id: "dod-deploy-live-readback-2286"
    evidence_artifact: "supersedes_dod_evidence:dod-deploy-assessment-2286-head-e5ccbcd5"
