---
schema_version: "1.0.0"
ticket_id: "OMN-10387"
title: "Register dispatch outcome savings subscription"
summary: "Register the omniintelligence dispatch-outcome-evaluated topic and include it in the omnibase_infra
  savings estimation consumer defaults."
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "events"
  - "topics"
evidence_requirements:
  - kind: "tests"
    description: "omnibase_infra savings estimator config and registry tests pass for dispatch outcome
      subscription"
    command: "cd omnibase_infra && uv run pytest tests/integration/observability/test_savings_estimation_e2e.py
      tests/unit/observability/test_savings_estimation_config.py tests/unit/topics/test_service_topic_registry.py
      -q"
  - kind: "tests"
    description: "omnibase_infra focused ruff and deploy contract YAML validation pass"
    command: "cd omnibase_infra && uv run ruff check tests/integration/observability/test_savings_estimation_e2e.py
      tests/unit/observability/test_savings_estimation_config.py src/omnibase_infra/topics/topic_keys.py
      src/omnibase_infra/topics/service_topic_registry.py src/omnibase_infra/services/observability/savings_estimation/config.py
      src/omnibase_infra/services/observability/savings_estimation/consumer.py && python - <<'PY'\nfrom
      pathlib import Path\nimport yaml\ndata = yaml.safe_load(Path('contracts/OMN-10387.yaml').read_text())\nassert
      data['ticket_id'] == 'OMN-10387'\nassert any('docker exec' in check['check_value'] for item in data['dod_evidence']
      for check in item['checks'])\nprint('deploy contract yaml ok')\nPY"
  - kind: "manual"
    description: "Post-merge deploy smoke plan confirms the savings estimator default subscription resolves
      in the deployed runtime container"
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnibase_infra.services.observability.savings_estimation.config
      import ConfigSavingsEstimation; from omnibase_infra.topics import topic_keys; from omnibase_infra.topics.service_topic_registry
      import ServiceTopicRegistry; reg=ServiceTopicRegistry.from_defaults(); topic=reg.resolve(topic_keys.DISPATCH_OUTCOME_EVALUATED);
      cfg=ConfigSavingsEstimation(); assert topic in cfg.consumed_topics; print('deploy smoke ok', topic)\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-001"
    description: "omnibase_infra savings estimator config and registry tests passed locally"
    source: "generated"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-10387/dod-001/command.yaml && grep
