---
schema_version: "1.0.0"
ticket_id: "OMN-13580"
title: "fix(OMN-13580): forwarder handle() deserializes raw-dict envelope before .payload"
summary: >
  HandlerForwardOutbound and HandlerConsumeInbound in node_bus_forwarder_effect read envelope.payload
  directly inside _coerce_dispatch_input. The runtime dispatcher delivers the outer envelope as a raw
  dict (its serialized form), so .payload crashed with AttributeError: 'dict' object has no attribute
  'payload' (fired 24x on stability-test, blocked the delegation terminal projection — no delegation-completed.v1,
  zero delegation_events rows for escalated CIDs). Fix coerces the outer envelope to ModelEventEnvelope[object]
  via model_validate when it is not already a typed instance (mirrors the OMN-12001/12940 dict-vs-typed
  pattern) BEFORE reading .payload. handle()/coerce params typed object to avoid adding a counted non-optional
  union (infra budget was at ceiling, 154).
is_seam_ticket: false
