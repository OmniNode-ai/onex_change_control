ticket_id: "OMN-13509"
title: "PR-time pin-hygiene gate: block off-dev-line / orphan sibling git pins"
summary: >-
  The real recurrence fix for the #2071 / OMN-13507 diverged-pin saga (PR omnimarket#1351 pinned omnibase_core
  to orphan SHA 4c91bc18, not reachable from any branch, silently regressing dev and breaking the dev-lane
  build). Adds a PR-time validator that BLOCKS any sibling dependency pin (omnibase-core / omnibase-spi
  / omnibase-compat git rev= / @rev / ?rev= / branch=) in pyproject.toml or uv.lock whose pinned commit
  is NOT an ancestor of that sibling's dev HEAD — the PR-time sibling of the deploy-time OMN-12977 guard.
  Marquee dogfood: the pin-classification scanning logic was GENERATED by omninode's own SEA generation
  node (node_generation_consumer, omnimarket) against the live local-coder model (Qwen3.6-35B-A3B on .201:8000)
  and accepted ONLY because it passed a deterministic acceptance corpus in the hardened sandbox — the
  corpus, not the LLM, is the acceptance authority — then hand-hardened into a wired COMPUTE validator.
  Validator = pure COMPUTE node over a swappable bus; git ancestry is resolved at the EFFECT boundary
  (runtime_pin_hygiene.annotate_ancestry runs git merge-base --is-ancestor against the sibling canonical
  clone), keeping the COMPUTE handler pure. Wired as a BLOCKING pre-commit hook (check-pin-hygiene-compute)
  and a required CI gate (validator-pin-hygiene.yml). Paired feature PRs: omnibase_core#1308 (validator
  + wiring), omnimarket#1360 (acceptance corpus + generation driver + evidence).
