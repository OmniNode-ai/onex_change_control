schema_version: "1.0.0"
ticket_id: "OMN-12941"
title: "test(OMN-12941): add regression guard for overnight readiness view output column casing"
summary: >-
  Add a test-only, additive regression guard in omnimarket that codifies the casing contract between the
  projection_overnight_readiness view and the projection-api read path. The view materializes a case-sensitive
  output column via a quoted camelCase alias ("overallStatus"); PostgreSQL preserves case only for double-quoted
  identifiers, while the projection-api builds its SELECT list with a bare ", ".join(cfg.columns) and
  YAML strips the quotes from projection_api.columns, so the joined list emits overallStatus unquoted
  -> PostgreSQL folds it to overallstatus -> column does not exist -> overnight.v1 503. The guard statically
  parses the committed view DDL and node contract (no live DB) and pins the invariant the read-path fix
  must satisfy. It does NOT edit the gated migration 0001_create_overnight_readiness_projection_view.sql;
  the SQL/view fix stays separately gated.
