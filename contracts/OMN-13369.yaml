title: "P4: Delegation graded benchmark proves capability gradient with negative controls"
summary: >-
  Adds the P4 graded delegation benchmark proof in omnimarket. The implementation reuses the OMN-12964
  quality-gate calibration surface by scoring benchmark attempts through node_delegation_quality_gate_reducer.delta
  with the shipped task_class_contracts.v1.yaml DoD. The committed fixture covers easy/local pass, medium
  one-hop escalation, hard ceiling pass, two negative controls where local adequate output must not escalate,
  and marker-rich self-disclaimed research output that must fail at the ceiling. The report command emits
  model/tier, task_class, actual score, required_bar, escalation_count, terminal status, pass/fail classification,
  quality-gate event refs, escalation refs, terminal event refs, and projection row coordinates. No bespoke
  REST endpoint or dashboard authority is added; proof remains tied to canonical event-bus and projection
  topics.
