schema_version: 1.0.0
ticket_id: OMN-14349
title: 'feat(OMN-14349): add tenant_id field to ModelDelegateSkillRequest + thread through dispatch ports'
summary: 'omnimarket product PR #1710 (branch jonah/omn-14349-add-tenant-id-field-delegate-skill-request,
  head d306f3b4bbdd4b0aba7f542d9d95802e9066af6f) adds a properly DECLARED tenant_id: str | None field
  to ModelDelegateSkillRequest (model is frozen=True, extra="forbid" -- this could not be a payload-merge
  trick) and threads request.tenant_id from HandlerDelegateSkill.handle() through ProtocolDelegationDispatchPort.dispatch()
  to both concrete dispatch ports. RuntimeDelegationDispatchPort.dispatch() populates the field on the
  real, pre-existing (OMN-14058) omnibase_core ModelDelegationRequest.tenant_id that is actually published
  on the bus. LocalDelegationDispatchPort.dispatch() prefers a caller-supplied tenant_id over the local
  ONEX_TENANT_ID interim, never overriding a real value with the fallback. This is Part 1 of 2 for OMN-14208
  Path A; the originally proposed Part 2 companion (omnibase_infra node_tenant_ingress_effect, PR #2253)
  was independently verified as a bespoke Service-in-node-clothing (owns its own bus subscribe()/publish()
  lifecycle outside the generic auto-wiring engine) and is being superseded by a cleaner engine-level
  insertion point (handler_wiring.py:_make_event_bus_callback) -- that replacement will receive its own
  OCC companion when it lands. This companion covers PR #1710 ONLY: with no verified stamp upstream yet,
  tenant_id stays None everywhere on the bus path today, so this PR is a documented, tested no-op in isolation
  and is safe to land standalone ahead of the enforcement mechanism.'
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
