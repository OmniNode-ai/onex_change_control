title: "fix: register projection reducer for node-generation-failed.v1"
summary: >-
  onex.evt.omnimarket.node-generation-failed.v1 was absent from node_projection_delegation subscribe_topics
  and projection_api.exposures, so failed generation runs were not queryable through the projection API
  and the handler fell through to the delegated-task path. The omnimarket fix registers the failed terminal
  topic, exposes it through the existing generation_events projection, and routes failed events through
  the same projection reducer used by completed generation events. No bespoke REST endpoint or cross-repo
  model change.
