---
schema_version: "1.0.0"
ticket_id: "OMN-12960"
title: "Single envelope-unwrap predicate in core + mandatory real-dispatch fixture / dispatch-surface
  gate"
summary: >
  Generalizes OMN-12940/12946: the transport-envelope unwrap predicate existed as two hand-synced marker-key
  sets — omnibase_infra.runtime.auto_wiring.handler_wiring._ENVELOPE_MARKER_KEYS and omnimarket.nodes.evidence_pipeline_native._ENVELOPE_MARKER_KEYS.
  Each was fixed once already and they drifted again: as of this ticket the infra set was missing the
  "__bindings" marker that the omnimarket set carried, so a dispatch-engine materialized envelope whose
  only top-level marker was "__bindings" unwrapped on the omnimarket side and silently no-op'd on the
  infra side — the OMN-12946 defect class re-introduced. Fix collapses both into one authoritative source,
  omnibase_core.utils.util_envelope_unwrap (ENVELOPE_MARKER_KEYS + unwrap_transport_envelope + is_transport_envelope);
  both call sites import it and the hand-synced cross-repo consistency test is deleted in favor of the
  single source. By layering this wire-level concern belongs in omnibase_compat, but the compat pin is
  policy-frozen, so per the P1.4 plan it lands in omnibase_core (already a runtime dependency of both
  consumers) with a documented note. Adds the dispatch-surface-test-required validator (omnibase_core.validators.dispatch_surface_test_required)
  wired as a pre-commit hook and a CI quality-gate dependency: a path-heuristic ratchet that makes a real-dispatch-path
  test MANDATORY for any change touching dispatch / routing / handler-registration / message-envelope
  source surfaces, because handler-isolation tests pass while live dispatch fails. No topic schema, envelope
  wire, or contract API change.
is_seam_ticket: false
