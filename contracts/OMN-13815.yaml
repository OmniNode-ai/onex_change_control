ticket_id: "OMN-13815"
title: "Lane-scope container_name for RUNTIME_SERVICES consumers in stability-test + prod overlays"
summary: >-
  OCC evidence for omnibase_infra PR #2190. The base docker-compose.infra.yml hardcodes bare (non-lane-prefixed)
  container_name values for the runtime-tier consumers; the stability-test and prod overlays disable most
  via a *-disabled profile, but deploy-runtime.sh's RUNTIME_SERVICES warm-restart path starts four of
  them explicitly by name (up -d --no-deps --force-recreate <service>), which bypasses the profile gate
  and lets them inherit the bare base name, colliding with the dev lane's cold --profile runtime bring-up
  (live repro on .201 2026-07-02). PR #2190 adds lane-prefixed container_name overrides for the four instantiated
  consumers (agent-actions-consumer, skill-lifecycle-consumer, intelligence-api, omninode-contract-resolver)
  in both layered overlays, declares them in deploy/lane-census/lane-manifest.yaml, and adds a static-parse
  disjointness ratchet test. Compose + manifest + test only; no source/runtime code change.
