schema_version: "1.0.0"
ticket_id: "OMN-12621"
title: "feat: topic-migration contract model + breaking-schema validator (Section 6a, core)"
summary: >-
  Section 6a of the divergent-transport-runtime-convergence plan, landed in omnibase_core PR 1191. Before
  this change there was no ModelTopicMigrationContract (grep-confirmed) and no link between a topic's
  free-text .vN segment and the ModelEventType.schema_version SemVer, so "detect a breaking schema change"
  had nothing to diff against; only build_dlq_topic existed, not a general versioned-topic builder. The
  PR adds the core half of the topic-schema migration machinery: (1) ModelTopicMigrationContract (frozen,
  extra=forbid, ModelSemVer-versioned) plus EnumMigrationPhase and EnumCutoverCriterion, general enough
  to express a namespace rename (onex.evt.<old-ns>.* -> <new-ns>.*, OMN-12407) as well as a .vN bump,
  carrying old/new ModelTopicSchemaBinding, old/new consumer groups, a bounded compatibility window, cutover
  criteria, and a drain-proof gate enforced in a model_validator; (2) the topic .vN <-> event schema_version
  linkage via ModelTopicSchemaBinding + ModelCanonicalTopic + parse_canonical_topic/build_versioned_topic
  and detect_breaking_delta(old, new) -> EnumTopicSchemaDelta, asserting the topic .vN equals the event
  schema_version major (wire-compat boundary), making a breaking delta (major_bump | namespace_rename)
  detectable; (3) the breaking_schema_change validator, modeled on contract_config_compliance.py and reusing
  compute_contract_fingerprint, which diffs baseline vs current *.topic-schema.yaml bindings and requires
  an adjacent *.migration.yaml ModelTopicMigrationContract on a breaking delta. Per Rule #5 (enforcement,
  not detection) the validator is wired in the SAME PR as both a pre-commit hook (.pre-commit-config.yaml)
  and a blocking CI gate (.github/workflows/ci.yml breaking-schema-change job, added to the Quality Gate
  needs). 24 new unit tests cover topic parsing/builder, the linkage, breaking-delta classification, the
  contract validators, and the validator-fires-without / passes-with-migration proof. This contract covers
  the landable core code; no runtime/.201 deploy is in scope.
