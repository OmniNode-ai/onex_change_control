title: "Relocate no-plugin-daemon-classes guard to omnibase_core + wire fleet (W9 / GAP-6)"
summary: >-
  Relocates the Plugin* lifecycle guard to its canonical omnibase_core home (validator-standardization
  remediation plan §3 W9, GAP-6, child of OMN-9048). The guard was infra-local (omnibase_infra.validators.no_plugin_daemon_classes,
  OMN-10123) with no remote-hook export and core had no equivalent. omnibase_core PR #1273 adds the canonical
  validator + ModelPluginLifecycleFinding + tests, exports it in .pre-commit-hooks.yaml, and dogfoods
  it. omnibase_infra PR #2038 deletes the local module and consumes the core remote hook (one canonical
  implementation; infra stays enforced via pre-commit in CI). omnimarket PR #1275 and omniclaude PR #1780
  wire the core remote hook so those node/handler-defining repos cannot reintroduce a Plugin* daemon/worker/consumer
  lifecycle owner. All changes are build-time validators/config — no runtime path is touched.
