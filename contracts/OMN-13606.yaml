---
schema_version: "1.0.0"
ticket_id: "OMN-13606"
title: "WS-C Phase 0.2: New EFFECT node_generated_node_publish_effect (worktree + commit + PR + emit URL)"
summary: >
  Wave-0 serial spine of the SEA -> canonical migration (epic OMN-13604). New canonical EFFECT node node_generated_node_publish_effect
  in omnimarket performs the auto-PR / publish step of the SEA self-extension loop. It consumes the full
  canonical package staged by the Phase 0.1 generation spine (handler_generated_executor.scaffold_package,
  merged in #1431), creates a git worktree branch off the base branch, copies the package into the repo
  node subdir, commits, pushes, opens a PR carrying the OMN ticket reference + dod_evidence, and emits
  the resulting PR URL on the contract-declared bus topic onex.evt.omnimarket.generated-node-published.v1.
  Architecture: canonical contract.yaml + handler; no Plugin*; strongly typed frozen models (UUID, extra=forbid,
  no Any/dict); topics contract-sourced (read from contract.yaml, never hardcoded in the handler); repo
  root resolved fail-fast from OMNI_HOME (no hardcoded paths/IPs/jonah, no silent default); no env-encoded
  endpoints; all git/gh I/O via an injectable run_fn and the bus emit via an injectable publisher (testable,
  no real subprocess in tests); headless-dispatchable via operation_match operation + resolvable top-level
  input_model (OMN-13530 pattern). Entry-point registered in pyproject; dogfood node count 329 -> 330.
  Phase 0.1 (#1431) and 0.3 (strip remaining contract hackathon tags) are separate children and NOT in
  this PR. No topic schema, envelope, or contract-API change; no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD: failing handler + golden-chain tests written before implementation, then made to pass. The
      handler test proves the publish flow (worktree + commit + push + gh pr create + bus emit) and the
      block branches (missing staging dir, push failure before gh, gh pr create failure). The golden chain
      proves contract routing (operation present, RuntimeLocal _validate_routing clean, initial-payload
      model resolvable, topics) and the full start->PR->emit chain.
    command: "uv run pytest tests/nodes/node_generated_node_publish_effect/test_handler_generated_node_publish_effect.py
      tests/test_golden_chain_generated_node_publish_effect.py tests/test_market_node_runtime_dogfood.py
      -q"
