ticket_id: "OMN-12626"
title: "feat: prod runtime promotion-lineage guard — pin prod image to a promoted main digest (R1)"
summary: >-
  Risk R1 (High, Governance): the prod runtime image was unpinned and built from a drifted source clone.
  The promotion gate protects the main BRANCH, but nothing pinned the prod IMAGE to a promoted main digest:
  prod's 0.36.1 image (built 2026-05-24) predated build-provenance + org.opencontainers.image.revision
  that dev/stability 0.37.0 already bake, and was built from a clone 12 commits behind origin/main with
  dirty edits. omnibase_infra PR 1840 closes the gap with a pre-build/deploy guard (scripts/check_prod_promotion_lineage.py,
  mypy --strict clean) that refuses to build the prod-bound image unless (a) the build source working
  tree is clean (no uncommitted/untracked edits), (b) HEAD is an ancestor-of/equal-to origin/main (promoted
  lineage — dev-only or dirty trees are rejected), (c) the build bakes org.opencontainers.image.revision=<git
  sha> + a build-provenance manifest (the guard emits the GIT_SHA/VCS_REF/RUNTIME_SOURCE_HASH build args
  the Dockerfile already stamps into the revision label and provenance manifest), and (d) the deployed
  image carries that revision so "prod == promoted main digest" is assertable from docker inspect. The
  guard is fail-fast with structured EnumProdLineageFailure reasons and no silent default. It is wired
  into the prod build/deploy path three ways: deploy-agent _compose_build (release-mode builds fail closed
  on a dirty/non-promoted source before any docker side effect), deploy-runtime.sh (--prod / ONEX_DEPLOY_LANE=prod
  runs the guard and hard-fails), and CI (prod-promotion-lineage.yml: a PR gate runs the guard unit tests,
  and a reusable lineage-check job gates build-and-push-runtime.yml on main); a pre-commit hook runs the
  guard tests when the guard or deploy tooling changes. Tests prove the guard FAILS on a dirty/dev-only
  tree and PASSES on a clean promoted HEAD, and were live-verified (clean+promoted PASS exit 0; dev-only
  commit FAIL exit 1 "not_promoted"; dirty tree FAIL exit 1 "dirty_tree"). This change is build/deploy-tooling
  code only; it never rebuilds or touches the live prod runtime.
