schema_version: "1.0.0"
ticket_id: "OMN-13551"
title: "stop ~15 non-delegation handler-prep boot quarantines (helper-misclassification + intelligence
  wrapper repoint)"
summary: >-
  The 2026-06-24 dev-HEAD redeploy booted HEALTHY but logged ~17 non-fatal handler-prep ValidationError
  / quarantine warnings on non-delegation nodes (node_dispatch_worker, node_environment_health_scanner,
  node_intelligence_orchestrator, node_platform_readiness, node_process_watchdog, node_routing_policy_engine,
  node_session_post_mortem, and three more). Root cause: each contract's handler_routing.handlers list
  declared internal helper functions/classes (per-domain probers, adapter readers, dispatch-record writers,
  pure routing-policy helper functions, check-target classes) as if they were runtime-dispatched message
  handlers. The runtime's ServiceHandlerResolver tries to instantiate each declared handler at boot with
  only the three known-injectable params (event_bus, container, ownership_query); a helper requiring any
  other default-less param (e.g. socket_path, log_dir, record, ctx, intent) cannot be resolved, so the
  resolver raises TypeError and the runtime quarantines-and-continues. These helpers are in fact called
  directly by the node's real KEEP handler, never bus-dispatched. The fix removes the 13 misclassified
  helper entries (each node retains its real handler) and repoints node_intelligence_orchestrator's two
  entries from the bare handle_receive_intent(intent) / handle_receive_intents(intents) functions to the
  already-existing envelope-shaped zero-arg wrapper classes HandlerReceiveIntent / HandlerReceiveIntents.
  A new contract guard test (tests/test_handler_routing_boot_resolvable.py) asserts every handler_routing
  entry across all 329 contracts is boot-resolvable, preventing regression. The reproduced live quarantine
  set dropped from 18 to 3; the 3 remaining are genuinely-shaped handlers needing an unwired protocol-typed
  external dependency (project tracker / generated-tool registry / task dispatcher) and are carved out
  to OMN-13603, explicitly enumerated in a documented allowlist guarded by a second test. This PR ships
  no runtime contract/topic/migration change beyond editing handler_routing lists and performs no live
  deploy or runtime restart.
is_seam_ticket: false
