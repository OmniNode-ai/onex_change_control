title: "One canonical context assembler; delete the divergent second assembler"
summary: >-
  Routes context-pack assembly through the single canonical assembler (node_context_pack_builder_compute)
  and deletes the divergent second assembler (_assemble_context_text in node_context_roi_runner) that
  bypassed the builder's factor precedence and 16k token budget. The builder's shared I/O models are promoted
  out of the node's private models package into a new shared omnimarket.pack package so the ROI runner
  sources the canonical types without a cross-node model reach-in (tests/test_no_cross_node_reach_in.py
  is at its 84-entry cap). The ROI runner now invokes HandlerContextPackBuilder in-process and uses the
  builder's pack_hash as the injected context_pack_hash. The live generation-injection seam (handler_generation_consumer
  prepend, OMN-12794) is unchanged. ROI-policy population is out of scope (OMN-13644). Product PR: omnimarket
  #1453.
