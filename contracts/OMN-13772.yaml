ticket_id: "OMN-13772"
title: "fix(OMN-13772): !override judge overlay networks/ports (cross-lane isolation) + keepalive census
  kind"
summary: >-
  omnibase_infra PR #2197 lands the SOURCE fix for the judge-lane cross-lane isolation defect. deploy-runtime.sh
  (resolve_compose_file_args, OMN-13581) layers docker-compose.judge.yml on top of docker-compose.infra.yml
  on .201; Docker Compose sequence-merges (unions) plain-list networks:/ports: with the base file, so
  every judge service was attached to BOTH the judge and dev networks (cross-lane isolation hole, ambiguous
  postgres/valkey/redpanda DNS) and double-published dev+judge host ports (valkey collided on dev 16379).
  Fix tags every service-level networks:/ports: key !override so the overlay replaces rather than unions,
  and pins base-only keycloak/infisical behind a never-enabled judge-disabled profile. Also reclassifies
  migration-gate from oneshot to a new keepalive census kind (a long-running healthcheck sentinel is Running
  by design, not oneshot_stuck). No node contract/topic changes; compose + lane-manifest + census-script
  + tests only.
