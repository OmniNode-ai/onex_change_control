---
schema_version: "1.0.0"
ticket_id: OMN-9553
title: "UnknownTopicOrPartitionError must not trip Kafka circuit breaker"
summary: "Treat missing Kafka topics as configuration errors instead of broker connectivity failures so
  one missing topic cannot open the circuit breaker for healthy topics."
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: "Focused event-bus tests prove UnknownTopicOrPartitionError does not increment circuit-breaker
      failures."
    command: "uv run pytest tests/unit/event_bus/test_circuit_breaker_topic_error.py tests/integration/test_runtime_crash_loop_fix.py
      -q"
  - kind: ci
    description: "omnibase_infra PR #1393 checks pass after OCC evidence is merged."
    command: "gh pr checks 1393 --repo OmniNode-ai/omnibase_infra"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: dod-001
    description: "PR #1393 catches UnknownTopicOrPartitionError before KafkaError and maps it to ProtocolConfigurationError."
    source: manual
    checks:
      - check_type: command
        check_value: "diff=\"$(gh pr diff ${PR_NUMBER} --repo ${REPO})\" && printf '%s' \"$diff\" | grep
          -q 'except UnknownTopicOrPartitionError' && printf '%s' \"$diff\" | grep -q 'ProtocolConfigurationError'"
  - id: dod-002
    description: "Focused event-bus and crash-loop tests pass locally on PR #1393 head."
    source: manual
    checks:
      - check_type: command
        check_value: "uv run pytest tests/unit/event_bus/test_circuit_breaker_topic_error.py tests/integration/test_runtime_crash_loop_fix.py
          -q"
  - id: dod-deploy
    description: "deploy gate evidence: PR #1393 records the post-merge runtime validation command; pre-merge
      live RestartCount proof is intentionally not claimed."
    source: manual
    checks:
      - check_type: command
        check_value: "gh pr view ${PR_NUMBER} --repo ${REPO} --json body --jq '.body | if contains(\"Post-merge
          runtime validation\") and contains(\"deploy: docker exec omninode-runtime\") then \"deploy validation
          recorded\" else error(\"missing deploy validation\") end'"
