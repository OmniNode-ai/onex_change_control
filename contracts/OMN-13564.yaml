schema_version: "1.0.0"
ticket_id: "OMN-13564"
title: "env→contract migration: omnibase_compat (1 config read + 1 URL literal → overlay)"
summary: >
  Migrate omnibase_compat's single config env read (AUTOWIRE_STRICT) and its one hardcoded URL literal
  (_LINEAR_API_URL = https://api.linear.app/graphql) to a zero-upstream-dep contract/overlay surface.
  A new pydantic-only resolver (omnibase_compat.config) parses a packaged JSON overlay with the stdlib
  json module, supports ${env.VAR} interpolation, validates into frozen models, and fails closed. The
  strict-mode helper now resolves via the overlay (no raw os.environ read); the Linear adapter resolves
  base_url from the overlay (no Python URL literal). url-authority goes 1 -> 0 violations. compat stays
  zero-upstream-runtime-dep (pydantic + typing-extensions only); no omnibase_core dependency added.
