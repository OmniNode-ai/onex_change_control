title: "Proof of Life — canary → scores → routing feedback loop"
summary: >
  Integration test proving the full chain: canary report with 2 models (Qwen3-Coder 0.94 recall vs DeepSeek-R1
  0.70 recall) → reducer accumulates and materializes → score lookup bridges to routing → routing selects
  Qwen3-Coder as champion. Pure in-memory (no database required). routing_outcomes rows include quality_score
  > 0.0. Part of the canary-to-routing feedback loop (OMN-10843). Delivered via PR #606 on OmniNode-ai/omnimarket
  (merge commit 1af2f16a1c7d10a1f9392288f6cd63a8a1473957).
is_seam_ticket: false
