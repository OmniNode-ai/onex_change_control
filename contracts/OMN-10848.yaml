    command: "gh pr view 606 --repo OmniNode-ai/omnimarket --json state --jq '.state'"
  - kind: "tests"
    description: "Integration test verifying full chain canary → scores → routing is present and passes"
    command: "uv run pytest tests/ -k 'proof_of_life or feedback_loop' --tb=short -q"
  - kind: "manual"
    description: "Full chain integration test exists in PR #606 diff"
    command: "gh pr diff 606 -R OmniNode-ai/omnimarket | grep 'proof_of_life\\|feedback_loop' | head -3"
