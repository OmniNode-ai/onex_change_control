ticket_id: "OMN-13616"
title: "WS-C Phase 3.3: node_regression_test_orchestrator — absorb SEA regression replay with replay mode"
summary: >
  Wave-1 of the SEA -> canonical migration (epic OMN-13604). Builds the greenfield ORCHESTRATOR node node_regression_test_orchestrator
  in omnimarket, absorbing the SEA regression suite (regression/runner.py replay path, regression/tasks.py
  corpus, regression/results.py per-task result). The node runs in replay mode only: deterministic replay
  from a recorded event corpus, no live generation, no I/O in the handler. It preserves SEA _run_replay
  semantics (corpus keyed (task_id, attempt); passed == bool(output); attempt 1 only) and emits the canonical
  Shared Experiment Result Contract ModelExperimentResult (OMN-13613, core#1346) on the contract-sourced
  terminal topic onex.evt.omnimarket.regression-suite-completed.v1 -- no node invents its own result schema.
  All four canonical archetype constraints hold: ORCHESTRATOR (events only, never result), handler-based,
  no I/O in the handler, topics contract-sourced, no Plugin* base. The omnibase_core pin is bumped to
  dev HEAD 6e26772ccaf2bf930f8fa8196bdf3e81bc2fbb3b (carries the experiment models). SEA regression/runner.py
  + its unit/integration tests are DELETED after parity (no shim); tasks.py / results.py are retained
  as still load-bearing for the SEA fixture/baseline/report subsystem (no canonical home under this ticket).
  No topic schema, envelope, or contract-API change to existing surfaces; new node adds new topics; no
  live-lane mutation.
