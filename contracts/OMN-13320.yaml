schema_version: "1.0.0"
ticket_id: "OMN-13320"
title: "fix(OMN-13320): stale-run cleanup must protect the current PR head run"
summary: >-
  OCC evidence for the omnimarket fix in node_pr_lifecycle_fix_effect (Enforcement Map F4). Stale-run
  cleanup previously cancelled the pull_request workflow run tied to the current PR head SHA, which re-triggered
  the very checks the merge was waiting on and added latency; ancient re-runs that had not yet queued
  returned HTTP 409 ("Cannot cancel a workflow re-run that has not yet queued") and were mishandled. The
  fix adds GitHubCliAdapter.cancel_obsolete_runs, which enumerates pull_request runs for the PR branch,
  NEVER cancels the run whose head_sha equals the current PR head, force-cancels every obsolete-head run
  via /actions/runs/<id>/force-cancel, and classifies HTTP 409 as stale metadata (skip, no retry, no raise).
  GitHubApiError now carries status_code so the 409 branch keys off the HTTP code, not message string-matching.
  Non-409 GitHub errors still fail loud.
