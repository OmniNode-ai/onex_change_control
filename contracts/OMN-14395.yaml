schema_version: "1.0.0"
ticket_id: "OMN-14395"
title: "fix(OMN-14395): grant resolver evaluates all matching entries, not first-match-wins"
summary: >-
  omninode_infra PR #587 fixes resolve_grant_for_digest in scripts/validate_prod_promotion_grant.py, the
  prod-promotion grant gate for the k3s deploy-onex-prod path. The resolver was first-match-wins over
  the entries list, so a stale EXPIRED/CONSUMED/SELF_GRANTED entry appearing earlier in the grant file
  could shadow a genuinely valid re-grant for the same (prod, image_digest) pair and wrongly BLOCK a legitimate
  promotion. The fix evaluates every matching entry via a new per-entry _resolve_single_entry helper and
  returns RESOLVED if any matching entry resolves cleanly, ties broken by newest created_at. The per-entry
  gates (consumed, approved_by != requested_by, absolute expires_at, lane and digest match) are unchanged
  and still applied per entry, so the fail-closed invariant is preserved: this can only fix a false BLOCK,
  never introduce a false PASS.
