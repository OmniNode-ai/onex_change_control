schema_version: "1.0.0"
ticket_id: "OMN-12996"
title: "fix(OMN-12996): capture honest LLM usage provenance on exp0/generation-consumer path"
summary: >-
  The experiment-runner / exp0 path (node-generation-requested.v1 -> node_generation_consumer -> LLM inference
  effect) emitted projection rows with prompt_tokens=0 / usage_source=MISSING (observed in the 2026-06-11
  ab-compare.v1 + llm_call_metrics rows), hollowing experiment COST data — cost columns and ROI math read
  as zero/missing on the /experiments demo surface. Root cause: in HandlerGenerationConsumer, _call_llm
  read response.usage.tokens_input/tokens_output but DISCARDED response.usage.usage_source (the provenance
  the infra inference effect already computes — API when the provider returns a usage block, MISSING when
  absent), and handle() HARDCODED usage_source=EnumUsageSource.ESTIMATED on the emitted ModelGenerationBenchmark
  regardless of whether the provider actually reported usage. Fix: _call_llm now propagates the provider-reported
  provenance via _map_response_usage_source (api -> MEASURED, estimated -> ESTIMATED, absent/None -> UNKNOWN,
  never fabricating MEASURED); ModelGenerationAttempt gains a per-attempt usage_source field; handle()
  aggregates per-attempt provenance into an honest benchmark usage_source via _aggregate_usage_source
  (MEASURED if any attempt measured, ESTIMATED if any estimated, else UNKNOWN); and the benchmark default
  is now UNKNOWN (honest absent-state). Real prompt/completion token capture is preserved. Real-dispatch-path
  tests drive HandlerGenerationConsumer.handle and assert MEASURED+nonzero tokens for a usage-reporting
  provider and UNKNOWN (never fabricated MEASURED, never fake-zeros-as-measured) when usage is absent.
  Sibling of OMN-12970 (ab-compare table/migration). deploy_pending: live effect requires the next batched
  stability rebuild; acceptance probe = a fresh exp run row showing usage_source=MEASURED + nonzero tokens
  on ab-compare.v1 / llm_call_metrics.
is_seam_ticket: false
