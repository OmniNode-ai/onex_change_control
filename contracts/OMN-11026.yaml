  - kind: "tests"
    description: "Focused CI infrastructure split-count regression tests cover threshold floor, scaling,
      cap, mixins-regression, and end-to-end compute_selection."
    command: "uv run pytest tests/unit/scripts/ci/ -q"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11026 to omnibase_core PR #1078 and the deploy/test evidence."
