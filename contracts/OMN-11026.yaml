ticket_id: "OMN-11026"
title: "Volume-aware CI test split count"
summary: >
  Binds omnibase_core PR #1078, which makes `_split_count_for()` in `scripts/ci/detect_test_paths.py`
  volume-aware by counting `test_*.py` files under each expanded path and scaling to `ceil(total / 40)`
  (cap 40) when the total crosses `VOLUME_THRESHOLD_FILES` (80). Prevents the 35-min test-parallel job
  timeout when adjacency expansion pulls in large test trees (e.g. `tests/unit/models/`).
is_seam_ticket: false
interface_change: false
