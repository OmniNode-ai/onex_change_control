ticket_id: "OMN-13859"
title: "feat(OMN-13859): event-driven worktree prune-on-PR-close via pr_lifecycle_orchestrator"
summary: >-
  Replace the polling worktree GC with an event-driven prune wired behind
  pr_lifecycle_orchestrator (CONTRACT + NODE + HANDLER, no new daemon). Adds
  node_pr_lifecycle_worktree_prune_effect (contract + handler + git adapter) and,
  in the orchestrator POST_MERGE_TAIL phase, fans out one prune command per merged
  (ticket, repo). The close event is the source of truth, so a deleted post-merge
  remote branch (missing @{u} upstream) no longer blocks cleanup — the exact
  false-negative that left 13/20 stale worktrees unremoved in the dogfood run.
  Safety rails: dirty worktree flagged not removed; canonical clones and any path
  escaping ONEX_WORKTREES_ROOT refused; worktrees root resolved fail-loud from env,
  never hardcoded. Shared command/result/enum models promoted to
  omnimarket.events.worktree_prune (no cross-node reach-in). Delivered on omnimarket
  PR #1586 (head 8452ff1ff8d4204c7d7ee3e1f8724aba446700df).
