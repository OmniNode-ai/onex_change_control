ticket_id: OMN-13816
title: "fix(OMN-13816): harden state-coverage-gate — require the state literal inside an assert referencing
  non-constant handler/contract output (AST-level)"
summary: >
  The omnimarket state-coverage-gate (required CI check, the marketed "enforcement backbone" for node-backed
  skills) was defeatable by tautological/vacuous coverage tests. scripts/validate_state_coverage.py _state_covered()
  was a regex presence check (['"]<state>['"] or .<state>) over concatenated node test text — it returned
  covered=True for bare `assert "active"`, attribute self-equality `x.foo == x.foo`, docstring/comment
  mentions, and even import module paths (`from omnimarket.review... import` matched a `review` state
  via `.review`). This ticket replaces the regex with an AST-level check: a state literal (string constant,
  or `EnumX.STATE` attribute for identifier states) counts as covered only when it appears in a genuine
  assertion context, never as a bare-literal assert, a self-tautology / constant-only comparison, or a
  docstring/comment. Test files are parsed per-file (not concatenated) since each carries `from __future__
  import annotations`. Behaviour-neutral on every real node (old vs new diverge on zero of the Wave 3/5/7/10
  nodes); the only classification change is node_pr_review_fsm_reducer's `review` state (previously a
  false-positive via an import-path substring), now correctly uncovered and grandfathered into the baseline
  alongside its 8 already-baselined siblings. Repo: OmniNode-ai/omnimarket, PR #1556.
