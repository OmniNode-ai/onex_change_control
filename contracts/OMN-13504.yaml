---
schema_version: "1.0.0"
ticket_id: "OMN-13504"
title: "Re-lock omnimarket dev omnibase-core pin from unmerged branch SHA to merged dev SHA (81c865f6)"
summary: >-
  omnimarket dev's omnibase-core git pin was hardcoded to 79ec3ad9d801b8da38b4d9099852cc8bfffad00e, a
  commit that lives only on the un-merged OMN-13408 feature branch and is NOT an ancestor of omnibase_core
  origin/dev. The squash-merge of that branch (#1300 / OMN-13408) landed on omnibase_core dev as 81c865f69a15781d526125ee13f39834a3ce69fd
  with byte-identical content (git diff 79ec3ad9..81c865f6 is empty). Because 79ec3ad9 is not an ancestor
  of core dev, the OMN-12977 sibling-pin guard (check_sibling_lock_pins.py, invoked by stage_workspace.sh)
  aborted the dev runtime workspace build. This re-locks the pin in omnimarket pyproject.toml [tool.uv.sources]
  rev= and [tool.uv] override-dependencies git URL (mirrored into uv.lock via uv lock --upgrade-package
  omnibase-core) to the merged dev SHA 81c865f6, making the pin an ancestor of core dev and unblocking
  the dev redeploy. Content-safe (merged SHA is byte-identical to the prior unmerged pin), same version
  0.46.0; no source, version specifier, migration, schema, endpoint, or env change -- only omnimarket
  pyproject.toml pins + uv.lock (plus this in-repo contract mirror). This OCC PR carries the central contract
  consumed by the omnimarket PR #1350 Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
