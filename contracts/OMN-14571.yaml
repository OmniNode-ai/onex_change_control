---
schema_version: "1.0.0"
ticket_id: "OMN-14571"
title: "fix(OMN-14571): repo-qualify ONEXNode identity to stop cross-repo collisions"
summary: >-
  Central OCC evidence for omnimarket PR #1753, which fixes architecture graph population so ONEXNode.node_id
  is repo-qualified instead of collapsing same-named nodes across repositories. The repaired product head
  6fcb4a1eeeb2ddaa37a8d946cb6fdef136380af2 is merged with current dev and preserves both the OMN-14571
  collision regression and current dev vendored-contract tests.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "topics"
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-1753-product-head"
    description: >-
      Product-head verification for omnimarket PR #1753 at 6fcb4a1eeeb2ddaa37a8d946cb6fdef136380af2. The
      proof reads live PR metadata and changed files from GitHub, then checks that the branch is based
      on dev, carries the OMN-14571 title, includes the architecture graph populate handler and golden-chain
      tests, and binds the repaired head after the dev conflict merge.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1753; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=6fcb4a1eeeb2ddaa37a8d946cb6fdef136380af2;
          d="$(mktemp -d)" && gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,baseRefName,title,body,files
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n" + .body + "\n" + ((.files | map(.path))
          | join("\n"))' > "${d}/pr.txt" && grep -Fq "${PRODUCT_HEAD}" "${d}/pr.txt" && grep -Fxq dev
          "${d}/pr.txt" && grep -Fq 'fix(OMN-14571): repo-qualify ONEXNode identity to stop cross-repo
          collisions' "${d}/pr.txt" && grep -Fq 'src/omnimarket/nodes/node_architecture_graph_populate_effect/handlers/handler_architecture_graph_populate.py'
          "${d}/pr.txt" && grep -Fq 'tests/nodes/node_architecture_graph_populate_effect/test_golden_chain_architecture_graph_populate_effect.py'
          "${d}/pr.txt" && grep -Fq 'Merge-sweep conflict repair evidence' "${d}/pr.txt" && grep -Fq '6fcb4a1e'
          "${d}/pr.txt"
  - id: "dod-omnimarket-pr-1753-local-verification"
    description: >-
      Local verification for omnimarket PR #1753 after dev conflict repair. Codex preserved the OMN-14571
      repo-qualified ONEXNode regression and the current dev OMN-14583 vendored-contract collection tests,
      then reran the focused architecture graph suite, ruff checks, diff check, conflict-marker scan,
      and commit hooks.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1753; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=6fcb4a1eeeb2ddaa37a8d946cb6fdef136380af2;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,body --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and (.body | contains("uv run pytest tests/nodes/node_architecture_graph_populate_effect/
          -q")) and (.body | contains("29 passed")) and (.body | contains("ruff format --check")) and
          (.body | contains("ruff check")) and (.body | contains("git diff --check")) and (.body | contains("conflict-marker
          scan PASS")) and (.body | contains("commit hooks PASS"))' | grep -qx true
  - id: "dod-omnimarket-pr-1753-live-remediation"
    description: >-
      Live-remediation evidence already recorded on omnimarket PR #1753. The product PR body states that
      the ONEXNode collision could not be fixed by code alone because existing bare-keyed graph rows would
      remain. The proof binds the documented tenancy-safety check, backup export, scoped ONEXNode-only
      purge, fixed-code re-ingest, and post-repair repo-qualified identity assertions.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1753; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=6fcb4a1eeeb2ddaa37a8d946cb6fdef136380af2;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,body --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and (.body | contains("Tenancy-safety check first")) and (.body | contains("Backup
          exported before any mutation")) and (.body | contains("Scoped purge")) and (.body | contains("MATCH
          (n:ONEXNode) DETACH DELETE n")) and (.body | contains("Re-ran `populate_from_contracts`")) and
          (.body | contains("790 -> 2,308") or contains("790 → 2,308")) and (.body | contains("zero `ONEXNode`
          rows remain without a repo-qualified `node_id`")) and (.body | contains("four") and contains("omnimarket")
          and contains("omniclaude") and contains("omnibase_infra") and contains("omniintelligence"))'
          | grep -qx true
  - id: "dod-omnimarket-pr-1753-deploy-scope"
    description: >-
      Deploy-scope audit for omnimarket PR #1753. The final product diff is limited to architecture graph
      populate code and tests. It does not perform a live deploy, restart, .201 mutation, systemd change,
      compose change, deploy-script change, migration change, or runtime node wiring change.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1753; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=6fcb4a1eeeb2ddaa37a8d946cb6fdef136380af2;
          gh pr view "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --json headRefOid,files --jq '.headRefOid
          == "'${PRODUCT_HEAD}'" and ((.files | map(.path)) | all(. == "src/omnimarket/nodes/node_architecture_graph_populate_effect/handlers/handler_architecture_graph_populate.py"
          or . == "tests/nodes/node_architecture_graph_populate_effect/test_golden_chain_architecture_graph_populate_effect.py"))'
          | grep -qx true && ! gh pr diff "${PRODUCT_PR_NUMBER}" --repo "${PRODUCT_REPO}" --name-only
          | grep -qE '(^|/)(systemd|deploy/scripts|docker/compose|docker/migrations)(/|$)'
