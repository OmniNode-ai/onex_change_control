title: "Contract-owned generation/eval/agent prompts (SEA prompts-contract carve-out)"
summary: >
  SEA prompts-contract follow-on under epic OMN-12468. Moves the three inline SEA system-prompt literals
  (generation_system, eval_system, agent_system) out of consumer.py / eval_runner.py / agent.py and into
  a typed SEA-local prompts contract. Adds src/contracts/prompts.py (frozen Pydantic ModelRoutingPrompts
  with contract_type + schema_version, EnumPromptRef StrEnum, load_routing_prompts / load_default_routing_prompts)
  and src/contracts/prompts.yaml (the three prompts as literal block scalars, byte-identical to the prior
  inline strings). A model_validator pins each prompt's sha256 so a YAML edit cannot silently drift the
  bytes; the loader is fail-closed on missing refs, empty prompts, and unknown fields (extra="forbid").
  Config-in-contract, not inline literals; no new routing node — this is a SEA-local config surface mirroring
  mcp_service / model_registry. Zero httpx.post added; no routing, ladder, escalation, or route-evidence
  surface added (SEA consumes routing, never owns it). Reapplied manually onto onex-self-extending-agent
  origin/dev (no cherry-pick from the abandoned OMN-12468 stack branches, to avoid importing the dropped
  httpx/routing surfaces).
