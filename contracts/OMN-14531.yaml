title: OCC companion for omnibase_infra#2291 - omnimarket drift guard for onex skill dispatch
summary: >-
  OCC evidence companion for OMN-14531. omnibase_infra#2291 closes the detector-shelf blind spot where
  `onex skill aislop_sweep` failed with a bare Unknown node error when omnimarket was absent from the
  omnibase_infra venv even though a canonical OMNI_HOME/omnimarket clone existed.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      omnibase_infra#2291 must wire the omnimarket drift guard into the `onex skill` dispatch path and
      preserve focused CLI/drift guard tests.
    command: >-
      gh pr view 2291 --repo OmniNode-ai/omnibase_infra --json headRefOid,files,body and inspect changed
      product files at head d8b5e4c11ce118cdc053a3d6724fd624ded53bfe.
emergency_bypass:
  enabled: false
  justification: ''
  follow_up_ticket_id: ''
dod_evidence:
  - id: dod-2291-head-d8b5e4c-skill-drift-guard-surfaces
    description: >-
      Product-observing verification that omnibase_infra#2291 head d8b5e4c11ce118cdc053a3d6724fd624ded53bfe
      modifies the omnimarket drift guard and `onex skill` CLI dispatch surfaces, with the unrelated vendored
      migration file explicitly present as the local pre-commit unblocker.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2291 --repo OmniNode-ai/omnibase_infra --json headRefOid,files --jq
          '.headRefOid + "\n" + (.files | map(.path) | join("\n"))' > "$f" && grep -Fq 'd8b5e4c11ce118cdc053a3d6724fd624ded53bfe'
          "$f" && grep -Fq 'src/omnibase_infra/cli/cli_skill.py' "$f" && grep -Fq 'src/omnibase_infra/cli/omnimarket_drift_guard.py'
          "$f" && grep -Fq 'tests/unit/cli/test_cli_skill.py' "$f" && grep -Fq 'tests/unit/cli/test_omnimarket_drift_guard.py'
          "$f" && grep -Fq 'docker/migrations/forward/nodes/node_projection_context_roi/002_add_factor_subset_hash_and_routing_source.sql'
          "$f"
  - id: dod-2291-head-d8b5e4c-red-green-proof
    description: >-
      Product PR body verification for OMN-14531: the PR documents the real failing `onex skill aislop_sweep`
      symptom, the repaired success path, and focused RED-to-GREEN automated regression coverage plus
      local gates.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2291 --repo OmniNode-ai/omnibase_infra --json headRefOid,body --jq
          '.headRefOid + "\n" + .body' > "$f" && grep -Fq 'd8b5e4c11ce118cdc053a3d6724fd624ded53bfe' "$f"
          && grep -Fq 'Unknown node' "$f" && grep -Fq 'repos_scanned=1' "$f" && grep -Fq 'test_drift_check_raises_when_not_installed_but_canonical_clone_present'
          "$f" && grep -Fq 'test_cli_skill.py` full suite' "$f" && grep -Fq 'full `pre-commit run` clean'
          "$f"
  - id: dod-2291-head-d8b5e4c-no-live-deploy-required
    description: >-
      Deploy assessment for omnibase_infra#2291. The product change is limited to CLI drift-guard Python/tests
      plus one vendored migration sync file used to satisfy local pre-commit; it does not change deploy
      manifests, runtime images, compose files, or live .201 runtime configuration. No live deploy or
      restart was performed for this PR.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 2291 --repo OmniNode-ai/omnibase_infra --json headRefOid,files --jq
          '.headRefOid + "\n" + (.files | map(.path) | join("\n"))' > "$f" && grep -Fq 'd8b5e4c11ce118cdc053a3d6724fd624ded53bfe'
          "$f" && grep -Fq 'src/omnibase_infra/cli/cli_skill.py' "$f" && grep -Fq 'src/omnibase_infra/cli/omnimarket_drift_guard.py'
          "$f" && ! grep -Eq '(^|/)deploy/|docker/compose|compose[.]ya?ml|Dockerfile|runtime|k3s|helm'
          "$f"
  - id: dod-occ-self-4103
    description: >-
      Self-binding verification that onex_change_control#4103 carries the OMN-14531 contract and product-observing
      receipts, and that its initial evidence commit remains in the PR commit history.
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: >-
          f="$(mktemp)" && gh pr view 4103 --repo OmniNode-ai/onex_change_control --json number,title,files,commits
