title: "P2-2/P2-3 — Fixed task manifest + N-arm factor matrix (config/data)"
summary: >-
  Implements the fixed bounded task manifest (P2-2) and N-arm factor matrix (P2-3)
  for the context-ROI experiment. The task manifest declares 5 replayable SEA-path
  tasks with explicit success criteria and per-arm required/optional factor policies.
  The factor matrix defines 7 arms in canonical order with deterministic factor
  precedence. Missing required factors fail rows immediately; missing optional factors
  warn (never silent-green). full_guidance_negative_control budget failures are scored
  separately from generation failures and the arm is never ranked as preferred.
  Pure COMPUTE node; no deploy; no shared-pin bump; no main promotion.
