---
schema_version: "1.0.0"
ticket_id: "OMN-14587"
title: "OCC companion for omnibase_infra#2300 — canon-shape ratchet fan-out + CI-gate wiring"
summary: >
  OCC evidence companion for OmniNode-ai/omnibase_infra#2300 (OMN-14587). #2300 fans out the canonical
  handler-shape growth ratchet (OMN-14355/OMN-14368, previously wired only for omnimarket via OMN-14372)
  to omnibase_infra: it generates and commits scripts/ci/canonical_handler_shape_baseline.py (115 node
  contract.yaml files scanned, 22 canonical, 93 non-canonical, frozen as the NON_CANONICAL baseline),
  then a follow-on commit adds a "Canonical handler-shape ratchet" step to the existing lint job that
  invokes the classifier (via the sibling omnibase_core checkout already cloned for Transport-mock lint)
  in --full mode against this baseline, mirroring the omnimarket wiring pattern exactly. Every substantive
  check below is a CONTENT READ pinned to #2300's head commit SHA (daeba34583fd4d3bc08dc738832bcf1a182fc72c).
  It observes the source code #2300 actually wrote, so it does not depend on #2300's CI — which matters
  here because #2300's CI is red precisely BECAUSE this contract was missing (occ-preflight/eligibility
  -> missing Evidence-Source, cascading into CI Summary and the rest of the required matrix; confirmed
  live: every non-pass check on #2300 is occ-preflight or something occ-preflight gates, zero unrelated
  content failures). A check keyed on #2300's own CI would be circular. No check greps this repo's own
  receipt corpus for "status: PASS". Each product-tree read below carries its own RED control: the same
  command at omnibase_infra dev HEAD (80c26eaa122f0bdc025be2f179c8991a5d8c0d86, the PR's base commit,
  where the ratchet step and baseline file do not exist) finds zero occurrences and would fail.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnibase_infra#2300 head SHA wires the canon-shape ratchet CI step and commits the 93-entry
      baseline"
    command: "see dod_evidence check_values (content reads pinned to daeba3458)"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-2300-ratchet-step-present"
    description: >-
      Product-observing: reads the actual .github/workflows/ci.yml at #2300's exact head commit SHA (daeba34583fd4d3bc08dc738832bcf1a182fc72c)
      via the GitHub contents API and asserts the "Canonical handler-shape ratchet (OMN-14355 fan-out,
      OMN-14587)" step name is genuinely present in the workflow — the CI-gate-wiring half of the fix,
      added inside the existing lint job. This reads the product tree, not this receipt; nothing in the
      command touches the OCC checkout, so it cannot pass merely because someone wrote "status: PASS"
      in a receipt. RED DIRECTION: the identical command at omnibase_infra dev HEAD (80c26eaa122f0bdc025be2f179c8991a5d8c0d86)
      finds ZERO occurrences (grep -c == 0) and exits 1; it exits 0 only at #2300's head (grep -c == 1).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnibase_infra/contents/.github/workflows/ci.yml?ref=daeba34583fd4d3bc08dc738832bcf1a182fc72c"
          --jq .content | base64 -d | grep -c "Canonical handler-shape ratchet (OMN-14355 fan-out, OMN-14587)")"
          -ge 1
  - id: "dod-verify-2300-baseline-93-entries"
    description: >-
      Product-observing: reads the actual scripts/ci/canonical_handler_shape_baseline.py at #2300's head
      commit SHA and asserts the frozen NON_CANONICAL tuple carries exactly 93 node entries, matching
      the PR's own cited scan result (115 scanned, 22 canonical, 93 non-canonical). This is a genuinely
      new file this PR adds. RED DIRECTION: the file does not exist at all at dev HEAD (80c26eaa122f0bdc025be2f179c8991a5d8c0d86)
      — the contents API returns 404, zero occurrences, exit 1; it exits 0 only at #2300's head (grep
      -cE match == 93).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          test "$(gh api "repos/OmniNode-ai/omnibase_infra/contents/scripts/ci/canonical_handler_shape_baseline.py?ref=daeba34583fd4d3bc08dc738832bcf1a182fc72c"
          --jq .content | base64 -d | grep -cE '^\s+"omnibase_infra\.nodes\.')" -eq 93
  - id: "dod-deploy-assessment-2300"
    description: >-
      Deploy-gate assessment for omnibase_infra#2300. The PR changes exactly two files — the CI workflow
      and the new baseline data file — neither a Dockerfile, compose file, nor deploy script; it is a
      CI-configuration/measurement change, not a live runtime rollout. Falsifiable: the command fails
      if the PR diff ever grows a Dockerfile/compose/deploy-script change.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          ! (gh pr diff 2300 --repo OmniNode-ai/omnibase_infra --name-only | grep -qE "docker-compose|Dockerfile|deploy/")
  - id: "dod-occ-self-bind-pr-2300-companion"
    description: >-
      Self-bind receipt for this OCC evidence companion. Binds an OMN-14587 PASS receipt to this companion's
      own commit history (deterministic two-commit commit_sha bind — no PR-number prediction under concurrent
      lanes) so onex_change_control's own occ-merge-eligibility gate can resolve the companion — the three
      product-observing items above all bind to the omnibase_infra product PR #2300, so without this item
      nothing binds to this OCC PR itself (reason pr_ticket_mismatch). This is a binding/stamp item, NOT
      substantive evidence: it derives to L0 and does not count toward the contract substance floor (the
      three L1 product reads above carry the substantive proof). Mirrors the dod-occ-self-bind pattern
      used by prior merged evidence companions (e.g. OMN-14600 / OCC#4134, OMN-14593 / OCC#4131, OMN-14608
      / OCC#4135).
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-14587/dod-occ-self-bind-pr-2300-companion/command.yaml
