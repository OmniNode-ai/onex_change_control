schema_version: "1.0.0"
ticket_id: "OMN-12993"
title: "A/B Model Compare renders raw per-call rows instead of per-model aggregates"
summary: >-
  Central evidence for omnidash PR #207, which fixes the /experiments A/B Model Compare panel. The onex.snapshot.projection.ab-compare.v1
  projection (llm_call_metrics) serves one row per LLM call; the panel mapped those rows 1:1 against a
  per-model aggregate type that never matched the served shape, rendering ~100 meaningless "runs · —"
  entries and a React missing-key error. The fix corrects the row type, adds a pure aggregateAbCompareByModel
  helper that rolls per-call rows up per model (run count + latency, with token/cost only from rows carrying
  real usage), renders an honest em-dash for usage_source=MISSING rows, and uses a stable per-model key.
  No runtime/contract surface change.
