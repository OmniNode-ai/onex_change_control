---
schema_version: "1.0.0"
ticket_id: "OMN-11426"
title: "Repowise critical: harden omnibase_core receipt and validation hotspots"
summary: >
  Carry receipt-gate PR creation time through the omnibase_core CLI, workflow, and validation script entrypoints
  so post-cutoff contract_sha256 enforcement is active from the proof paths, with focused regression tests.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "protocols"
  - "public_api"
evidence_requirements:
  - kind: "tests"
    description: "Focused receipt-gate CLI and contract_sha256 regression tests pass."
    command: "pytest tests/unit/validation/test_receipt_gate_cli.py tests/unit/validation/test_receipt_gate_contract_sha256.py
      -q"
  - kind: "tests"
    description: "Broader receipt-gate validation test selection passes."
    command: "pytest tests/unit/validation/test_receipt_gate_*.py tests/unit/scripts/validation/test_validate_pr_receipts.py
      -q"
  - kind: "manual"
    description: "omnibase_core PR #1126 is open against main at the recorded head SHA."
    command: "gh pr view 1126 --repo OmniNode-ai/omnibase_core --json headRefOid,state,url,headRefName,baseRefName"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
