    description: "Focused receipt-gate CLI and contract_sha256 tests passed locally."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11426/dod-focused-tests/command.yaml\"
          && grep -q '^commit_sha: \"38146d29beef7c001db7fb18764c00d9f9ba35bc\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11426/dod-focused-tests/command.yaml\""
  - id: "dod-receipt-gate-selection"
    description: "Broader receipt-gate validation test selection passed locally."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11426/dod-receipt-gate-selection/command.yaml\"
          && grep -q '^commit_sha: \"38146d29beef7c001db7fb18764c00d9f9ba35bc\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11426/dod-receipt-gate-selection/command.yaml\""
  - id: "dod-pr-1126-open"
