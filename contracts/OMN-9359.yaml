    description: "OmniClaude demo skill shim routes through runtime-dispatched market nodes."
    command: "uv run pytest tests/skills/test_demo_skill.py -q"
  - kind: "manual"
    description: "/onex:demo delegation --dry-run succeeds through native demo nodes."
    command: "PYTHONPATH=/Users/jonah/Code/omni_home/omni_worktrees/OMN-9359/omnimarket/src uv run python
      plugins/onex/skills/demo/_lib/dispatch.py delegation --dry-run"
  - kind: "manual"
    description: "Live mode without GEMINI_API_KEY returns a clear preflight failure."
