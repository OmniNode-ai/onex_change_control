title: "Serialize UUID in projection API _json_value"
summary: >-
  Bind central evidence for omnimarket PR #1010, which fixes the projection API so the _json_value helper
  serializes uuid.UUID columns to their string form. GET /projection/delegation returned HTTP 500 'TypeError:
  Object of type UUID is not JSON serializable' because the raw delegation topic reads public.delegation_events
  (UUID columns) and _json_value had no UUID branch. Fix adds a UUID -> str branch before the generic
  passthrough, with a TDD regression that fails pre-fix and passes post-fix.
