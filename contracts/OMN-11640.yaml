    description: "Bind OMN-11640 evidence to omnimarket PR #751 at the observed PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-omnimarket-pr-751/command.yaml\"
          && grep -q '^pr_number: 751$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-omnimarket-pr-751/command.yaml\"
          && grep -q '^commit_sha: \"b929ccd4f638c40ee53247c93d55e6d661af5764\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-omnimarket-pr-751/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "Pure proof-matrix and contract declaration change - no live deploy required before merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-deploy-assessment/command.yaml\"
          && grep -q 'No live deploy' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-deploy-assessment/command.yaml\"
          && grep -q 'deploy-gated' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr-1350"
    description: "Bind OMN-11640 central evidence to this onex_change_control PR."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-occ-pr-1350/command.yaml\"
          && grep -q '^pr_number: 1350$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11640/dod-occ-pr-1350/command.yaml\""
