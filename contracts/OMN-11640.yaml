    description: "delegate_skill baseline and golden-chain contract tests pass for omnimarket PR #751."
    command: "uv run python scripts/run_market_skill_baseline.py --skip-pytest --strict && uv run pytest
      tests/test_golden_chain_delegate_skill_baseline.py -q"
dod_evidence:
