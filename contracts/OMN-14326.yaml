schema_version: "1.0.0"
ticket_id: "OMN-14326"
title: "feat(OMN-14326): node_ast_node_analyzer + node_stub_detector — pure COMPUTE codegen-analysis nodes"
summary: >-
  omnimarket product PR #1707 (branch jonah/omn-14326-ast-analyzer-stub-detector, head f6e379329894d7d57383f924463a72367b2dc1e3)
  adds two pure COMPUTE nodes extracted from dormant codegen analysis logic. node_ast_node_analyzer parses
  a single ONEX node's source TEXT with the standard-library ast module and returns {class_name, base_class,
  mixins[], methods[], docstring, io_operations[]}, classifying I/O operation classes from import names
  and source substrings. node_stub_detector walks class bodies and flags each async method carrying an
  incomplete-method marker, matching comment markers against real comment tokens (tokenize) and NotImplementedError
  against the AST (a real raise node) so a marker inside a string literal is never a false positive. Both
  are stateless, deterministic, and perform NO I/O — they operate on source text supplied in the request
  model, not on files read from disk. CONTRACT + NODE + HANDLER only (rule 7a canonical); no Plugin* base,
  no node-calling-node.
