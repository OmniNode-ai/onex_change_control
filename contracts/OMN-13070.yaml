schema_version: "1.0.0"
ticket_id: "OMN-13070"
title: "fix(OMN-13070): config_prefetcher ambient-env precedence fix"
summary: >
  On controlled lanes (infisical_required=True), config_prefetcher previously skipped keys already present
  in os.environ, allowing stale shell/compose state to beat fetched configuration. Fix: on controlled
  lanes, fetched/overlay config always wins; ambient env is retained only as a declared bootstrap fallback
  (with an explicit provenance INFO log line) when Infisical returns None. apply_to_environment also overwrites
  stale env on controlled lanes. Uncontrolled lane (infisical_required=False) behaviour is unchanged.
  Five regression tests cover the new precedence order.
