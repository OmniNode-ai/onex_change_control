ticket_id: OMN-9043
title: Make hardcoded-path violations structurally impossible
summary: >-
  Wire the check-local-paths validator as a pre-commit hook in omniclaude and omnibase_core. Fix the silent-skip
  (exit 0) in omniclaude's check_local_paths_wrapper.sh and check_local_paths.py so that an unimportable
  validator_local_paths fails loud (exit 1). Add the check-local-paths hook to omnibase_core's .pre-commit-config.yaml
  with tests/fixtures/ exclusion, annotate legitimate test-data paths with # local-path-ok, and remove
  the now-closed MISSING_PRE_COMMIT baseline entry for hardcoded-local-paths.
