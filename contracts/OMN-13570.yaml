---
schema_version: "1.0.0"
ticket_id: "OMN-13570"
title: "Doc-sanitization cleanup: remove local-environment traces from public-repo docs"
summary: >-
  Per-repo documentation cleanup that removes local-environment leaks from tracked documentation files
  in the public OmniNode repos. Removal targets: LAN IPs (192.168.x.x / 10.x), .201/.200 host shorthand,
  personal paths (/Users/<user>), SSH user@host and email handles, and internal-only URLs/ports. Driven
  by deterministic git grep over tracked files only (untracked worktrees and gitignored .onex_state evidence
  are excluded — they are never published). Replacement convention: IP/.201 -> <onex-host>; /Users/<user>/...
  -> $OMNI_HOME or <deploy-root>; ssh user@host -> ssh <user>@<onex-host>; email -> <maintainer-email>
  or removed. localhost dev examples are out of scope (framework-agnostic, low severity). This contract
  is the central Receipt-Gate Evidence-Source that the per-repo cleanup PRs cite so their verify/verify
  Receipt Gate resolves against an OCC-main ancestor. Documentation-only cleanup; no code, no topic schema,
  no envelope, no contract API change, no deploy.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "docs"
    description: >-
      The sanitization sweep that scoped this cleanup is recorded under the audit directory in omni_home:
      docs/audits/2026-06-24-public-repo-doc-sanitization-sweep/ (INDEX.md plus 14 per-repo reports).
      The INDEX records the deterministic git-grep ground truth for local-env occurrences per repo (TOTAL
      183 LAN IPs, 101 .201/.200, 30 /Users/, 17 jonah@ across tracked docs) and the agreed replacement
      conventions.
    command: "ls docs/audits/2026-06-24-public-repo-doc-sanitization-sweep/"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
