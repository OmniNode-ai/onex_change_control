title: "Re-lock omnimarket sibling git pins to merged dev SHAs (workspace build pin-drift)"
summary: >-
  omnimarket/pyproject.toml [tool.uv.sources] rev= pins (mirrored in [tool.uv] override-dependencies git
  URLs and uv.lock) hardcoded stale sibling SHAs that the OMN-12977 workspace-build pin guard (uv.lock
  is the pin authority, compared to canonical clone HEAD SHAs) aborted on with exit 3, blocking all workspace
  builds (dev + stability + prod). Re-lock the four stale pins to their LIVE origin/dev tips: omnibase-core
  25a71031 -> 8a53a063 (dev tip is a strict superset of the un-merged jonah/OMN-13234 branch), omnibase-infra
  d56384fb -> f2533f5a (carries A2 0018/0019 migration vendoring), omnibase-compat bd7fe461 -> 331a9de4,
  onex-change-control 33d6747e -> dd2620d1. Versions identical (drift_direction=none) — pure SHA staleness
  left by the cross-repo pin bot after the 2026-06-20 savings-cluster merges. omnibase-spi stays a version
  specifier (not git-pinned). omninode-memory intentionally NOT bumped: its dev tip (c3cec15d / v0.16.0)
  removes the node_persona_lifecycle_orchestrator module omnimarket imports, and the guard does not track
  it, so bumping it breaks imports for zero guard benefit. Only pyproject.toml pins + uv.lock changed
  (plus the in-repo contract mirror) — no source. This OCC PR carries the central contract consumed by
  the omnimarket PR #1326 Receipt Gate via Evidence-Source.
