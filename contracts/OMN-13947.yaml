schema_version: "1.0.0"
ticket_id: "OMN-13947"
title: "Harden runner-monitor auto_bounce against overlap, timeout, and orphaned-created runners"
summary: >-
  Fixes runner-fleet non-convergence in the existing runner-monitor auto_bounce remediation path. The
  omnibase_infra PR #2208 keeps auto-bounce operator-gated by MONITOR_AUTO_BOUNCE, but makes enabled remediation
  single-flight, scales the compose timeout by batch size, detects containers left at Docker Status=created
  after an interrupted recreate, and verifies/retries target startup after compose returns. This prevents
  overlapping cron cycles from racing the Docker daemon and prevents created-but-never-started runner
  containers from being orphaned across later monitor cycles. This is pre-deploy code evidence only; no
  runner restart, docker compose execution against .201, image build/push, or live cluster mutation was
  performed.
