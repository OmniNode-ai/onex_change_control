---
schema_version: "1.0.0"
ticket_id: "OMN-13576"
title: "Wire spdx-headers as a required CI gate (burn down validator-requirements baseline ratchet)"
summary: >
  First-batch burn-down of the validator-requirements baseline ratchet (epic OMN-13573, unblocked by the
  OMN-13574 Model B enforcement decision). Graduates the spdx-headers validator from a grandfathered MISSING_CI_WORKFLOW
  baseline gap into a real, rollup-covered, required CI gate on omnibase_core. A new spdx-headers job
  in ci.yml runs validate_spdx_headers.py over the full tracked tree (mirroring the pre-commit hook's
  files:/exclude: scope) and feeds quality-gate -> CI Summary, so a missing/incorrect SPDX header turns
  the single required rollup red. spdx-headers is added to model_b_rollup_enforcement.validator_jobs and
  removed from grandfathered_validators (rollup-coverage stays AIRTIGHT); the spdx-headers entry is removed
  from validator-requirements-baseline.yaml, and the consumer reports baseline-clean (11 gaps, was 12)
  without grandfathering it. 7 pre-existing SPDX year-drift files (2026 -> canonical 2025) surfaced by
  the new full-tree gate are fixed, along with the 3 pre-existing hook violations those files carried
  (record_guard RuntimeError -> ModelOnexError, two dict[str,Any] YAML-parse exclusions, and a path-scoped
  single-class legacy exemption). Serial-per-validator: this PR wires exactly one validator end-to-end;
  remaining baseline entries graduate in follow-on PRs.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      Consumer baseline-clean without grandfathering spdx-headers, rollup-coverage AIRTIGHT, the graduation
      regression test, and a planted-violation proof that a bad SPDX header makes the spdx-headers job
      command exit non-zero (gating the required rollup).
    command: "uv run pytest tests/validation/test_validator_rollup_coverage.py tests/validation/test_validator_requirements_spec.py
      -q"
