schema_version: "1.0.0"
ticket_id: "OMN-12790"
title: "Delegation cloud-tier inference resolves secrets outside the runtime event loop"
summary: >-
  Fixes the forced cloud-tier delegation inference path where the auto-wired runtime called HandlerInferenceIntent
  from inside an active event loop and the handler used the synchronous secret resolver, returning `resolve_api_key()
  is sync-only; call resolve_api_key_async() from an async context.` before the provider request could
  run. The handler now exposes an async runtime entrypoint that moves the existing synchronous effect
  to a worker thread, preserving standalone `handle()` behavior while keeping blocking secret resolution
  and HTTP off the runtime event loop.
