schema_version: "1.0.0"
ticket_id: "OMN-12708"
title: "Route PR lifecycle runtime request through native topic"
summary: >-
  Central evidence for omnimarket PR #1053. The Codex runtime adapter no longer sends pr_lifecycle_orchestrator
  requests to the generic Pattern-B task topic while waiting on PR lifecycle terminal topics. It uses
  the native deployed contract topic, and the consumer accepts typed event envelopes and repos-list payloads.
  Focused tests and a live runtime repro show the request reaches a terminal result instead of timing
  out before the deployed worker.
