ticket_id: OMN-13697
title: 'fix(omnibase_infra): remove LLM_CODER_FAST_URL env default from ModelAgentLearningExtractionConfig.llm_summary_url'
summary: >-
  ModelAgentLearningExtractionConfig.llm_summary_url declared default_factory=lambda: os.environ["LLM_CODER_FAST_URL"],
  baking a prohibited LLM_* env-var read into a frozen Pydantic field. This violates feedback_no_env_for_model_endpoint_use_routing_authority
  and feedback_all_urls_from_contracts. Additionally, os.environ[] raises KeyError at model instantiation
  time when the var is absent — before the use site. Fix: remove default_factory, mark llm_summary_url
  as a required Field(...), remove unused import os, and add unit tests confirming ValidationError is
  raised on omission rather than a silent KeyError.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: tests
    description: >-
      3 new unit tests in TestModelAgentLearningExtractionConfig confirm (1) ValidationError on missing
      llm_summary_url, (2) explicit URL accepted, (3) no env-var side effect.
    command: 'uv run pytest tests/unit/services/test_agent_learning_extraction.py::TestModelAgentLearningExtractionConfig
      -v'
  - kind: ci
    description: CI pipeline green on PR
    command: 'gh pr checks --repo OmniNode-ai/omnibase_infra'
