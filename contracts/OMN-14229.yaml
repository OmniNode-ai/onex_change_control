title: "feat(OMN-14229): implement documented ModelFSMStateTransition.priority / guard-fallthrough in
  the FSM engine"
summary: >-
  omnibase_core PR #1411 wires the already-documented ModelFSMStateTransition.priority / guard-fallthrough
  semantics into the FSM execution engine. util_fsm_executor._select_transition (replacing _find_transition)
  orders the (from_state, trigger) candidate set by priority DESCENDING with declaration order as the
  stable tiebreak, evaluates guards in that order, and selects the first candidate whose required conditions
  all pass; an unconditional transition acts as a default/fallthrough edge, exact-state matches still
  preempt wildcard (from_state == "*") transitions, and when no candidate is eligible the engine fails
  CLOSED — it returns the existing guard_rejection result (stays in-state, success=False) rather than
  silently executing a transition whose guard is false. Independently verified: the new TestFSMPriorityGuardFallthrough
  cases plus the full FSM/reducer/mixin regression suites are green with the worktree source under test
  (PYTHONPATH cleared), and the change is behavior-invariant for every existing contract (the only single-candidate
  path is byte-identical).
