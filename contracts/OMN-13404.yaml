---
schema_version: "1.0.0"
ticket_id: "OMN-13404"
title: "Fix 0016_delegation_quality_bar_evidence cold-apply: CREATE OR REPLACE VIEW reorders an existing
  column"
summary: >-
  node_projection_delegation migration 0016_delegation_quality_bar_evidence did CREATE OR REPLACE VIEW
  projection_delegation_quality_gate AS ... that inserted the two new authority columns (avg_actual_score,
  avg_required_bar) ahead of the existing by_check_type column. Postgres forbids renaming/reordering an
  existing output column at a given ordinal via CREATE OR REPLACE VIEW, so the view (which already exists
  from 0010) failed to apply with "ERROR: cannot change name of view column by_check_type to avg_actual_score".
  Because the forward-migration runner stops on first error (ON_ERROR_STOP=1), this blocked 0017_premium_counterfactual,
  0018_delegation_cost_measurements, and 0019_delegation_budget_state on every cold lane, and the same
  view-from-0010 + unapplied-0016 state blocks it on warm stability too. The minimal fix preserves the
  15 existing column ordinals/names exactly as 0010 created them and appends the two new columns at ordinals
  16-17, so CREATE OR REPLACE VIEW is legal; name-based consumers (contract projection columns list) are
  unaffected. No DROP VIEW / CASCADE needed — pg_depend shows no object depends on projection_delegation_quality_gate
  other than this view itself. The fix is shipped on omnimarket source PR #1327 and re-vendored byte-identical
  into omnibase_infra docker/migrations/forward via sync-node-migrations.sh on omnibase_infra PR #2056.
  This OCC PR carries the central contract consumed by both PR Receipt Gates via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
