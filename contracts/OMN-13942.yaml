ticket_id: "OMN-13942"
title: "runner-fleet-maintain workflow — Increment 1 (detection core, read-only)"
summary: >-
  Adds a canonical ONEX node workflow for GitHub Actions self-hosted runner-fleet health detection, moving
  runner-fleet maintenance from ad-hoc cron/bash into a node-based workflow and closing the OMN-13932
  blind spot (buildx loss + codeload throttling degraded the fleet 2026-07-04 with zero automated detection).
  omnibase_infra PR #2206 delivers three nodes: node_runner_fleet_maintain_orchestrator (coordinates one
  tick, no I/O), node_runner_fleet_health_compute (pure/deterministic classifier producing a health verdict
  with recorded-but-never-executed recommended_actions), and the completed node_runner_health_snapshot_effect
  (read-only gh-api/SSH/Docker gather). Strictly read-only — no path restarts a runner, cancels a run,
  force-recreates a container, or mutates a merge queue. Increment 2 (recovery effects, FSM cooldown reducer,
  grant-gated mutation) is design-only per the ticket and intentionally not built here. This is pre-deploy
  code evidence only; no runtime deploy, restart, docker exec, rpk topic produce, AWS mutation, or live
  cluster mutation was performed.
