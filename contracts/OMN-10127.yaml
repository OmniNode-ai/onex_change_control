---
schema_version: "1.0.0"
ticket_id: OMN-10127
title: "Add event registry drift validator"
summary: "Central receipt contract for the blocking omnimarket event-registry drift validator delivered
  in omnimarket PR #507."
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - topics
  - events
evidence_requirements:
  - kind: "manual"
    description: "Validator unit tests prove both drift directions are detected"
    command: "test -f drift/dod_receipts/OMN-10127/dod-validator-tests/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10127/dod-validator-tests/command.yaml && grep -q '3 passed' drift/dod_receipts/OMN-10127/dod-validator-tests/command.yaml"
  - kind: "manual"
    description: "Validator passes against local omniclaude and omnimarket with checked-in baseline"
    command: "test -f drift/dod_receipts/OMN-10127/dod-validator-local-run/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10127/dod-validator-local-run/command.yaml && grep -q 'OK: omniclaude
      hook event topics match omnimarket registry' drift/dod_receipts/OMN-10127/dod-validator-local-run/command.yaml"
  - kind: "manual"
    description: "Changed validator files pass ruff and mypy strict"
    command: "test -f drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml && grep -q 'Success: no
      issues found' drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml && grep -q 'All
      checks passed!' drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml"
  - kind: "manual"
    description: "Pre-commit hook set passes on touched files with OMNIBASE_INFRA_PATH"
    command: "test -f drift/dod_receipts/OMN-10127/dod-validator-precommit/command.yaml && grep -q '^status:
      PASS$' drift/dod_receipts/OMN-10127/dod-validator-precommit/command.yaml && grep -q 'Event registry
      drift validator.*Passed' drift/dod_receipts/OMN-10127/dod-validator-precommit/command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-validator-tests"
    description: "Validator unit tests prove both drift directions are detected"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-10127/dod-validator-tests/command.yaml && grep -q
          '^status: PASS$' drift/dod_receipts/OMN-10127/dod-validator-tests/command.yaml && grep -q '3
          passed' drift/dod_receipts/OMN-10127/dod-validator-tests/command.yaml"
  - id: "dod-validator-local-run"
    description: "Validator passes against local omniclaude and omnimarket with checked-in baseline"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-10127/dod-validator-local-run/command.yaml && grep
          -q '^status: PASS$' drift/dod_receipts/OMN-10127/dod-validator-local-run/command.yaml && grep
          -q 'OK: omniclaude hook event topics match omnimarket registry' drift/dod_receipts/OMN-10127/dod-validator-local-run/command.yaml"
  - id: "dod-validator-lint-type"
    description: "Changed validator files pass ruff and mypy strict"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml && grep
          -q '^status: PASS$' drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml && grep
          -q 'Success: no issues found' drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml
          && grep -q 'All checks passed!' drift/dod_receipts/OMN-10127/dod-validator-lint-type/command.yaml"
  - id: "dod-validator-precommit"
    description: "Pre-commit hook set passes on touched files with OMNIBASE_INFRA_PATH"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "test -f drift/dod_receipts/OMN-10127/dod-validator-precommit/command.yaml && grep
          -q '^status: PASS$' drift/dod_receipts/OMN-10127/dod-validator-precommit/command.yaml && grep
          -q 'Event registry drift validator.*Passed' drift/dod_receipts/OMN-10127/dod-validator-precommit/command.yaml"
