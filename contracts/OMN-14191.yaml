schema_version: "1.0.0"
ticket_id: "OMN-14191"
title: "fix(OMN-14191): merge-sweep counts prs_fixed only after OCC read-back"
summary: >-
  omnimarket PR #1664 hardens node_pr_lifecycle_orchestrator so merge-sweep fix accounting no longer trusts
  a handler's dispatch/self-report flag. After each fix arm runs, the orchestrator performs an independent
  live read-back using the canonical omnibase_compat OCC stamp parser and counts prs_fixed only when the
  referenced OCC companion PR is open and the product PR body carries matching Evidence-Source and Evidence-Ticket
  stamps. Noop, dry-run, unreadable, closed companion, ticket-mismatch, or dispatched-but-not-landed arms
  fail closed and count zero. The change adds the read-back helper seam, wires it into the orchestrator
  fix path, declares the omnibase_compat dependency, and covers the false-success and true-success paths
  with focused unit and golden-chain tests.
is_seam_ticket: false
interface_change: false
