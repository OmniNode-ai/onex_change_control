title: "feat(OMN-14307): typed GitHub repo status gateway (read-only CLI) to replace raw gh in verify
  loops"
summary: >-
  omnimarket product PR #1703 (branch jonah/omn-14307-typed-github-repo-gateway-read, head 1ce87561fe32fbe2923e723b4908f0a84507df9c)
  adds node_github_repo_gateway_effect — a CLI-invoked, read-only GitHub status reader that returns ONE
  small typed object per operation (pr_status, ci_checks, open_prs_list, branch_protection, review_gate,
  merge_commit_sha, ticket_ref) so the verify-before-accept loop can replace raw `gh pr checks/view --json`
  (large token burn). Additive: it does not touch the live node_pr_lifecycle_* merge path. Reuses the
  existing typed GitHub transport (GitHubHttpClient + github_api.graphql) — no subprocess gh. This first
  slice is CLI-only and DECLARED experimental (contract lifecycle: experimental, metadata full_runtime:
  false); the live-Kafka runtime path and the merge-execute effect leaves are deferred, human-gated, and
  out of scope.
