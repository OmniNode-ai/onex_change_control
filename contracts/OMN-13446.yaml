title: "Phase 5 — Re-point omnimarket to core RuntimeLocal via git-rev; widen core pin <0.47.0; add core-only-install
  CI gate"
summary: >-
  Phase 5 of the local-first runtime re-convergence (epic OMN-13442). Re-points omnimarket onto the core-resident
  RuntimeLocal that Phase 1b (OMN-13444 / core #1296, merged SHA db7f341) relocated into omnibase_core.runtime
  + omnibase_core.protocols.runtime, and that Phase 3a (OMN-13445) deleted from omnibase_infra. The core
  dependency pin is widened (>=0.45.0,<0.46.0 -> >=0.45.0,<0.47.0) and [tool.uv.sources] / [tool.uv] override-dependencies
  rev is set to the Phase-1b merged SHA db7f341 so omnibase-core resolves to 0.46.0 in uv.lock for end-to-end
  proof without a PyPI mint (OMN-13447 PyPI mint is escalated on a credential blocker). The tests/runtime_local_compat.py
  core fallback is corrected to import LocalRuntimeBusAdapter directly from omnibase_core.runtime.runtime_local_adapter
  (core exports the canonical class name; the prior HandlerBusAdapter alias never existed in core). omnimarket
  has ZERO RuntimeLocal-symbol imports of the now-deleted infra runtime paths, so no source repoint of
  the kind is required; the 123/253 omnibase_infra import lines are explicitly OUT OF SCOPE here (separate
  B2A/B/C decouple epic, OMN-13449/13450/13451). ADDS a REQUIRED core-only-install CI gate: a clean venv
  with omnibase-infra UNINSTALLED installs omnibase-core ONLY from the pinned rev, asserts omnibase_infra
  is genuinely absent, asserts `import omnibase_core.runtime` exposes RuntimeLocal resolving from an omnibase_core.*
  module, and runs the in-memory RuntimeLocal harness (node_merge_sweep_compute) to COMPLETED with the
  core-resident EventBusInmemory (zero infra). Wired into the ci-summary aggregator (Rule 5: enforcement,
  not detection). This OCC PR carries the central contract consumed by the omnimarket PR Receipt Gate
  via Evidence-Source.
