schema_version: "1.0.0"
ticket_id: "OMN-14399"
title: "fix(OMN-14399): run repo-root Python tests unconditionally in CI"
summary: >-
  omninode_infra PR #588 adds a repo_scripts_tests CI job that runs `uv run pytest tests/ -v --tb=short`
  from the repo root unconditionally (no if: guard, no paths: filter) on every push/pull_request/merge_group.
  Prior to this fix, the entire repo-root tests/ tree (84 tests, including tests/k8s/ prod-promotion-grant
  tests and tests/scripts/ grant-validator + selector-regression tests) had never once run in CI: both
  existing pytest jobs are hardcoded to working-directory docker/onex-api, and the changes job's python
  path filter only recognizes docker/onex-api/** as "python changed", so a PR touching only repo-root
  scripts/ or tests/ skipped every Python CI job while quality_gate/tests_gate tolerated the skip as PASS.
  ci_summary now depends on repo_scripts_tests and rejects any non-"success" result (including skipped)
  with FAILED=true, fail-closed. The change is additive to CI wiring only; it does not touch detect_test_paths.py
  or test_selection_adjacency.yaml (the onex-api-scoped selector), which remain intact.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
