schema_version: "1.0.0"
ticket_id: "OMN-13611"
title: "WS-C Phase 2.1: Build omnimarket/adapters/adapter_adk_invoke.py — invocation-only (no provider/model/tier
  selection)"
summary: >
  Wave-1 of the SEA -> canonical migration (epic OMN-13604). New invocation-only ADK adapter in omnimarket
  (src/omnimarket/adapters/adk/adapter_adk_invoke.py). The adapter owns INVOCATION ONLY: it binds an already-routed
  ModelInvocationCommand to the canonical remote-agent invoke transport and performs NO provider/model/tier/escalation
  selection, holds no routing logic, and overrides no delegation decision. Routing authority stays in
  node_delegation_routing_reducer / node_delegation_orchestrator / model-selection authority. Canonical
  invoke surface resolved (not assumed): there is NO node_remote_agent_invoke_effect directory in omnimarket;
  the invoke surface is node_delegation_orchestrator publishing the typed InvocationCommand event to onex.cmd.omnibase-infra.remote-agent-invoke.v1
  (its contract.yaml published_events + externally_consumed_topics), consumed by node_remote_agent_invoke_effect
  in omnibase_infra (HandlerA2ATask). The adapter resolves the invoke topic FROM that orchestrator contract
  (single source of truth, no topic literal recorded in the adapter config). ADK O4 probe (google-adk
  1.33.0) recorded in the PR body BEFORE implementation: SUPPORTED — Runner accepts constructor credential_service,
  LlmAgent.model is constructor-injected (str | BaseLlm), Gemini exposes base_url; so credentials are
  declared by secret_ref resolved at the effect boundary and the adapter reads no GOOGLE_*/ADK_* env.
  Strongly typed frozen models (UUID, extra=forbid); endpoint from contract+overlay deep-merge, never
  env. No topic schema, envelope, or contract-API change; no live-lane mutation.
is_seam_ticket: false
interface_change: false
