schema_version: "1.0.0"
ticket_id: "OMN-13554"
title: "Subscription probe discovers live per-topic split-groups instead of stale monolithic group name"
summary: >-
  The contract-sweep subscription probe (omnibase_infra.verification.probes.probe_subscription) derived
  the legacy monolithic consumer-group name local.runtime_config.registration-orchestrator.consume.1.0.0
  from a stale runtime_config.yaml identity. That group no longer exists on the broker: the live runtime
  subscribes via per-topic split-groups under a different base name (local.omnibase_infra.node_registration_orchestrator.consume.1.1.1.__i.<instance>.__t.<topic>),
  so the probe reported a recurring false "7/7 missing subscriptions" FAIL for node_registration_orchestrator.
  The same false FAIL was auto-filed and closed repeatedly (OMN-9420, OMN-9557, OMN-9648) as a runtime-wiring
  gap; the actual root cause is the probe's expected group name not matching the runtime's current per-topic
  split-group scheme. This change makes probe_subscription discover the runtime's actual per-topic split-groups
  by contract name and parse each topic directly from the live group name (resilient to instance/version/service-name
  drift); _rpk_fallback falls through to that discovery when the derived base group does not exist on
  the broker. A probe unit test pins the per-topic split-group naming so a future convention change fails
  the test rather than silently re-emitting a false FAIL. This OCC PR carries the central contract consumed
  by the omnibase_infra PR Receipt Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
