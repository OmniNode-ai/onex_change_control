---
schema_version: "1.0.0"
ticket_id: "OMN-13717"
title: "[Bug] database_sweep discovers 0 tables (wrong/empty target DB)"
summary: >-
  Fix handler_database_sweep.py to route psql via docker exec into the lane's Postgres container instead
  of connecting to a bare local unix socket (/tmp/.s.PGSQL.5432). On .201 runtime lanes there is no local
  Postgres socket, so every probe failed with a socket error producing table_results=0 and migrations_current/pending/failed
  all 0. Fix aligns with node_data_flow_sweep: run psql inside the lane's Postgres container via docker
  exec (over ssh when a remote runtime host is configured). Also classifies ERROR and NO_TABLE migration
  statuses as failed (previously counted as 0, hiding failures); AHEAD counts as pending. Host/container/pg-user/ssh-user
  are env-overridable via overlay.
