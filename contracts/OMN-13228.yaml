schema_version: "1.0.0"
ticket_id: "OMN-13228"
title: "per-machine event-sourced reap-on-merge worktree reaper (T4)"
summary: >-
  OMN-13228 ships the per-machine reaper consumer for the merge-triggered worktree GC epic (OMN-13008,
  T4) — the actual "reap on merge". On each machine a small reaper reads the onex.evt.github.pr-merged.v1
  projection (materialized by the T3 node, OMN-13227) over plain HTTP (GET {ONEX_PROJECTION_URL}/projection/onex.evt.github.pr-merged.v1?since=<cursor>;
  no Kafka client, no LAN-grant issue) and, for each newly-merged PR since a disk-persisted cursor, drives
  the canonical omniclaude/scripts/prune-worktrees.sh against the matched worktree across all roots. Safety
  is NOT re-implemented: prune-worktrees.sh removes a worktree only when its PR is MERGED (or the remote
  branch is gone) AND clean AND fully pushed; dirty / no-upstream / detached are SKIPPED. The cursor is
  persisted on disk under .onex_state and advanced only after a fully-successful execute pass; default-SKIP
  on any ambiguity (fetch error, prune non-zero, malformed row); dry-run never deletes and never advances.
  Two feature PRs: omnibase_infra ships the .201 systemd USER unit (onex-worktree-reaper.{service,timer}
  + install script, sibling to onex-disk-gc, running against /data/omninode/omni_worktrees); omniclaude
  ships the Mac launchd KeepAlive DAEMON (ai.omninode.worktree-reaper.plist KeepAlive=true + daemon launcher
  + install script) — a resident --loop process polling every <=60s that sidesteps the documented non-firing
  periodic-launchd failure mode. Stdlib + pydantic only; URL/topic from env (fail-fast, no default host,
  no hardcoded topic literal or LAN IP); ruff + mypy --strict clean. Unit tests use a mocked projection
  HTTP response (clean->prune, dirty->skip, cursor-advances-only-on-success, dry-run-never-deletes). Scope
  is code only; the live cross-machine verification (install the unit/daemon, merge a throwaway PR, observe
  the worktree removed) is the orchestrator's deploy step. This contract does NOT deploy, install or enable
  any systemd/launchd unit, restart runtime, mutate prod/judge/.201, or publish live traffic.
is_seam_ticket: false
interface_change: false
