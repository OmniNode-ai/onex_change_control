---
schema_version: "1.0.0"
ticket_id: "OMN-12493"
title: "Fix omnibase_compat Contract Compliance Check CWD for OCC-relative DoD contracts"
summary: >
  The omnibase_compat Contract Compliance Check job invoked run_contract_compliance_check.py without --workspace,
  so each contract 'command' check ran with cwd = the compat repo root. OCC ticket contracts grep OCC-relative
  paths (drift/dod_receipts/OMN-XXXX/.../command.yaml) that exist only in the cloned onex_change_control
  checkout, so the greps failed with "No such file or directory" and every OCC-relative contract returned
  BLOCK. The fix adds --workspace /tmp/onex_change_control to the invocation so 'command' checks resolve
  their relative paths against the OCC clone, mirroring how onex_change_control's own ci.yml runs the
  script (cwd = OCC root). This unblocks OMN-12477 compat PR #123 and any future OCC-relative DoD contract
  on omnibase_compat.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-compat-contract-compliance-cwd-fix"
    description: >
      omnibase_compat PR #126 adds --workspace /tmp/onex_change_control to the Contract Compliance Check
      invocation in .github/workflows/ci.yml. Reproduced against the merged OMN-12477 contract on OCC
      dev: 12/12 BLOCK without the flag, 12/12 PASS with it.
    source: "manual"
