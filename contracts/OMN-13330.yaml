---
schema_version: "1.0.0"
ticket_id: "OMN-13330"
title: "ci(OMN-13330): give core runtime-profiles a unique job id so it can be required"
summary: >-
  OCC evidence for the omnibase_core CI-config PR (#1335) that renames the validator-runtime-profiles
  workflow's job id/name from "validate" to "runtime-profiles". GitHub surfaces a check-run context as
  the bare job name, and "validate" is shared by 14 core validator workflows (11x on a single dev SHA),
  so the runtime-profiles context could not be made a required status check without forcing all 14 jobs.
  The rename yields a unique, safely-requirable context ("runtime-profiles"), the unblock prerequisite
  for the OMN-13330 required-flip. Verify-first reduced the ticket scope: validator-runtime-profiles already
  exists in 4 repos (core/infra/omniclaude/omnimarket) and is required in 0; omnidash and onex_change_control
  have no node contracts declaring runtime_profiles, so adding the gate there is a no-op and was dropped.
  CI-config-only change; no source, contract API, topic schema, or runtime-lane mutation. The branch-protection
  flip is a separate serial additive step after this PR merges and the renamed context runs green on a
  merge_group SHA.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
