    description: >-
      The validator-runtime-profiles workflow job id/name is the unique string "runtime-profiles" (not
      the shared "validate") at the product PR head. Verified by asserting the workflow file declares
      the renamed job and no longer declares a "validate" job.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13330/dod-unique-job-context/command.yaml"
  - id: "dod-required-in-zero"
