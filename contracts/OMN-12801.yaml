---
schema_version: "1.0.0"
ticket_id: OMN-12801
title: "Complete 1B: generation endpoint_url + api_key from routing authority (delete LLM_CODER_URL env)"
summary: >
  node_generation_consumer now resolves endpoint_url + provider + served_model_id + api_key_ref per-model
  from the routing authority (bifrost delegation contract overlay keyed by the contract-declared endpoint_ref),
  mirroring node_delegation_routing_reducer.delta(). The shared LLM_CODER_URL env path (endpoint_env /
  endpoint_mode / complete_endpoint) is deleted: a shared bare env cannot serve multiple providers (vLLM/Gemini/OpenRouter
  have distinct URLs) and 404s on stability-test. Resolution is fail-closed (no silent defaults) and provider-agnostic.
  Completes the Wave 1B endpoint debt left open by OMN-12779 (#1096).
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
evidence_requirements:
