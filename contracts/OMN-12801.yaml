    description: "92 unit tests for node_generation_consumer pass (12 new routing-authority TDD tests)"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12801/dod-unit-tests/command.yaml"
  - kind: "ci"
    description: "Ruff + mypy --strict pass on node_generation_consumer"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12801/dod-lint-typecheck/command.yaml"
