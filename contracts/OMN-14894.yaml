evidence_requirements:
  - kind: "manual"
    description: "omnimarket PR #1861 is open at the recorded OMN-14894 head."
    command: "test -f drift/dod_receipts/OMN-14894/dod-omnimarket-pr-1861-head/command.yaml && grep -Fq
      '4e88a65c4fb5d8c3959a9cdbc14e484f34c6551f' drift/dod_receipts/OMN-14894/dod-omnimarket-pr-1861-head/command.yaml"
