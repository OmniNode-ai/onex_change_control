      drift/dod_receipts/OMN-14894/dod-omnimarket-pr-1861-scope/command.yaml"
  - kind: "manual"
    description: "omnimarket PR #1861 body records fail-closed RLS semantics and local Postgres readback."
    command: "test -f drift/dod_receipts/OMN-14894/dod-omnimarket-pr-1861-verification/command.yaml &&
      grep -Fq '0 rows' drift/dod_receipts/OMN-14894/dod-omnimarket-pr-1861-verification/command.yaml
      && grep -Fq 'cross-tenant INSERT rejected' drift/dod_receipts/OMN-14894/dod-omnimarket-pr-1861-verification/command.yaml"
  - kind: "manual"
    description: "OCC companion PR #4634 carries central OMN-14894 evidence for omnimarket#1861."
    command: "test \"$(gh api repos/OmniNode-ai/onex_change_control/pulls/4634 --jq .head.ref)\" = codex-letter/occ-omn-14894-market1861"
