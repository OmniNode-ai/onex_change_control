title: "Phase 4a: onex skill subcommand + declarative skill->node mapping"
summary: >-
  Add the `onex skill <name> [args]` dispatch surface (omnibase_infra) that the 24 omniclaude dispatch-shim
  migrations build on. The command resolves the skill via the declarative skill_mapping.yaml registry,
  builds the backing node's input payload from the skill's CLI args (written under the state root, never
  /tmp), resolves the node's packaged contract exactly like `onex node`, and dispatches through the proven
  receipt-mode path (run_receipt_mode, OMN-13094) — stdout is exactly one typed ModelSkillResult JSON
  with the FULL handler result. The skill->node mapping is declarative DATA: all 24 shims mapped to their
  backing onex.nodes node + typed result-model FQN (verified against each live handler handle() return
  type) + per-arg payload specs + classifiers; adding a skill is a YAML edit, never CLI code. Typed models
  split one-per-file.
