schema_version: "1.0.0"
ticket_id: "OMN-12568"
title: "ci: validate the versioned runner image on a fresh runner + rollout checklist"
summary: >-
  Acceptance of the OMN-12567 versioned runner image contract. Adds the landable artifacts that let a
  freshly recreated runner be proven against the image binding before broad fleet rollout. omnibase_infra
  PR 1832 adds scripts/ci/validate_runner_image.py, a read-only validator that asserts three things on
  the runner it runs on: image identity (the baked OMNI_RUNNER_IMAGE_IDENTITY matches the lock identity_digest,
  recomputing the full OMN-12567 binding when runner_image_identity.py is present, and failing on drift
  or an unbound image); zero uv sync on the happy path (the prebuilt shared CI env is baked under OMNI_CI_ENV_ROOT
  with a manifest.json ready marker and UV_NO_SYNC=1 holds); and Receipt-Gate readiness (gh, git, jq,
  python3, uv are present). scripts/ci/validate_runner_image.sh wraps the validator and resolves the baked
  identity from the image env or a named container label without entering or recreating the runner. docs/ci/versioned-runner-image-rollout-checklist.md
  is the per-repo migration checklist with the mutating-job opt-outs carried from OMN-12567 plus explicit
  repo/job opt-outs (public fork PRs, hosted-runner-only repos, no-Python-CI repos, writable-global-env
  jobs). tests/ci/test_validate_runner_image.py proves the validator catches identity drift, missing prebuilt
  env, falsy UV_NO_SYNC, and missing Receipt-Gate tooling. Building, publishing, and rolling the image
  to the .201 fleet and recreating a runner are gated live runtime steps the user runs; this contract
  covers only the landable code + checklist.
