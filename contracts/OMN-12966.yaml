title: "P1.2b-A: Infisical availability verification on .201 (probe-first) + community-edition readiness
  gate fix"
summary: >
  Probe-first verification per standing policy: the in-lane Infisical service is disabled by the stability-test/prod
  overlays via infisical.profiles: !override ["...-disabled"], so the de-facto store had been container
  env. Deployed Infisical as an ADDITIVE compose project (own project name omnibase-infra-infisical-stability)
  on the existing stability-test network — no lane container rebuilt or restarted. Verified reachability
  FROM the stability runtime/effect containers and proved a known secret (OMN_12966_PROBE) seeds and resolves
  end-to-end via the machine-identity universal-auth path, including from inside the effects container.
  Fixed a latent bug in the availability tooling: the fresh-provision readiness gate in scripts/provision-infisical.py
  accepted only the enterprise {"status": "ok"} /api/status payload and rejected the community edition's
  {"message": "Ok"}, returning 1 before bootstrap could run; routed it through the existing _is_infisical_ready
  helper (single source of truth) and added a regression suite. No runtime topology, topic schema, or
  contract API changes; no prod mutation; additive-only.
is_seam_ticket: false
