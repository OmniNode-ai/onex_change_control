schema_version: "1.0.0"
ticket_id: "OMN-13152"
title: "feat(omnibase_core): ArtifactStore Phase 1 hardening — retention/quota/redaction/restricted-tier
  read"
summary: >-
  Wave I durable-capture work. Extends the durable-capture ArtifactStore (OMN-13093 minimal slice) in
  place with Phase 1 hardening, all in omnibase_core (stdlib + Pydantic only, no infra deps). Adds: (1)
  retention classes (EnumArtifactRetentionClass: ephemeral/session/ticket/permanent) with a configurable
  per-class default TTL plus explicit per-write TTL override, recorded on the sidecar; (2) quota enforcement
  — max per-write size (max_artifact_bytes) and max total per-scope size (max_scope_bytes, keyed on scope_ref)
  — exceeding either raises ArtifactQuotaExceededError with no silent truncation and no partial write
  (nothing is persisted on reject); (3) redaction state on the sidecar (EnumArtifactRedactionState: raw/redacted/
  restricted/secret_detected) — on secret detection the store refuses the raw write and records an auditable
  secret_detected sidecar with NO blob (ArtifactSecretDetectedError), and a supplied redaction transform
  is applied and records its name with stored bytes content-addressed over the transformed output; (4)
  restricted visibility tier — session_transcript and hook_trace are restricted by default and read()
  gates restricted reads behind ModelArtifactAuthContext; (5) hardened read(artifact_ref, *, auth_context)
  that hash-verifies on every read, enforces the restricted-tier auth gate, supports chunked streaming
  (read_chunks), and raises explicitly on a missing artifact; (6) typed ModelArtifactMetadata sidecar
  (frozen, extra=forbid) replacing the dict sidecar, with read_meta returning the typed model. 76 unit
  tests green; dedicated failing-now-passing tests for hash-mismatch, missing-artifact, quota-exceeded
  (per-write + per-scope), secret_detected (raw write refused, no blob), and restricted-without-auth.
  mypy --strict clean; ruff clean; full-suite collection clean (42267 collected, 0 import errors — the
  read_meta return-type change has no in-repo or cross-repo consumers).
