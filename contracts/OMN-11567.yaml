schema_version: "1.0.0"
ticket_id: "OMN-11567"
title: "Delete confirmed dead omnimarket symbols"
summary: >-
  Bind central OCC evidence for omnimarket PR #758, which removes confirmed zero-importer symbols and
  keeps audited live symbols intact.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
