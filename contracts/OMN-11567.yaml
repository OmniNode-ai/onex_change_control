    description: "omnimarket PR #758 CI and receipt gates pass for dead-symbol cleanup."
    command: "gh pr checks 758 --repo OmniNode-ai/omnimarket"
  - kind: "manual"
    description: "Central OCC evidence PR carries this contract and PASS receipts."
    command: "gh pr view <occ-pr> --repo OmniNode-ai/onex_change_control"
dod_evidence:
  - id: "dod-omnimarket-pr-758"
    description: "Bind OMN-11567 evidence to omnimarket PR #758 at the observed PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11567/dod-omnimarket-pr-758/command.yaml\"
          && grep -q '^pr_number: 758$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11567/dod-omnimarket-pr-758/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "Dead-symbol cleanup touches runtime paths but requires no live deploy before merge."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11567/dod-deploy-assessment/command.yaml\"
          && grep -q 'No live deploy' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11567/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr-self"
    description: "Bind OMN-11567 central evidence to the OCC PR that carries this bundle."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11567/dod-occ-pr-self/command.yaml\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
