---
schema_version: "1.0.0"
ticket_id: OMN-13993
title: "fix(skill_functional_audit): resolve skill roots via OMNI_HOME so the audit runs from the infra
  venv"
summary: >
  Makes node_skill_functional_audit_compute runnable from the canonical infra venv. HandlerSkillFunctionalAuditCompute._resolve_skill_roots
  derived the default skill roots from _REPO_ROOT = Path(__file__).resolve().parents[5]. When omnimarket
  is installed into the infra venv, _REPO_ROOT is the site-packages install dir, so the default pointed
  at a <venv>/.../plugins/onex/skills path that never exists; the audit discovered zero skills and hard-failed
  with SkillFunctionalAuditNoSkillsDiscoveredError. The real skills live in the sibling omniclaude clone.
  The fix mirrors the existing _resolve_nodes_roots walk: resolve the canonical skill libraries via the
  $OMNI_HOME sibling-repo layout so resolution works even when _REPO_ROOT is a site-packages install dir.
  Fail-fast (CLAUDE.md rule #8) is preserved: _resolve_omni_home returns $OMNI_HOME when set, else the
  canonical-clone anchor only when it actually contains a sibling omniclaude clone, else None — never
  a guessed path; when nothing resolves, _audit_skills still raises the zero-skills hard fail rather than
  a vacuous pass. The change is one-file surgical (the node handler) plus behavioral tests.
is_seam_ticket: false
interface_change: false
evidence_requirements:
  - kind: "tests"
    description: "skill-root resolution via OMNI_HOME + fail-fast tests pass for the audit handler"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13993/dod-resolve-skill-roots/command.yaml"
  - kind: "ci"
    description: "ruff, mypy --strict, and pytest pass on the changed handler and its test"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13993/dod-lint-typecheck/command.yaml"
