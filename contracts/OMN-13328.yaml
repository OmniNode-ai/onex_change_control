    description: >-
      The receipt-honesty workflow job id and name are the unique string "receipt-honesty" (not the shared
      "validate"). Verified by asserting the workflow file at the product PR head declares the renamed
      job and no longer declares a "validate" job.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13328/dod-unique-job-context/command.yaml"
  - id: "dod-collision-evidence"
    description: >-
      The "validate" collision is real: a single core dev HEAD SHA carries multiple "validate" check-runs
