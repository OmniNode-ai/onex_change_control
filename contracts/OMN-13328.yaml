---
schema_version: "1.0.0"
ticket_id: "OMN-13328"
title: "ci(OMN-13328): give core receipt-honesty a unique job id so it can be a required status check"
summary: >-
  OCC evidence for the omnibase_core CI-config PR (#1333) that renames the receipt-honesty workflow's
  job id/name from "validate" to "receipt-honesty". GitHub surfaces a check-run context as the bare job
  name, and "validate" is shared by 14 unrelated core validator workflows (confirmed 11x "validate" check-runs
  on a single core dev HEAD SHA), so the receipt-honesty context could not be made a required status check
  without forcing all 14 jobs. The rename yields a unique, safely-requirable check-run context ("receipt-honesty"),
  closing the core blocker recorded on OMN-13328 (the 3 other receipt- producing repos — omnibase_infra,
  omniclaude, omnimarket — were already flipped). CI-config-only change; no source, contract API, topic
  schema, or runtime-lane mutation. The branch-protection flip (adding "receipt-honesty" to required_status_checks
  on core dev) is a separate serial additive step that can only run after this PR merges and the renamed
  context runs green on a merge_group SHA.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
