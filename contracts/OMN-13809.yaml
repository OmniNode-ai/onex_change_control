schema_version: "1.0.0"
ticket_id: "OMN-13809"
title: "fix(OMN-13809): keep bus forwarder dormant on lanes with no cloud gateway leg"
summary: >
  node_bus_forwarder_effect declares event_bus.subscribe_topics including onex.cmd.omnibase-infra.delegation-inference-request.v1,
  whose real payload is omnibase_core.models.delegation.wire.ModelInferenceIntent. The runtime auto-discovers
  the contract and wires a subscription that dispatches to the forwarder handlers, which coerce the payload
  to ModelGatewayEnvelope (frozen, extra=forbid, tenant fields required), raising a ValidationError on
  every delegation message. ModelGatewayEnvelope is never constructed outside tests, ServiceGatewayForwarder
  is never instantiated in src/, and the gateway.cloud.kafka.* refs exist only inside the forwarder contract:
  no lane provisions a cloud gateway leg. Fix (Option 1): contract discovery detects a declared cloud
  gateway leg (config.gateway_forwarder.cloud_leg) and skips such contracts unless ONEX_GATEWAY_CLOUD_MIRRORING_ENABLED
  is truthy (fail-safe default OFF), keeping the forwarder dormant on all current lanes so it can no longer
  ValidationError on domain traffic.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
