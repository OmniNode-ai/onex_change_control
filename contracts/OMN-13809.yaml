  - kind: "tests"
    description: >
      omnibase_infra auto-wiring discovery suite passes, including the new regression test asserting the
      bus forwarder is skipped by contract discovery on a no-cloud-leg lane and wired only when cloud
      mirroring is enabled.
    command: "cd omnibase_infra && uv run pytest tests/unit/runtime/auto_wiring/ -q"
