---
ticket_id: "OMN-14590"
title: "Wire drift validators into CI Summary"
summary: >-
  Central OCC evidence for omnimarket PR #1756. The product PR wires event-registry-drift, topic-drift-check,
  and topic-enum-drift into the required CI Summary path so those merge gates cannot fail outside the
  required status surface.
dod_evidence:
  - id: "dod-omnimarket-pr-1756-product-head-9bee22"
    description: >-
      Product-observing verification for omnimarket PR #1756 at head 9bee228db0ab7ef9e51af593421eed7d4b690221.
      Verifies the PR still targets dev, has the expected OMN-14590 title, and changes only the CI workflow.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1756; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=9bee228db0ab7ef9e51af593421eed7d4b690221;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title
          --jq '.headRefOid == "'$PRODUCT_HEAD'" and .baseRefName == "dev" and (.title | contains("OMN-14590"))
          and ((.files | map(.path)) == [".github/workflows/ci.yml"])' | grep -qx true
  - id: "dod-omnimarket-pr-1756-workflow-wiring-9bee22"
    description: >-
      Workflow-content verification for omnimarket PR #1756 at head 9bee228db0ab7ef9e51af593421eed7d4b690221.
      Verifies CI Summary declares and strictly checks event-registry-drift, topic-drift-check, and topic-enum-drift
      in .github/workflows/ci.yml at the product head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=9bee228db0ab7ef9e51af593421eed7d4b690221;
          d="$(mktemp -d)" && gh api "repos/${PRODUCT_REPO}/contents/.github/workflows/ci.yml?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/ci.yml" && grep -Fq 'event-registry-drift, topic-drift-check,
          topic-enum-drift]' "$d/ci.yml" && grep -Fq '"event-registry-drift=${{ needs.event-registry-drift.result
          }}"' "$d/ci.yml" && grep -Fq '"topic-drift-check=${{ needs.topic-drift-check.result }}"' "$d/ci.yml"
          && grep -Fq '"topic-enum-drift=${{ needs.topic-enum-drift.result }}"' "$d/ci.yml"
  - id: "dod-omnimarket-pr-1756-local-verification-9bee22"
    description: >-
      Local-verification evidence recorded in the omnimarket PR #1756 body. The proof verifies that the
      PR body still records successful validator probes, workflow parsing, actionlint, module-ref check,
      and pre-commit evidence while binding that evidence to the live PR head.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1756; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=9bee228db0ab7ef9e51af593421eed7d4b690221;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,body --jq '.headRefOid
          == "'$PRODUCT_HEAD'" and (.body | contains("topic-drift-check")) and (.body | contains("topic-enum-drift"))
          and (.body | contains("event-registry-drift")) and (.body | contains("actionlint .github/workflows/ci.yml"))
          and (.body | contains("check_workflow_module_refs.py")) and (.body | contains("pre-commit run
          --files .github/workflows/ci.yml"))' | grep -qx true
  - id: "dod-omnimarket-pr-1756-deploy-scope-9bee22"
    description: >-
      Deploy-surface audit for omnimarket PR #1756. The product diff changes only a GitHub Actions CI
      workflow and introduces no runtime deploy, Docker, compose, migration, or systemd surface.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1756; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=9bee228db0ab7ef9e51af593421eed7d4b690221;
          gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,files --jq '.headRefOid
          == "'$PRODUCT_HEAD'" and ((.files | map(.path)) == [".github/workflows/ci.yml"])' | grep -qx
          true && ! gh pr diff "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --name-only | grep -qE '(^|/)(Dockerfile|docker-compose[^/]*|compose[^/]*|deploy|migrations|systemd)(/|$)'
