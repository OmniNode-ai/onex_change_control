schema_version: "1.0.0"
ticket_id: "OMN-12999"
title: "[SEA-PERF] /projection/{topic} unbounded heavy-payload response makes Event Bus / SEA tiles show
  '—' for ~10-28s"
summary: >-
  The Event Bus / SEA dashboard tiles render '—' for ~10-28s while the SEA node-generation-completed projection
  serializes its full unbounded ~419KB payload. Measure-first against the live stability-test projection
  API (:13002, 2026-06-11, read-only): the DB is NOT the cost driver — EXPLAIN (ANALYZE, BUFFERS) of the
  panel's SQL on generation_events (169 rows / 408KB, omnidash_analytics) is sub-ms (ORDER BY created_at
  DESC LIMIT 500 = 0.22ms; MAX(created_at) freshness aggregate = 0.10ms; bounded LIMIT 20 = 0.265ms).
  The latency is server-side JSON serialization of the full unbounded payload (all 20 columns incl contract_yaml/handler_source)
  under a max_size=5 asyncpg pool that three panels poll every 5s; the ?correlation_id-filtered single-row
  path returns in 14ms every time. Bounding rows is the lever: full row payload = 249KB vs LIMIT 20 =
  25KB (~10x). Two coordinated fixes: (a) omnimarket projection API adds generic, contract-respecting
  limit/order query params to /projection/{topic} (limit clamps to the contract ceiling; order toggles
  only the direction of the contract-declared order_by column — no arbitrary column injection); (b) omnidash
  SEA/EventBus tiles request the bounded latest-50 window they actually render. No topic schema, envelope-breaking,
  or contract API change; additive query params plus a bounded caller. The API half is deploy-pending
  and reaches the live image only via the normal post-merge batched stability rebuild.
