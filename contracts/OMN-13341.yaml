schema_version: "1.0.0"
ticket_id: "OMN-13341"
title: "R6: Probe-method / verification-doctrine standard — verify origin/dev + live projection, never
  local clones or ticket text"
summary: >-
  Retro enforcement R6 (audit docs/audits/2026-06-19-ratchet-enforcement-audit.md, parent OMN-13325).
  Probes verified against local canonical clones, ticket text, or statusCheckRollup — all of which drift
  from live truth (proven three times this session: a stale clone gave a false node NOT_FOUND; a stale
  ticket said "escalation never fires" when the projection showed it does; statusCheckRollup showed FAILURE
  after passing reruns). This ticket ships, on omniclaude, a verification-doctrine standard plus an enforcing
  lint. docs/standards/VERIFICATION_DOCTRINE.md codifies the authoritative truth surfaces (origin/dev
  for existence, the live materialized projection for runtime/data state, gh pr checks for PR verdicts,
  branch protection for required-gate claims), the non-authoritative surfaces and their failure modes,
  six rules, a copy-paste command reference, and the enforcement section. scripts/lint_verification_evidence.py
  is a blocking lint that flags worker prompts / receipts / handoff & evidence docs citing a local-clone
  path, ticket text, or a statusCheckRollup verdict AS proof of state; it is phrase-anchored so documenting
  the failure mode or fetching the raw --json statusCheckRollup field does not trip it (the matcher was
  narrowed after an initial version flagged 10 legitimate field-access lines — fixed per CLAUDE.md Rule
  #10, no allowlist). Suppression: # verification-evidence-ok: <reason>. It is wired as a CI workflow
  (.github/workflows/verification-evidence-lint.yml — the Verification Evidence Lint check on pull_request
  + push + merge_group) and as a pre-commit hook (lint-verification-evidence). The doctrine is linked
  from CLAUDE.md (a Standalone-Lint-Gates row + a Verification Doctrine subsection). 31 unit tests plus
  a 14-case --self-test. Child of OMN-13325 (ratchet enforcement retro). Promoting the new check to a
  REQUIRED status check on dev branch protection is an additive branch-protection mutation deliberately
  left to a user-gated step, not performed in the code PR.
is_seam_ticket: false
