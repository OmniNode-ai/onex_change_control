    description: "omnibase_infra PR #1630 carries the OMN-11143 signer change."
    command: "gh pr view 1630 --repo OmniNode-ai/omnibase_infra --json state,headRefOid"
  - kind: "tests"
    description: "Focused signer tests, lint, and mypy pass locally."
    command: "PYTHONPATH=${OMNIBASE_CORE_SRC:?set OMNIBASE_CORE_SRC}:$PWD/src uv run pytest tests/unit/gate/test_signer.py
      -q && uv run ruff check src/omnibase_infra/gate/signer.py tests/unit/gate/test_signer.py && PYTHONPATH=${OMNIBASE_CORE_SRC:?set
      OMNIBASE_CORE_SRC}:$PWD/src uv run mypy src/omnibase_infra/gate/signer.py"
