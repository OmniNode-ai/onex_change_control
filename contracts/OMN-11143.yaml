    description: "No runtime deploy is required before merge for a new library signer."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11143/dod-deploy-assessment/command.yaml"
  - kind: "manual"
    description: "OCC PR #1083 carries the central OMN-11143 contract and receipts."
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11143/dod-occ-pr-1083/command.yaml"
