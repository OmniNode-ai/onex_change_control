schema_version: "1.0.0"
ticket_id: "OMN-12829"
title: "C1 — generation contract-validation-failure escalation through the routing authority"
summary: >-
  On contract-validation failure in omnimarket node_generation_consumer WITH attempts remaining, the generation
  consumer calls the ROUTING AUTHORITY (node_delegation_routing_reducer.delta) with escalation context
  — the task class drives task_class_contracts.escalation_policy.tier_order — and emits onex.evt.omnimarket.delegation-escalation-triggered.v1.
  The per-tier retry budget (max_retries) is integrated from routing_tiers.yaml via the new authority
  accessor tier_max_retries. The architecture boundary is preserved: escalation authority stays owned
  by routing; the generation consumer never selects the next model itself. The escalation proof records
  tier, provider, model, endpoint, attempt_count, escalation_reason.
is_seam_ticket: false
interface_change: true
# Surfaces (enum): a new event model + topic (delegation-escalation-triggered.v1
# now also produced by node_generation_consumer) and new public routing-authority
# accessors (tier_max_retries / tier_for_backend).
