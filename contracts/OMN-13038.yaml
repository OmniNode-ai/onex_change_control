ticket_id: "OMN-13038"
title: "node_context_roi_runner FIFTH defect: failed-terminal routing — generation consumer emits contract_passed=False
  terminals to node-generation-failed.v1, runner only subscribes node-generation-completed.v1"
summary: >-
  FIFTH distinct defect on node_context_roi_runner, sibling to the OMN-13003 -> OMN-13005 -> OMN-13010
  -> OMN-13012 ladder. With the two-phase subscribe-before-publish session (OMN-13012: omnimarket #1185,
  omnibase_infra #1951/#1954) on dev, the runner reliably catches COMPLETED terminals — but generation
  FAILURES never reach it. node_generation_consumer._emit_benchmark routes contract_passed=False benchmarks
  to onex.evt.omnimarket.node-generation-failed.v1 (handler_generation_consumer.py lines 947-948 on dev
  tip dcd3ead5), while the runner contract declared only generation_pipeline.terminal_event_topic (completed)
  and _run_trial opened exactly one terminal session on it. A failed terminal — emitted with full telemetry
  (attempt_count, tokens, model/provider, contract_passed=False) — was never delivered: the runner blocked
  the full per-arm timeout (120s) and recorded failure_stage=GENERATION / attempt_count=0, indistinguishable
  from generation never running. OFF-arm failures are the context-ROI experiment's signal, so every such
  row was corrupted (P5 pre-battery blocker, 2026-06-11 night plan). Fix (consume-side only; emitter and
  its contract untouched because failed.v1 has zero other subscribers and probe4 abort diagnostics rely
  on its high-watermark): omnimarket PR #1187 declares generation_pipeline.terminal_failed_event_topic
  on the runner contract, opens one two-phase session per terminal topic BEFORE publishing, and races
  the correlated waits across both topics within the single per-arm timeout; first correlated terminal
  wins; all sessions closed on the way out; legacy single-call consumers raced per-topic the same way.
  _extract_row already maps contract_passed=False to failure_stage=VALIDATION with the real attempt_count.
  Proven RED-then-GREEN via tests/nodes/node_context_roi_runner/test_failed_terminal_routing.py (10 RED
  on dev tip, GREEN after; drives handle/handle_async, the entry points the runtime uses).
