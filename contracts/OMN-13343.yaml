ticket_id: "OMN-13343"
title: "fix(omnimarket): refresh delegation cloud-glm pin glm-4.5 -> glm-5.2"
summary: >-
  The delegation routing authority config (src/omnimarket/configs/bifrost_delegation.yaml) pinned the
  cheap_cloud GLM backend (cloud-glm, endpoint https://api.z.ai/api/coding/paas/v4/chat/completions) to
  the stale model_name glm-4.5. The current z.ai GLM Coding Plan flagship is glm-5.2 ("AI Coding Powered
  by GLM-5.2 & GLM-5-Turbo"). This config-only change refreshes cloud-glm model_name glm-4.5 -> glm-5.2,
  bumps config_version 2.1.0 -> 2.2.0 (routing-authority provenance, OMN-10637 R1), and refreshes the
  two adjacent OMN-13170 / OMN-13161 comments that named GLM-4.5 so the config stays self-consistent.
  The exact served id was verified by a live 1-token probe of the cloud-glm endpoint with the LLM_GLM_API_KEY
  secret (no hardcoded key): glm-5.2 is ACCEPTED (response echoes model=glm-5.2) and glm-5 is an alias
  that resolves to glm-5.2 — a wrong id fails closed, so the exact verified id is pinned. secret_ref stays
  llm.glm.api_key, timeout_ms (300000) and max_tokens (65536) are unchanged because the z.ai GLM coding
  endpoint serves the same 128k context window / 64k output budget for glm-5.2. cloud-glm was the only
  stale pin in the tier-pin audit (cloud-sonnet, cloud-haiku, cloud-gemini-flash, and the local Qwen3.6
  self-hosted names are all current). No escalation-ladder edit is needed: on dev the research/test/ code_generation/agent_delegation
  classes already list claude in tier_order and the research ceiling is already 0.015 (OMN-13215/13170/13161
  landed after the running stability-test image was built), so the no_higher_tier_available behavior the
  live prober saw is a stale-deployed-build artifact, resolved by the next normal dev->promotion->image
  rebuild, not a config defect. Child of OMN-12646 (Delegation, SEA & Model-Routing Quality).
