schema_version: "1.0.0"
ticket_id: "OMN-14224"
title: "fix(OMN-14224): fail-closed to local for undeclared delegation task classes"
summary: >-
  omnimarket PR #1662 hardens the delegation tier-eligibility gate so an undeclared task class (one with
  no task_class_contracts entry) can route ONLY to the local ($0) tiers, never to a paid or cloud tier.
  Previously the helper _tier_allowed_by_contract(tier, entry=None) FAILED OPEN — it returned True for
  every tier as "graceful degradation", so an accepted-but-undeclared class had no acceptance authority
  yet could silently escalate straight into the PAID cloud tier (the OMN-14218/refactor class of bug).
  The one-line change replaces `return True` with `return tier.name in _LOCAL_TIERS` on the entry-is-None
  branch, i.e. fail CLOSED to local. This is a pure guardrail: post-OMN-14218/OMN-14220 every accepted
  delegation task class is declared in task_class_contracts.v1.yaml (15 classes), so the entry-is-None
  branch is unreachable by any currently accepted class and NO current routing path changes behavior —
  it only constrains a hypothetical future accepted-but-undeclared class. An independent verifier (separate
  from the implementing agent) reproduced the guardrail at the unit level (undeclared class -> local-only,
  every paid/cloud tier disallowed), the inverse control (a declared class still routes to paid normally,
  so declared classes are not over-restricted), and proved the two unrelated pre-existing test failures
  reproduce identically on the pre-PR base commit.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
