summary: "OCC evidence companion for OmniNode-ai/omnimarket#1741 (OMN-14532). node_projection_mcp_tools.HandlerProjectionMcpTools.project()
  reads description/model_id from event.contract_metadata, but neither real producer (node_generation_consumer._emit_registration,
  node_contract_registry's success path) ever populated that field, so every mcp_tools row had description=\"\"
  and model_id=\"\" forever — user-visible on the omnidash MCP-tools widget. Fix: both producers now send
  contract_metadata with the real data they already have in scope (generation_consumer: task_description
  + model_id from the benchmark; contract_registry: description from the parsed contract). Second bug:
  an `if event.status in (\"rejected\",): status = REJECTED` branch in project() was permanently dead
  code — node_contract_registry's reject path never sets mcp_eligible=True and publishes to a different
  topic this node doesn't subscribe to, and node_generation_consumer never sends a status field valued
  \"rejected\" at all; any event reaching this line already passed the mcp_eligible gate above it, so
  it can never be a real rejection. Removed the branch. A new cross-boundary test drives node_generation_consumer's
  real _emit_registration wire payload through ModelMcpToolRegistrationEvent + project(); RED-verified
  via git stash (description=\"\" against the pre-fix producer)."
