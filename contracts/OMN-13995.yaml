---
schema_version: "1.0.0"
ticket_id: OMN-13995
title: "fix(cli): register dep_cascade_dedup skill so it resolves instead of Unknown node"
summary: >
  Makes `onex skill dep_cascade_dedup` runnable headless from the canonical infra venv. The backing node
  node_dep_cascade_dedup_orchestrator is registered in the omnimarket onex.nodes catalog and both ModelDepCascadeDedupRequest
  and ModelDepCascadeDedupResult exist, but the CLI skill registry was missing the skill_mapping.yaml
  row, so `onex skill dep_cascade_dedup` hard-failed with "Unknown skill 'dep_cascade_dedup'" and the
  post-release dep-bump dedup sweep was unrunnable. Same regression class as OMN-13511 / OMN-13712 (node
  exists, skill unmapped). The fix is one declarative, additive row in src/omnibase_infra/cli/skill_mapping.yaml
  (mirrors the merge_sweep entry shape); args mirror ModelDepCascadeDedupRequest (repos string_list, dependency-type,
  label, close-comment, dry-run default false). No org-wide defaults flipped, no other skill touched.
  Fail-fast (CLAUDE.md rule #8) is preserved: the sweep-repo-fallback paths still raise RuntimeError when
  ONEX_CC_REPO_PATH is unset and no explicit root is supplied, never a silent default.
is_seam_ticket: false
interface_change: false
evidence_requirements:
  - kind: "tests"
    description: "dep_cascade_dedup registered+wired, payload validates against ModelDepCascadeDedupRequest,
      dry-run default, node-backed catalog gate, and sweep-repo fail-fast — all pass"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13995/dod-skill-resolution/command.yaml"
  - kind: "ci"
    description: "ruff check clean and pre-commit hooks pass on the changed skill_mapping.yaml and tests"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13995/dod-lint-typecheck/command.yaml"
  - kind: "manual"
    description: "omnibase_infra PR #2215 carries the OMN-13995 skill_mapping registration"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13995/dod-infra-pr-2215/command.yaml"
  - kind: "manual"
    description: "onex_change_control PR #3633 carries this OMN-13995 contract and receipt set"
    command: "grep -q '^status: PASS$' drift/dod_receipts/OMN-13995/dod-occ-pr-3633/command.yaml"
