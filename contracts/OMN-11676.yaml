---
schema_version: "1.0.0"
ticket_id: "OMN-11676"
title: "Add node_chain_diff compute node"
summary: >-
  Bind central OCC evidence for omnimarket PR #752, which adds the pure node_chain_diff compute node and
  declares its terminal event consumption contract.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
evidence_requirements:
  - kind: "tests"
    description: "omnimarket PR #752 node_chain_diff tests and dependency health gate pass in CI."
    command: "gh pr checks 752 --repo OmniNode-ai/omnimarket"
  - kind: "manual"
    description: "Deploy-gate assessment confirms the runtime node addition needs post-merge validation,
      not live pre-merge deployment."
    command: "deploy assessment: verify node contract, dep-health delta, and rerun downstream deploy gate
      after OCC merge"
dod_evidence:
  - id: "dod-omnimarket-pr-752"
    description: "Bind OMN-11676 evidence to omnimarket PR #752 at the observed PR head."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-omnimarket-pr-752/command.yaml\"
          && grep -q '^pr_number: 752$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-omnimarket-pr-752/command.yaml\"
          && grep -q '^commit_sha: \"7f26f1c784abfd0868070e8b971ffad5194961c8\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-omnimarket-pr-752/command.yaml\""
  - id: "dod-deploy-assessment"
    description: "Record deploy-gate assessment for the runtime node_chain_diff addition."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-deploy-assessment/command.yaml\"
          && grep -qi 'deploy' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-deploy-assessment/command.yaml\"
          && grep -q '^pr_number: 752$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-deploy-assessment/command.yaml\""
  - id: "dod-occ-pr-self"
    description: "Bind OMN-11676 central evidence to the OCC PR that carries this bundle."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-occ-pr-self/command.yaml\"
          && grep -q '^ticket_id: \"OMN-11676\"$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-occ-pr-self/command.yaml\"
          && grep -q '^pr_number: 1362$' \"$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11676/dod-occ-pr-self/command.yaml\""
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
