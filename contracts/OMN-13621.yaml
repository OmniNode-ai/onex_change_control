---
schema_version: "1.0.0"
ticket_id: "OMN-13621"
title: "WS-C Phase 5.2: Route usage_normalizer.py + pricing to canonical omnimarket cost surface"
summary: >
  Wave-1 of the SEA -> canonical migration (epic OMN-13604). Routes the SEA hackathon repo's token-usage
  normalization + per-model pricing into a canonical, contract-sourced omnimarket cost surface (omnimarket.cost:
  usage_normalizer.py, cost_pricing.py + cost_pricing.yaml), and wires generation cost to it. The generation
  consumer's hardcoded Gemini per-token constants are removed; _calculate_cost now resolves the priced
  entry for (provider, model_id) from the cost_pricing.yaml contract and prices the measured tokens through
  it (local/zero-marginal -> 0.0; cloud -> contract rate; unknown -> explicit UNKNOWN -> 0.0, fail-soft).
  The resulting cost_inference_usd flows via the node-generation-completed.v1 terminal -> node_projection_delegation
  -> generation_events.cost_inference_usd, queryable at GET /projection/onex.evt.omnimarket.node-generation-completed.v1
  -- the OMN-13408 delegation-cost projection-write pattern extended to generation cost. SEA src/pipeline/usage_normalizer.py
  is DELETED after parity (no shim; folded into SEA models.py, which has no omnimarket dependency). Architecture:
  pricing sourced from the YAML contract, not hardcoded; canonical EnumUsageSource / EnumCostBasis enums
  reused (not redeclared); strongly typed frozen models. No topic schema, envelope, or contract-API change;
  no live-lane mutation.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD: 29 failing tests in tests/unit/cost/ written before the modules existed, then made to pass.
      Coverage: normalization-mapping parity (openai-compat / gemini-native / char-length estimate / unknown
      / negative + bool token rejection), contract-sourced pricing (load / validate / lookup / calculate
      / deterministic hash), and the DoD acceptance proof that a contract-priced generation cost lands
      in the generation_events projection row (cost_inference_usd > 0, equal to the contract price).
    command: "uv run pytest tests/unit/cost/ -q"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
