---
schema_version: "1.0.0"
ticket_id: "OMN-13008"
title: "Automated worktree GC + .201 docker/disk GC + disk watermark alert ratchet"
summary: >
  Build the automation requested after the 2026-06-11 incident: /data on .201 hit ~95% (weeks of unpruned
  docker images + accumulated stale worktrees) and killed all three runtime lanes mid-demo. Conservative,
  keep-list-driven .201 disk maintenance shipped as systemd USER timer units (NOT lane containers) plus
  dry-run-tested GC scripts in omnibase_infra. Three surfaces: (1) merge-triggered worktree GC that drives
  the canonical omniclaude/scripts/prune-worktrees.sh safety logic (remove only if PR MERGED / branch
  gone AND clean AND fully pushed) on both Mac (merge-sweep tick) and .201 (systemd timer against /data/omninode/omni_worktrees);
  (2) conservative docker/disk GC (scripts/disk-gc.sh + pure disk_gc_plan.py) honoring a VERSIONED keep-list
  (deploy/disk-gc/keep-list.yaml): never reaps a kept repo, kept tag, in-use image, or anything younger
  than min_age_days, keeping the newest N superseded generations as rollback targets; (3) a df watermark
  ratchet (disk-watermark-check.sh + disk_watermark_event.py): >=85% emits a typed onex.evt.infra.disk-watermark.v1
  warning event that the sweep auto-ticket path turns into a Linear ticket, >=90% emits critical (the
  loud event), broker addr fail-fast from KAFKA_BOOTSTRAP_SERVERS (no localhost default). 20 unit tests
  incl. plan-safety invariants and a dry-run proof that default mode issues no destructive op.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      omnibase_infra: tests/unit/scripts/test_disk_gc_plan.py (10) + test_disk_gc_dry_run.py (6) + test_disk_watermark_event.py
      (4) = 20 passed. Pure planner never reaps kept repo/tag/in-use/too-young; dry-run mode issues no
      destructive docker/git/rpk op; typed watermark event with stable dedupe key. mypy --strict clean
      on both Python modules; ruff + shellcheck + pre-commit clean.
    command: "uv run pytest tests/unit/scripts/test_disk_gc_plan.py tests/unit/scripts/test_disk_gc_dry_run.py
      tests/unit/scripts/test_disk_watermark_event.py -q"
