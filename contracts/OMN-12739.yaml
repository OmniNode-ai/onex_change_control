      npm run build && npm run lint && npm run test:run -- src/pages/DashboardView.test.tsx src/services/dashboardService.test.ts
      src/components/frame/Sidebar.test.tsx src/components/dashboard/delegation-control-plane src/components/dashboard/delegation
  - kind: "ci"
    description: "omnidash PR #171 is merged to dev with required GitHub checks passing."
    command: "gh pr view 171 --repo OmniNode-ai/omnidash --json state,mergeCommit,statusCheckRollup"
