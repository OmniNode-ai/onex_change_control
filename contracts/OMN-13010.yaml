ticket_id: "OMN-13010"
title: "node_context_roi_runner: synchronous blocking handle() pins the dispatch loop and starves the
  co-resident generation consumer — degenerate rows persist after OMN-13005"
summary: >-
  THIRD distinct defect on node_context_roi_runner, exposed only after the OMN-13005 consume-leg patch
  made the injected event_consumer actually block-and-correlate. OMN-13003 fixed the dispatch INPUT (envelope
  -> typed model); OMN-13005 fixed the consume leg (no-op consumer -> blocking correlate). Both are live
  and necessary. But probe2 (run_id=20260611T2000Z-probe2, 20:54-20:58Z) STILL produced degenerate rows
  (failure_stage=generation, attempt_count=0, empty model_id/provider) for a different reason: dispatch-loop
  starvation. Owning surface: omnimarket runner handler src/omnimarket/nodes/node_context_roi_runner/handlers/handler_context_roi_runner.py.
  Its handle() is synchronous and serial (publish then block on self._consumer(...) up to generation_timeout_seconds
  per arm, 240s total). The omnibase_infra runtime auto-wiring dispatch callback (_make_dispatch_callback)
  invokes a synchronous handle() DIRECTLY on the single effects-container event loop (contrast the projection-runner
  path which offloads via asyncio.to_thread). The runner's 240s blocking handle() therefore pins the loop,
  starving every co-resident consumer group's poll/heartbeat -- including node_generation_consumer, the
  consumer that must produce the terminal the runner awaits. Broker-verified: probe2's two generation
  command cids (da5985b5-9817-42e7-887b-f19f4eb62319 golden_exemplar; 28e05684-32ae-4d23-8627-ff98d9255340
  off) produced NON-degenerate node-generation-completed.v1 terminals (provider=local, Qwen3.6-35B-A3B,
  contract_passed=true) at envelope_timestamp 2026-06-11T20:58:44.730Z and 20:58:45.676Z -- AFTER both
  runner 120s windows had closed (no terminal event received at 20:56:39 and 20:58:39). Effects-log at
  20:58:40 shows EVERY consumer group hitting [Error 25] UnknownMemberIdError and rebalancing -- mass
  session-timeout from the pinned loop. node-generation-failed.v1 HW=0 across all partitions (no failures).
  This is the feedback_real_dispatch_path_tests blind spot once more: handler-isolation tests inject a
  returning consumer and never exercise the dispatch-loop pinning. omnimarket PR #1184 adds handle_async
  (which the dispatch callback prefers, handler_wiring._make_dispatch_callback) that runs the synchronous
  blocking handle() via asyncio.to_thread, freeing the dispatch loop for the full duration of the runner's
  blocking waits so generation runs concurrently and its terminal arrives inside the window. No topic,
  envelope, or contract API change.
