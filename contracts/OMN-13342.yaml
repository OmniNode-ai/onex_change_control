schema_version: "1.0.0"
ticket_id: "OMN-13342"
title: "fix(omnimarket): thread contract-declared backend max_tokens into SEA/generation inference request"
summary: >-
  The SEA/generation inference path in node_generation_consumer built ModelLlmInferenceRequest with no
  max_tokens kwarg, so the infra inference effect omitted max_tokens on the wire and z.ai glm-4.5 truncated
  output at its small server-side default (finish_reason=length, quality-gate score 0.0). The bifrost
  backend cloud-glm declares max_tokens 65536, but resolve_generation_endpoint read the backend through
  _ResolvedBackend / ModelResolvedEndpoint which had no max_tokens field, so the contract-declared ceiling
  was read then discarded. This fix adds max_tokens to both models, threads backend.max_tokens through
  _resolve_bifrost_backend and resolve_generation_endpoint (fail-closed >= 1, no silent default in handler
  code), and passes max_tokens=resolved.max_tokens into the ModelLlmInferenceRequest construction so the
  effect posts the contract ceiling on the wire. Regression tests assert the resolved endpoint carries
  the contract-declared backend ceiling (explicit non-default value and the production cloud-glm 65536)
  and fails closed on a non-positive ceiling. Child of OMN-12646 (Delegation, SEA & Model-Routing Quality).
