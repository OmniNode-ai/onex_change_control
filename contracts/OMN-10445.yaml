---
schema_version: "1.0.0"
ticket_id: "OMN-10445"
title: "Runtime Stability Reconciliation -- capture .201 patches, fix wiring crash, deploy unified image"
summary: "Stabilize runtime package activation and intelligence/quality node auto-wiring across omnibase_infra
  and omnimarket, with deploy validation held for an explicit approved runtime window."
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
  - "topics"
evidence_requirements:
  - kind: "tests"
    description: "omnimarket intelligence and quality node runtime contracts and golden-chain coverage
      pass"
    command: "cd omni_worktrees/OMN-10445/omnimarket && uv run pytest tests/test_node_intelligence_orchestrator_contract.py
      tests/test_node_quality_scoring_contract.py tests/nodes/node_intelligence_orchestrator/test_contract_runtime_readiness.py
      tests/test_intelligence_node_dependency_scope.py tests/nodes/node_intent_event_consumer_effect/test_golden_chain_intent_event_consumer_effect.py
      -q"
  - kind: "tests"
    description: "omnibase_infra runtime package activation, env parity, and auto-wiring coverage pass"
    command: "cd omni_worktrees/OMN-10445/omnibase_infra && uv run pytest tests/ci/test_env_parity.py
      tests/ci/test_plugin_env_service_completeness.py tests/unit/runtime/auto_wiring/test_wiring.py tests/unit/runtime/auto_wiring/test_handler_wiring_event_type_alias.py
      -q"
  - kind: "tests"
    description: "omnibase_infra sibling omninode_infra parity checks pass with explicit OMNINODE_INFRA_DIR"
    command: "cd omni_worktrees/OMN-10445/omnibase_infra && OMNINODE_INFRA_DIR=/Users/jonah/Code/omni_home/omninode_infra
      uv run pytest tests/ci/test_env_parity.py tests/ci/test_plugin_env_service_completeness.py -q"
  - kind: "tests"
    description: "omnimarket PR review bot report poster is runtime-wirable for PR #515"
    command: "cd omni_worktrees/OMN-10445/omnimarket-pr-review-bot-runtime-wiring && uv run pytest tests/nodes/node_pr_review_bot/test_workflow_runner_wiring.py
      tests/nodes/node_pr_review_bot/test_workflow_runner_concrete_wiring.py -q"
  - kind: "tests"
    description: "OCC receipt evidence for PR #515 is locally eligible before opening central evidence
      PR #665"
    command: "PYTHONPATH=src uv run python -m omnibase_core.validation.validator_occ_merge_eligibility
      --repo omnimarket --pr-number 515 --pr-title 'fix(OMN-10445): make report poster runtime-wirable'
      --pr-branch jonah/omn-10445-pr-review-bot-runtime-wiring --contracts-dir contracts --receipts-dir
      drift/dod_receipts --pr-commit-sha 933a985ebc388e5bf07cacc9aa09d462b6533e40"
  - kind: "tests"
    description: "OCC GitHub Actions workflows use centralized runner selector variables"
    command: "python -c \"from pathlib import Path; import yaml; [yaml.safe_load(p.read_text()) for p
      in Path('.github/workflows').glob('*.yml')]\" && ! grep -RIn '^    runs-on: [^>$]' .github/workflows
      && grep -R 'vars.OMNI_TRUSTED_CI_RUNS_ON_JSON' .github/workflows >/dev/null && grep -R 'vars.OMNI_PUBLIC_PR_RUNS_ON_JSON'
      .github/workflows >/dev/null && actionlint -ignore 'SC2129' -ignore 'unexpected key \\\"type\\\"'
      .github/workflows/*.yml"
  - kind: "tests"
    description: "OCC runner selector expressions provide standardized defaults when caller repos lack
      OMNI runner variables"
    command: "ruby -e 'require \"yaml\"; Dir[\".github/workflows/*.yml\"].each { |p| YAML.load_file(p)
      }' && actionlint -ignore 'SC2129' -ignore 'unexpected key \"type\"' .github/workflows/*.yml && !
      rg -n 'fromJSON\\(vars\\.OMNI_(PUBLIC_PR|TRUSTED_CI)_RUNS_ON_JSON\\)' .github/workflows && test
      \"$(rg -n 'fromJSON\\(vars\\.OMNI_(PUBLIC_PR|TRUSTED_CI)_RUNS_ON_JSON \\|\\|' .github/workflows
      | wc -l | tr -d ' ')\" = \"52\""
  - kind: "manual"
    description: "Post-merge approved deploy validation command is recorded; live deploy/restart requires
      explicit approval"
    command: "deploy validation: docker exec omninode-runtime printenv ONEX_ACTIVE_RUNTIME_PACKAGES &&
      docker exec omninode-runtime python -m omnibase_infra.runtime.auto_wiring.discovery"
  - kind: "tests"
    description: "Runner fleet health config standardization and GitHub/Docker reconciliation proof pass"
    command: "cd omni_worktrees/OMN-10445/omnibase_infra-runner-standardization && PYTHONPATH=src uv run
      pytest tests/unit/observability/runner_health/test_cli_runner_health.py tests/unit/observability/runner_health/test_runner_fleet_config.py
      tests/unit/observability/runner_health/test_collector_runner_health.py tests/integration/observability/test_runner_fleet_config_contract.py
      -q"
  - kind: "tests"
    description: "omnibase_core CI, stale TODO, receipt, and docs workflows use centralized runner selector
      variables"
    command: "cd omni_worktrees/OMN-10445/omnibase_core-runner-routing && actionlint -ignore 'SC2086'
      -ignore 'SC2129' .github/workflows/ci.yml .github/workflows/validate-docs.yml .github/workflows/receipt-gate.yml
      .github/workflows/stale-todo-gate.yml && ! grep -RIn '^    runs-on: [^>$]' .github/workflows/ci.yml
      .github/workflows/validate-docs.yml .github/workflows/receipt-gate.yml .github/workflows/stale-todo-gate.yml
      && grep -R 'vars.OMNI_TRUSTED_CI_RUNS_ON_JSON' .github/workflows/ci.yml .github/workflows/validate-docs.yml
      .github/workflows/receipt-gate.yml .github/workflows/stale-todo-gate.yml >/dev/null && grep -R 'vars.OMNI_PUBLIC_PR_RUNS_ON_JSON'
      .github/workflows/ci.yml .github/workflows/validate-docs.yml .github/workflows/receipt-gate.yml
      .github/workflows/stale-todo-gate.yml >/dev/null"
  - kind: "tests"
    description: "omniclaude reusable CR gate workflow uses centralized runner selector variables"
    command: "cd omni_worktrees/OMN-10445/omniclaude-runner-routing && actionlint .github/workflows/cr-thread-gate.yml
      && ! grep -RIn '^    runs-on: [^>$]' .github/workflows/cr-thread-gate.yml && grep -R 'vars.OMNI_TRUSTED_CI_RUNS_ON_JSON'
      .github/workflows/cr-thread-gate.yml >/dev/null && grep -R 'vars.OMNI_PUBLIC_PR_RUNS_ON_JSON' .github/workflows/cr-thread-gate.yml
      >/dev/null"
