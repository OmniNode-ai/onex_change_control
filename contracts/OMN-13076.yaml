---
schema_version: "1.0.0"
ticket_id: "OMN-13076"
title: "feat(omnimarket): projection contract for baselines.quality (NC-03)"
summary: >
  Creates node_projection_baselines_quality in omnimarket — a reducer node that consumes onex.evt.omnibase-infra.baselines-computed.v1
  and projects quality signal aggregates into the baselines_quality_snapshots table. The table is exposed
  via the projection API as onex.snapshot.projection.baselines.quality.v1, resolving the missing snapshot
  topic declared by the omnidash quality-baseline-panel component registry. Aggregates: patterns_compared,
  patterns_recommended, high_confidence_count, medium_confidence_count, low_confidence_count, quality_score
  (weighted avg: high=1.0/medium=0.5/low=0.25 per comparison), recommend_rate (patterns_recommended /
  max(1, patterns_compared)).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      11 unit tests covering: snapshot row fields, confidence tier counts, quality_score weighted average,
      recommend_rate ratio, patterns counts, empty event zero-values, upsert idempotency, contract subscribe
      topic, contract projection_api snapshot topic, contract node_type, and handle() shim delegation.
    command: "uv run pytest tests/nodes/node_projection_baselines_quality/ -v"
