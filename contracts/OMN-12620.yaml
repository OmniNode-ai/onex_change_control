title: "Tiered producer-edge durability: durable outbox for duty-critical tier"
summary: >
  Central OCC evidence for omnimarket PR #1022 (epic OMN-12618, Section 5). Splits node_emit_daemon producer-edge
  durability by declared per-topic tier. Duty-critical / command / evidence topics route through an append-only
  durable outbox (acked replay outbox->Kafka, truncate-on-ack, never drop; outbox-full -> explicit backpressure
  and fail-fast). Telemetry topics keep the bounded spool with drop-on-overflow. Tier is a required per-topic
  registry property; the registry fails fast on any fan-out rule with no declared tier.
