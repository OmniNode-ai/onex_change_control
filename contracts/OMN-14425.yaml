title: "fix(OMN-14425): OCC autobind emits a falsifiable L1 check, not existence-only"
summary: >-
  omnimarket PR #1723 teaches the OCC Evidence-Source autobind (OMN-13317 F1, occ_companion_emitter.py
  / occ_evidence_stamp.py) to declare a second dod_evidence item alongside its existing `gh pr view` existence
  probe: `gh pr checks <n> --repo <repo>`, which is falsifiable (it fails when the PR's CI fails) and
  is required so autobind-minted contracts can satisfy the OMN-14409 contract substance floor (onex_change_control#3990)
  once that gate lands fail-closed. Independently verified (S-C adversarial verifier, not the implementer):
  (1) falsifiability proven with real exit codes in both directions, not asserted; (2) the fix survives
  the ACTUAL corrected #3990 deriver, whose HEAD commit at verification time had already inverted polarity
  to default-reject — `gh pr checks` passes via an explicit `_CI_OUTCOME_RE` allowlist, not a permissive
  "anything but gh pr view" default; (3) the claimed RED->GREEN transition reproduced by importing and
  running the REAL `derive_proof_tier` / `evaluate_contract` from the fetched #3990 branch against the
  REAL `render_companion_contract` output from #1723's own source, byte-identical to the PR body; (4)
  the pre-existing existence probe is kept, not replaced, and remains covered by the same whole-file `_rebind_all_receipts`
  pass; (5) 180 tests green plus the OMN-14285 one-producer-per-contract gate, reproduced fresh from the
  PR's own `uv.lock`. CAVEAT (landing order, tracked separately as OMN-14429 finding + a ROLLING_WORK_LEDGER.md
  entry, NOT part of this contract's DoD): #3990 must not merge until #1723 is merged AND the omnimarket
  autobind runtime is redeployed and a freshly-minted contract is confirmed to carry the new L1 item —
  the currently-deployed autobind still emits only the pre-fix existence-only shape.
