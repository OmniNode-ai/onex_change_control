      PR, occ-preflight-cascade red) exited 1; `gh pr checks 1721 --repo OmniNode-ai/omnimarket` (sibling
      merged PR, all-green CI) exited 0. The command is not a rubber-stamp probe — it reports the real
      CI verdict of the PR it is pointed at. This item's check re-executes the stable (merged, permanently-green)
      case as a forward regression guard.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "PR_NUMBER=1721 REPO=OmniNode-ai/omnimarket gh pr checks ${PR_NUMBER} --repo ${REPO}"
