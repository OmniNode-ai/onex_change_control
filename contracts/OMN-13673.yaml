title: "wire verify=True VERIFYING dispatch in pr_lifecycle_orchestrator"
summary: >-
  omnimarket PR #1471 replaces the verify=True hard RuntimeError in HandlerPrLifecycleOrchestrator with
  per-PR VERIFYING phase dispatch. The implementation computes a verification target from changed files,
  dispatches the canonical verification probe, records per-PR verification outcomes, and blocks only the
  PRs with failed verification while allowing neutral/unavailable outcomes to proceed. The change is runtime
  handler code, but it does not mutate deployed infrastructure, topics, schemas, migrations, or .201/.200
  runtime state during merge.
