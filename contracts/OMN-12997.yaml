title: "INSTR-EVAL: badge Instruction Eval view as recorded fixture (not live) + palette classification"
summary: >
  The omnidash Instruction Eval view (src/pages/InstructionEvalPage.tsx -> src/components/dashboard/instruction-eval/InstructionEvalHeatmap.tsx)
  renders a committed fixture (instruction-eval.fixtures.ts, run 20260526-170241 = 2026-05-26, 16 days
  old as of the audit) with ZERO network requests. It is a dedicated PAGE, not a palette widget, so it
  bypasses the registry/chrome authorityLabel path entirely and carried no positive recorded-data indicator
  beyond a small footnote and isLive=false — to a demo viewer or judge it reads as a live, projection-backed
  panel, a quiet authority violation surfaced by the 2026-06-11 dashboard visual audit (snap-06-instruction-eval).
  Remediation adds an unmissable "Recorded evaluation - 2026-05-26 (fixture)" badge with the degraded/recorded
  palette treatment (reducer-blue tint + triangle glyph, the same vocabulary HonestyStateBadge uses for
  non-live provenance), rendered in BOTH the widget header (headerExtra) and above the matrix so it shows
  wherever the data appears (role=status + aria-label "Not a live projection."). It classifies instruction-eval
  in shared/types/palette-visibility.ts as degraded (recorded, not live/projection-backed) as the single
  source of truth for this page-only view's authority. The fixture is intentionally KEPT (it is the only
  data until a projection exists). No topic, contract API, envelope, or schema change. The proper authority
  path (a contract-declared projection for instruction-eval results + panel wiring) is tracked in the
  separate follow-up OMN-12998 and is NOT implemented here.
