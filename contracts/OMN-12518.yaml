title: "SEA->zero: route mcp_client.py through declared HTTP transport (contract-native MCP client)"
summary: >-
  onex-self-extending-agent src/deploy/mcp_client.py issued raw httpx.get/post calls (lines 39, 50, 91)
  to the MCP runtime with a hardcoded 192.168.86.201 fallback (line 16). PR #180 makes the transport contract-declared:
  a typed mcp_service.yaml service-discovery contract (transport_type HTTP, host/port from contract/overlay,
  no LAN IP) plus a contract-governed node_mcp_transport_effect handler that owns the httpx call behind
  ProtocolMcpTransport. After the change, check-imperative-contracts --scan-freestanding no longer flags
  src/deploy/mcp_client.py.
