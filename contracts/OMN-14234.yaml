title: "feat(OMN-14234): retry-local (best-of-N) before escalating off a free tier"
summary: >-
  omnimarket product PR #1694 (branch jonah/omn-14234-retry-local, head d757236f235427c6f8ae493830486f8ae19ebb0f)
  adds retry-local (best-of-N) to both delegation paths. On a sub-bar quality result on a free (free_local)
  tier the ladder re-runs the SAME tier up to its contract-declared max_retries budget (routing_tiers.yaml;
  local=2) before escalating to a paid tier, lifting the non-deterministic local coder's $0 pass-rate.
  New is_free_tier() routing classifier; bus FSM _maybe_retry_local re-routes GATE_EVALUATED->ROUTED (new
  contract edge) without incrementing escalation_count; the bus-less LocalDelegationDispatchPort retries
  the same backend per-tier. Fail-closed: a paid tier or an exhausted budget escalates as before.
