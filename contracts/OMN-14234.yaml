ticket_id: "OMN-14234"
title: "feat(OMN-14234): retry-local (best-of-N) before escalating off a free tier"
summary: >-
  omnimarket product PR #1694 (branch jonah/omn-14234-retry-local, head 4e5500972aca5da25249055506b6f661e20a32fc)
  adds retry-local (best-of-N) to the delegation ladder: on a sub-bar quality result on a FREE (free_local)
  tier, the SAME tier is re-run up to its contract-declared max_retries budget (routing_tiers.yaml; local=2
  -> 1 initial + 2 retries = 3 $0 drafts) BEFORE escalating to a paid tier. Wired on BOTH delegation paths
  — the bus FSM (handler_delegation_workflow._maybe_retry_local, GATE_EVALUATED -> ROUTED re-route pinning
  min_tier_name to the same free tier, no escalation_count bump and no escalation event) and the bus-less
  CLI port (LocalDelegationDispatchPort.dispatch retrying the same backend up to the tier budget). Fail-closed:
  only a free tier with retry budget remaining is retried; a paid tier or an exhausted per-tier budget
  escalates exactly as before. Free-tier classification and cost keying are on the typed tier cost model
  (EnumTierCostType.FREE_LOCAL, single is_free_tier classifier) / terminal payload, never exit_code. This
  companion supersedes the implementer-self-authored OCC #3833 (closed) with independent verification
  by an agent distinct from the implementer.
