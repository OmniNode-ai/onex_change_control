---
schema_version: "1.0.0"
ticket_id: "OMN-14450"
title: "OCC companion for omnimarket#1727 — uv.lock pin reachability gate"
summary: >
  OCC evidence companion for OmniNode-ai/omnimarket#1727 (OMN-14450). The product PR adds a CI gate that
  rejects git-SHA pins in uv.lock when the pinned commit is not reachable from any remote branch in a
  fresh/pruned clone. This is the recurrence guard for OMN-14447, where omnimarket pinned omnibase-core
  to a deleted feature-branch head and made fresh workspace builds impossible. The evidence below reads
  the product PR head directly and asserts the load-bearing properties: the check prunes before testing
  reachability, the regression test proves the unpruned false pass, and the job is wired into ci.yml's
  required CI Summary rollup rather than living in an invisible standalone workflow.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omnimarket#1727 head contains a product-observing uv.lock pin reachability gate"
    command: "see dod_evidence check_values"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-verify-1727-script-prunes-before-reachability"
    description: >-
      Product-observing check against omnimarket#1727 head db02983a2e0cc1309d1f17d98a8d3484d578881e. Reads
      scripts/ci/check_uv_lock_pin_reachability.py from the PR head and asserts the load-bearing implementation
      details: the script exposes a --no-prune control only for proving the false pass, defaults to pruning,
      and calls git fetch origin --prune before git branch -r --contains. Without this, the gate would
      reproduce the OMN-14447 failure mode by reporting deleted branch heads as reachable on stale clones.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          tmp="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/scripts/ci/check_uv_lock_pin_reachability.py?ref=db02983a2e0cc1309d1f17d98a8d3484d578881e"
          --jq .content | base64 -d > "$tmp" && grep -F -- '"--no-prune"' "$tmp" && grep -F -- 'prune=not
          args.no_prune' "$tmp" && grep -F -- '"fetch", "origin", "--prune", "--quiet"' "$tmp" && grep
          -F -- '"branch", "-r", "--contains", rev' "$tmp"
  - id: "dod-verify-1727-test-proves-unpruned-false-pass"
    description: >-
      Product-observing test check against the PR head. The regression test must prove both sides of the
      invariant: a deleted feature branch commit returns True when prune=False, then False when prune=True.
      That is the exact false pass OMN-14450 exists to prevent; a test that only checks happy-path reachable
      commits would not guard the bug class.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          tmp="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/tests/unit/scripts/ci/test_check_uv_lock_pin_reachability.py?ref=db02983a2e0cc1309d1f17d98a8d3484d578881e"
          --jq .content | base64 -d > "$tmp" && grep -F -- 'test_naive_unpruned_check_gives_a_false_pass'
          "$tmp" && grep -F -- 'assert is_reachable(repo, doomed, prune=False) is True' "$tmp" && grep
          -F -- 'assert is_reachable(repo, doomed, prune=True) is False' "$tmp" && grep -F -- 'branch",
          "-q", "-D", "feature"' "$tmp"
  - id: "dod-verify-1727-ci-summary-wires-reachability-job"
    description: >-
      Product-observing workflow check against the PR head. The uv.lock reachability check must live inside
      .github/workflows/ci.yml and be listed in the ci-summary needs array. A standalone workflow or unrolled
      job would be structurally invisible to the required CI Summary check, recreating the non-blocking-gate
      defect class from OMN-14415.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          tmp="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/.github/workflows/ci.yml?ref=db02983a2e0cc1309d1f17d98a8d3484d578881e"
          --jq .content | base64 -d > "$tmp" && grep -F -- 'uv-lock-pin-reachability:' "$tmp" && grep
          -F -- 'python3 scripts/ci/check_uv_lock_pin_reachability.py' "$tmp" && grep -F -- 'needs: [occ-preflight,
          zone-filter, lint, typecheck, detect-changes, test, integration-guard, topic-naming-lint, runtime-sweep,
          core-only-install, contract-compliance, e2e-workflow-runner, golden-chains, sea-e2e-chains,
          generated-node-golden-chain, dep-health, uv-lock-pin-reachability, aislop-sweep, workflow-module-refs,
          no-noncanonical-lifecycle-classes]' "$tmp"
  - id: "dod-verify-1727-fetch-failure-fails-closed"
    description: >-
      Product-observing check against omnimarket#1727 head f119c4932ef8a159af2d0c639fef7db693dc66d0. Reads
      scripts/ci/check_uv_lock_pin_reachability.py from the PR head and asserts the CodeRabbit-required
      fail-closed behavior: if git fetch origin --prune fails, the checker returns False before consulting
      local cat-file or branch state. Without this, a transient fetch failure could reuse stale remote-tracking
      refs and recreate the false-green stale-branch bug this gate exists to prevent.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          tmp="$(mktemp)" && gh api "repos/OmniNode-ai/omnimarket/contents/scripts/ci/check_uv_lock_pin_reachability.py?ref=f119c4932ef8a159af2d0c639fef7db693dc66d0"
          --jq .content | base64 -d > "$tmp" && grep -F -- 'fetch = _git(["fetch", "origin", "--prune",
          "--quiet"], cwd=repo_dir)' "$tmp" && grep -F -- 'if fetch.returncode != 0:' "$tmp" && grep -F
          -- 'return False' "$tmp"
  - id: "dod-verify-1727-missing-clone-fails-gate"
    description: >-
      Product-observing check against omnimarket#1727 head f119c4932ef8a159af2d0c639fef7db693dc66d0. Reads
      scripts/ci/check_uv_lock_pin_reachability.py and its focused tests from the PR head and asserts
      that a missing sibling clone is treated as UNVERIFIED and returns exit code 1. This prevents clone/setup
      failures from leaving every pin unchecked while the job exits green.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -F -- 'UNVERIFIED  ' scripts/ci/check_uv_lock_pin_reachability.py && grep -F -- 'no clone
          at' scripts/ci/check_uv_lock_pin_reachability.py && grep -F -- 'unverified.append((repo, rev,
          repo_dir))' scripts/ci/check_uv_lock_pin_reachability.py && grep -F -- 'if unverified:' scripts/ci/check_uv_lock_pin_reachability.py
          && grep -F -- 'return 1' scripts/ci/check_uv_lock_pin_reachability.py && grep -F -- 'test_missing_clone_fails_gate'
          tests/unit/scripts/ci/test_check_uv_lock_pin_reachability.py
  - id: "dod-verify-1727-focused-local-checks-f119"
    description: >-
      Focused local verification run for the current omnimarket#1727 product head f119c4932ef8a159af2d0c639fef7db693dc66d0
      after the CodeRabbit fixes. The suite now covers the original stale-ref false pass plus the new
      fail-closed cases for fetch failure and missing clones.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          uv run pytest tests/unit/scripts/ci/test_check_uv_lock_pin_reachability.py -q && uv run ruff
          check scripts/ci/check_uv_lock_pin_reachability.py tests/unit/scripts/ci/test_check_uv_lock_pin_reachability.py
          && uv run ruff format --check scripts/ci/check_uv_lock_pin_reachability.py tests/unit/scripts/ci/test_check_uv_lock_pin_reachability.py
  - id: "dod-occ-self-commit"
    description: >-
      Self-bind item for this OCC companion PR. It asserts a fact about this companion branch so validator_occ_merge_eligibility
      can bind a PASS receipt to the PR under check before a PR number exists. Product-observing evidence
      is carried by the three entries above; this item is binding evidence only.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q 'jonah/omn-14450-occ-omnimarket-1727' drift/dod_receipts/OMN-14450/dod-occ-self-commit/command.yaml
