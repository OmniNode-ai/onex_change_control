schema_version: "1.0.0"
ticket_id: OMN-13959
title: "fix(delegation): fall back to the deterministic floor when the LLM judge is unavailable"
summary: >
  code_generation (required_bar 0.85) combines an LLM-judge adequacy score (0.4 band) with the deterministic
  graded score (0.6 band). When the cloud judge is throttled/unreachable (429 -> JUDGE_FAILED) the gate
  falls back to the deterministic-only graded score (~0.733), and the acceptance authority applied the
  combined-score required_bar to it, rejecting a VALID local artifact and escalating to ladder exhaustion
  during a cloud-judge outage. Fix: when a verifiable class records score_source=deterministic_acceptance
  (floor passed, judge NOT combined = unavailable), acceptance falls back to the deterministic FLOOR verdict
  instead of the un-meetable combined bar, on BOTH the bus-less local port and the bus orchestrator. Does
  NOT weaken the bar: a reachable judge yields score_source=combined and the full bar applies; empty/refusal
  still fail_deterministic; a judge FAIL veto still rejects.
is_seam_ticket: false
interface_change: false
