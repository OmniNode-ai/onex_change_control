ticket_id: "OMN-11997"
title: "Fix PG 16 index bug in intelligence migrations 024/025"
summary: >
  Central OCC evidence for omnibase_infra PR #1738, which removes the non-IMMUTABLE (created_at::date)
  functional index from intelligence migrations 024 and 025. On PG 16.14, ::date cast is STABLE not IMMUTABLE,
  causing CREATE INDEX to fail and blocking the migration-gate container at startup. The fix removes the
  broken index from migration 024 (a plain created_at index already covers range queries) and updates
  migration 025 to only DROP with no recreation.
