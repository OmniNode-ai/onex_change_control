title: "P2-5c node_context_artifact_resolver_compute: materialize real artifact_content_map for the ROI
  runner"
summary: >
  Lands the context-artifact resolver COMPUTE node (node_context_artifact_resolver_compute) in omnimarket.
  The resolver materializes the per-factor artifact_content_map the context-ROI runner (OMN-12798) injects,
  closing the stub-content gap: the runner's _assemble_context_text emitted [stub content for <factor>]
  for every ON arm unless the map was pre-populated. The resolver turns pre-read artifact sources (golden-chain
  YAML, exemplar files, CLAUDE.md / architecture-doc bodies, local-failure notes) into real per-factor
  text, reusing GuidanceSectionParser (OMN-12795) for markdown section selection and node_context_pack_builder_compute
  for the 16k token-budget hard-reject and the canonical factor precedence (golden_chain > exemplar >
  local_failures > architecture_patterns > claude_md) -- budget and precedence are not reimplemented.
  Pure COMPUTE: zero I/O, deterministic; file read is the EFFECT boundary (content supplied as strings).
  No hardcoded paths: artifact sources are declared in contract config by logical name + provenance +
  factor. The runner is untouched -- its _assemble_context_text consumes the resolved map verbatim. Additive
  code-only change with no runtime topology change beyond the new node's own contract topics; applies
  on the next normal omnimarket image rebuild.
