schema_version: "1.0.0"
ticket_id: "OMN-13723"
title: "feat(omnimarket): node_slack_publish_effect — generic Slack EFFECT primitive"
summary: >
  Adds node_slack_publish_effect in omnimarket — the canonical generic, secret-store-backed Slack publish
  EFFECT primitive for the morning deep-dive skill epic (OMN-13722). The node subscribes to onex.cmd.omnimarket.slack-publish.v1,
  resolves SLACK_BOT_TOKEN at handle() via the contract secrets block + resolve_api_key_async (no env
  read, no literal token in source), POSTs a pre-formed payload to the Slack Web API (URL sourced from
  service_endpoints contract), and emits onex.evt.omnimarket.slack-published.v1 / slack-publish-failed.v1
  / slack-publish-deduped.v1. A file-backed, flock-serialized idempotency ledger keyed by idempotency_key
  suppresses duplicate POSTs. Topics are declared only in contract.yaml and read at runtime via contract_subscribe_topics/contract_publish_topics.
