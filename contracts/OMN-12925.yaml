    description: "omnibase_infra PR #1931 carries the OMN-12924 judge compose implementation and targets
      dev."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12925/dod-product-pr-1931/command.yaml
          && grep -q '^pr_number: 1931$' drift/dod_receipts/OMN-12925/dod-product-pr-1931/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused runtime-policy, static judge profile, compose render, lint, and format checks
      passed on the product PR head."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12925/dod-focused-tests/command.yaml
          && grep -q '15 passed' drift/dod_receipts/OMN-12925/dod-focused-tests/command.yaml && grep -q
          '5 passed' drift/dod_receipts/OMN-12925/dod-focused-tests/command.yaml"
  - id: "dod-compose-render"
    description: "The judge profile renders with docker/runtime-policy.env and docker/judge.env.example
      using Docker Compose without starting containers."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12925/dod-compose-render/command.yaml
          && grep -q 'docker compose --env-file docker/runtime-policy.env --env-file docker/judge.env.example'
          drift/dod_receipts/OMN-12925/dod-compose-render/command.yaml && grep -q -- '-f docker/docker-compose.judge.yml
          --profile judge config --quiet' drift/dod_receipts/OMN-12925/dod-compose-render/command.yaml"
  - id: "dod-no-keycloak-infisical"
    description: "The judge profile does not render or depend on Keycloak or Infisical services."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12925/dod-no-keycloak-infisical/command.yaml
          && grep -q 'keycloak' drift/dod_receipts/OMN-12925/dod-no-keycloak-infisical/command.yaml &&
          grep -q 'infisical' drift/dod_receipts/OMN-12925/dod-no-keycloak-infisical/command.yaml"
  - id: "dod-tier2-boundary"
    description: "The judge runbook states Tier 2 is best-effort unless a cold-clone/cold-compose proof
      passes and that remote mutation requires explicit approval."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-12925/dod-tier2-boundary/command.yaml
          && grep -q 'Tier 2 is best-effort unless' drift/dod_receipts/OMN-12925/dod-tier2-boundary/command.yaml
          && grep -q 'No .201 deploy' drift/dod_receipts/OMN-12925/dod-tier2-boundary/command.yaml"
