schema_version: "1.0.0"
ticket_id: "OMN-14494"
title: "Harden JSONB list adaptation and projection DLQ observability"
summary: >-
  Central OCC evidence for the two OMN-14494 product PRs: omnimarket PR #1767 declares the missing DLQ
  topic on node_projection_delegation_inference_response, and omnibase_infra PR #2313 replaces brittle
  JSONB-list allowlist behavior with a structural list-of-dicts/list-of-lists heuristic in SyncPsycopg2Adapter.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "topics"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-1767-product-head"
    description: >-
      Product-observing verification for omnimarket PR #1767 at head 8f8c8225f32823edbc6e686adf50a87011c87f73.
      Verifies the PR targets dev, touches only the node_projection_delegation_inference_response contract
      and focused tests, and declares the exact OMN-14494 DLQ topic with a RED/GREEN contract test.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=1767; PRODUCT_REPO=OmniNode-ai/omnimarket; PRODUCT_HEAD=8f8c8225f32823edbc6e686adf50a87011c87f73;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title,body
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n---FILES---\n" + ((.files | map(.path))
          | join("\n")) + "\n---BODY---\n" + .body' > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt"
          && grep -Fxq dev "$d/pr.txt" && grep -Fq 'fix(OMN-14494): declare dlq_topics on node_projection_delegation_inference_response'
          "$d/pr.txt" && grep -Fxq 'src/omnimarket/nodes/node_projection_delegation_inference_response/contract.yaml'
          "$d/pr.txt" && grep -Fxq 'tests/nodes/node_projection_delegation_inference_response/test_node_projection_delegation_inference_response_contract.py'
          "$d/pr.txt" && for p in src/omnimarket/nodes/node_projection_delegation_inference_response/contract.yaml
          tests/nodes/node_projection_delegation_inference_response/test_node_projection_delegation_inference_response_contract.py;
          do mkdir -p "$d/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'dlq_topics:' "$d/src/omnimarket/nodes/node_projection_delegation_inference_response/contract.yaml"
          && grep -Fq 'onex.dlq.omnimarket.projection-delegation-inference-response-malformed.v1' "$d/src/omnimarket/nodes/node_projection_delegation_inference_response/contract.yaml"
          && grep -Fq 'test_contract_declares_dlq_topic' "$d/tests/nodes/node_projection_delegation_inference_response/test_node_projection_delegation_inference_response_contract.py"
          && grep -Fq 'KeyError' "$d/tests/nodes/node_projection_delegation_inference_response/test_node_projection_delegation_inference_response_contract.py"
          && grep -Fq '12 passed' "$d/pr.txt" && grep -Fq 'RED proven' "$d/pr.txt"
  - id: "dod-omnibase-infra-pr-2313-product-head"
    description: >-
      Product-observing verification for omnibase_infra PR #2313 at head 2cb5917f04bb7cf39cd67083c50a767928aef784.
      Verifies the PR targets dev, touches the SyncPsycopg2Adapter runtime code and focused tests, defines
      _should_jsonb_wrap_list, preserves flat scalar arrays, and proves the never-allowlisted audit_findings
      list-of-dicts path is JSON wrapped.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          PRODUCT_PR_NUMBER=2313; PRODUCT_REPO=OmniNode-ai/omnibase_infra; PRODUCT_HEAD=2cb5917f04bb7cf39cd67083c50a767928aef784;
          d="$(mktemp -d)" && gh pr view "$PRODUCT_PR_NUMBER" --repo "$PRODUCT_REPO" --json headRefOid,baseRefName,files,title,body
          --jq '.headRefOid + "\n" + .baseRefName + "\n" + .title + "\n---FILES---\n" + ((.files | map(.path))
          | join("\n")) + "\n---BODY---\n" + .body' > "$d/pr.txt" && grep -Fq "$PRODUCT_HEAD" "$d/pr.txt"
          && grep -Fxq dev "$d/pr.txt" && grep -Fq 'fix(OMN-14494): structural JSONB-list heuristic for
          sync psycopg2 adapter' "$d/pr.txt" && grep -Fxq 'src/omnibase_infra/runtime/auto_wiring/handler_wiring.py'
          "$d/pr.txt" && grep -Fxq 'tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py'
          "$d/pr.txt" && for p in src/omnibase_infra/runtime/auto_wiring/handler_wiring.py tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py;
          do mkdir -p "$d/$(dirname "$p")" && gh api "repos/${PRODUCT_REPO}/contents/${p}?ref=${PRODUCT_HEAD}"
          --jq .content | base64 --decode > "$d/$p"; done && grep -Fq 'def _should_jsonb_wrap_list' "$d/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py"
          && grep -Fq 'return any(isinstance(item, (dict, list)) for item in value)' "$d/src/omnibase_infra/runtime/auto_wiring/handler_wiring.py"
          && grep -Fq 'test_should_jsonb_wrap_list_structural_heuristic_new_unsuffixed_column' "$d/tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py"
          && grep -Fq 'test_should_jsonb_wrap_list_preserves_flat_scalar_list' "$d/tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py"
          && grep -Fq 'test_sync_db_adapter_json_adapts_new_unsuffixed_unallowlisted_list_of_dicts_column'
          "$d/tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py" && grep -Fq 'audit_findings'
          "$d/tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py" && grep -Fq '382 passed'
          "$d/pr.txt" && grep -Fq 'RED proven' "$d/pr.txt"
  - id: "dod-omn14494-local-verification-and-scope"
    description: >-
      Combined local-verification and deploy-scope evidence for OMN-14494. The product PR bodies record
      focused pytest, mypy, ruff, and pre-commit proof for both repos. The diff is limited to a market
      node contract/test and infra runtime auto-wiring code/tests; no live deploy, restart, database mutation,
      docker exec, rpk produce, Dockerfile, compose manifest, deploy script, or .201 mutation is required
      by the product PRs.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          OM_HEAD=8f8c8225f32823edbc6e686adf50a87011c87f73; INFRA_HEAD=2cb5917f04bb7cf39cd67083c50a767928aef784;
          om="$(mktemp)" && infra="$(mktemp)" && gh pr view 1767 --repo OmniNode-ai/omnimarket --json
          headRefOid,body,files --jq '.headRefOid + "\n---FILES---\n" + ((.files | map(.path)) | join("\n"))
          + "\n---BODY---\n" + .body' > "$om" && gh pr view 2313 --repo OmniNode-ai/omnibase_infra --json
          headRefOid,body,files --jq '.headRefOid + "\n---FILES---\n" + ((.files | map(.path)) | join("\n"))
          + "\n---BODY---\n" + .body' > "$infra" && grep -Fq "$OM_HEAD" "$om" && grep -Fq "$INFRA_HEAD"
          "$infra" && grep -Fq '12 passed' "$om" && grep -Fq 'uv run mypy' "$om" && grep -Fq 'pre-commit
          run --files' "$om" && grep -Fq '382 passed' "$infra" && grep -Fq 'uv run mypy' "$infra" && grep
          -Fq 'pre-commit run --files' "$infra" && grep -Fxq 'src/omnimarket/nodes/node_projection_delegation_inference_response/contract.yaml'
          "$om" && grep -Fxq 'tests/nodes/node_projection_delegation_inference_response/test_node_projection_delegation_inference_response_contract.py'
          "$om" && grep -Fxq 'src/omnibase_infra/runtime/auto_wiring/handler_wiring.py' "$infra" && grep
          -Fxq 'tests/unit/runtime/auto_wiring/test_handler_wiring_db_injection.py' "$infra" && ! cat
          "$om" "$infra" | grep -Eiq '(docker exec|rpk topic produce|database mutation|live deploy|restart
          .201|restart.*omninode-pc|Dockerfile|docker-compose|compose[^[:space:]]*|deploy/)'
