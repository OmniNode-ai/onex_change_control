schema_version: "1.0.0"
ticket_id: OMN-13963
title: "fix(delegation): give reasoning/complex_reasoning a local adequacy authority (complete on local
  under cloud-judge outage)"
summary: >
  WS-D/D2 dogfood found every reasoning onex delegate call hard-failing on a GLM 429. Live capture showed
  reasoning DID route to the local Qwen (local-coder, tier=local) first and the local call ran, but the
  quality gate ESCALATED with TASK_MISMATCH:no-adequacy-authority (its DoD response_non_empty/no_refusal/step_by_step_explanation
  are all reject-only) and fell through to the throttled cloud GLM (429). reasoning is NOT judge-combinable
  so no judge score backfilled the missing authority. Fix (config-only): add semantic_adequacy -- the
  same LOCAL completeness authority the sibling reproducible_judge classes document/research/summarization
  already carry and complete on local with -- to reasoning + complex_reasoning heuristic DoD. Valid local
  output is now accepted on local; a refusal/empty still fails (no quality downgrade). No cloud judge
  needed.
