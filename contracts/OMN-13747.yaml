summary: >-
  Central OCC evidence for omnibase_infra PR #2156, which moves the runtime image build-and-push job in
  .github/workflows/build-and-push-runtime.yml from the .201 self-hosted runner selector to ubuntu-latest.
  The change targets repeated ECR docker push EOFs observed on the self-hosted runner while leaving the
  lineage guard on the existing self-hosted path. This contract also binds omnimarket PR #1532, which
  adds source migration CHECK constraints for the projection tables vendored by omnibase_infra PR #2156.
