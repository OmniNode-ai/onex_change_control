title: "Bifrost Gemini model_name repoint: gemini-2.0-flash → gemini-2.5-flash-lite"
summary: >
  The bifrost cloud-gemini-flash backend declared model_name: "gemini-2.0-flash", which is quota-exhausted
  on the AI Studio free tier (HTTP 429). The key (GEMINI_API_KEY) is valid; the sole failing dimension
  was external quota. gemini-2.5-flash-lite is quota-available on the same key. This ticket formally documents
  the repoint of the bifrost contract cloud-gemini-flash model_name (done in OMN-12885 / omnimarket #1140)
  and adds contract annotations + a regression-guard test to make the escalation path explicitly contract-documented.
  The cheap_cloud escalation leg for node_generation_consumer (code_generation task class) routes: local-coder
  → cloud-gemini-flash (gemini-2.5-flash-lite) → cloud-sonnet. VERTEX SUB-LEG: Vertex backend overlay
  wiring (ADC delivery into effects container) is OUT of scope and stays open on OMN-12890 regardless
  of this PR outcome.
