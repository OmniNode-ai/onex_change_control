ticket_id: "OMN-13215"
title: "Delegation ceiling tier is canonical, contract-overlay-configurable, and provider-swappable (remove
  codex-cli shell-out)"
summary: >-
  OMN-13215 makes the delegation ceiling tier canonical and provider-swappable. The ceiling (claude tier)
  previously executed via a shelled codex-cli subprocess whose binary is absent on the .201 dev runtime
  containers, dead-ending every code_generation escalation (CLI backend unavailable: codex executable
  not found). Per the binding user decision, a shelled-CLI tier is non-canonical. The fix removes the
  codex-cli shell-execution code path entirely: every tier including the ceiling resolves provider + endpoint
  + model + api_key_ref per-tier from the routing contract/overlay and executes over the canonical HTTP
  inference path (Bifrost complete-URL-from-contract). The ceiling maps to the HTTP cloud-sonnet backend
  (complete verbatim endpoint_url + secret_ref llm.anthropic.api_key) and is swappable across gemini/glm/openrouter/
  claude purely via contract overlay (no code change, no env, no hardcoded endpoint, no CLI shell-out).
  omnimarket PR #1258 removes the cli:// subprocess path, the cli_agents tier, the cli-* backends, and
  adds a routing-authority shape-gate that flags any cli:// endpoint as a violation. omnibase_infra PR
  #2020 removes the inference.codex_cli operation and the codex-cli CLI config from the parallel inference
  effect, and narrows the over-broad lane-attestation gate.
is_seam_ticket: false
interface_change: false
