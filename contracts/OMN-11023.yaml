---
schema_version: "1.0.0"
ticket_id: "OMN-11023"
title: "Migrate omnimarket crawler parse intent similarity DTOs to omnimemory"
summary: >
  Binds omnimarket PR #627, which replaces duplicate similarity compute DTO definitions with compatibility
  imports from canonical omnimemory models while preserving existing omnimarket model module paths and
  schema refs.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: "Downstream PR #627 reports focused similarity DTO compatibility tests."
    command: "gh pr view 627 --repo OmniNode-ai/omnimarket --json state,headRefOid"
  - kind: "manual"
    description: "Central OCC receipts bind OMN-11023 to omnimarket PR #627 and deploy/D4 evidence."
    command: "find drift/dod_receipts/OMN-11023 -type f -name command.yaml"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-omnimarket-pr-627"
    description: "omnimarket PR #627 carries the OMN-11023 similarity DTO import migration."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11023/dod-omnimarket-pr-627/command.yaml
          && grep -q '^pr_number: 627$' drift/dod_receipts/OMN-11023/dod-omnimarket-pr-627/command.yaml
          && grep -q '^commit_sha: e64926ee715a46fb4c6797a02f0f48778e524282$' drift/dod_receipts/OMN-11023/dod-omnimarket-pr-627/command.yaml"
  - id: "dod-focused-tests"
    description: "Focused omnimarket similarity import compatibility and golden-chain tests pass."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11023/dod-focused-tests/command.yaml
          && grep -q '19 passed' drift/dod_receipts/OMN-11023/dod-focused-tests/command.yaml"
  - id: "dod-d4-delta"
    description: "D4 targeted assertion shows migrated similarity DTO classes absent from remaining findings."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11023/dod-d4-delta/command.yaml
          && grep -q 'migrated similarity DTO class names absent' drift/dod_receipts/OMN-11023/dod-d4-delta/command.yaml"
  - id: "dod-deploy"
    description: >
      Deploy DoD evidence for PR #627: model import compatibility change, no live deploy, restart, or
      .201 mutation required before merge; local deploy gate replay and post-merge import smoke are recorded.
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "grep -q '^status: PASS$' drift/dod_receipts/OMN-11023/dod-deploy/command.yaml &&
          grep -q '^pr_number: 627$' drift/dod_receipts/OMN-11023/dod-deploy/command.yaml && grep -q 'No
          live deploy' drift/dod_receipts/OMN-11023/dod-deploy/command.yaml"
