  - id: "dod-verify-fail-closed-cases"
    description: >-
      Adversarial fail-closed proof: an independent harness (not the implementer's tests) constructed
      tampered receipt/contract pairs and RAN them through check_receipt_file. All four required-FAIL
      cases fail closed: (1) the attested dod_evidence entry edited after mint -> FAIL (contract_entry_sha256
