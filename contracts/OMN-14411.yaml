      failures are legacy-only receipts (no contract_entry_sha256) that already failed the OLD gate; they
      are inert in CI because the gate only runs on CHANGED receipt files (ci.yml diffs vs base) and merged
      receipts are immutable under the append-only gate, so they are never re-checked.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' drift/dod_receipts/OMN-14411/dod-verify-corpus-backward-compat/command.yaml
          && grep -q '10164' drift/dod_receipts/OMN-14411/dod-verify-corpus-backward-compat/command.yaml
