      failed with the exact live-incident message 'contract_sha256 mismatch ... The contract mutated after
      this receipt was produced'. Restoring the fix returned the suite to 24/24 passing with a clean worktree.
      This proves the tests actually bind to the fix rather than passing vacuously.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          uv run pytest tests/test_check_receipt_hardening.py -q && grep -q '24 passed' drift/dod_receipts/OMN-14411/dod-verify-red-green-independent/command.yaml
  - id: "dod-verify-supersessions-intact"
