      pass); (3) receipt carrying neither contract_sha256 nor contract_entry_sha256 -> FAIL (missing-hash);
      (4) schema_version tampered -> FAIL, because HEADER_FIELDS (ticket_id, schema_version) is folded
      into every per-entry hash. Scope traded away by per-entry hashing (sibling dod_evidence entries)
      is covered by the append-only gate: evaluate_append_only fires entry_edited on the same tamper.
      Verified that the honesty-gate and append-only-gate jobs are both in the required CI Summary needs-list
      (ci.yml), so that compensating control is genuinely enforced.
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          uv run pytest tests/test_check_receipt_hardening.py -q
  - id: "dod-verify-red-green-independent"
    description: >-
      Independent RED->GREEN reproduction by the verifier — NOT trusting the implementer's stash-based
      claim. The verifier overwrote scripts/validation/check_receipt_hardening.py with the pre-fix source
