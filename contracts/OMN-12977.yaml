schema_version: "1.0.0"
ticket_id: "OMN-12977"
title: "Workspace-build sibling-pin ratchet — honor consuming lock, fail-fast on stale vendor"
summary: >
  The omnibase_infra workspace-mode image build (BUILD_SOURCE=workspace, used by the stability-test deploy
  procedure) vendored sibling/foundation packages from whatever the canonical OMNI_HOME clones happened
  to be checked out at, ignoring the consuming repo's uv.lock. On 2026-06-11 the 11:20Z --no-cache rebuild
  onto omnimarket dev vendored a 13-day-stale omnibase_infra 0.37.0-dev (~2c1d672f, pre-OMN-12501 Protocol-quarantine
  guard) + omnibase_core 0.42.0 even though omnimarket dev's uv.lock pins omnibase-infra 0.38.1 @ e2dbdc95
  / omnibase-core 0.44.0 @ c97c2c9a. The stale image dropped the OMN-12501 guard that converts the node_overseer_observer
  Protocol-handler failure into a non-fatal quarantine, so wire_from_manifest crashed bootstrap fatally
  (stability lane down on demo day; this is the deploy-composition trigger condition in RESOLVER-CRASH-DIAGNOSIS.md
  fault classification (c)). Fix + recurrence ratchet in omnibase_infra PR #1936: a new preflight (check_sibling_lock_pins.py)
  makes the consuming repo's uv.lock the pin authority — it parses expected version+git-rev per package
  (scoped to the package's own source line so editable/registry pins are not cross-attributed a dependency's
  rev), resolves the actual canonical-clone version+HEAD, compares, classifies drift backward/forward/none,
  and fails fast (exit 1; build aborts exit 3 via stage_workspace.sh) on any unacknowledged drift. --allow-drift
  records an explicit operator override durably, never silent. compute_workspace_provenance.py folds the
  expected-vs-actual comparison into build-provenance.json for deploy verifiers; Dockerfile.runtime COPYs
  the artifact. Scripts/test-only change to the build tooling; no node contract, topic schema, envelope,
  or runtime API change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "tests"
    description: >
      TDD-first unit suite (written red before the module existed) covers lock parsing across git/registry/editable
      sources, drift classification, the exact 0.37.0-vs-0.38.1 stale case, the check_pins exit codes
      (0 pass / 1 drift / 2 malformed input), and the --allow-drift override.
    command: "uv run pytest tests/unit/scripts/test_check_sibling_lock_pins.py -q"
