ticket_id: "OMN-13218"
title: "Delegation quality gate hard-fails behaviorally-correct SHORT outputs on a 100-char length floor"
summary: >-
  OMN-13218 makes the delegation quality gate task-class-aware so it no longer hard-fails behaviorally-correct
  SHORT outputs purely on character length. The blunt min_length_chars_N heuristic on the short-output
  task classes (summarization, document, documentation) rejected a correct one-sentence summary with WEAK_OUTPUT
  len<100, which (since OMN-13140) forced wasteful escalation up to the ceiling tier and terminal no_higher_tier_available.
  The omnimarket PR introduces a length-independent semantic_adequacy heuristic in node_delegation_quality_gate_reducer
  and swaps it in for min_length_chars_N on those three classes: a complete answer passes at any length
  while empty/whitespace, mid-token-truncated, dangling-clause, and bare-fragment outputs still fail.
  The OMN-12964 calibration corpus is updated to match and to add short-correct GOOD cases; the per-class
  margin and non-degenerate score distribution gates both still hold. Same root cause as the held prod
  min-length item.
