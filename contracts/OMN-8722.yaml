ticket_id: "OMN-8722"
title: "fix(OMN-8722): eliminate stub framing in node_quality_scoring_compute"
summary: >-
  node_quality_scoring_compute carried four stub strings and a stub-tracking field even though its temporal-relevance
  (code-freshness) scorer was already real and wired into the dimension-weight aggregate. The omnimarket
  fix removes the stub-tracking tracking_url field and the 'stub' status from ModelQualityScoringMetadata,
  drops the now-unneeded '# stub-ok' annotation on _compute_temporal_relevance_score (rewording its docstring
  off TODO/FIXME markers), replaces the two hardcoded last-resort dimension dicts (temporal_relevance:
  0.0) with create_error_dimensions(), and clears the 'stub' wording from contract.yaml. A deterministic
  regression test fails if any 'stub' string or the tracking_url field is reintroduced and asserts real
  temporal-relevance behavior.
is_seam_ticket: false
interface_change: false
