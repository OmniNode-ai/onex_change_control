schema_version: "1.0.0"
ticket_id: "OMN-14333"
title: "feat(OMN-14333): node_generated_code_validator + node_mypy_check_effect — codegen factory tier-3"
summary: >-
  omnimarket product PR #1708 (branch jonah/omn-14333-codegen-tier3, head 4d8cebb6492eadc9647f20d0f42e4e35e3d88da1)
  adds two codegen-factory tier-3 nodes. node_generated_code_validator is a pure COMPUTE node: it parses
  the artifact SOURCE TEXT supplied in the request (never reads disk) and returns typed diagnostics over
  three deterministic checks — parses, stub bodies (empty/pass/ellipsis/docstring-only, raise NotImplementedError,
  or a stub comment marker; sync and async), and structure (expected class/base/required-methods). The
  stub logic is RE-DERIVED in-module, not an in-process call to node_stub_detector. node_mypy_check_effect
  is an EFFECT that OWNS the subprocess + filesystem I/O: it writes the artifact to an isolated tempdir
  and shells out to `python -m mypy`, parsing typed diagnostics from stdout. mypy is an existing repo
  dev tool, so no new third-party runtime dependency is added. CONTRACT + NODE + HANDLER only (rule 7a);
  no Plugin* base, no node-calling-node.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "public_api"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
