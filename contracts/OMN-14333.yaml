  - id: "dod-001"
    description: >-
      Independent adversarial verification at product head 4d8cebb6492eadc9647f20d0f42e4e35e3d88da1 (verifier
      did not implement the PR). Tests: node_generated_code_validator + node_mypy_check_effect protocol
      suites pass 31/31 (validator 22 incl. a x5-parametrized stub-shape case + mypy effect 9). Mutation-discrimination
      (each mutation reverted, worktrees left clean): four semantic mutations were each caught RED — validator
      empty-body detection disabled -> 5 fail; validator raise-NotImplementedError detection disabled
      -> 1 fail; validator comment-marker detection disabled -> 1 fail; mypy diagnostic parser neutered
      (parse zero lines) -> 3 fail (the type-erroring artifact would falsely report success), proving
      the suites are behavior-discriminating, not vacuous. COMPUTE purity (validator): imports only ast/io/tokenize
      (stdlib, in-memory) plus its own models; NO file/network/subprocess I/O; it parses request.source_text
      and the stub logic is re-derived (no node_stub_detector import). EFFECT I/O-isolation (mypy): all
      subprocess + temp-file I/O lives in node_mypy_check_effect behind an isolated tempfile.TemporaryDirectory
      + isolated mypy cache-dir; the tests shell out to REAL mypy (not mocked) and assert mypy_available
      is True so a missing checker fails rather than passing vacuously. No Plugin* base and no cross-node
      imports (each node imports only its own models). Gates: ruff check clean, ruff format clean (12
      files), mypy --strict clean (12 source files), runtime import-check clean (352 entry points, both
      new nodes registered), node metadata dependency scope PASS. Contracts declare node_type compute
      (pure) + effect (side_effect) respectively.
    source: "manual"
