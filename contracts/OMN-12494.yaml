ticket_id: "OMN-12494"
title: "Materialize savings_estimates projection from source delegation events"
summary: >-
  Close the projection gap: savings_estimates was only materialized from the derived delegate-skill terminal
  event, leaving the Delegation Savings widget truthfully-empty for the canonical onex.evt.omniclaude.task-delegated.v1
  stream that drives delegation_events. node_projection_savings now subscribes to that source stream and
  materializes a savings_estimates row from it. The figures are MEASUREMENTS, not estimates: local = the
  measured actual cost (OMN-13355), cloud = the pinned premium counterfactual, savings = cloud - local.
  Idempotent on the (session_id, event_timestamp, model_local, model_cloud_baseline) identity index; replay-deterministic;
  truthful-empty (no row) when there is no pinned counterfactual. Proven by the omnimarket source-materialization
  suite (6 passing) including the idempotent-replay and truthful-empty cases.
