  Binds omnimarket PR #1139, which repairs the broken Linear write path
  (resolve state name -> workflow-state UUID and call issueUpdate(input:{stateId});
  remove the invalid stateName field that 400'd every mutation) and excludes
  onex_change_control receipt PRs from done-detection so OCC evidence artifacts no
  longer produce false-positive auto-close candidates.
