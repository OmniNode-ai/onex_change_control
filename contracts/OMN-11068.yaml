---
schema_version: "1.0.0"
ticket_id: "OMN-11068"
title: "fix(OMN-11068): fail runtime health probes when runtime is degraded unavailable"
summary: >-
  Runtime /health now returns HTTP 503 while RuntimeHostProcess is not attached or explicitly reports
  is_running=false, preventing Docker healthchecks from marking the stability-test runtime healthy while
  the runtime is pending or stopped.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
evidence_requirements:
  - kind: "tests"
    description: "Runtime health endpoint tests pass for runtime_pending and is_running=false failure
      semantics."
    command: >-
      uv run pytest tests/unit/runtime/test_service_health.py tests/integration/test_omn_9741_health_liveness.py
      -q
  - kind: "tests"
    description: "Stability-test runtime compose tests pass for inherited curl --fail healthchecks."
    command: >-
      uv run pytest tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
      -q
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-runtime-health-http-status"
    description: "Runtime /health fails Docker probes when runtime is pending or not running."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          test -f drift/dod_receipts/OMN-11068/dod-runtime-health-http-status/command.yaml && grep -q
          '^status: PASS$' drift/dod_receipts/OMN-11068/dod-runtime-health-http-status/command.yaml &&
          grep -q 'pr_number: 1042' drift/dod_receipts/OMN-11068/dod-runtime-health-http-status/command.yaml
  - id: "dod-stability-compose-healthcheck"
    description: "Stability-test runtime compose healthchecks inherit curl --fail /health probes."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          test -f drift/dod_receipts/OMN-11068/dod-stability-compose-healthcheck/command.yaml && grep
          -q '^status: PASS$' drift/dod_receipts/OMN-11068/dod-stability-compose-healthcheck/command.yaml
          && grep -q 'pr_number: 1042' drift/dod_receipts/OMN-11068/dod-stability-compose-healthcheck/command.yaml
  - id: "dod-runtime-health-pr-1765"
    description: "omnibase_infra PR #1765 is the rebased healthcheck fix replacing closed PR #1608."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "gh pr view 1765 --repo OmniNode-ai/omnibase_infra --json state,title | grep -q 'healthcheck'"
  - id: "dod-occ-pr-1715"
    description: "OCC PR #1715 carries the replacement OMN-11068 receipt binding for omnibase_infra PR
      #1765."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: "gh pr view 1715 --repo OmniNode-ai/onex_change_control --json state,title | grep -q '11068'"
  - id: "dod-deploy-validation"
    description: "Post-merge deploy validation: runtime image rebuild with healthcheck fix deployed to stability-test lane."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "deploy omnibase_infra runtime image after merge; verify docker compose healthcheck probe returns 503 before runtime attachment and 200 after is_running=true"
