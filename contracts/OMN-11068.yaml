---
schema_version: "1.0.0"
ticket_id: "OMN-11068"
title: "fix(OMN-11068): fail runtime health probes when runtime is degraded unavailable"
summary: >-
  Runtime /health now returns HTTP 503 while RuntimeHostProcess is not attached or explicitly reports
  is_running=false, preventing Docker healthchecks from marking the stability-test runtime healthy while
  the runtime is pending or stopped.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - public_api
evidence_requirements:
  - kind: "tests"
    description: "Runtime health endpoint tests pass for runtime_pending and is_running=false failure
      semantics."
    command: >-
      uv run pytest tests/unit/runtime/test_service_health.py tests/integration/test_omn_9741_health_liveness.py
      -q
  - kind: "tests"
    description: "Stability-test runtime compose tests pass for inherited curl --fail healthchecks."
    command: >-
      uv run pytest tests/unit/infra/test_stability_test_runtime_lane.py tests/integration/infra/test_stability_test_runtime_compose_render.py
      -q
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
dod_evidence:
  - id: "dod-runtime-health-http-status"
    description: "Runtime /health fails Docker probes when runtime is pending or not running."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          test -f drift/dod_receipts/OMN-11068/dod-runtime-health-http-status/command.yaml && grep -q
          '^status: PASS$' drift/dod_receipts/OMN-11068/dod-runtime-health-http-status/command.yaml &&
          grep -q 'pr_number: 1041' drift/dod_receipts/OMN-11068/dod-runtime-health-http-status/command.yaml
  - id: "dod-stability-compose-healthcheck"
    description: "Stability-test runtime compose healthchecks inherit curl --fail /health probes."
    source: "manual"
    checks:
      - check_type: "command"
        check_value: >-
          test -f drift/dod_receipts/OMN-11068/dod-stability-compose-healthcheck/command.yaml && grep
          -q '^status: PASS$' drift/dod_receipts/OMN-11068/dod-stability-compose-healthcheck/command.yaml
          && grep -q 'pr_number: 1041' drift/dod_receipts/OMN-11068/dod-stability-compose-healthcheck/command.yaml
