schema_version: "1.0.0"
ticket_id: "OMN-13146"
title: "Unify the two event registries into one canonical source + structural drift gate"
summary: >-
  There were two parallel event registries describing the same hook -> Kafka fan-out routing: the hook-side
  omniclaude EVENT_REGISTRY (Python, hooks/event_registry.py + the TopicBase enum) and the emit-daemon-side
  omnimarket topics.yaml (YAML, loaded by node_emit_daemon at runtime). The prior drift validator (OMN-10127)
  compared topic SETS only, so the two could silently diverge on every other field -- and they had: task.delegated.required_fields
  was missing delegated_to on the YAML side (delegated_to is required by the omniclaude hook registry,
  the delegation golden chain, and the SQLite projection). This promotes topics.yaml to the single canonical
  registry, fixes the delegated_to drift, and turns the OMN-10127 validator into a full STRUCTURAL comparison
  (event-type membership + per-event fan-out topic set, partition_key_field, and required_fields). The
  validator is wired as both a pre-commit hook and the required "Event Registry Drift" CI gate. omnimarket
  PR #1220.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
