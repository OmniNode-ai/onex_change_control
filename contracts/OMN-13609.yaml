title: "WS-C Phase 1.1: Port model-class-name validator check into canonical validator platform"
summary: >-
  Ports the SEA generation pipeline's model_types check (contract-declared input_model/output_model class
  names must exist in the generated handler) into the canonical validator platform named by the Phase-1
  gate OMN-13608: omnibase_core.validation / ValidatorContractLinter. Adds the module-level authority
  function validate_model_class_existence (invoked by both the linter and node_generation_consumer), wires
  it as an always-run guardrail in the contract linter, and ships a pre-commit hook + CI gate enforcement
  wrapper. Scope is inline generated models only; hand-authored nodes that declare a dotted importable
  model path are out of scope. Product PR: omnibase_core #1347.
