  + invocation path. NO new validator logic is created in this ticket -- this is a name-only gate that
  clears Phase 1.1 (OMN-13609), Phase 1.2 (OMN-13610), and Phase 6.1 (OMN-13623). No envelope/contract-API
  change, no live-lane mutation.
