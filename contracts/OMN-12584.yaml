schema_version: "1.0.0"
ticket_id: "OMN-12584"
title: "fix: runner-image prebuilt-env bake fails on uv cache EACCES + add build smoke gate"
summary: >-
  Fixes the OMN-12567 versioned runner image, which had never built. The docker/runners/Dockerfile prebuilt-env
  bake step crashed with "uv sync -> failed to create directory /home/runner/.cache/uv: Permission denied
  (os error 13)": mkdir -p of the ci-envs root runs as root and creates the parent /home/runner/.cache
  as root:root, while the following chown only covers the omni/ci-envs subtree, so the runner user cannot
  create its default ~/.cache/uv after USER runner. The primary fix widens the existing chown to cover
  /home/runner/.cache before USER runner. This is identity-neutral: the Dockerfile is not part of the
  runner_image_identity binding, so docker/runners/runner-image.lock.json identity_digest is unchanged
  (231ae5fa883556778e9db274f1d5f83b, confirmed via runner_image_identity.py --mode verify). The enforcement
  fix adds .github/workflows/runner-image-build-smoke.yml, which actually builds docker/runners/Dockerfile
  through the prebuilt-env bake stage to a throwaway tag (no push, no fleet contact) on any PR touching
  docker/runners/** or the runner-image scripts, and asserts the baked identity equals the lock identity_digest
  plus a ready prebuilt env exists. A non-building runner image can no longer merge green. Proven non-destructively
  on the .201 linux/amd64 host: a from-scratch docker build --no-cache succeeds, the bake completes, and
  scripts/ci/validate_runner_image.py reports GREEN; the live 48-runner fleet and omninode-runner:latest
  were untouched.
is_seam_ticket: false
