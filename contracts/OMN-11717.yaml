---
schema_version: "1.0.0"
ticket_id: "OMN-11717"
title: "Create OCC nightly promotion contract"
summary: >
  Defines the OCC-owned nightly dev-to-main promotion contract and topic authority for onex.evt.occ.nightly-promotion.v1
  before any promotion workflow publishes the event. The authoritative wire schema is src/onex_change_control/wire_schemas/occ_nightly_promotion_v1.yaml.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "topics"
  - "events"
  - "envelopes"
evidence_requirements:
  - kind: "tests"
    description: >
      Focused OMN-11717 tests validate the promotion topic authority, 24h freshness SLA, required evidence
      input fields, and promotion receipt verifier_identity output.
    command: "uv run pytest tests/unit/test_omn_11717_promotion_contract.py -q"
  - kind: "manual"
    description: >
      Ticket contract validates against the central OCC ticket contract model, and the authoritative wire
      schema exists at src/onex_change_control/wire_schemas/occ_nightly_promotion_v1.yaml.
    command: "uv run validate-yaml contracts/OMN-11717.yaml"

dod_evidence:
  - id: "dod-promotion-contract-test"
    description: "OMN-11717 focused promotion contract regression test passes."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11717/dod-promotion-contract-test/command.yaml"
          && grep -q '62 passed' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11717/dod-promotion-contract-test/command.yaml"
  - id: "dod-ticket-contract-valid"
    description: "OMN-11717 central ticket contract validates with OCC YAML validation."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11717/dod-ticket-contract-valid/command.yaml"
          && grep -q 'contracts/OMN-11717.yaml' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-11717/dod-ticket-contract-valid/command.yaml"

emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
