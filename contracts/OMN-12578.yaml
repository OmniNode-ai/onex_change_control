      lane topic. The receipt captures a live deploy-lane broker probe (docker exec rpk) confirming the
      reduced topic exists and the reducer consume group is still absent — the wiring target this work
      enables on next deploy. The probe targets the .201 deploy lane and cannot re-run on the CI runner,
      so the check asserts the receipt carries the real captured deploy probe and the migration text."
    source: "manual"
    status: "verified"
    checks:
      - check_type: "command"
        check_value: >-
          grep -q '^status: PASS$' "$CONTRACT_REPO_DIR/drift/dod_receipts/OMN-12578/dod-reducer-projection-deploy-sink/command.yaml"
