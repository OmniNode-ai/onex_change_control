---
schema_version: "1.0.0"
ticket_id: "OMN-12578"
title: "Wire node_deployment_evidence_reducer projection sink (Phase 3)"
summary: >-
  Bind central evidence for omnimarket PR carrying Phase 3 of the node-based runtime deployment design.
  node_deployment_evidence_reducer declared the deployment_evidence_projection and deployment_readiness_projection
  surfaces but shipped no migration backing them, which is why the reducer was never wired (no consumer
  group on any .201 deploy lane). This change adds the projection sink migration, switches the reducer
  handler to the canonical ProtocolProjectionDatabaseSync (_db) projection path used by node_evidence_dashboard_reducer
  so the runtime auto-wiring mints the consume group and readiness derives from reducer-owned projection
  rows, and aligns the contract projection_api with both tables. Per-lane consumer groups for node_occ_pr_writer_effect
  / node_readiness_gate_orchestrator / node_evidence_pipeline_orchestrator remain absent on dev/prod and
  Empty on stability-test (blocker B3); that wiring requires a runtime deploy, which is out of scope.
is_seam_ticket: false
interface_change: true
interfaces_touched:
  - "topics"
  - "envelopes"
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
