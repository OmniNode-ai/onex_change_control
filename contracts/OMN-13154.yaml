schema_version: "1.0.0"
ticket_id: "OMN-13154"
title: "Orphan-node guard counts only dirs with contract.yaml — no false-positive orphans from deletion
  cruft"
summary: >-
  tests/unit/nodes/test_skill_node_coverage.py::test_no_orphaned_nodes (the skill<->node 1:1 enforcement
  ratchet) walked the live filesystem and treated ANY src/omniclaude/nodes/node_skill_*_orchestrator directory
  as a node, even a bare leftover shell containing only a __pycache__ directory left behind after a node's
  source was deleted. Such shells are not nodes — the canonical definition of an ONEX node is a directory
  containing a contract.yaml (CONTRACT/NODE/HANDLER). In any working tree carrying deletion cruft they
  surfaced as false-positive orphaned nodes (auto-ticket-from-findings, begin-day, crash-recovery, overnight),
  while a clean CI checkout stayed green — a tree-state-dependent guard. Fix: _get_node_skills() now requires
  (d / "contract.yaml").is_file() before counting a directory as a node. This tightens the node definition
  to match canonical architecture and is NOT an assertion weakening — a real orphaned node (a directory
  WITH a contract.yaml but no matching skill) is still flagged. Test-only change to tests/unit/nodes/test_skill_node_coverage.py.
  No source or runtime changes.
