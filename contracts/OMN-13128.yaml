title: "fix(runtime): independent per-terminal-topic consumers in Pattern B broker direct-Kafka wait (OMN-13118
  strike-5 follow-up)"
summary: >-
  OMN-13118 strike-FIVE follow-up. The context-ROI experiment consume-leg wedge survived FOUR merged fixes
  — #1969 (set_topics metadata no-op), #1970 (partition-less assign-cap grace), #1971 (synchronous end_offsets()+seek()
  pin replacing lazy seek_to_end) — yet the STRONG K>=10 multi-cell reprobe on the isolated stability
  lane STILL WEDGED on REBUILD-5 (image revision cdf53d963f7b, the #1971 merge commit), verifier-confirmed
  in docs/evidence/2026-06-12-weekend-pass/experiments/probe4-stability/reprobe-K10-rebuild5/HALT_K10_WEDGE_PERSISTS.md.
  Converged diagnosis across strikes 3+4 (decision record docs/evidence/2026-06-12-weekend-pass/experiments/exp1/CONSUME_LEG_DECISION.md):
  the runtime waits for each trial's terminal across TWO topics (node-generation-completed.v1 + node-generation-failed.v1).
  RuntimePatternBBroker._dispatch_and_wait_with_direct_kafka_consumer assigned the partitions of BOTH
  topics to a SINGLE ephemeral group_id=None AIOKafkaConsumer. A single aiokafka consumer holds ONE manual
  subscription (ManualSubscription over its assigned partitions); the live runner log captured the alternating
  'Updating subscribed topics' flip and a clean 1:1 cid pairing — the correlation_id PUBLISHED to COMPLETED
  in cycle N is the cid whose FAILED-topic wait FAILS in cycle N+1. The COMPLETED delivery window collapsed
  before it surfaced the correlated record, so the trial never correlated and the K>=10 matrix re-fired
  cell 1 forever (ZERO non-degenerate rows; projection 0 rows for the run_id). None of the four prior
  fixes touched the single-consumer-both-topics structure; they fixed assign-cap and seek-offset timing
  only. Fix (src/omnibase_infra/runtime/service_pattern_b_broker.py): give EACH terminal topic its OWN
  independent AIOKafkaConsumer via the module-level open_direct_terminal_consumer — each started, assigned,
  and offset-pinned (end_offsets()+seek(), #1971) at open() BEFORE the worker command is published (subscribe-before-publish).
  The two waits then run CONCURRENTLY via asyncio.wait(..., FIRST_COMPLETED) in a new _race_correlated_terminals
  helper; the first correlated terminal wins, the losing wait is cancelled, and both consumers are torn
  down together. No consumer ever holds two subscriptions, so there is no subscription to tear down out
  from under the COMPLETED delivery. The #1970 partition-less no-op and the #1971 synchronous offset pin
  are preserved unchanged inside open_direct_terminal_consumer / poll_direct_terminal_consumer, which
  each independent consumer goes through. The now-dead single-consumer helpers (_assign_terminal_topic_partitions,
  the method-level _refresh_terminal_topic_metadata, _direct_kafka_* kwargs builders, _kafka_bootstrap_servers/_kafka_event_bus)
  are removed. ACCEPTANCE IS NOT DECIDED HERE: the consume-leg wedge is declared cleared ONLY by the LIVE
  K>=10 multi-cell reprobe on the stability lane (a later rebuild-6 phase), never by the unit/integration
  repro. A green offline repro is necessary but NOT sufficient — that is the explicit lesson of four prior
  RED->GREEN unit fixes that each wedged live. This contract carries the SOURCE fix and the strengthened
  real-dispatch-path repro only.
