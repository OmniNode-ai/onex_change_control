      the flip and burns its full per-arm window). GREEN with the fix in ~2.3s: each terminal topic gets
      its own non-flipping consumer, every trial correlates, both cells and both arms advance with non-degenerate
      rows, COMPLETED HWM climbs to 40 and FAILED HWM stays 0 (the exact live signature).
