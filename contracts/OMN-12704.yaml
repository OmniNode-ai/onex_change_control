schema_version: "1.0.0"
ticket_id: "OMN-12704"
title: "Wire coding/refactor/review delegation through node_delegate_skill_orchestrator"
summary: >-
  Central evidence for the OMN-12704 task.execute delegation path. coding/refactor/review requirements
  are wired to node_delegate_skill_orchestrator via an injectable ProtocolDelegationExecutor port; task.execute
  COMPOSES the delegation route rather than running custom consumers. The delegation route owns model/backend
  selection, quality-gate result, correlation id, and output content; task.execute aggregates the typed
  responses verbatim (additive-only) in ModelTaskExecutionResult.delegation_responses and never reinterprets
  delegation success. Dry-run names the route without executing; non-dry-run dispatches through the injected
  port, and a sync handle rejects execute_delegation as a typed failure. The product code carrying this
  delegation path landed on omnimarket dev under PR #1050 / commit eb134efb5 (the PR tree was titled OMN-12705
  but the same merge carries the OMN-12704 delegation symbols and tests). This OCC contract is the durable
  evidence pairing that closes OMN-12704.
is_seam_ticket: true
interface_change: true
interfaces_touched:
  - "public_api"
