schema_version: "1.0.0"
ticket_id: "OMN-12956"
title: "Route node_overseer_observer handler_routing to concrete Null* impls (main-runtime bootstrap crash)"
summary: >
  node_overseer_observer/contract.yaml (omnimarket) routed handler_routing.handlers to the EvidenceEvaluator
  and SideEffectObserver typing.Protocol interfaces. The runtime handler resolver (omnibase_core ServiceHandlerResolver.resolve,
  reached via omnibase_infra _import_handler_class → getattr(import_module(module), name)) instantiates
  the routed class on its zero-arg path; a Protocol target raises TypeError: Protocols cannot be instantiated
  (typing.py:1774). The contract declares no runtime_profiles, so it defaults to main-profile ownership
  and is wired by the crashing main runtime, crash-looping bootstrap on infra builds predating the OMN-12501
  quarantine guard (infra <0.38.x). This is the fatal crash of omninode-stability-test-runtime on the
  2026-06-11 dev-HEAD rebuild (RESOLVER-CRASH-DIAGNOSIS.md). Fix routes handler_routing to the concrete
  NullEvidenceEvaluator / NullSideEffectObserver implementations already present in the same modules (the
  contract root handler: block already named NullEvidenceEvaluator). Adds a TDD recurrence ratchet (tests/validation/test_handler_routing_no_protocol_targets.py)
  that loads every omnimarket contract's handler_routing targets, resolves each via the same runtime path,
  and asserts no resolved class is a typing.Protocol; red on the pre-fix contract (2 failed), green post-fix
  (319 passed / 32 skipped). Contract-only YAML change to one node descriptor plus one new validation
  test; no topic schema, envelope, or contract API change. This is the first item of the next stability
  rebuild batch — merging to dev unblocks dev-HEAD deploys.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
