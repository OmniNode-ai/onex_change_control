schema_version: "1.0.0"
ticket_id: "OMN-12545"
title: "Consolidate duplicated dispatch enums to single CORE EnumDispatchStatus copy"
summary: >-
  Binds central OCC evidence for omnibase_core PR #1187, which merges the two infra-only members (NO_DISPATCHER,
  INTERNAL_ERROR) from the duplicate omnibase_infra.enums.enum_dispatch_status into the canonical core
  EnumDispatchStatus and wires them into is_terminal/is_error/get_description. The change is purely additive:
  no existing member, string value, or helper-method result changes, so the core enum becomes a lossless
  superset that lets the infra dup be deleted and importers repointed. ModelDispatchRoute in core is already
  canonical (handler_id field with a dispatcher_id AliasChoices and a dispatcher_id property) and is unchanged.
  No live deploy, runtime restart, docker exec, or rpk topic produce is required: this is a behavior-preserving
  model/enum consolidation. Phase 1A then lands the previously-deferred infra-side route consolidation
  across two PRs: omnibase_infra PR #2052 deletes the infra ModelDispatchRoute duplicate and single-sources
  on the canonical omnibase_core copy (shim + core alias retained for import-path stability), and omnimarket
  PR #1321 repoints the SEA-consumed delegation node node_delegation_orchestrator/wiring.py ModelDispatchRoute
  import infra->core and switches dispatcher_id= kwargs to the canonical handler_id= field. Both route
  PRs are behavior-preserving import/field repointings: omnibase_infra mypy --strict clean (2493 files),
  full suite 6949 passed, single-source re-grep clean; omnimarket mypy --strict clean (2428 files), full
  suite 7705 passed, single-source re-grep clean. Still no live deploy required.
is_seam_ticket: false
