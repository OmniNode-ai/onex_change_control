schema_version: "1.0.0"
ticket_id: "OMN-13170"
title: "Honor backend timeout_ms in the delegation transport (delete hardcoded 120s cap)"
summary: >-
  P0 delegation transport fix. The local delegation dispatch path (node_delegate_skill_orchestrator LocalDelegationDispatchPort
  -> node_llm_delegation_call_effect HandlerLlmDelegationCall -> transport.post_chat_completion) capped
  every call at a hardcoded post_chat_completion(timeout_seconds=120.0), ignoring each backend's configured
  timeout_ms (even 300000). Large generations (raised to 64k tokens per OMN-13161) exceeded 120s and failed
  with error_message="request timed out", output_tokens=0, while a direct curl to the same endpoint succeeded;
  raising the overlay timeout_ms had no effect. This threads the contract-resolved per-backend timeout
  end to end: resolve_delegation_backend reads timeout_ms (fail-closed on missing/non-int/non-positive,
  mirroring the OMN-13161 max_tokens pattern) and carries it on ModelResolvedDelegationBackend.timeout_ms;
  the new resolve_timeout_seconds(ms -> s) converts at the orchestrator; ModelLlmDelegationCallRequest
  carries a required timeout_seconds (gt=0, no silent default); LocalDelegationDispatchPort threads backend.timeout_ms
  / 1000 into the request; the handler passes request.timeout_seconds to post_chat_completion; and the
  post_chat_completion timeout_seconds parameter is now required with the hardcoded 120.0 default deleted.
  The bus orchestrator path (node_delegation_orchestrator -> ModelInferenceIntent -> handler_inference_intent)
  already threaded routing_decision.timeout_ms / 1000 and is unchanged. No Kafka topic schema change,
  no DDL/migration, no runtime/deploy/.201 mutation. Code PR: omnimarket #1249 (branch jonahgabriel/omn-13170-delegation-transport-ignores-backend-timeout_ms-hardcoded,
  base dev).
