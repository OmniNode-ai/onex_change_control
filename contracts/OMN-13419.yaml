schema_version: '1.0.0'
ticket_id: OMN-13419
title: >-
  Consolidate EventBusInmemory into omnibase_core; delete the omnibase_infra duplicate transport (single
  canonical in-memory bus)
summary: >-
  Phase 3b (B1 / OMN-7077 tail) of the local-first runtime re-convergence (epic OMN-13442). The 861-line
  in-memory transport in omnibase_infra/event_bus/event_bus_inmemory.py is deleted; the single canonical
  EventBusInmemory transport now lives in omnibase_core.event_bus.event_bus_inmemory (the zero-dep transport
  implementing the spi ProtocolEventBus). The infra module becomes a ~270-line thin adapter that SUBCLASSES
  the core transport and inherits all transport behavior (deque history, async lock, FIFO ordering, topic
  offsets, subscriber registry, per-subscriber circuit breaker). It overrides ONLY the infra-contract
  boundary the pinned core release does not yet provide - JUSTIFIED real infra concerns - (1) infra-typed
  ModelEventMessage/ModelEventHeaders (str schema_version vs core ModelSemVer) so the infra runtime, EventBusKafka,
  node handlers and 50+ tests receive the model they are typed against, (2) the infra error taxonomy InfraUnavailableError/ProtocolConfigurationError
  (core raises ModelOnexError), (3) the dict-shaped health_check() the RuntimeHostProcess + ServiceRuntimeHealthMonitor
  read, and (4) get_consumer_groups() (part of ProtocolEventBusLike alongside EventBusKafka). A blocking
  CI grep-lint (scripts/validation/check_no_infra_inmemory_import.sh, wired into .github/workflows/ci.yml
  Lint job AND pre-commit) blocks any import of omnibase_infra...event_bus_inmemory outside the small
  allowlist of infra-runtime wrapper modules, so node packages depend on core's bus only. No core changes
  (core pin held at db7f341, <0.47.0). This OCC contract is consumed by the omnibase_infra PR Receipt
  Gate via Evidence-Source.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
