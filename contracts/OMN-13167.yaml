schema_version: "1.0.0"
ticket_id: "OMN-13167"
title: "Delegation runtime: precise no-higher-tier terminal reason for test/research task classes"
summary: >
  The night autonomous runtime permutation matrix (2026-06-16) found test (dev lane, CID 122998c5) and
  research (stability-test lane, CID 31c0cf4e) delegation cells dead-end: the quality gate fails with
  fallback_to_claude=true but no usable higher tier is reached, terminating with a bare no_higher_tier_available
  that names neither the exhausted task-class escalation policy nor the missing tier. Both task classes
  declare the closed-set policy local -> cheap_cloud -> claude (OMN-13157); in the dev/stability-test
  lanes the claude tier (cli-codex backend) was unconfigured, so next_eligible_tier correctly returned
  None once the configured tiers were exhausted, but the orchestrator emitted only the opaque token. Fix
  adds describe_no_higher_tier_available() to the routing authority and emits it as terminal_failure_reason
  at both no-higher-tier sites (gate-result and inference-error paths). The string names the exhausted
  policy (task class + declared closed-set tier_order), the current tier, and each higher tier with the
  precise skip reason (excluded, cloud_routing_blocked, above_pricing_ceiling, no_routable_backend_for_task),
  behind the stable NO_HIGHER_TIER_REASON_TOKEN prefix so it stays machine-keyable for projections. When
  a higher tier IS configured, escalation advances to it unchanged (verified: test/research reach claude
  when cli-codex is configured). Code-only handler change to omnimarket; no topic schema, envelope, or
  contract API change.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
