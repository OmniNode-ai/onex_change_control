ticket_id: "OMN-13622"
title: "WS-C Phase 5.3: Route ticket_contract/* to canonical ticket models + services (ROUTE)"
summary: >
  Wave-1 of the SEA -> canonical migration (epic OMN-13604). Routes the bespoke SEA src/ticket_contract/*
  ticket-contract generation, gates, and chain logic to the canonical, runtime-wired omnimarket nodes
  and deletes the SEA duplicate after parity (no shim). The ROUTE verification gate was probed on disk
  + runtime: (1) omnibase_core ticket models (ModelTicketContract, model_ticket_context_bundle) already
  exist and were already imported by SEA -- no core edit; (2) the omnibase_infra "ticket service" (AdapterTicketLinear
  / deprecated ProtocolTicketService) is a Linear READ adapter only and does NOT own ticket-contract generation,
  gates, golden-chain, test-gen, or context-pack -- the literal "route to omnibase_infra ticket services"
  target fails; (3) the capability IS canonically homed and runtime-wired in omnimarket as registered
  onex.nodes entry points: node_ticket_classify_compute, node_test_generator_compute, node_golden_chain_generator_compute,
  node_context_bundle_generator_compute, node_context_pack_builder_compute, node_readiness_gate_orchestrator,
  node_closeout_verifier_compute. The planning-time omnibase_infra target was a guess the plan table flagged
  "confirm service"; the correct runtime-wired home is omnimarket, where parity already exists (83 canonical
  node tests pass). Because the canonical capability already exists and is live, this is a target-correction
  within ROUTE -- the bespoke SEA duplicate is deleted, no new node is built. SEA deletions (no shim):
  src/ticket_contract/ (9 modules), src/delegation/validation.py (dead research-only aggregator; only
  consumer was its own test), and 7 deleted-code unit tests. Retarget: the entropy-experiment prompt omninode.md
  + its test now reference the canonical omnimarket nodes, not the deleted SEA package. No topic schema,
  envelope, or contract-API change to existing surfaces; no migration; no live-lane mutation; no live
  deploy.
