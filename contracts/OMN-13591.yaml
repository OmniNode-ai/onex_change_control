schema_version: "1.0.0"
ticket_id: "OMN-13591"
title: "fix(onex skill): run-identity injection missing on input-file dispatch path — merge_sweep and
  all args-taking skills fail 100%"
summary: >-
  RuntimeLocal._build_initial_payload had a branch asymmetry: the no-input-file path auto-filled required
  uuid.UUID/str/datetime fields, but the input-file path called cls(**raw) directly and crashed with ValidationError
  when correlation_id/run_id were absent. This made onex skill merge_sweep (and any args-taking skill
  whose node requires correlation_id/run_id) fail 100% since cli_skill.py writes an input file but never
  injects run-identity. The fix adds RuntimeLocal._inject_missing_run_identity() which, for dict payloads
  on the input-file branch, injects runtime-owned defaults for any required fields absent from the caller-supplied
  dict before strict validation. Caller-supplied values are never overwritten. uuid.UUID fields get uuid4(),
  str fields get a YYYYMMDD-HHMMSS-<6hex> slug satisfying min_length=1 and [A-Za-z0-9._-]+. Three regression
  tests lock the input-file injection path, caller-supplied preservation, and selective injection. All
  258 runtime tests green.
