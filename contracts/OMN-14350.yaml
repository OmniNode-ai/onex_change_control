  - id: dod-001
    description: "Independent adversarial verification of omnibase_core PR #1430 at head 793399ff9a48374fd74b4d635fad0ee09f8f2a72.
      Fail-closed proven: a fresh `class FooService` (and a bespoke `ServiceFooManager`, `BespokeDeploymentController`,
      `OrdersConnectionManager`) each drive the validator RED (exit 1), while the current tree + the 61-FQN
      allowlist is GREEN in both default and --check-stale modes. Over-suppression hunt: the 130 suppressed
      classes are all genuinely canonical (125 structural-prefix Model*/Protocol*/Enum*/Mixin*/TypedDict*,
      4 *Error DTO-suffix, 1 canonical per-node registry) — no bespoke lifecycle owner hides behind an
      exclusion; the 61 hard-fail residuals exactly equal the 61-FQN allowlist. --check-stale proven:
      renaming an allowlisted class so its FQN disappears makes the gate RED with exactly that stale entry
      (count-only-down holds); default mode stays GREEN. The gate's own unit suite passes 22/22."
    source: manual
    status: verified
    checks:
      - check_type: command
        check_value: 'grep -q ''^status: PASS$'' drift/dod_receipts/OMN-14350/dod-001/command.yaml &&
