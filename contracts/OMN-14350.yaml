summary: 'omnibase_core PR #1430 adds a new ratchet validator (src/omnibase_core/validators/no_noncanonical_lifecycle_classes.py)
  that flags CamelCase classes carrying a non-canonical lifecycle type-word (Service/Engine/Adapter/Router/Daemon/Manager/Runner/Registry/Controller/
  Server/Client) against a frozen 61-FQN allowlist (noncanonical_class_allowlist.yaml), wired as a pre-commit
  hook and a required Quality-Gate CI job (--check-stale, count-only-down). Canonical constructs (Model*/Protocol*/Enum*/Mixin*/TypedDict*/Node*/Handler*
  prefixes, *Error/*Result/*State/*Config DTO suffixes, per-node DI registries) are excluded as false
  positives. Canary scope: omnibase_core canary (#1430); fan-out to consumer repos is tracked per-PR via
  additional dod_evidence entries (first consumer: omnibase_infra #2258, dod-fanout-2258). No runtime
  contract, topic, migration, or deployed-service surface is touched; validator + CI-gate + tests only.'
