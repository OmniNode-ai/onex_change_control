schema_version: "1.0.0"
ticket_id: "OMN-12409"
title: "EFFECT nodes don't auto-publish returned models — no result_applier wired for effect contracts"
summary: >
  Central OCC evidence for omnibase_infra PR #2086. The PR fixes the auto-wiring gap where EFFECT and
  REDUCER contracts whose handlers return a model had the return silently dropped because no result_applier
  was wired for those contract types. The fix adds a manifest scan after filtered_manifest is built in
  service_kernel.py: for each contract with a non-empty published_events map not already in auto_wiring_result_appliers,
  a DispatchResultApplier is built from the contract's resolved contract_path. ORCHESTRATOR pre-registrations
  are preserved (no overwrite). Covers all EFFECT, REDUCER, and COMPUTE contracts with published_events
  — not just hard-coded delegation worker names.
