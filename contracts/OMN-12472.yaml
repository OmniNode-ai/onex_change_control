ticket_id: "OMN-12472"
title: "Track B as a routing intent consuming omnimarket routing (drop SEA-local ladder)"
summary: >
  Make SEA Track B a contract-native routing intent that CONSUMES the omnimarket ModelRoutingDecision
  (onex.evt.omnibase-infra.routing-decision.v1) instead of owning a SEA-local escalation ladder. Delete
  src/pipeline_local/consumer_local.py (the GenerationConsumerLocal subclass, the hardcoded track_id/provider/endpoint_class
  strings, the cost_basis = "ZERO_MARGINAL_API_COST" string, and the _calculate_cost override). Track
  B becomes a declarative intent (tier=coding_primary, cloud_opt_in=false) with the consumer_group moved
  to the Kafka ingress contract and zero-marginal cost derived from the local tier's EnumModelCostBasis
  in model_registry.yaml; with no local route available and cloud_opt_in=false it fails closed with RouteNotFoundError
  rather than degrading to cloud. No httpx added in SEA; inference still flows through the InferenceClient
  bus seam.
