title: "fix: HandlerProjectionOvernightPhaseEnd + SessionComplete DI crash-loop — make session_start_handler
  optional"
summary: >
  HandlerProjectionOvernightPhaseEnd and HandlerProjectionOvernightSessionComplete required session_start_handler:
  HandlerProjectionOvernightSessionStart in __init__, which the declarative service_handler_resolver cannot
  satisfy. Fix makes session_start_handler optional (default None); each handler instantiates HandlerProjectionOvernightSessionStart()
  internally when not provided.
