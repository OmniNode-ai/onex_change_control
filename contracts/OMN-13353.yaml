schema_version: "1.0.0"
ticket_id: "OMN-13353"
title: "fix(omnimarket): make node_gap_compute missing_event_bus probe archetype-aware"
summary: >-
  node_gap_compute's missing_event_bus_contract probe (handler_gap_compute.py) flagged every contract
  lacking a top-level event_bus dict as a CONTRACT_DRIFT WARNING regardless of node archetype, producing
  ~116 mostly-noise WARNINGs across the cross-repo gap sweep. Pure-compute archetypes (compute/COMPUTE_GENERIC,
  transformer, aggregator, function, model) are invoked in-process and return a typed result synchronously
  per the omnibase_core handler-output constraints, so they have no required bus surface; flagging them
  is a false positive that drowns out the real signal (orchestrator/reducer/effect nodes that genuinely
  must touch the bus but declared no event_bus). This change resolves each contract's node_type to its
  canonical EnumNodeKind via a new _resolve_node_kind helper (normalizing the lowercase archetype words
  and the *_GENERIC / specific EnumNodeType forms, the same mapping omnibase_core uses in MixinNodeTypeValidator
  / ContractMergeEngine) and maps to EnumNodeKind via EnumNodeType.get_node_kind. When event_bus is missing
  and the resolved kind is COMPUTE or RUNTIME_HOST, the probe records a ModelSkippedGapProbe instead of
  a WARNING; EFFECT/REDUCER/ORCHESTRATOR kinds keep the WARNING; unknown or absent node_type resolves
  to None and keeps the WARNING (fail loud, never silently suppress). Adds three parametrized TDD tests
  to tests/test_golden_chain_gap_compute.py. Detection-tooling-only change in omnimarket node_gap_compute;
  no runtime node, no contract topic change, no image build input change, no .201 mutation.
is_seam_ticket: false
