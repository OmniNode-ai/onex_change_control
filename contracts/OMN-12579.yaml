title: "Wire evidence-pipeline scaffolding from deployment proof (Phase 4)"
summary: >-
  Bind central evidence for omnimarket Phase 4 of the node-based runtime deployment design. The change
  wires evidence-collected -> evidence-extracted collection from a runtime deployment proof
  (ModelRuntimeDeploymentProof produced by node_redeploy) via a new pure bridge
  (evidence_command_from_deployment_proof) and a DeploymentProofEvidenceCollectorAdapter, and confirms
  node_occ_pr_writer_effect consumes onex.evt.omnimarket.evidence-validated.v1 and emits a provisional OCC
  PR on onex.evt.omnimarket.occ-pr-created.v1. Phase 4 stands up the consumers only; evidence-validated
  traffic is produced by the Phase 5 validator (OMN-12580), so the chain is exercised end-to-end only once
  Phase 5 lands. No parallel deployment orchestrator or new deploy/build/probe effect node is introduced;
  node_redeploy remains the only deployment orchestrator.
