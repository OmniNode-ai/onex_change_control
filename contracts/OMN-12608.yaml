ticket_id: "OMN-12608"
title: "Enforce SEA runtime-generation architecture invariant as a guard"
summary: >
  Wire the SEA runtime-generation inference architecture invariant as a BLOCKING static guard (pre-commit
  hook + named CI step + unit test), not advisory detection. SEA runtime generation must route inference
  through the bus-backed InferenceClient (src/pipeline/inference.py) and omnimarket delegation; the guard
  fails CI red on any re-introduced raw httpx/requests/aiohttp LLM chat-completions path or hardcoded
  max_tokens literal. max_tokens stays contract-owned via resolve_max_context_tokens(model) from routing_tiers.yaml.
  Non-LLM HTTP (the contract-declared MCP transport in node_mcp_transport_effect) is correctly not flagged.
  The fail-closed-on-truncation clause is conditional on the omnimarket ModelInferenceResponseData wire
  model surfacing finish_reason, which it does not yet expose; that facet is documented as a follow-up
  boundary rather than a speculative SEA-side guard. PARTIAL extension of the OMN-12468 family; relates
  to OMN-12472 and OMN-12480.
