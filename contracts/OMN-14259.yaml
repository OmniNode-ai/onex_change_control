  omnimarket product PR (branch jonah/omn-14242-w2-handler-convergence-compute, head 02c721245178b3c67f81d00bfc4376bee82a0f05)
  canonicalizes HandlerConvergenceCompute (node_review_convergence_compute) to the thin contract+handler
