---
schema_version: "1.0.0"
ticket_id: "OMN-13147"
title: "Remove hardcoded AWS CI identifiers in omninode_infra workflows + aislop ratchet"
summary: >-
  Rule-6 cleanup and Rule-5 enforcement for omninode_infra GitHub Actions workflows. Replaces the hardcoded
  AWS EC2 instance id in omnidash-health-gate.yml with a runtime tag lookup, moves the literal IAM role
  names in eight role-to-assume ARNs to repo variables (AWS_DEPLOY_ROLE_NAME / OIDC_ROLE_NAME), and adds
  an enforcement ratchet (.github/scripts/check_no_hardcoded_aws_ci_identifiers.py wired via ban-hardcoded-aws-ci-identifiers.yml)
  that fails CI if any literal AWS instance id, IAM ARN account id, ECR registry account id, or IAM ARN
  role name reappears in .github/workflows/**. Landed as omninode_infra PR #498 (merged into dev).
is_seam_ticket: false
interface_change: false
interfaces_touched: []
evidence_requirements:
  - kind: "manual"
    description: "omninode_infra PR #498 is merged into dev and removed the hardcoded AWS CI identifiers
      while adding the aislop ratchet."
    command: "gh pr view 498 --repo OmniNode-ai/omninode_infra --json number,state,mergeCommit,baseRefName"
  - kind: "tests"
    description: "The aislop ratchet self-tests pass (12 unit tests) and the guard reports the merged
      dev workflows tree clean."
    command: "python3 -m pytest .github/scripts/test_check_no_hardcoded_aws_ci_identifiers.py -q && python3
      .github/scripts/check_no_hardcoded_aws_ci_identifiers.py .github/workflows"
  - kind: "ci"
    description: "All required non-Receipt-Gate checks on omninode_infra PR #498 are green, including
      the new 'Ban Hardcoded AWS CI Identifiers' gate."
    command: "gh pr checks 498 --repo OmniNode-ai/omninode_infra --json name,state"
