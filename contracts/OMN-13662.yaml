schema_version: "1.0.0"
ticket_id: "OMN-13662"
title: "Classify delegate-skill terminals as explicit not_tier_routed in the delegation projection rollup"
summary: >-
  Define the projection rule for delegation terminals that carry no serving LLM tier. The delegate-skill
  terminal path (ModelDelegateSkillTerminalProjection) is skill->node delegation, not LLM-tier routing,
  so those delegation_events rows legitimately leave cost_tier_name empty (real column, omnimarket migration
  0018, populated on the LLM path by OMN-13649 / #1458). Per doctrine (no silent default, no consumer
  guessing) the tier rollup must classify these rows explicitly rather than letting each consumer derive
  a meaning. Decision: map empty cost_tier_name -> the explicit value 'not_tier_routed'; EXCLUDE those
  rows from tier-distribution percentage DENOMINATORS (so tier-routed percentages sum to 1.0 over LLM
  rows only) while still INCLUDING them in total task counts; surface the classification + the excluded
  count on the projection so the dashboard reads it and never re-derives it. Not 'unknown', not 'local',
  not silently dropped. Implemented as a projection VIEW change (psql-applicable CREATE OR REPLACE VIEW,
  no node redeploy needed): omnimarket PR #1462 adds node-owned migration 0021, which appends a by_tier
  jsonb column to projection_delegation_model_routing carrying total_tasks (inclusive), tier_routed_total
  (the denominator = rows with non-empty cost_tier_name), not_tier_routed_count (the excluded bucket),
  and per-tier tiers[] with pct_of_tier_routed gated on tier_routed_total > 0 (the not_tier_routed bucket
  gets pct 0; tier-routed pcts sum to 1.0). The model-routing.v1 projection_api exposure declares by_tier
  in columns + json_columns so the read surface serves the classification. No new node, no new REST route,
  no client-side computation, no terminal/wire DTO field; topics stay contract-sourced; the cost_tier_name
  column already exists (migration 0018), so no schema migration runs. Product PR: omnimarket #1462.
is_seam_ticket: false
interface_change: false
interfaces_touched: []
emergency_bypass:
  enabled: false
  justification: ""
  follow_up_ticket_id: ""
