  __main__.py, __init__ __getattr__) plus the golden-chain test are repointed at the shared owner, and
  the node-private client.py is deleted (no shim). This eliminates a cross-node-package import (Dependency-Elimination
  criterion) and is the decision-independent, low-runtime-risk step of Phase D. D2-D5 (registry re-home
  + wired-gate repoint, effect node, dev-lane shadow-mode parity, daemon deletion) are separate steps.
