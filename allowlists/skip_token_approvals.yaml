---
# skip_token_approvals.yaml — OMN-10417
#
# Allowlist of approved [skip-receipt-gate: <id>] tokens.
# Managed by @OmniNode-ai/platform-leads (see CODEOWNERS).
# Use scripts/grant-skip-approval.sh in omnibase_core to generate a new entry.
#
# Schema:
#   approvals:
#     - id:               <unique slug, e.g. appr-YYYYMMDD-NNN>
#       granted_by:       <github-login of approver>
#       granted_at:       <ISO-8601 UTC timestamp>
#       expires_at:       <ISO-8601 UTC timestamp — 7 days from granted_at is standard>
#       scope_repos:      [<repo-name>, ...]          # repos where this token is valid
#       scope_pr_numbers: [<int>, ...]                # REQUIRED — specific PR numbers only
#
# Rejection criteria enforced by receipt_gate.py (OMN-10417):
#   - id not in this list                          → FAIL
#   - expires_at in the past                       → FAIL
#   - current repo not in scope_repos              → FAIL
#   - current PR not in scope_pr_numbers           → FAIL
#   - granted_by == PR author                      → FAIL (self-approval)
#   - scope_pr_numbers missing or empty            → FAIL
#
# Every accepted bypass is logged to CI output with id, granted_by, and scope.

approvals: []
