---
# skip_token_approvals.yaml — externally-approved skip-receipt-gate token registry
#
# Schema per each entry:
#   id:              unique approval handle referenced as [skip-receipt-gate: <id>]
#   granted_by:      GitHub login of the approver (must NOT be the PR author)
#   granted_at:      ISO-8601 timestamp of approval
#   expires_at:      ISO-8601 timestamp after which the entry is rejected
#   scope_repos:     list of repo slugs the approval covers (e.g. OmniNode-ai/omnimarket)
#   scope_pr_numbers: list of PR numbers the approval covers (REQUIRED — unscoped entries are rejected)
#
# To add an entry, run scripts/grant-skip-approval.sh and get platform-leads review.
# CODEOWNERS requires @OmniNode-ai/platform-leads review on changes to this file.

entries: []
