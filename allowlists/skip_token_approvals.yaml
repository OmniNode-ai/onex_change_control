---
# skip_token_approvals.yaml — central registry for skip-token-allowed escape hatch approvals
#
# OMN-10971: Registry validation added to reject-deploy-gate-skip.yml.
# The GHA workflow fetches this file from onex_change_control@main (NOT from the PR branch)
# to prevent self-approval.
#
# Schema per entry:
#   receipt_id:   unique approval handle cited in PR body as: # skip-token-allowed: <receipt_id>
#   repo:         full repo slug the approval covers (e.g. OmniNode-ai/omnibase_infra)
#   pr_number:    PR number the approval covers (integer, REQUIRED — unscoped entries are rejected)
#   token_type:   the skip-token pattern approved (e.g. skip-receipt-gate, skip-deploy-gate)
#   reason:       brief human-readable justification
#   approved_by:  GitHub login of the approver (must NOT be the PR author — enforced by workflow)
#   expires_at:   ISO-8601 datetime after which the entry is rejected (UTC)
#   created_at:   ISO-8601 datetime when the entry was created (UTC)
#
# To add an entry:
#   1. Open a PR against onex_change_control with a new entry below.
#   2. CODEOWNERS (@OmniNode-ai/platform-leads) must review and approve — the approver's
#      GitHub login becomes the approved_by value.
#   3. The approved_by value MUST differ from the PR author who will use the receipt_id.
#
# Validation rules enforced by the GHA workflow:
#   - receipt_id must exist in this file
#   - repo must match the calling repo (github.repository)
#   - pr_number must match the calling PR number
#   - expires_at must be in the future (UTC)
#   - approved_by must NOT equal the PR author (github.event.pull_request.user.login)
#   - Missing file or empty entries list → treated as no approvals → fail

entries: []
