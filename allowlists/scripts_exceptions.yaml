# scripts_exceptions.yaml — CODEOWNERS-approved registry for scripts/** exceptions
#
# OMN-14475: the ONLY way a NEW scripts/** file may land under the DEFAULT-DENY
# canonical-form policy. The scripts guard (check-imperative-contracts
# --scan-scripts) fetches this file from onex_change_control@main in CI (NOT the
# PR branch), so an entry cannot be self-added on a downstream PR — approval is
# a separate, CODEOWNERS-reviewed PR against this file. This mirrors the
# anti-self-approval design of skip_token_approvals.yaml.
#
# Default answer for any new scripts/** file is: build it as a canonical
# CONTRACT+NODE+HANDLER. An exception is justified ONLY when the script provably
# cannot be a node yet — see the disposition + good-reason cases below.
#
# Schema per entry (validated by ModelScriptException; a malformed entry grants
# NOTHING — fail-closed):
#   path:         repo-relative path of the script (e.g. scripts/ci/x.py)
#   repo:         repository the path belongs to (e.g. omnibase_infra)
#   disposition:  node_backed | permanent | convert
#   ticket:       tracking ticket (OMN-XXXX) — conversion ticket, or the
#                 permanent-boundary rationale ticket
#   reason:       brief human-readable justification (which good-reason case)
#   approved_by:  GitHub login of the CODEOWNERS approver (must NOT be the PR
#                 author — enforced by the registry workflow / review)
#
# Dispositions:
#   node_backed — thin shim whose substantive work dispatches to an ONEX
#                 node/handler. CORROBORATED by the guard: a node_backed entry
#                 with no dispatch call is a false claim and is BLOCKED.
#   permanent   — provably-cannot-be-a-node glue that runs where no ONEX runtime
#                 exists yet:
#                   (A) CI/workflow-layer glue (a GitHub Actions step wrapping
#                       uv/gh/docker before the package/runtime is installed);
#                   (B) deploy/host-layer shell glue (chicken-and-egg with the
#                       runtime it brings up);
#                   (C) bootstrap/provisioning that creates the substrate a node
#                       needs (seed-infisical, create_kafka_topics);
#                   (D) git-hook / pre-commit standalone entrypoints.
#                 A high logic score is surfaced as a LOUD advisory to the
#                 reviewer, never a block — CODEOWNERS approval is the authority.
#   convert     — logic-bearing script pending conversion to a node (tracked
#                 debt). Carries a conversion ticket; removed once it lands.
#
# To add an entry:
#   1. Open a PR against onex_change_control adding the entry below.
#   2. CODEOWNERS (@OmniNode-ai/platform-leads) reviews; the approver's GitHub
#      login becomes approved_by (MUST differ from the PR author).
#
# Burn-down: convert/node_backed entries are removed when the script is
# converted or when the shim is verified node-backed; permanent entries persist
# with their rationale ticket.

entries: []
