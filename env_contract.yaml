---
# Environment Variable Contract
# ==============================
# Authoritative list of sanctioned required env vars and permanently
# blocked env vars across all ONEX repos. Enforced by the
# check-env-var-contract pre-commit hook.
#
# To add a new required env var: add it to `allowed_required` with a reason.
# To block an env var permanently: add it to `blocked` with a reason.
# Suppress a specific line: # env-contract-ok: <reason>

# Env vars that may be treated as required (raise/exit if missing).
# Only vars listed here may use os.environ["X"] or fail-if-missing patterns.
allowed_required:
  # Infrastructure
  - var: POSTGRES_PASSWORD
    reason: Bootstrap credential for PostgreSQL
  - var: POSTGRES_HOST
    reason: Database host required for DB connections
  - var: POSTGRES_PORT
    reason: Database port required for DB connections
  - var: POSTGRES_USER
    reason: Database user required for DB connections
  - var: POSTGRES_DATABASE
    reason: Database name required for DB connections
  - var: OMNIBASE_INFRA_DB_URL
    reason: Primary database connection string
  - var: OMNIINTELLIGENCE_DB_URL
    reason: Intelligence service database URL
  - var: OMNIMEMORY_DB_URL
    reason: Memory service database URL
  - var: OMNIDASH_ANALYTICS_DB_URL
    reason: Dashboard analytics database URL
  - var: DATABASE_URL
    reason: Generic database URL for services
  - var: OMNICLAUDE_DB_URL
    reason: Claude plugin database URL

  # Kafka
  - var: KAFKA_BOOTSTRAP_SERVERS
    reason: Event bus connection required for Kafka consumers/producers

  # Auth / Secrets
  - var: GITHUB_TOKEN
    reason: Required for GitHub CLI operations
  - var: GH_PAT
    reason: GitHub personal access token for API calls
  - var: LINEAR_API_KEY
    reason: Required for Linear API operations
  - var: SLACK_BOT_TOKEN
    reason: Required for Slack API operations
  - var: INFISICAL_CLIENT_ID
    reason: Machine identity for Infisical secrets
  - var: INFISICAL_CLIENT_SECRET
    reason: Machine identity secret for Infisical
  - var: INFISICAL_PROJECT_ID
    reason: Infisical project scoping

  # Runtime
  - var: ONEX_RUN_ID
    reason: Pipeline correlation key, mandatory for headless runs
  - var: ONEX_STATE_DIR
    reason: Runtime state directory, must be set
  - var: ONEX_ENVIRONMENT
    reason: Runtime environment identifier

  # LLM endpoints
  - var: LLM_CODER_URL
    reason: Primary code generation model endpoint
  - var: LLM_CODER_FAST_URL
    reason: Fast-tier model endpoint
  - var: LLM_EMBEDDING_URL
    reason: Embedding model endpoint
  - var: LLM_DEEPSEEK_R1_URL
    reason: Reasoning model endpoint

  # Third-party API keys (for direct API usage, not Claude Code)
  - var: OPENAI_API_KEY
    reason: Direct OpenAI API calls (not Claude Code auth)
  - var: GEMINI_API_KEY
    reason: Direct Google Gemini API calls
  - var: GOOGLE_API_KEY
    reason: Direct Google API calls
  - var: ZAI_API_KEY
    reason: Z.ai API calls
  - var: QDRANT_API_KEY
    reason: Qdrant vector database auth

# Env vars that must NEVER be treated as required.
# Any code checking for these will fail the hook unconditionally.
blocked:
  - var: ANTHROPIC_API_KEY
    reason: >
      Claude Code uses OAuth, not API keys. This has regressed 6+ times (OMN-7467). Use optional reads
      with defaults if needed.
