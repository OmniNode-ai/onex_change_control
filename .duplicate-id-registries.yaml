---
# Manifest for check-duplicate-registry-ids (OMN-14434, wiring OMN-14401's
# guard into the repo that owns the registry which actually motivated it).
#
# Config-as-data: declares which config/registry YAML files in THIS repo are
# checked for duplicate ids over a non-unique key. See
# omnibase_core.validation.validator_duplicate_config_ids for the check
# semantics (list_path syntax, disambiguator_field rules, fail-closed
# behavior).
#
# grant_id is the field the file's own schema comment calls "unique UUID
# identifying this grant" — the real primary key. image_digest is
# deliberately NOT the checked id_field: it legitimately repeats across
# grant re-issuance (OMN-14395's own fix depends on multiple entries sharing
# a digest being valid), so keying on digest+lane would reject a legitimate
# scenario. No disambiguator_field: two entries sharing grant_id is never
# legitimate — it's the file's own documented invariant.
#
# Measured 2026-07-12: entries: [] (at-rest state) -> 0 violations. No
# grandfather list needed. Falsifiability proven against a throwaway copy:
# planting two entries sharing grant_id (different image_digest) -> guard
# fails and names the duplicate id; restoring unique grant_ids -> guard
# passes. See OMN-14434 / OMN-14401 remediation thread for command output.

registries:
  - path: grants/prod_promotion_grants.yaml
    list_path: entries
    id_field: grant_id
