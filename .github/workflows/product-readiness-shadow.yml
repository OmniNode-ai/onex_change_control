#
# Product Readiness — SHADOW workflow (OMN-14704 / OMN-14644 Phase 3, CI-01/CI-02).
#
# Phase 3 fan-out to onex_change_control. This repo has ZERO `needs: occ-preflight`
# product jobs (its `occ-preflight / eligibility` context is standalone and gates
# nothing downstream), so there is NO decouple work to do. This workflow adds an
# ADDITIVE, report-only surface that runs the substantive product proof (lint,
# typecheck, tests+coverage) *independently of* any OCC evidence, then emits the
# typed reason-graph so a `needs: occ-preflight` cascade would project as ONE
# root cause rather than N red/skipped checks.
#
# LOAD-BEARING INVARIANTS (do not weaken — see design §1.1 / §3):
#   1. NO `occ-preflight` anywhere in this workflow's needs-chain. The product
#      subcheck jobs below carry no `needs: occ-preflight`, so Product Readiness
#      reports FIRST on the exact head SHA, independent of any OCC evidence.
#   2. This workflow NEVER references or triggers `call-occ-preflight.yml` and so
#      mints NO OCC request. The authoritative OCC path is untouched and still
#      runs from its own workflow exactly as before.
#   3. REPORT-ONLY / NON-REQUIRED / STANDALONE. This is a SEPARATE workflow and is
#      deliberately NOT folded into `ci.yml`'s required `CI Summary` rollup —
#      folding it in would make it authoritative and violate the shadow invariant.
#      The required dev contexts (`CI Summary`, `verify / verify`, `Pre-commit`,
#      `occ-preflight / eligibility`, `Dep Provenance Gate`, `Doctrine Coverage
#      Matrix`, `call-reject-skip-token / scan / reject-skip-gate-token`) stay
#      byte-identical. Making any context here required is a separate operator-
#      gated WS4 step; do NOT do it here.

name: product-readiness-shadow

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

permissions:
  contents: read

# Shadow surface: newer head supersedes an in-flight shadow run for the same ref.
concurrency:
  group: product-readiness-shadow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Product subchecks — each INDEPENDENT of occ-preflight ---------------
  lint-shadow:
    name: lint (shadow)
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck-shadow:
    name: typecheck (shadow)
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Mypy
        run: uv run mypy src/ tests/

  tests-shadow:
    # The coverage dimension is folded into this job for the shadow surface — its
    # conclusion is passed as BOTH tests_conclusion and coverage_conclusion below.
    name: tests+coverage (shadow)
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Tests with coverage
        run: uv run pytest --cov=onex_change_control --cov-report=term-missing

  # --- Typed reason-graph (report-only) ------------------------------------
  # NO occ-preflight in this needs-chain. Consumes the product subchecks'
  # conclusions only and emits exactly one typed root. Surfaced NON-required
  # context: `product-readiness-shadow / reason-graph`.
  reason-graph:
    name: reason-graph
    needs: [lint-shadow, typecheck-shadow, tests-shadow]
    if: always()
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Emit reason graph
        env:
          # Exact head SHA the graph is content-addressed to. For pull_request
          # use the PR head (github.sha is the ephemeral merge commit); for
          # merge_group use the queued head; else the pushed SHA.
          HEAD_SHA: >-
            ${{ github.event.pull_request.head.sha
              || github.event.merge_group.head_sha
              || github.sha }}
          LINT_CONCLUSION: ${{ needs.lint-shadow.result }}
          TYPECHECK_CONCLUSION: ${{ needs.typecheck-shadow.result }}
          TESTS_CONCLUSION: ${{ needs.tests-shadow.result }}
        run: |
          set -euo pipefail
          facts="$(python - <<'PY'
          import json, os
          tests = os.environ.get("TESTS_CONCLUSION", "")
          print(json.dumps({
              "head_sha": os.environ.get("HEAD_SHA", ""),
              "subchecks": {
                  "change_detection": "success",
                  "lint": os.environ.get("LINT_CONCLUSION", ""),
                  "typecheck": os.environ.get("TYPECHECK_CONCLUSION", ""),
                  "tests": tests,
                  "coverage": tests,
              },
          }))
          PY
          )"
          graph="$(python scripts/ci/product_reason_graph.py graph --facts-json "$facts" --summary 2> summary.md)"
          echo "$graph"
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
          root_kind="$(printf '%s' "$graph" | python -c 'import json,sys; r=json.load(sys.stdin)["root"]; print(r["kind"] if r else "READY")')"
          if [ "$root_kind" = "READY" ]; then
            echo "::notice title=CI Reason Graph::READY — product dimension is green (report-only)"
          else
            echo "::warning title=CI Reason Graph::ROOT ${root_kind} (report-only shadow; not merge-blocking)"
          fi
