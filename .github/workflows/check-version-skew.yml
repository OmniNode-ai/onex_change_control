# OMN-6692: Reusable workflow for version skew prevention.
# Each repo calls this workflow to validate its dependency pins against
# the version-matrix.yaml in onex_change_control.
#
# Usage in a repo's CI:
#
#   jobs:
#     version-skew:
#       uses: OmniNode-ai/onex_change_control/.github/workflows/check-version-skew.yml@main
#       with:
#         repo_name: omnibase_infra
name: Check Version Skew

on:
  workflow_call:
    inputs:
      repo_name:
        description: "Repository name as it appears in version-matrix.yaml (e.g. omnibase_infra)"
        required: true
        type: string

jobs:
  check-version-skew:
    name: Version Skew Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON)
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON)
      }}
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: onex_change_control

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install packaging pyyaml

      - name: Run version pin check
        run: |
          python onex_change_control/standards/check_version_pins.py \
            --repo "${{ inputs.repo_name }}" \
            --root onex_change_control \
            --repo-path repo
