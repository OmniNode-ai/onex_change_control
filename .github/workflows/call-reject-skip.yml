#
# OMN-10422 (Wave 5): Caller — re-scan skip-gate bypass tokens at merge_group entry.
#
# Invokes the omniclaude-hosted reusable workflow on pull_request and merge_group.
# On merge_group, the reusable workflow resolves the PR via head SHA and asserts
# exactly-one-PR (invariant I10). Cache is not reused across events (invariant I9).
#
# Required-status-check name: `scan / reject-skip-gate-token`
# Wire via: Settings → Branches → main → Require status checks → add the check name above.

name: Reject skip-gate bypass tokens

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, dev, "hotfix/**"]
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  call-reject-skip-token:
    name: call-reject-skip-token / scan / reject-skip-gate-token
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan PR body and diff for skip-gate bypass tokens
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref || github.base_ref || 'dev' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "merge_group" ]]; then
            echo "merge_group scan is covered by pull_request events."
            exit 0
          fi

          BODY_FILE="$(mktemp)"
          DIFF_FILE="$(mktemp)"
          FILTERED_DIFF_FILE="$(mktemp)"
          printf '%s' "${PR_BODY:-}" > "${BODY_FILE}"
          if [[ -n "${PR_NUMBER:-}" ]]; then
            if ! gh pr diff "${PR_NUMBER}" --repo "${GH_REPO}" > "${DIFF_FILE}"; then
              echo "::warning::gh pr diff failed; falling back to local git diff against origin/${BASE_REF}"
              git fetch origin "${BASE_REF}" --no-tags --depth=1
              git diff --no-ext-diff --unified=0 "origin/${BASE_REF}"...HEAD > "${DIFF_FILE}"
            fi
          fi

          awk '
            /^\+\+\+ / { p=$2; sub(/^b\//, "", p); f=p; next }
            /^--- / { next }
            /^diff --git / { f=""; next }
            /^\+/ {
              if (f != "" &&
                  f ~ /\.(md|yaml|yml|txt)$/ &&
                  f != ".github/workflows/call-reject-skip.yml") print
            }
          ' "${DIFF_FILE}" > "${FILTERED_DIFF_FILE}"

          if grep -E '\[skip-[^]]+\]' "${BODY_FILE}" "${FILTERED_DIFF_FILE}"; then
            echo "::error::skip-gate bypass token found."
            exit 1
          fi

          echo "No skip-gate bypass tokens found."
