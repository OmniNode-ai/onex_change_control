---
name: Doctrine Coverage

on:
  push:
    branches: [main, develop, "jonah/*", "jonahgabriel/*", "hotfix/**"]
  pull_request:
    branches: [main, develop, dev, "hotfix/**"]
  merge_group:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"

jobs:
  doctrine-coverage:
    name: Doctrine Coverage Matrix
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate doctrine coverage matrix (dry-run, no file write)
        run: uv run python scripts/generate_doctrine_coverage.py --dry-run

      - name: Check for enforcement regressions
        run: >-
          uv run python scripts/generate_doctrine_coverage.py
          --check-regression
          --dry-run
