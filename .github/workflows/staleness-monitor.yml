name: Promotion Staleness Monitor

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      repos:
        description: "Comma-separated repo list to scan"
        required: true
        default: "omnibase_compat,omnibase_core,omnibase_spi,omnibase_infra,omnimarket,omniclaude,omniintelligence,omnimemory,omnidash,omniweb,onex_change_control,omninode_infra,onex-self-extending-agent"
        type: string
      source_branch:
        description: "Promotion source branch"
        required: true
        default: "dev"
        type: string
      target_branch:
        description: "Promotion target branch"
        required: true
        default: "main"
        type: string
      failure_class:
        description: "Dominant failure class for alert routing"
        required: true
        default: "promotion_failed_integration"
        type: choice
        options:
          - "promotion_failed_code"
          - "promotion_failed_integration"
          - "promotion_failed_runtime"
          - "promotion_failed_flaky_infra"
          - "promotion_skipped_by_user"

permissions:
  contents: read
  # issues:write is required only by the "Alert on monitor failure" heartbeat
  # step (OMN-15052) — it opens/updates a GitHub issue with the default
  # token so the monitor's own death is never silent again, without
  # depending on any additional secret.
  issues: write

concurrency:
  group: promotion-staleness-monitor
  cancel-in-progress: false

jobs:
  check:
    name: Check Dev/Main Staleness
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 30
    env:
      REPOS_INPUT: ${{ github.event.inputs.repos || 'omnibase_compat,omnibase_core,omnibase_spi,omnibase_infra,omnimarket,omniclaude,omniintelligence,omnimemory,omnidash,omniweb,onex_change_control,omninode_infra,onex-self-extending-agent' }}
      SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'dev' }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}
      FAILURE_CLASS: ${{ github.event.inputs.failure_class || 'promotion_failed_integration' }}
      OMNI_REPOS_ROOT: ${{ github.workspace }}/../omni-repos
      EVIDENCE_DIR: ${{ github.workspace }}/staleness-evidence
      SOURCE_TICKET: OMN-11738
      # OMN-15052: github.token is scoped to onex_change_control only and
      # cannot resolve private sibling repos (e.g. omniweb) via the GraphQL
      # clone path — every scheduled run failed here for ~2 months.
      # CROSS_REPO_PAT is the org-wide read token already used for this
      # exact purpose by nightly-promote.yml (verified live: 15/15 recent
      # scheduled runs green cloning the same private repo).
      GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}

    steps:
      - name: Checkout OCC
        uses: actions/checkout@v7

      - name: Set up uv
        uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"

      - name: Prepare repo list
        id: repos
        shell: bash
        run: |
          set -euo pipefail
          # Self-hosted runner: OMNI_REPOS_ROOT lives outside github.workspace
          # so it is NOT reset between runs by the standard checkout cleanup.
          # A prior run that died mid-clone leaves partial checkouts behind,
          # which then fail subsequent runs with "destination path already
          # exists" — a secondary symptom of the same root failure
          # (OMN-15052). Start every run from a clean slate.
          rm -rf "$OMNI_REPOS_ROOT"
          mkdir -p "$OMNI_REPOS_ROOT" "$EVIDENCE_DIR"
          python - <<'PY' > /tmp/repos.txt
          import os

          repos = [
              repo.strip()
              for repo in os.environ["REPOS_INPUT"].split(",")
              if repo.strip()
          ]
          if not repos:
              raise SystemExit("at least one repo is required")
          for repo in repos:
              print(repo)
          PY
          {
            echo "repos<<EOF"
            cat /tmp/repos.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout scanned repos
        id: checkout
        shell: bash
        run: |
          set -euo pipefail
          # OMN-15052: one unreadable/flaky repo must not blind the whole
          # run. Each clone+fetch is attempted independently; failures are
          # recorded and the loop continues rather than aborting under
          # set -e (the `if cmd1 && cmd2; then` form below does not trip
          # errexit — only an un-guarded top-level failure would).
          : > /tmp/readable_repos.txt
          : > /tmp/unreadable_repos.txt
          while IFS= read -r repo; do
            [ -n "$repo" ] || continue
            if gh repo clone "OmniNode-ai/${repo}" "${OMNI_REPOS_ROOT}/${repo}" -- --no-tags \
               && git -C "${OMNI_REPOS_ROOT}/${repo}" fetch origin "$TARGET_BRANCH" "$SOURCE_BRANCH" --no-tags; then
              echo "$repo" >> /tmp/readable_repos.txt
            else
              echo "::warning::could not clone/fetch ${repo} this run — excluding it and recording it as an unreadable/blind-spot repo (OMN-15052) instead of failing the whole monitor"
              echo "$repo" >> /tmp/unreadable_repos.txt
              rm -rf "${OMNI_REPOS_ROOT:?}/${repo}"
            fi
          done <<< "${{ steps.repos.outputs.repos }}"
          {
            echo "readable_repos<<EOF"
            cat /tmp/readable_repos.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "unreadable_repos<<EOF"
            cat /tmp/unreadable_repos.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ ! -s /tmp/readable_repos.txt ]; then
            echo "::error::every configured repo failed to clone/fetch — the monitor is fully blind this run, which is a real failure, not a partial degradation"
            exit 1
          fi

      - name: Generate staleness report
        id: generate-report
        shell: bash
        run: |
          set -euo pipefail
          args=()
          while IFS= read -r repo; do
            [ -n "$repo" ] || continue
            args+=(--repo "$repo")
          done <<< "${{ steps.checkout.outputs.readable_repos }}"
          while IFS= read -r repo; do
            [ -n "$repo" ] || continue
            args+=(--unreadable-repo "$repo")
          done <<< "${{ steps.checkout.outputs.unreadable_repos }}"
          uv run promotion-staleness-monitor report \
            --workspace "$OMNI_REPOS_ROOT" \
            --source-branch "$SOURCE_BRANCH" \
            --target-branch "$TARGET_BRANCH" \
            --failure-class "$FAILURE_CLASS" \
            --output "$EVIDENCE_DIR/staleness_report.json" \
            "${args[@]}"

      - name: Publish report outputs
        id: report
        shell: bash
        run: |
          uv run python - "$EVIDENCE_DIR/staleness_report.json" "$GITHUB_OUTPUT" <<'PY'
          from pathlib import Path
          import sys

          from onex_change_control.promotion.staleness import report_outputs

          output = Path(sys.argv[2])
          with output.open("a", encoding="utf-8") as handle:
              for key, value in report_outputs(Path(sys.argv[1])).items():
                  print(f"{key}={value}", file=handle)
          PY

      - name: Create Linear staleness ticket
        id: linear-ticket
        if: steps.report.outputs.requires_linear_ticket == 'true'
        # A real Linear API failure must still be visible (caught by the
        # "Evaluate monitor outcome" gate below via `notified` != 'true'),
        # but it must not swallow the evidence upload or the failure
        # heartbeat — OMN-15052.
        continue-on-error: true
        shell: bash
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          REPORT_PATH: ${{ env.EVIDENCE_DIR }}/staleness_report.json
        run: |
          set -euo pipefail
          if [ -z "${LINEAR_API_KEY:-}" ]; then
            echo "::error::LINEAR_API_KEY is not configured for this repo/org — cannot auto-file the P1 staleness ticket. File it manually until the secret is wired."
            echo "notified=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing_secret:LINEAR_API_KEY" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TITLE="$(python - "$REPORT_PATH" <<'PY'
          import json
          import sys

          print(json.load(open(sys.argv[1], encoding="utf-8"))["linear_ticket_title"])
          PY
          )"

          SEARCH_RESPONSE="$(python - "$TITLE" <<'PY' | curl -sS --max-time 20 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d @-
          import json
          import sys

          print(json.dumps({
              "query": "query($query: String!) { issueSearch(query: $query, first: 5) { nodes { identifier title url description } } }",
              "variables": {"query": sys.argv[1]},
          }))
          PY
          )"

          EXISTING_URL="$(python - "$SEARCH_RESPONSE" "$TITLE" <<'PY'
          import json
          import sys

          data = json.loads(sys.argv[1])
          nodes = data.get("data", {}).get("issueSearch", {}).get("nodes", [])
          for node in nodes:
              if node.get("title") == sys.argv[2]:
                  print(node.get("url", ""))
                  raise SystemExit
          print("")
          PY
          )"
          if [ -n "$EXISTING_URL" ]; then
            printf '{"status":"existing","url":%s}\n' "$(python -c 'import json,sys; print(json.dumps(sys.argv[1]))' "$EXISTING_URL")" \
              > "$EVIDENCE_DIR/linear_staleness_ticket.json"
            echo "Staleness ticket already exists: $EXISTING_URL"
            echo "notified=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TEAM_RESPONSE="$(python - "$SOURCE_TICKET" <<'PY' | curl -sS --max-time 20 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d @-
          import json
          import sys

          print(json.dumps({
              "query": "query($id: String!) { issue(id: $id) { team { id } } }",
              "variables": {"id": sys.argv[1]},
          }))
          PY
          )"
          TEAM_ID="$(python - "$TEAM_RESPONSE" <<'PY'
          import json
          import sys

          data = json.loads(sys.argv[1])
          print(data.get("data", {}).get("issue", {}).get("team", {}).get("id", ""))
          PY
          )"
          if ! echo "$TEAM_ID" | grep -qE '^[0-9a-f-]+$'; then
            echo "::error::Could not resolve Linear team ID from $SOURCE_TICKET"
            exit 1
          fi

          CREATE_RESPONSE="$(python - "$REPORT_PATH" "$TEAM_ID" <<'PY' | curl -sS --max-time 20 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d @-
          import json
          import sys

          report = json.load(open(sys.argv[1], encoding="utf-8"))
          print(json.dumps({
              "query": "mutation($input: IssueCreateInput!) { issueCreate(input: $input) { success issue { identifier url } } }",
              "variables": {
                  "input": {
                      "title": report["linear_ticket_title"],
                      "description": report["linear_ticket_description"],
                      "teamId": sys.argv[2],
                      "priority": report["alert_route"]["linear_priority"],
                  },
              },
          }))
          PY
          )"
          python - "$CREATE_RESPONSE" > "$EVIDENCE_DIR/linear_staleness_ticket.json" <<'PY'
          import json
          import sys

          response = json.loads(sys.argv[1])
          issue = response.get("data", {}).get("issueCreate", {}).get("issue")
          if not issue:
              raise SystemExit(f"Linear issueCreate failed: {response}")
          print(json.dumps({"status": "created", **issue}, indent=2, sort_keys=True))
          PY
          echo "notified=true" >> "$GITHUB_OUTPUT"

      - name: Send Slack staleness alert
        id: slack-alert
        if: steps.report.outputs.requires_slack_alert == 'true'
        # See the Linear ticket step above for why continue-on-error is
        # deliberate here (OMN-15052).
        continue-on-error: true
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPORT_PATH: ${{ env.EVIDENCE_DIR }}/staleness_report.json
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::error::SLACK_WEBHOOK_URL is not configured for this repo/org — cannot send the staleness alert. Notify manually until the secret is wired."
            echo "notified=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing_secret:SLACK_WEBHOOK_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python - "$REPORT_PATH" > "$EVIDENCE_DIR/slack_payload.json" <<'PY'
          import json
          import sys

          report = json.load(open(sys.argv[1], encoding="utf-8"))
          print(json.dumps({
              "text": report["slack_message"],
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": report["slack_message"],
                      },
                  }
              ],
          }))
          PY
          curl -fsS --max-time 20 -X POST \
            -H "Content-Type: application/json" \
            --data @"$EVIDENCE_DIR/slack_payload.json" \
            "$SLACK_WEBHOOK_URL"
          echo "notified=true" >> "$GITHUB_OUTPUT"

      - name: Upload staleness evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promotion-staleness-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          retention-days: 365
          if-no-files-found: warn

      - name: Evaluate monitor outcome
        id: evaluate
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          FAIL=0
          REASONS=""

          if [ "${{ steps.generate-report.outcome }}" != "success" ]; then
            FAIL=1
            REASONS="${REASONS}staleness report generation did not succeed (outcome=${{ steps.generate-report.outcome }}); "
          fi

          UNREADABLE_COUNT="${{ steps.report.outputs.unreadable_repo_count }}"
          UNREADABLE_LIST="${{ steps.report.outputs.unreadable_repos }}"
          if [ -n "$UNREADABLE_COUNT" ] && [ "$UNREADABLE_COUNT" != "0" ]; then
            echo "::warning::monitor could not read ${UNREADABLE_COUNT} repo(s) this run: ${UNREADABLE_LIST}"
          fi

          if [ "${{ steps.report.outputs.requires_linear_ticket }}" = "true" ] \
             && [ "${{ steps.linear-ticket.outputs.notified }}" != "true" ]; then
            FAIL=1
            REASONS="${REASONS}P1 staleness ticket was required but not confirmed created (linear-ticket outcome=${{ steps.linear-ticket.outcome }}); "
          fi

          if [ "${{ steps.report.outputs.requires_slack_alert }}" = "true" ] \
             && [ "${{ steps.slack-alert.outputs.notified }}" != "true" ]; then
            FAIL=1
            REASONS="${REASONS}Slack staleness alert was required but not confirmed sent (slack-alert outcome=${{ steps.slack-alert.outcome }}); "
          fi

          {
            echo "## Promotion Staleness Monitor"
            echo ""
            echo "- max_staleness_days: ${{ steps.report.outputs.max_staleness_days }}"
            echo "- requires_linear_ticket: ${{ steps.report.outputs.requires_linear_ticket }} (notified: ${{ steps.linear-ticket.outputs.notified }})"
            echo "- requires_slack_alert: ${{ steps.report.outputs.requires_slack_alert }} (notified: ${{ steps.slack-alert.outputs.notified }})"
            echo "- unreadable_repos (${UNREADABLE_COUNT:-0}): ${UNREADABLE_LIST:-none}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL" = "1" ]; then
            echo "::error::promotion staleness monitor did not complete its job this run: ${REASONS}"
            exit 1
          fi
          echo "Monitor completed; every required notification fired (or none were required this run)."

      - name: Alert on monitor failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="Promotion Staleness Monitor is failing"
          BODY="$(printf 'Run %s failed on %s.\n\nThis is the OMN-11738 promotion staleness monitor (dev/main drift detection plus Linear/Slack alerting). A monitor that fails silently defeats its own purpose -- OMN-15052 found 60/60 scheduled runs silently red for ~2 months before anyone noticed. This issue exists so a red run of THIS workflow is never invisible again.\n\nSee the run logs and the uploaded promotion-staleness-* evidence artifact for the failing step and reason.' "$RUN_URL" "$(date -u +%Y-%m-%dT%H:%MZ)")"
          EXISTING="$(gh issue list --repo "${{ github.repository }}" --search "\"$TITLE\" in:title" --state open --json number --jq '.[0].number' 2>/dev/null || true)"
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "bug"
          fi
