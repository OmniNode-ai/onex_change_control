    name: Contract Sync Gate (Layer 3)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Compute changed files and diff
        id: diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          git diff --name-only "$BASE"...HEAD > /tmp/changed_files.txt
          git diff "$BASE"...HEAD > /tmp/pr_diff.txt
          echo "files_arg=$(cat /tmp/changed_files.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
      - name: Run contract sync gate
        run: |
          FILES="${{ steps.diff.outputs.files_arg }}"
          if [ -z "$FILES" ]; then
            echo "[SKIP] No changed files."
            exit 0
          fi
          uv run python -m onex_change_control.scripts.validate_pr_contracts \
            --diff-files $FILES \
            --diff-content /tmp/pr_diff.txt

  contract-compliance:
    name: Contract Compliance Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # Only run where we can resolve a PR number: pull_request or merge_group.
    # The `push` event has no associated PR context (main commits have no
    # PR to validate against), so we exclude it — otherwise every push to
    # main would fail at the PR-number resolver step.
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Bootstrap exemption check
        # The gate cannot validate its own CLI before that CLI exists on main.
        # If this PR is the one adding run_contract_compliance_check.py, skip
        # the check — once merged, all downstream PRs will run the full gate.
        id: bootstrap_check
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'scripts/ci/run_contract_compliance_check.py'; then
            echo "Bootstrap PR detected: this PR introduces the contract compliance CLI itself."
            echo "Skipping gate — once merged, all subsequent PRs will be checked."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up contracts source
        if: steps.bootstrap_check.outputs.skip != 'true'
        id: contracts_setup
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          if [ "${{ github.repository }}" = "OmniNode-ai/onex_change_control" ]; then
            # Running in this repo itself — use checked-out contracts (PR diff version)
            ln -s "$GITHUB_WORKSPACE" /tmp/onex_change_control
          else
            if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
              auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
              git -c "http.https://github.com/.extraheader=${auth_header}" clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git /tmp/onex_change_control
            else
              git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git /tmp/onex_change_control
            fi
          fi
      - name: Set up uv toolchain
        # The runner shells out to ``uv run`` for several check_value commands
        # (e.g. ``uv run pytest``, ``uv run python -c "import yaml; ..."``).
        # Without this step the gate fails with ``sh: 1: uv: not found``.
        # ``uv sync`` (inside setup-uv) also installs pyyaml as a transitive
        # dep of the project, so the previous ``pip install pyyaml`` is
        # redundant.
        if: steps.bootstrap_check.outputs.skip != 'true'
        uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Resolve PR number (handle merge_group + pull_request)
        if: steps.bootstrap_check.outputs.skip != 'true'
        id: pr_num
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # pull_request event carries github.event.pull_request.number directly.
          # merge_group event does not — the head ref encodes it as
          # gh-readonly-queue/<base>/pr-<NUM>-<sha>, so parse NUM from there.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            HEAD_REF="${{ github.event.merge_group.head_ref }}"
            # e.g. refs/heads/gh-readonly-queue/main/pr-287-<sha>
            PR_NUM="$(echo "$HEAD_REF" | sed -nE 's@.*pr-([0-9]+)-[0-9a-f]+.*@\1@p')"
          else
            PR_NUM=""
          fi
          if [[ -z "$PR_NUM" ]]; then
            echo "::error::Could not resolve PR number for event=${{ github.event_name }}"
            exit 1
          fi
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUM"
      - name: Run contract compliance check
        if: steps.bootstrap_check.outputs.skip != 'true'
        # Use ``uv run python`` so the runner script and any ``uv``-prefixed
        # commands inside check_values share the same project venv. This is
        # what lets ``uv run pytest`` / ``uv run python -c …`` succeed inside
        # the runner — see OMN-10086.
        run: |
          uv run python /tmp/onex_change_control/scripts/ci/run_contract_compliance_check.py \
            --pr ${{ steps.pr_num.outputs.pr_num }} \
            --repo ${{ github.repository }} \
            --contracts-dir /tmp/onex_change_control/contracts
        env:
          EMERGENCY_BYPASS: ${{ secrets.EMERGENCY_BYPASS || '' }}
          GH_TOKEN: ${{ github.token }}

  honesty-gate:
    permissions:
      contents: read
    # Receipt Honesty Gate (OMN-12791): scan drift/dod_receipts/ for gamed probes.
    # Blocking: no-op echo probes, deferral language in PASS receipts, self-attestation,
    # fake human verifiers, and deploy-keyword evidence backed by echo-only probe_command.
    name: Receipt Honesty Gate
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/omnibase_core
          ref: d4884c59068e1a2989178ab2cc91678ad203f6d3
          path: omnibase_core_source
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run receipt honesty scan on changed receipts
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          PYTHONPATH: ${{ github.workspace }}/omnibase_core_source/src
        run: |
          set -euo pipefail
          changed_file_list=/tmp/changed_receipts.txt
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "merge_group" ]]; then
            base_ref="${BASE_REF#refs/heads/}"
            git fetch origin "$base_ref" --no-tags
            git diff --name-only "origin/${base_ref}"...HEAD -- 'drift/dod_receipts/**/*.yaml' > "$changed_file_list"
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "$BEFORE_SHA"...HEAD -- 'drift/dod_receipts/**/*.yaml' > "$changed_file_list"
          else
            git ls-files 'drift/dod_receipts/**/*.yaml' > "$changed_file_list"
          fi
          if [[ ! -s "$changed_file_list" ]]; then
            echo "RECEIPT HONESTY GATE PASSED: no changed receipt YAML files"
            exit 0
          fi
          echo "Changed receipt files:"
          cat "$changed_file_list"
          mapfile -t changed_receipts < "$changed_file_list"
          uv run python -m omnibase_core.validation.validator_receipt_honesty \
            --receipts-dir drift/dod_receipts \
            "${changed_receipts[@]}"

  append-only-gate:
    permissions:
      contents: read
    # OCC Append-Only Gate (OMN-13962): enforce the append-only invariant —
    # reject any PR that
    # edits/deletes/renames a merged dod_evidence entry (per-entry hash change)
    # or a merged receipt file under drift/dod_receipts/<TICKET>/. Existing
    # entries are immutable; corrections must be net-new add-only supersession
    # files. Mirrors honesty-gate: omnibase_core is pinned by source ref so the
    # validator version is controlled by the workflow, not OCC's installed dep
    # (which is capped <0.46.0 and predates the append_only validator).
    name: OCC Append-Only Gate
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/omnibase_core
          # main pin where validator_occ_append_only is present (the honesty-gate
          # pin predates it). Bump alongside the honesty-gate pin when refreshing.
          ref: f873d8307d87d41f6581847fe630bfbc139e1bf8
          path: omnibase_core_source
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run append-only enforcement on changed tickets
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          PYTHONPATH: ${{ github.workspace }}/omnibase_core_source/src
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "merge_group" ]]; then
            git fetch origin "$base_ref" --no-tags
            # Diff against the merge-base, not origin/<base> directly, so receipts
            # that only landed on the base after this branch forked are not
            # mis-flagged as deletions (the validator CLI uses a two-dot diff).
            base_sha="$(git merge-base "origin/${base_ref}" HEAD)"
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="$BEFORE_SHA"
          else
            echo "APPEND-ONLY GATE PASSED: non-PR event, nothing to diff"
            exit 0
          fi
          changed="$(git diff --name-only "$base_sha"...HEAD -- contracts/ drift/dod_receipts/ || true)"
          # Distinct ticket ids (OMN-NNNN) touched via a contract or receipt path.
          tickets="$(printf '%s\n' "$changed" \
            | sed -nE 's@^(contracts/(OMN-[0-9]+)\.yaml|drift/dod_receipts/(OMN-[0-9]+)/.*)$@\2\3@p' \
            | sort -u)"
          if [[ -z "$tickets" ]]; then
            echo "APPEND-ONLY GATE PASSED: no contract/receipt changes"
            exit 0
          fi
          echo "Tickets touched:"
          printf '%s\n' "$tickets"
          rc=0
          while IFS= read -r tid; do
            [[ -z "$tid" ]] && continue
            echo "--- append-only check: ${tid} (base ${base_sha}) ---"
            if ! uv run python -m omnibase_core.validation.validator_occ_append_only \
                --repo . --ticket-id "$tid" --base-ref "$base_sha"; then
              rc=1
            fi
          done <<< "$tickets"
          if [[ "$rc" -ne 0 ]]; then
            echo "::error::APPEND-ONLY GATE FAILED: a PR edited/deleted/renamed a merged dod_evidence entry or receipt. Corrections must be net-new add-only supersession files."
          fi
          exit "$rc"

  no-noncanonical-lifecycle-classes:
    name: no-noncanonical-lifecycle-classes
    # OMN-14350: non-canonical lifecycle-class ratchet. Unconditional (no needs/if) so
    # it never skips; wired into required CI Summary via needs: + strict success-only check.
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.full_name != github.repository
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.3"
      - name: Ratchet non-canonical lifecycle-word classes against frozen allowlist (OMN-14350)
        run: |
          uv run --no-project \
            --with 'omnibase-core @ git+https://github.com/OmniNode-ai/omnibase_core@63635097705d832e0ee9c4811093efb31349105c' \
            python -m omnibase_core.validators.no_noncanonical_lifecycle_classes \
            --check-stale \
            --allowlist .onex_ratchets/noncanonical_class_allowlist.yaml \
            src/onex_change_control

  precommit-parity-gate:
    name: Precommit Parity Gate
    # OMN-14672 (WS7 fan-out #4, canary OMN-14655 / omnimarket#1783 / omnibase_infra#2318):
    # CI mirror of the two local pre-commit meta-gates over .pre-commit-config.yaml —
    #   1. fail-loud meta-gate (exit-0-on-missing / WARN-SKIP-degrade + stages
    #      coverage: a skipped gate must be byte-indistinguishable from a failing one), and
    #   2. pin-parity (pre-commit `rev:` vs the omnibase_core SHA ci.yml pins for the
    #      SAME validator — the no-noncanonical-lifecycle-classes pair).
    #
    # UNCONDITIONAL BY DESIGN (OMN-14666/14668 lesson). No `needs:`, no `if:`, no
    # paths filter, so the byte-match proof fires on EVERY PR and passes/fails on its
    # own evidence — never conditioned on another job's result (the omnimarket#1783
    # skip-then-vacuous-green window came from a `needs: occ-preflight`). In OCC a
    # STANDALONE workflow file is the wrong shape: OMN-14441 REMOVED a standalone
    # workflow precisely because a separate run_id is invisible to the REQUIRED CI
    # Summary rollup and so cannot block a merge. This job is folded into ci.yml and
    # wired into ci-summary's needs + a strict success-only check below, mirroring
    # no-noncanonical-lifecycle-classes (OMN-14350) — unconditional AND enforced.
    #
    # OMN-14668: runner is HOSTED-PINNED through the centralized public-PR
    # selector, unconditionally. The prior form routed ONLY public-fork PRs to
    # hosted and left every trusted internal PR / push / merge_group on the
    # private runner fleet — a saturated/absent fleet would leave this job
    # queued/cancelled. The ci-summary strict success-only check below
    # already fails closed on a non-`success` result, but pinning to hosted
    # removes the private-runner dependency entirely so the byte-match proof always
    # executes. The gate is short and dependency-free (`uv run --no-project
    # --with pyyaml`), matching the already-hosted omnibase_spi / omnibase_compat
    # parity gates.
    runs-on: >-
      ${{
        fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
      }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Fail-loud meta-gate (exit-0-on-missing / stages coverage)
        run: |
          uv run --no-project --with pyyaml \
            python3 src/onex_change_control/scripts/validate_precommit_fail_loud.py
      - name: Pin-parity check (pre-commit rev vs CI-pinned SHA)
        run: |
          uv run --no-project --with pyyaml \
            python3 src/onex_change_control/scripts/validate_precommit_pin_parity.py

  validate-prod-promotion-grants:
    name: validate-prod-promotion-grants
    # OMN-14441: the prod-promotion-grant trust anchor (CLAUDE.md §2a/§12) had
    # a validator that ran, could fail, and could NOT block a merge — it lived
    # in a standalone workflow file (.github/workflows/validate-prod-promotion-grants.yml,
    # now retired), invisible to this required CI Summary rollup (a separate
    # workflow file gets a separate run_id; OMN-14415 instance #1). Folded in
    # here, unconditional (no needs/if) so it never skips — mirrors
    # no-noncanonical-lifecycle-classes (OMN-14350) below. Deliberately bypasses
    # zone-filter: a grants-file change must never be able to be misclassified
    # into a short-circuited zone.
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.full_name != github.repository
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Validate prod-promotion-grants trust anchor (OMN-14441)
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          base_sha=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" || "${GITHUB_EVENT_NAME}" == "merge_group" ]]; then
            git fetch origin "$base_ref" --no-tags
            base_sha="$(git merge-base "origin/${base_ref}" HEAD)"
          fi
          args=(--file grants/prod_promotion_grants.yaml)
          if [[ -n "$PR_AUTHOR" && -n "$base_sha" ]]; then
            args+=(--pr-author "$PR_AUTHOR" --base-ref "$base_sha")
          fi
          uv run validate-prod-promotion-grants "${args[@]}"

  check-platform-leads-review-tripwire:
    name: check-platform-leads-review-tripwire
    # OMN-14445: validate-prod-promotion-grants' approved_by != PR-author check
    # (above) is a COMPLETE defense against forged self-approval only while
    # @OmniNode-ai/platform-leads has exactly one member — required_pull_
    # request_reviews (CODEOWNERS enforcement) is intentionally OFF on dev
    # (enabling it would deadlock a solo-lead grant PR; GitHub blocks
    # self-approval of your own PR). This job is the tripwire: it fails the
    # moment platform-leads grows past one member while that gap remains, so
    # the safety property can't silently expire. Unconditional (no needs/if),
    # mirrors validate-prod-promotion-grants / no-noncanonical-lifecycle-classes.
    #
    # NOTE: reading org team membership requires org-scoped read access the
    # default GITHUB_TOKEN does not have (GitHub restricts it to repository-
    # scoped resources). This job uses CROSS_REPO_PAT, verified live on this
    # PR (run 29182101941, job 86621583642) to have sufficient scope: it read
    # a real member count (1) and a real branch-protection fact (False) on
    # the first push. If a future PAT rotation loses read:org scope, this
    # job reports INCONCLUSIVE (exit 2) and fails closed via ci-summary's
    # explicit check below — never a silent pass.
    runs-on: >-
      ${{
        github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.full_name != github.repository
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Check platform-leads-review tripwire (OMN-14445)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
          # OMN-14445 review: names which token backed this run so an
          # INCONCLUSIVE failure reads as "token problem" instead of a
          # mystery. secrets.CROSS_REPO_PAT != '' is '' (falsy) when the
          # secret is unset OR withheld by GitHub for a fork-origin PR.
          TOKEN_SOURCE: ${{ secrets.CROSS_REPO_PAT != '' && 'cross_repo_pat' || 'fallback' }}
        run: uv run check-platform-leads-review-tripwire --credential-origin "$TOKEN_SOURCE"

  ci-summary:
    name: CI Summary
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [zone-filter, pre-commit, type-check, test, schema-purity, no-localhost-fallbacks, imperative-contract-guard, context-integrity-contracts, migration-conflicts, migration-inventory, kafka-boundary-parity, cross-repo-null-contract, seam-contract-coverage, contract-sync-gate, validate-contracts, honesty-gate, append-only-gate, no-noncanonical-lifecycle-classes, validate-prod-promotion-grants, check-platform-leads-review-tripwire, precommit-parity-gate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # OMN-14350: strict fail-closed gate on the non-canonical lifecycle-class
          # ratchet. Only 'success' passes; skipped/cancelled/failure ALL block. The
          # ratchet is in needs: so this job WAITS for it (no race).
          if [[ "${{ needs.no-noncanonical-lifecycle-classes.result }}" != "success" ]]; then
            echo "::error::no-noncanonical-lifecycle-classes ratchet did not pass (result: ${{ needs.no-noncanonical-lifecycle-classes.result }}) - fail-closed (OMN-14350)"
            exit 1
          fi
          # OMN-14441: same strict fail-closed pattern for the prod-promotion-grant
          # validator. Only 'success' passes; skipped/cancelled/failure ALL block.
          if [[ "${{ needs.validate-prod-promotion-grants.result }}" != "success" ]]; then
            echo "::error::validate-prod-promotion-grants did not pass (result: ${{ needs.validate-prod-promotion-grants.result }}) - fail-closed (OMN-14441)"
            exit 1
          fi
          # OMN-14445: same strict fail-closed pattern for the platform-leads
          # review tripwire. Only 'success' passes; skipped/cancelled/failure/
          # INCONCLUSIVE (exit 2, surfaces as 'failure') ALL block.
          if [[ "${{ needs.check-platform-leads-review-tripwire.result }}" != "success" ]]; then
            echo "::error::check-platform-leads-review-tripwire did not pass (result: ${{ needs.check-platform-leads-review-tripwire.result }}) - fail-closed (OMN-14445)"
            exit 1
          fi
          # OMN-14672: same strict fail-closed pattern for the CI<->pre-commit
          # byte-match parity gate. Only 'success' passes; skipped/cancelled/
          # failure ALL block. Unconditional job (no needs/if), so a skip here
          # means something is wrong, not that the gate legitimately opted out.
          if [[ "${{ needs.precommit-parity-gate.result }}" != "success" ]]; then
            echo "::error::precommit-parity-gate did not pass (result: ${{ needs.precommit-parity-gate.result }}) - fail-closed (OMN-14672)"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
