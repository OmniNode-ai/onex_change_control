name: CI

on:
  push:
    branches: [main, "hotfix/**"]
  pull_request:
    branches: [main, dev, "hotfix/**"]
  merge_group:
  workflow_dispatch:

jobs:
  # Zone filter (OMN-10475): short-circuit heavy jobs on docs-only and
  # declarative-evidence-only PRs. Most OCC traffic is contract+receipt
  # YAML in contracts/ and drift/dod_receipts/, both DOCS zone now.
  zone-filter:
    uses: OmniNode-ai/omnibase_core/.github/workflows/zone-filter.yml@main
    permissions:
      contents: read
      pull-requests: read
    with:
      python-version: "3.12"

  pre-commit:
    name: Pre-commit
    needs: [zone-filter]
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run full pre-commit
        if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
        run: SKIP=check-receipt-honesty,check-receipt-hardening uv run pre-commit run --all-files
      - name: Run dev PR changed-file pre-commit
        if: needs.zone-filter.outputs.docs_only != 'true' && github.event_name == 'pull_request' && github.base_ref == 'dev'
        env:
          BASE_REF: ${{ github.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --no-tags
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "origin/${BASE_REF}"...HEAD || true)
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "Dev PR fast-lane: no changed files for pre-commit."
            exit 0
          fi
          SKIP=check-receipt-honesty,check-receipt-hardening uv run pre-commit run --files "${changed_files[@]}"
      - name: Run evidence-only pre-commit
        if: needs.zone-filter.outputs.docs_only == 'true'
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          git fetch origin "$base_ref" --no-tags
          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACMRT "origin/${base_ref}"...HEAD -- contracts/ drift/dod_receipts/ \
              | grep -E '^(contracts/.*\.ya?ml|drift/dod_receipts/.*\.ya?ml)$' || true
          )
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "Evidence-only fast-lane: no changed contract or receipt YAML files."
            exit 0
          fi
          SKIP=check-receipt-honesty,check-receipt-hardening uv run pre-commit run --files "${changed_files[@]}"
      - name: Run receipt hardening on changed receipts
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          git fetch origin "$base_ref" --no-tags
          mapfile -t receipt_files < <(
            git diff --name-only --diff-filter=ACMRT "origin/${base_ref}"...HEAD -- drift/dod_receipts/ \
              | grep -E '^drift/dod_receipts/.*\.ya?ml$' || true
          )
          if [ "${#receipt_files[@]}" -eq 0 ]; then
            echo "No changed receipt files for receipt hardening."
            exit 0
          fi
          uv run python scripts/validation/check_receipt_hardening.py "${receipt_files[@]}"

  type-check:
    # Note: This job runs mypy separately from pre-commit for full codebase checking.
    # Pre-commit hook runs mypy only on changed files (pre-push stage), while this job
    # checks the entire codebase (src/ and tests/) to catch type errors across all files.
    name: Type Check
    needs: zone-filter
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run mypy
        run: uv run mypy src/ tests/

  smart-test-select:
    name: Compute Smart Test Selection
    # OMN-14098 evidence-only fast-lane: docs_only guard AND'd onto the if: below.
    needs: [zone-filter]
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event_name == 'pull_request' && github.base_ref != 'dev' && needs.zone-filter.outputs.docs_only != 'true'
    outputs:
      selected_paths: ${{ steps.select.outputs.selected_paths }}
      split_count: ${{ steps.select.outputs.split_count }}
      matrix: ${{ steps.select.outputs.matrix }}
      is_full_suite: ${{ steps.select.outputs.is_full_suite }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Compute changed files vs PR base
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}" --no-tags
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt
      - name: Run smart test selection
        id: select
        env:
          HEAD_REF: ${{ github.head_ref }}
          ENABLE_SMART_TESTS: ${{ vars.ENABLE_SMART_TESTS }}
        run: |
          [ "$ENABLE_SMART_TESTS" = "true" ] && FEATURE_FLAG="on" || FEATURE_FLAG="off"
          RESULT=$(PYTHONPATH=. uv run python scripts/ci/detect_test_paths.py \
            --changed-files-from /tmp/changed_files.txt \
            --ref-name "$HEAD_REF" \
            --event-name pull_request \
            --feature-flag "$FEATURE_FLAG")
          echo "Selection result: $RESULT"
          echo "selected_paths=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d["selected_paths"]))')" >> "$GITHUB_OUTPUT"
          echo "split_count=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["split_count"])')" >> "$GITHUB_OUTPUT"
          echo "matrix=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d["matrix"]))')" >> "$GITHUB_OUTPUT"
          echo "is_full_suite=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(str(d["is_full_suite"]).lower())')" >> "$GITHUB_OUTPUT"

  test:
    name: Tests
    needs: zone-filter
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run tests with coverage
        run: uv run pytest --cov=onex_change_control --cov-report=term-missing

  schema-purity:
    name: Schema Purity & Naming Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [zone-filter, test, contract-compliance]
    # Run when test was successful or skipped (zone-filter docs-only path).
    # Skip only when contract-compliance failed/cancelled or test outright failed.
    if: |
      always() && needs.zone-filter.outputs.docs_only != 'true'
        && (github.event_name != 'pull_request' || github.base_ref != 'dev')
        && needs.contract-compliance.result == 'success'
        && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Check schema purity and naming conventions
        run: uv run check-schema-purity

  no-localhost-fallbacks:
    name: No localhost env-var fallbacks in src/ (OMN-10737)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [zone-filter, test]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Validate no localhost fallbacks
        run: uv run python scripts/validation/validate_no_env_fallbacks.py

  url-authority-gate:
    # OMN-13563 Wave 4: URL authority ratchet (non-blocking report; pre-commit hook is the
    # blocking surface). Fails only on NEW URL literals outside contracts — baseline is
    # burn-down only. Suppress with: # url-authority-ok: <reason>
    name: URL Authority Gate (OMN-13563)
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run URL authority ratchet
        continue-on-error: true
        run: >
          uv run python -m omnibase_core.validation.validator_url_authority
          --repo onex_change_control --repo-root . --all src/

  no-new-os-environ:
    # OMN-13563 Wave 4: AST os.environ read gate (non-blocking report; pre-commit hook is
    # the blocking surface). Exempts tests/, scripts/, examples/. Suppress with:
    # # env-read-ok: <reason>
    name: No New os.environ Reads (OMN-13563)
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run no-new-os-environ validator
        continue-on-error: true
        run: uv run pre-commit run no-new-os-environ --all-files

  imperative-contract-guard:
    name: Imperative Contract Guard
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Validate imperative contract guard wiring
        run: |
          uv run check-imperative-contracts \
            --repo-root . \
            --allowlists-dir allowlists \
            --scan-freestanding

  ai-slop-check:
    name: AI-Slop Pattern Check (strict, PR diff)
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Compute changed Python/Markdown files vs PR base
        id: changed
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
            FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.py' '*.md' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.py' '*.md' 2>/dev/null | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Check changed files for AI-slop patterns (strict)
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then exit 0; fi
          python scripts/validation/check_ai_slop.py --strict $FILES

  context-integrity-contracts:
    name: Context Integrity Contract Compliance
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Check context integrity contract references (dry-run, no agents root)
        # This job validates the script itself works correctly. When an agents-root
        # directory is available (e.g. from a checked-out omniclaude), pass it as
        # --agents-root. Until then, run with an empty self-test dir so CI stays green.
        run: |
          mkdir -p /tmp/ci_agents_stub /tmp/ci_contracts_stub
          python scripts/check_context_integrity_contracts.py \
            --agents-root /tmp/ci_agents_stub \
            --contracts-root /tmp/ci_contracts_stub \
            --dry-run

  migration-conflicts:
    name: Migration Conflict Check
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Clone cross-repo dependencies
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          clone_omni_repo() {
            local repo="$1"
            local target="$2"
            local clone_args=()
            if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
              local auth_header
              auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
              clone_args=(-c "http.https://github.com/.extraheader=${auth_header}")
            fi

            for attempt in 1 2 3; do
              rm -rf "${target}"
              if git "${clone_args[@]}" clone --depth=1 "https://github.com/OmniNode-ai/${repo}.git" "${target}"; then
                return 0
              fi
              if [ "${attempt}" -lt 3 ]; then
                sleep_seconds=$((attempt * 10))
                echo "::warning::Cross-repo clone attempt ${attempt}/3 failed for ${repo}; retrying in ${sleep_seconds}s"
                sleep "${sleep_seconds}"
              fi
            done

            echo "::error::Failed to clone ${repo} after 3 attempts"
            return 1
          }
          rm -rf /tmp/omni_repos
          mkdir -p /tmp/omni_repos
          clone_omni_repo omniintelligence /tmp/omni_repos/omniintelligence
          clone_omni_repo omnibase_infra /tmp/omni_repos/omnibase_infra
          clone_omni_repo omnimemory /tmp/omni_repos/omnimemory
          clone_omni_repo omniclaude /tmp/omni_repos/omniclaude
          clone_omni_repo omnibase_core /tmp/omni_repos/omnibase_core
      - name: Copy suppressions file
        run: cp migration_conflict_suppressions.yaml /tmp/omni_repos/
      - name: Check for migration conflicts
        # Hard-fail on unsuppressed migration conflicts (OMN-6438).
        # Known intentional conflicts are listed in migration_conflict_suppressions.yaml.
        # --warn-columns: Column-reference violations are warnings until upstream repos fix them.
        run: >
          uv run check-migration-conflicts
          --repos-root /tmp/omni_repos
          --check-columns
          --warn-columns
          --suppressions-file migration_conflict_suppressions.yaml

  migration-inventory:
    name: Migration Inventory Sync
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [pre-commit, zone-filter]
    # OMN-14098 evidence-only fast-lane: skip on docs_only PRs; not required on dev/main.
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Clone peer repos
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          clone_omni_repo() {
            local repo="$1"
            local target="$2"
            if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
              local auth_header
              auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
              git -c "http.https://github.com/.extraheader=${auth_header}" clone --depth=1 "https://github.com/OmniNode-ai/${repo}.git" "${target}" 2>/dev/null
            else
              git clone --depth=1 "https://github.com/OmniNode-ai/${repo}.git" "${target}" 2>/dev/null
            fi
          }
          mkdir -p /tmp/repos
          for repo in omnibase_infra omnidash-archived omniintelligence omnimemory omninode_infra omniclaude omniweb; do
            clone_omni_repo "$repo" "/tmp/repos/$repo" || true
          done
          ln -s "$GITHUB_WORKSPACE" /tmp/repos/onex_change_control
      - name: Validate inventory
        run: uv run check-migration-inventory --repos-root /tmp/repos

  kafka-boundary-parity:
    name: Kafka Boundary Parity
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Clone cross-repo dependencies
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          clone_omni_repo() {
            local repo="$1"
            local target="$2"
            local clone_args=()
            if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
              local auth_header
              auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
              clone_args=(-c "http.https://github.com/.extraheader=${auth_header}")
            fi

            for attempt in 1 2 3; do
              rm -rf "${target}"
              if git "${clone_args[@]}" clone --depth=1 "https://github.com/OmniNode-ai/${repo}.git" "${target}"; then
                return 0
              fi
              if [ "${attempt}" -lt 3 ]; then
                sleep_seconds=$((attempt * 10))
                echo "::warning::Cross-repo clone attempt ${attempt}/3 failed for ${repo}; retrying in ${sleep_seconds}s"
                sleep "${sleep_seconds}"
              fi
            done

            echo "::error::Failed to clone ${repo} after 3 attempts"
            return 1
          }
          rm -rf /tmp/omni_repos
          mkdir -p /tmp/omni_repos
          clone_omni_repo omniclaude /tmp/omni_repos/omniclaude
          clone_omni_repo omnidash /tmp/omni_repos/omnidash
          clone_omni_repo omniintelligence /tmp/omni_repos/omniintelligence
          clone_omni_repo omnibase_infra /tmp/omni_repos/omnibase_infra
          clone_omni_repo omnimemory /tmp/omni_repos/omnimemory
          clone_omni_repo omnimarket /tmp/omni_repos/omnimarket
          ln -s "$GITHUB_WORKSPACE" /tmp/omni_repos/onex_change_control
      - name: Check Kafka boundary parity
        run: uv run check-boundary-parity --repos-root /tmp/omni_repos

  cross-repo-null-contract:
    name: "Python\u2194TypeScript Null Contract"
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: uv sync --frozen --group dev
      - name: Clone omnidash for cross-repo schema check
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          clone_omnidash() {
            rm -rf ../omnidash
            if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
              auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
              git -c "http.https://github.com/.extraheader=${auth_header}" clone --depth=1 https://github.com/OmniNode-ai/omnidash.git ../omnidash
            else
              git clone --depth=1 https://github.com/OmniNode-ai/omnidash.git ../omnidash
            fi
          }
          for attempt in 1 2 3; do
            if clone_omnidash; then
              exit 0
            fi
            rm -rf ../omnidash
            sleep $((attempt * 5))
          done
          clone_omnidash
      - name: Run Python null vs TypeScript optional contract test
        run: uv run pytest tests/integration/cross_repo/test_python_null_vs_ts_optional.py -v

  seam-contract-coverage:
    name: Seam Contract Coverage
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Fetch base branch for diff
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
          fi
      - name: Check seam contract coverage
        run: |
          BASE="${{ github.base_ref && format('origin/{0}', github.base_ref) || 'HEAD~1' }}"
