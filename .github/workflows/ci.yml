        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Clone cross-repo dependencies
        env:
          OMNI_REPO_CLONE_TOKEN: ${{ secrets.CROSS_REPO_PAT || github.token }}
        run: |
          clone_omni_repo() {
            local repo="$1"
            local target="$2"
            local clone_args=()
            if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
              local auth_header
              auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
              clone_args=(-c "http.https://github.com/.extraheader=${auth_header}")
            fi

            for attempt in 1 2 3; do
              rm -rf "${target}"
              if git "${clone_args[@]}" clone --depth=1 "https://github.com/OmniNode-ai/${repo}.git" "${target}"; then
                return 0
              fi
              if [ "${attempt}" -lt 3 ]; then
                sleep_seconds=$((attempt * 10))
                echo "::warning::Cross-repo clone attempt ${attempt}/3 failed for ${repo}; retrying in ${sleep_seconds}s"
                sleep "${sleep_seconds}"
              fi
            done

            echo "::error::Failed to clone ${repo} after 3 attempts"
            return 1
          }
          rm -rf /tmp/omni_repos
          mkdir -p /tmp/omni_repos
          clone_omni_repo omniintelligence /tmp/omni_repos/omniintelligence
          clone_omni_repo omnibase_infra /tmp/omni_repos/omnibase_infra
          clone_omni_repo omnimemory /tmp/omni_repos/omnimemory
          clone_omni_repo omniclaude /tmp/omni_repos/omniclaude
          clone_omni_repo omnibase_core /tmp/omni_repos/omnibase_core
      - name: Copy suppressions file
        run: cp migration_conflict_suppressions.yaml /tmp/omni_repos/
      - name: Check for migration conflicts
        # Hard-fail on unsuppressed migration conflicts (OMN-6438).
        # Known intentional conflicts are listed in migration_conflict_suppressions.yaml.
        # --warn-columns: Column-reference violations are warnings until upstream repos fix them.
        run: >
          uv run check-migration-conflicts
          --repos-root /tmp/omni_repos
          --check-columns
          --warn-columns
          --suppressions-file migration_conflict_suppressions.yaml

