name: CI

on:
  push:
    branches: [main, "hotfix/**"]
  pull_request:
    branches: [main, dev, "hotfix/**"]
  merge_group:
  workflow_dispatch:

jobs:
  # Zone filter (OMN-10475): short-circuit heavy jobs on docs-only and
  # declarative-evidence-only PRs. Most OCC traffic is contract+receipt
  # YAML in contracts/ and drift/dod_receipts/, both DOCS zone now.
  zone-filter:
    uses: OmniNode-ai/omnibase_core/.github/workflows/zone-filter.yml@main
    permissions:
      contents: read
      pull-requests: read
    with:
      python-version: "3.12"

  pre-commit:
    name: Pre-commit
    needs: [zone-filter]
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run full pre-commit
        if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
        run: SKIP=check-receipt-honesty,check-receipt-hardening uv run pre-commit run --all-files
      - name: Run dev PR changed-file pre-commit
        if: needs.zone-filter.outputs.docs_only != 'true' && github.event_name == 'pull_request' && github.base_ref == 'dev'
        env:
          BASE_REF: ${{ github.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --no-tags
          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMRT "origin/${BASE_REF}"...HEAD || true)
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "Dev PR fast-lane: no changed files for pre-commit."
            exit 0
          fi
          SKIP=check-receipt-honesty,check-receipt-hardening uv run pre-commit run --files "${changed_files[@]}"
      - name: Run evidence-only pre-commit
        if: needs.zone-filter.outputs.docs_only == 'true'
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          git fetch origin "$base_ref" --no-tags
          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACMRT "origin/${base_ref}"...HEAD -- contracts/ drift/dod_receipts/ \
              | grep -E '^(contracts/.*\.ya?ml|drift/dod_receipts/.*\.ya?ml)$' || true
          )
          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "Evidence-only fast-lane: no changed contract or receipt YAML files."
            exit 0
          fi
          SKIP=check-receipt-honesty,check-receipt-hardening uv run pre-commit run --files "${changed_files[@]}"
      - name: Run receipt hardening on changed receipts
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          git fetch origin "$base_ref" --no-tags
          mapfile -t receipt_files < <(
            git diff --name-only --diff-filter=ACMRT "origin/${base_ref}"...HEAD -- drift/dod_receipts/ \
              | grep -E '^drift/dod_receipts/.*\.ya?ml$' || true
          )
          if [ "${#receipt_files[@]}" -eq 0 ]; then
            echo "No changed receipt files for receipt hardening."
            exit 0
          fi
          uv run python scripts/validation/check_receipt_hardening.py "${receipt_files[@]}"

      # OMN-14428: every gate above is scoped to the data files it validates
      # (drift/dod_receipts/, contracts/, ...), so a PR that edits the gate's
      # own code but touches zero data files never executes it. That exact
      # hole is how OCC#3986 merged green with a stale-import ImportError in
      # check_receipt_hardening.py — the file-scoped diff was empty, so the
      # gate script never ran, and only the caught-ImportError compat shim it
      # shipped with kept the (never-exercised) import path "succeeding".
      # A change to a gate must run the gate. `--help` forces full
      # module-level import execution (argparse handles -h before validating
      # required positionals, so this needs no fixture data and works
      # uniformly for any argparse-based validator); check_receipt_hardening
      # additionally gets a real corpus run so a broken gate can't hide
      # behind an import that merely succeeds but a runtime path that
      # doesn't.
      - name: Validator self-check — a gate must run when its own code changes
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref || 'dev' }}
        run: |
          set -euo pipefail
          base_ref="${BASE_REF#refs/heads/}"
          git fetch origin "$base_ref" --no-tags
          mapfile -t changed_validators < <(
            git diff --name-only --diff-filter=ACMRT "origin/${base_ref}"...HEAD -- scripts/validation/ \
              | grep -E '^scripts/validation/check_[^/]*\.py$' || true
          )
          if [ "${#changed_validators[@]}" -eq 0 ]; then
            echo "No changed validator scripts; skipping self-check."
            exit 0
          fi
          echo "Validator code changed — executing (not just importing via tests) so the gate can't merge broken behind an empty data-file diff:"
          printf '  %s\n' "${changed_validators[@]}"
          fail=0
          for validator in "${changed_validators[@]}"; do
            if [ ! -f "$validator" ]; then
              echo "  $validator: deleted, skipping."
              continue
            fi
            if ! uv run python "$validator" --help > /tmp/validator_help.log 2>&1; then
              echo "  $validator: FAILED to execute even --help — the gate itself is broken:"
              cat /tmp/validator_help.log
              fail=1
              continue
            fi
            echo "  $validator: --help OK (module-level imports execute cleanly)."
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more changed validators cannot execute. Fix the gate before merging."
            exit 1
          fi

          # Stronger, corpus-backed check for check_receipt_hardening.py specifically:
          # a script that imports fine but breaks on real data (e.g. a lazily-imported
          # symbol) wouldn't be caught by --help alone.
          for validator in "${changed_validators[@]}"; do
            if [ "$(basename "$validator")" != "check_receipt_hardening.py" ] || [ ! -f "$validator" ]; then
              continue
            fi
            mapfile -t corpus_receipts < <(find drift/dod_receipts -name '*.yaml' ! -name '*.supersede.*')
            echo "Running $validator against the full corpus (${#corpus_receipts[@]} receipts)..."
            set +e
            uv run python "$validator" "${corpus_receipts[@]}" > /tmp/validator_corpus.log 2>&1
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              echo "Corpus run: clean (0 violations)."
            elif [ "$status" -eq 1 ] && grep -q "violation(s):" /tmp/validator_corpus.log; then
              echo "Corpus run: gate executed and reported expected violations (legacy corpus debt, not a gate defect)."
            else
              echo "Corpus run FAILED — the gate crashed instead of reporting violations:"
              cat /tmp/validator_corpus.log
              exit 1
            fi
          done

  type-check:
    # Note: This job runs mypy separately from pre-commit for full codebase checking.
    # Pre-commit hook runs mypy only on changed files (pre-push stage), while this job
    # checks the entire codebase (src/ and tests/) to catch type errors across all files.
    name: Type Check
    needs: zone-filter
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run mypy
        run: uv run mypy src/ tests/

  smart-test-select:
    name: Compute Smart Test Selection
    # OMN-14098 evidence-only fast-lane: docs_only guard AND'd onto the if: below.
    needs: [zone-filter]
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    if: github.event_name == 'pull_request' && github.base_ref != 'dev' && needs.zone-filter.outputs.docs_only != 'true'
    outputs:
      selected_paths: ${{ steps.select.outputs.selected_paths }}
      split_count: ${{ steps.select.outputs.split_count }}
      matrix: ${{ steps.select.outputs.matrix }}
      is_full_suite: ${{ steps.select.outputs.is_full_suite }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Compute changed files vs PR base
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}" --no-tags
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt
      - name: Run smart test selection
        id: select
        env:
          HEAD_REF: ${{ github.head_ref }}
          ENABLE_SMART_TESTS: ${{ vars.ENABLE_SMART_TESTS }}
        run: |
          [ "$ENABLE_SMART_TESTS" = "true" ] && FEATURE_FLAG="on" || FEATURE_FLAG="off"
          RESULT=$(PYTHONPATH=. uv run python scripts/ci/detect_test_paths.py \
            --changed-files-from /tmp/changed_files.txt \
            --ref-name "$HEAD_REF" \
            --event-name pull_request \
            --feature-flag "$FEATURE_FLAG")
          echo "Selection result: $RESULT"
          echo "selected_paths=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d["selected_paths"]))')" >> "$GITHUB_OUTPUT"
          echo "split_count=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["split_count"])')" >> "$GITHUB_OUTPUT"
          echo "matrix=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d["matrix"]))')" >> "$GITHUB_OUTPUT"
          echo "is_full_suite=$(echo "$RESULT" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(str(d["is_full_suite"]).lower())')" >> "$GITHUB_OUTPUT"

  test:
    name: Tests
    needs: zone-filter
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run tests with coverage
        run: uv run pytest --cov=onex_change_control --cov-report=term-missing

  schema-purity:
    name: Schema Purity & Naming Check
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [zone-filter, test, contract-compliance]
    # Run when test was successful or skipped (zone-filter docs-only path).
    # Skip only when contract-compliance failed/cancelled or test outright failed.
    if: |
      always() && needs.zone-filter.outputs.docs_only != 'true'
        && (github.event_name != 'pull_request' || github.base_ref != 'dev')
        && needs.contract-compliance.result == 'success'
        && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Check schema purity and naming conventions
        run: uv run check-schema-purity

  substance-floor:
    name: Contract Substance Floor (OMN-14409)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    # Deliberately UNCONDITIONAL — no zone-filter gate, no path filter, no
    # docs_only skip. The pre-commit hook only fires when a PR touches
    # contracts/*.yaml, so a PR that changes the gate itself (like the one that
    # introduced it) would never execute it: the hook logs "(no files to check)
    # Skipped" and CI goes green having proven nothing. That is precisely the
    # OMN-14416 failure — a defense that never runs — and it nearly shipped
    # inside the fix for it. This job executes the gate on every PR.
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Unit tests for the deriver + floor
        run: uv run pytest tests/test_check_contract_substance_floor.py -v
      - name: Sweep the full contract corpus
        run: uv run python scripts/validation/check_contract_substance_floor.py --all
      # OMN-14767 / F-15 — DoD-authoring hygiene gate (placeholder + self-PR
      # impossible-merge). Runs in this same UNCONDITIONAL job (no new workflow,
      # net-minimal surface) so the per-row authoring gate executes on every PR,
      # not only when a PR happens to touch contracts/*.yaml (the OMN-14416
      # "defense that never runs" lesson the substance floor above already learned).
      - name: Unit tests for the DoD-authoring gate
        run: uv run pytest tests/test_check_contract_dod_authoring.py -v
      - name: Sweep the full contract corpus (DoD authoring)
        run: uv run python scripts/validation/check_contract_dod_authoring.py --all

  divergent-automation-pr-guard:
    name: No Divergent Automation PRs (OMN-14778)
    # Deliberately UNCONDITIONAL — no zone-filter/docs_only gate and no path
    # filter. The pre-commit hook only fires when a PR touches a workflow or the
    # checker itself, so a PR that changes neither would never execute it. This
    # job runs the gate on every PR (the OMN-14416 "defense that never runs"
    # lesson) so the retired occ-rerun-downstream anti-pattern — a push-to-main
    # workflow that cuts a branch off main and opens a PR to the divergent `dev`
    # base — cannot be reintroduced.
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Unit tests for the guard (RED/GREEN discrimination)
        run: uv run pytest tests/test_no_divergent_automation_pr.py -v
      - name: Scan all workflows for the divergent-automation-PR anti-pattern
        run: uv run python scripts/validation/check_no_divergent_automation_pr.py --all --repo-root .

  no-localhost-fallbacks:
    name: No localhost env-var fallbacks in src/ (OMN-10737)
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    needs: [zone-filter, test]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Validate no localhost fallbacks
        run: uv run python scripts/validation/validate_no_env_fallbacks.py

  url-authority-gate:
    # OMN-13563 Wave 4: URL authority ratchet (non-blocking report; pre-commit hook is the
    # blocking surface). Fails only on NEW URL literals outside contracts — baseline is
    # burn-down only. Suppress with: # url-authority-ok: <reason>
    name: URL Authority Gate (OMN-13563)
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run URL authority ratchet
        continue-on-error: true
        run: >
          uv run python -m omnibase_core.validation.validator_url_authority
          --repo onex_change_control --repo-root . --all src/

  no-new-os-environ:
    # OMN-13563 Wave 4: AST os.environ read gate (non-blocking report; pre-commit hook is
    # the blocking surface). Exempts tests/, scripts/, examples/. Suppress with:
    # # env-read-ok: <reason>
    name: No New os.environ Reads (OMN-13563)
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Run no-new-os-environ validator
        continue-on-error: true
        run: uv run pre-commit run no-new-os-environ --all-files

  imperative-contract-guard:
    name: Imperative Contract Guard
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.12"
      - name: Validate imperative contract guard wiring
        run: |
          uv run check-imperative-contracts \
            --repo-root . \
            --allowlists-dir allowlists \
            --scan-freestanding
      - name: Scripts canonical-form guard (DEFAULT-DENY new scripts, OMN-14475)
        run: |
          uv run check-imperative-contracts \
            --repo-root . \
            --allowlists-dir allowlists \
            --scan-scripts

  ai-slop-check:
    name: AI-Slop Pattern Check (strict, PR diff)
    needs: [zone-filter]
    if: needs.zone-filter.outputs.docs_only != 'true' && (github.event_name != 'pull_request' || github.base_ref != 'dev')
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'dev')
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Compute changed Python/Markdown files vs PR base
        id: changed
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --depth=1
            FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.py' '*.md' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 -- '*.py' '*.md' 2>/dev/null | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
      - name: Check changed files for AI-slop patterns (strict)
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then exit 0; fi
          python scripts/validation/check_ai_slop.py --strict $FILES

  context-integrity-contracts:
    name: Context Integrity Contract Compliance
    # OMN-14098 evidence-only fast-lane: skip heavy code analysis on pure
    # contracts/ + drift/dod_receipts/ evidence PRs (docs_only). Not a required
    # context on dev or main, so skipping cannot wedge branch protection.
