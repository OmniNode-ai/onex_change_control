#
# CodeQL security and quality analysis for onex_change_control (self-scan).
# This repo both hosts the reusable workflow and calls it for its own scan.
# OMN-5427

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql-reusable.yml
    with:
      language: python
      query_suite: security-and-quality
    permissions:
      actions: read
      contents: read
      security-events: write
