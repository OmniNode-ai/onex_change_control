name: Imperative Contract Guard

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for the validator runtime.
        required: false
        type: string
        default: "3.12"
      uv-version:
        description: uv version for the validator runtime.
        required: false
        type: string
        default: "0.8.3"
      target-ref:
        description: Caller repository ref to check out.
        required: false
        type: string
        default: ""
      onex-change-control-ref:
        description: onex_change_control ref containing the validator and allowlists.
        required: false
        type: string
        default: main

jobs:
  imperative-contract-guard:
    name: Imperative Contract Guard
    runs-on: >-
      ${{
        ((github.event_name == 'pull_request' && github.base_ref == 'dev') ||
         (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository))
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v7
        with:
          path: target
          ref: ${{ inputs['target-ref'] || github.ref }}

      - name: Checkout onex_change_control
        uses: actions/checkout@v7
        with:
          repository: OmniNode-ai/onex_change_control
          ref: ${{ inputs['onex-change-control-ref'] }}
          path: onex_change_control

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs['python-version'] }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ inputs['uv-version'] }}

      - name: Run imperative contract guard
        working-directory: onex_change_control
        env:
          UV_HTTP_TIMEOUT: "600"
          UV_SYNC_ATTEMPTS: "3"
          UV_SYNC_RETRY_DELAY_SECONDS: "10"
        run: |
          git config --global http.version HTTP/1.1
          attempt=1
          while true; do
            # NOTE(OMN-14780): GH Actions runs `run:` steps under `bash -e {0}` by
            # default, and that -e is active here even though we never `set -e`. A
            # bare `sync_output="$(uv sync ...)"` assignment would abort the whole
            # step on the first uv failure -- before we can classify it -- so we use
            # the command substitution as the condition of an `if` (bash does not
            # trigger -e for a command that is part of an if/while/until condition,
            # regardless of ambient -e). This also captures uv's output so we can
            # tell a deterministic lockfile drift apart from a transient transport
            # error.
            if sync_output="$(uv sync --locked --all-extras 2>&1)"; then
              status=0
            else
              status=$?
            fi
            printf '%s\n' "$sync_output"

            if [ "$status" -eq 0 ]; then
              break
            fi

            # OMN-14780: a `--locked` lockfile mismatch is a DETERMINISTIC,
            # resolution-time failure -- not a transient/network flake. Retrying it
            # burns the entire attempt budget, fails identically every time, and
            # mislabels a stale lockfile as a transport error ("second failure of
            # the same check is a bug, not a flake"). Detect uv's stale-lock
            # signature and fail fast with an actionable message instead of retrying.
            if printf '%s\n' "$sync_output" | grep -qE 'lockfile.*needs to be updated|was provided\. To update the lockfile'; then
              echo "::error::uv.lock is stale versus pyproject.toml: uv sync --locked resolved cleanly but the lockfile is out of date (deterministic failure, not a transient flake). Run 'uv lock' in onex_change_control and commit the refreshed uv.lock. Refusing to consume the retry budget (OMN-14780)."
              exit "$status"
            fi

            if [ "$attempt" -ge "$UV_SYNC_ATTEMPTS" ]; then
              echo "::error::uv sync failed after ${attempt} attempt(s) (last exit ${status}; transient/transport signature)"
              exit "$status"
            fi

            sleep_seconds=$((UV_SYNC_RETRY_DELAY_SECONDS * attempt))
            echo "::warning::uv sync attempt ${attempt}/${UV_SYNC_ATTEMPTS} failed with exit ${status} (transient/transport); retrying in ${sleep_seconds}s"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

          uv run check-imperative-contracts \
            --repo-root "$GITHUB_WORKSPACE/target" \
            --allowlists-dir "$GITHUB_WORKSPACE/onex_change_control/allowlists" \
            --scan-freestanding
