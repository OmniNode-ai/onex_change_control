#
# Required-Check Skip-Vector Guard — caller for onex_change_control PRs.
# OMN-14864 (fan-out from the omniclaude canary, OMN-14854 / omniclaude#1917).
#
# Invokes the canonical reusable workflow hosted in omniclaude, which resolves
# every REQUIRED row in .github/required-checks.yaml (schema v3) back to its
# producing job and fails closed on four skip vectors: path-scoped
# pull_request/pull_request_target/merge_group triggers, an ungated job-level
# `if:` on the job that IS the required context, an ungated caller-job `if:`
# on a reusable-workflow call, and a required context with no
# pull_request/merge_group trigger at all.
#
# Produces status check: "required-check-skip-guard / check-skip-vectors"
#
# NOT added to required_status_checks in this PR. This workflow runs
# (advisory/observed) on every PR to onex_change_control, but the
# branch-protection flip to REQUIRED is a follow-up ticket, gated on 2+
# independent green runs on `dev` — same ordering OMN-14854 used for the
# omniclaude canary. See `.github/required-checks.yaml` for this context's
# `mode: ADVISORY` row.
#
# IMPORTANT: this trigger MUST NOT carry a `paths:`/`paths-ignore:` filter
# (design spec section 4c). This is the one required-check workflow that is
# exempt from "narrow the trigger for efficiency" — a path filter here would
# be the exact self-referential skip-vector this guard exists to catch.

name: Required-Check Skip-Vector Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  required-check-skip-guard:
    uses: OmniNode-ai/omniclaude/.github/workflows/required-check-skip-guard-reusable.yml@main
