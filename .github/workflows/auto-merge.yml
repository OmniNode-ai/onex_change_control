#
# OMN-6571: Automatically enable auto-merge (squash) on every PR opened
# by jonahgabriel. Ensures PRs do not sit idle in the merge queue waiting
# for manual enrollment.
#
# OMN-7786: Re-trigger on review and check_suite events so the workflow
# re-attempts auto-merge after CodeRabbit review finishes and branch
# protection gates clear. Silent continue-on-error removed; "already
# enqueued" races are tolerated but real failures surface.
#
# OMN-10485: OCC eligibility preflight gate added. Auto-merge CANNOT arm
# until the PR's ticket has passing OCC receipts. The `occ-check` job
# queries the latest `occ-preflight / eligibility` status check result for
# the PR via the GitHub Checks API. If the check is missing or not SUCCESS,
# auto-merge arming is deferred (exit 0 to avoid noise) and the workflow
# re-triggers on the next `check_suite` completion event when the preflight
# check finishes. On merge_group events the gate re-evaluates against the
# current OCC main SHA (no cached PR-pass accepted).
name: Auto-Merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to enable auto-merge on"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Enable Auto-Merge
    runs-on: >-
      ${{
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name != github.repository)
        && fromJSON(vars.OMNI_PUBLIC_PR_RUNS_ON_JSON || '["ubuntu-latest"]')
        || fromJSON(vars.OMNI_TRUSTED_CI_RUNS_ON_JSON || '["self-hosted","omnibase-ci"]')
      }}
    steps:
      - name: Resolve PR and author
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_FROM_PAYLOAD: ${{ github.event.pull_request.number }}
          PR_FROM_DISPATCH: ${{ github.event.inputs.pr_number }}
          CHECK_SUITE_PRS: ${{ toJson(github.event.check_suite.pull_requests) }}
          PR_AUTHOR_FROM_PAYLOAD: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request|pull_request_review)
              PR="$PR_FROM_PAYLOAD"
              ACTOR="$PR_AUTHOR_FROM_PAYLOAD"
              ;;
            workflow_dispatch)
              PR="$PR_FROM_DISPATCH"
              ACTOR="$(gh pr view "$PR" --json author --jq '.author.login')"
              ;;
            check_suite)
              PR="$(echo "$CHECK_SUITE_PRS" | jq -r 'if type == "array" and length > 0 then .[0].number else empty end')"
              if [ -z "$PR" ]; then
                echo "check_suite had no associated PRs; nothing to do"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ACTOR="$(gh pr view "$PR" --json author --jq '.author.login')"
              ;;
            *)
              echo "unsupported event: $EVENT_NAME"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      # OMN-10485: OCC eligibility gate.
      # Query the `occ-preflight / eligibility` check result for the PR's head SHA.
      # - SUCCESS → proceed to arm auto-merge.
      # - PENDING / missing → defer silently; re-triggered when occ-preflight completes.
      # - FAILURE → hard fail; log reason and exit 1 to surface the block.
      # merge_group events skip this step; branch protection enforces occ-preflight
      # as a required status check for the merge group itself.
      - name: Check OCC eligibility preflight status
        id: occ_gate
        if: steps.resolve.outputs.skip != 'true' && steps.resolve.outputs.actor == 'jonahgabriel' && github.event_name != 'merge_group'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail

          head_sha="$(gh pr view "$PR" --repo "$GH_REPO" --json headRefOid --jq '.headRefOid')"
          if [ -z "$head_sha" ]; then
            echo "::warning::Could not resolve head SHA for PR #${PR}; deferring auto-merge"
            echo "defer=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Query the Checks API for the occ-preflight / eligibility check on this SHA.
          # The check_run name is "eligibility" (job key in occ-preflight.yml) nested
          # under the "OCC Preflight" workflow. GitHub exposes it as "occ-preflight / eligibility".
          check_result="$(gh api \
            "repos/${GH_REPO}/commits/${head_sha}/check-runs" \
            --jq '[.check_runs[] | select(.name == "eligibility" or .name == "occ-preflight / eligibility")] | sort_by(.started_at) | last | {conclusion: .conclusion, status: .status}' \
            2>/dev/null || echo '{}')"

          conclusion="$(printf '%s' "$check_result" | jq -r '.conclusion // "missing"')"
          status="$(printf '%s' "$check_result" | jq -r '.status // "missing"')"

          echo "occ-preflight status=${status} conclusion=${conclusion}"

          if [ "$conclusion" = "success" ]; then
            echo "OCC eligibility: PASS — proceeding to arm auto-merge"
            echo "defer=false" >> "$GITHUB_OUTPUT"
          elif [ "$conclusion" = "failure" ] || [ "$conclusion" = "action_required" ]; then
            echo "::error::OCC PREFLIGHT FAILED for PR #${PR} (head ${head_sha}). Auto-merge will not arm until OCC eligibility is satisfied."
            echo "::error::Add a passing receipt to drift/dod_receipts/ in onex_change_control for all dod_evidence items cited in this PR's ticket contract."
            exit 1
          else
            # PENDING or missing: defer. Auto-merge workflow re-fires on check_suite completion.
            echo "::notice::OCC preflight ${status}/${conclusion} for PR #${PR} — deferring auto-merge arming until eligibility check completes"
            echo "defer=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: >-
          steps.resolve.outputs.skip != 'true' &&
          steps.resolve.outputs.actor == 'jonahgabriel' &&
          steps.occ_gate.outputs.defer != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ steps.resolve.outputs.pr }}
        run: |
          set -euo pipefail
          if output=$(gh pr merge "$PR" --repo "$GH_REPO" --auto --squash 2>&1); then
            echo "auto-merge enabled: $output"
            exit 0
          fi
          if echo "$output" | grep -qiE "already enqueued|already queued|auto-merge already enabled"; then
            echo "auto-merge not newly enabled (expected): $output"
            exit 0
          fi
          echo "auto-merge failed: $output"
          exit 1
