# Reusable composite action: validate-boundaries
#
# Runs cross-repo boundary validation checks (Kafka parity, migration conflicts)
# in the calling repository's CI.
#
# Callable via:
#   uses: OmniNode-ai/onex_change_control/.github/actions/validate-boundaries@main
#
# OMN-5770: Cross-Artifact Seam Verification

name: "ONEX Boundary Validation"
description: >
  Run cross-repo boundary checks (Kafka parity, migration conflicts) to detect
  seam regressions before merge.  Clones peer repos, runs selected checks, and
  aggregates results.

inputs:
  checks:
    description: >
      Comma-separated list of checks to run.
      Available: boundary-parity, migration-conflicts
    required: false
    default: "boundary-parity,migration-conflicts"
  warn-only:
    description: >
      If "true", exit 0 even when violations are found (CI warning mode).
    required: false
    default: "true"
  repos:
    description: >
      Comma-separated list of peer repos to clone.  Defaults to all ONEX repos
      with boundary seams.
    required: false
    default: "omniclaude,omnidash,omniintelligence,omnibase_infra,omnibase_core,omnimemory"

runs:
  using: "composite"
  steps:
    - name: Checkout calling repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Detect boundary validation scope
      id: scope
      shell: bash
      run: |
        BOUNDARY_PARITY_REQUESTED=false
        MIGRATION_CONFLICTS_REQUESTED=false
        IFS=',' read -ra CHECKS <<< "${{ inputs.checks }}"
        for check in "${CHECKS[@]}"; do
          check=$(echo "$check" | xargs)
          case "$check" in
            boundary-parity)
              BOUNDARY_PARITY_REQUESTED=true
              ;;
            migration-conflicts)
              MIGRATION_CONFLICTS_REQUESTED=true
              ;;
          esac
        done

        MIGRATION_CONFLICTS_SHOULD_RUN="${MIGRATION_CONFLICTS_REQUESTED}"
        if [[ "${MIGRATION_CONFLICTS_REQUESTED}" == "true" && "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          BASE_SHA="$(jq -r '.pull_request.base.sha // empty' "${GITHUB_EVENT_PATH}")"
          if [[ -z "${BASE_SHA}" ]]; then
            echo "::warning::Could not resolve pull request base SHA; running migration-conflicts conservatively."
          elif ! git fetch --no-tags --depth=1 origin "${BASE_SHA}"; then
            echo "::warning::Could not fetch pull request base SHA; running migration-conflicts conservatively."
          else
            git diff --name-only "${BASE_SHA}"...HEAD > changed.txt
            if grep -Eq '^docker/migrations/.+\.sql$' changed.txt; then
              echo "SQL migration files changed; migration-conflicts will run."
            else
              echo "No SQL migration files changed; migration-conflicts will be skipped."
              MIGRATION_CONFLICTS_SHOULD_RUN=false
            fi
          fi
        fi

        SHOULD_RUN_BOUNDARY_CHECKS=false
        if [[ "${BOUNDARY_PARITY_REQUESTED}" == "true" || "${MIGRATION_CONFLICTS_SHOULD_RUN}" == "true" ]]; then
          SHOULD_RUN_BOUNDARY_CHECKS=true
        fi

        echo "migration_conflicts_should_run=${MIGRATION_CONFLICTS_SHOULD_RUN}" >> "$GITHUB_OUTPUT"
        echo "should_run_boundary_checks=${SHOULD_RUN_BOUNDARY_CHECKS}" >> "$GITHUB_OUTPUT"

    - name: Checkout onex_change_control validators
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      uses: actions/checkout@v6
      with:
        repository: OmniNode-ai/onex_change_control
        ref: main
        path: .onex_change_control
        sparse-checkout: |
          src/
          README.md
          pyproject.toml
          uv.lock

    - name: Set up Python
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install onex_change_control
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      shell: bash
      run: |
        cd .onex_change_control
        uv sync --no-group dev

    - name: Clone peer repos
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      id: clone
      shell: bash
      run: |
        rm -rf /tmp/omni_repos
        mkdir -p /tmp/omni_repos
        DEGRADED=""
        IFS=',' read -ra REPOS <<< "${{ inputs.repos }}"
        for repo in "${REPOS[@]}"; do
          repo=$(echo "$repo" | xargs)  # trim whitespace
          if [ -n "${OMNI_REPO_CLONE_TOKEN:-}" ]; then
            auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${OMNI_REPO_CLONE_TOKEN}" | base64 | tr -d '\n')"
            clone_args=(-c "http.https://github.com/.extraheader=${auth_header}")
          else
            clone_args=()
          fi
          if git "${clone_args[@]}" clone --depth=1 "https://github.com/OmniNode-ai/${repo}.git" "/tmp/omni_repos/${repo}" 2>/dev/null; then
            echo "Cloned ${repo}"
          else
            echo "::warning::Boundary verification DEGRADED: could not clone ${repo}. Seam parity NOT confirmed."
            DEGRADED="${DEGRADED}${repo},"
          fi
        done
        echo "degraded=${DEGRADED}" >> "$GITHUB_OUTPUT"

    - name: Symlink calling repo into workspace
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      shell: bash
      run: |
        # Extract repo name from GITHUB_REPOSITORY (e.g., OmniNode-ai/omnibase_infra -> omnibase_infra)
        REPO_NAME="${GITHUB_REPOSITORY##*/}"
        # Remove any cloned version (main) and replace with the PR's checkout
        rm -rf "/tmp/omni_repos/${REPO_NAME}"
        ln -s "$GITHUB_WORKSPACE" "/tmp/omni_repos/${REPO_NAME}"
        echo "Symlinked ${REPO_NAME} -> $GITHUB_WORKSPACE"

    - name: Run boundary checks
      if: steps.scope.outputs.should_run_boundary_checks == 'true'
      shell: bash
      run: |
        FAILURE_COUNT=0

        # Check for degraded clone state
        DEGRADED="${{ steps.clone.outputs.degraded }}"
        if [[ -n "$DEGRADED" ]]; then
          echo "::warning::Some peer repos could not be cloned: ${DEGRADED}"
          echo "::warning::Boundary verification is DEGRADED — seam parity NOT fully confirmed."
          FAILURE_COUNT=$((FAILURE_COUNT + 1))
        fi

        IFS=',' read -ra CHECKS <<< "${{ inputs.checks }}"
        for check in "${CHECKS[@]}"; do
          check=$(echo "$check" | xargs)
          case "$check" in
            boundary-parity)
              echo "::group::Running boundary-parity check"
              cd .onex_change_control
              if uv run check-boundary-parity --repos-root /tmp/omni_repos; then
                echo "::endgroup::"
                echo "boundary-parity: PASSED"
              else
                echo "::endgroup::"
                echo "::warning::boundary-parity: FAILED — see above for details"
                FAILURE_COUNT=$((FAILURE_COUNT + 1))
              fi
              cd ..
              ;;
            migration-conflicts)
              if [[ "${{ steps.scope.outputs.migration_conflicts_should_run }}" != "true" ]]; then
                echo "migration-conflicts: SKIPPED — no SQL migration files changed"
                continue
              fi
              echo "::group::Running migration-conflicts check"
              cd .onex_change_control
              if uv run check-migration-conflicts --repos-root /tmp/omni_repos --check-columns --warn-only; then
                echo "::endgroup::"
                echo "migration-conflicts: PASSED"
              else
                echo "::endgroup::"
                echo "::warning::migration-conflicts: FAILED — see above for details"
                FAILURE_COUNT=$((FAILURE_COUNT + 1))
              fi
              cd ..
              ;;
            *)
              echo "::warning::Unknown check: ${check}"
              ;;
          esac
        done

        echo ""
        echo "=============================="
        echo "Boundary check summary: ${FAILURE_COUNT} failure(s)"
        echo "=============================="

        if [[ "${{ inputs.warn-only }}" == "true" ]]; then
          echo "warn-only mode: exiting 0 regardless of failures"
          exit 0
        fi

        if [[ "$FAILURE_COUNT" -gt 0 ]]; then
          exit "$FAILURE_COUNT"
        fi
