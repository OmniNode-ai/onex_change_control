name: Setup uv
description: Setup Python, install uv, and install project dependencies

inputs:
  python-version:
    description: Python version to use
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install dependencies
      shell: bash
      run: uv sync --all-groups
