name: Setup uv
description: Setup Python, install uv, and install project dependencies

inputs:
  python-version:
    description: Python version to use
    required: true

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install dependencies
      shell: bash
      env:
        UV_HTTP_TIMEOUT: "600"
        UV_SYNC_ATTEMPTS: "5"
        UV_SYNC_RETRY_DELAY_SECONDS: "10"
      run: |
        set -euo pipefail
        attempt=1
        until uv sync --all-groups; do
          status=$?
          if [ "$attempt" -ge "$UV_SYNC_ATTEMPTS" ]; then
            echo "::error::uv sync failed after ${attempt} attempt(s)"
            exit "$status"
          fi

          sleep_seconds=$((UV_SYNC_RETRY_DELAY_SECONDS * attempt))
          echo "::warning::uv sync attempt ${attempt}/${UV_SYNC_ATTEMPTS} failed with exit ${status}; retrying in ${sleep_seconds}s"
          sleep "$sleep_seconds"
          attempt=$((attempt + 1))
        done
