# required-checks.yaml v3 (OMN-14864 — fan-out from the omniclaude canary, OMN-14854)
# Location: .github/required-checks.yaml
#
# This is the OPERATIONAL input to the Required-Check Skip-Vector Guard
# (validate_no_required_check_skip_vectors.py, canonical source hosted in
# OmniNode-ai/omniclaude, invoked here via
# required-check-skip-guard-caller.yml -> required-check-skip-guard-reusable.yml@dev).
#
# Scope note: this manifest is `dev`-scoped only, mirroring OMN-14854's own
# precedent (the omniclaude canary manifest is also dev-only). onex_change_control's
# `main` required_status_checks set is verifiably different from `dev`'s (extra
# contexts: "CodeQL / CodeQL Analysis (python)", "Kafka Boundary Parity",
# "Migration Conflict Check", "Migration Inventory Sync",
# "Python↔TypeScript Null Contract", "Seam Contract Coverage",
# "Imperative Contract Guard", "AI-Slop Pattern Check (strict, PR diff)",
# "Context Integrity Contract Compliance", "PEP 604 Type Union Check (UP007)";
# missing: several dev-only contexts) — a per-branch schema is an open,
# unresolved follow-up, not invented in this PR.
#
# Exhaustive for `dev`: every context in required_status_checks.contexts for
# onex_change_control's `dev` branch has a `mode: REQUIRED` row below (fetched via
# `gh api repos/OmniNode-ai/onex_change_control/branches/dev/protection/required_status_checks`,
# 23 contexts, verified 2026-07-20), plus one `mode: ADVISORY` row for this
# guard's own composed context (not yet added to required_status_checks — see
# the caller workflow's header comment for the flip-timing rule).
#
# Do NOT rename/remove a REQUIRED row without following the Branch Protection
# Migration Safety procedure — flip branch protection first (or same PR), then
# update this file, so the reconcile job never observes a divergence window.
#
# `job_path` len 1 = Shape A (direct job); len 2 = Shape B/C
# ([caller_job_id, reusable_job_id]) per the design spec's context->job
# resolution algorithm (OMN-14854 ticket, spec section 1). NOTE: these
# `workflow`/`job_path`/`caller_workflow`/`cross_repo_ref` fields are
# documentation for humans — the validator itself resolves every context
# algorithmically by scanning `.github/workflows/` (see
# `_workflow_model.py::resolve_context_to_job`), so they are never a source of
# drift for the pass/fail verdict, only for readability.

schema_version: 3
classification: toolchain
