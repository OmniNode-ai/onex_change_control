#
# Machine-readable registry of OmniNode Deterministic Truth Doctrine clauses.
# Source doctrine: docs/standards/OMNINODE_DETERMINISTIC_TRUTH_DOCTRINE.md
# Coverage values: "enforced" = CI gate exists and blocks merge;
#                  "advisory" = CI gate exists but does not block;
#                  "uncovered" = no CI gate.

schema_version:
  major: 1
  minor: 0
  patch: 0

clauses:
  - clause_id: "DT-001"
    title: "Truth must be proven, not claimed"
    description: >
      Truth is established only when authoritative downstream state reflects the result, outputs are observable
      through approved boundaries, results survive replay, and durable evidence exists outside the originating
      workstation. Status, logs, and completion signals alone are not truth.
    doctrine_section: "1"
    check: "dod_evidence_required"
    ci_gate: "verify/Run Receipt-Gate"
    coverage: "enforced"

  - clause_id: "DT-002"
    title: "Clients render truth; they do not create it"
    description: >
      Clients must request or subscribe to authoritative data and render it. Clients must not infer authoritative
      system state, merge event streams into truth, deduplicate authoritative records, read backend databases
      directly, or fabricate consistency. Client-side state is allowed strictly for presentation.
    doctrine_section: "2"
    check: "no_client_side_truth_creation"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-003"
    title: "Systems must be deterministic under replay"
    description: >
      Same canonical input sequence + same contract/reducer version must produce the same projected state.
      Replay must not depend on wall-clock timing, consumer arrival order, process restarts, or transient
      runtime state.
    doctrine_section: "3"
    check: "replay_determinism"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-004"
    title: "Ordering must be explicit and contracted"
    description: >
      Every projection must declare its ordering contract. Canonical ordering must be based on ingest-assigned
      sequence, projection version, or another explicitly contracted monotonic value. No component may
      rely on incidental arrival order.
    doctrine_section: "4"
    check: "projection_ordering_contract_required"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-005"
    title: "Reducers define state progression"
    description: >
      State progression is defined by the projection's reducer contract. Old or out-of-order events must
      be handled according to contract — ignored, quarantined, treated as no-op, or explicitly rejected.
      They must never silently corrupt state.
    doctrine_section: "5"
    check: "reducer_contract_required"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-006"
    title: "State is a materialized projection"
    description: >
      State must be explicitly constructed from source events or contracted inputs. A projection owns
      sequencing, reduction, aggregation, shape, and cursor semantics. There is no hidden authoritative
      state.
    doctrine_section: "6"
    check: "no_hidden_authoritative_state"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-007"
    title: "Contracts define reality"
    description: >
      Every boundary must be governed by explicit contracts covering event schemas, command schemas, ordering
      semantics, projection schemas, cursor semantics, API response schemas, and failure behavior. If
      it crosses a boundary, it must be formally defined. No implicit assumptions are allowed.
    doctrine_section: "7"
    check: "grep_no_hardcoded_topics"
    ci_gate: "contract-compliance"
    coverage: "enforced"

  - clause_id: "DT-008"
    title: "Cursors represent projection progress"
    description: >
      A cursor is not pagination. A cursor represents the maximum known truth boundary for a projection.
      A cursor must be monotonic, projection-scoped, comparable within its scope, and derived from canonical
      sequence or projection progress. Ambiguous or inconsistent cursors are invalid.
    doctrine_section: "8"
    check: "cursor_contract_required"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-009"
    title: "Fail fast and loud"
    description: >
      The system must detect violations immediately, surface errors clearly and aggressively, and prevent
      invalid state transitions. The system must never silently accept invalid data, mask ordering violations,
      fabricate state, hide projection inconsistency, or mark work complete without durable evidence.
    doctrine_section: "9"
    check: "no_silent_failures"
    ci_gate: "verify/Run Receipt-Gate"
    coverage: "enforced"

  - clause_id: "DT-010"
    title: "Degrade safely"
    description: >
      When failure occurs, correctness takes priority over availability. The system may delay processing,
      quarantine invalid events, dead-letter malformed inputs, or mark projections as degraded explicitly.
      It must not silently drop events, guess missing state, reorder without authority, or present degraded
      data as complete truth.
    doctrine_section: "10"
    check: "safe_degradation_required"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-011"
    title: "Ingestion and interpretation are separate"
    description: >
      Transport is not state logic. Event consumers may validate envelopes, validate schema compatibility,
      deduplicate by message identity, route malformed messages, and deliver events. Event consumers must
      not apply projection reducers, infer authoritative system state, or encode view-specific truth semantics.
      Mixing transport and projection semantics creates nondeterminism.
    doctrine_section: "11"
    check: "no_transport_projection_mixing"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-012"
    title: "Runtime complexity must be isolated"
    description: >
      Complexity belongs in controlled layers: event ingestion, runtime orchestration, projection services,
      contract validation, and evidence generation. Complexity must not leak into clients, duplicated
      service logic, uncontracted scripts, or dashboard-only state. Mocks and simulations do not prove
      system truth.
    doctrine_section: "12"
    check: "complexity_isolation"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-013"
    title: "Migration must be staged and recoverable"
    description: >
      No system is replaced without proof. Required approach: parallel or shadow validation where practical,
      staged rollout, explicit deprecation, rollback or forward-repair plan, observable comparison between
      old and new paths, and durable evidence before deletion. A new system must match or exceed the correctness
      guarantees of the system it replaces.
    doctrine_section: "13"
    check: "migration_staged_required"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-014"
    title: "Canonical reducers win"
    description: >
      Last-write-wins is valid only when the projection contract explicitly defines that behavior. Otherwise
      reducer semantics determine truth. The system must never allow first-write-wins by accident, arrival
      order to determine truth, UI sort order to determine truth, or undefined conflict behavior.
    doctrine_section: "14"
    check: "reducer_wins_required"
    ci_gate: null
    coverage: "uncovered"

  - clause_id: "DT-015"
    title: "Evidence is a first-class output"
    description: >
      Every externally visible operation, state transition, deployment, and completion claim must produce
      durable, inspectable evidence stored in approved surfaces: OCC receipts and contracts, CI checks
      and pipelines, pull requests and review records, Linear comments or attachments, committed manifests,
      or approved artifact storage. Evidence must exist outside ephemeral runtime state and support independent
      verification. A task is not complete without durable evidence.
    doctrine_section: "15"
    check: "durable_evidence_required"
    ci_gate: "verify/Run Receipt-Gate"
    coverage: "enforced"
