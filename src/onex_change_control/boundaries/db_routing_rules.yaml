---
version: "1"
rules:
  - service_pattern: "intelligence|omniintelligence"
    expected_database: omniintelligence
    connection_env: OMNIINTELLIGENCE_DB_URL
  - service_pattern: "omnidash|analytics"
    expected_database: omnidash_analytics
    connection_env: OMNIDASH_ANALYTICS_DB_URL
  - service_pattern: "omnimemory|memory"
    expected_database: omnimemory
    connection_env: OMNIMEMORY_DB_URL
  - service_pattern: "omniclaude|claude"
    expected_database: omniclaude
    connection_env: OMNICLAUDE_DB_URL
