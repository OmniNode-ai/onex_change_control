name: node_contract_dependency_reducer
contract_name: node_contract_dependency_reducer
node_name: node_contract_dependency_reducer
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: REDUCER_GENERIC

description: >
  Accumulates contract overlap graph results over time. Tracks hotspot trends,
  edge stability, and wave count changes. Emits intents for effect nodes when
  overlap patterns change significantly.

input_model:
  type_name: ModelContractDependencyOutput
  module: onex_change_control.models.model_contract_dependency_output

output_model:
  type_name: ModelDependencyHistory
  module: onex_change_control.models.model_dependency_history

state_machine:
  initial_state: stable
  states:
    - stable
    - hotspot_detected
  transitions:
    - trigger: hotspot_found
      source: stable
      dest: hotspot_detected
      conditions: ["hotspot_topics not empty"]
    - trigger: hotspot_found
      source: hotspot_detected
      dest: hotspot_detected
    - trigger: no_hotspots
      source: hotspot_detected
      dest: stable
    - trigger: no_hotspots
      source: stable
      dest: stable

descriptor:
  node_archetype: reducer
  purity: pure
  idempotent: false
  deterministic: true
