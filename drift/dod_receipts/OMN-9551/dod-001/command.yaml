  ## Summary

  - **OMN-9552**: `ServiceRuntimeHealthMonitor` now waits a configurable boot grace period (default 120 s, `RUNTIME_HEALTH_BOOT_GRACE_SECONDS` env var) before emitting health check events. This prevents the monitor from publishing to `onex.evt.omnibase-infra.runtime-health-check.v1` before Kafka topic provisioning completes at startup.
  - **OMN-9553**: `EventBusKafka._publish_with_retry()` now catches `UnknownTopicOrPartitionError` **before** `KafkaError` and skips the circuit breaker failure counter. A missing topic is a configuration error, not a broker connectivity failure — it must not open the circuit breaker and block subsequent publishes to healthy topics.
  - **OMN-9554**: `ServiceKernel` reads `RUNTIME_HEALTH_BOOT_GRACE_SECONDS` from the environment and passes it to the health monitor constructor, making the grace window operator-configurable.

  ## Root Cause

  `ServiceRuntimeHealthMonitor.run_once()` was called before topic `onex.evt.omnibase-infra.runtime-health-check.v1` was provisioned by Redpanda → `UnknownTopicOrPartitionError` was raised → recorded as a circuit breaker failure → circuit opened after threshold → runtime rejected all subsequent Kafka publishes → `service_kernel` shut down → Docker restarted → repeat (282 restarts observed).

  ## Test Plan

  - [ ] `uv run pytest tests/unit/services/test_service_runtime_health_monitor.py -v` — 28 tests pass, including 5 new `TestBootGracePeriod` tests
  - [ ] `uv run pytest tests/unit/event_bus/ -v` — 441 tests pass, including new `test_circuit_breaker_topic_error.py`
