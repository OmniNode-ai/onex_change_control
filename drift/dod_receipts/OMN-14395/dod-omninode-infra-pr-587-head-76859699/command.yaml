  helper is identical to the prior inline checks (consumed, approved_by != requested_by, absolute expires_at),
  the runtime_lane and image_digest filter still gates which entries are resolved at all, and _decide
  still maps only RESOLVED to exit 0. The new ALLOW set is a strict superset of the old that admits only
  entries independently satisfying every gate, so the change can fix a false BLOCK but cannot introduce
  a false PASS.
