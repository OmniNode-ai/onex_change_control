  the orchestrator the materialized dispatch dict instead of re-hydrating a typed ModelEventEnvelope,
  and the handler crashed on envelope.event_type. The PR renames the per-handler key to event_model in
  all four contracts (value unchanged; node-level input_model/output_model unchanged; parser unchanged),
  adds a real-dispatch-path regression test that drives the actual MessageDispatchEngine + auto-wired
  callback and is verified to FAIL pre-fix (AttributeError: 'dict' object has no attribute 'event_type')
  and PASS post-fix, and commits the coding-agent runtime env vars (CODING_AGENT_CRED_HOME=/home/omniinfra,
  ONEX_CODING_AGENT_WORKSPACE_ROOT=/home/omniinfra/agent-workspaces) to the runtime-effects catalog and
  committed compose. No real claude/codex subprocess is executed in tests.
