  PASS: omnibase_infra PR #2042 at commit 35fcdfc23211e0887ebe0ed9f0878baef934c10c fixes the e2e-discovered
  coding-agent bus wiring bug. The four coding-agent node contracts declared their per-handler model under
  handler_routing.handlers[].input_model, but the auto-wiring parser (runtime/auto_wiring/discovery.py::_parse_handler_routing)
