actual_output: "PASS: the gate is NOT vacuous. The runtime engine maps an absent `extra` to STATUS_IMPLICIT_DEFAULT,
  and is_violation is defined as (status != EXPLICIT_FORBID) — so a model with NO model_config at all
  is a violation BY CONSTRUCTION, not via a special case that could be dropped. The proof-(b) regression
  test asserts exactly that. This is the case a grep-for-extra=\"ignore\" gate cannot see, and it is the
  LARGER half of the real population (675 IMPLICIT_DEFAULT vs 433 explicit ignore/allow on core)."
