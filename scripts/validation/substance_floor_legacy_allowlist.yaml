#
# Substance-floor legacy grandfather list (OMN-14409).
#
# These contracts predate the substance floor and declare NO dod_evidence check
# above tier L0 — every check is content-free as a proof of CORRECTNESS:
#
#   * existence probes   : `gh pr view <n> --json number,state`
#   * merge-state probes : `gh pr view <n> --json state --jq .state | grep -q MERGED`
#                          (proves the PR merged, not that the code is right)
#   * no-ops             : `true`, `:`, `echo ...`, `exit 0`, bare `ls`
#   * file-existence     : `test -f <path>` / check_type file_exists
#
# Each passes identically whether the code is correct or catastrophically broken.
# They are grandfathered so the gate does not wedge CI on pre-existing debt; the
# gate is fail-closed for every NEW contract (measured forward rate: 0/187).
#
# This list is a RATCHET: it may only shrink. Removing an entry requires adding a
# real (L1+) check to that contract. The gate fails if an allowlisted contract
# starts passing but is still listed, so the list cannot go stale.
#
# Backfill tracked by OMN-14419. Measured 2026-07-12 against omnibase-core 0.46.7
# (the pinned wheel, clean env): 123 / 6,920 contracts (1.78%).
#
# OMN-14410 and OMN-14411 were minted by the Evidence-Source autobind DURING this
# PR (2026-07-12). The autobind emits only existence probes, so it keeps producing
# contracts this gate rejects — the treadmill OMN-14425 fixes. They landed on dev
# ahead of the gate, so they are grandfathered rather than used to wedge an
# in-flight lane. LANDING ORDER: OMN-14425 must merge AND the autobind must be
# redeployed before this gate lands, or the gate rejects the output of the only
# producer of the evidence it demands.
#
# NOTE: the circular self-attestation class (a check that greps its OWN receipt
# for `status: PASS`) is NOT in this list and is NOT gated — see
# GATE_SELF_REFERENTIAL in check_contract_substance_floor.py. Gating it today
# would reject 98.4% of new contract traffic. Tracked by OMN-14417.
