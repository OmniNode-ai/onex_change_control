#
# Substance-floor legacy grandfather list (OMN-14409).
#
# These contracts predate the substance floor and declare NO dod_evidence check
# above tier L0 — every check is an existence probe (`gh pr view --json <meta>`),
# which passes identically whether the code is correct or broken. They are
# grandfathered so the gate does not wedge CI on pre-existing debt; the gate is
# fail-closed for every NEW contract.
#
# This list is a RATCHET: it may only shrink. Removing an entry requires adding a
# real (L1+) check to that contract. The gate fails if an allowlisted contract
# starts passing but is still listed, so the list cannot go stale.
#
# Backfill tracked by OMN-14419. Measured 2026-07-12: 31 / 6,916 contracts (0.45%).
#
# OMN-14411 was minted by the Evidence-Source autobind on 2026-07-12 (commit 15307a17a)
# while this gate was being built — a live demonstration that the defect is still
# actively generating instances. It landed on dev before the gate, so it is
# grandfathered rather than used to wedge an in-flight lane. The NEXT autobind-minted
# all-existence contract will be blocked at PR time, which is the point.
