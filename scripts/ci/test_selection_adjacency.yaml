---
# scripts/ci/test_selection_adjacency.yaml
# Static adjacency map from src/onex_change_control/<module> to dependent modules.
# When a key module changes, every module in `reverse_deps` ALSO has its tests run.
# Treated as CI contract data — manually curated, reviewed in PRs that change it.

schema_version: 1

# `shared_modules` is a FULL-SUITE ESCALATION POLICY, not an architectural ontology.
# Listing a module here means "if this module changes, run the full suite". Curate
# based on operational risk + import fan-out.
shared_modules:
  - models
  - enums
  - validation

# Per-repo full-suite escalation thresholds.
thresholds:
  modules_changed_for_full_suite: 5

# Test infrastructure — any change forces the full suite.
test_infrastructure_paths:
  - tests/conftest.py
  - tests/fixtures/
  - pytest.ini
  - pyproject.toml

# Reverse dependency edges. Key = changed module; value = modules that import it.
# Note: shared_modules entries here are not consulted at runtime
# (they trigger full suite first), but kept for completeness/documentation.
adjacency:
  models:
    reverse_deps: [scripts, validation, validators, scanners, boundaries]
  enums:
    reverse_deps: [models, scripts, validation, validators, scanners]
  validation:
    reverse_deps: [scripts, validators, scanners]
  # Leaf/mid-tier modules
  boundaries: {reverse_deps: []}
  canary: {reverse_deps: []}
  cosmetic: {reverse_deps: []}
  dispatch_claims: {reverse_deps: []}
  eval: {reverse_deps: []}
  handlers: {reverse_deps: []}
  kafka: {reverse_deps: []}
  nodes: {reverse_deps: []}
  overseer: {reverse_deps: []}
  scanners: {reverse_deps: []}
  scripts: {reverse_deps: []}
  testing: {reverse_deps: []}
  validators: {reverse_deps: []}
